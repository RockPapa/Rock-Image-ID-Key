<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archie's Adventure</title>
</head>
<body>
  <script>
(()=>{
  document.body.style.cssText='margin:0;overflow:hidden;background:black;touch-action:none;user-select:none;-webkit-user-select:none';

  const c=document.body.appendChild(document.createElement('canvas'));
  c.style.touchAction='none';
  const g=c.getContext('2d',{alpha:false,desynchronized:true})||c.getContext('2d');
  const k={l:0,r:0,u:0,d:0};
  const keyInput={l:0,r:0,u:0,d:0};
  const touchInput={l:0,r:0,u:0,d:0};

  let w,h,p,plats,start,stars=[],embers=[],t=0,a,master=null,cr=[],d=1,lives=3,over=0,level=1,warthog=null,movingPlats=[],solids=[],fireEnemy=null,bird=null,fireballs=[],fireballSpawnT=0,fireballsSpawned=0,monkeys=[],monkeySpawnT=0,monkeysSpawned=0,monkeysCleared=0,beeBuzz=null,fireSnd=null,hogOinkAt=0,fireCrackleAt=0,gaitPhase=0,hitLock=0,hitFx=null,hogGrowlT=0,hogEatT=0,hogEatNext=0,menuActive=1,introCutscene=0,introT=0,introLineSpoken=-1,endingCutscene=0,endingT=0,titleMusic=null,titleNoiseBuf=null,titleAutoResumeAt=0,titleStartBtn=null,titleLevel12Btn=null;
  // Level 6 wall drop state
  let wallDropped=0,wallY=-900,wallVel=0,wallShakeT=0,wallFreeze=0,wallBubbleT=0,wallTriggered=0,wallSparks=[],wallBubbleIdx=0,wallSmoke=[],wallFog=[],wallFallAnim=0,wallGetUp=0,wallBlowX=0,wallBlowTarget=0;
  let crafts=[],craftParticles=[],craftSndActive=null,cricketsQuiet=0,craftLookX=0,craftLookY=0,craftLookAmt=0;
  let wallTouchT=0,wallTouchTriggered=0,wallInspectBubbleT=0,wallInspectBubbleIdx=0;
  let portalT=0,portalTriggered=0,portalSuckT=0,portalDone=0,portalCloseT=0;
  let level7LookT=0,cricketsKilled=0;
  const MASTER_GAIN=3.968;
  const TITLE_MUSIC_LEVEL=.45;
  const audOut=()=>master||a.destination;

  const G=.7,S=3.3,J=16.5;
  const SIM_FPS=120;
  const FRAME_MS=1000/SIM_FPS;
  const MAX_LEVEL=12;
  const GAME_SPEED=.90;
  const BASE_W=1024,BASE_H=768;
  const PLAYER_SZ=48,PLAT_H=32;
  const RENDER_SCALE=.75;
  const FLY_S=4.6;
  const CLIMB_S=2.6;
  const PERF={
    lowGfx:false,
    starCount:72,
    maxEmbers:220,
    maxWallSparks:28,
    maxWallSmoke:12,
    maxWallFog:14,
    maxCraftParticles:80,
    craftTrailEvery:5
  };
  let fly=0;
  let climb=0;
  let climbPhase=0;
  let ladder=null;
  let level8Ladders=[];
  let skyLayer=null,shipLayer=null;
  const craftSpriteCache=new Map();
  const pushCapped=(arr,item,max)=>{if(arr.length<max)arr.push(item);};

  // Debug helpers for quick stage testing:
  // - Add `?level=5` to the URL to start on that level.
  // - Press `3`, `5`, `6`, `8`, `9`, or `0` anytime to jump to a test level and respawn.
  const qs=new URLSearchParams(location.search);
  const DEBUG_LEVEL=parseInt(qs.get('level')||'',10);
  const DEBUG_HAS_LEVEL=Number.isFinite(DEBUG_LEVEL)&&DEBUG_LEVEL>=1&&DEBUG_LEVEL<=MAX_LEVEL;
  if(DEBUG_HAS_LEVEL)level=DEBUG_LEVEL;

  const syncInput=()=>{
    k.l=keyInput.l||touchInput.l?1:0;
    k.r=keyInput.r||touchInput.r?1:0;
    k.u=keyInput.u||touchInput.u?1:0;
    k.d=keyInput.d||touchInput.d?1:0;
  };
  const startFromTitle=()=>{
    if(!menuActive)return;
    stopTitleMusic();
    menuActive=0;
    if(DEBUG_HAS_LEVEL){
      introCutscene=0;
      startGame();
    }else{
      introCutscene=1;
      introT=0;
      introLineSpoken=-1;
    }
    a?.state==='suspended'&&a.resume();
  };
  const startLevel12FromTitle=()=>{
    if(!menuActive)return;
    stopTitleMusic();
    menuActive=0;
    introCutscene=0;
    startGame(12);
    a?.state==='suspended'&&a.resume();
  };
  let touchControlsOn=1,touchSliderId=null,touchJumpId=null,touchSliderValue=0,touchJumpDown=0,touchControlRects=null;
  const layoutTouchControls=()=>({
    jump:{x:88,y:h-118,r:54},
    slider:{x:w-326,y:h-103,w:250,h:42,knob:36},
    toggle:{x:w-154,y:h-190,w:112,h:42}
  });
  const updateTouchSlider=pt=>{
    const s=layoutTouchControls().slider;
    const half=s.w/2;
    touchSliderValue=Math.max(-1,Math.min(1,(pt.x-(s.x+s.w/2))/half));
    const dead=.16;
    touchInput.l=touchControlsOn&&touchSliderValue<-dead?1:0;
    touchInput.r=touchControlsOn&&touchSliderValue>dead?1:0;
    syncInput();
  };
  const releaseTouchSlider=()=>{
    touchSliderId=null;
    touchSliderValue=0;
    touchInput.l=0;
    touchInput.r=0;
    syncInput();
  };
  const doTouchJump=()=>{
    if(menuActive){
      startFromTitle();
      return;
    }
    if(introCutscene||endingCutscene||over||!p)return;
    startCrickets();
    a?.state==='suspended'&&a.resume();
    if(climb){
      if(a?.state==='running')jumpBoop();
      else a?.resume().then(jumpBoop);
      climb=0;
      p.vy=-J;
      p.ground=0;
    }else if(p.ground){
      if(a?.state==='running')jumpBoop();
      else a?.resume().then(jumpBoop);
      p.vy=-J;
      p.ground=0;
    }
  };
  const drawTouchControls=()=>{
    touchControlRects=layoutTouchControls();
    const {jump,slider,toggle}=touchControlRects;
    g.save();
    const cutsceneDim=menuActive||introCutscene||endingCutscene;
    g.globalAlpha=cutsceneDim?0.45:1;
    g.lineCap='round';
    g.lineJoin='round';

    g.fillStyle=touchControlsOn?'rgba(16,18,22,.62)':'rgba(16,18,22,.48)';
    g.strokeStyle='rgba(240,224,185,.52)';
    g.lineWidth=2;
    g.beginPath();
    g.roundRect(toggle.x,toggle.y,toggle.w,toggle.h,18);
    g.fill();
    g.stroke();
    g.fillStyle=touchControlsOn?'#9ff0aa':'#e2a0a0';
    g.font='bold 18px Times New Roman';
    g.textAlign='center';
    g.fillText(touchControlsOn?'TOUCH ON':'TOUCH OFF',toggle.x+toggle.w/2,toggle.y+27);

    if(touchControlsOn){
      g.globalAlpha=cutsceneDim?0.38:0.86;
      g.fillStyle=touchJumpDown?'rgba(255,190,64,.38)':'rgba(16,18,22,.56)';
      g.strokeStyle='rgba(255,220,150,.58)';
      g.lineWidth=3;
      g.beginPath();
      g.arc(jump.x,jump.y,jump.r,0,Math.PI*2);
      g.fill();
      g.stroke();
      g.fillStyle='rgba(255,238,194,.94)';
      g.font='bold 23px Times New Roman';
      g.fillText('JUMP',jump.x,jump.y+8);

      const sx=slider.x,sy=slider.y,sw=slider.w,sh=slider.h;
      const center=sx+sw/2;
      const knobX=center+touchSliderValue*(sw/2);
      g.fillStyle='rgba(16,18,22,.56)';
      g.strokeStyle='rgba(255,220,150,.58)';
      g.lineWidth=3;
      g.beginPath();
      g.roundRect(sx,sy,sw,sh,sh/2);
      g.fill();
      g.stroke();
      g.strokeStyle='rgba(255,238,194,.72)';
      g.lineWidth=5;
      g.beginPath();
      g.moveTo(sx+24,sy+sh/2);
      g.lineTo(sx+sw-24,sy+sh/2);
      g.stroke();
      g.fillStyle='rgba(255,190,64,.88)';
      g.strokeStyle='rgba(255,245,210,.72)';
      g.lineWidth=2;
      g.beginPath();
      g.arc(knobX,sy+sh/2,slider.knob/2,0,Math.PI*2);
      g.fill();
      g.stroke();
    }
    g.restore();
  };

  const hit=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
  const monkeyHitBox=m=>({x:m.x,y:m.y+8,w:m.w,h:m.h-14});
  const canvasPoint=e=>{
    const r=c.getBoundingClientRect();
    return {x:(e.clientX-r.left)*(w/r.width),y:(e.clientY-r.top)*(h/r.height)};
  };
  const noteHz=n=>440*Math.pow(2,(n-69)/12);

  const ensureAudio=()=>{
    if(a)return;
    a=new(window.AudioContext||window.webkitAudioContext)();
    master=a.createGain();
    master.gain.setValueAtTime(MASTER_GAIN,a.currentTime);
    master.connect(a.destination);
  };

  const ensureTitleNoise=()=>{
    if(!a||titleNoiseBuf)return;
    const len=.06;
    titleNoiseBuf=a.createBuffer(1,Math.ceil(a.sampleRate*len),a.sampleRate);
    const data=titleNoiseBuf.getChannelData(0);
    for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);
  };

  const scheduleTitleStep=(n,step,stepDur)=>{
    if(!a)return;
    const lead=[76,79,83,79,74,76,79,74,72,74,76,74,71,72,74,null];
    const bass=[48,null,48,null,43,null,45,null];
    const harmony=[64,67,71,67,62,64,67,62,60,62,64,62,59,60,62,null];
    const arp=[88,91,95,91,86,88,91,88];
    const leadMidi=lead[step%lead.length];
    const bassMidi=bass[step%bass.length];
    const harmonyMidi=harmony[step%harmony.length];
    const arpMidi=arp[step%arp.length];

    if(leadMidi!=null){
      const o=a.createOscillator();
      const v=a.createGain();
      o.type='square';
      o.frequency.setValueAtTime(noteHz(leadMidi),n);
      o.frequency.exponentialRampToValueAtTime(noteHz(leadMidi)*1.01,n+stepDur*.72);
      v.gain.setValueAtTime(.0001,n);
      v.gain.exponentialRampToValueAtTime(.05*TITLE_MUSIC_LEVEL,n+.008);
      v.gain.exponentialRampToValueAtTime(.0001,n+stepDur*.92);
      o.connect(v);v.connect(audOut());
      o.start(n);o.stop(n+stepDur+.03);
    }

    if(bassMidi!=null){
      const ob=a.createOscillator();
      const vb=a.createGain();
      ob.type='triangle';
      ob.frequency.setValueAtTime(noteHz(bassMidi),n);
      vb.gain.setValueAtTime(.0001,n);
      vb.gain.exponentialRampToValueAtTime(.04*TITLE_MUSIC_LEVEL,n+.012);
      vb.gain.exponentialRampToValueAtTime(.0001,n+stepDur*.98);
      ob.connect(vb);vb.connect(audOut());
      ob.start(n);ob.stop(n+stepDur+.03);
    }

    // Subtle supporting chord tone to thicken the loop without replacing melody.
    if(harmonyMidi!=null&&step%4!==0){
      const oh=a.createOscillator();
      const vh=a.createGain();
      oh.type='square';
      oh.frequency.setValueAtTime(noteHz(harmonyMidi),n);
      vh.gain.setValueAtTime(.0001,n);
      vh.gain.exponentialRampToValueAtTime(.018*TITLE_MUSIC_LEVEL,n+.01);
      vh.gain.exponentialRampToValueAtTime(.0001,n+stepDur*.85);
      oh.connect(vh);vh.connect(audOut());
      oh.start(n);oh.stop(n+stepDur+.02);
    }

    // Quiet top-end sparkle for more classic chiptune motion.
    if(step%2===0){
      const oa=a.createOscillator();
      const va=a.createGain();
      oa.type='triangle';
      oa.frequency.setValueAtTime(noteHz(arpMidi),n);
      oa.frequency.exponentialRampToValueAtTime(noteHz(arpMidi+2),n+stepDur*.35);
      va.gain.setValueAtTime(.0001,n);
      va.gain.exponentialRampToValueAtTime(.011*TITLE_MUSIC_LEVEL,n+.006);
      va.gain.exponentialRampToValueAtTime(.0001,n+stepDur*.45);
      oa.connect(va);va.connect(audOut());
      oa.start(n);oa.stop(n+stepDur*.52+.02);
    }

    if(step%2===1){
      ensureTitleNoise();
      if(titleNoiseBuf){
        const src=a.createBufferSource();
        src.buffer=titleNoiseBuf;
        const hp=a.createBiquadFilter();
        hp.type='highpass';
        hp.frequency.setValueAtTime(5000,n);
        const vv=a.createGain();
        vv.gain.setValueAtTime(.0001,n);
        vv.gain.exponentialRampToValueAtTime(.012*TITLE_MUSIC_LEVEL,n+.003);
        vv.gain.exponentialRampToValueAtTime(.0001,n+.03);
        src.connect(hp);hp.connect(vv);vv.connect(audOut());
        src.start(n);src.stop(n+.05);
      }
    }
  };

  const startTitleMusic=()=>{
    if(!a||titleMusic?.on)return;
    titleMusic={on:1,next:a.currentTime+.02,step:0};
  };

  const stopTitleMusic=()=>{
    if(titleMusic)titleMusic.on=0;
    titleMusic=null;
  };

  const updateTitleMusic=()=>{
    if(!a||a.state!=='running'||!titleMusic?.on)return;
    const stepDur=.18;
    const lookAhead=.14;
    while(titleMusic.next<a.currentTime+lookAhead){
      scheduleTitleStep(titleMusic.next,titleMusic.step,stepDur);
      titleMusic.next+=stepDur;
      titleMusic.step=(titleMusic.step+1)%16;
    }
  };

  const tryStartTitleTheme=()=>{
    ensureAudio();
    if(!a)return;
    startTitleMusic();
    if(a.state==='suspended')a.resume().catch(()=>{});
  };

  const playIntroSpeech=idx=>{
    if(!a||a.state!=='running')return;
    const n=a.currentTime+.01;
    const base=310+idx*24;
    for(let i=0;i<7;i++){
      const o=a.createOscillator();
      const v=a.createGain();
      const t0=n+i*.038;
      o.type='square';
      const f=base+(i%3)*36+(Math.random()*12-6);
      o.frequency.setValueAtTime(f,t0);
      o.frequency.exponentialRampToValueAtTime(f*.92,t0+.03);
      v.gain.setValueAtTime(.0001,t0);
      v.gain.exponentialRampToValueAtTime(.012,t0+.005);
      v.gain.exponentialRampToValueAtTime(.0001,t0+.03);
      o.connect(v);v.connect(audOut());
      o.start(t0);o.stop(t0+.04);
    }
  };

  const buildSkyLayer=()=>{
    skyLayer=document.createElement('canvas');
    skyLayer.width=w;
    skyLayer.height=h;
    const sg=skyLayer.getContext('2d');
    sg.fillStyle='#f5f5dc';
    sg.beginPath();
    sg.arc(w-90,116,34,0,7);
    sg.fill();
    sg.fillStyle='black';
    sg.beginPath();
    sg.arc(w-76,116,30,0,7);
    sg.fill();

    const fog=sg.createRadialGradient(w-102,112,8,w-102,112,150);
    fog.addColorStop(0,'rgba(235,240,245,.18)');
    fog.addColorStop(.45,'rgba(220,230,238,.1)');
    fog.addColorStop(.8,'rgba(205,215,225,.03)');
    fog.addColorStop(1,'rgba(190,200,210,0)');
    sg.fillStyle=fog;
    sg.fillRect(w-330,-54,420,340);

    const mist=sg.createRadialGradient(w-145,132,0,w-145,132,210);
    mist.addColorStop(0,'rgba(220,228,235,.08)');
    mist.addColorStop(.5,'rgba(210,220,228,.03)');
    mist.addColorStop(1,'rgba(200,210,220,0)');
    sg.fillStyle=mist;
    sg.fillRect(w-430,-114,520,430);
  };

  const buildShipLayer=()=>{
    shipLayer=document.createElement('canvas');
    shipLayer.width=w;
    shipLayer.height=h;
    const lg=shipLayer.getContext('2d');

    const bg7=lg.createLinearGradient(0,0,0,h);
    bg7.addColorStop(0,'#0d0618');
    bg7.addColorStop(.5,'#0f071c');
    bg7.addColorStop(1,'#080412');
    lg.fillStyle=bg7;
    lg.fillRect(0,0,w,h);

    const ceil7=lg.createLinearGradient(0,0,0,h*.11);
    ceil7.addColorStop(0,'#1a0c28');
    ceil7.addColorStop(1,'#0e0818');
    lg.fillStyle=ceil7;
    lg.fillRect(0,0,w,h*.11);

    lg.save();
    lg.strokeStyle='rgba(180,80,255,.55)';
    lg.lineWidth=2;
    lg.shadowColor='rgba(200,100,255,.9)';
    lg.shadowBlur=12;
    lg.beginPath();
    lg.moveTo(0,h*.10);
    lg.lineTo(w,h*.10);
    lg.stroke();
    lg.restore();

    lg.strokeStyle='rgba(100,30,150,.18)';
    lg.lineWidth=1;
    lg.beginPath();
    for(let x=w*.14;x<w;x+=w*.14){
      lg.moveTo(x,h*.11);
      lg.lineTo(x,h);
    }
    lg.stroke();

    lg.strokeStyle='rgba(80,50,100,.13)';
    lg.beginPath();
    for(let row=0;row<28;row++){
      const yy=h*.11+row*(h*.89/28);
      const offset=(row%2)*22;
      lg.moveTo(0,yy);
      lg.lineTo(w,yy);
      for(let col=0;col<14;col++){
        const xx=offset+col*(w/10);
        if(xx>0&&xx<w){
          lg.moveTo(xx,yy);
          lg.lineTo(xx,yy+(h*.89/28));
        }
      }
    }
    lg.stroke();

    const floorGlow7=lg.createLinearGradient(0,h*.84,0,h);
    floorGlow7.addColorStop(0,'rgba(160,40,255,.10)');
    floorGlow7.addColorStop(1,'rgba(160,40,255,0)');
    lg.fillStyle=floorGlow7;
    lg.fillRect(0,h*.84,w,h*.16);

    lg.strokeStyle='rgba(140,50,200,.18)';
    lg.beginPath();
    for(let x=0;x<w;x+=w/14){
      lg.moveTo(x,h*.88);
      lg.lineTo(x,h);
    }
    for(let y=h*.89;y<h;y+=h*.035){
      lg.moveTo(0,y);
      lg.lineTo(w,y);
    }
    lg.stroke();
  };

  const drawLevel8Sky=()=>{
    const bg=g.createLinearGradient(0,0,0,h);
    bg.addColorStop(0,'#0547b8');
    bg.addColorStop(.22,'#0d7bea');
    bg.addColorStop(.48,'#29c4ff');
    bg.addColorStop(.72,'#7becff');
    bg.addColorStop(1,'#ffe9b0');
    g.fillStyle=bg;
    g.fillRect(0,0,w,h);

    const sx=w*.82,sy=h*.16;
    const sun=g.createRadialGradient(sx,sy,8,sx,sy,170);
    sun.addColorStop(0,'rgba(255,255,205,1)');
    sun.addColorStop(.18,'rgba(255,207,52,.98)');
    sun.addColorStop(.46,'rgba(255,126,38,.34)');
    sun.addColorStop(1,'rgba(255,96,24,0)');
    g.fillStyle=sun;
    g.beginPath();
    g.arc(sx,sy,170,0,7);
    g.fill();
    g.fillStyle='#fff4a0';
    g.beginPath();
    g.arc(sx,sy,44,0,7);
    g.fill();

    for(let i=0;i<5;i++){
      const cx=w*(.08+i*.19)+Math.sin(t*.008+i)*18;
      const cy=h*(.15+(i%2)*.13);
      g.fillStyle='rgba(125,78,210,.62)';
      g.beginPath();
      g.ellipse(cx,cy+13,62,12,0,0,7);
      g.ellipse(cx+38,cy+15,44,10,0,0,7);
      g.ellipse(cx-34,cy+16,38,9,0,0,7);
      g.fill();
      g.fillStyle='rgba(255,245,224,.78)';
      g.beginPath();
      g.ellipse(cx,cy,62,18,0,0,7);
      g.ellipse(cx+38,cy+3,44,14,0,0,7);
      g.ellipse(cx-34,cy+4,38,13,0,0,7);
      g.fill();
    }
  };

  const drawLevel9Sunrise=()=>{
    const bg=g.createLinearGradient(0,0,0,h);
    bg.addColorStop(0,'#21163f');
    bg.addColorStop(.34,'#c9575f');
    bg.addColorStop(.62,'#d89462');
    bg.addColorStop(1,'#e4c798');
    g.fillStyle=bg;
    g.fillRect(0,0,w,h);

    const horizon=h*.82;
    const sx=w*.18,sy=horizon+16;
    const sun=g.createRadialGradient(sx,sy,6,sx,sy,230);
    sun.addColorStop(0,'rgba(255,224,138,.88)');
    sun.addColorStop(.20,'rgba(245,154,58,.72)');
    sun.addColorStop(.55,'rgba(205,72,66,.16)');
    sun.addColorStop(1,'rgba(255,112,72,0)');
    g.fillStyle=sun;
    g.beginPath();
    g.arc(sx,sy,230,0,7);
    g.fill();
    g.fillStyle='#e9b75c';
    g.beginPath();
    g.arc(sx,sy,72,Math.PI,Math.PI*2);
    g.fill();

    g.fillStyle='rgba(80,44,76,.26)';
    for(let i=0;i<5;i++){
      const mx=i*w*.25-w*.08;
      g.beginPath();
      g.moveTo(mx,horizon);
      g.lineTo(mx+w*.18,h*.62-Math.sin(i)*34);
      g.lineTo(mx+w*.36,horizon);
      g.closePath();
      g.fill();
    }
  };

  const tick=(m,n)=>{
    if(cricketsKilled)return;
    const o=a.createOscillator();
    const v=a.createGain();
    const p=a.createStereoPanner?.();
    o.type='triangle';
    o.frequency.setValueAtTime(m.f*(.9+Math.random()*.2),n);
    v.gain.setValueAtTime(.0001,n);
    v.gain.exponentialRampToValueAtTime(m.v,n+.003);
    v.gain.exponentialRampToValueAtTime(.0001,n+.012);
    o.connect(v);
    if(p){p.pan.value=m.pan;v.connect(p);p.connect(audOut());}
    else v.connect(audOut());
    o.start(n);
    o.stop(n+.014);
  };

  const chirp=(m,dt=0)=>{
    const n=a.currentTime+dt;
    const q=7+Math.random()*5;
    for(let i=0;i<q;i++)tick(m,n+i*.017);
  };

  const jumpBoop=()=>{
    if(!a)return;
    const o=a.createOscillator(),v=a.createGain(),n=a.currentTime;
    o.type='sawtooth';
    o.frequency.setValueAtTime(210,n);
    o.frequency.exponentialRampToValueAtTime(520,n+.045);
    o.frequency.exponentialRampToValueAtTime(310,n+.14);

  const getStickBounds=(s,gait=0,dir=1,speed=0,mode='walk')=>{

    }else{

      const fArmY=s*.60-bob-swing*s*.03,bArmY=s*.61-bob+swing*s*.03;
      if(dir>0){
        limb(shoulderL.x,shoulderL.y,bArmX,bArmY,-dir*s*.05);
        limb(shoulderR.x,shoulderR.y,fArmX,fArmY,dir*s*.05);
      }else{
        limb(shoulderL.x,shoulderL.y,fArmX,fArmY,dir*s*.05);
        limb(shoulderR.x,shoulderR.y,bArmX,bArmY,-dir*s*.05);

  // Smooth stick figure: falling back onto butt, then getting back up
  const drawStickFall=(x,y,s,col,dir,fallProg,getUpProg)=>{
    // Compute a single 0→1 "seated-ness" with smooth easing
    let sit; // 0 = fully standing, 1 = fully seated
    if(getUpProg>0){
      // Reverse: seated → standing with smooth ease-in-out
      const u=getUpProg;
      sit=1-u*u*(3-2*u); // smoothstep
    }else{
      // Forward: standing → seated with ease-out (fast start, slow settle)
      const u=Math.min(1,fallProg);
      sit=u<.5?2*u*u:1-(-2*u+2)*(-2*u+2)/2; // ease-in-out quad
    }

    const cx=x+s/2;
    const gnd=y+s*.99; // ground line
    const lw=Math.max(1.5,s/15);
    const lerp=(a2,b2)=>a2+(b2-a2)*sit;
    g.strokeStyle=col;g.fillStyle=col;g.lineWidth=lw;g.lineCap='round';

    // ---- Define all joint positions as lerps between STANDING and SEATED ----
    // Pelvis: drops to near ground and shifts back
    const pelX=lerp(cx, cx-dir*s*.06);
    const pelY=lerp(y+s*.69, gnd-s*.08);

    // Spine tilts back when seated — torso leans away from dir
    const tilt=sit*0.55; // radians of backward lean
    const spineLen=s*.36;
    // Chest is up from pelvis along tilted spine
    const chX=pelX-dir*Math.sin(tilt)*spineLen*.55;
    const chY=pelY-Math.cos(tilt)*spineLen*.55;
    // Neck
    const nkX=pelX-dir*Math.sin(tilt)*spineLen*.82;
    const nkY=pelY-Math.cos(tilt)*spineLen*.82;
    // Head center
    const hdX=pelX-dir*Math.sin(tilt)*spineLen*1.05;
    const hdY=pelY-Math.cos(tilt)*spineLen*1.05-s*.14;

    // ---- Legs: transition from straight-down to bent-forward ----
    // Seated: knees up, feet on ground in front
    const lHipX=pelX-s*.05, rHipX=pelX+s*.05;
    // Left leg
    const lFootX=lerp(cx-s*.07, cx+dir*s*.22);
    const lFootY=lerp(gnd, gnd-s*.01);
    const lKneeX=lerp((lHipX+lFootX)*.5, pelX+dir*s*.16);
    const lKneeY=lerp((pelY+gnd)*.5, pelY-s*.04);
    // Right leg (slightly different angle for natural look)
    const rFootX=lerp(cx+s*.07, cx+dir*s*.32);
    const rFootY=lerp(gnd, gnd-s*.03);
    const rKneeX=lerp((rHipX+rFootX)*.5, pelX+dir*s*.22);
    const rKneeY=lerp((pelY+gnd)*.5, pelY-s*.06);

    // ---- Shoulders ----
    const shLx=chX-s*.09, shRx=chX+s*.09;

    // ---- Arms ----
    // Standing: arms at sides.  Seated: back arm braces, front arm on knee
    // "back" arm = opposite to dir, "front" = same as dir
    const backShX=dir>0?shLx:shRx;
    const frontShX=dir>0?shRx:shLx;
    // Back hand: braces on ground behind pelvis
    const bHandX=lerp(backShX, pelX-dir*s*.24);
    const bHandY=lerp(chY+s*.18, gnd-s*.03);
    const bElbX=(backShX+bHandX)*.5+(dir>0?-s*.03:s*.03);
    const bElbY=(chY+bHandY)*.5;
    // Front hand: at side when standing, resting forward when seated
    const fHandX=lerp(frontShX, pelX+dir*s*.12);
    const fHandY=lerp(chY+s*.18, pelY-s*.12);
    const fElbX=(frontShX+fHandX)*.5+(dir>0?s*.03:-s*.03);
    const fElbY=(chY+fHandY)*.5;

    // ---- DRAW everything ----
    // Head
    g.beginPath();g.arc(hdX,hdY,s*.14,0,7);g.fill();
    // Face
    g.fillStyle='black';
    g.fillRect(hdX+dir*s*.04-s*.012,hdY-s*.018,s*.025,s*.025);
    // Surprised open mouth when falling/seated
    if(sit>.2){
      const mo=s*(.018+.014*sit);
      g.beginPath();g.arc(hdX+dir*s*.045,hdY+s*.055,mo,0,7);g.fill();
    }

    // Spine
    g.beginPath();
    g.moveTo(hdX,hdY+s*.13);g.lineTo(nkX,nkY);g.lineTo(chX,chY);g.lineTo(pelX,pelY);
    g.stroke();
    // Shoulders
    g.beginPath();g.moveTo(shLx,chY);g.lineTo(shRx,chY);g.stroke();

    // Left leg
    g.beginPath();g.moveTo(lHipX,pelY);g.lineTo(lKneeX,lKneeY);g.lineTo(lFootX,lFootY);g.stroke();
    // Right leg
    g.beginPath();g.moveTo(rHipX,pelY);g.lineTo(rKneeX,rKneeY);g.lineTo(rFootX,rFootY);g.stroke();

    // Back arm
    g.beginPath();g.moveTo(backShX,chY);g.lineTo(bElbX,bElbY);g.lineTo(bHandX,bHandY);g.stroke();
    // Front arm
    g.beginPath();g.moveTo(frontShX,chY);g.lineTo(fElbX,fElbY);g.lineTo(fHandX,fHandY);g.stroke();

    g.lineCap='butt';
  };

  // ── Alien door sound: deep mechanical thud + hiss as panels slide open ──
  const alienDoorSound=()=>{
    if(!a)return;
    const n=a.currentTime;
    // Heavy mechanical THUNK (door unlocking)
    const o1=a.createOscillator(),v1=a.createGain();
    o1.type='sawtooth';
    o1.frequency.setValueAtTime(55,n);
    o1.frequency.exponentialRampToValueAtTime(22,n+.4);
    v1.gain.setValueAtTime(.0001,n);
    v1.gain.exponentialRampToValueAtTime(.375,n+.008);
    v1.gain.exponentialRampToValueAtTime(.0001,n+.6);
    o1.connect(v1);v1.connect(audOut());o1.start(n);o1.stop(n+.7);

    // Hydraulic hiss (panels sliding)
    const bufLen=Math.ceil(a.sampleRate*1.4);
    const buf=a.createBuffer(1,bufLen,a.sampleRate);
    const bd=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++){
      const env=i<bufLen*.1?(i/(bufLen*.1)):Math.max(0,1-(i-bufLen*.1)/(bufLen*.9));
      bd[i]=(Math.random()*2-1)*env*.4;
    }
    const src=a.createBufferSource(),flt=a.createBiquadFilter(),vn=a.createGain();
    flt.type='bandpass';flt.frequency.setValueAtTime(900,n);flt.Q.value=1.5;

    o2.type='triangle';

    lfo.type='sine';lfo.frequency.setValueAtTime(7,n);
    lfoG.gain.setValueAtTime(18,n);
    lfo.connect(lfoG);lfoG.connect(o2.frequency);
    v2.gain.setValueAtTime(.0001,n+.3);
    v2.gain.exponentialRampToValueAtTime(.135,n+.8);
    v2.gain.exponentialRampToValueAtTime(.0001,n+2.0);
    o2.connect(v2);v2.connect(audOut());
    o2.start(n+.3);o2.stop(n+2.1);lfo.start(n+.3);lfo.stop(n+2.1);

    // Deep resonant alien chord (eerie interior ambience)
    [110,138,165].forEach((freq,i)=>{

  const updateEmbers=dt=>{

    for(let i=embers.length-1;i>=0;i--){
      const e=embers[i];
      e.vy+=.06*dt;
      e.x+=e.vx*dt;
      e.y+=e.vy*dt;
      e.vx*=Math.pow(.985,dt);
      e.vy*=Math.pow(.99,dt);
      e.life-=dt;
      if(e.life<=0||e.y>h+30)embers.splice(i,1);

  const drawEmbers=()=>{

      g.globalAlpha=Math.min(1,a);
      g.fillStyle=`rgb(${r|0},${gg|0},${b|0})`;
      g.beginPath();
      g.arc(e.x,e.y,e.sz,0,7);

  const drawPowFx=()=>{

  const drawLadder=r=>{
    if(!r)return;
    const x=r.x,y=r.y,w=r.w,h=r.h;
    g.save();
    g.lineCap='round';
    g.lineJoin='round';

    // Palm tree (climbable zone uses the same ladder rect). Deterministic texture: do NOT depend on x/y.
    const seed=(r.seed|0)||1;
    const rnd=s=>{const n=Math.sin(s)*10000;return n-Math.floor(n);};

    const cx=x+w/2;

    // Trunk: slender, slightly curved, with ring segments (palm look).
    const trunkTop=y+8;
    const trunkBot=y+h-4;
    const trunkW=Math.max(16,w+6);
    const curve=(rnd(seed+1.3)-.5)*10;
    const midY=trunkTop+(trunkBot-trunkTop)*.45;
    const topCx=cx+curve*.35;
    const midCx=cx+curve;
    const botCx=cx-curve*.15;

    const trunkGrad=g.createLinearGradient(cx-trunkW/2,trunkTop,cx+trunkW/2,trunkTop);
    trunkGrad.addColorStop(0,'#4a2e19');
    trunkGrad.addColorStop(.45,'#7a5230');
    trunkGrad.addColorStop(1,'#3a2314');

    g.strokeStyle='rgba(0,0,0,.25)';
    g.lineWidth=trunkW+10;
    g.beginPath();
    g.moveTo(botCx,trunkBot);
    g.quadraticCurveTo(midCx,midY,topCx,trunkTop);
    g.stroke();

    g.strokeStyle=trunkGrad;
    g.lineWidth=trunkW;
    g.beginPath();
    g.moveTo(botCx,trunkBot);
    g.quadraticCurveTo(midCx,midY,topCx,trunkTop);
    g.stroke();

    // Ring segments.
    g.strokeStyle='rgba(20,12,7,.22)';
    g.lineWidth=2;
    for(let i=0;i<10;i++){
      const p=i/10;
      const yy=trunkTop+p*(trunkBot-trunkTop);
      const cxt=(1-p)*(1-p)*topCx+2*(1-p)*p*midCx+p*p*botCx; // quad bezier x at t=p
      const wig=(rnd(seed+10+i*3.3)-.5)*2.0;
      g.beginPath();
      g.moveTo(cxt-trunkW*.48+wig,yy);
      g.lineTo(cxt+trunkW*.48+wig,yy);
      g.stroke();
    }

    // Crown: realistic palm fronds with drooping arcs and dense leaflets.
    const crownY=trunkTop-2;
    const crownX=topCx;
    const nFronds=11;

    // Draw fronds back-to-front: outer drooping ones first, then upright inner ones on top.
    for(let i=0;i<nFronds;i++){
      const spread=Math.PI*1.15;
      const ang=-Math.PI/2+(i-(nFronds-1)/2)*(spread/nFronds);
      const len=52+rnd(seed+30+i*9.7)*28;
      // Droop: fronds curve downward naturally, more at the sides
      const sideAmt=Math.abs(i-(nFronds-1)/2)/((nFronds-1)/2);
      const droop=16+sideAmt*30+rnd(seed+40+i*7.1)*12;
      // Midpoint control: arcs outward then droops
      const midT=0.4+rnd(seed+41+i*5.3)*0.1;
      const mx=crownX+Math.cos(ang)*len*midT;
      const my=crownY+Math.sin(ang)*len*midT-4;
      // Endpoint droops down
      const ex=crownX+Math.cos(ang)*len;
      const ey=crownY+Math.sin(ang)*len*0.6+droop;

      // Rachis (central stem) shadow
      g.strokeStyle='rgba(0,0,0,.14)';
      g.lineWidth=5;
      g.beginPath();
      g.moveTo(crownX,crownY);
      g.quadraticCurveTo(mx,my,ex,ey);
      g.stroke();

      // Rachis dark green
      const isDark=rnd(seed+42+i*3.3)>.5;
      g.strokeStyle=isDark?'#1e6b2a':'#2a7d38';
      g.lineWidth=3;
      g.beginPath();
      g.moveTo(crownX,crownY);
      g.quadraticCurveTo(mx,my,ex,ey);
      g.stroke();

      // Rachis highlight (lighter center line)
      g.strokeStyle='rgba(80,170,60,.25)';
      g.lineWidth=1.2;
      g.beginPath();
      g.moveTo(crownX,crownY);
      g.quadraticCurveTo(mx,my,ex,ey);
      g.stroke();

      // Leaflets: dense pairs along the rachis, angled outward and tapering
      const nLeaflets=12;
      for(let k=0;k<nLeaflets;k++){
        const t0=(k+1)/(nLeaflets+1);
        // Point on rachis curve
        const px=(1-t0)*(1-t0)*crownX+2*(1-t0)*t0*mx+t0*t0*ex;
        const py=(1-t0)*(1-t0)*crownY+2*(1-t0)*t0*my+t0*t0*ey;
        // Tangent direction on curve for perpendicular leaflets
        const tx2=2*(1-t0)*(mx-crownX)+2*t0*(ex-mx);
        const ty2=2*(1-t0)*(my-crownY)+2*t0*(ey-my);
        const tLen=Math.sqrt(tx2*tx2+ty2*ty2)||1;
        const nx2=-ty2/tLen,ny2=tx2/tLen;
        // Leaflet length tapers toward tip
        const leafLen=(9+7*rnd(seed+60+i*11+k*3.9))*(1-t0*.45);
        // Slight droop on leaflets further from crown
        const leafDroop=t0*4;

        for(let side=-1;side<=1;side+=2){
          const lx=px+side*nx2*leafLen+rnd(seed+80+i*7+k*2.1+side)*2;
          const ly=py+side*ny2*leafLen+leafDroop;
          // Leaf blade (filled shape, not just a line)
          const cxL=(px+lx)/2+side*nx2*2;
          const cyL=(py+ly)/2+1.5;
          // Dark underside for leaves pointing down, lighter for up
          const leafUp=ly<py;
          g.fillStyle=leafUp?'rgba(55,145,50,.7)':'rgba(30,100,28,.65)';
          g.beginPath();
          g.moveTo(px,py);
          g.quadraticCurveTo(cxL-side*1.5,cyL-1,lx,ly);
          g.quadraticCurveTo(cxL+side*1.5,cyL+1,px,py);
          g.closePath();
          g.fill();
          // Thin vein
          g.strokeStyle='rgba(90,180,70,.3)';
          g.lineWidth=.6;
          g.beginPath();
          g.moveTo(px,py);
          g.lineTo(lx,ly);
          g.stroke();
        }
      }
    }

    // Coconuts (realistic cluster tucked under fronds).
    for(let i=0;i<4;i++){
      const cAng=-Math.PI/2+(rnd(seed+90+i*4.7)-.5)*1.2;
      const cDist=6+rnd(seed+91+i*3.1)*5;
      const cx2=crownX+Math.cos(cAng)*cDist;
      const cy2=crownY+Math.sin(cAng)*cDist+6;
      const cSz=4.5+rnd(seed+92+i*2.8)*1.5;
      // Shadow
      g.fillStyle='rgba(0,0,0,.18)';
      g.beginPath();
      g.ellipse(cx2+1,cy2+1,cSz+.5,cSz-.5,.1,0,7);
      g.fill();
      // Main coconut
      const cGrad=g.createRadialGradient(cx2-1,cy2-1,0,cx2,cy2,cSz);
      cGrad.addColorStop(0,'#6b4420');
      cGrad.addColorStop(.6,'#4b2b17');
      cGrad.addColorStop(1,'#2e1a0e');
      g.fillStyle=cGrad;
      g.beginPath();
      g.ellipse(cx2,cy2,cSz,cSz-.8,.1,0,7);
      g.fill();
      // Highlight
      g.fillStyle='rgba(255,220,170,.12)';
      g.beginPath();
      g.ellipse(cx2-1.5,cy2-1.5,cSz*.35,cSz*.3,0,0,7);
      g.fill();
    }

    // Rope wraps to communicate "climb here" (still deterministic).
    g.strokeStyle='rgba(210,190,150,.72)';
    g.lineWidth=3;
    for(let i=0;i<5;i++){
      const yy=y+18+i*(h-40)/4;
      const p=(yy-trunkTop)/(trunkBot-trunkTop);
      const cxt=(1-p)*(1-p)*topCx+2*(1-p)*p*midCx+p*p*botCx;
      g.beginPath();
      g.moveTo(cxt-trunkW*.38,yy);
      g.quadraticCurveTo(cxt,yy+5,cxt+trunkW*.38,yy);
      g.stroke();
    }
    g.restore();
  };

  const drawRopeLadder=r=>{

    g.restore();
  };

  const drawCityWall=(yOff)=>{
    if(PERF.lowGfx){
      const wallX=w*.80;
      const wallW=w*.20;
      const groundY=h*.88+yOff;
      const wallTop=-60+yOff;
      const wallH=groundY-wallTop;
      g.fillStyle='#1c1228';
      g.fillRect(wallX,wallTop,wallW,wallH);
      if(portalT>0||portalDone){
        const ddx=wallX+wallW*.08;
        const ddw=wallW*.60;
        const ddh=groundY*.31;
        g.fillStyle='#000';
        g.fillRect(ddx,groundY-ddh,ddw,ddh);
      }
      return;
    }
    // Massive otherworldly city wall, 20% from the right edge of the screen.
    const wallX=w*.80;
    const wallW=w*.20;
    const realGround=h*.88;
    const groundY=realGround+yOff; // bottom of wall moves with offset during fall
    const wallTop=-60+yOff; // extends above visible screen, offset for drop animation
    const wallH=groundY-wallTop;

    const rnd=s=>{const n=Math.sin(s)*10000;return n-Math.floor(n);};

    g.save();
    // Clip so nothing renders below actual ground during fall
    g.beginPath();
    g.rect(0,-999,w*2,realGround+999);
    g.clip();

    // ── Fog / mist behind the wall (subtle) ──
    const fogG=g.createRadialGradient(wallX+wallW*.5,groundY*.4,20,wallX+wallW*.5,groundY*.5,wallH*.7);
    fogG.addColorStop(0,'rgba(40,15,60,.12)');
    fogG.addColorStop(.5,'rgba(20,8,35,.06)');
    fogG.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=fogG;
    g.fillRect(wallX-120,wallTop,wallW+240,wallH+60);

    // ── Main wall body ──
    const wallGrad=g.createLinearGradient(wallX,0,wallX+wallW,0);
    wallGrad.addColorStop(0,'#1a0e24');
    wallGrad.addColorStop(.2,'#2a1638');
    wallGrad.addColorStop(.5,'#1e0f2c');
    wallGrad.addColorStop(.8,'#140a1e');
    wallGrad.addColorStop(1,'#0d0614');
    g.fillStyle=wallGrad;

    // Jagged mountain-like top edge
    g.beginPath();
    g.moveTo(wallX,groundY);
    g.lineTo(wallX,wallTop+90);
    // Jagged peaks
    const peaks=[
      {dx:0.00,dy:90},{dx:0.06,dy:40},{dx:0.10,dy:65},{dx:0.16,dy:15},
      {dx:0.22,dy:50},{dx:0.30,dy:0},{dx:0.38,dy:35},{dx:0.44,dy:10},
      {dx:0.50,dy:45},{dx:0.56,dy:5},{dx:0.62,dy:30},{dx:0.70,dy:55},
      {dx:0.78,dy:20},{dx:0.86,dy:60},{dx:0.94,dy:35},{dx:1.00,dy:70}
    ];
    for(const pk of peaks){
      g.lineTo(wallX+wallW*pk.dx,wallTop+pk.dy);
    }
    g.lineTo(wallX+wallW,groundY);
    g.closePath();
    g.fill();

    // ── Stone block texture ──
    g.strokeStyle='rgba(80,50,100,.18)';
    g.lineWidth=1;
    for(let row=0;row<28;row++){
      const yy=wallTop+60+row*(wallH/28);
      const offset=(row%2)*22;
      g.beginPath();
      g.moveTo(wallX,yy);
      g.lineTo(wallX+wallW,yy);
      g.stroke();
      for(let col=0;col<6;col++){
        const xx=wallX+offset+col*(wallW/5);
        if(xx>wallX&&xx<wallX+wallW){
          g.beginPath();
          g.moveTo(xx,yy);
          g.lineTo(xx,yy+(wallH/28));
          g.stroke();
        }
      }
    }

    // ── Alien door embedded in wall ──
    if(portalT>0||portalDone){
      const pT=portalT;
      const suckAmt=portalSuckT>0?Math.min(1,portalSuckT/50):0;
      const ss2=v=>v*v*(3-2*v);
      // Open: frames 0-60. Close: portalCloseT 0-40 after abduction.
      const openSlide=ss2(Math.min(1,pT/60));
      const closeSlide=portalCloseT>0?ss2(Math.min(1,portalCloseT/40)):0;
      const slideAmt=Math.max(0,openSlide*(1-closeSlide));
      const beamAmt=portalDone?Math.max(0,1-ss2(Math.min(1,portalCloseT/20))):
                    pT>60?Math.min(1,(pT-60)/20):0;

      // Door dimensions — centered on wall, tall and imposing
      const ddx=wallX+wallW*.08;
      const ddy=groundY;
      const ddw=wallW*.60;
      const ddh=groundY*.31;
      const ddtop=ddy-ddh;
      const panelH=ddh/2;

      // ── Step 1: shadow border — only when door is visibly open ──
      if(slideAmt>.01){
        const shadowW=12;
        const lSh=g.createLinearGradient(ddx-shadowW,0,ddx+shadowW,0);
        lSh.addColorStop(0,'rgba(0,0,0,0)');lSh.addColorStop(1,`rgba(0,0,0,${(.70*slideAmt).toFixed(2)})`);
        g.fillStyle=lSh;g.fillRect(ddx-shadowW,ddtop,shadowW*2,ddh);
        const rSh=g.createLinearGradient(ddx+ddw-shadowW,0,ddx+ddw+shadowW,0);
        rSh.addColorStop(0,`rgba(0,0,0,${(.70*slideAmt).toFixed(2)})`);rSh.addColorStop(1,'rgba(0,0,0,0)');
        g.fillStyle=rSh;g.fillRect(ddx+ddw-shadowW,ddtop,shadowW*2,ddh);
        const tSh=g.createLinearGradient(0,ddtop-shadowW,0,ddtop+shadowW);
        tSh.addColorStop(0,'rgba(0,0,0,0)');tSh.addColorStop(1,`rgba(0,0,0,${(.70*slideAmt).toFixed(2)})`);
        g.fillStyle=tSh;g.fillRect(ddx,ddtop-shadowW,ddw,shadowW*2);
      }

      // ── Step 2: interior — deep alien purple, visible as panels open ──
      if(slideAmt>.01){
        const openTop=ddtop+panelH*(1-slideAmt);
        const openBot=ddy-panelH*(1-slideAmt);
        const openH=Math.max(1,openBot-openTop);
        g.save();
        g.beginPath();g.rect(ddx,openTop,ddw,openH);g.clip();
        // Interior: pure black void — wall texture must not show through
        g.fillStyle='#000000';
        g.fillRect(ddx,openTop,ddw,openH);
        // Subtle purple energy deep inside (only when well open)
        if(slideAmt>.5){
          const glow=g.createRadialGradient(ddx+ddw*.6,openTop+openH*.5,0,ddx+ddw*.6,openTop+openH*.5,ddw*.5);
          const ga=(.18*(slideAmt-.5)*2).toFixed(3);
          glow.addColorStop(0,`rgba(120,20,200,${ga})`);
          glow.addColorStop(1,'rgba(0,0,0,0)');
          g.fillStyle=glow;g.fillRect(ddx,openTop,ddw,openH);
        }
        // Pulsing energy lines — alien interior tech
        if(slideAmt>.25){
          const lineA=Math.min(1,(slideAmt-.25)/.75);
          const pulse=.6+.4*Math.sin(t*.08);
          for(let eli=0;eli<3;eli++){
            const ely=openTop+(eli+.5)*(openH/3);
            const elG=g.createLinearGradient(ddx,0,ddx+ddw,0);
            elG.addColorStop(0,'rgba(120,0,200,0)');
            elG.addColorStop(.3,`rgba(200,80,255,${(.3*lineA*pulse).toFixed(3)})`);
            elG.addColorStop(.5,`rgba(240,180,255,${(.45*lineA).toFixed(3)})`);
            elG.addColorStop(.7,`rgba(200,80,255,${(.3*lineA*pulse).toFixed(3)})`);
            elG.addColorStop(1,'rgba(120,0,200,0)');
            g.fillStyle=elG;g.fillRect(ddx,ely-1,ddw,2);
          }
          // Moving scan lines
          g.lineWidth=1;
          for(let sl=0;sl<6;sl++){
            const sly=openTop+(t*1.2+sl*(openH/6))%openH;
            g.strokeStyle=`rgba(200,100,255,${(.06*lineA).toFixed(3)})`;
            g.beginPath();g.moveTo(ddx,sly);g.lineTo(ddx+ddw,sly);g.stroke();
          }
        }
        g.restore();
      }

      // ── Step 3: sliding panels — only draw while door is in motion; when fully
      //            closed the surrounding wall texture covers the area seamlessly ──
      if(slideAmt>.001){
      g.save();
      g.beginPath();g.rect(ddx,ddtop,ddw,ddh);g.clip();

      const panGrad=g.createLinearGradient(wallX,0,wallX+wallW,0);
      panGrad.addColorStop(0,'#1a0e24');panGrad.addColorStop(.2,'#2a1638');
      panGrad.addColorStop(.5,'#1e0f2c');panGrad.addColorStop(.8,'#140a1e');
      panGrad.addColorStop(1,'#0d0614');

      // Top panel (slides up)
      const topPY=ddtop-slideAmt*panelH;
      g.fillStyle=panGrad;
      g.fillRect(ddx,topPY,ddw,panelH);
      // Stone texture at correct wall-relative row offsets so seams align perfectly
      g.strokeStyle='rgba(80,50,100,.18)';g.lineWidth=1;
      for(let row=0;row<28;row++){
        const yy=wallTop+60+row*(wallH/28);
        if(yy>=topPY-2&&yy<=topPY+panelH+2){
          const offset=(row%2)*22;
          g.beginPath();g.moveTo(ddx,yy);g.lineTo(ddx+ddw,yy);g.stroke();
          for(let col=0;col<6;col++){
            const xx=ddx+offset+col*(ddw/4);
            if(xx>ddx&&xx<ddx+ddw){g.beginPath();g.moveTo(xx,yy);g.lineTo(xx,yy+(wallH/28));g.stroke();}
          }
        }
      }
      // Glowing seam at split edge of top panel — purple to match wall aesthetic
      const tSeam=g.createLinearGradient(0,topPY+panelH-8,0,topPY+panelH+2);
      tSeam.addColorStop(0,'rgba(180,50,255,0)');
      tSeam.addColorStop(1,`rgba(220,120,255,${(.9*slideAmt).toFixed(2)})`);
      g.fillStyle=tSeam;g.fillRect(ddx,topPY+panelH-8,ddw,10);

      // Bottom panel (slides down)
      const botPY=ddy-panelH+slideAmt*panelH;
      g.fillStyle=panGrad;
      g.fillRect(ddx,botPY,ddw,panelH);
      g.strokeStyle='rgba(80,50,100,.18)';g.lineWidth=1;
      for(let row=0;row<28;row++){
        const yy=wallTop+60+row*(wallH/28);
        if(yy>=botPY-2&&yy<=botPY+panelH+2){
          const offset=(row%2)*22;
          g.beginPath();g.moveTo(ddx,yy);g.lineTo(ddx+ddw,yy);g.stroke();
          for(let col=0;col<6;col++){
            const xx=ddx+offset+col*(ddw/4);
            if(xx>ddx&&xx<ddx+ddw){g.beginPath();g.moveTo(xx,yy);g.lineTo(xx,yy+(wallH/28));g.stroke();}
          }
        }
      }
      // Glowing seam at split edge of bottom panel
      const bSeam=g.createLinearGradient(0,botPY,0,botPY+8);
      bSeam.addColorStop(0,`rgba(220,120,255,${(.9*slideAmt).toFixed(2)})`);
      bSeam.addColorStop(1,'rgba(180,50,255,0)');
      g.fillStyle=bSeam;g.fillRect(ddx,botPY,ddw,8);

      g.restore();
      } // end if(slideAmt>.001)

      // ── Step 4: tractor beam — projects from door to envelop player ──
      if(beamAmt>.01){
        const beamOx=ddx;             // beam origin: door left face
        const beamOy=(ddtop+ddy)/2;   // beam origin: door center height
        // Beam extends to player's position (or just past them)
        const playerCX=p.x+p.w/2;
        const playerCY=p.y+p.h/2;
        const beamEnd=Math.min(beamOx-20,playerCX-10);
        const beamLen=Math.max(30,beamOx-beamEnd);
        // Width at far end: big enough to surround player, narrows as player arrives
        const baseW=(p.h*1.8+30)*(1-suckAmt*.7);
        const beamW=baseW*beamAmt;
        // Cone widens from door face toward player: origin is narrow, far end is wide
        const pulse=.7+.3*Math.sin(t*.18);
        const coneG=g.createLinearGradient(beamOx,0,beamEnd,0);
        coneG.addColorStop(0,`rgba(180,60,255,${(.38*beamAmt*pulse).toFixed(3)})`);
        coneG.addColorStop(.5,`rgba(140,30,220,${(.18*beamAmt).toFixed(3)})`);
        coneG.addColorStop(1,'rgba(80,0,140,0)');
        g.fillStyle=coneG;
        g.beginPath();g.moveTo(beamOx,beamOy-4);g.lineTo(beamOx,beamOy+4);
        g.lineTo(beamEnd,beamOy+beamW);g.lineTo(beamEnd,beamOy-beamW);
        g.closePath();g.fill();
        // Bright core line through beam center
        const coreG=g.createLinearGradient(beamOx,0,beamEnd,0);
        coreG.addColorStop(0,`rgba(255,220,255,${(.65*beamAmt*pulse).toFixed(3)})`);
        coreG.addColorStop(.5,`rgba(210,100,255,${(.30*beamAmt).toFixed(3)})`);
        coreG.addColorStop(1,'rgba(140,0,220,0)');
        g.fillStyle=coreG;
        const cW=beamW*.18;
        g.beginPath();g.moveTo(beamOx,beamOy-2);g.lineTo(beamOx,beamOy+2);
        g.lineTo(beamEnd,beamOy+cW);g.lineTo(beamEnd,beamOy-cW);
        g.closePath();g.fill();
        // Particles flowing FROM player toward door (sucked inward)
        for(let pi=0;pi<16;pi++){
          const seed=pi*137.5;
          const phase=(t*.05+seed*.063)%1; // phase 0=at player end, 1=at door
          const px2=beamEnd+(beamLen*phase);
          const spreadAtPhase=(1-phase)*beamW;
          const py2=beamOy+spreadAtPhase*(Math.sin(seed)*2-1)*.4;
          const pa=(.5+.5*Math.sin(seed+t*.1))*beamAmt*Math.min(1,phase*3);
          g.fillStyle=`rgba(230,140,255,${pa.toFixed(2)})`;
          g.beginPath();g.arc(px2,py2,1.2+Math.sin(seed*3)*.7,0,Math.PI*2);g.fill();
        }
        // Ripple rings around player
        if(suckAmt>.05){
          for(let ri=0;ri<4;ri++){
            const rphase=(t*.06+ri*.25)%1;
            const rx2=playerCX+(beamOx-playerCX)*rphase;
            const ry2=beamOy+(playerCY-beamOy)*(1-rphase);
            const hw=beamW*(1-rphase)*.7;
            g.strokeStyle=`rgba(210,100,255,${(.28*beamAmt*(1-rphase)).toFixed(3)})`;
            g.lineWidth=1.5;
            g.beginPath();g.moveTo(rx2,ry2-hw);g.lineTo(rx2,ry2+hw);g.stroke();
          }
        }
      }
    }

    // ── Tower / spire left side ──
    const towerX=wallX-18;
    const towerW=36;
    const towerTop=wallTop+10;
    const towerGrad=g.createLinearGradient(towerX,0,towerX+towerW,0);
    towerGrad.addColorStop(0,'#120820');
    towerGrad.addColorStop(.5,'#22103a');
    towerGrad.addColorStop(1,'#160b24');
    g.fillStyle=towerGrad;
    g.fillRect(towerX,towerTop,towerW,groundY-towerTop);

    // Spire on tower
    g.fillStyle='#1a0c28';
    g.beginPath();
    g.moveTo(towerX+towerW/2,towerTop-50);
    g.lineTo(towerX-4,towerTop+10);
    g.lineTo(towerX+towerW+4,towerTop+10);
    g.closePath();
    g.fill();

    // ── Tower right side ──
    const t2X=wallX+wallW-12;
    const t2W=28;
    const t2Top=wallTop+40;
    g.fillStyle=towerGrad;
    g.fillRect(t2X,t2Top,t2W,groundY-t2Top);
    g.fillStyle='#1a0c28';
    g.beginPath();
    g.moveTo(t2X+t2W/2,t2Top-35);
    g.lineTo(t2X-3,t2Top+8);
    g.lineTo(t2X+t2W+3,t2Top+8);
    g.closePath();
    g.fill();

    // ── Battlements / crenellations along the top ──
    g.fillStyle='#22103a';
    for(let i=0;i<peaks.length-1;i++){
      const px=wallX+wallW*peaks[i].dx;
      const py=wallTop+peaks[i].dy;
      const mw=8+rnd(300+i*7)*5;
      g.fillRect(px-mw/2,py-6,mw,8);
    }

    // ── Glowing runes / symbols + streaks — clipped so they don't bleed into the open door ──
    g.save();
    if(portalT>0||portalDone){
      const _ss=v=>v*v*(3-2*v);
      const _os=_ss(Math.min(1,portalT/60));
      const _cs=portalCloseT>0?_ss(Math.min(1,portalCloseT/40)):0;
      const _sl=Math.max(0,_os*(1-_cs));
      if(_sl>.02){
        const _dx=wallX+wallW*.08,_dw=wallW*.60;
        const _dy=groundY,_dh=groundY*.31;
        const _ot=(_dy-_dh)+_dh/2*(1-_sl);
        const _ob=_dy-_dh/2*(1-_sl);
        // Even-odd clip: full area is drawable, door interior becomes a hole
        g.beginPath();
        g.rect(-999,-999,w+9999,h+9999);
        g.rect(_dx,_ot,_dw,_ob-_ot);
        g.clip('evenodd');
      }
    }

    // ── Glowing runes / symbols ──
    const runeGlow=(rx,ry,size,seed)=>{
      const glow=g.createRadialGradient(rx,ry,0,rx,ry,size*2.5);
      glow.addColorStop(0,'rgba(120,40,200,.6)');
      glow.addColorStop(.3,'rgba(90,20,160,.25)');
      glow.addColorStop(1,'rgba(60,10,120,0)');
      g.fillStyle=glow;
      g.fillRect(rx-size*3,ry-size*3,size*6,size*6);

      // Rune shape (simple geometric sigils)
      const pulse=.6+.4*Math.sin(t*.04+seed*2.3);
      g.strokeStyle=`rgba(160,80,255,${(.5+.5*pulse).toFixed(2)})`;
      g.lineWidth=1.5;
      g.beginPath();
      const type=Math.floor(rnd(seed*17)*4);
      if(type===0){
        g.moveTo(rx,ry-size);g.lineTo(rx+size,ry);g.lineTo(rx,ry+size);g.lineTo(rx-size,ry);g.closePath();
        g.moveTo(rx,ry-size*.5);g.lineTo(rx,ry+size*.5);
        g.moveTo(rx-size*.5,ry);g.lineTo(rx+size*.5,ry);
      }else if(type===1){
        g.moveTo(rx,ry-size);g.lineTo(rx+size*.9,ry+size*.7);g.lineTo(rx-size*.9,ry+size*.7);g.closePath();
        g.moveTo(rx-size*.3,ry+size*.1);g.arc(rx,ry+size*.1,size*.3,Math.PI,0);
      }else if(type===2){
        g.arc(rx,ry,size*.7,0,Math.PI*2);
        g.moveTo(rx,ry-size);g.lineTo(rx,ry+size);
        g.moveTo(rx-size*.5,ry-size*.7);g.lineTo(rx+size*.5,ry+size*.7);
      }else{
        for(let a=0;a<Math.PI*3;a+=.15){
          const r=size*.15+a*size*.18;
          const px2=rx+Math.cos(a)*r,py2=ry+Math.sin(a)*r;
          if(a===0)g.moveTo(px2,py2);else g.lineTo(px2,py2);
        }
      }
      g.stroke();
    };

    // Place runes along the wall (offset by yOff so they move with the wall)
    const runePositions=[
      {x:wallX+wallW*.15,y:wallTop+wallH*.15,s:10},
      {x:wallX+wallW*.50,y:wallTop+wallH*.10,s:12},
      {x:wallX+wallW*.80,y:wallTop+wallH*.20,s:9},
      {x:wallX+wallW*.30,y:wallTop+wallH*.40,s:11},
      {x:wallX+wallW*.65,y:wallTop+wallH*.45,s:10},
      {x:wallX+wallW*.20,y:wallTop+wallH*.62,s:13},
      {x:wallX+wallW*.75,y:wallTop+wallH*.60,s:10},
      {x:wallX+wallW*.45,y:wallTop+wallH*.32,s:11},
    ];
    for(let i=0;i<runePositions.length;i++){
      const rp=runePositions[i];
      runeGlow(rp.x,rp.y,rp.s,i+1);
    }

    // ── Eerie vertical light streaks ──
    for(let i=0;i<3;i++){
      const sx=wallX+wallW*(0.1+i*0.2)+rnd(500+i)*10;
      const sy=wallTop+50+rnd(600+i)*100;
      const sLen=120+rnd(700+i)*180;
      const streakG=g.createLinearGradient(sx,sy,sx,sy+sLen);
      streakG.addColorStop(0,'rgba(100,40,180,0)');
      streakG.addColorStop(.3,`rgba(100,40,180,${(.06+.04*Math.sin(t*.02+i*1.7)).toFixed(3)})`);
      streakG.addColorStop(.7,`rgba(80,20,160,${(.04+.03*Math.sin(t*.03+i*2.1)).toFixed(3)})`);
      streakG.addColorStop(1,'rgba(60,10,120,0)');
      g.fillStyle=streakG;
      g.fillRect(sx-3,sy,6,sLen);
    }
    g.restore(); // end door-opening clip for runes+streaks

    // ── Dark mist at the base (subtle) ──
    const baseMist=g.createLinearGradient(wallX-40,groundY-80,wallX-40,groundY);
    baseMist.addColorStop(0,'rgba(15,5,25,0)');
    baseMist.addColorStop(.5,'rgba(15,5,25,.15)');
    baseMist.addColorStop(1,'rgba(15,5,25,.25)');
    g.fillStyle=baseMist;
    g.fillRect(wallX-40,groundY-80,wallW+80,80);

    // Drifting mist wisps
    for(let i=0;i<3;i++){
      const mx=wallX-30+Math.sin(t*.008+i*1.1)*20+i*(wallW+60)/5;
      const my=groundY-20-rnd(800+i)*40;
      const mw2=40+rnd(900+i)*30;
      const pulse2=.06+.04*Math.sin(t*.015+i*2.3);
      const mistG=g.createRadialGradient(mx,my,0,mx,my,mw2);
      mistG.addColorStop(0,`rgba(30,10,50,${pulse2.toFixed(3)})`);
      mistG.addColorStop(1,'rgba(20,5,35,0)');
      g.fillStyle=mistG;
      g.fillRect(mx-mw2,my-mw2*.6,mw2*2,mw2*1.2);
    }

    // ── Floating debris / particles (very subtle) ──
    for(let i=0;i<4;i++){
      const fx=wallX+rnd(100+i)*(wallW);
      const baseY2=wallTop+80+rnd(200+i)*(wallH-100);
      const fy=baseY2+Math.sin(t*.015+i*1.9)*8;
      const fs=.8+rnd(300+i)*1.2;
      const fa=.06+.06*Math.sin(t*.02+i*3.1);
      g.globalAlpha=fa;
      g.fillStyle='#6030a0';
      g.beginPath();
      g.arc(fx,fy,fs,0,7);
      g.fill();
    }
    g.globalAlpha=1;

    // ── Heat shimmer / haze distortion effect on the wall ──
    for(let i=0;i<4;i++){

  const wallBoom=()=>{

    const o1=a.createOscillator(),v1=a.createGain();

    v1.gain.setValueAtTime(.0001,n);
    v1.gain.exponentialRampToValueAtTime(.7,n+.006);
    v1.gain.exponentialRampToValueAtTime(.0001,n+1.8);
    o1.connect(v1);v1.connect(audOut());o1.start(n);o1.stop(n+2.0);

    // Sub-bass rumble (earth shaking)
    const o2=a.createOscillator(),v2=a.createGain();
    o2.type='triangle';
    o2.frequency.setValueAtTime(30,n);
    o2.frequency.exponentialRampToValueAtTime(12,n+1.5);
    v2.gain.setValueAtTime(.0001,n);
    v2.gain.exponentialRampToValueAtTime(.55,n+.008);
    v2.gain.exponentialRampToValueAtTime(.0001,n+2.2);
    o2.connect(v2);v2.connect(audOut());o2.start(n);o2.stop(n+2.4);

    // Second sub layer for chest-punch feel
    const o2b=a.createOscillator(),v2b=a.createGain();

    o2b.frequency.setValueAtTime(60,n);
    o2b.frequency.exponentialRampToValueAtTime(20,n+.6);
    v2b.gain.setValueAtTime(.0001,n);
    v2b.gain.exponentialRampToValueAtTime(.5,n+.004);
    v2b.gain.exponentialRampToValueAtTime(.0001,n+.9);
    o2b.connect(v2b);v2b.connect(audOut());o2b.start(n);o2b.stop(n+1.0);

    // Massive noise burst (explosion crunch)
    const len=.8;
    const buf=a.createBuffer(1,Math.ceil(a.sampleRate*len),a.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++){
      const env=1-i/data.length;
      data[i]=(Math.random()*2-1)*env*env;
    }
    const src=a.createBufferSource();
    src.buffer=buf;
    const lp=a.createBiquadFilter();
    lp.type='lowpass';
    lp.frequency.setValueAtTime(900,n);
    lp.frequency.exponentialRampToValueAtTime(80,n+len);
    lp.Q.value=1.0;
    const v3=a.createGain();
    v3.gain.setValueAtTime(.0001,n);
    v3.gain.exponentialRampToValueAtTime(.45,n+.004);
    v3.gain.exponentialRampToValueAtTime(.0001,n+len);
    src.connect(lp);lp.connect(v3);v3.connect(audOut());
    src.start(n);src.stop(n+len+.05);

    // Second noise layer (higher crackle)
    const len2=.5;
    const buf2=a.createBuffer(1,Math.ceil(a.sampleRate*len2),a.sampleRate);
    const data2=buf2.getChannelData(0);
    for(let i=0;i<data2.length;i++){
      const env=1-i/data2.length;
      data2[i]=(Math.random()*2-1)*env*env*env;
    }
    const src2=a.createBufferSource();
    src2.buffer=buf2;
    const bp2=a.createBiquadFilter();
    bp2.type='bandpass';
    bp2.frequency.setValueAtTime(400,n);
    bp2.Q.value=.6;
    const v3b=a.createGain();
    v3b.gain.setValueAtTime(.0001,n);
    v3b.gain.exponentialRampToValueAtTime(.3,n+.003);
    v3b.gain.exponentialRampToValueAtTime(.0001,n+len2);
    src2.connect(bp2);bp2.connect(v3b);v3b.connect(audOut());
    src2.start(n);src2.stop(n+len2+.05);

    // Mid crunch layer (bigger)
    const o3=a.createOscillator(),v4=a.createGain();
    o3.type='square';
    o3.frequency.setValueAtTime(80,n);
    o3.frequency.exponentialRampToValueAtTime(25,n+.6);
    v4.gain.setValueAtTime(.0001,n);
    v4.gain.exponentialRampToValueAtTime(.25,n+.005);
    v4.gain.exponentialRampToValueAtTime(.0001,n+.9);
    o3.connect(v4);v4.connect(audOut());o3.start(n);o3.stop(n+1.0);

    // Reverb tail (long decaying noise)
    const rLen=2.0;
    const rBuf=a.createBuffer(1,Math.ceil(a.sampleRate*rLen),a.sampleRate);
    const rData=rBuf.getChannelData(0);
    for(let i=0;i<rData.length;i++){
      const env=Math.exp(-i/(a.sampleRate*.5));
      rData[i]=(Math.random()*2-1)*env;
    }
    const rSrc=a.createBufferSource();
    rSrc.buffer=rBuf;
    const rLp=a.createBiquadFilter();
    rLp.type='lowpass';
    rLp.frequency.setValueAtTime(300,n);
    rLp.Q.value=.5;
    const rV=a.createGain();
    rV.gain.setValueAtTime(.0001,n);
    rV.gain.exponentialRampToValueAtTime(.12,n+.02);
    rV.gain.exponentialRampToValueAtTime(.0001,n+rLen);
    rSrc.connect(rLp);rLp.connect(rV);rV.connect(audOut());
    rSrc.start(n+.01);rSrc.stop(n+rLen+.05);
  };

  const startCraftSound=()=>{
    if(!a||craftSndActive)return;
    const n=a.currentTime;
    // Create reverb impulse for distant feel
    const revLen=3.5,revRate=a.sampleRate;
    const revBuf=a.createBuffer(2,revLen*revRate,revRate);
    for(let ch=0;ch<2;ch++){
      const d=revBuf.getChannelData(ch);
      for(let i=0;i<d.length;i++){
        d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.2);
      }
    }
    const conv=a.createConvolver();
    conv.buffer=revBuf;
    const revGain=a.createGain();
    revGain.gain.value=.8;
    const dryGain=a.createGain();
    dryGain.gain.value=.18;
    // Muffling filter for distance — lower cutoff = more distant
    const distLP=a.createBiquadFilter();
    distLP.type='lowpass';
    distLP.frequency.setValueAtTime(400,n);
    distLP.Q.value=.4;
    const o=a.createOscillator();
    const o2=a.createOscillator();
    const lp=a.createBiquadFilter();
    const v=a.createGain();
    const p2=a.createStereoPanner?.();
    o.type='sawtooth';
    o2.type='triangle';
    o.frequency.setValueAtTime(90,n);
    o2.frequency.setValueAtTime(143,n);
    lp.type='lowpass';
    lp.frequency.setValueAtTime(350,n);
    lp.Q.value=1.2;
    v.gain.setValueAtTime(.0001,n);
    v.gain.exponentialRampToValueAtTime(.0926,n+.8);
    o.connect(lp);
    o2.connect(lp);
    lp.connect(v);
    // Route through distance filter then split dry/wet reverb
    const dest=p2||{connect(x){dryGain.connect(x);revGain.connect(x);}};
    v.connect(distLP);
    distLP.connect(dryGain);
    distLP.connect(conv);
    conv.connect(revGain);
    if(p2){dryGain.connect(p2);revGain.connect(p2);p2.connect(audOut());}
    else{dryGain.connect(audOut());revGain.connect(audOut());}
    o.start();o2.start();
    const o3=a.createOscillator();
    const v2=a.createGain();
    const lfo=a.createOscillator();
    const lfoG=a.createGain();
    o3.type='sine';
    o3.frequency.setValueAtTime(520,n);
    lfo.type='sine';
    lfo.frequency.setValueAtTime(4.5,n);
    lfoG.gain.setValueAtTime(60,n);
    lfo.connect(lfoG);
    lfoG.connect(o3.frequency);
    v2.gain.setValueAtTime(.0001,n);
    v2.gain.exponentialRampToValueAtTime(.0238,n+1.0);
    o3.connect(v2);
    v2.connect(distLP);
    o3.start();lfo.start();
    craftSndActive={o,o2,o3,lp,v,v2,p:p2,lfo,lfoG,conv,revGain,dryGain,distLP};
  };

  const stopCraftSound=()=>{
    if(!craftSndActive)return;
    const ref=craftSndActive;
    craftSndActive=null;
    if(a){
      const n=a.currentTime;
      // Linear ramp to silence over 4 seconds
      const g1=ref.v.gain.value,g2=ref.v2.gain.value;
      ref.v.gain.cancelScheduledValues(n);
      ref.v.gain.setValueAtTime(g1,n);
      ref.v.gain.linearRampToValueAtTime(.0001,n+4.0);
      ref.v2.gain.cancelScheduledValues(n);
      ref.v2.gain.setValueAtTime(g2,n);
      ref.v2.gain.linearRampToValueAtTime(.0001,n+4.0);
      setTimeout(()=>{
        try{ref.o.stop();}catch{}
        try{ref.o2.stop();}catch{}
        try{ref.o3.stop();}catch{}
        try{ref.lfo.stop();}catch{}
        try{ref.o.disconnect();}catch{}
        try{ref.o2.disconnect();}catch{}
        try{ref.o3.disconnect();}catch{}
        try{ref.lp.disconnect();}catch{}
        try{ref.v.disconnect();}catch{}
        try{ref.v2.disconnect();}catch{}

  const getCraftSprite=sz=>{
    const key=Math.max(1,Math.round(sz*100));
    let cached=craftSpriteCache.get(key);
    if(cached)return cached;

    const s=key/100;
    const shW=10*s,shH=60*s;
    const minX=-shH*.8-8,maxX=shH*.8+8;
    const minY=-shH*.3-8,maxY=shH*1.15+8;
    const cw=Math.ceil(maxX-minX),ch=Math.ceil(maxY-minY);
    const cc=document.createElement('canvas');
    cc.width=cw;cc.height=ch;
    const cg=cc.getContext('2d');
    cg.translate(-minX,-minY);
    cg.globalAlpha=.55;

    const haze=cg.createRadialGradient(0,shH*.4,shH*.1,0,shH*.4,shH*.8);
    haze.addColorStop(0,'rgba(90,70,140,.18)');
    haze.addColorStop(.5,'rgba(60,50,110,.08)');
    haze.addColorStop(1,'rgba(40,30,80,0)');
    cg.fillStyle=haze;
    cg.fillRect(-shH*.8,-shH*.3,shH*1.6,shH*1.6);

    const hG=cg.createLinearGradient(-shW/2,0,shW/2,0);
    hG.addColorStop(0,'#2d2045');
    hG.addColorStop(.3,'#3a2a55');
    hG.addColorStop(.7,'#302348');
    hG.addColorStop(1,'#1e1530');
    cg.fillStyle=hG;
    cg.beginPath();
    cg.moveTo(-shW/2,shH*.05);
    cg.lineTo(-shW*.3,-shH*.08);
    cg.lineTo(0,-shH*.02);
    cg.lineTo(shW*.3,-shH*.1);
    cg.lineTo(shW/2,shH*.03);
    cg.lineTo(shW/2,shH*.92);
    cg.lineTo(shW*.2,shH);
    cg.lineTo(-shW*.1,shH*.95);
    cg.lineTo(-shW/2,shH*.97);
    cg.closePath();
    cg.fill();

    cg.fillStyle='rgba(100,110,140,.2)';
    cg.fill();
    cg.strokeStyle='rgba(100,60,130,.2)';
    cg.lineWidth=.5*s;
    for(let i=1;i<5;i++){
      const yy=shH*i/5;
      cg.beginPath();
      cg.moveTo(-shW/2+1,yy);
      cg.lineTo(shW/2-1,yy);
      cg.stroke();
    }
    cg.globalAlpha=1;
    cached={canvas:cc,minX,minY,shW,shH,s};
    craftSpriteCache.set(key,cached);
    return cached;
  };

    g.fillStyle='#2c211a';
    g.fillRect(0,h*.56,w,h*.44);
    // Roof/ceiling so the sky/moon are not directly visible from inside.
    g.fillStyle='#3a281b';
    g.fillRect(0,0,w,h*.18);

    for(let i=0;i<10;i++){

    g.fillStyle='#5f422d';
    g.fillRect(0,h*.18,w,h*.38);
    for(let i=0;i<12;i++){

      g.strokeStyle='rgba(40,25,16,.25)';
      g.strokeRect(0,y,w,h*.038);
    }
    // Beams and trim
    g.fillStyle='#3f2b1d';
    g.fillRect(cabinX+w*.06,h*.18,w*.02,h*.38);
    g.fillRect(cabinX+w*.31,h*.18,w*.02,h*.38);
    g.fillRect(cabinX+w*.56,h*.18,w*.02,h*.38);
    g.fillRect(0,h*.54,w,h*.025);

    // Window
    const winX=cabinX+w*.14,winY=h*.24,winW=w*.16,winH=h*.16;
    if(endingCutscene){
      const dawn=g.createLinearGradient(0,winY,0,winY+winH);
      dawn.addColorStop(0,'#1d3864');
      dawn.addColorStop(.48,'#6f74a5');
      dawn.addColorStop(.72,'#d28678');
      dawn.addColorStop(1,'#ffd08a');
      g.fillStyle=dawn;
    }else{
      g.fillStyle='#1a2738';
    }
    g.fillRect(winX,winY,winW,winH);
    if(endingCutscene){
      g.fillStyle='rgba(255,196,96,.42)';
      g.beginPath();
      g.arc(winX+winW*.28,winY+winH*.92,winW*.18,Math.PI,Math.PI*2);
      g.fill();
      g.fillStyle='rgba(255,236,178,.22)';
      g.fillRect(winX,winY+winH*.66,winW,winH*.18);
    }
    g.strokeStyle='#3a2618';
    g.lineWidth=8;
    g.strokeRect(winX,winY,winW,winH);
    g.lineWidth=3;
    g.strokeStyle='rgba(210,200,170,.25)';
    g.beginPath();
    g.moveTo(winX+winW*.5,winY);g.lineTo(winX+winW*.5,winY+winH);
    g.moveTo(winX,winY+winH*.5);g.lineTo(winX+winW,winY+winH*.5);
    g.stroke();

    // Door frame + doorway darkness
    g.fillStyle='#4d3523';
    g.fillRect(doorX-12,doorY-10,doorW+24,doorH+12);
    g.fillStyle='#080d14';
    g.fillRect(doorX,doorY,doorW,doorH);

    // Outside light when door opens
    if(outsideGlow>0){
      g.fillStyle=`rgba(120,155,190,${(.2*outsideGlow).toFixed(3)})`;
      g.fillRect(doorX,doorY,doorW,doorH);
      g.fillStyle=`rgba(120,155,190,${(.12*outsideGlow).toFixed(3)})`;
      g.beginPath();
      g.moveTo(doorX+2,doorY+doorH-1);
      g.lineTo(doorX+doorW*.94,doorY+doorH-1);
      g.lineTo(doorX+doorW*1.95,doorY+doorH+24);
      g.lineTo(doorX+doorW*.16,doorY+doorH+30);
      g.closePath();
      g.fill();
    }

    // Wooden door leaf, projected width so it reads as a normal hinged swing.
    g.save();
    g.translate(doorX+2,doorY+2);
    const swing=doorOpen*1.18;
    const projW=Math.max(3,(doorW-6)*Math.cos(swing));
    g.fillStyle='#6d4b31';
    g.fillRect(0,0,projW,doorH-4);
    for(let i=0;i<6;i++){
      g.fillStyle=i%2?'#7a5538':'#6a4a31';
      const x0=4+i*((projW-10)/6);
      g.fillRect(x0,4,Math.max(1,(projW-10)/6-1),doorH-12);
    }
    g.fillStyle='#c48d4f';
    g.beginPath();g.arc(Math.max(6,projW-9),doorH*.55,4,0,7);g.fill();
    g.fillStyle='#2d1f15';
    g.fillRect(0,0,2,doorH-4); // hinge side
    g.restore();

    // Rug + couch + lamp + shelf for cabin detail
    g.fillStyle='#5a2f24';
    g.fillRect(cabinX+w*.18,h*.72,w*.34,h*.12);
    g.strokeStyle='rgba(222,174,118,.28)';
    g.strokeRect(cabinX+w*.18,h*.72,w*.34,h*.12);
    g.fillStyle='#3b2a24';
    g.fillRect(cabinX+w*.07,h*.38,w*.23,h*.17);
    g.fillStyle='#4a352d';
    g.fillRect(cabinX+w*.08,h*.48,w*.23,h*.09);
    g.fillStyle='#4b3325';
    g.fillRect(cabinX+w*.40,h*.26,w*.14,h*.02);
    g.fillRect(cabinX+w*.42,h*.29,w*.012,h*.11);
    g.fillRect(cabinX+w*.50,h*.29,w*.012,h*.11);

    // Fireplace + mantle
    const fpX=cabinX+w*.03,fpY=h*.34,fpW=w*.11,fpH=h*.23;
    g.fillStyle='#3a2a20';
    g.fillRect(fpX-8,fpY-8,fpW+16,fpH+8);
    g.fillStyle='#1b1310';
    g.fillRect(fpX,fpY,fpW,fpH);
    const firePulse=.72+.28*Math.sin(t*.32)+.10*Math.sin(t*.81+1.6);
    g.fillStyle=`rgba(255,158,64,${(.26+.18*firePulse).toFixed(3)})`;
    g.beginPath();
    g.ellipse(fpX+fpW*.5,fpY+fpH*.75,fpW*(.27+.06*firePulse),fpH*(.12+.04*firePulse),0,0,7);
    g.fill();
    g.fillStyle=`rgba(255,112,48,${(.20+.16*firePulse).toFixed(3)})`;
    g.beginPath();
    g.ellipse(fpX+fpW*.5,fpY+fpH*.8,fpW*(.18+.05*firePulse),fpH*(.07+.03*firePulse),0,0,7);
    g.fill();
    g.fillStyle='#5a3d2a';
    g.fillRect(fpX-10,fpY-16,fpW+20,10);
    // Small mantle items
    g.fillStyle='#876246';
    g.fillRect(fpX+10,fpY-24,8,8);
    g.fillStyle='#9f744f';
    g.fillRect(fpX+fpW-20,fpY-24,10,8);

    // Removed floating wall envelope/map prop per art direction.

    // Window bench + explorer gear (intentional prop placement under the window)
    const tbX=winX+winW*.04,tbY=winY+winH+10,tbW=winW*.88,tbH=h*.05;
    g.fillStyle='#5e402b';
    g.fillRect(tbX,tbY,tbW,tbH*.34); // bench plank
    g.fillRect(tbX+6,tbY+tbH*.34,6,tbH*.7);
    g.fillRect(tbX+tbW-12,tbY+tbH*.34,6,tbH*.7);
    g.fillStyle='#4b3324';
    g.fillRect(tbX+tbW*.34,tbY+tbH*.34,4,tbH*.55);
    g.fillRect(tbX+tbW*.60,tbY+tbH*.34,4,tbH*.55);
    // compass
    g.fillStyle='#c9a56c';
    g.beginPath();g.arc(tbX+tbW*.35,tbY+tbH*.16,6,0,7);g.fill();
    g.fillStyle='#2f3f49';
    g.beginPath();g.arc(tbX+tbW*.35,tbY+tbH*.16,2.5,0,7);g.fill();
    // mug
    g.fillStyle='#8d6848';
    g.fillRect(tbX+tbW*.6,tbY+tbH*.08,9,8);
    g.strokeStyle='#8d6848';
    g.beginPath();g.arc(tbX+tbW*.6+9,tbY+tbH*.12,3,0,7);g.stroke();
    // small planter
    g.fillStyle='#6d533b';
    g.fillRect(tbX+tbW*.12,tbY+tbH*.06,11,8);
    g.strokeStyle='rgba(78,132,72,.8)';
    g.lineWidth=1.5;
    g.beginPath();
    g.moveTo(tbX+tbW*.12+3,tbY+tbH*.06);g.lineTo(tbX+tbW*.12+5,tbY-5);
    g.moveTo(tbX+tbW*.12+8,tbY+tbH*.06);g.lineTo(tbX+tbW*.12+6,tbY-4);
    g.stroke();

    // Door-side props: coat rack, boots, and travel pack
    const rackX=doorX-doorW*.55,rackY=h*.34;
    g.fillStyle='#4d3524';
    g.fillRect(rackX,rackY,6,h*.23);
    g.fillRect(rackX-10,rackY+16,26,4);
    g.fillRect(rackX-12,rackY+44,30,4);
    g.fillStyle='#5d442f';
    g.fillRect(doorX-doorW*.32,h*.77,12,24);
    g.fillRect(doorX-doorW*.17,h*.77,12,24);
    g.fillStyle='#4b5d36';
    g.fillRect(doorX-doorW*.52,h*.72,26,24);

    // Lantern flicker (kept subtle to avoid orb artifact)
    const lampA=.11+.05*Math.sin(t*.22);
    const lampX=cabinX+w*.46,lampY=h*.32;
    const lampG=g.createRadialGradient(lampX,lampY,6,lampX,lampY,74);
    lampG.addColorStop(0,`rgba(255,196,102,${(.26+lampA).toFixed(3)})`);
    lampG.addColorStop(.65,`rgba(255,178,88,${(.10+lampA*.4).toFixed(3)})`);
    lampG.addColorStop(1,'rgba(255,170,80,0)');
    g.fillStyle=lampG;
    g.beginPath();g.arc(lampX,lampY,74,0,7);g.fill();
    g.fillStyle='#d3a35f';
    g.fillRect(lampX-5,h*.28,10,20);

    // Archie movement sequence:
    // sit -> stand -> (dialogue starts) walk to window/look out -> walk to door -> exit.
    let ax=cabinX+w*.14,ay=h*.40,ag=0,as=0,mode='walk',look=null;
    let inDoorClip=0;
    if(cs<360){
      mode='sit';
      ay=h*.43+Math.sin(t*.08)*1.3;
      look={x:cabinX+w*.21,y:h*.42};
    }else if(cs<650){
      // Full continuous walk from couch area to the window.
      const f=ss((cs-360)/290);
      const walkStartX=cabinX+w*.14;
      const walkEndX=winX+8;
      const walkStartY=h*.43;
      const walkEndY=h*.297;
      ax=walkStartX+(walkEndX-walkStartX)*f;
      ay=walkStartY+(walkEndY-walkStartY)*f+Math.sin(t*.28)*(.65-.35*f);
      ag=Math.sin(t*.4)*.3;
      as=.9-.14*f;
      look={x:winX+winW*.52,y:winY+winH*.38};
    }else if(cs<980){
      // At window: clear pondering/scan animation while looking outside.
      ax=winX+8+Math.sin(t*.016875)*2.4;
      ay=h*.297+Math.sin(t*.03375)*.45;
      ag=Math.sin(t*.07125)*.22;
      as=.16+.03*Math.sin(t*.0225);
      mode='window';
      const lookSweep=.5+.5*Math.sin(t*.024375);
      look={
        x:winX+winW*(.04+.92*lookSweep),
        y:winY+winH*(.08+.72*(.5+.5*Math.sin(t*.03+1.2)))
      };
    }else if(cs<1300){
      // Start walking to door only when the "stroll" line begins.
      const f=ss((cs-980)/320);
      ax=winX+12+f*(doorX-(winX+12)-62);
      ay=h*.299+Math.sin(t*.2)*.6;
      ag=Math.sin(t*.36)*.28;
      as=.78+.22*Math.sin(f*Math.PI);
      look={x:doorX+doorW*.35,y:doorY+doorH*.45};
    }else if(cs<1480){
      const f=ss((cs-1300)/180);
      ax=doorX-62+f*8;
      ay=h*.298-f*.35;
      ag=Math.sin(t*.28)*.12;
      as=.26+.08*f;
      look={x:doorX+doorW*.5,y:doorY+doorH*.53};
    }else{
      const f=ss((cs-1480)/210);
      // Move into the doorway and behind the frame instead of fading in front.
      ax=doorX-54+f*(doorW*.6);
      ay=h*.297+Math.sin(t*.1)*.08;
      ag=Math.sin(t*.32)*(.18*(1-f)+.04);
      as=.72-.3*f;
      inDoorClip=f>.35?1:0;
    }
    g.save();
    if(inDoorClip){
      g.beginPath();
      g.rect(doorX+2,doorY+2,doorW-5,doorH-5);
      g.clip();
    }
    drawStick(ax,ay,220,'orange',1,ag,1,as,mode,look);
    g.restore();

    // First-person narration
    let lineIdx=0;
    let narration="I'm staring at the walls again...";
    if(cs>=400&&cs<980){lineIdx=1;narration="I'm bored out of my mind tonight.";}
    else if(cs>=980&&cs<1480){lineIdx=2;narration="I'm going out for a little stroll.";}
    else if(cs>=1480){lineIdx=3;narration='';}
    if(!endingCutscene&&lineIdx!==introLineSpoken){
      introLineSpoken=lineIdx;
      if(narration)playIntroSpeech(lineIdx);
    }
    // Dialogue box with wrapped text
    const dialogueText=endingCutscene?'WOW, WHAT A NIGHT!':narration;
    if(!endingCutscene||dialogueText){
      const boxX=w*.16,boxY=h*.72,boxW=w*.68,boxH=h*.15;
      g.fillStyle='rgba(18,14,12,.82)';
      g.fillRect(boxX,boxY,boxW,boxH);
      g.strokeStyle='rgba(210,182,138,.4)';
      g.lineWidth=2;
      g.strokeRect(boxX,boxY,boxW,boxH);
      g.textAlign='left';
      g.font='bold 33px Times New Roman';
      g.fillStyle='rgba(235,226,203,.94)';
      if(dialogueText){
        const words=dialogueText.split(' ');
        const maxW=boxW-56;
        let line='',lines=[],yy=boxY+28;
        for(const wd of words){
          const test=line?`${line} ${wd}`:wd;
          if(g.measureText(test).width>maxW&&line){
            lines.push(line);
            line=wd;
          }else line=test;
        }
        if(line)lines.push(line);
        for(let i=0;i<Math.min(2,lines.length);i++){
          g.fillText(lines[i],boxX+28,yy+i*36);
        }
      }
    }
    // Letterbox bars for video-cutscene style
    g.fillStyle='black';
    g.fillRect(0,0,w,58);
    g.fillRect(0,h-58,w,58);

    // Global fades
    if(fadeIn<1){
      g.fillStyle=`rgba(0,0,0,${(1-fadeIn).toFixed(3)})`;
      g.fillRect(0,0,w,h);
    }
    if(fadeOut>0){
      g.fillStyle=`rgba(0,0,0,${fadeOut.toFixed(3)})`;
      g.fillRect(0,0,w,h);
    }
    g.textAlign='left';
  };

  const finishIntroCutscene=()=>{
    introCutscene=0;
    introLineSpoken=-1;
    startGame();
    startCrickets();
    a?.state==='suspended'&&a.resume();
  };

  const drawEndingCutscene=()=>{
    const oldIntroT=introT;
    introT=Math.max(0,1588-endingT);
    drawIntroCutscene();
    introT=oldIntroT;
    return;
    const ss=v=>{const u=Math.max(0,Math.min(1,v));return u*u*(3-2*u);};
    const et=endingT;
    const cabinX=60;
    const doorX=cabinX+w*.64;
    const doorY=h*.25;
    const doorW=w*.11;
    const doorH=h*.31;
    const doorOpen=ss(et/240);
    const enter=ss((et-240)/520);
    const toBed=ss((et-760)/690);
    const bedSettle=ss((et-1540)/280);
    const sleepAmt=ss((et-1780)/240);

    g.fillStyle='#060910';
    g.fillRect(0,0,w,h);
    g.fillStyle='#2c211a';
    g.fillRect(0,h*.56,w,h*.44);
    g.fillStyle='#3a281b';
    g.fillRect(0,0,w,h*.18);
    g.fillStyle='#5f422d';
    g.fillRect(0,h*.18,w,h*.38);
    for(let i=0;i<12;i++){
      const y=h*.18+i*(h*.38/12);
      g.fillStyle=i%2?'#6b4b33':'#5d402c';
      g.fillRect(0,y,w,h*.038);
      g.strokeStyle='rgba(40,25,16,.25)';
      g.strokeRect(0,y,w,h*.038);
    }
    g.fillStyle='#3f2b1d';
    g.fillRect(cabinX+w*.06,h*.18,w*.02,h*.38);
    g.fillRect(cabinX+w*.31,h*.18,w*.02,h*.38);
    g.fillRect(cabinX+w*.56,h*.18,w*.02,h*.38);
    g.fillRect(0,h*.54,w,h*.025);

    const winX=cabinX+w*.14,winY=h*.24,winW=w*.16,winH=h*.16;
    g.fillStyle='#142237';
    g.fillRect(winX,winY,winW,winH);
    g.strokeStyle='#3a2618';
    g.lineWidth=8;
    g.strokeRect(winX,winY,winW,winH);
    g.lineWidth=3;
    g.strokeStyle='rgba(210,200,170,.25)';
    g.beginPath();
    g.moveTo(winX+winW*.5,winY);g.lineTo(winX+winW*.5,winY+winH);
    g.moveTo(winX,winY+winH*.5);g.lineTo(winX+winW,winY+winH*.5);
    g.stroke();

    g.fillStyle='#4d3523';
    g.fillRect(doorX-12,doorY-10,doorW+24,doorH+12);
    g.fillStyle='#080d14';
    g.fillRect(doorX,doorY,doorW,doorH);
    if(doorOpen>.02){
      g.fillStyle=`rgba(120,155,190,${(.18*doorOpen).toFixed(3)})`;
      g.fillRect(doorX,doorY,doorW,doorH);
    }
    g.save();
    g.translate(doorX+2,doorY+2);
    const projW=Math.max(3,(doorW-6)*Math.cos(doorOpen*1.18));
    g.fillStyle='#6d4b31';
    g.fillRect(0,0,projW,doorH-4);
    g.fillStyle='#c48d4f';
    g.beginPath();g.arc(Math.max(6,projW-9),doorH*.55,4,0,7);g.fill();
    g.fillStyle='#2d1f15';
    g.fillRect(0,0,2,doorH-4);
    g.restore();

    const bedX=cabinX+w*.12,bedY=h*.66,bedW=w*.33,bedH=h*.13;
    g.fillStyle='#4b3324';
    g.fillRect(bedX,bedY+bedH*.38,bedW,bedH*.45);
    g.fillStyle='#2d211c';
    g.fillRect(bedX-8,bedY+bedH*.24,16,bedH*.70);
    g.fillStyle='#8d2e3a';
    g.fillRect(bedX+8,bedY+bedH*.22,bedW-16,bedH*.38);
    g.fillStyle='#e8d8bd';
    g.fillRect(bedX+bedW*.05,bedY+bedH*.08,bedW*.22,bedH*.22);
    g.fillStyle='#6b3e52';
    g.fillRect(bedX+bedW*.25,bedY+bedH*.16,bedW*.68,bedH*.30);

    const outsideX=doorX+doorW*.42;
    const startX=doorX-doorW*1.18;
    const walkX=startX+(bedX+bedW*.58-startX)*toBed;
    const archieY=h*.62;
    const gait=Math.sin(t*.32)*(toBed<.98?.3:0);
    if(sleepAmt<.98){
      const entryX=outsideX+(startX-outsideX)*enter;
      const ax=et<760?entryX:walkX;
      g.save();
      drawStick(ax,archieY,170,'orange',1,gait,-1,toBed<.98?.9:0,'walk',toBed>.72?{x:bedX+bedW*.35,y:bedY}:null);
      g.restore();
    }
    if(bedSettle>0){
      const sx=bedX+bedW*.30;
      const sy=bedY+bedH*.06;
      g.save();
      g.globalAlpha=bedSettle;
      g.translate(sx,sy+10*bedSettle);
      g.rotate(-Math.PI/2*.86);
      drawStick(0,0,118,'orange',1,0,-1,0,'walk',null);
      g.restore();
      g.fillStyle=`rgba(107,62,82,${(.92*bedSettle).toFixed(3)})`;
      g.fillRect(bedX+bedW*.22,bedY+bedH*.12,bedW*.65,bedH*.32);
    }

    if(et>760&&et<1540){
      const boxX=w*.18,boxY=h*.72,boxW=w*.64,boxH=h*.12;
      g.fillStyle='rgba(18,14,12,.82)';
      g.fillRect(boxX,boxY,boxW,boxH);
      g.strokeStyle='rgba(210,182,138,.4)';
      g.lineWidth=2;
      g.strokeRect(boxX,boxY,boxW,boxH);
      g.textAlign='center';
      g.font='bold 34px Times New Roman';
      g.fillStyle='rgba(245,235,210,.96)';
      g.fillText('WOW WHAT A NIGHT',w/2,boxY+boxH*.62);
      g.textAlign='left';
    }

    if(sleepAmt>0){
      g.save();
      g.textAlign='center';
      g.font='bold 26px Times New Roman';
      for(let i=0;i<3;i++){
        const zz=(sleepAmt*120+i*30)%120;
        const a2=Math.max(0,1-zz/120)*sleepAmt;
        g.fillStyle=`rgba(235,240,255,${a2.toFixed(3)})`;
        g.fillText('Z',bedX+bedW*.66+i*22,bedY-8-zz*.55);
      }
      g.restore();
    }

    const fadeOut=ss((et-1900)/160);
    if(fadeOut>0){
      g.fillStyle=`rgba(0,0,0,${fadeOut.toFixed(3)})`;
      g.fillRect(0,0,w,h);
    }
  };

  const drawLevel1CabinBackdrop=()=>{
    if(level!==1||!plats||!plats[0])return;
    const p0=plats[0];
    const cw=Math.min(320,p0.w*.62)*.70;
    const ch=170*.70;
    const cx=p0.x+p0.w*.08;
    const cy=p0.y-ch;
    const targetDoorCenter=(start?start.x+PLAYER_SZ*.5:p0.x+54);
    const doorW=cw*.18;
    const doorX=Math.max(cx+6,Math.min(cx+cw-doorW-6,targetDoorCenter-doorW*.5));

    // Cabin body
    g.fillStyle='#5f422d';
    g.fillRect(cx,cy,cw,ch);
    for(let i=0;i<7;i++){
      const y=cy+i*(ch/7);
      g.fillStyle=i%2?'#6a4b33':'#5a3f2b';
      g.fillRect(cx,y,cw,ch/7-2);
    }
    // Roof
    g.fillStyle='#3c271a';
    g.beginPath();
    g.moveTo(cx-18,cy);
    g.lineTo(cx+cw*.5,cy-54);
    g.lineTo(cx+cw+18,cy);
    g.closePath();
    g.fill();
    // Door and window (flipped so door lines up with Archie spawn side)
    g.fillStyle='#24170f';
