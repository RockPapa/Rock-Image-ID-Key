          continue;
        }
        mp.vx=mp.x-ox;
        mp.vy=mp.y-oy;
      }

      const solidBounds=q=>{
        if(q.axis)return q;
        const leftTrim=q.trimLeft??(q.trim??0);
        const rightTrim=q.trimRight??(q.trim??0);
        const w2=Math.max(8,q.w-leftTrim-rightTrim);
        return {x:q.x+leftTrim,y:q.y,w:w2,h:q.h};
      };
      ladder=null;
      if(level===5||level===8||level===9){
        for(const mp of movingPlats){
          if(mp.ladderH){
            const inset=(level===8||level===9)?(mp.ladderHitInset||0):0;
            const cand={x:mp.x+mp.ladderX+inset,y:mp.y-mp.ladderH,w:mp.ladderW-inset*2,h:mp.ladderH,bottom:mp.y,mp,seed:mp.ladderSeed||1};
            if(level===5){ladder=cand;break;}
            if(hit(p,cand)){ladder=cand;break;}
          }
        }
      }

      if(!fly&&ladder&&!climb&&k.u&&hit(p,ladder)){
        climb=1;
        p.vx=0;
        p.vy=0;
        p.ground=0;
      }

      if(level===5&&bird){
        const tx=ladder?ladder.x+ladder.w/2:w*.62;
        const ty=ladder?ladder.y+10:h*.22;
        bird.timer+=dt;

        if(bird.mode==='patrol'){
          bird.phase+=.022*dt;
          const px=bird.homeX+Math.cos(bird.phase)*190;
          const py=bird.homeY+Math.sin(bird.phase*1.3)*26;
          bird.x+=(px-bird.x)*smooth(.06);
          bird.y+=(py-bird.y)*smooth(.08);
          bird.vx=px-bird.x;
          bird.vy=py-bird.y;
          if(bird.timer>bird.cd){
            bird.mode='swoop';
            bird.timer=0;
            bird.vx*=.2;
            bird.vy*=.2;
          }
        }else if(bird.mode==='swoop'){
          const ax=(tx-bird.x)*.012;
          const ay=(ty-bird.y)*.012+.22;
          bird.vx=(bird.vx+ax*dt)*Math.pow(.93,dt);
          bird.vy=(bird.vy+ay*dt)*Math.pow(.93,dt);
          bird.x+=bird.vx*dt;
          bird.y+=bird.vy*dt;
          if(bird.timer>56||bird.y>ty+120){
            bird.mode='recover';
            bird.timer=0;
          }
        }else{
          const ax=(bird.homeX-bird.x)*.018;
          const ay=(bird.homeY-bird.y)*.018-.14;
          bird.vx=(bird.vx+ax*dt)*Math.pow(.90,dt);
          bird.vy=(bird.vy+ay*dt)*Math.pow(.90,dt);
          bird.x+=bird.vx*dt;
          bird.y+=bird.vy*dt;
          if(Math.abs(bird.x-bird.homeX)<14&&Math.abs(bird.y-bird.homeY)<14){
            bird.mode='patrol';
            bird.timer=0;
            bird.cd=110+Math.random()*110;
          }
        }

        bird.x=Math.max(16,Math.min(w-16,bird.x));
        bird.y=Math.max(20,Math.min(h*.55,bird.y));
      }

      if(fly){
        p.vx=(k.r-k.l)*FLY_S;
        p.vy=(k.d-k.u)*FLY_S;
        if(p.vx)d=Math.sign(p.vx);
        p.x+=p.vx*dt;
        p.y+=p.vy*dt;
        if(p.x+p.w<0){
          goToLevel(level-1);
        }else if(p.x>w){
          goToLevel(level+1);
        }else if(p.y+p.h<0){
          goToLevel(level+1);
        }else if(p.y>h){
          goToLevel(level-1);
        }
        p.ground=0;
      }else if(climb){
        if(!ladder){
          climb=0;
        }else{
          // Stay aligned to ladder (it can move with its platform).
          p.x=Math.max(0,Math.min(w-p.w,ladder.x+ladder.w/2-p.w/2));

          const v=(k.d-k.u)*CLIMB_S;
          if(v)climbPhase+=Math.abs(v)*.12*dt;
          p.vx=0;
          p.vy=v;
          p.ground=0;

          // Allow a little "headroom" so reaching the top feels like you're actually up there.
          const topY=ladder.y-8;
          const botY=ladder.bottom-p.h;
          p.y=Math.max(topY,Math.min(botY,p.y+v*dt));

          // If the upper platform comes under you near the ladder top, step onto it.
          const goal=level===5?plats[1]:(level===8||level===9)?plats[1]:null;
          const goalStepY=(level===8||level===9)?goal?.y-p.h+4:topY+1;
          if(goal&&p.y<=goalStepY){
            const pad=6;
            const overX=p.x+p.w-pad>goal.x&&p.x+pad<goal.x+goal.w;
            if(overX&&(k.u||k.r||k.l)){
              climb=0;
              p.y=goal.y-p.h;
              p.vy=0;
              p.ground=1;
              p.vx=(k.r-k.l)*S;
            }
          }

          // Step off at the top by pressing left/right.
          if(p.y<=topY+1&&(k.r||k.l)){
            climb=0;
            p.vx=(k.r-k.l)*S;
            p.vy=0;
          }

          // Drop off at the bottom by pressing down.
          if(p.y>=botY-1&&k.d&&!k.u){
            climb=0;
            p.y=botY;
            p.vy=0;
            p.ground=1;
          }

          if(climb&&!hit(p,ladder)&&!k.u&&!k.d)climb=0;
        }
      }else{
        const prevX=p.x,prevY=p.y;
        p.vx=(k.r-k.l)*S;
        p.vy+=G*dt;
        if(p.vx)d=Math.sign(p.vx);

        let nx=Math.max(0,Math.min(w-p.w,prevX+p.vx*dt));
        for(const q of solids){
          const qb=solidBounds(q);
          if(hit({x:nx,y:prevY,w:p.w,h:p.h},qb)){
            const topBand=q.axis?Math.max(6,Math.abs(q.vy||0)+3):4;
            const feetY=prevY+p.h;
            const onTopBand=
              p.vy>=0&&
              feetY>=qb.y-topBand&&
              feetY<=qb.y+topBand;
            const onOrAboveMovingTop=
              !!q.axis&&
              feetY<=qb.y+topBand;
            if(onTopBand||onOrAboveMovingTop)continue;
            if(p.vx>0)nx=qb.x-p.w;
            else if(p.vx<0)nx=qb.x+qb.w;
          }
        }
        p.x=nx;

        let ny=prevY+p.vy*dt;
        p.ground=0;

        // Swept vertical resolution: pick the first surface we cross this frame.
        const landPad=2;
        const sweptL=Math.min(prevX,p.x)+landPad;
        const sweptR=Math.max(prevX,p.x)+p.w-landPad;
        const prevBottom=prevY+p.h;
        const nextBottom=ny+p.h;
        const prevTop=prevY;
        const nextTop=ny;

        let bestLandY=Infinity;
        let bestCeilY=-Infinity;

        for(const q of solids){
          const qb=solidBounds(q);
          const movingLandPad=q.axis?(q.landPadX??6):0;
          const overlapX=sweptR>qb.x-movingLandPad&&sweptL<qb.x+qb.w+movingLandPad;
          if(!overlapX)continue;

          const movingTopCatch=q.axis?Math.max(10,Math.abs(q.vy||0)+8):0;
          if(p.vy>0&&prevBottom<=qb.y+movingTopCatch&&nextBottom>=qb.y-movingTopCatch){
            if(qb.y<bestLandY)bestLandY=qb.y;
          }else if(p.vy<0){
            const ceilY=qb.y+qb.h;
            if(prevTop>=ceilY&&nextTop<=ceilY){
              if(ceilY>bestCeilY)bestCeilY=ceilY;
            }
          }
        }

        if(p.vy>0&&bestLandY<Infinity){
          ny=bestLandY-p.h;
          p.ground=1;
          p.vy=0;
        }else if(p.vy<0&&bestCeilY>-Infinity){
          ny=bestCeilY;
          p.vy=0;
        }
        p.y=ny;
        if(!climb&&movingPlats.length){
          for(const mp of movingPlats){
            const edgePad=3;
            const feetInsideTop=
              p.x+p.w>mp.x+edgePad&&
              p.x<mp.x+mp.w-edgePad;
            const topSnap=Math.max(4,Math.abs(mp.vy)+2);
            const nearTop=
              p.y+p.h>=mp.y-topSnap&&
              p.y+p.h<=mp.y+topSnap;
            // Only "stick" to a moving platform when we're actually on its top surface.
            // Otherwise, a mover passing underneath can steal you from a nearby ledge.
            if(feetInsideTop&&nearTop&&p.vy>=0){
              p.x=Math.max(0,Math.min(w-p.w,p.x+mp.vx));
              // Keep player firmly attached to top of mover, including while it descends.
              p.y=mp.y-p.h;
              p.vy=0;
              p.ground=1;
              break;
            }
          }
        }

      if((level===10||level===11)&&!over){
        fireballSpawnT-=dt;
        if(fireballSpawnT<=0&&fireballsSpawned<12){
          const ground=plats[0];
          const r=(18+Math.random()*7)*(level===11?1.15:1);
          fireballs.push({x:w+r+70,y:ground.y-r+2,r,vx:level===11?-1.63072:-1.12,spin:Math.random()*7});
          fireballsSpawned++;
          fireballSpawnT=level===11?126:210;
        }
        for(let i=fireballs.length-1;i>=0;i--){
          const fb=fireballs[i];
          fb.x+=fb.vx*dt;
          fb.spin+=(-fb.vx/fb.r)*dt;
          if(fb.x<-fb.r-30)fireballs.splice(i,1);
        }
      }

      if(level===12&&!over){
        monkeySpawnT-=dt;
        if(monkeySpawnT<=0&&monkeysSpawned<20){
          const ground=plats[0],mw=52,mh=43;
          const monkeySpeed=(monkeysSpawned<5?2.32:monkeysSpawned<10?2.66:monkeysSpawned<15?3.02:3.38)*.85;
          monkeys.push({x:w+mw+40,y:ground.y-mh+2,w:mw,h:mh,vx:-monkeySpeed,phase:Math.random()*7});
          monkeysSpawned++;
          monkeySpawnT=186;
        }
        for(let i=monkeys.length-1;i>=0;i--){
          const m=monkeys[i];
          m.x+=m.vx*dt;
          if(m.x+m.w<-40){
            monkeys.splice(i,1);
            hitLock=1;
            loseLife(hitBoop,260,{x:30,y:m.y+m.h/2});
            break;
          }
        }
        for(let i=monkeys.length-1;i>=0;i--){
          const m=monkeys[i];
          const mhb=monkeyHitBox(m);
          if(!hit(p,mhb))continue;
          const stomp=framePrevBottom<=mhb.y+10&&p.vy>=0;
          if(stomp){
            monkeys.splice(i,1);
            monkeysCleared++;
            p.y=m.y-p.h-1;
            p.vy=-J*.52;
            p.ground=0;
            hitBoop();
            hitFx={x:m.x+m.w/2,y:m.y+m.h/2,life:18,max:18};
          }else{
            hitLock=1;
            loseLife(hitBoop,260,{x:m.x+m.w/2,y:m.y+m.h/2});
            break;
          }
        }
      }

      if(warthog){
        if(!hogEatT)warthog.x+=warthog.speed*warthog.dir*dt;
        if(warthog.x<=warthog.min||warthog.x>=warthog.max){
          warthog.dir*=-1;
          warthog.x=Math.max(warthog.min,Math.min(warthog.max,warthog.x));
        }
        if(hit(p,warthog)){
          hitLock=1;
          const ix=Math.max(p.x,warthog.x),iy=Math.max(p.y,warthog.y);
          const ax=Math.min(p.x+p.w,warthog.x+warthog.w),ay=Math.min(p.y+p.h,warthog.y+warthog.h);
          const fx={x:(ix+ax)/2||p.x+p.w/2,y:(iy+ay)/2||p.y+p.h/2};
          loseLife(hitBoop,260,fx);
        }
      }
        if(level===3&&fireEnemy){
          const fireHit={
            x:fireEnemy.x+fireEnemy.w*.22,
            y:fireEnemy.y+fireEnemy.h*.34,
            w:fireEnemy.w*.56,
            h:fireEnemy.h*.54
          };
          if(hit(p,fireHit)){
            hitLock=1;
            const ix=Math.max(p.x,fireHit.x),iy=Math.max(p.y,fireHit.y);
            const ax=Math.min(p.x+p.w,fireHit.x+fireHit.w),ay=Math.min(p.y+p.h,fireHit.y+fireHit.h);
            const fx={x:(ix+ax)/2||p.x+p.w/2,y:(iy+ay)/2||p.y+p.h/2};
            loseLife(hitBoop,260,fx);
          }
        }

        if((level===10||level===11)&&fireballs.length){
          for(const fb of fireballs){
            const fireHit={x:fb.x-fb.r*.72,y:fb.y-fb.r*.72,w:fb.r*1.44,h:fb.r*1.44};
            if(hit(p,fireHit)){
              hitLock=1;
              loseLife(hitBoop,260,{x:fb.x,y:fb.y});
              break;
            }
          }
        }

        if(p.y>h)loseLife(fallBoop);
      }

      if(level===5&&bird&&!fly){
        const birdHit={x:bird.x-14,y:bird.y-10,w:29,h:19};
        if(hit(p,birdHit)){
          hitLock=1;
          climb=0;
          loseLife(hitBoop,260,{x:bird.x,y:bird.y});
        }
      }

      if(level===1&&p.x+p.w>=w-1){
        level=2;
        makeLevel();
        respawn();
      }else if(level===2&&p.x+p.w>=w-1){
        level=3;
        makeLevel();
        respawn();
      }else if(level===3&&p.x+p.w>=w-1){
        level=4;
        makeLevel();
        respawn();
      }else if(level===4&&p.x+p.w>=w-1){
        level=5;
        makeLevel();
        respawn();
      }else if(level===5&&p.x+p.w>=w-1){
        level=6;
        makeLevel();
        respawn();
      }else if(level===7&&p.x+p.w>=w-1){
        level=8;
        makeLevel();
        respawn();
      }else if(level===8&&p.x+p.w>=w-1){
        level=9;
        makeLevel();
        respawn();
      }else if(level===9&&p.x+p.w>=w-1){
        level=10;
        makeLevel();
        respawn();
      }else if(level===10&&p.x+p.w>=w-1){
        level=11;
        makeLevel();
        respawn();
      }else if(level===11&&fireballsSpawned>=12&&!fireballs.length){
        level=12;
        makeLevel();
        respawn();
      }else if(level===12&&monkeysSpawned>=20&&!monkeys.length){
        endingCutscene=1;
        endingT=0;
        level=1;
        monkeys=[];
        hitLock=0;
      }
    }
    if(hitFx){
      hitFx.life-=dt;
      if(hitFx.life<=0)hitFx=null;
    }

    if(hogGrowlT>0)hogGrowlT=Math.max(0,hogGrowlT-dt);

    // Warthog oinks: intermittent while a warthog is on screen.
    if(a&&warthog&&!over){
      if(!hogOinkAt)hogOinkAt=a.currentTime+(1.0+Math.random()*1.0);
      if(a.currentTime>=hogOinkAt){
        hogOink(warthog);
        hogGrowlT=30; // ~30 frames of mouth/head animation
        hogOinkAt=a.currentTime+(2.5+Math.random()*3.0);
      }
    }else{
      hogOinkAt=0;
    }

    // Warthog eating: head down grazing every 15-20 seconds for ~2 seconds
    if(warthog&&!over){
      if(!hogEatNext)hogEatNext=t+(15+Math.random()*5)*60; // 15-20s in frames (~60fps)
      if(hogEatT>0){
        hogEatT-=dt;
      }else if(t>=hogEatNext){
        hogEatT=160; // ~2.7 seconds at 60fps (includes ease in/out)
        hogEatNext=t+(15+Math.random()*5)*60;
      }
    }else{
      hogEatT=0;hogEatNext=0;
    }

    // Fire enemy ambience: steady whoosh + intermittent crackle.
    if(level===3&&a){
      ensureFireSound();
      if(fireSnd){
        const n=a.currentTime;
        if(over||!fireEnemy){
          fireSnd.v.gain.setTargetAtTime(.00001,n,.08);
          fireCrackleAt=0;
        }else{
          const pan=Math.max(-1,Math.min(1,((fireEnemy.x+fireEnemy.w/2)/w)*2-1));
          const dist=Math.min(1,Math.max(.55,1-Math.abs(pan)*.35));
          const flick=.65+.25*(.5+.5*Math.sin(t*.8))+ .08*Math.sin(t*2.3);
          const vol=.038*dist*flick;
          fireSnd.v.gain.setTargetAtTime(vol,n,.10);
          fireSnd.bp.frequency.setTargetAtTime(380+85*Math.sin(t*.95)+45*Math.sin(t*2.05),n,.06);
          fireSnd.lp.frequency.setTargetAtTime(1850+650*(.5+.5*Math.sin(t*.35)),n,.09);
          if(fireSnd.p)fireSnd.p.pan.setTargetAtTime(pan,n,.10);
          if(!fireCrackleAt)fireCrackleAt=n+(0.05+Math.random()*0.12);
          if(n>=fireCrackleAt){
            fireCrackle(fireEnemy);
            fireCrackleAt=n+(0.04+Math.random()*0.12);
          }
        }
      }
    }else{
      stopFireSound();
      fireCrackleAt=0;
    }

    // Bee buzz must be updated even during GAME OVER, otherwise it "freezes" at its last value.
    if(level===5&&a){
      ensureBeeBuzz();
      if(beeBuzz){
        const n=a.currentTime;
        if(over){
          beeBuzz.v.gain.setValueAtTime(.00001,n);
        }else{
          const diving=!!bird&&bird.mode==='swoop';
          const base=diving?210:170;
          const wob=diving
            ?(Math.sin(t*.9)*34+Math.sin(t*2.1)*16)
            :(Math.sin(t*.55)*16+Math.sin(t*.13)*6);
          const freq=base+wob;
          const pulse=diving
            ?(0.25+0.75*Math.max(0,Math.sin(t*.18)))
            :(0.75+0.25*Math.sin(t*.09));
          const vol=(diving?.0306:.0188)*pulse;
          beeBuzz.o.frequency.setTargetAtTime(freq,n,.03);
          beeBuzz.o2.frequency.setTargetAtTime(freq*2,n,.03);
          beeBuzz.v.gain.setTargetAtTime(vol,n,.08);
          if(beeBuzz.p)beeBuzz.p.pan.setTargetAtTime(0,n,.08);
        }
      }
    }else{
      stopBeeBuzz();
    }

    // Screen shake (massive)
    const shakeAmt=wallShakeT>0?wallShakeT*1.6:0;
    const shakeX=shakeAmt?(Math.random()-.5)*shakeAmt:0;
    const shakeY2=shakeAmt?(Math.random()-.5)*shakeAmt:0;
    if(shakeAmt){g.save();g.translate(shakeX,shakeY2);}

    g.fillStyle='black';
    g.fillRect(-10,-10,w+20,h+20);

    if(level===7){
      if(shipLayer)g.drawImage(shipLayer,0,0);

      // Ambient pulsing accent panels — purple glow
      const pulse7=.5+.5*Math.sin(t*.04);
      for(let i=0;i<5;i++){
        const px=w*.10+i*(w*.20);
        const py=h*.30+Math.sin(i*1.57)*.06*h;
        const pg=g.createRadialGradient(px,py,0,px,py,90);
        pg.addColorStop(0,`rgba(160,40,255,${.05+pulse7*.05})`);
        pg.addColorStop(1,'rgba(100,0,180,0)');
        g.fillStyle=pg;
        g.fillRect(px-90,py-90,180,180);
      }
    }else if(level===8||level===9){
      drawLevel8Sky();
    }else if(level===10||level===11||level===12){
      drawLevel9Sunrise();
    }else{
      if(skyLayer)g.drawImage(skyLayer,0,0);

      g.fillStyle='white';
      for(const s of stars){
        g.globalAlpha=.2+.8*(.5+.5*Math.sin(t*s.d+s.p));
        g.fillRect(s.x,s.y,2,2);
      }
      g.globalAlpha=1;
      if(level===1)drawLevel1CabinBackdrop();
    }

    for(let i=0;i<plats.length;i++)drawLedge(plats[i],i);
    for(let i=0;i<movingPlats.length;i++)if(!movingPlats[i].noDraw)drawLedge(movingPlats[i],plats.length+3+i);
    if(level===1)drawLevel1YardDecor();
    if(level===5&&ladder)drawLadder(ladder);
    if(level===8||level===9){
      for(const mp of movingPlats){
        if(mp.ladderH)drawRopeLadder({x:mp.x+mp.ladderX,y:mp.y-mp.ladderH,w:mp.ladderW,h:mp.ladderH,bottom:mp.y,mp,seed:mp.ladderSeed||1});
      }
    }
    if((level===10||level===11)&&fireballs.length){
      for(const fb of fireballs)drawRollingFireball(fb);
    }
    if(level===12&&monkeys.length){
      for(const m of monkeys)drawMonkey(m);
    }
    if(level===5&&bird)drawBird(bird);
    // Draw wall-shard crafts behind the wall (in the distance)
    if(level===6&&crafts.length){
      for(const cr2 of crafts){
        if(!cr2.alive||cr2.delay>0)continue;
        drawCraft(cr2.x,cr2.y,cr2.sz);
      }
      drawCraftParticles();
    }
    if(level===6&&wallTriggered){
      drawCityWall(wallDropped?0:wallY);
      // Door drawn inside drawCityWall
    }
    if(warthog)drawWarthog(warthog);
    if(level===3&&fireEnemy)drawFireEnemy(fireEnemy);
    drawEmbers();
    drawPowFx();

    let speed=Math.abs(p.vx);
    let gait=0;
    const watchingCrafts=crafts.length>0&&craftLookAmt>.1;
    if(wallFreeze||watchingCrafts){
      speed=0;
      gait=0;
      p.vx=0;
    }else if(climb){
      // Climb animation only while actively moving on the tree (up/down pressed).
      if(k.u||k.d){
        gait=climbPhase;
        speed=1.2;
      }else{
        gait=climbPhase;
        speed=0;
      }
    }else{
      if(speed>.2)gaitPhase+=speed*.08*dt;
      gait=speed>.2?Math.sin(gaitPhase):0;
    }
    if(!over||portalSuckT>0){
      if(portalSuckT>0){
        // Player being sucked into portal — shrink, spin, fade
        const suck=Math.min(1,portalSuckT/50);
        const scale=1-suck*.95;
        const spin=suck*Math.PI*4;
        const alpha=1-suck*.9;
        if(scale>0.02){
          g.save();
          g.globalAlpha=alpha;
          g.translate(p.x+p.w/2,p.y+p.h/2);
          g.rotate(spin);
          g.scale(scale,scale);
          drawStick(-p.w/2,-p.h/2,p.h,'orange',1,0,1,0,'walk',null);
          g.restore();
        }
      }else if(wallFallAnim>0||wallGetUp>0){
        drawStickFall(p.x,p.y,p.h,'orange',d,wallFallAnim,wallGetUp);
      }else if(wallTouchT>0){
        // Scanning up at wall — eyes stay fixed on the wall, scanning upward
        const scanPt=wallTouchT/120;
        const wallX2=w*.80+w*.05;
        const scanX=wallX2+w*.04*Math.sin(scanPt*Math.PI*2);
        const scanY=h*.55-h*.50*Math.min(1,scanPt*1.1);
        craftLookX+=(scanX-craftLookX)*smooth(.12);
        craftLookY+=(scanY-craftLookY)*smooth(.12);
        craftLookAmt=Math.min(1,craftLookAmt+.08*dt);
        drawStick(p.x,p.y,p.h,'orange',1,0,1,0,'walk',{x:craftLookX,y:craftLookY});
      }else{
        // Smooth look target toward crafts
        let lookAt=null;
        if(craftLookAmt>.01)lookAt={x:craftLookX,y:craftLookY};
        drawStick(p.x,p.y,p.h,'orange',1,gait,d,speed,climb?'climb':'walk',lookAt);
      }
    }

    // Speech bubble with typewriter text (stays until unfreeze)
    if(wallBubbleT>0){
      wallBubbleT+=dt;
      const fullText='wow!';
      const prevIdx=wallBubbleIdx;
      const targetIdx=Math.min(fullText.length,Math.floor(wallBubbleT/10)+1);
      if(targetIdx>prevIdx){
        wallBubbleIdx=targetIdx;
        typeClick(0);
      }
      const showText=fullText.substring(0,wallBubbleIdx);

      const bx=p.x+p.w/2;
      const dialogueTop=h*.72;
      const by=Math.min(p.y-20,dialogueTop-24);
      const bw=90,bh=40;
      g.fillStyle='white';
      g.beginPath();
      const br=10;
      g.moveTo(bx-bw/2+br,by-bh);
      g.lineTo(bx+bw/2-br,by-bh);
      g.quadraticCurveTo(bx+bw/2,by-bh,bx+bw/2,by-bh+br);
      g.lineTo(bx+bw/2,by-br);
      g.quadraticCurveTo(bx+bw/2,by,bx+bw/2-br,by);
      g.lineTo(bx+6,by);
      g.lineTo(bx,by+10);
      g.lineTo(bx-6,by);
      g.lineTo(bx-bw/2+br,by);
      g.quadraticCurveTo(bx-bw/2,by,bx-bw/2,by-br);
      g.lineTo(bx-bw/2,by-bh+br);
      g.quadraticCurveTo(bx-bw/2,by-bh,bx-bw/2+br,by-bh);
      g.closePath();
      g.fill();
      g.strokeStyle='#333';
      g.lineWidth=1.5;
      g.stroke();
      g.fillStyle='#222';
      g.font='bold 22px Times New Roman';
      g.textAlign='center';
      g.fillText(showText,bx,by-12);
      g.textAlign='left';
    }


    // Draw wall smoke billows (behind sparks)
    if(wallSmoke.length){
      g.fillStyle='rgba(120,100,82,.20)';
      for(const sm of wallSmoke){
        const a2=sm.life/sm.max;
        const fade=a2<.3?a2/.3:a2>.7?(1-a2)/.3:1;
        g.globalAlpha=.24*fade;
        g.beginPath();
        g.arc(sm.x,sm.y,sm.sz*.7,0,7);
        g.fill();
      }
      g.globalAlpha=1;
    }

    // Draw fog drifting across screen
    if(wallFog.length){
      g.fillStyle='rgba(140,126,110,.11)';
      for(const fg of wallFog){
        if(fg.delay>0)continue;
        const a2=fg.life/fg.max;
        const fade=a2<.2?a2/.2:a2>.6?(1-a2)/.4:1;
        g.globalAlpha=.12*fade;
        g.beginPath();
        g.ellipse(fg.x,fg.y,fg.sz*.8,fg.sz*.55,0,0,7);
        g.fill();
      }
      g.globalAlpha=1;
    }

    // Draw wall sparks/embers
    if(wallSparks.length){
      for(const sp of wallSparks){
        const a2=sp.life/sp.max;
        const gg2=sp.hot>.5?Math.max(60,220-160*(1-a2)):Math.max(30,140-110*(1-a2));
        const b2=sp.hot>.5?30:10;
        g.globalAlpha=Math.min(1,a2*1.2);
        g.fillStyle=`rgb(255,${gg2|0},${b2})`;
        g.beginPath();
        g.arc(sp.x,sp.y,sp.sz*a2,0,7);
        g.fill();
        if(a2>.4){
          g.globalAlpha*=.3;
          g.beginPath();
          g.arc(sp.x,sp.y,sp.sz*2,0,7);
          g.fill();
        }
      }
      g.globalAlpha=1;
    }

    for(let i=0;i<lives;i++)drawStick(16+i*30,h-40,24,'orange');

    g.fillStyle='white';
    g.font='20px Times New Roman';
    g.fillText('Level '+level,18,30);
    if(level===12&&!over){
      g.save();
      g.fillStyle='rgba(0,0,0,.42)';
      g.beginPath();
      g.roundRect(w/2-190,12,380,42,14);
      g.fill();
      g.strokeStyle='rgba(255,238,194,.62)';
      g.lineWidth=2;
      g.stroke();
      g.fillStyle='#fff2bd';
      g.font='bold 26px Times New Roman';
      g.textAlign='center';
      g.textBaseline='middle';
      g.fillText('JUMP ON THE MONKEYS',w/2,34);
      g.restore();
    }

    if(over){
      g.fillStyle='rgba(0,0,0,.35)';
      g.fillRect(0,0,w,h);
      g.fillStyle='white';
      g.font='bold 56px Times New Roman';
      g.textAlign='center';
      g.fillText('GAME OVER',w/2,h/2);
      g.textAlign='left';
    }

    // End screen shake
    if(shakeAmt)g.restore();

    drawTouchControls();

    requestAnimationFrame(f);
  })(performance.now());
})();

  </script>
</body>
</html>
