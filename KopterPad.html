/* =========================
   UFO chaser
   - Loads ufo.png from the picked images folder
   - Chases copter and plays buzz.mp3 on collision
   ========================= ********************************************************/
const UFO_FILE = "ufo.png";
const UFO = {
  ENABLE: true,
  PLANE_W: 3267.0,          // +50% size
  PLANE_H: 2376.0,          // +50% size
  SPEED: 365.517923203125,     // world units/sec (-25%)
  HOVER_MIN: 208,            // +30% above terrain
  CHASE_Y_LAG: 70,           // keep a bit below copter altitude
  STOP_DIST: 90,             // don't jitter when very close
  COLLIDE_DIST_XZ: 484,      // +10%
  COLLIDE_DIST_Y: 242,       // +10%
  COLLIDE_COOLDOWN_SEC: 0.40,
  FRAME_SEC: 999999.0        // animation disabled: use ufo.png only
};

let ufoRoamer = null; // { mesh, target, texA, hitCooldownSec }

function removeUfoRoamer(){
  if(!ufoRoamer) return;
  try{
    scene.remove(ufoRoamer.mesh);
    if(ufoRoamer.texA) ufoRoamer.texA.dispose();
    if(ufoRoamer.mesh.material) ufoRoamer.mesh.material.dispose();
    if(ufoRoamer.mesh.geometry) ufoRoamer.mesh.geometry.dispose();
  }catch(e){}
  ufoRoamer = null;
}

function worldUfoHitsCopter(){
  if(!ufoRoamer) return false;
  const isNight = _daylightFactor < 0.25;
  if(isNight) return false;
  const m = ufoRoamer.mesh;
  const dx = m.position.x - camera.position.x;
  const dz = m.position.z - camera.position.z;
  const dy = Math.abs(m.position.y - camera.position.y);
  return Math.hypot(dx, dz) <= UFO.COLLIDE_DIST_XZ && dy <= UFO.COLLIDE_DIST_Y;
}

function keyOutNearBlackToAlpha(tex, threshold=6){
  const img = tex && tex.image;
  if(!img || !img.width || !img.height) return tex;

  const c = document.createElement("canvas");
  c.width = img.width;
  c.height = img.height;
  const ctx = c.getContext("2d", { willReadFrequently:true });
  ctx.drawImage(img, 0, 0);

  const im = ctx.getImageData(0, 0, c.width, c.height);
  const d = im.data;
  for(let i=0; i<d.length; i+=4){
    if(d[i] <= threshold && d[i+1] <= threshold && d[i+2] <= threshold){
      d[i+3] = 0;
    }
  }
  ctx.putImageData(im, 0, 0);

  const out = new THREE.CanvasTexture(c);
  out.colorSpace = THREE.SRGBColorSpace;
  out.flipY = true;
  out.needsUpdate = true;
  try{ tex.dispose(); }catch(e){}
  return out;
}

function loadUfoTexByName(name){
  const f = findExact(name);
  if(!f) return Promise.resolve(null);
  const tl = new THREE.TextureLoader();
  return new Promise((resolve)=>{
    tl.load(
      f.url,
      (tex)=>{
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.flipY = true;
        tex.needsUpdate = true;
        resolve(keyOutNearBlackToAlpha(tex, 6));
      },
      undefined,
      ()=>resolve(null)
    );
  });
}

function initUfoRoamerFromFolder(){
  if(!UFO.ENABLE) return;
  removeUfoRoamer();
  if(ufoDestroyed) return;
  if(!terrain || !hm01) return;

  loadUfoTexByName(UFO_FILE).then((texA)=>{
    if(!texA) return; // ufo.png required

    const geo = new THREE.PlaneGeometry(UFO.PLANE_W, UFO.PLANE_H);
    const matU = new THREE.MeshStandardMaterial({
      map: texA,
      transparent: true,
      alphaTest: 0.05,
      roughness: 1.0,
      metalness: 0.0,
      side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(geo, matU);
    mesh.castShadow = false;
    mesh.receiveShadow = false;

    const p = camera.position.clone();
    p.x += 600;
    p.z += 600;
    const y = sampleTerrainHeightAtWorld(p.x, p.z) + UFO.HOVER_MIN;
    mesh.position.set(p.x, y, p.z);
    scene.add(mesh);

    ufoRoamer = {
      mesh,
      target: new THREE.Vector3(p.x, 0, p.z),
      texA,
      hitCooldownSec: 0
    };
  });
}

function updateUfoRoamer(dt){
  if(!ufoRoamer || !terrain || !hm01) return;
  const isNight = _daylightFactor < 0.25;
  // UFO animation disabled: using ufo.png only.

  if(isNight){
    return;
  }

  const m = ufoRoamer.mesh;
  ufoRoamer.hitCooldownSec = Math.max(0, ufoRoamer.hitCooldownSec - dt);
  ufoRoamer.target.set(camera.position.x, 0, camera.position.z);

  const tdx = ufoRoamer.target.x - m.position.x;
  const tdz = ufoRoamer.target.z - m.position.z;
  const tdist = Math.hypot(tdx, tdz);
  if(tdist > UFO.STOP_DIST){
    const step = Math.min(tdist, UFO.SPEED * dt);
    const ux = tdx / tdist;
    const uz = tdz / tdist;
    m.position.x += ux * step;
    m.position.z += uz * step;

    // Keep sprite upright and facing movement direction.
    m.rotation.set(0, Math.atan2(ux, uz), 0);
  }

  const floorY = sampleTerrainHeightAtWorld(m.position.x, m.position.z) + UFO.HOVER_MIN;
  const chaseY = camera.position.y - UFO.CHASE_Y_LAG;
  const targetY = Math.max(floorY, chaseY);
  m.position.y += (targetY - m.position.y) * Math.min(1, 8 * dt);

  if(ufoRoamer.hitCooldownSec <= 0 && worldUfoHitsCopter()){
    playBuzzSound();
    damagePlayer(HEALTH.DAMAGE_UFO_BUMP);
    ufoRoamer.hitCooldownSec = UFO.COLLIDE_COOLDOWN_SEC;
  }
}

async function buildAll(){

  
  initCopterSpriteFromFolder();
const hm = findExact(FIX.HEIGHTMAP);
  const al = findExact(FIX.ALBEDO);
  const nm = findExact(FIX.NORMAL);
  const rg = findExact(FIX.ROUGH);

  if(!hm){ setStatus(`❌ Missing ${FIX.HEIGHTMAP}`); return; }
  if(!al){ setStatus(`❌ Missing ${FIX.ALBEDO}`); return; }

  // decode heightmap
  let img;
  try{ img = await loadImage(hm.url); }
  catch(e){ console.error(e); setStatus(`❌ Could not decode ${FIX.HEIGHTMAP}`); return; }

  hmW = img.naturalWidth || img.width;
  hmH = img.naturalHeight || img.height;

  const c = document.createElement("canvas");
  c.width = hmW; c.height = hmH;
  const ctx = c.getContext("2d", { willReadFrequently:true });
  ctx.drawImage(img, 0, 0);
  hmRGBA = ctx.getImageData(0,0,hmW,hmH).data;

  buildHeightCache(+ui.rngSmooth.value);

  // textures
  const [tAl, tNm, tRg] = await Promise.all([
    loadTex(al.url, {srgb:true}),
    nm ? loadTex(nm.url, {srgb:false}) : Promise.resolve(null),
    rg ? loadTex(rg.url, {srgb:false}) : Promise.resolve(null),
  ]);

  mat = new THREE.MeshStandardMaterial({
    map: tAl,
    normalMap: tNm,
    roughnessMap: tRg,
    metalness: 0.0,
    roughness: 1.0
  });

  savedNormal = tNm;
  savedRough  = tRg;
  normalEnabled = !!tNm;
  roughEnabled  = !!tRg;
  ui.btnToggleNormal.textContent = "Normal: " + (normalEnabled ? "ON" : "OFF");
  ui.btnToggleRough.textContent  = "Roughness: " + (roughEnabled ? "ON" : "OFF");

  applySliderParams();

  const size = +ui.rngSize.value;
  const hscale = +ui.rngHeight.value;

  // Build base geometry once at BASE_SIZE/BASE_HEIGHT; sliders scale the mesh live.
  const geo = buildGeometry(BASE_SIZE, BASE_HEIGHT);

  if(!terrain){
    terrain = new THREE.Mesh(geo, mat);
    terrain.receiveShadow = SHADOWS_ON;
    terrain.castShadow = false; // terrain doesn't cast to reduce artifacts
    scene.add(terrain);
  
  
  // --- Scale-aware camera centering (Copter-style) ---
  terrain.geometry.computeBoundingBox();
  const bb = terrain.geometry.boundingBox;

  const cx = (bb.min.x + bb.max.x) * 0.5;
  const cz = (bb.min.z + bb.max.z) * 0.5;

  const width  = bb.max.x - bb.min.x;
  const depth  = bb.max.z - bb.min.z;
  const radius = Math.max(width, depth);

  camera.position.set(
    cx,
    radius * 0.35,
    cz + radius * 0.45
  );

  camera.lookAt(cx, 0, cz);
  controls.target.set(cx, 0, cz);
  controls.update();
// --- Center camera over middle of terrain on first render ---
  } else {
    terrain.geometry.dispose();
    terrain.geometry = geo;
    terrain.material.dispose();
    terrain.material = mat;
  }

  // Live height scaling (no rebuild needed when only height changes)
  if (terrain) {
    terrain.scale.y = (HARDWIRED.HEIGHT) / BASE_HEIGHT;
  }

  setStatus(`✅ Heightmap loaded (${hmW}×${hmH}) · Drape applied`);
  if(terrain && terrain.geometry){
    terrain.geometry.computeBoundingBox();
    const bb = terrain.geometry.boundingBox;
    if(bb){
      const margin = Math.min(200, (bb.max.x - bb.min.x) * 0.15, (bb.max.z - bb.min.z) * 0.15);
      amoDefaultSpot = {
        x: bb.min.x + margin,
        z: bb.min.z + margin
      };
    }
  }
  frameCamera();
  updateAmoSpritePlacement();
}

/* Resize */
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* Loop */
const clock = new THREE.Clock();

function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(0.05, clock.getDelta());
  _playerDamageCooldownSec = Math.max(0, _playerDamageCooldownSec - dt);
  crashCooldown = Math.max(0, crashCooldown - dt);

  if(preloadingAssets || waitingForStartKey){
    controls.update();
    renderer.render(scene, camera);
    return;
  }

  applyArrowControls(dt);
  updateHeadlight();
  updateAmbientCraftHum();

  updateCopterSprite(dt);
  tetherAliensToTerrain();
  updateAliensBillboard();
  updateUfoRoamer(dt);
  updateRovers(dt);
  startBadGuyPhase();
  updateBadGuy(dt);
  updateBadGuyBullets(dt);
  updateFireballRoamers(dt);
  updateEndgameWeirdLoop();
  updateAlienAttack(dt);
  checkAlienClear();
  updateAlienBalls(dt);
  updateFireballs(dt);
  updateSkyFireballs(dt);
  updateAmoSpritePlacement();
  updateAmoBillboard();
  updateAmmoPadPlacement();
  attemptAmmoPadReload();
// Anti-shimmer: while moving vertically, soften normals + increase roughness a hair.
  if (ANTI_SHIMMER_ON && mat) {
    antiShimmerTimer = Math.max(0, antiShimmerTimer - dt);
    const moving = antiShimmerTimer > 0;

    const targetNormal = baseNormalScale * (moving ? ANTI_SHIMMER_SCALE_NORMAL : 1.0);
    const targetRough  = Math.min(1.0, baseRoughness + (moving ? ANTI_SHIMMER_BOOST_ROUGH : 0));

    if (!mat.normalScale) mat.normalScale = new THREE.Vector2(1,1);
    // Only update if needed (reduces tiny flicker from constant writes)
    if (Math.abs(mat.normalScale.x - targetNormal) > 1e-3) {
      mat.normalScale.set(targetNormal, targetNormal);
      mat.needsUpdate = true;
    }
    if (Math.abs(mat.roughness - targetRough) > 1e-3) {
      mat.roughness = targetRough;
      mat.needsUpdate = true;
    }
  }
  updateDayNight(dt);
  updateNightLandingRule(dt);
  updateRefuelHUD();

  controls.update();
  renderer.render(scene, camera);
}
tick();
