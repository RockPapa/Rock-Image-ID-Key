<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";


/* =========================
   Data-map config (must be inside module)
   ========================= */
function configureDataMap(tex){
  if(!tex) return tex;
  // Reduce shimmer: turn off mipmaps for data maps (normal/roughness) and use linear sampling.
  tex.generateMipmaps = false;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.anisotropy = 1;
  tex.needsUpdate = true;
  return tex;
}

/* =========================
   Copter sound (folder-safe, looping)
   - Loads copter_sound.mp3 from the PICKED folder (object URL), not from disk paths.
   - Browsers require a user gesture: we start it from the Pick button flow.
   ========================= */
let copterSound = null;

function initCopterSoundFromFolder(){
  const f = findExact("copter_sound.mp3");
  if(!f){
    console.warn("copter_sound.mp3 not found in picked folder");
    return;
  }
  if(copterSound) return;

  copterSound = new Audio(f.url);
  copterSound.loop = true;
  copterSound.volume = 0.2;

  // Start engine hum
  copterSound.play().catch(()=>{});
}

function stopCopterSound(){
  if(!copterSound) return;
  try{ copterSound.pause(); }catch(e){}
}




/* =========================
   Ambient "spaceship" synth (generated, no MP3)
   - Ported from davidcode.js craft sound (WebAudio oscillators + filter + gentle LFO)
   - Starts when the user loads the images folder (same gesture as other sounds)
   - Updates pitch very subtly with copter altitude so it feels "alive"
   ========================= */
let _ambCtx = null;
let _ambMaster = null;
let _craftHum = null;

function _ensureAmbCtx(){
  if(_ambCtx) return;
  const Ctx = (window.AudioContext || window.webkitAudioContext);
  if(!Ctx){
    console.warn("WebAudio not supported; ambient synth disabled.");
    return;
  }
  _ambCtx = new Ctx();
  _ambMaster = _ambCtx.createGain();
  _ambMaster.gain.setValueAtTime(0.95, _ambCtx.currentTime); // overall ambient volume
  _ambMaster.connect(_ambCtx.destination);
}

function startAmbientCraftHum(){
  _ensureAmbCtx();
  if(!_ambCtx || _craftHum) return;

  // In many browsers the context is created in suspended state until a gesture.
  try{ _ambCtx.resume(); }catch(e){}

  const a = _ambCtx;
  const n = a.currentTime;

  const o  = a.createOscillator();
  const o2 = a.createOscillator();
  const lp = a.createBiquadFilter();
  const v  = a.createGain();

  o.type  = "sawtooth";
  o2.type = "triangle";
  o.frequency.setValueAtTime(90, n);
  o2.frequency.setValueAtTime(143, n);

  lp.type = "lowpass";
  lp.frequency.setValueAtTime(350, n);
  lp.Q.value = 1.2;

  v.gain.setValueAtTime(0.0001, n);
  v.gain.exponentialRampToValueAtTime(0.085, n + 1.0);

  o.connect(lp);
  o2.connect(lp);
  lp.connect(v);
  v.connect(_ambMaster);

  // "glow" layer
  const o3   = a.createOscillator();
  const v2   = a.createGain();
  const lfo  = a.createOscillator();
  const lfoG = a.createGain();

  o3.type = "sine";
  o3.frequency.setValueAtTime(1040, n);

  lfo.type = "sine";
  lfo.frequency.setValueAtTime(4.5, n);
  lfoG.gain.setValueAtTime(60, n);

  lfo.connect(lfoG);
  lfoG.connect(o3.frequency);

  v2.gain.setValueAtTime(0.0001, n);
  v2.gain.exponentialRampToValueAtTime(0.028, n + 1.2);

  o3.connect(v2);
  v2.connect(_ambMaster);

  o.start(); o2.start(); o3.start(); lfo.start();

  _craftHum = { a, o, o2, o3, lp, v, v2, lfo, lfoG };
}

function stopAmbientCraftHum(){
  if(!_craftHum) return;
  const ref = _craftHum;
  _craftHum = null;

  try{
    const a = ref.a;
    const n = a.currentTime;
    ref.v.gain.setTargetAtTime(0.0001, n, 0.35);
    ref.v2.gain.setTargetAtTime(0.0001, n, 0.35);
    setTimeout(()=>{
      try{ ref.o.stop(); }catch(e){}
      try{ ref.o2.stop(); }catch(e){}
      try{ ref.o3.stop(); }catch(e){}
      try{ ref.lfo.stop(); }catch(e){}
      try{ ref.o.disconnect(); }catch(e){}
      try{ ref.o2.disconnect(); }catch(e){}
      try{ ref.o3.disconnect(); }catch(e){}
      try{ ref.lp.disconnect(); }catch(e){}
      try{ ref.v.disconnect(); }catch(e){}
      try{ ref.v2.disconnect(); }catch(e){}
      try{ ref.lfo.disconnect(); }catch(e){}
      try{ ref.lfoG.disconnect(); }catch(e){}
    }, 650);
  }catch(e){}
}

function updateAmbientCraftHum(){
  // Subtle pitch drift tied to altitude, so it feels "present" without being distracting.
  if(!_craftHum || !_ambCtx || !camera) return;
  const a = _ambCtx;
  const y = camera.position.y || 0;
  const base = 82;
  const freq = Math.max(55, Math.min(140, base + y * 0.012)); // clamp
  try{
    _craftHum.o.frequency.setTargetAtTime(freq, a.currentTime, 0.25);
    _craftHum.o2.frequency.setTargetAtTime(freq * 1.55 + 6, a.currentTime, 0.25);
  }catch(e){}
}

/* =========================
   Crash sound (folder-safe)
   - Loads crash.mp3 from the PICKED folder (object URL)
   - Plays once per impact, with a small cooldown
   ========================= */
let crashSound = null;
let crashCooldown = 0;
const CRASH_COOLDOWN_SEC = 0.25;

function initCrashSoundFromFolder(){
  const f = findExact("crash.mp3");
  if(!f){
    console.warn("crash.mp3 not found in picked folder");
    return;
  }
  if(crashSound) return;

  crashSound = new Audio(f.url);
  crashSound.loop = false;
  crashSound.volume = 0.45;
}

function playCrashSound(){
  if(!crashSound) initCrashSoundFromFolder();
  if(!crashSound) return;

  // Don't spam while scraping
  if(crashCooldown > 0) return;
  crashCooldown = CRASH_COOLDOWN_SEC;

  try{
    crashSound.currentTime = 0;
    crashSound.play().catch(()=>{});
  }catch(e){}
}

/* =========================

let growlSound = null;

function initGrowlSoundFromFolder(){

    return;

  if(growlSound) return;

  if(!growlSound) initGrowlSoundFromFolder();
  if(!growlSound) return;
  try{

    const s = growlSound.cloneNode();
    s.volume = growlSound.volume;
    s.play().catch(()=>{});
  }catch(e){}
}

/* =========================
   Start gate (silent)
   - No start.mp3 dependency
   - Mission auto-starts after delay
   ========================= */
let startSound = null;
let waitingForStartKey = false;
let ipadControlsOn = false;
let preloadingAssets = true;
let hudLoadWrapEl = null;
let hudLoadFillEl = null;
let hudLoadTextEl = null;
let startGateTimer = null;
const START_BRIEFING_TEXT =
  "ALEINS HAVE INVADED EARTH. YOUR JOB COMMANDER IS TO DESTROY THEM.\n" +
  "USE ARROW KEYS FOR FLIGHT CONTROLS.\n" +
  "USE R KEY AND F KEY TO RAISE AND LOWER COPTER.\n" +
  "USE SPACE BAR TO SHOOT.\n" +
  "MISSION STARTS IN 8 SECONDS.\n" +
  "GOOD LUCK SOLDIER!";

function ensureLoadingOverlay(){
  if(hudLoadWrapEl && hudLoadFillEl && hudLoadTextEl) return;
  hudLoadWrapEl = document.getElementById("hudLoadWrap");
  hudLoadFillEl = document.getElementById("hudLoadFill");
  hudLoadTextEl = document.getElementById("hudLoadText");
}

function showLoadingOverlay(msg="Loading..."){
  ensureLoadingOverlay();
  if(hudLoadTextEl) hudLoadTextEl.textContent = msg;
  if(hudLoadFillEl) hudLoadFillEl.style.width = "4%";
  if(hudLoadWrapEl) hudLoadWrapEl.style.display = "";
}

function setLoadingProgress(pct, msg){
  ensureLoadingOverlay();
  const p = Math.max(0, Math.min(100, Number(pct) || 0));
  if(hudLoadFillEl) hudLoadFillEl.style.width = p + "%";
  if(msg && hudLoadTextEl) hudLoadTextEl.textContent = msg;
}

function hideLoadingOverlay(){
  if(!hudLoadWrapEl) ensureLoadingOverlay();
  if(!hudLoadWrapEl) return;
  hudLoadWrapEl.style.display = "none";
}

function initStartSoundFromFolder(){ return; }

function playStartSound(){ return; }

function stopStartSound(){ return; }

function showStartBriefing(){
  hideLoadingOverlay();
  let el = document.getElementById("pauseBriefing");
  if(!el){
    el = document.createElement("div");
    el.id = "pauseBriefing";
    document.body.appendChild(el);
  }
  el.innerHTML = START_BRIEFING_TEXT.split("\n").join("<br>");
  el.style.display = "block";
}

function hideStartBriefing(){
  const el = document.getElementById("pauseBriefing");
  if(!el) return;
  el.style.display = "none";
}

function setIpadControlsVisible(on){
  const panel = document.getElementById("ipadControls");
  if(!panel) return;
  panel.style.display = on ? "flex" : "none";
  if(!on){
    keyDown["ArrowUp"] = false;
    keyDown["ArrowDown"] = false;
    keyDown["ArrowLeft"] = false;
    keyDown["ArrowRight"] = false;
    keyDown["KeyR"] = false;
    keyDown["KeyF"] = false;
    const knob = document.getElementById("ipadStickKnob");
    if(knob) knob.style.transform = "translate(-50%, -50%)";
  }
  ipadControlsOn = !!on;
}

function bindIpadControl(btnId, keyCode){
  const btn = document.getElementById(btnId);
  if(!btn) return;
  const press = (ev)=>{
    ev.preventDefault();

  const release = (ev)=>{

  };
  btn.addEventListener("pointerdown", press, { passive:false });
  btn.addEventListener("pointerup", release, { passive:false });

function initIpadThumbstick(){
  const stick = document.getElementById("ipadStick");
  const knob = document.getElementById("ipadStickKnob");
  if(!stick || !knob) return;

  let activePointerId = null;
  const DEAD_ZONE = 0.25;

  const applyStick = (ev)=>{
    const rect = stick.getBoundingClientRect();
    const cx = rect.left + rect.width * 0.5;
    const cy = rect.top + rect.height * 0.5;
    const maxR = Math.max(16, Math.min(rect.width, rect.height) * 0.34);

    let dx = ev.clientX - cx;
    let dy = ev.clientY - cy;
    const d = Math.hypot(dx, dy);
    if(d > maxR){
      const s = maxR / d;
      dx *= s;
      dy *= s;
    }

    const nx = dx / maxR;
    const ny = dy / maxR;
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

    keyDown["ArrowLeft"] = nx < -DEAD_ZONE;
    keyDown["ArrowRight"] = nx > DEAD_ZONE;
    keyDown["ArrowUp"] = ny < -DEAD_ZONE;
    keyDown["ArrowDown"] = ny > DEAD_ZONE;
  };

  const releaseStick = ()=>{
    activePointerId = null;
    knob.style.transform = "translate(-50%, -50%)";
    keyDown["ArrowLeft"] = false;
    keyDown["ArrowRight"] = false;
    keyDown["ArrowUp"] = false;
    keyDown["ArrowDown"] = false;
  };

  stick.addEventListener("pointerdown", (ev)=>{
    ev.preventDefault();
    ev.stopPropagation();
    activePointerId = ev.pointerId;
    try{ stick.setPointerCapture(ev.pointerId); }catch(e){}
    applyStick(ev);
  }, { passive:false });

  stick.addEventListener("pointermove", (ev)=>{
    if(activePointerId !== ev.pointerId) return;
    ev.preventDefault();
    applyStick(ev);
  }, { passive:false });

  stick.addEventListener("pointerup", (ev)=>{
    if(activePointerId !== ev.pointerId) return;
    ev.preventDefault();
    releaseStick();
  }, { passive:false });

  stick.addEventListener("pointercancel", (ev)=>{
    if(activePointerId !== ev.pointerId) return;
    ev.preventDefault();
    releaseStick();
  }, { passive:false });
}

function updateCopterSprite(dt){
  if(!copterSpriteReady || !copterSpriteEl) return;

  // Turning: ArrowLeft bank left, ArrowRight bank right
  const turn = (keyDown["ArrowLeft"] ? -1 : 0) + (keyDown["ArrowRight"] ? 1 : 0);
  const fwd  = (keyDown["ArrowUp"]   ?  1 : 0) + (keyDown["ArrowDown"] ? -1 : 0);
  const climb = (keyDown["KeyR"] ? 1 : 0) + (keyDown["KeyF"] ? -1 : 0);

  // Smooth bank + bob
  const BANK_SMOOTH = 8.0;
  const BOB_SMOOTH  = 8.0;
  _copterBank += (turn - _copterBank) * Math.min(1, BANK_SMOOTH * dt);
  _copterBob  += (fwd  - _copterBob ) * Math.min(1, BOB_SMOOTH  * dt);

  const bankDeg = _copterBank * COPTER_UI.TURN_TILT_DEG;
  const bobPx   = _copterBob  * COPTER_UI.MOVE_BOB_PX;
  const climbPx = climb * 7; // tiny vertical nudge while R/F

  copterSpriteEl.style.transform =
    `translate(-50%, -50%) translate(0px, ${bobPx - climbPx}px) rotate(${bankDeg}deg)`;
}

/* =========================

const SKY_TOP    = 0x2c5aa8;
const SKY_BOTTOM = 0xcfe8ff;

const SUN_INTENSITY  = 2.95;
const HEMI_INTENSITY = 0.42;
const EXPOSURE       = 2.25;

const FOG_COLOR  = 0x8fb6ff;
const FOG_NEAR   = 1400;
const FOG_FAR    = 14000;

const DAY_SUN_POS = { x: 250, y: 420, z: 180 };
/* =========================
   Day/Night cycle
   =========================
   - Smoothly fades sky + fog + lights over time.
   - Period is full cycle (day->night->day).
*/
const DAYNIGHT = {
  ENABLE: true,
  PERIOD_SEC: 144,          // 20% longer full cycle
  // Light/exposure ranges
  SUN_INT_DAY:  SUN_INTENSITY,
  SUN_INT_NIGHT: 0.05,
  HEMI_INT_DAY: HEMI_INTENSITY,
  HEMI_INT_NIGHT: 0.08,
  EXPOSURE_DAY: EXPOSURE,
  EXPOSURE_NIGHT: 0.65,

  // Sky colors
  SKY_TOP_DAY:    SKY_TOP,
  SKY_BOTTOM_DAY: SKY_BOTTOM,
  SKY_TOP_NIGHT:  0x050814,
  SKY_BOTTOM_NIGHT: 0x111a2f,

  // Fog colors (density stays same; we just tint)
  FOG_DAY:   FOG_COLOR,
  FOG_NIGHT: 0x0a1020,

  // Sun path (simple orbit)
  SUN_ORBIT_RADIUS: 1040,
  SUN_ORBIT_HEIGHT: 520,
  SUN_ORBIT_Y_OFFSET: 40
};

const NIGHT_LANDING_RULE = {
  ENABLE: true,
  REQUIRED_REL_HOURS: 2,     // in-game hours out of a 24h cycle
  PENALTY_PCT: 20,
  NIGHT_THRESHOLD: 0.25,     // matches gameplay "night" threshold
  LAND_EPS: 18               // tolerance above terrain collision floor
};

const _dayColorA = new THREE.Color();
const _dayColorB = new THREE.Color();
function _lerp(a,b,t){ return a + (b-a)*t; }
function _clamp01(t){ return Math.max(0, Math.min(1, t)); }
function _smooth01(t){ t=_clamp01(t); return t*t*(3-2*t); } // smoothstep

let _daynightTime = (DAYNIGHT.PERIOD_SEC || 120) * 0.5;
let _daylightFactor = 1;
let _nightLanding = { active:false, landedSec:0, succeeded:false, prompted:false, announcedRefueled:false };

function requiredNightLandingSec(){
  return Math.max(0, (DAYNIGHT.PERIOD_SEC || 0) * (NIGHT_LANDING_RULE.REQUIRED_REL_HOURS / 24));
}

function resetNightLandingRule(){
  _nightLanding.active = false;
  _nightLanding.landedSec = 0;
  _nightLanding.succeeded = false;
  _nightLanding.prompted = false;
  _nightLanding.announcedRefueled = false;
}

function resetDayNightToDay(){
  _daynightTime = (DAYNIGHT.PERIOD_SEC || 120) * 0.5;
  _daylightFactor = 1;
}

function copterIsLandedOnTerrain(){
  if(!terrain || !camera) return false;
  const floor = heightAt(camera.position.x, camera.position.z) + COLLISION_CLEARANCE;
  if(!Number.isFinite(floor)) return false;
  return camera.position.y <= (floor + NIGHT_LANDING_RULE.LAND_EPS);
}

function updateNightLandingRule(dt){
  if(!NIGHT_LANDING_RULE.ENABLE || !DAYNIGHT.ENABLE || !terrain) return;
  const isNight = _daylightFactor < NIGHT_LANDING_RULE.NIGHT_THRESHOLD;
  const needSec = requiredNightLandingSec();

  if(isNight && !_nightLanding.active){
    _nightLanding.active = true;
    _nightLanding.landedSec = 0;
    _nightLanding.succeeded = false;
    _nightLanding.prompted = false;
    _nightLanding.announcedRefueled = false;
  }

  if(isNight && _nightLanding.active){
    if(!_nightLanding.prompted){
      setStatus("you must land to refuel");
      flashMsg("you must land to refuel", 5);
      _nightLanding.prompted = true;
    }
    if(copterIsLandedOnTerrain()){
      _nightLanding.landedSec += dt;
      if(!_nightLanding.succeeded && _nightLanding.landedSec >= needSec){
        _nightLanding.succeeded = true;
        if(!_nightLanding.announcedRefueled){
          setStatus("you are refueled");
          flashMsg("you are refueled", 5);
          _nightLanding.announcedRefueled = true;
        }
      }
    }
  }

  if(!isNight && _nightLanding.active){
    if(!_nightLanding.succeeded){
      damagePlayer(NIGHT_LANDING_RULE.PENALTY_PCT);
      setStatus(`Night landing missed: -${NIGHT_LANDING_RULE.PENALTY_PCT}% health.`);
    }
    _nightLanding.active = false;
    _nightLanding.landedSec = 0;
    _nightLanding.succeeded = false;
    _nightLanding.prompted = false;
    _nightLanding.announcedRefueled = false;
  }
}

function updateRefuelHUD(){

}

const STAR_FIELD = {
  COUNT: 5400,
  RADIUS: 14000,
  SIZE: 28
};
let starPoints = null;

function initStarField(){
  if(starPoints) return;
  const positions = new Float32Array(STAR_FIELD.COUNT * 3);
  for(let i=0; i<STAR_FIELD.COUNT; i++){
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const radius = STAR_FIELD.RADIUS * (0.7 + Math.random() * 0.3);
    const sinPhi = Math.sin(phi);
    positions[i*3 + 0] = Math.cos(theta) * sinPhi * radius;
    positions[i*3 + 1] = Math.cos(phi) * radius;
    positions[i*3 + 2] = Math.sin(theta) * sinPhi * radius;
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: STAR_FIELD.SIZE,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  starPoints = new THREE.Points(geom, mat);
  starPoints.frustumCulled = false;
  scene.add(starPoints);
}

function updateStarFieldVisibility(){
  if(!starPoints) return;
  const nightAlpha = Math.max(0, 1 - _daylightFactor);
  const opacity = Math.min(0.9, nightAlpha * 1.2);
  starPoints.material.opacity = opacity;
  starPoints.visible = opacity > 0.01;
  starPoints.material.needsUpdate = true;
}

function updateDayNight(dt){
  if(!DAYNIGHT.ENABLE) return;
  initStarField();
  _daynightTime += dt;

  const w = (Math.PI * 2) / Math.max(1e-6, DAYNIGHT.PERIOD_SEC);
  const phase = _daynightTime * w;

  // 0 at night, 1 at day (smooth)
  let f = 0.5 + 0.5 * Math.sin(phase - Math.PI/2);
  f = _smooth01(f);
  _daylightFactor = f;

  // Lights + exposure
  if(sun){
    sun.intensity = _lerp(DAYNIGHT.SUN_INT_NIGHT, DAYNIGHT.SUN_INT_DAY, f);

    // Orbit the sun around the scene center (0,0,0) for a simple day arc
    const x = Math.cos(phase) * DAYNIGHT.SUN_ORBIT_RADIUS;
    const z = Math.sin(phase) * DAYNIGHT.SUN_ORBIT_RADIUS;
    const y = Math.max(-80, Math.sin(phase) * DAYNIGHT.SUN_ORBIT_HEIGHT + DAYNIGHT.SUN_ORBIT_Y_OFFSET);
    sun.position.set(x, y, z);
  }
  if(typeof hemi !== "undefined" && hemi){
    hemi.intensity = _lerp(DAYNIGHT.HEMI_INT_NIGHT, DAYNIGHT.HEMI_INT_DAY, f);
  }
  renderer.toneMappingExposure = _lerp(DAYNIGHT.EXPOSURE_NIGHT, DAYNIGHT.EXPOSURE_DAY, f);

  // Sky gradient
  if(skyMat && skyMat.uniforms){
    _dayColorA.setHex(DAYNIGHT.SKY_TOP_NIGHT).lerp(_dayColorB.setHex(DAYNIGHT.SKY_TOP_DAY), f);
    skyMat.uniforms.topColor.value.copy(_dayColorA);

    _dayColorA.setHex(DAYNIGHT.SKY_BOTTOM_NIGHT).lerp(_dayColorB.setHex(DAYNIGHT.SKY_BOTTOM_DAY), f);
    skyMat.uniforms.bottomColor.value.copy(_dayColorA);
    skyMat.uniforms.topColor.needsUpdate = true;
    skyMat.uniforms.bottomColor.needsUpdate = true;
  }

  // Fog tint
  if(scene.fog){
    _dayColorA.setHex(DAYNIGHT.FOG_NIGHT).lerp(_dayColorB.setHex(DAYNIGHT.FOG_DAY), f);
    scene.fog.color.copy(_dayColorA);
  }

  updateStarFieldVisibility();
}

function playHealthBeep(delta){
  if(!delta) return;
  const nowMs = performance.now();
  if(nowMs - _lastHealthBeepAt < 40) return;
  _lastHealthBeepAt = nowMs;

  _ensureAmbCtx();
  if(!_ambCtx) return;
  try{ _ambCtx.resume(); }catch(e){}

  const a = _ambCtx;
  const n = a.currentTime;
  if(!_healthBeepBus){
    _healthBeepBus = a.createGain();
    _healthBeepBus.gain.setValueAtTime(0.95, n);
    _healthBeepBus.connect(a.destination);
  }

  const isUp = delta > 0;
  const oscA = a.createOscillator();
  const oscB = a.createOscillator();
  const g = a.createGain();
  const f0 = isUp ? 880 : 420;
  const f1 = isUp ? 1580 : 260;

  oscA.type = isUp ? "square" : "sawtooth";
  oscB.type = "triangle";
  oscA.frequency.setValueAtTime(f0, n);
  oscA.frequency.exponentialRampToValueAtTime(f1, n + 0.11);
  oscB.frequency.setValueAtTime(isUp ? f0 * 1.5 : f0 * 0.5, n);
  oscB.frequency.exponentialRampToValueAtTime(isUp ? f1 * 1.3 : f1 * 0.7, n + 0.11);

  g.gain.setValueAtTime(0.0001, n);
  g.gain.exponentialRampToValueAtTime(0.34, n + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, n + 0.18);

  oscA.connect(g);
  oscB.connect(g);
  g.connect(_healthBeepBus);
  oscA.start(n);
  oscB.start(n);
  oscA.stop(n + 0.19);
  oscB.stop(n + 0.19);

  setTimeout(()=>{
    try{ oscA.disconnect(); }catch(e){}
    try{ oscB.disconnect(); }catch(e){}
    try{ g.disconnect(); }catch(e){}
  }, 180);
}

function setHealth(pct){
  const prev = playerHealth;
  playerHealth = Math.max(0, Math.min(100, Number(pct) || 0));
  if(healthPctEl) healthPctEl.textContent = Math.round(playerHealth) + "%";
  if(healthBarEl) healthBarEl.style.width = playerHealth.toFixed(2) + "%";
  if(healthHUD) healthHUD.style.display = "";
  if(_healthInitDone && playerHealth !== prev){
    playHealthBeep(playerHealth - prev);
  }
  _healthInitDone = true;
  if(playerHealth <= 0 && !playerDead){
    playerDead = true;
    try{ stopCopterSound(); }catch(e){}
    try{ showGameOver(); }catch(e){}
  }
}

function shootAlienBall(attacker){
  if(!ALIEN_ATTACK.ENABLE || !attacker || !_alienBallGeo || !_alienBallMat) return;

  const origin = attacker.group.position.clone();
  origin.y += ALIENS.BLOCK_H * 0.9 + ALIENS.PLANE_H * 0.55;

  const toCopter = camera.position.clone().sub(origin);
  if(toCopter.lengthSq() < 1e-8) return;
  const dir = toCopter.normalize();

  if(!_alienShootGrowlPlayedByAlien.has(attacker)){
    playGrowlSound();
    _alienShootGrowlPlayedByAlien.add(attacker);
  }

  const mesh = new THREE.Mesh(_alienBallGeo, _alienBallMat);
  mesh.castShadow = false;
  mesh.receiveShadow = false;
  mesh.position.copy(origin);
  scene.add(mesh);

  alienBalls.push({

    vel: dir.multiplyScalar(ALIEN_ATTACK.SPEED),
    life: ALIEN_ATTACK.LIFE_SEC

function shootFireball(){
  if(playerDead) return;
  if(!FIRE.ENABLE || !terrain) return;
  if(_fireCooldown > 0) return;

  copterAmmo = Math.max(0, copterAmmo - 1);

    setStatus("Missiles depleted. Land on the glowing ammo pad to reload 50.");
  }

  playMissleSound();
  initFireballAssets();

  camera.getWorldDirection(dir).normalize();

  const mesh = new THREE.Mesh(_fireballGeo, _fireballMat);

  mesh.receiveShadow = false;

    prev: mesh.position.clone(),
    vel: dir.multiplyScalar(FIRE.SPEED),
    life: FIRE.LIFE_SEC,

function copterCollidesWithAmo(){
  if(!amoSprite || !camera || typeof amoSprite.baseY !== "number") return false;
  const m = amoSprite.mesh.position;
  const dx = camera.position.x - m.x;
  const dz = camera.position.z - m.z;
  const horiz = Math.hypot(dx, dz);
  const dy = Math.abs(camera.position.y - amoSprite.baseY);
  return horiz <= COPTER_AMMO.RELOAD_RADIUS && dy <= COPTER_AMMO.RELOAD_VERTICAL;
}

function attemptAmoReload(){
  if(copterAmmo >= COPTER_AMMO.MAX) return;
  if(!copterCollidesWithAmo()) return;
  copterAmmo = COPTER_AMMO.MAX;

  setStatus("Reloaded 50 missiles!");
}

function updateFireballs(dt){
  if(_fireCooldown > 0) _fireCooldown = Math.max(0, _fireCooldown - dt);

  if(!fireballs.length) return;
  for(let i=fireballs.length-1; i>=0; i--){
    const b = fireballs[i];
    b.life -= dt;
    if(b.life <= 0){
      scene.remove(b.mesh);
      fireballs.splice(i,1);
      continue;
    }
    // remember previous position for swept collision (prevents "tunneling" on slower frame rates)

    if(b.prev) b.prev.copy(b.mesh.position); else b.prev = b.mesh.position.clone();

    b.mesh.position.x += b.vel.x * dt;

    b.mesh.position.y += b.vel.y * dt;

    b.mesh.position.z += b.vel.z * dt;

    // --- Fireball -> Aliens collision (multiple) ---
    // IMPORTANT: alien "group" origin is at the anchor block center (near the ground),
    // but the visible alien plane sits higher. Use the plane's WORLD position as the hit center.
    if (aliensReady && aliens.length){
      // reuse one temp vector to avoid allocations every frame
      if(!updateFireballs._tmpAlienCenter) updateFireballs._tmpAlienCenter = new THREE.Vector3();
      const c = updateFireballs._tmpAlienCenter;

      for(let ai = aliens.length-1; ai >= 0; ai--){
        const a = aliens[ai];
        if(!a || !a.plane) continue;

        a.plane.getWorldPosition(c);

        const dx = b.mesh.position.x - c.x;
        const dy = b.mesh.position.y - c.y;
        const dz = b.mesh.position.z - c.z;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

        // Make hits easier: base radius + a bit of sprite-size awareness.
        // (ALIEN_HIT_RADIUS is your main tweak knob.)
        const hitR = (FIRE_COLLISION_RADIUS + ALIEN_HIT_RADIUS);

        if (dist < hitR) {
          playBoomSound();
          removeAlienAt(ai);
          scene.remove(b.mesh);
          fireballs.splice(i, 1);
          ai = -1;
          break;
        }
      }
    }

    // --- Fireball -> Rovers (fight.png) collision ---
    // Locked until UFO objective is complete.
    if (ROVERS.ENABLE && _missionFlags.ufoDone && rovers.length){
      let hitRover = false;

      // temp vars to avoid allocations
      const segA = b.prev || b.mesh.position;   // start of this frame
      const segB = b.mesh.position;            // end of this frame

      for(let ri = rovers.length-1; ri >= 0; ri--){
        const r = rovers[ri];
        if(!r || !r.mesh || r.dead) continue;

        const cx = r.mesh.position.x;
        const cy = r.mesh.position.y;
        const cz = r.mesh.position.z;

        // Closest point on segment A->B to the rover center (prevents tunneling)
        const vx = segB.x - segA.x;
        const vy = segB.y - segA.y;
        const vz = segB.z - segA.z;

        const wx = cx - segA.x;
        const wy = cy - segA.y;
        const wz = cz - segA.z;

        const vv = (vx*vx + vy*vy + vz*vz) || 1e-9;
        let t = (wx*vx + wy*vy + wz*vz) / vv;
        if(t < 0) t = 0; else if(t > 1) t = 1;

        const px = segA.x + vx*t;
        const py = segA.y + vy*t;
        const pz = segA.z + vz*t;

        const dx = px - cx;
        const dy = py - cy;
        const dz = pz - cz;

        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

        // Big, forgiving hit radius (fight.png is huge compared to the ball)
        const hitRR = FIRE_COLLISION_RADIUS + (ROVERS.HIT_RADIUS ?? 650);

        if(dist < hitRR){
          playBoomSound();
          r.hp = Math.max(0, (r.hp|0) - 1);
          r.hitFlash = 0.14;

          // remove the fireball on hit
          scene.remove(b.mesh);
          fireballs.splice(i,1);

          if(r.hp <= 0){
            killRoverAt(ri);
            setStatus(`fight #${r.id} destroyed! (respawns soon)`);
          } else {
            setStatus(`fight #${r.id} hit! ${r.hp} more hits…`);
          }

          hitRover = true;
          break;
        }
      }

      if(hitRover) continue; // fireball already removed, skip the rest of this tick
    }

    // --- Fireball -> bad_guy.png collision (final boss) ---
    if (_missionFlags.ufoDone && _missionFlags.roversDone && !_missionFlags.badGuyDone && badGuy && badGuy.mesh){
      const segA = b.prev || b.mesh.position;   // start of this frame
      const segB = b.mesh.position;             // end of this frame

      const cx = badGuy.mesh.position.x;
      const cy = badGuy.mesh.position.y;
      const cz = badGuy.mesh.position.z;

      const vx = segB.x - segA.x;
      const vy = segB.y - segA.y;
      const vz = segB.z - segA.z;
      const wx = cx - segA.x;
      const wy = cy - segA.y;
      const wz = cz - segA.z;
      const vv = (vx*vx + vy*vy + vz*vz) || 1e-9;
      let t = (wx*vx + wy*vy + wz*vz) / vv;
      if(t < 0) t = 0; else if(t > 1) t = 1;

      const px = segA.x + vx*t;
      const py = segA.y + vy*t;
      const pz = segA.z + vz*t;
      const dx = px - cx;
      const dy = py - cy;
      const dz = pz - cz;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      const hitR = FIRE_COLLISION_RADIUS + BAD_GUY.HIT_RADIUS;

      if(dist < hitR){
        playBoomSound();
        badGuyHpRemaining = Math.max(0, (badGuyHpRemaining|0) - 1);
        badGuy.hp = badGuyHpRemaining;
        scene.remove(b.mesh);
        fireballs.splice(i,1);

        if(badGuyHpRemaining <= 0){
          removeBadGuy();
          _missionFlags.badGuyDone = 1;
          maybeCompleteAllObjectives();
        } else {
          setStatus(`Bad guy hit! ${badGuyHpRemaining} hits left...`);
        }
        continue;
      }
    }

    // --- Fireball -> Fireball roamers collision ---
    if (FIREBALL_SWARM.ENABLE && fireballRoamers.length){
      let hitSwarm = false;
      const segA = b.prev || b.mesh.position;   // start of this frame
      const segB = b.mesh.position;             // end of this frame

      for(let fi = fireballRoamers.length - 1; fi >= 0; fi--){
        const fr = fireballRoamers[fi];
        if(!fr || !fr.mesh) continue;

        const cx = fr.mesh.position.x;
        const cy = fr.mesh.position.y;
        const cz = fr.mesh.position.z;

        const vx = segB.x - segA.x;
        const vy = segB.y - segA.y;
        const vz = segB.z - segA.z;
        const wx = cx - segA.x;
        const wy = cy - segA.y;
        const wz = cz - segA.z;

        const vv = (vx*vx + vy*vy + vz*vz) || 1e-9;
        let t = (wx*vx + wy*vy + wz*vz) / vv;
        if(t < 0) t = 0; else if(t > 1) t = 1;

        const px = segA.x + vx*t;
        const py = segA.y + vy*t;
        const pz = segA.z + vz*t;

        const dx = px - cx;
        const dy = py - cy;
        const dz = pz - cz;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        const hitR = FIRE_COLLISION_RADIUS + (FIREBALL_SWARM.RADIUS * 0.95);

        if(dist < hitR){
          playBoomSound();
          fr.hp = Math.max(0, (fr.hp|0) - 1);
          scene.remove(b.mesh);
          fireballs.splice(i,1);

          if(fr.hp <= 0){
            const wasLastFireball = (_missionFlags.roversDone && fireballRoamers.length === 1);
            removeFireballRoamerAt(fi);
            if(!wasLastFireball){
              setStatus("Fireball destroyed!");
            }
          } else {
            setStatus(`Fireball hit! ${fr.hp} hits left...`);
          }

          hitSwarm = true;
          break;
        }
      }

      if(hitSwarm) continue; // player fireball already consumed
    }

    // --- Fireball -> UFO collision ---
    // Locked until all gray aliens are cleared.
    // Swept rectangular hit zone keeps registration forgiving across the full
    // mothership sprite.
    if (aliensCleared && ufoRoamer && ufoRoamer.mesh){
      const um = ufoRoamer.mesh;
      const segA = b.prev || b.mesh.position;   // start of this frame
      const segB = b.mesh.position;             // end of this frame

      const halfW = (UFO.PLANE_W || 2178) * 0.92;
      const halfH = (UFO.PLANE_H || 1584) * 0.92;
      const depth = 1400;
      const r = FIRE_COLLISION_RADIUS;

      let ufoHit = false;
      const steps = 12;
      for(let s=0; s<=steps; s++){
        const t = s / steps;
        const px = segA.x + (segB.x - segA.x) * t;
        const py = segA.y + (segB.y - segA.y) * t;
        const pz = segA.z + (segB.z - segA.z) * t;

        const lx = px - um.position.x;
        const ly = py - um.position.y;
        const lz = pz - um.position.z;

        if(
          Math.abs(lx) <= (halfW + r) &&
          Math.abs(ly) <= (halfH + r) &&
          Math.abs(lz) <= (depth + r)
        ){
          ufoHit = true;
          break;
        }
      }

      if(ufoHit){
        const hitPos = um.position.clone();
        scene.remove(b.mesh);
        fireballs.splice(i,1);
        registerUfoFireballHit(hitPos);
        continue;
      }
    }

    // Optional: delete if it goes way below terrain \(keeps list clean\)
    const ground = heightAt(b.mesh.position.x, b.mesh.position.z);
    if(b.mesh.position.y < ground - 200){
      scene.remove(b.mesh);
      fireballs.splice(i,1);
      continue;
    }
  }

function _ensureSkyFireballTexture(){
  if(_skyFireballTex) return _skyFireballTex;
  try{
    _skyFireballTex = texFromFolder("fireball.png");
  }catch(e){
    _skyFireballTex = null;
  }
  return _skyFireballTex;
}

function spawnSkyFireball(){
  if(!terrain) return;

  const tex = _ensureSkyFireballTexture();
  if(!tex) return;

  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sp  = new THREE.Sprite(mat);
  sp.scale.set(SKY_RAIN.SCALE, SKY_RAIN.SCALE, 1);

  const range = (HARDWIRED?.SIZE ?? 20000) * 0.48;
  const heightJitter = (Math.random() * 2 - 1) * SKY_RAIN.START_HEIGHT_SPREAD;
  const fallRandom = (Math.random() * 2 - 1) * SKY_RAIN.FALL_SPEED_VARIANCE;
  const startHeight = SKY_RAIN.START_HEIGHT + heightJitter;
  const fallSpeed = Math.abs(SKY_RAIN.FALL_SPEED) * (1 + fallRandom);

  sp.position.set(
    (Math.random() - 0.5) * range,
    Math.max(100, startHeight),
    (Math.random() - 0.5) * range
  );

  scene.add(sp);

  skyFireballs.push({
    mesh: sp,
    velY: -Math.abs(fallSpeed),
    life: SKY_RAIN.LIFE_SEC
  });
}

function spawnSkyFireballBatch(count){
  for(let i=0; i<count; i++){
    spawnSkyFireball();
  }
}

function clearSkyRain(){
  if(!skyFireballs.length) return;
  for(const f of skyFireballs){
    try{ scene.remove(f.mesh); }catch(e){}
  }
  skyFireballs.length = 0;
}

function updateSkyFireballs(dt){
  if(!SKY_RAIN.ENABLE) return;

  for(let i=skyFireballs.length-1; i>=0; i--){
    const f = skyFireballs[i];
    f.life -= dt;

    if(f.life <= 0){
      try{ scene.remove(f.mesh); }catch(e){}
      skyFireballs.splice(i,1);
      continue;
    }

    f.mesh.position.y += f.velY * dt;

    const ground = heightAt(f.mesh.position.x, f.mesh.position.z);

    // Impact
    if(f.mesh.position.y <= ground + 40){
      try{ playBoomSound(); }catch(e){}

      // quick impact flash
      try{
        const tex = _ensureSkyFireballTexture();
        if(tex){
          const boom = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent:true }));
          boom.scale.set(SKY_RAIN.IMPACT_BOOM_SCALE, SKY_RAIN.IMPACT_BOOM_SCALE, 1);
          boom.position.set(f.mesh.position.x, ground + 60, f.mesh.position.z);
          scene.add(boom);
          setTimeout(()=>{ try{ scene.remove(boom); }catch(e){} }, 900);
        }
      }catch(e){}

      try{ scene.remove(f.mesh); }catch(e){}
      skyFireballs.splice(i,1);
    }
  }
}

const _ballProj = new THREE.Vector3();
function blueBallHitsCopterSprite(worldPos){
  if(!copterSpriteReady || !copterSpriteEl || !renderer) return false;
  if(copterSpriteEl.style.display === "none") return false;

  _ballProj.copy(worldPos).project(camera);
  if(_ballProj.z < -1 || _ballProj.z > 1) return false;

  const canvasRect = renderer.domElement.getBoundingClientRect();
  const sx = canvasRect.left + ((_ballProj.x * 0.5) + 0.5) * canvasRect.width;
  const sy = canvasRect.top  + ((-_ballProj.y * 0.5) + 0.5) * canvasRect.height;

  const r = copterSpriteEl.getBoundingClientRect();
  const inset = ALIEN_ATTACK.SPRITE_HIT_INSET_PX;
  const left = r.left + (r.width * ALIEN_ATTACK.SPRITE_HIT_LEFT_FRAC) + inset;
  const right = r.left + (r.width * ALIEN_ATTACK.SPRITE_HIT_RIGHT_FRAC) - inset;
  const top = r.top + (r.height * ALIEN_ATTACK.SPRITE_HIT_TOP_FRAC) + inset;
  const bottom = r.top + (r.height * ALIEN_ATTACK.SPRITE_HIT_BOTTOM_FRAC) - inset;

  return (sx >= left && sx <= right && sy >= top && sy <= bottom);
}

function updateAlienBalls(dt){
  if(!alienBalls.length) return;
  for(let i=alienBalls.length-1; i>=0; i--){

    b.mesh.position.y += b.vel.y * dt;

      alienBalls.splice(i,1);
    }
  }
}

function applyArrowControls(dt){
  if(playerDead) return;
  if (!terrain) return;

  // --- Tank yaw: rotate the VIEW (target) around the CAMERA position (Y axis) ---
  let yaw = 0;
  if (keyDown["ArrowLeft"])  yaw -= TURN_SPEED * dt;
  if (keyDown["ArrowRight"]) yaw += TURN_SPEED * dt;

  const camPos = camera.position.clone();
  let toTarget = controls.target.clone().sub(camPos);

  // Apply yaw around world up
  if (yaw !== 0) {
    const c = Math.cos(yaw), s = Math.sin(yaw);
    const x = toTarget.x * c - toTarget.z * s;
    const z = toTarget.x * s + toTarget.z * c;
    toTarget.x = x; toTarget.z = z;
  }

  // Apply updated target (camera stays fixed; only gaze changes)
  controls.target.copy(camPos).add(toTarget);

  // --- Forward/back: move camera + target together along view direction (XZ only) ---
  let move = 0;
  if (keyDown["ArrowUp"])   move += MOVE_SPEED * dt;
  if (keyDown["ArrowDown"]) move -= MOVE_SPEED * dt;

  if (move !== 0) {
    const dir = controls.target.clone().sub(camera.position);
    dir.y = 0;
    if (dir.lengthSq() > 1e-8) dir.normalize();
    dir.multiplyScalar(move);
    camera.position.add(dir);
    controls.target.add(dir);
  }

  // --- Vertical move (R/F) ---
  let vmove = 0;
  if (keyDown["KeyR"]) vmove += MOVE_SPEED * dt;
  if (keyDown["KeyF"] || keyDown["KeyL"]) vmove -= MOVE_SPEED * dt; // L acts like F (descend)

  if (vmove !== 0) {
    camera.position.y += vmove;
    controls.target.y += vmove;
    if (typeof ANTI_SHIMMER_ON !== "undefined" && ANTI_SHIMMER_ON) antiShimmerTimer = 0.18;
  }

  // --- Terrain collision (always clamp to terrain; damage only during day) ---
  const isNightForTerrain = (_daylightFactor < NIGHT_LANDING_RULE.NIGHT_THRESHOLD);
  if (COLLIDE_TERRAIN){
    const groundY = heightAt(camera.position.x, camera.position.z);
    if(!Number.isFinite(groundY)){
      terrainColliding = false;
      if (yaw !== 0 || move !== 0 || vmove !== 0) controls.update();
      return;
    }
    const floor = groundY + COLLISION_CLEARANCE;
    if (camera.position.y < floor){
      // impact: play crash sound once when we first touch the terrain
      if(!terrainColliding){
        terrainColliding = true;

        if(!isNightForTerrain){
          // Daytime impact behavior.
          playCrashSound();
          try{ damagePlayer(5); }catch(e){}
        }
      }

      const delta = floor - camera.position.y;

      // Night refuel/landing must hard-stop at terrain so the copter never sinks below surface.
      if (isNightForTerrain){
        camera.position.y = floor;
        controls.target.y += delta;
      } else if (COLLISION_SMOOTH > 0){
        const k = Math.min(1, COLLISION_SMOOTH * 60 * dt);
        camera.position.y += delta * k;
        controls.target.y += delta * k;
      } else {
        camera.position.y = floor;
        controls.target.y += delta;
      }

      // If enabled, also trigger anti-shimmer briefly (same as vertical move)
      if (typeof ANTI_SHIMMER_ON !== "undefined" && ANTI_SHIMMER_ON) antiShimmerTimer = 0.18;
    } else {
      terrainColliding = false;
    }
  }

  if (yaw !== 0 || move !== 0 || vmove !== 0) controls.update();
}

const HEADLIGHT = {
  ENABLE: true,
  // Start ON so you always get night vision without remembering to click.
  START_ON: true,

  // Stronger + tighter beam so you can actually see the ground.
  INTENSITY: 2000.0,
  DISTANCE: 12000,
  ANGLE: Math.PI / 9,     // narrower cone = brighter spot
  PENUMBRA: 0.35,
  TARGET_DIST: 3200,
  OFFSET_Y: -12,

  // Debug helper (set false when you're happy)
  SHOW_HELPER: false
};

let headLight = null;
let headLightTarget = null;
let headLightHelper = null;
let headFill = null;
let headLightOn = false;

function initHeadlight(){
  if(!HEADLIGHT.ENABLE || headLight) return;
  headLight = new THREE.SpotLight(0xffffff, HEADLIGHT.INTENSITY, HEADLIGHT.DISTANCE, HEADLIGHT.ANGLE, HEADLIGHT.PENUMBRA, 1.0);
  headLight.castShadow = false;

  headLightTarget = new THREE.Object3D();
  scene.add(headLightTarget);
  headLight.target = headLightTarget;

  scene.add(headLight);

  // Subtle fill light near the camera to keep ground readable without washing out.
  headFill = new THREE.PointLight(0xffffff, 3.5, 2200);
  headFill.castShadow = false;
  scene.add(headFill);


  // Optional debug helper (draws the spotlight cone)
  if(HEADLIGHT.SHOW_HELPER){
    headLightHelper = new THREE.SpotLightHelper(headLight);
    scene.add(headLightHelper);
  }

  headLightOn = !!HEADLIGHT.START_ON;
  headLight.visible = headLightOn;
  if(ui.btnHeadlight) ui.btnHeadlight.textContent = "Headlight: " + (headLightOn ? "ON" : "OFF");
}

function setHeadlight(on){
  if(!headLight) initHeadlight();
  if(!headLight) return;
  headLightOn = !!on;
  headLight.visible = headLightOn;
  if(ui.btnHeadlight) ui.btnHeadlight.textContent = "Headlight: " + (headLightOn ? "ON" : "OFF");
  setStatus(headLightOn ? "Headlight ON" : "Headlight OFF");
}

function toggleHeadlight(){
  setHeadlight(!headLightOn);
}

function updateHeadlight(){
  if(!headLight) return;

  // When OFF, keep intensity at 0 and hide it
  if(!headLightOn){
    headLight.visible = false;
    headLight.intensity = 0;
    return;
  }

  headLight.visible = true;

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir).normalize();

  headLight.position.copy(camera.position);
  headLight.position.y += HEADLIGHT.OFFSET_Y;
  if(headFill) headFill.position.copy(camera.position);

  {
    const tgt = new THREE.Vector3().copy(camera.position).add(dir.multiplyScalar(HEADLIGHT.TARGET_DIST));
    // Snap the target down onto the terrain so the beam actually hits the ground.
    const groundY = heightAt(tgt.x, tgt.z);
    if (isFinite(groundY)) tgt.y = groundY + 18;
    headLightTarget.position.copy(tgt);
  }
// Make brighter at night (0..1 night factor)
  const night = Math.max(0, 1 - (_daylightFactor ?? 1));
  headLight.intensity = HEADLIGHT.INTENSITY * (0.8 + night * 2.2);

  if(headLightHelper) headLightHelper.update();
}

let folderFiles = [];
let urlsToRevoke = [];
const REPO_ASSET_MODE = (() => {
  return true;
})();
const REPO_ASSET_FOLDER_CANDIDATES = ["kopter-folder", "KOPTER%20FOLDER", "KOPTER FOLDER"];
let repoAssetFolderBase = REPO_ASSET_FOLDER_CANDIDATES[0];
function revokeAll(){
  for(const u of urlsToRevoke) try{ URL.revokeObjectURL(u); }catch(e){}
  urlsToRevoke = [];
}
function repoAssetUrl(name, base = repoAssetFolderBase){
  const file = encodeURIComponent(String(name || ""));
  return `${base}/${file}`;
}
async function detectRepoAssetFolder(){
  if(!REPO_ASSET_MODE) return;

  const probeName = FIX.HEIGHTMAP || "height_map.jpg";
  for(const base of REPO_ASSET_FOLDER_CANDIDATES){
    const probeUrl = repoAssetUrl(probeName, base);
    try{
      const head = await fetch(probeUrl, { method: "HEAD", cache: "no-store" });
      if(head && head.ok){
        repoAssetFolderBase = base;
        return;
      }
    }catch(e){}

    // Some hosts/CDNs block HEAD; GET fallback keeps iPad Safari compatible.
    try{
      const get = await fetch(probeUrl, { method: "GET", cache: "no-store" });
      if(get && get.ok){
        repoAssetFolderBase = base;
        return;
      }
    }catch(e){}
  }

  console.warn("No repo asset folder candidate resolved; using default:", repoAssetFolderBase);
}

function findExact(name){
  const wanted = String(name || "");
  const lower = wanted.toLowerCase();
  const local = folderFiles.find(f => (f.name||"").toLowerCase() === lower) || null;
  if(local) return local;
  if(REPO_ASSET_MODE && wanted){
    return { name: wanted, url: repoAssetUrl(wanted), type: "", size: 0 };
  }
  return null;
}

// Texture cache for folder-picked assets (object URLs)
const _folderTexCache = new Map();
function texFromFolder(filename){
  if(!filename) return null;
  const key = String(filename).toLowerCase();
  if(_folderTexCache.has(key)) return _folderTexCache.get(key);

  const f = findExact(filename);
  if(!f){
    console.warn("texFromFolder: missing", filename);
    _folderTexCache.set(key, null);
    return null;
  }
  const tex = new THREE.TextureLoader().load(f.url);
  // fireball.png is a color sprite, so treat as sRGB if available
  try{ tex.colorSpace = THREE.SRGBColorSpace; }catch(e){}
  tex.needsUpdate = true;
  _folderTexCache.set(key, tex);
  return tex;
}

  setLoadingProgress(10, "Preparing mission systems...");
  if(REPO_ASSET_MODE){
    const prettyFolder = decodeURIComponent(repoAssetFolderBase);
    setStatus(`Loading ${prettyFolder} from GitHub…`);

    setStatus(`Folder loaded: ${folderFiles.length} files. Building terrain…`);
  }

    initBoomSoundFromFolder();

async function preloadFromFileList(files){
  revokeAll();
  folderFiles = [];
  setStatus("Loading KOPTER folder…");
  for(const file of files){
    const url = URL.createObjectURL(file);
    urlsToRevoke.push(url);
    folderFiles.push({ name:file.name, url, type:file.type, size:file.size });
  }
  await finishFolderPreload();
}
async function preloadFromRepoFolder(){
  revokeAll();
  folderFiles = [];
  await detectRepoAssetFolder();

/* =========================
   Heightmap decode
   ========================= */
let hmW=0, hmH=0;
let hmRGBA=null;
let hm01=null;

async function loadImage(url){
  return await new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = (e)=>reject(e);
    img.src = url;
  });
}

function buildHeightCache(smoothLevel){
  const n = hmW*hmH;
  let a = new Float32Array(n);
  for(let i=0;i<n;i++) a[i] = hmRGBA[i*4]/255;

  const iters = Math.max(0, Math.min(3, smoothLevel|0));
  if(iters===0){ hm01=a; return; }

  let b = new Float32Array(n);
  for(let it=0; it<iters; it++){
    for(let y=0;y<hmH;y++){
      const y0=Math.max(0,y-1), y1=y, y2=Math.min(hmH-1,y+1);
      for(let x=0;x<hmW;x++){
        const x0=Math.max(0,x-1), x1=x, x2=Math.min(hmW-1,x+1);
        const v =
          a[y0*hmW + x0] + a[y0*hmW + x1] + a[y0*hmW + x2] +
          a[y1*hmW + x0] + a[y1*hmW + x1] + a[y1*hmW + x2] +
          a[y2*hmW + x0] + a[y2*hmW + x1] + a[y2*hmW + x2];
        b[y*hmW + x] = v/9.0;
      }
    }
    const t=a; a=b; b=t;
  }
  hm01=a;
}

/* =========================
   Height sampling (world x/z -> terrain height)
   ========================= */
function heightAt(worldX, worldZ){
  if(!hm01 || !terrain) return -1e9;

  // Convert world X/Z to terrain-local X/Z
  const lx = worldX - (terrain.position?.x || 0);
  const lz = worldZ - (terrain.position?.z || 0);

  // Effective terrain size after live scaling
  const sizeX = BASE_SIZE * (terrain.scale?.x || 1);
  const sizeZ = BASE_SIZE * (terrain.scale?.z || 1);

  // Map to 0..1 UV space (plane is centered at origin)
  let u = (lx / sizeX) + 0.5;
  let v = (-lz / sizeZ) + 0.5;

  // Clamp inside the heightmap
  u = Math.min(0.999999, Math.max(0, u));
  v = Math.min(0.999999, Math.max(0, v));

  const px = Math.floor(u * (hmW - 1));
  const py = Math.floor((1 - v) * (hmH - 1));

  const h01 = hm01[py * hmW + px] || 0;

  // Height in world units, respecting live Y scaling
  const yScale = (terrain.scale?.y || 1);
  const baseY  = (terrain.position?.y || 0);

  return baseY + (h01 * BASE_HEIGHT * yScale);
}

function terrainMaxHeight(){
  if(!terrain) return -1e9;
  const yScale = (terrain.scale?.y || 1);
  const baseY  = (terrain.position?.y || 0);
  return baseY + (BASE_HEIGHT * yScale);
}

function shootBadGuyBullet(){
  if(!badGuy || !badGuy.mesh || !_badGuyBulletGeo || !_badGuyBulletMat || !camera) return;
  const origin = badGuy.mesh.position.clone();
  const toCopter = camera.position.clone().sub(origin);
  if(toCopter.lengthSq() < 1e-8) return;
  const forward = toCopter.normalize();

  // Build an orthonormal basis around forward so we can emit a forward dome.
  const upRef = Math.abs(forward.y) > 0.9 ? new THREE.Vector3(1,0,0) : new THREE.Vector3(0,1,0);
  const u = new THREE.Vector3().crossVectors(forward, upRef).normalize();
  const v = new THREE.Vector3().crossVectors(forward, u).normalize();

  const count = Math.max(3, BAD_GUY.BULLET_RING_COUNT|0);
  const maxTheta = Math.PI * 0.5; // hemisphere in front of bad guy
  const minCos = Math.cos(maxTheta);
  const golden = 0.61803398875;
  for(let i=0; i<count; i++){
    // Quasi-even hemisphere sample: theta in [0, PI/2], phi in [0, 2PI]
    const t = (i + 0.5) / count;
    const phi = (i * golden % 1) * Math.PI * 2;
    const cosTheta = 1 - (1 - minCos) * t;
    const sinTheta = Math.sqrt(Math.max(0, 1 - cosTheta*cosTheta));
    const radial = u.clone().multiplyScalar(Math.cos(phi)).add(v.clone().multiplyScalar(Math.sin(phi)));
    const dir = forward.clone().multiplyScalar(cosTheta * BAD_GUY.BULLET_RING_FORWARD)
      .add(radial.multiplyScalar(sinTheta * BAD_GUY.BULLET_RING_RADIAL)).normalize();

    const mesh = new THREE.Mesh(_badGuyBulletGeo, _badGuyBulletMat);
    mesh.castShadow = false;
    mesh.receiveShadow = false;
    mesh.position.copy(origin);
    scene.add(mesh);

    badGuyBullets.push({
      mesh,
      vel: dir.multiplyScalar(BAD_GUY.BULLET_SPEED),
      life: BAD_GUY.BULLET_LIFE_SEC
    });
  }
}

function updateBadGuy(dt){
  if(playerDead) return;
  if(_missionFlags.badGuyDone || !BAD_GUY.ENABLE) return;
  if(!_missionFlags.ufoDone || !_missionFlags.roversDone) return;

  if(!badGuy){
    badGuyRespawnCooldownSec = Math.max(0, badGuyRespawnCooldownSec - dt);
    if(badGuyRespawnCooldownSec <= 0){
      spawnBadGuyFromFolder();
    }
    return;
  }
  if(!badGuy.mesh || !terrain || !hm01 || !camera){
    return;
  }

  badGuy.activeSec = Math.max(0, (badGuy.activeSec || 0) - dt);
  if(badGuy.activeSec <= 0){
    removeBadGuy();
    badGuyRespawnCooldownSec = BAD_GUY.RESPAWN_SEC;
    return;
  }

  const targetX = terrain.position?.x || 0;
  const targetZ = terrain.position?.z || 0;
  badGuy.bobPhase += dt * 2.3;
  const ground = heightAt(targetX, targetZ);
  const targetY = (Number.isFinite(ground) ? ground : 0) + BAD_GUY.GROUND_CLEARANCE + Math.sin(badGuy.bobPhase) * BAD_GUY.BOB;
  badGuy.mesh.position.set(targetX, targetY, targetZ);
  badGuy.mesh.lookAt(camera.position.x, badGuy.mesh.position.y, camera.position.z);

  badGuy.fireCooldownSec = Math.max(0, badGuy.fireCooldownSec - dt);
  if(badGuy.fireCooldownSec <= 0){
    shootBadGuyBullet();
    badGuy.fireCooldownSec = BAD_GUY.FIRE_INTERVAL_SEC;
  }
}

function updateBadGuyBullets(dt){
  if(playerDead) return;
  if(!badGuyBullets.length) return;
  const hitR = BAD_GUY.BULLET_RADIUS + 90;
  const hitR2 = hitR * hitR;
  for(let i=badGuyBullets.length-1; i>=0; i--){
    const b = badGuyBullets[i];
    b.life -= dt;
    if(b.life <= 0){
      try{ scene.remove(b.mesh); }catch(e){}
      badGuyBullets.splice(i,1);
      continue;
    }
    b.mesh.position.x += b.vel.x * dt;
    b.mesh.position.y += b.vel.y * dt;
    b.mesh.position.z += b.vel.z * dt;

    if(!playerDead && camera){
      const dx = camera.position.x - b.mesh.position.x;
      const dy = camera.position.y - b.mesh.position.y;
      const dz = camera.position.z - b.mesh.position.z;
      if((dx*dx + dy*dy + dz*dz) <= hitR2){
        badGuyHitsOnPlayer += 1;
        if(badGuyHitsOnPlayer >= BAD_GUY.PLAYER_HITS_TO_KILL){
          setHealth(0);
          setStatus("Bad guy wins (3 hits).");
        } else {
          const left = BAD_GUY.PLAYER_HITS_TO_KILL - badGuyHitsOnPlayer;
          setStatus(`Bad guy hit! ${left} hit(s) left.`);
        }
        try{ scene.remove(b.mesh); }catch(e){}
        badGuyBullets.splice(i,1);
        continue;
      }
    }

    const ground = heightAt(b.mesh.position.x, b.mesh.position.z);
    if(b.mesh.position.y < ground - 120){
      try{ scene.remove(b.mesh); }catch(e){}
      badGuyBullets.splice(i,1);
    }
  }
}

function spawnFireballRoamer(){
  if(!terrain || !hm01) return;
  if(fireballRoamers.length >= FIREBALL_SWARM.COUNT) return;
  ensureFireballRoamerAssets();
  if(!camera) return;

  if(!spawnFireballRoamer._tmpFwd) spawnFireballRoamer._tmpFwd = new THREE.Vector3();
  const fwd = spawnFireballRoamer._tmpFwd;
  camera.getWorldDirection(fwd).normalize();

  const spawnDist = FIREBALL_SWARM.RADIUS * 2 * FIREBALL_SWARM.SPAWN_AHEAD_DIAMETERS;
  const x = camera.position.x + fwd.x * spawnDist;
  const y = camera.position.y + fwd.y * spawnDist;
  const z = camera.position.z + fwd.z * spawnDist;

  const mesh = new THREE.Group();
  const core = new THREE.Mesh(fireballRoamerCoreGeo.clone(), fireballRoamerCoreMat.clone());
  const glow = new THREE.Mesh(fireballRoamerGlowGeo.clone(), fireballRoamerGlowMat.clone());
  const light = new THREE.PointLight(0xff6a1f, 2.6, FIREBALL_SWARM.RADIUS * 18, 2);

  core.castShadow = false;
  core.receiveShadow = false;
  glow.castShadow = false;
  glow.receiveShadow = false;
  core.renderOrder = 1100;
  glow.renderOrder = 1101;
  mesh.frustumCulled = false;
  core.frustumCulled = false;
  glow.frustumCulled = false;

  mesh.add(core);
  mesh.add(glow);
  mesh.add(light);
  mesh.position.set(x, y, z);
  const toCamX = camera.position.x - x;
  const toCamZ = camera.position.z - z;
  const toCamLen = Math.hypot(toCamX, toCamZ) || 1;
  const dir = { x: toCamX / toCamLen, z: toCamZ / toCamLen };
  mesh.rotation.y = Math.atan2(dir.x, dir.z);

  scene.add(mesh);

  fireballRoamers.push({
    mesh,
    core,
    glow,
    light,
    hp: Math.max(1, FIREBALL_SWARM.HP|0),
    dir,
    prevPos: new THREE.Vector3(x, y, z),
    bobPhase: _rand(0, Math.PI*2),
    pulsePhase: _rand(0, Math.PI*2),
    spinVel: _rand(0.8, 1.65),
    hitCooldown: 0,
    inContact: false,
    turnT: _rand(FIREBALL_SWARM.TURN_EVERY_SEC[0], FIREBALL_SWARM.TURN_EVERY_SEC[1])
  });
}

function spawnOneRover(){
  if(!roverTex || !terrain || !hm01) return;

  const half = (BASE_SIZE * (terrain?.scale?.x || 1)) * 0.5 * 0.92;

  // pick a random xz, avoid being too close to camera
  let x=0, z=0;
  for(let tries=0; tries<40; tries++){
    x = _rand(-half, half);
    z = _rand(-half, half);
    const dx = x - camera.position.x;
    const dz = z - camera.position.z;
    if(_len2(dx,dz) >= ROVERS.MIN_SPAWN_DIST*ROVERS.MIN_SPAWN_DIST) break;
  }

  const h0 = heightAt(x,z);
  const y = (Number.isFinite(h0) ? h0 : 0) + ROVERS.HOVER;

  const geo = new THREE.PlaneGeometry(ROVERS.PLANE_W, ROVERS.PLANE_H);
  const mat = new THREE.MeshStandardMaterial({
    map: roverTex,
    transparent: true,
    alphaTest: 0.05,
    roughness: 1.0,
    metalness: 0.0,
    side: THREE.DoubleSide,
    depthWrite: false
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = false;
  mesh.receiveShadow = false;

  mesh.position.set(x, y, z);
  // Keep it upright and visible from both sides.
  mesh.rotation.set(0, 0, 0);
  // Slightly boost draw priority so it doesn't get hidden by terrain depth.
  mesh.renderOrder = 5;

  // random direction on XZ
  const ang = _rand(0, Math.PI*2);
  const dir = { x: Math.cos(ang), z: Math.sin(ang) };
  mesh.rotation.y = Math.atan2(dir.x, dir.z);

  scene.add(mesh);

  rovers.push({
    mesh,
    id: (spawnOneRover._id = (spawnOneRover._id||0)+1),
    dir,
    hp: (ROVERS.HP|0),
    dead: false,
    deadT: 0,
    hitFlash: 0,
    turnT: _rand(ROVERS.TURN_EVERY_SEC[0], ROVERS.TURN_EVERY_SEC[1]),
    bobPhase: Math.random()*Math.PI*2
  });
}

function removeRoverAt(idx, respawn=true){
  const r = rovers[idx];
  if(!r) return;
  try{ scene.remove(r.mesh); }catch(e){}
  try{
    r.mesh?.geometry?.dispose?.();
    r.mesh?.material?.dispose?.();
  }catch(e){}
  rovers.splice(idx,1);
  // Keep population stable
  if(respawn) spawnOneRover();
}

// --- Rover lifecycle helpers (so "kills" are obvious) ---
function killRoverAt(idx){
  const r = rovers[idx];
  if(!r) return;
  removeRoverAt(idx, false);
  if(_missionFlags.ufoDone && !_missionFlags.roversDone && rovers.length === 0){
    _missionFlags.roversDone = 1;
    startBadGuyPhase();
  }
}

function respawnRoverInPlace(r){
  if(!r || !r.mesh || !terrain || !hm01) return;
  const half = (BASE_SIZE * (terrain?.scale?.x || 1)) * 0.5 * 0.92;
  // pick a new random spot away from start
  let x=0, z=0;
  for(let tries=0; tries<200; tries++){
    x = _rand(-half, half);
    z = _rand(-half, half);
    const dx = x - _START_CAM_POS.x;
    const dz = z - _START_CAM_POS.z;
    if(_len2(dx,dz) >= ROVERS.MIN_SPAWN_DIST*ROVERS.MIN_SPAWN_DIST) break;
  }
  const h0 = heightAt(x, z);
  const y = (Number.isFinite(h0) ? h0 : 0) + ROVERS.HOVER;

  r.mesh.position.set(x, y, z);
  // new random direction
  const ang = _rand(0, Math.PI*2);
  r.dir.x = Math.cos(ang);
  r.dir.z = Math.sin(ang);
  r.mesh.rotation.y = Math.atan2(r.dir.x, r.dir.z);

  r.hp = (ROVERS.HP|0);
  r.dead = false;
  r.deadT = 0;
  r.hitFlash = 0;
  try{ r.mesh.visible = true; }catch(e){}
}

function updateRovers(dt){
  if(!ROVERS.ENABLE) return;
  if(!rovers.length) return;
  if(!terrain || !hm01) return;

  // Terrain half-span in world units (keep rover safely inside this box)
  const half = (BASE_SIZE * (terrain?.scale?.x || 1)) * 0.5 * 0.95;
  const EDGE_PUSH = 1.0; // 1.0 = perfect bounce; >1 adds extra kick inward

  for(const r of rovers){
    if(!r || !r.mesh) continue;

    // If killed: keep it gone for a bit, then respawn in-place
    if(r.dead){
      r.deadT = (r.deadT || 0) - dt;
      if(r.deadT <= 0){
        respawnRoverInPlace(r);
      }
      continue;
    }

    // hit flash (make hits obvious)
    if(r.hitFlash > 0){
      r.hitFlash = Math.max(0, r.hitFlash - dt);
      try{
        if(r.mesh?.material){
          r.mesh.material.emissive?.setHex?.(0xff0000);
          r.mesh.material.emissiveIntensity = 1.0;
        }
      }catch(e){}
    } else {
      try{
        if(r.mesh?.material){
          r.mesh.material.emissiveIntensity = 0.0;
        }
      }catch(e){}
    }

    // random gentle steering
    r.turnT -= dt;
    if(r.turnT <= 0){
      const dAng = _rand(-ROVERS.TURN_MAX_RAD, ROVERS.TURN_MAX_RAD);
      const ang = Math.atan2(r.dir.z, r.dir.x) + dAng;
      r.dir.x = Math.cos(ang);
      r.dir.z = Math.sin(ang);
      r.turnT = _rand(ROVERS.TURN_EVERY_SEC[0], ROVERS.TURN_EVERY_SEC[1]);
    }

    // --- FLEE KOPTER BEHAVIOR ---
    if(camera){
      const dx = r.mesh.position.x - camera.position.x;
      const dz = r.mesh.position.z - camera.position.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      const FLEE_DIST = 3500;
      const FLEE_STRENGTH = 0.9;
      if(dist < FLEE_DIST && dist > 0.001){
        const nx = dx / dist;
        const nz = dz / dist;
        r.dir.x = r.dir.x*(1-FLEE_STRENGTH) + nx*FLEE_STRENGTH;
        r.dir.z = r.dir.z*(1-FLEE_STRENGTH) + nz*FLEE_STRENGTH;
      }
    }

    // move
    r.mesh.position.x += r.dir.x * ROVERS.SPEED * dt;
    r.mesh.position.z += r.dir.z * ROVERS.SPEED * dt;

    // HARD BOUNDARY: bounce off edges so rover never "disappears"
    if(r.mesh.position.x > half){
      r.mesh.position.x = half;
      r.dir.x = -Math.abs(r.dir.x) * EDGE_PUSH;
      r.turnT = Math.min(r.turnT, 0.25); // force a quick re-turn
    } else if(r.mesh.position.x < -half){
      r.mesh.position.x = -half;
      r.dir.x = Math.abs(r.dir.x) * EDGE_PUSH;
      r.turnT = Math.min(r.turnT, 0.25);
    }

    if(r.mesh.position.z > half){
      r.mesh.position.z = half;
      r.dir.z = -Math.abs(r.dir.z) * EDGE_PUSH;
      r.turnT = Math.min(r.turnT, 0.25);
    } else if(r.mesh.position.z < -half){
      r.mesh.position.z = -half;
      r.dir.z = Math.abs(r.dir.z) * EDGE_PUSH;
      r.turnT = Math.min(r.turnT, 0.25);
    }

    // stick to terrain (flying above terrain + gentle bob)
    const h = heightAt(r.mesh.position.x, r.mesh.position.z);
    const baseY = (Number.isFinite(h) ? h : 0) + ROVERS.HOVER;
    r.bobPhase = (r.bobPhase || 0) + dt * 1.6;
    r.mesh.position.y = baseY + Math.sin(r.bobPhase) * 35;

    // Face the camera so the sprite is always visible (billboard), keep upright.
    if (camera) r.mesh.lookAt(camera.position.x, r.mesh.position.y, camera.position.z);
  }
}

function updateFireballRoamers(dt){
  if(!FIREBALL_SWARM.ENABLE || fireballsDisabledAfterUfo){
    if(fireballRoamers.length) removeAllFireballRoamers();
    return;
  }
  const isNight = _daylightFactor < NIGHT_LANDING_RULE.NIGHT_THRESHOLD;
  if(isNight){
    if(fireballRoamers.length) removeAllFireballRoamers();
    return;
  }
  fireballAttackCooldownSec = Math.max(0, fireballAttackCooldownSec - dt);
  if(!fireballRoamers.length){
    if(fireballAttackCooldownSec <= 0){
      spawnFireballRoamer();
    }
    return;
  }
  if(!terrain || !hm01) return;

  for(const r of fireballRoamers){
    if(!r || !r.mesh) continue;
    r.hitCooldown = Math.max(0, (r.hitCooldown || 0) - dt);
    if(!r.prevPos) r.prevPos = r.mesh.position.clone();
    else r.prevPos.copy(r.mesh.position);

    if(camera){
      const tx = camera.position.x - r.mesh.position.x;
      const ty = camera.position.y - r.mesh.position.y;
      const tz = camera.position.z - r.mesh.position.z;
      const d = Math.hypot(tx, ty, tz) || 1e-6;
      const ux = tx / d, uy = ty / d, uz = tz / d;
      r.dir.x = ux;
      r.dir.z = uz;

      r.mesh.position.x += ux * FIREBALL_SWARM.SPEED * dt;
      r.mesh.position.y += uy * FIREBALL_SWARM.SPEED * dt;
      r.mesh.position.z += uz * FIREBALL_SWARM.SPEED * dt;
    }

    r.pulsePhase = (r.pulsePhase || 0) + dt * 4.0;
    r.mesh.rotation.y = Math.atan2(r.dir.x, r.dir.z);
    if(r.core) r.core.rotation.y += dt * (r.spinVel || 1.0);
    if(r.core){
      const pulse = 0.92 + Math.sin(r.pulsePhase) * 0.11;
      r.core.scale.setScalar(pulse);
    }
    if(r.glow){
      const glowPulse = 1.0 + Math.sin(r.pulsePhase + 1.6) * 0.08;
      r.glow.scale.setScalar(glowPulse);
    }
    if(r.light){
      r.light.intensity = 2.3 + (Math.sin(r.pulsePhase + 0.35) * 0.8 + 0.8);
    }

    if(!playerDead && camera){
      const ax = r.prevPos.x, ay = r.prevPos.y, az = r.prevPos.z;
      const bx = r.mesh.position.x, by = r.mesh.position.y, bz = r.mesh.position.z;
      const vx = bx - ax, vy = by - ay, vz = bz - az;
      const wx = camera.position.x - ax;
      const wy = camera.position.y - ay;
      const wz = camera.position.z - az;
      const vv = (vx*vx + vy*vy + vz*vz) || 1e-9;
      let t = (wx*vx + wy*vy + wz*vz) / vv;
      if(t < 0) t = 0; else if(t > 1) t = 1;
      const px = ax + vx*t;
      const py = ay + vy*t;
      const pz = az + vz*t;
      const dx = camera.position.x - px;
      const dy = camera.position.y - py;
      const dz = camera.position.z - pz;
      const hitR = FIREBALL_SWARM.CONTACT_RADIUS;
      const touching = ((dx*dx + dy*dy + dz*dz) <= (hitR * hitR));
      if(touching && !r.inContact && r.hitCooldown <= 0){
        damagePlayer(FIREBALL_SWARM.DAMAGE_PCT);
        setStatus("Fireball hit! -10% health");
        r.hitCooldown = FIREBALL_SWARM.DAMAGE_COOLDOWN_SEC;
        removeFireballRoamerAt(fireballRoamers.indexOf(r), true);
        continue;
      } else if(!touching){
        r.inContact = false;
      }
    }
  }
}

function findDarkestWorldXZ(){
  if(!hm01 || !terrain || hm01.length === 0) return null;
  let minVal = Infinity;
  let minIdx = 0;
  for(let i=0;i<hm01.length;i++){
    const v = hm01[i];
    if(v < minVal){
      minVal = v;
      minIdx = i;
    }
  }
  if(!hmW || !hmH) return null;
  const px = minIdx % hmW;
  const py = Math.floor(minIdx / hmW);
  const sizeX = BASE_SIZE * (terrain.scale?.x || 1);
  const sizeZ = BASE_SIZE * (terrain.scale?.z || 1);
  const u = px / Math.max(1, hmW - 1);
  const v = 1 - (py / Math.max(1, hmH - 1));
  const lx = (u - 0.5) * sizeX;
  const lz = (0.5 - v) * sizeZ;
  return {
    x: lx + (terrain.position?.x || 0),
    z: lz + (terrain.position?.z || 0)
  };
}

function clampToTerrainBounds(point){
  if(!terrain || !terrain.geometry || !terrain.geometry.boundingBox || !point) return point;
  const bb = terrain.geometry.boundingBox;
  return {
    ...point,
    x: Math.max(bb.min.x, Math.min(bb.max.x, point.x)),
    z: Math.max(bb.min.z, Math.min(bb.max.z, point.z))
  };
}

function getPreferredAmoSpot(){
  if(amoManualTarget) return { ...amoManualTarget };
  if(amoDefaultSpot) return { ...amoDefaultSpot };
  const spot = findDarkestWorldXZ();
  return clampToTerrainBounds(spot);
}

function updateAmoSpritePlacement(){
  if(!amoSprite) return;
  const spot = getPreferredAmoSpot();
  if(!spot) return;
  const halfHeight = (amoSprite.worldHeight || (AMO.SPRITE_HEIGHT * (AMO.SCALE || 1))) * 0.5;
  const manualY = spot.manualY ?? heightAt(spot.x, spot.z);
  const baseY = manualY + AMO.BASE_OFFSET;
  const targetY = baseY + halfHeight;
  const m = amoSprite.mesh;
  m.position.set(spot.x, targetY, spot.z);
  if(camera){
    m.lookAt(camera.position.x, targetY, camera.position.z);
  }
  amoSprite.baseY = baseY;
  initAmmoPad();
  updateAmmoPadPlacement();
}

function initAmoSpriteFromFolder(){
  removeAmoSprite();
  if(!terrain || !hm01) return;
  const f = findExact(AMO.FILE);
  if(!f) return;
  const loader = new THREE.TextureLoader();
  loader.load(
    f.url,
    (tex)=>{
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.flipY = true;
      tex.needsUpdate = true;
      const aspect = tex.image && tex.image.width && tex.image.height ? (tex.image.width / tex.image.height) : 1;
      const height = AMO.SPRITE_HEIGHT * (AMO.SCALE || 1);
      const width = height * aspect;
      const geo = new THREE.PlaneGeometry(width, height);
      const mat = new THREE.MeshStandardMaterial({
        map: tex,
        transparent: true,
        alphaTest: 0.05,
        roughness: 1.0,
        metalness: 0.0,
        side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      scene.add(mesh);
      amoSprite = { mesh, geo, mat, tex, worldHeight: height };
      updateAmoSpritePlacement();
    },
    undefined,
    ()=>{}
  );
}

function updateAmoBillboard(){
  if(!amoSprite || !camera) return;
  const m = amoSprite.mesh;
  m.lookAt(camera.position.x, m.position.y, camera.position.z);
}

function captureAmoSpotFromCamera(){
  if(!camera) return;
  const gx = camera.position.x;
  const gz = camera.position.z;
  const gy = heightAt(gx, gz);
  const spot = clampToTerrainBounds({ x: gx, z: gz });
  amoManualTarget = { x: spot.x, z: spot.z, manualY: gy };
  updateAmoSpritePlacement();
  setStatus("📍 amo.png locked to copter location", "Fly to another spot and press P again if you want to move it.");
}

function updateAmmoPadPlacement(){
  if(!ammoPad || !terrain) return;
  const spotX = AMMO_PAD_LOCATION.x;
  const spotZ = AMMO_PAD_LOCATION.z;
  const groundY = heightAt(spotX, spotZ);
  const baseY = groundY + AMMO_PAD.BASE_OFFSET;
  const group = ammoPad.group;
  group.position.set(spotX, baseY, spotZ);
  ammoPad.baseY = baseY;
  if(camera){
    ammoPad.ring.lookAt(camera.position.x, baseY, camera.position.z);
  }
}

function copterInsideAmmoPad(){
  if(!ammoPad || !camera || typeof ammoPad.baseY !== "number") return false;
  const pos = ammoPad.group.position;
  const dx = camera.position.x - pos.x;
  const dz = camera.position.z - pos.z;
  const horiz = Math.hypot(dx, dz);
  const dy = Math.abs(camera.position.y - ammoPad.baseY);
  return horiz <= AMMO_PAD.RADIUS && dy <= AMMO_PAD.HEIGHT;
}

function attemptAmmoPadReload(){
  if(copterAmmo >= COPTER_AMMO.MAX) return;
  if(!copterInsideAmmoPad()) return;
  copterAmmo = COPTER_AMMO.MAX;
  ammoEmptyWarned = false;
  setStatus("Landed on the ammo pad; reload complete (50 missiles).");
}

let terrain = null;
let mat = null;

// --- Anti-shimmer (specular/normal sparkle) while moving vertically ---
let antiShimmerTimer = 0; // seconds remaining
let baseNormalScale = 1.6;
let baseRoughness = 1.0;
const ANTI_SHIMMER_ON = true;
const ANTI_SHIMMER_BOOST_ROUGH = 0.20; // add roughness while moving
const ANTI_SHIMMER_SCALE_NORMAL = 0.55; // multiply normal strength while moving


function prepTex(tex, {srgb=false}={}){
  tex.colorSpace = srgb ? THREE.SRGBColorSpace : THREE.NoColorSpace;
  tex.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 12);
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.repeat.set(1,1);
  tex.flipY = false;
  return tex;
}

async function loadTex(url, opts){
  const tl = new THREE.TextureLoader();
  return await new Promise((resolve)=>{
    tl.load(url, t=>resolve(prepTex(t, opts)), undefined, ()=>resolve(null));
  });
}

function buildGeometry(size, heightScale){
  // NOTE: heightScale is applied via terrain.scale.y for live updates
  const segments = 256; // fixed like Copter12; can expose later if you want
  const g = new THREE.PlaneGeometry(size, size, segments, segments);
  g.rotateX(-Math.PI/2);

  const pos = g.attributes.position;
  const uv  = g.attributes.uv;

  for(let i=0;i<pos.count;i++){
    const u = uv.getX(i);
    const v = uv.getY(i);
    const x = Math.floor(u*(hmW-1));
    const y = Math.floor((1-v)*(hmH-1));
    const h = hm01[y*hmW + x] || 0;
    pos.setY(i, h*BASE_HEIGHT);
  }
  g.computeVertexNormals();
  return g;
}

let normalEnabled=true, roughEnabled=true;
let smoothWork = (HARDWIRED.SMOOTH || 0) / 3; // 0..1 visual smoothing workaround (no rebuild)
let baseNormalStrength = ((HARDWIRED.NORMAL_STRENGTH || 1.6) || 1.6);

let savedNormal=null, savedRough=null;

function applySliderParams(){
    if(!mat) return;

  // capture current base normal (user slider) and smoothing factor
  baseNormalStrength = (HARDWIRED.NORMAL_STRENGTH || 1.6);
  smoothWork = (HARDWIRED.SMOOTH || 0) / 3; // slider 0..3 -> 0..1

  // Workaround smoothing (LIVE): reduce height amplitude and soften normal strength
  const smoothAtten = 1.0 - (0.55 * smoothWork);      // 0 -> 1.00, 3 -> 0.45
  const normalAtten = 1.0 - (0.65 * smoothWork);      // 0 -> 1.00, 3 -> 0.35

  // Normal strength
  const ns = baseNormalStrength * normalAtten;
  if(!mat.normalScale) mat.normalScale = new THREE.Vector2(1,1);
  mat.normalScale.set(ns, ns);

  baseNormalScale = ns;
  // Rough multiplier (still live)
  const rm = (HARDWIRED.ROUGH_MULT ?? 1.0);
  mat.roughness = rm;

  baseRoughness = rm;
  // Height & size sliders scale existing mesh (Copter8 style)
  if (terrain) {
    terrain.scale.y = ((HARDWIRED.HEIGHT) / BASE_HEIGHT) * smoothAtten;
    const s = (HARDWIRED.SIZE) / BASE_SIZE;
    terrain.scale.x = s;
    terrain.scale.z = s;
  }
  tetherAliensToTerrain();

  mat.needsUpdate = true;
}

function toggleNormal(){
  if(!mat) return;
  if(normalEnabled){
    savedNormal = mat.normalMap;
    mat.normalMap = configureDataMap(null);
    normalEnabled=false;
  } else {
    mat.normalMap = savedNormal;
    normalEnabled=true;
  }
  ui.btnToggleNormal.textContent = "Normal: " + (normalEnabled ? "ON" : "OFF");
  mat.needsUpdate=true;
}
function toggleRough(){
  if(!mat) return;
  if(roughEnabled){
    savedRough = mat.roughnessMap;
    mat.roughnessMap = configureDataMap(null);
    roughEnabled=false;
  } else {
    mat.roughnessMap = savedRough;
    roughEnabled=true;
  }
  ui.btnToggleRough.textContent = "Roughness: " + (roughEnabled ? "ON" : "OFF");
  mat.needsUpdate=true;
}


/* =========================
   ALIENS (multiple)
   - Loads alein.png from the PICKED folder (folder-safe)
   - Spawns 6 anchored alien sprites (1 original + 5 more) at random positions on the terrain
   - Each alien uses an invisible anchor block (stays put)
   - Fireball collision: boom.mp3 + remove just that alien
   ========================= */
const ALIEN_FILE = "alein.png"; // (spelling per Dan) must be inside the picked images folder

const ALIENS = {
  ENABLE: true,
  COUNT: 7,              // 1 + 5 more
  BILLBOARD: true,       // face camera (upright), but stay in place
  // 🔴 TWEAK ZONE: alien size
  PLANE_W: 396.0,          // world units
    PLANE_H: 402.0,  // increase/decrease to resize aliens
  BLOCK_W: 168,
  BLOCK_H: 96,
  BLOCK_D: 168,
  CLEARANCE: 8,          // how far above ground the block sits
  // Random placement bounds (fraction of terrain half-size)
  RAND_HALFSPAN_FRAC: 0.95,
  MIN_SEPARATION: 5200  // big knob: try 4000–8000 (auto-relaxes if impossible)
};

// Hit sphere for each alien (bigger = easier to hit)
const ALIEN_HIT_RADIUS = 228;

// Runtime alien list
let aliens = [];               // [{group, plane, block}]
let aliensTexture = null;      // shared texture
let aliensReady = false;       // true once texture loaded and at least one spawned

function removeAllAliens(){
  if(!aliens.length) return;
  for(let i=aliens.length-1; i>=0; i--) removeAlienAt(i, false);
  aliens = [];
  aliensReady = false;
}

function removeAlienAt(idx, award=true){
  const a = aliens[idx];
  if(!a) return;
  try{ scene.remove(a.group); }catch(e){}
  try{
    if(a.plane?.material) a.plane.material.dispose();
    if(a.plane?.geometry) a.plane.geometry.dispose();
    if(a.block?.material) a.block.material.dispose();
    if(a.block?.geometry) a.block.geometry.dispose();
  }catch(e){}
  aliens.splice(idx, 1);

  // 🔴 HEALTH REWARD: gain some health when an alien is destroyed (not on reset)
  if(award && typeof HEALTH !== 'undefined' && HEALTH && typeof HEALTH.ALIEN_KILL_BONUS === 'number'){
    setHealth(playerHealth + HEALTH.ALIEN_KILL_BONUS);
  }

  if(aliens.length === 0) aliensReady = false;

  // If we just cleared the last alien, unlock the UFO
  if(typeof checkAlienClear === 'function') checkAlienClear();
}

function sampleTerrainHeightAtWorld(x, z){
  if(!hm01 || !terrain) return 0;
  return heightAt(x, z);
}

function randomAlienXZ(){
  // Terrain size in world units (after live scaling)
  const half = (BASE_SIZE * (terrain?.scale?.x || 1)) * 0.5 * ALIENS.RAND_HALFSPAN_FRAC;
  const x = (Math.random()*2 - 1) * half;
  const z = (Math.random()*2 - 1) * half;
  return {x, z};
}


function pickSeparatedAlienXZ(){
  // Try a bunch of random candidates; pick the first that meets MIN_SEPARATION.
  // If it's mathematically impossible (too many aliens / too big separation), we fall back to the
  // "best we could find" candidate (maximizes the minimum distance to existing aliens).
  const half = (BASE_SIZE * (terrain?.scale?.x || 1)) * 0.5 * ALIENS.RAND_HALFSPAN_FRAC;

  // First alien can be anywhere
  if(aliens.length===0) return { x:(Math.random()*2-1)*half, z:(Math.random()*2-1)*half };

  let best = null;
  let bestMinDist = -Infinity;

  const TRIES = 1200;
  for(let t=0; t<TRIES; t++){
    const x = (Math.random()*2 - 1) * half;
    const z = (Math.random()*2 - 1) * half;

    let minDist = Infinity;
    for(const a of aliens){
      const dx = x - a.group.position.x;
      const dz = z - a.group.position.z;
      const d = Math.hypot(dx, dz);
      if(d < minDist) minDist = d;
      // small early-out if already awful
      if(minDist < bestMinDist) break;
    }

    if(minDist >= (ALIENS.MIN_SEPARATION || 0)) return {x, z};

    if(minDist > bestMinDist){
      bestMinDist = minDist;
      best = {x, z};
    }
  }

  return best || { x:(Math.random()*2-1)*half, z:(Math.random()*2-1)*half };
}


function makeOneAlien(x, z){
  const group = new THREE.Group();
  group.name = "AlienAnchor";

  // Invisible anchor block
  const blockGeo = new THREE.BoxGeometry(ALIENS.BLOCK_W, ALIENS.BLOCK_H, ALIENS.BLOCK_D);
  const blockMat = new THREE.MeshStandardMaterial({
    color: 0x2b2f3a,
    roughness: 0.95,
    metalness: 0.0,
    visible: false
  });
  const block = new THREE.Mesh(blockGeo, blockMat);
  block.castShadow = false;
  block.receiveShadow = false;
  group.add(block);

  // Plane sprite
  const planeGeo = new THREE.PlaneGeometry(ALIENS.PLANE_W * 1.10, ALIENS.PLANE_H * 1.10);
  const planeMat = new THREE.MeshStandardMaterial({
    map: aliensTexture,
    transparent: true,
    alphaTest: 0.05,
    roughness: 1.0,
    metalness: 0.0
  });

  const plane = new THREE.Mesh(planeGeo, planeMat);
  plane.castShadow = false;
  plane.receiveShadow = false;

  // Place plane on top/front of block
  plane.position.set(0, ALIENS.BLOCK_H*0.55 + ALIENS.PLANE_H*0.5, ALIENS.BLOCK_D*0.51);
  group.add(plane);

  // Position group on terrain
  const groundY = sampleTerrainHeightAtWorld(x, z);
  group.position.set(x, groundY + ALIENS.CLEARANCE + ALIENS.BLOCK_H*0.5, z);

  scene.add(group);
  aliens.push({
    group,
    plane,
    block,
    cooldownSec: 0
  });
}

function tetherAliensToTerrain(){
  if(!aliens.length || !terrain || !hm01) return;
  const yOffset = ALIENS.CLEARANCE + ALIENS.BLOCK_H * 0.5;
  for(const a of aliens){
    const x = a.group.position.x;
    const z = a.group.position.z;
    a.group.position.y = sampleTerrainHeightAtWorld(x, z) + yOffset;
  }
}

  if(!ALIENS.ENABLE) return;

  for(let i=alienBalls.length-1; i>=0; i--){
    scene.remove(alienBalls[i].mesh);
  }

  aliensReady = false;
