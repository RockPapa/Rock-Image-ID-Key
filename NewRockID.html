  <script>
(() => {
  "use strict";

  const START_PAGE = "FourChoices.html";
  const pages = window.ROCK_PAGES;
  const frame = document.getElementById("pageFrame");
  let currentPage = null;

  function normalizePage(value) {
    const raw = String(value || "").trim();
    if (/^https?:\/\//i.test(raw)) return raw;
    const withoutHash = raw.split("#")[0].split("?")[0];
    return withoutHash.replace(/^\.\//, "").split("/").pop();
  }

  function pageFromHash() {
    const match = location.hash.match(/^#page=(.+)$/);
    if (!match) return START_PAGE;
    try { return decodeURIComponent(match[1]); }
    catch (_) { return START_PAGE; }
  }

  function pageTitle(html) {
    const match = html.match(/<title>([\s\S]*?)<\/title>/i);
    return match ? match[1].trim() : "Rock Image ID Key";
  }

  function documentWithBase(html) {
    const base = `<base href="${document.baseURI.replace(/[^/]*$/, "")}">`;
    return html.replace(/<head([^>]*)>/i, `<head$1>${base}`);
  }

  function displayPage(requested, mode = "push") {
    const page = normalizePage(requested);
    if (/^https?:\/\//i.test(page)) {
      window.location.href = page;
      return;
    }
    if (!pages[page]) {
      console.error(`Unknown Rock ID page: ${page}`);
      return;
    }

    currentPage = page;
    const title = pageTitle(pages[page]);
    document.title = title;
    frame.title = title;
    frame.srcdoc = documentWithBase(pages[page]);

    const nextHash = `#page=${encodeURIComponent(page)}`;
    if (mode === "replace") history.replaceState({ page }, "", nextHash);
    else if (location.hash !== nextHash) history.pushState({ page }, "", nextHash);
  }

  window.addEventListener("message", event => {
    if (event.source !== frame.contentWindow || !event.data) return;
    if (event.data.type === "rock-route") displayPage(event.data.page, "push");
    else if (event.data.type === "rock-replace") displayPage(event.data.page, "replace");
    else if (event.data.type === "rock-back") {
      if (history.length > 1) history.back();
      else displayPage(START_PAGE, "replace");
    }
  });

  window.addEventListener("popstate", () => displayPage(pageFromHash(), "none"));
  displayPage(pageFromHash(), location.hash ? "none" : "replace");
})();

  </script>
