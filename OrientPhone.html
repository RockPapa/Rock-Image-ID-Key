<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SBG Orientation Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body { height:100%; margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
#map { height:100%; width:100%; }

.ui {
  position:absolute;
  top:6px;
  right:6px;
  display:flex;
  justify-content:flex-end;
  pointer-events:none;
  z-index:9999;
  transform: scale(0.5);
  transform-origin: top right;
}
.card {
  pointer-events:auto;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(8px);
  border-radius:12px;
  padding:6px 8px;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
  max-width:min(620px, 100%);
}
.row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }

button {
  border:0;
  border-radius:10px;
  padding:6px 8px;
  font-weight:700;
  font-size:12px;
  cursor:pointer;
  background:#111;
  color:#fff;
}
button:disabled {
  opacity:0.55;
  cursor:not-allowed;
}
button.secondary {
  background:#fff;
  color:#111;
  border:1px solid rgba(0,0,0,0.15);
}

.stat {
  font-size:10px;
  line-height:1.25;
  color:#111;
}
.stat.ok { color:#0c7a1b; font-weight:700; }
.stat.warn { color:#995b00; font-weight:700; }
.stat.err { color:#a40000; font-weight:700; }

#rockType {
  margin-top: 0;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 0.04em;
  line-height: 1.05;
}

#tapHint {
  margin-top: 4px;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.02em;
  color: #111;
  opacity: 0.92;
}

#blendRow {
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
#blendLabel {
  font-size: 10px;
  font-weight: 700;
  white-space: nowrap;
}
#blendSlider {
  width: 165px;
}

#title,
#tapHint,
#modeSubtitle,
#homingStatus,
#distanceStatus,
#accuracyStatus,
#backBtn,
#recenterBtn,
#startHomingBtn,
#unlockBtn,
#infoBtn {
  display: none !important;
}

.targetDot {
  width:18px;
  height:18px;
  background:#ff2d2d;
  border-radius:50%;
  position:relative;
  box-shadow:0 0 0 2px rgba(255,45,45,0.55);
}
.targetDot:after {
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:18px;
  height:18px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:rgba(255,45,45,0.25);
  animation:ping 1.6s infinite;
}
.targetSquare {
  width:16px;
  height:16px;
  background:#e53935;
  border-radius:2px;
  border:1px solid rgba(255,255,255,0.75);
  box-shadow:none;
}
@keyframes ping {
  0% { width:18px; height:18px; opacity:.65; }
  100% { width:64px; height:64px; opacity:0; }
}

.leaflet-control-zoom {
  display: none !important;
}
</style>
</head>

<body>
<div id="map"></div>

<div class="ui">
  <div class="card">
    <div class="row" style="flex-direction:column; align-items:flex-start; gap:6px;">
      <div>
        <div style="font-weight:700;font-size:13px" id="title">SBG Stop</div>
        <div id="rockType"></div>
        <div id="tapHint">TAP ON THE RED MARKER FOR ROCK DESCRIPTION</div>
        <div id="blendRow">
          <span id="blendLabel">MAP BLEND: <span id="blendValue">55%</span></span>
          <input id="blendSlider" type="range" min="0" max="100" value="55" />
        </div>
        <div style="font-size:10px;opacity:.8" id="modeSubtitle">Mode</div>
        <div id="homingStatus" class="stat">GPS idle</div>
        <div id="distanceStatus" class="stat">Distance: --</div>
        <div id="accuracyStatus" class="stat">Accuracy: --</div>
      </div>
      <div class="row">
        <button class="secondary" id="backBtn">Back</button>
        <button class="secondary" id="recenterBtn">Recenter</button>
        <button class="secondary" id="startHomingBtn">Start Homing</button>
        <button class="secondary" id="unlockBtn">Continue Without GPS</button>
        <button id="infoBtn" disabled>Info</button>
      </div>
    </div>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const id = p.get("id") || "";
const name = p.get("name") || "SBG Stop";
const lat = parseFloat(p.get("lat"));
const lng = parseFloat(p.get("lng"));
const nx = parseFloat(p.get("nx"));
const ny = parseFloat(p.get("ny"));
const info = p.get("info") || "";
const rock = (p.get("rock") || "").toUpperCase();
const mode = (p.get("mode") || "virtual").toLowerCase();
const isOnSite = mode === "onsite";
const stopId = (id || "").toUpperCase();
const isS3 = stopId === "S3";

const rockTypeEl = document.getElementById("rockType");
document.getElementById("title").textContent = `${name} (${id})`;
if (rock) {
  rockTypeEl.textContent = rock;
} else {
  rockTypeEl.textContent = "";
}

let center = (isFinite(lat) && isFinite(lng)) ? [lat, lng] : [33.9009, -83.3833];

const modeSubtitle = document.getElementById("modeSubtitle");
const homingStatusEl = document.getElementById("homingStatus");
const distanceStatusEl = document.getElementById("distanceStatus");
const accuracyStatusEl = document.getElementById("accuracyStatus");
const startHomingBtn = document.getElementById("startHomingBtn");
const unlockBtn = document.getElementById("unlockBtn");
const blendSlider = document.getElementById("blendSlider");
const blendValue = document.getElementById("blendValue");

const infoBtn = document.getElementById("infoBtn");
const map = L.map("map", { zoomControl:false });

const streets = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom:19,
  attribution:"© OpenStreetMap"
});

const satellite = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
  maxZoom:19,
  attribution:"Imagery © Esri"
});

const labels = L.tileLayer("https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}", {
  maxZoom:19
});

satellite.addTo(map);
labels.addTo(map);

L.control.layers(
  {
    "Map": streets,
    "Satellite": satellite,
    "Hybrid": L.layerGroup([satellite, labels])
  },
  null,
  { collapsed:true }
).addTo(map);

const STAR_MAP_BOUNDS = [
  [33.89960, -83.39107],
  [33.90620, -83.37688]
];

if (Number.isFinite(nx) && Number.isFinite(ny)) {
  const south = STAR_MAP_BOUNDS[0][0];
  const west = STAR_MAP_BOUNDS[0][1];
  const north = STAR_MAP_BOUNDS[1][0];
  const east = STAR_MAP_BOUNDS[1][1];
  const mappedLat = north - ny * (north - south);
  const mappedLng = west + nx * (east - west);
  center = [mappedLat, mappedLng];
}

const starMapOverlay = L.imageOverlay("images/star_map.jpg", STAR_MAP_BOUNDS, {
  opacity: 0.55,
  interactive: false
}).addTo(map);

function applyBlend(percent) {
  const clamped = Math.max(0, Math.min(100, Number(percent) || 0));
  if (starMapOverlay) starMapOverlay.setOpacity(clamped / 100);
  if (blendValue) blendValue.textContent = `${clamped}%`;
}
if (blendSlider) {
  blendSlider.addEventListener("input", () => applyBlend(blendSlider.value));
  applyBlend(blendSlider.value);
}

const targetIcon = L.divIcon({
  html: isS3 ? '<div class="targetSquare"></div>' : '<div class="targetDot"></div>',
  iconSize:[18,18],
  iconAnchor:[9,9]
});

const targetMarker = L.marker(center, { icon:targetIcon }).addTo(map);

const tapHintEl = document.getElementById("tapHint");
if (tapHintEl) {
  tapHintEl.textContent = isS3
    ? "TAP ON THE RED SQUARE FOR ROCK DESCRIPTION"
    : "TAP ON THE RED DOT FOR ROCK DESCRIPTION";
}

function recenter(animate = true) {
  // Keep selected stop marker centered on screen.
  const bounds = L.latLngBounds(STAR_MAP_BOUNDS);
  const fitZoom = map.getBoundsZoom(bounds, true);
  const z = Math.max(map.getMinZoom(), Math.min(map.getMaxZoom(), fitZoom));
  map.setView(center, z, { animate });
}
recenter(false);

const ARRIVAL_RADIUS_M = 10;
const STABLE_ARRIVAL_MS = 4000;

let watchId = null;
let userMarker = null;
let accuracyCircle = null;
let arrived = false;
let insideSince = null;

function setInfoEnabled(enabled) {
  infoBtn.disabled = !enabled;
}

function setStatus(message, cls) {
  homingStatusEl.className = `stat${cls ? " " + cls : ""}`;
  homingStatusEl.textContent = message;
}

function toRadians(deg) {
  return deg * (Math.PI / 180);
}

function haversineMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = toRadians(lat2 - lat1);
  const dLng = toRadians(lng2 - lng1);
  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) *
    Math.sin(dLng / 2) * Math.sin(dLng / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function updateUserLocation(userLat, userLng, accuracyM) {
  const ll = [userLat, userLng];

  if (!userMarker) {
    userMarker = L.circleMarker(ll, {
      radius: 7,
      color: "#0a84ff",
      fillColor: "#0a84ff",
      fillOpacity: 0.9,
      weight: 2
    }).addTo(map);
  } else {
    userMarker.setLatLng(ll);
  }

  if (!accuracyCircle) {
    accuracyCircle = L.circle(ll, {
      radius: Math.max(accuracyM || 0, 1),
      color: "#0a84ff",
      fillColor: "#0a84ff",
      fillOpacity: 0.08,
      weight: 1
    }).addTo(map);
  } else {
    accuracyCircle.setLatLng(ll);
    accuracyCircle.setRadius(Math.max(accuracyM || 0, 1));
  }
}

function stopHoming() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  startHomingBtn.textContent = "Start Homing";
}

function onPosition(pos) {
  const userLat = pos.coords.latitude;
  const userLng = pos.coords.longitude;
  const accuracyM = Number.isFinite(pos.coords.accuracy) ? pos.coords.accuracy : 0;

  updateUserLocation(userLat, userLng, accuracyM);

  const dist = haversineMeters(userLat, userLng, center[0], center[1]);
  const effectiveArrivalRadius = Math.max(ARRIVAL_RADIUS_M, accuracyM);

  distanceStatusEl.textContent = `Distance: ${Math.round(dist)} m`;
  accuracyStatusEl.textContent = `Accuracy: ${Math.round(accuracyM)} m`;

  if (arrived) {
    setStatus(`Arrived at ${name}.`, "ok");
    setInfoEnabled(true);
    return;
  }

  if (dist <= effectiveArrivalRadius) {
    if (!insideSince) insideSince = Date.now();
    const heldMs = Date.now() - insideSince;
    const secs = Math.max(0, Math.ceil((STABLE_ARRIVAL_MS - heldMs) / 1000));

    if (heldMs >= STABLE_ARRIVAL_MS) {
      arrived = true;
      setStatus(`Arrived at ${name}. Info unlocked.`, "ok");
      setInfoEnabled(true);
      if (navigator.vibrate) navigator.vibrate([160, 70, 160]);
    } else {
      setStatus(`Very close. Hold position ${secs}s to confirm arrival.`, "warn");
    }
  } else {
    insideSince = null;
    setStatus(`Homing to ${name}...`, "");
  }
}

function onPositionError(err) {
  const msg = err && err.message ? err.message : "Location unavailable";
  setStatus(`GPS error: ${msg}`, "err");
  stopHoming();
}

function startHoming() {
  if (!navigator.geolocation) {
    setStatus("Geolocation is not supported on this device/browser.", "err");
    return;
  }

  if (watchId !== null) {
    stopHoming();
    return;
  }

  setStatus("Requesting GPS permission...", "");

  watchId = navigator.geolocation.watchPosition(onPosition, onPositionError, {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 12000
  });

  startHomingBtn.textContent = "Stop Homing";
}

targetMarker.on("click", () => {
  if (info && !infoBtn.disabled) location.href = info;
});

document.getElementById("recenterBtn").onclick = recenter;

document.getElementById("backBtn").onclick = () => {
  stopHoming();
  location.href = "RockTourPhone.html?mode=" + encodeURIComponent(mode);
};

history.replaceState({ page: "orient" }, "", location.href);
history.pushState({ page: "orient-trap" }, "", location.href);
window.addEventListener("popstate", () => {
  stopHoming();
  location.href = "RockTourPhone.html?mode=" + encodeURIComponent(mode);
});

startHomingBtn.onclick = startHoming;

unlockBtn.onclick = () => {
  setInfoEnabled(true);
  setStatus("Virtual mode enabled. Info unlocked without GPS.", "ok");
};

infoBtn.onclick = () => {
  if (info) location.href = info;
};

if (!info) {
  setStatus("No info page configured for this stop.", "err");
  unlockBtn.disabled = true;
  setInfoEnabled(false);
}

if (isOnSite) {
  modeSubtitle.textContent = "On-Site Mode: Start Homing to unlock Info by arrival";
  setStatus("GPS idle", "");
  setInfoEnabled(false);
} else {
  modeSubtitle.textContent = "Virtual Mode: GPS not required";
  startHomingBtn.style.display = "none";
  unlockBtn.style.display = "none";
  distanceStatusEl.textContent = "Distance: n/a (virtual)";
  accuracyStatusEl.textContent = "Accuracy: n/a (virtual)";
  setInfoEnabled(true);
  setStatus("Virtual mode active. Info is unlocked.", "ok");
}

window.addEventListener("resize", () => {
  map.invalidateSize();
  recenter(false);
});
window.addEventListener("orientationchange", () => {
  map.invalidateSize();
  recenter(false);
});
window.addEventListener("beforeunload", stopHoming);

</script>

</body>
</html>
