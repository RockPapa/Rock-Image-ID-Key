<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChatiCopter – Fuel System Edition (Nice Small Controls)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      height: 100%;
    }
    canvas {
      display: block;
      background: #000;
      touch-action: manipulation;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 8px 10px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      border-radius: 8px;
      line-height: 1.3;
      pointer-events: none;
      max-width: 320px;
    }
    #hud strong { font-size: 12px; }

    #controlsToggle {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 20;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
      cursor: pointer;
      touch-action: manipulation;
    }

    /* Bottom control area */
    #controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 10px;
      height: 140px;
      pointer-events: auto;
      z-index: 10;
    }

    /* Rounded button style, shrunk ~25% from the big ones */
    .ctrl-btn {
      position: absolute;
      min-width: 90px;
      min-height: 90px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 30px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .ctrl-btn.alt {
      font-size: 20px;
      font-weight: 600;
    }

    .ctrl-btn:active {
      transform: scale(0.95);
      background: rgba(0,0,0,0.9);
    }

    /* Button positions – like your first screenshot, a bit higher */
    #btnLeft   { left: 30px;  bottom: 30px; }
    #btnRight  { left: 150px; bottom: 30px; }
    #btnDown   { left: 50%;   bottom: 30px; transform: translateX(-140px); }
    #btnUp     { left: 50%;   bottom: 30px; transform: translateX(10px); }
    #btnFwd    { right: 30px; bottom: 30px; }
  </style>
</head>

<body>
<canvas id="view"></canvas>

<div id="hud">
  <strong>ChatiCopter – Fuel System Edition</strong><br>
  <span id="hudPos">Pos: X=0, Y=0</span><br>
  <span id="hudAlt">Alt: 0 ft</span><br>
  <span id="hudHead">Heading: 0° (N)</span><br>
  <span id="hudDist">Distance: 0.00 mi</span><br>
  <span id="hudFuel">Fuel: 100% (300.0 mi left)</span><br>
  <span id="hudStatus">Status: OK</span><br>
  <br>
  ↑/↓ move, ←/→ turn, R/F altitude, H home (refuel), M engine, C controls.
</div>

<button id="controlsToggle">Hide Controls</button>

<div id="controls">
  <!-- left / right turn -->
  <button id="btnLeft"  class="ctrl-btn"      data-key="arrowleft">◀</button>
  <button id="btnRight" class="ctrl-btn"      data-key="arrowright">▶</button>

  <!-- altitude down / up -->
  <button id="btnDown"  class="ctrl-btn alt"  data-key="f">DOWN</button>
  <button id="btnUp"    class="ctrl-btn alt"  data-key="r">UP</button>

  <!-- forward -->
  <button id="btnFwd"   class="ctrl-btn"      data-key="arrowup">▲</button>
</div>

<script>
/* ===========================
   CANVAS
=========================== */
const canvas = document.getElementById("view");
const ctx = canvas.getContext("2d");
function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }
addEventListener("resize", resizeCanvas);
resizeCanvas();

/* ===========================
   IMAGES
=========================== */
const mapImg = new Image(); mapImg.src = "images/map.jpg";
const heliImg = new Image(); heliImg.src = "images/chaticopter.png";

/* ===========================
   SOUND
=========================== */
const heliSound = new Audio("images/helicopter.wav");
heliSound.loop = true;
heliSound.volume = 0.4;
let soundStarted = false, soundOn = true;
function startSoundIfNeeded(){
  if(!soundStarted && soundOn){
    heliSound.play().catch(()=>{});
    soundStarted = true;
  }
}

/* ===========================
   WORLD / CAMERA
=========================== */
let mapWidth=0, mapHeight=0;
let heliX=0, heliY=0;
let heading=0;

const baseZoom = 2.0;
let zoom = baseZoom;

const MIN_ZOOM = 0.40;
const MAX_ZOOM = 3.0;

let cameraX=0, cameraY=0;
let screenX=0, screenY=0;

let viewW=0, viewH=0;
let sx=0, sy=0;
let dx=0, dy=0;
let destW=0, destH=0;

let rotorAngle=0;

/* ===========================
   DEVICE CONFIG
=========================== */
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

/* Make iPad/iPhone copter smaller again */
const heliFixedSize = isIOS ? 170 : 90;

const forwardSpeed   = isIOS ? 1.5 : 0.7;
const turnSpeed      = 0.008;
const zoomSpeed      = 0.02;

/* ===========================
   TRACKING & FUEL
=========================== */
let totalDistanceUnits = 0;
const PIXELS_PER_MILE  = 500;

const MAX_RANGE_MILES = 300;
const LOW_FUEL_MILES  = 250;
let missionFailed = false;

// HUD elements
const hudPos    = document.getElementById("hudPos");
const hudAlt    = document.getElementById("hudAlt");
const hudHead   = document.getElementById("hudHead");
const hudDist   = document.getElementById("hudDist");
const hudFuel   = document.getElementById("hudFuel");
const hudStatus = document.getElementById("hudStatus");

/* ===========================
   INPUT
=========================== */
const keys = {};
const home = { x:0, y:0, heading:0, zoom:baseZoom };

function resetHome(){
  heliX = home.x;
  heliY = home.y;
  heading = 0;
  zoom = baseZoom;
  cameraX = heliX;
  cameraY = heliY;

  totalDistanceUnits = 0;
  missionFailed = false;
}

addEventListener("keydown", e=>{
  const k = e.key.toLowerCase();

  if(k === "m"){
    soundOn = !soundOn;
    if(soundOn) startSoundIfNeeded();
    else heliSound.pause();
    return;
  }

  if(k === "h"){ resetHome(); return; }
  if(k === "c"){ toggleControls(); return; }

  keys[k] = true;
  startSoundIfNeeded();

  if(["arrowup","arrowdown","arrowleft","arrowright"].includes(k))
    e.preventDefault();
});
addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
});

/* Touch → keys */
document.querySelectorAll(".ctrl-btn").forEach(btn=>{
  const key = btn.dataset.key.toLowerCase();
  function down(e){ e.preventDefault(); keys[key] = true; startSoundIfNeeded(); }
  function up(e){ e.preventDefault(); keys[key] = false; }
  btn.addEventListener("touchstart", down, {passive:false});
  btn.addEventListener("touchend", up);
  btn.addEventListener("mousedown", down);
  btn.addEventListener("mouseup", up);
  btn.addEventListener("mouseleave", ()=> keys[key] = false);
});

/* Controls toggle */
const controlsDiv = document.getElementById("controls");
const toggleBtn   = document.getElementById("controlsToggle");
let controlsVisible = true;
function toggleControls(){
  controlsVisible = !controlsVisible;
  controlsDiv.style.display = controlsVisible ? "block" : "none";
  toggleBtn.textContent = controlsVisible ? "Hide Controls" : "Show Controls";
}
toggleBtn.addEventListener("click", toggleControls);

/* Heading → compass label */
function headingToCompass(deg){
  const dirs = ["N","NE","E","SE","S","SW","W","NW"];
  return dirs[Math.round(deg/45) % 8];
}

/* ===========================
   MAIN UPDATE
=========================== */
let mapLoaded=false, heliLoaded=false;

function update(){
  if(!mapLoaded) return;

  let oldZoom = zoom;

  // Zoom
  if(keys['r']) zoom -= zoomSpeed;
  if(keys['f']) zoom += zoomSpeed;
  zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom));

  // Turn
  if(keys['arrowleft'])  heading -= turnSpeed;
  if(keys['arrowright']) heading += turnSpeed;

  // Forward / Back
  let move = 0;
  if(keys['arrowup'])   move = 1;
  if(keys['arrowdown']) move = -1;

  if(move !== 0 && !missionFailed){
    const speedMultiplier = Math.min(3.0, baseZoom / zoom);

    const oldX = heliX;
    const oldY = heliY;

    heliX += Math.sin(heading) * forwardSpeed * speedMultiplier * move;
    heliY +=-Math.cos(heading) * forwardSpeed * speedMultiplier * move;

    heliX = Math.max(0, Math.min(mapWidth,  heliX));
    heliY = Math.max(0, Math.min(mapHeight, heliY));

    const dxU = heliX - oldX;
    const dyU = heliY - oldY;
    totalDistanceUnits += Math.sqrt(dxU*dxU + dyU*dyU);
  }

  // Camera follow
  viewW = Math.min(mapWidth,  canvas.width / zoom);
  viewH = Math.min(mapHeight, canvas.height / zoom);

  const margin      = Math.min(canvas.width, canvas.height) * 0.25;
  const worldMargin = margin / zoom;

  const halfW = viewW / 2, halfH = viewH / 2;
  const minOX = -halfW + worldMargin, maxOX = halfW - worldMargin;
  const minOY = -halfH + worldMargin, maxOY = halfH - worldMargin;

  let offX = heliX - cameraX;
  let offY = heliY - cameraY;

  if(offX < minOX)      cameraX = heliX - minOX;
  else if(offX > maxOX) cameraX = heliX - maxOX;

  if(offY < minOY)      cameraY = heliY - minOY;
  else if(offY > maxOY) cameraY = heliY - maxOY;

  cameraX = Math.max(halfW, Math.min(mapWidth  - halfW,  cameraX));
  cameraY = Math.max(halfH, Math.min(mapHeight - halfH, cameraY));

  // Zoom lock
  if(zoom !== oldZoom){
    let oldVW = Math.min(mapWidth,  canvas.width  / oldZoom);
    let oldVH = Math.min(mapHeight, canvas.height / oldZoom);
    let oldSX = cameraX - oldVW/2;
    let oldSY = cameraY - oldVH/2;
    let oldDW = oldVW * oldZoom, oldDH = oldVH * oldZoom;
    let oldDX = (canvas.width  - oldDW)/2;
    let oldDY = (canvas.height - oldDH)/2;
    let oldScreenX = oldDX + (heliX - oldSX) * oldZoom;
    let oldScreenY = oldDY + (heliY - oldSY) * oldZoom;

    viewW = Math.min(mapWidth,  canvas.width  / zoom);
    viewH = Math.min(mapHeight, canvas.height / zoom);

    let newDW = viewW * zoom, newDH = viewH * zoom;
    let newDX = (canvas.width  - newDW)/2;
    let newDY = (canvas.height - newDH)/2;

    cameraX = heliX + viewW/2 - (oldScreenX - newDX)/zoom;
    cameraY = heliY + viewH/2 - (oldScreenY - newDY)/zoom;

    const newHW = viewW/2, newHH = viewH/2;
    cameraX = Math.max(newHW, Math.min(mapWidth  - newHW, cameraX));
    cameraY = Math.max(newHH, Math.min(mapHeight - newHH, cameraY));
  }

  viewW = Math.min(mapWidth,  canvas.width  / zoom);
  viewH = Math.min(mapHeight, canvas.height / zoom);

  sx = cameraX - viewW/2;
  sy = cameraY - viewH/2;

  sx = Math.max(0, Math.min(mapWidth  - viewW,  sx));
  sy = Math.max(0, Math.min(mapHeight - viewH, sy));

  destW = viewW * zoom;
  destH = viewH * zoom;

  dx = (canvas.width  - destW)/2;
  dy = (canvas.height - destH)/2;

  rotorAngle += 0.25;

  updateHUD();
}

/* ===========================
   HUD UPDATE
=========================== */
function updateHUD(){
  hudPos.textContent = `Pos: X=${heliX.toFixed(0)}, Y=${heliY.toFixed(0)}`;

  const altLevel     = (baseZoom / zoom) * 100;
  const altitudeFeet = altLevel * (500/67);  // 67 → 500 ft calibration
  hudAlt.textContent = `Alt: ${altitudeFeet.toFixed(0)} ft`;

  let deg = (heading * 180 / Math.PI + 360) % 360;
  hudHead.textContent = `Heading: ${deg.toFixed(0)}° (${headingToCompass(deg)})`;

  const miles = totalDistanceUnits / PIXELS_PER_MILE;
  hudDist.textContent = `Distance: ${miles.toFixed(2)} mi`;

  const usedMiles     = Math.min(miles, MAX_RANGE_MILES);
  const fuelMilesLeft = Math.max(0, MAX_RANGE_MILES - usedMiles);
  const fuelPercent   = Math.max(0, (fuelMilesLeft / MAX_RANGE_MILES) * 100);

  hudFuel.textContent = `Fuel: ${fuelPercent.toFixed(0)}% (${fuelMilesLeft.toFixed(1)} mi left)`;

  let statusText = "Status: OK";

  if(miles >= MAX_RANGE_MILES){
    statusText = "Status: OUT OF FUEL – mission failed";
    if(!missionFailed){
      missionFailed = true;
      soundOn = false;
      heliSound.pause();
    }
  } else if(miles >= LOW_FUEL_MILES){
    statusText = "Status: LOW FUEL – return to base";
  }

  hudStatus.textContent = statusText;
}

/* ===========================
   DRAW
=========================== */
function drawBackground(){
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  if(!mapLoaded) return;
  ctx.drawImage(mapImg, sx,sy,viewW,viewH, dx,dy,destW,destH);
}

function drawRotorShadow(size){
  const sr = size*0.9, sw = size*0.16, blur = 25;
  ctx.save();
  ctx.translate(screenX,screenY);
  ctx.rotate(rotorAngle);
  ctx.fillStyle = `rgba(0,0,0,${isIOS?0.30:0.55})`;
  ctx.filter    = `blur(${blur}px)`;
  for(let i=0;i<4;i++){
    ctx.rotate(Math.PI/2);
    ctx.fillRect(-sw/2,-sr, sw, sr*2);
  }
  ctx.restore();
}

function drawHelicopter(){
  if(!heliLoaded || !mapLoaded) return;
  screenX = dx + (heliX - sx) * zoom;
  screenY = dy + (heliY - sy) * zoom;

  const size = heliFixedSize;
  drawRotorShadow(size);

  ctx.save();
  ctx.translate(screenX,screenY);
  ctx.rotate(heading);
  ctx.drawImage(heliImg, -size/2, -size/2, size, size);
  ctx.restore();
}

function draw(){
  drawBackground();
  drawHelicopter();
}

/* ===========================
   LOOP
=========================== */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

/* ===========================
   STARTUP
=========================== */
function maybeStart(){
  if(mapLoaded && heliLoaded){
    mapWidth  = mapImg.width;
    mapHeight = mapImg.height;
    home.x = mapWidth /2;
    home.y = mapHeight/2;
    resetHome();
    loop();
  }
}

mapImg.onload  = ()=>{ mapLoaded  = true; maybeStart(); };
heliImg.onload = ()=>{ heliLoaded = true; maybeStart(); };
</script>

</body>
</html>
