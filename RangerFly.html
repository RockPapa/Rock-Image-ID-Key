<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RangerFly MapKit Tank Controls</title>
<style>
  html, body { margin:0; height:100%; overflow:hidden; background:#000; font-family:system-ui, -apple-system, sans-serif; }
  #map { position:fixed; inset:0; }

  #panel {
    position:fixed; left:10px; top:10px; z-index:20;
    background:rgba(0,0,0,.72); color:#fff; border-radius:10px; padding:10px; width:min(92vw, 360px);
    font-size:12px; line-height:1.35;
  }
  #panel strong { font-size:13px; }
  #tokenRow { display:flex; gap:6px; margin:8px 0; }
  #tokenInput {
    flex:1; min-width:0; border:1px solid rgba(255,255,255,.35); border-radius:7px;
    background:rgba(255,255,255,.08); color:#fff; padding:6px 8px; font-size:12px;
  }
  #startBtn, #clearBtn {
    border:1px solid rgba(255,255,255,.45); border-radius:7px; background:rgba(255,255,255,.12);
    color:#fff; padding:6px 10px; font-size:12px; cursor:pointer;
  }
  #status { margin-top:6px; color:#ffd27d; }

  #controls {
    position:fixed; left:0; right:0; bottom:12px; z-index:20; height:120px; pointer-events:none;
  }
  .btn {
    position:absolute; pointer-events:auto; width:88px; height:88px; border-radius:999px;
    border:2px solid rgba(255,255,255,.8); background:rgba(0,0,0,.6); color:#fff;
    font-size:28px; font-weight:700; cursor:pointer;
  }
  .btn:active { transform:scale(0.95); }
  #left  { left:20px; bottom:0; }
  #right { left:120px; bottom:0; }
  #back  { left:calc(50% - 96px); bottom:0; font-size:22px; }
  #fwd   { left:calc(50% + 8px); bottom:0; font-size:22px; }

  #hud {
    position:fixed; right:10px; top:10px; z-index:20;
    background:rgba(0,0,0,.72); color:#fff; border-radius:10px; padding:8px 10px;
    font-size:12px; line-height:1.35; min-width:160px;
  }
</style>
<script src="https://cdn.apple-mapkit.com/mk/5.x.x/mapkit.js" crossorigin></script>
</head>
<body>
<div id="map"></div>

<div id="panel">
  <strong>MapKit Tank Controls</strong><br>
  Enter MapKit JWT once, then Start.
  <div id="tokenRow">
    <input id="tokenInput" placeholder="Paste MapKit JWT token" />
    <button id="startBtn" type="button">Start</button>
    <button id="clearBtn" type="button">Clear</button>
  </div>
  <div id="tokenRow">
    <input id="tokenFile" type="file" accept=".txt,.jwt,text/plain" />
  </div>
  Keys: ←/→ turn, ↑/↓ move, +/- zoom, H home.
  <div id="status">Waiting for token.</div>
</div>

<div id="hud">
  <div id="coord">Lat 0.00000, Lng 0.00000</div>
  <div id="heading">Heading 0° (N)</div>
  <div id="span">Span 60.00°</div>
</div>

<div id="controls">
  <button id="left" class="btn" type="button">◀</button>
  <button id="right" class="btn" type="button">▶</button>
  <button id="back" class="btn" type="button">▼</button>
  <button id="fwd" class="btn" type="button">▲</button>
</div>

<script>
(() => {
  const tokenInput = document.getElementById('tokenInput');
  const startBtn = document.getElementById('startBtn');
  const clearBtn = document.getElementById('clearBtn');
  const tokenFile = document.getElementById('tokenFile');
  const statusEl = document.getElementById('status');
  const coordEl = document.getElementById('coord');
  const headingEl = document.getElementById('heading');
  const spanEl = document.getElementById('span');

  const saved = localStorage.getItem('MAPKIT_JWT') || '';
  tokenInput.value = saved;

  const keys = Object.create(null);
  let map = null;
  let marker = null;
  let started = false;

  let lat = 20;
  let lng = 0;
  let heading = 0;
  let span = 60;

  const turnSpeed = 1.9;      // rad/s
  const moveSpeed = 140;      // m/s
  const minSpan = 0.02;
  const maxSpan = 140;

  function compass(deg){
    const dirs = ['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(deg / 45) % 8];
  }

  function wrapLng(v){
    if (v > 180) return v - 360;
    if (v < -180) return v + 360;
    return v;
  }

  function setStatus(msg){ statusEl.textContent = msg; }

  function refreshHud(){
    const deg = (heading * 180 / Math.PI + 360) % 360;
    coordEl.textContent = `Lat ${lat.toFixed(5)}, Lng ${lng.toFixed(5)}`;
    headingEl.textContent = `Heading ${deg.toFixed(0)}° (${compass(deg)})`;
    spanEl.textContent = `Span ${span.toFixed(2)}°`;
  }

  function renderMapPose(){
    if (!map || !marker) return;
    const center = new mapkit.Coordinate(lat, lng);
    map.region = new mapkit.CoordinateRegion(center, new mapkit.CoordinateSpan(span, span));
    marker.coordinate = center;
    refreshHud();
  }

  function press(code){ keys[code] = true; }
  function release(code){ keys[code] = false; }

  function bindButton(id, code){
    const el = document.getElementById(id);
    const down = (e) => { e.preventDefault(); press(code); };
    const up = (e) => { e.preventDefault(); release(code); };
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
    el.addEventListener('touchstart', down, { passive:false });
    el.addEventListener('touchend', up);
    el.addEventListener('touchcancel', up);
  }

  bindButton('left', 'ArrowLeft');
  bindButton('right', 'ArrowRight');
  bindButton('fwd', 'ArrowUp');
  bindButton('back', 'ArrowDown');

  addEventListener('keydown', (e) => {
    const key = e.key;
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','+','=','-','_','h','H'].includes(key)) {
      e.preventDefault();
    }
    if (key === 'h' || key === 'H') {
      lat = 20; lng = 0; heading = 0; span = 60;
      renderMapPose();
      return;
    }
    if (key === '+' || key === '=') {
      span = Math.max(minSpan, span * 0.9);
      renderMapPose();
      return;
    }
    if (key === '-' || key === '_') {
      span = Math.min(maxSpan, span * 1.1);
      renderMapPose();
      return;
    }
    keys[key] = true;
  });

  addEventListener('keyup', (e) => { keys[e.key] = false; });

  let last = performance.now();
  function loop(ts){
    const dt = Math.min(0.05, Math.max(0.001, (ts - last) / 1000));
    last = ts;

    if (started) {
      if (keys.ArrowLeft) heading -= turnSpeed * dt;
      if (keys.ArrowRight) heading += turnSpeed * dt;

      let moveDir = 0;
      if (keys.ArrowUp) moveDir += 1;
      if (keys.ArrowDown) moveDir -= 1;

      if (moveDir !== 0) {
        const stepM = moveDir * moveSpeed * dt;
        const metersPerDegLat = 111320;
        const metersPerDegLng = Math.max(1000, 111320 * Math.cos(lat * Math.PI / 180));
        lat = Math.max(-85, Math.min(85, lat + (-Math.cos(heading) * stepM) / metersPerDegLat));
        lng = wrapLng(lng + (Math.sin(heading) * stepM) / metersPerDegLng);
        renderMapPose();
      } else {
        refreshHud();
      }
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function startMap(){
    if (!window.mapkit) {
      setStatus('MapKit script did not load. Check internet.');
      return;
    }

    const token = tokenInput.value.trim();
    if (!token) {
      setStatus('Paste a MapKit JWT token, then click Start.');
      return;
    }

    localStorage.setItem('MAPKIT_JWT', token);

    try {
      mapkit.init({ authorizationCallback: (done) => done(token) });
      map = new mapkit.Map('map', {
        mapType: mapkit.Map.MapTypes.Standard,
        isZoomEnabled: true,
        isScrollEnabled: true,
        isRotationEnabled: false,
        showsCompass: mapkit.FeatureVisibility.Visible
      });

      const center = new mapkit.Coordinate(lat, lng);
      marker = new mapkit.MarkerAnnotation(center, { title:'RangerFly', color:'#ff5a3a', glyphText:'T' });
      map.addAnnotation(marker);

      started = true;
      renderMapPose();
      setStatus('MapKit running. Tank controls active.');
    } catch (err) {
      setStatus('MapKit init failed. Token may be invalid for this domain.');
    }
  }

  startBtn.addEventListener('click', startMap);
  clearBtn.addEventListener('click', () => {
    localStorage.removeItem('MAPKIT_JWT');
    tokenInput.value = '';
    setStatus('Token cleared.');
  });

  tokenFile.addEventListener('change', async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try {
      const txt = await f.text();
      const token = txt.trim();
      if (!token) {
        setStatus('Selected token file is empty.');
        return;
      }
      tokenInput.value = token;
      localStorage.setItem('MAPKIT_JWT', token);
      setStatus(`Token loaded from file: ${f.name}`);
    } catch {
      setStatus('Could not read token file.');
    } finally {
      e.target.value = '';
    }
  });

  setStatus(location.protocol === 'file:'
    ? 'Running on file://. If token fails, run via http://localhost.'
    : 'Ready. Paste token and press Start.');
  refreshHud();
})();
</script>
</body>
</html>
