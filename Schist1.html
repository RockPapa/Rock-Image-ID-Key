<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Granite Gneiss Spot (Template)</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background-color: black;
  overflow-y: auto;
}

.container {
  position: relative;
  width: min(600px, 100%);
  margin: 0 auto;
}

img {
  width: 100%;
  height: auto;
  display: block;
}

/* -------------------------------------------------
   Bottom nav button (UNCHANGED)
------------------------------------------------- */
.nav-btn {
  position: absolute;
  top: 98%;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 600px;
  height: 65px;
  background: linear-gradient(180deg, #1b4fd6 0%, #002b80 100%);
  color: #f5f7ff;
  border: 1.5px solid #001f5f;
  border-radius: 8px;
  font-size: 1.05rem;
  font-weight: 600;
  text-align: center;
  line-height: 48px;
  cursor: pointer;
  box-shadow: 0 0 14px rgba(0, 85, 255, 0.45);
  animation: gentlePulse 4s infinite ease-in-out;
  z-index: 5;
}

@keyframes gentlePulse {
  0% { box-shadow: 0 0 10px rgba(0,80,255,0.35); }
  50% { box-shadow: 0 0 18px rgba(0,120,255,0.55); }
  100% { box-shadow: 0 0 10px rgba(0,80,255,0.35); }
}

/* =================================================
   🪨 MINERAL BUTTONS — DISABLED TEMPLATE MODE
   (kept for future re-enable)
================================================= */
.mineral-btn {
  position: absolute;

  /* 🔒 DISABLED STATE */
  pointer-events: none;   /* no clicking */
  opacity: 0;             /* invisible */
  background: transparent;
  border: none;

  /* retained structure */
  border-radius: 10px;
  z-index: 4;
}

/* -------------------------------------------------
   Modal (kept but unreachable)
------------------------------------------------- */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal img {
  max-width: 90vw;
  max-height: 85vh;
  border-radius: 12px;
}

.close-btn {
  position: fixed;
  top: 12px;
  right: 14px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid white;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 26px;
  font-weight: 800;
  cursor: pointer;
  z-index: 10000;
}
</style>
</head>

<body>
/&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&/
<div class="container">
  <img src="images/schist1.jpg" alt="Granite">

  <!-- =========================================
       Mineral Buttons (DISABLED but preserved)
  ========================================== -->
  <button id="btnQuartz" class="mineral-btn"></button>
  <button id="btnFeldspar" class="mineral-btn"></button>
  <button id="btnSodiumFeldspar" class="mineral-btn"></button>
  <button id="btnBiotite" class="mineral-btn"></button>
  <button id="btnMuscovite" class="mineral-btn"></button>

  <!-- Bottom nav button -->
  <button class="nav-btn" onclick="navigate('Schist.html')">
    Tap for More Info
  </button>
</div>

<!-- Modal (kept for future) -->
<div id="modal" class="modal">
  <button class="close-btn">×</button>
  <img id="modalImg" src="">
</div>

<script>
function navigate(page) {
  window.location.href = page;
}

/* =========================================================
   🎛️ MINERAL POSITIONS — TEMPLATE DATA (UNCHANGED)
   ========================================================= */
const mineralButtons = [
  { id: "btnQuartz",    top: 71.5, left: 4, width: 29, height: 2.5 },
  { id: "btnFeldspar",  top: 75.5, left: 5, width: 75, height: 2.5 },
  { id: "btnSodiumFeldspar", top: 81.3, left: 5, width: 84, height: 2.5 },
  { id: "btnBiotite",   top: 85.5, left: 5, width: 75, height: 2.1 },
  { id: "btnMuscovite", top: 89.5, left: 5, width: 75, height: 2.1 }
];

function applyButtonPositions() {
  mineralButtons.forEach(b => {
    const el = document.getElementById(b.id);
    if (!el) return;
    el.style.top = b.top + "%";
    el.style.left = b.left + "%";
    el.style.width = b.width + "%";
    el.style.height = b.height + "%";
  });
}

window.addEventListener("load", applyButtonPositions);
window.addEventListener("resize", applyButtonPositions);
</script>

</body>
</html>
