function buildSpawnHalfCavePathWorld(){
  if(!SPAWN_CAVE_ENABLE) return null;

  const ft = WORLD_UNITS_PER_FOOT;
  const radius = (SPAWN_CAVE_DIAMETER_FT * 0.5) * ft;
  const step = Math.max(1.0 * ft, SPAWN_CAVE_SEGMENT_FT * ft);
  const totalLen = Math.max(step, SPAWN_CAVE_LENGTH_FT * ft);
  const steps = Math.max(1, Math.ceil(totalLen / step));
  const heading = THREE.MathUtils.degToRad(SPAWN_CAVE_HEADING_DEG);

  // Terrain-following centerline: keeps half-cylinder sitting on ground along its full length.
  const centerX = CAVE_ANCHOR_X + (Math.cos(heading) * SPAWN_CAVE_START_OFFSET_FT * ft);
  const centerZ = CAVE_ANCHOR_Z + (Math.sin(heading) * SPAWN_CAVE_START_OFFSET_FT * ft);
  const halfLen = totalLen * 0.5;

  const startX = centerX - (Math.cos(heading) * halfLen);
  const startZ = centerZ - (Math.sin(heading) * halfLen);

  const pts = [];
  for(let i = 0; i <= steps; i++){
    const d = Math.min(totalLen, i * step);
    const x = startX + (Math.cos(heading) * d);
    const z = startZ + (Math.sin(heading) * d);
    const groundY = heightAtWorldXZ(x, z);
    const y = (Number.isFinite(groundY) ? groundY : 0) - (SPAWN_CAVE_BURY_FT * ft);
    pts.push(new THREE.Vector3(x, y, z));
  }
  return pts;
}

function ensureSpawnHalfCave(){
  if(!SPAWN_CAVE_ENABLE){
    spawnHalfCavePathWorld = null;
    if(spawnHalfCaveGroup && spawnHalfCaveGroup.parent === scene) scene.remove(spawnHalfCaveGroup);
    return;
  }

  if(!terrainReady) return;

  if(spawnHalfCaveGroup && spawnHalfCaveGroup.parent === scene && spawnHalfCavePathWorld && spawnHalfCavePathWorld.length > 1){
    return;
  }

  const pointsWorld = buildSpawnHalfCavePathWorld();
  if(!pointsWorld || pointsWorld.length < 2) return;
  spawnHalfCavePathWorld = pointsWorld;

  const ft = WORLD_UNITS_PER_FOOT;
  const radius = (SPAWN_CAVE_DIAMETER_FT * 0.5) * ft;
  const wallThickness = Math.max(0.05 * ft, SPAWN_CAVE_WALL_THICKNESS_FT * ft);
  const innerRadius = Math.max(0.25 * ft, radius - wallThickness);

  if(spawnHalfCaveGroup && spawnHalfCaveGroup.parent === scene) scene.remove(spawnHalfCaveGroup);

  spawnHalfCaveGroup = new THREE.Group();
  spawnHalfCaveGroup.name = "spawnHalfCave";
  spawnHalfCaveGroup.frustumCulled = false;

  if(!spawnHalfCaveInnerTex && SPAWN_CAVE_INNER_TEXTURE_FILE){
    spawnHalfCaveInnerTex = texLoader.load(
      TEX_DIR + SPAWN_CAVE_INNER_TEXTURE_FILE,
      (t)=>{
        t.colorSpace = THREE.SRGBColorSpace;
        t.wrapS = t.wrapT = THREE.RepeatWrapping;
      },
      undefined,
      ()=>{
        if(!spawnHalfCaveInnerTexWarned){
          hudLine("⚠️ Missing cave inner texture: <code>" + SPAWN_CAVE_INNER_TEXTURE_FILE + "</code> (using black).");
          spawnHalfCaveInnerTexWarned = true;
        }
      }
    );
  }

  const caveOuterMap = getCaveExteriorRockTexture();
  const caveInnerMap = makeCaveInteriorMap(Math.max(1.0 * ft, SPAWN_CAVE_SEGMENT_FT * ft), 0.5 * Math.PI * innerRadius);

  const outerMat = new THREE.MeshStandardMaterial({
    map: caveOuterMap || null,
    color: 0x6f727a,
    roughness: 0.86,
    metalness: 0.02,
    side: THREE.FrontSide
  });

  const innerMat = new THREE.MeshStandardMaterial({
    color: caveInnerMap ? 0xffffff : 0x000000,
    map: caveInnerMap || null,
    roughness: 0.98,
    metalness: 0.0,
    side: THREE.BackSide
  });

  for(let i = 0; i < (pointsWorld.length - 1); i++){
    const a = pointsWorld[i];
    const b = pointsWorld[i + 1];
    const seg = new THREE.Vector3().subVectors(b, a);
    const segLen = seg.length();
    if(segLen <= 1e-5) continue;

    const segDir = seg.clone().normalize();
    const mid = new THREE.Vector3().copy(a).addScaledVector(seg, 0.5);
    const yaw = Math.atan2(segDir.z, segDir.x);

    const outerGeo = new THREE.CylinderGeometry(radius, radius, segLen + (0.40 * ft), 64, 1, true, 0, Math.PI);
    const innerGeo = new THREE.CylinderGeometry(innerRadius, innerRadius, segLen + (0.45 * ft), 64, 1, true, 0, Math.PI);
    remapCaveUVForCylinderInterior(innerGeo, segLen + (0.45 * ft));

    const outerMesh = new THREE.Mesh(outerGeo, outerMat);
    const innerMesh = new THREE.Mesh(innerGeo, innerMat);

    outerMesh.rotation.z = Math.PI * 0.5;
    innerMesh.rotation.z = Math.PI * 0.5;
    outerMesh.rotation.y = yaw;
    innerMesh.rotation.y = yaw;

    outerMesh.castShadow = true;
    outerMesh.receiveShadow = true;
    innerMesh.castShadow = false;
    innerMesh.receiveShadow = true;

    outerMesh.position.copy(mid);
    innerMesh.position.copy(mid);

    spawnHalfCaveGroup.add(outerMesh);
    spawnHalfCaveGroup.add(innerMesh);
  }

  scene.add(spawnHalfCaveGroup);

  if(!spawnHalfCaveAnnounced){
    hudLine("🕳️ Spawn cave segment created: <code>50ft long x 10ft diameter</code> (half-hollow cylinder, black inner wall collision surface).");
    spawnHalfCaveAnnounced = true;
  }
}

function makeCaveInteriorMap(uWorld, vWorld){
  const base = getCaveInteriorTexture();
  if(!base) return null;

  const map = base.clone();
  map.colorSpace = THREE.SRGBColorSpace;
  map.wrapS = THREE.RepeatWrapping;
  map.wrapT = THREE.RepeatWrapping;
  map.anisotropy = Math.min(16, renderer.capabilities.getMaxAnisotropy());

  const uSpan = Math.max(1e-4, uWorld);
  const vSpan = Math.max(1e-4, vWorld);
  const tileU = Math.max(1.0 * WORLD_UNITS_PER_FOOT, CAVE_INTERIOR_TILE_WIDTH_FT * WORLD_UNITS_PER_FOOT);
  const repeatU = Math.max(1, Math.ceil(uSpan / tileU));
  const repeatV = Math.max(1, Math.ceil((vSpan * CAVE_INTERIOR_TEXTURE_ASPECT * repeatU) / uSpan));

  map.repeat.set(repeatU, repeatV);
  map.needsUpdate = true;
  return map;
}

function remapCaveUVForCylinderInterior(geo, lengthWorld){
  if(!geo || !geo.attributes || !geo.attributes.position || !geo.attributes.uv) return;
  const pos = geo.attributes.position;
  const uv = geo.attributes.uv;
  const len = Math.max(1e-4, lengthWorld);

  for(let i = 0; i < pos.count; i++){
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);
    const r = Math.hypot(x, z);

    const u = (y / len) + 0.5; // length axis
    const upDot = (r > 1e-6) ? (x / r) : 0.0; // local +X maps to world up after Z-rotation
    const v = Math.max(0.0, Math.min(1.0, Math.abs(upDot))); // sides=0, roof/floor center=1 (prevents lower-wall blur)

    uv.setXY(i, u, v);
  }

  uv.needsUpdate = true;
}

function remapCaveUVForTubeInterior(geo){
  if(!geo || !geo.attributes || !geo.attributes.uv || !geo.attributes.normal) return;
  const uv = geo.attributes.uv;
  const normal = geo.attributes.normal;

  for(let i = 0; i < uv.count; i++){
    const u = uv.getX(i); // tube geometry already maps U along path length
    const upDot = normal.getY(i);
    const v = Math.max(0.0, Math.min(1.0, Math.abs(upDot))); // sides=0, roof/floor center=1 (prevents lower-wall blur)
    uv.setXY(i, u, v);
  }

  uv.needsUpdate = true;
}

function ensureSpawnFullCylinder(){

  }

  const ft = WORLD_UNITS_PER_FOOT;

  const len = Math.max(2.0 * ft, SPAWN_FULL_CYL_LENGTH_FT * ft);
  const heading = THREE.MathUtils.degToRad(SPAWN_FULL_CYL_HEADING_DEG);

  const fwdX = Math.cos(heading);
  const fwdZ = Math.sin(heading);
  const rightX = -fwdZ;
  const rightZ = fwdX;

  const cx = CAVE_ANCHOR_X + (fwdX * SPAWN_FULL_CYL_OFFSET_FWD_FT * ft) + (rightX * SPAWN_FULL_CYL_OFFSET_RIGHT_FT * ft);
  const cz = CAVE_ANCHOR_Z + (fwdZ * SPAWN_FULL_CYL_OFFSET_FWD_FT * ft) + (rightZ * SPAWN_FULL_CYL_OFFSET_RIGHT_FT * ft);
  const groundY = heightAtWorldXZ(cx, cz);
  const cy = (Number.isFinite(groundY) ? groundY : 0) + radius - (SPAWN_FULL_CYL_BURY_FT * ft);

  const outerGeo = new THREE.CylinderGeometry(radius, radius, len, 72, 1, true, 0, Math.PI * 2);
  const innerGeo = new THREE.CylinderGeometry(innerRadius, innerRadius, len + (0.2 * ft), 72, 1, true, 0, Math.PI * 2);
  remapCaveUVForCylinderInterior(innerGeo, len + (0.2 * ft));

  const caveOuterMap = getCaveExteriorRockTexture();
  const caveInnerMap = makeCaveInteriorMap(len, 0.5 * Math.PI * innerRadius);

  const outerMat = new THREE.MeshStandardMaterial({
    map: caveOuterMap || null,
    color: 0x6f727a,
    roughness: 0.86,
    metalness: 0.02,
    side: THREE.FrontSide
  });

  const innerMat = new THREE.MeshStandardMaterial({
    color: caveInnerMap ? 0xffffff : 0x000000,
    map: caveInnerMap || null,
    roughness: 0.98,
    metalness: 0.0,
    side: THREE.BackSide
  });

  const outerMesh = new THREE.Mesh(outerGeo, outerMat);
  const innerMesh = new THREE.Mesh(innerGeo, innerMat);

  outerMesh.rotation.z = Math.PI * 0.5;
  innerMesh.rotation.z = Math.PI * 0.5;
  outerMesh.rotation.y = heading;
  innerMesh.rotation.y = heading;

  outerMesh.position.set(cx, cy, cz);
  innerMesh.position.set(cx, cy, cz);

  outerMesh.castShadow = true;
  outerMesh.receiveShadow = true;
  innerMesh.castShadow = false;
  innerMesh.receiveShadow = true;

  spawnFullCylGroup = new THREE.Group();
  spawnFullCylGroup.name = "spawnFullCylinder";
  spawnFullCylGroup.frustumCulled = false;
  spawnFullCylGroup.add(outerMesh);
  spawnFullCylGroup.add(innerMesh);

  const halfLen = len * 0.5;
  spawnFullCylPathWorld = [
    new THREE.Vector3(cx - (fwdX * halfLen), cy, cz - (fwdZ * halfLen)),
    new THREE.Vector3(cx + (fwdX * halfLen), cy, cz + (fwdZ * halfLen))
  ];
  spawnFullCylInnerRadius = innerRadius;

  scene.add(spawnFullCylGroup);

  if(!spawnFullCylAnnounced){
    hudLine("🕳️ Full tunnel created: <code>50ft long x 20ft diameter</code> (hollow cylinder, black interior).");

  }
}

function ensureSpawnCurvedFullCylinder(){
  if(!SPAWN_CURVED_CYL_ENABLE){
    if(spawnCurvedCylGroup && spawnCurvedCylGroup.parent === scene) scene.remove(spawnCurvedCylGroup);
    spawnCurvedCylPathWorld = null;
    spawnCurvedCylInnerRadius = 0.0;
    return;
  }

  if(!terrainReady) return;
  if(spawnCurvedCylGroup && spawnCurvedCylGroup.parent === scene) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const outerRadius = (SPAWN_CURVED_CYL_DIAMETER_FT * 0.5) * ft;
  const wallThickness = Math.max(0.05 * ft, SPAWN_CURVED_CYL_WALL_THICKNESS_FT * ft);
  const innerRadius = Math.max(0.25 * ft, outerRadius - wallThickness);
  const totalLen = Math.max(2.0 * ft, SPAWN_CURVED_CYL_LENGTH_FT * ft);
  const turnRad = THREE.MathUtils.degToRad(Math.max(1.0, Math.min(170.0, SPAWN_CURVED_CYL_TURN_DEG)));
  const curveRadius = totalLen / turnRad; // arc length = radius * angle

  const heading = THREE.MathUtils.degToRad(SPAWN_FULL_CYL_HEADING_DEG);
  const fwdX = Math.cos(heading);
  const fwdZ = Math.sin(heading);
  const rightX = -fwdZ;
  const rightZ = fwdX;

  const straightCx = CAVE_ANCHOR_X + (fwdX * SPAWN_FULL_CYL_OFFSET_FWD_FT * ft) + (rightX * SPAWN_FULL_CYL_OFFSET_RIGHT_FT * ft);
  const straightCz = CAVE_ANCHOR_Z + (fwdZ * SPAWN_FULL_CYL_OFFSET_FWD_FT * ft) + (rightZ * SPAWN_FULL_CYL_OFFSET_RIGHT_FT * ft);
  const straightHalfLen = (SPAWN_FULL_CYL_LENGTH_FT * ft) * 0.5;
  const straightRadius = (SPAWN_FULL_CYL_DIAMETER_FT * 0.5) * ft;
  const straightGroundY = heightAtWorldXZ(straightCx, straightCz);
  const straightCy = (Number.isFinite(straightGroundY) ? straightGroundY : 0) + straightRadius - (SPAWN_FULL_CYL_BURY_FT * ft);

  // Overlap slightly into the straight tunnel so the join is fully sealed.
  const seamOverlap = 1.0 * ft;
  const startX = straightCx + (fwdX * (straightHalfLen - seamOverlap));
  const startZ = straightCz + (fwdZ * (straightHalfLen - seamOverlap));

  const turnSign = (SPAWN_CURVED_CYL_TURN_SIGN >= 0) ? 1 : -1;
  const centerX = startX + (rightX * turnSign * curveRadius);
  const centerZ = startZ + (rightZ * turnSign * curveRadius);

  const uX = -rightX * turnSign; // center->start radial basis
  const uZ = -rightZ * turnSign;
  const vX = fwdX;               // initial tangent basis
  const vZ = fwdZ;

  const segLen = Math.max(1.0 * ft, SPAWN_CURVED_CYL_SEGMENT_FT * ft);
  const segments = Math.max(12, Math.ceil(totalLen / segLen));
  const pts = [];

  for(let i = 0; i <= segments; i++){
    const t = i / segments;
    const a = turnRad * t;

    const basisX = (uX * Math.cos(a)) + (vX * Math.sin(a));
    const basisZ = (uZ * Math.cos(a)) + (vZ * Math.sin(a));

    const x = centerX + (basisX * curveRadius);
    const z = centerZ + (basisZ * curveRadius);
    const groundY = heightAtWorldXZ(x, z);
    const y = (Number.isFinite(groundY) ? groundY : 0) + outerRadius - (SPAWN_CURVED_CYL_BURY_FT * ft);
    pts.push(new THREE.Vector3(x, y, z));
  }

  // Hard-match seam height to the straight pipe centerline to avoid light leaks.
  if(pts.length){
    pts[0].y = straightCy;
  }

  const curve = new THREE.CatmullRomCurve3(pts, false, "centripetal", 0.5);
  const tubeSegs = Math.max(48, segments * 3);

  const outerGeo = new THREE.TubeGeometry(curve, tubeSegs, outerRadius, 56, false);
  const innerGeo = new THREE.TubeGeometry(curve, tubeSegs, innerRadius, 56, false);
  remapCaveUVForTubeInterior(innerGeo);

  const caveOuterMap = getCaveExteriorRockTexture();
  const caveInnerMap = makeCaveInteriorMap(totalLen, 0.5 * Math.PI * innerRadius);

  const outerMat = new THREE.MeshStandardMaterial({
    map: caveOuterMap || null,
    color: 0x6f727a,
    roughness: 0.86,
    metalness: 0.02,
    side: THREE.FrontSide
  });

  const innerMat = new THREE.MeshStandardMaterial({
    color: caveInnerMap ? 0xffffff : 0x000000,
    map: caveInnerMap || null,
    roughness: 0.98,
    metalness: 0.0,
    side: THREE.BackSide
  });

  const outerMesh = new THREE.Mesh(outerGeo, outerMat);
  const innerMesh = new THREE.Mesh(innerGeo, innerMat);

  outerMesh.castShadow = true;
  outerMesh.receiveShadow = true;
  innerMesh.castShadow = false;
  innerMesh.receiveShadow = true;

  // Short junction sleeve to seal any residual seam between straight and curved tubes.
  const seamLen = 4.0 * ft;
  const seamOuterGeo = new THREE.CylinderGeometry(outerRadius + (0.10 * ft), outerRadius + (0.10 * ft), seamLen, 56, 1, true, 0, Math.PI * 2);
  const seamInnerGeo = new THREE.CylinderGeometry(Math.max(0.25 * ft, innerRadius - (0.05 * ft)), Math.max(0.25 * ft, innerRadius - (0.05 * ft)), seamLen + (0.20 * ft), 56, 1, true, 0, Math.PI * 2);
  remapCaveUVForCylinderInterior(seamInnerGeo, seamLen + (0.20 * ft));
  const seamOuter = new THREE.Mesh(seamOuterGeo, outerMat);
  const seamInner = new THREE.Mesh(seamInnerGeo, innerMat);
  seamOuter.rotation.z = Math.PI * 0.5;
  seamInner.rotation.z = Math.PI * 0.5;
  seamOuter.rotation.y = heading;
  seamInner.rotation.y = heading;
  seamOuter.position.set(startX, straightCy, startZ);
  seamInner.position.set(startX, straightCy, startZ);
  seamOuter.castShadow = true;
  seamOuter.receiveShadow = true;
  seamInner.castShadow = false;
  seamInner.receiveShadow = true;

  spawnCurvedCylGroup = new THREE.Group();
  spawnCurvedCylGroup.name = "spawnCurvedFullCylinder";
  spawnCurvedCylGroup.frustumCulled = false;
  spawnCurvedCylGroup.add(outerMesh);
  spawnCurvedCylGroup.add(innerMesh);
  spawnCurvedCylGroup.add(seamOuter);
  spawnCurvedCylGroup.add(seamInner);

  spawnCurvedCylPathWorld = pts.map((v)=>v.clone());
  spawnCurvedCylInnerRadius = innerRadius;

  scene.add(spawnCurvedCylGroup);

  if(!spawnCurvedCylAnnounced){
    hudLine("🌀 Curved tunnel created: <code>50ft long x 20ft diameter</code>, <code>45°</code> gentle bend, black interior.");
    spawnCurvedCylAnnounced = true;
  }
}

function ensureSpawnMegaCaveSystem(){
  if(!SPAWN_MEGA_CAVE_ENABLE){
    if(spawnMegaCaveGroup && spawnMegaCaveGroup.parent === scene) scene.remove(spawnMegaCaveGroup);
    spawnMegaCavePathWorld = null;
    spawnMegaCaveInnerRadius = 0.0;
    return;
  }

  if(!terrainReady) return;
  if(spawnMegaCaveGroup && spawnMegaCaveGroup.parent === scene) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const outerRadius = (SPAWN_MEGA_CAVE_DIAMETER_FT * 0.5) * ft;
  const wallThickness = Math.max(0.05 * ft, SPAWN_MEGA_CAVE_WALL_THICKNESS_FT * ft);
  const innerRadius = Math.max(0.25 * ft, outerRadius - wallThickness);
  const targetLen = Math.max(50.0 * ft, SPAWN_MEGA_CAVE_TOTAL_LENGTH_FT * ft);
  const stepLen = Math.max(1.0 * ft, SPAWN_MEGA_CAVE_SEGMENT_FT * ft);

  const heading0 = THREE.MathUtils.degToRad(SPAWN_MEGA_CAVE_HEADING_DEG);
  const fwd0X = Math.cos(heading0);
  const fwd0Z = Math.sin(heading0);
  const right0X = -fwd0Z;
  const right0Z = fwd0X;

  // Start near the forward mouth of the straight section, then continue into a long winding system.
  const straightCx = CAVE_ANCHOR_X + (fwd0X * SPAWN_FULL_CYL_OFFSET_FWD_FT * ft) + (right0X * SPAWN_FULL_CYL_OFFSET_RIGHT_FT * ft);
  const straightCz = CAVE_ANCHOR_Z + (fwd0Z * SPAWN_FULL_CYL_OFFSET_FWD_FT * ft) + (right0Z * SPAWN_FULL_CYL_OFFSET_RIGHT_FT * ft);
  const straightHalfLen = (SPAWN_FULL_CYL_LENGTH_FT * ft) * 0.5;

  let x = straightCx + (fwd0X * (straightHalfLen + (SPAWN_MEGA_CAVE_OFFSET_FWD_FT * ft))) + (right0X * SPAWN_MEGA_CAVE_OFFSET_RIGHT_FT * ft);
  let z = straightCz + (fwd0Z * (straightHalfLen + (SPAWN_MEGA_CAVE_OFFSET_FWD_FT * ft))) + (right0Z * SPAWN_MEGA_CAVE_OFFSET_RIGHT_FT * ft);
  let heading = heading0;

  const points = [];
  const pushTerrainPoint = (px, pz)=>{
    const gy = heightAtWorldXZ(px, pz);
    const py = (Number.isFinite(gy) ? gy : 0) + outerRadius - (SPAWN_MEGA_CAVE_BURY_FT * ft);
    points.push(new THREE.Vector3(px, py, pz));
  };

  pushTerrainPoint(x, z);
  let consumed = 0.0;

  const script = [
    { type: "straight", lenFt: 80 },
    { type: "turn", deg: 45, radiusFt: 80 },
    { type: "straight", lenFt: 60 },
    { type: "turn", deg: 45, radiusFt: 80 }, // 90 via two 45s (right)
    { type: "straight", lenFt: 70 },
    { type: "turn", deg: -45, radiusFt: 70 },
    { type: "straight", lenFt: 50 },
    { type: "turn", deg: -45, radiusFt: 70 }, // 90 via two 45s (left)
    { type: "straight", lenFt: 70 },
    { type: "turn", deg: 180, radiusFt: 55 }, // 180 curve
    { type: "straight", lenFt: 55 },
    { type: "turn", deg: -45, radiusFt: 75 },
    { type: "straight", lenFt: 45 },
    { type: "turn", deg: 45, radiusFt: 75 },
    { type: "straight", lenFt: 40 },
    { type: "turn", deg: 45, radiusFt: 70 },
    { type: "straight", lenFt: 35 },
    { type: "turn", deg: -45, radiusFt: 70 },
    { type: "straight", lenFt: 30 }
  ];

  const addStraight = (lenWorld)=>{
    const remain = targetLen - consumed;
    const useLen = Math.max(0, Math.min(lenWorld, remain));
    if(useLen <= 1e-6) return;

    const steps = Math.max(1, Math.ceil(useLen / stepLen));
    const hx = Math.cos(heading);
    const hz = Math.sin(heading);

    for(let i = 1; i <= steps; i++){
      const d = useLen * (i / steps);
      const px = x + (hx * d);
      const pz = z + (hz * d);
      pushTerrainPoint(px, pz);
    }

    x += hx * useLen;
    z += hz * useLen;
    consumed += useLen;
  };

  const addArc = (deg, radiusWorld)=>{
    const remain = targetLen - consumed;
    if(remain <= 1e-6) return;

    const sign = (deg >= 0) ? 1 : -1;
    let a = Math.abs(THREE.MathUtils.degToRad(deg));
    let arcLen = radiusWorld * a;
    if(arcLen > remain){
      arcLen = remain;
      a = arcLen / Math.max(1e-6, radiusWorld);
    }
    if(a <= 1e-6) return;

    const fwdX = Math.cos(heading), fwdZ = Math.sin(heading);
    const rightX = -fwdZ, rightZ = fwdX;
    const cX = x + (rightX * sign * radiusWorld);
    const cZ = z + (rightZ * sign * radiusWorld);

    const uX = -rightX * sign;
    const uZ = -rightZ * sign;
    const vX = fwdX;
    const vZ = fwdZ;

    const steps = Math.max(3, Math.ceil(arcLen / stepLen));
    for(let i = 1; i <= steps; i++){
      const t = i / steps;
      const ang = a * t;
      const bX = (uX * Math.cos(ang)) + (vX * Math.sin(ang));
      const bZ = (uZ * Math.cos(ang)) + (vZ * Math.sin(ang));
      const px = cX + (bX * radiusWorld);
      const pz = cZ + (bZ * radiusWorld);
      pushTerrainPoint(px, pz);
    }

    const last = points[points.length - 1];
    x = last.x;
    z = last.z;

    const tX = (-uX * Math.sin(a)) + (vX * Math.cos(a));
    const tZ = (-uZ * Math.sin(a)) + (vZ * Math.cos(a));
    heading = Math.atan2(tZ, tX);

    consumed += arcLen;
  };

  for(const cmd of script){
    if(consumed >= targetLen) break;
    if(cmd.type === "straight") addStraight(Math.max(0, cmd.lenFt) * ft);
    else if(cmd.type === "turn") addArc(cmd.deg || 0, Math.max(10.0 * ft, (cmd.radiusFt || 60) * ft));
  }

  if(consumed < targetLen){
    addStraight(targetLen - consumed);
  }

  if(points.length < 4) return;

  const curve = new THREE.CatmullRomCurve3(points, false, "centripetal", 0.5);
  const tubeSegs = Math.max(300, Math.ceil(points.length * 1.6));

  const outerGeo = new THREE.TubeGeometry(curve, tubeSegs, outerRadius, 64, false);
  const innerGeo = new THREE.TubeGeometry(curve, tubeSegs, innerRadius, 64, false);
  remapCaveUVForTubeInterior(innerGeo);

  const caveOuterMap = getCaveExteriorRockTexture();
  const caveInnerMap = makeCaveInteriorMap(targetLen, 0.5 * Math.PI * innerRadius);

  const outerMat = new THREE.MeshStandardMaterial({
    map: caveOuterMap || null,
    color: 0x6f727a,
    roughness: 0.86,
    metalness: 0.02,
    side: THREE.FrontSide
  });

  const innerMat = new THREE.MeshStandardMaterial({
    color: caveInnerMap ? 0xffffff : 0x000000,
    map: caveInnerMap || null,
    roughness: 0.98,
    metalness: 0.0,
    side: THREE.BackSide
  });

  const outerMesh = new THREE.Mesh(outerGeo, outerMat);
  const innerMesh = new THREE.Mesh(innerGeo, innerMat);

  outerMesh.castShadow = true;
  outerMesh.receiveShadow = true;
  innerMesh.castShadow = false;
  innerMesh.receiveShadow = true;

  spawnMegaCaveGroup = new THREE.Group();
  spawnMegaCaveGroup.name = "spawnMegaCaveSystem1000";
  spawnMegaCaveGroup.frustumCulled = false;
  spawnMegaCaveGroup.add(outerMesh);
  spawnMegaCaveGroup.add(innerMesh);

  spawnMegaCavePathWorld = points.map((v)=>v.clone());
  spawnMegaCaveInnerRadius = innerRadius;

  scene.add(spawnMegaCaveGroup);

  if(!spawnMegaCaveAnnounced){
    hudLine("🧭 Mega cave system created: <code>1000ft</code> total, mixed left/right turns incl. <code>45°</code>, <code>90°</code>, and <code>180°</code>, all buried <code>4ft</code>.");
    spawnMegaCaveAnnounced = true;
  }
}

function ensurePuebloPlanWalls(){
  if(!PUEBLO_PLAN_WALLS_ENABLE || !puebloTestCube){
    if(puebloPlanWallsGroup && puebloPlanWallsGroup.parent === scene) scene.remove(puebloPlanWallsGroup);
    return;
  }

  if(!puebloPlanWallsGroup){
    puebloPlanWallsGroup = new THREE.Group();
    puebloPlanWallsGroup.name = "puebloPlanWalls";

    if(!puebloPlanWallTexBase){
      puebloPlanWallTexBase = texLoader.load(
        TEX_DIR + "facade1.png",
        (t)=>{
          t.colorSpace = THREE.SRGBColorSpace;
          t.wrapS = t.wrapT = THREE.RepeatWrapping;
        },
        undefined,
        ()=>{
          if(!puebloPlanWallTexWarned){
            hudLine("⚠️ Missing wall texture: <code>facade1.png</code> (using fallback color).");
            puebloPlanWallTexWarned = true;
          }
        }
      );
      puebloPlanWallTexBase.colorSpace = THREE.SRGBColorSpace;
      puebloPlanWallTexBase.wrapS = puebloPlanWallTexBase.wrapT = THREE.RepeatWrapping;
    }

    if(!puebloPlanWallTexOpposite){
      puebloPlanWallTexOpposite = texLoader.load(
        TEX_DIR + PUEBLO_PLAN_WALL_OPPOSITE_TEXTURE_FILE,
        (t)=>{
          t.colorSpace = THREE.SRGBColorSpace;
          t.wrapS = t.wrapT = THREE.RepeatWrapping;
        },
        undefined,
        ()=>{
          if(!puebloPlanWallTexOppositeWarned){
            hudLine("⚠️ Missing wall texture: <code>" + PUEBLO_PLAN_WALL_OPPOSITE_TEXTURE_FILE + "</code> (using facade texture).");
            puebloPlanWallTexOppositeWarned = true;
          }
        }
      );
      puebloPlanWallTexOpposite.colorSpace = THREE.SRGBColorSpace;
      puebloPlanWallTexOpposite.wrapS = puebloPlanWallTexOpposite.wrapT = THREE.RepeatWrapping;
    }

    for(let segIdx = 0; segIdx < PUEBLO_PLAN_WALL_SEGMENTS_FT.length; segIdx++){
      const seg = PUEBLO_PLAN_WALL_SEGMENTS_FT[segIdx];
      const a = seg[0], b = seg[1];
      const ax = a.x * WORLD_UNITS_PER_FOOT;
      const az = a.z * WORLD_UNITS_PER_FOOT;
      const bx = b.x * WORLD_UNITS_PER_FOOT;
      const bz = b.z * WORLD_UNITS_PER_FOOT;
      const dx = bx - ax;
      const dz = bz - az;
      const len = Math.max(0.01, Math.hypot(dx, dz));
      const midX = (ax + bx) * 0.5;
      const midZ = (az + bz) * 0.5;

      const wallGeo = new THREE.BoxGeometry(PUEBLO_PLAN_WALL_THICKNESS, PUEBLO_PLAN_WALL_HEIGHT, len);

      let wallMap = null;
      const sourceTex = (segIdx === PUEBLO_PLAN_WALL_OPPOSITE_ENTRANCE_SEGMENT_INDEX && puebloPlanWallTexOpposite)
        ? puebloPlanWallTexOpposite
        : puebloPlanWallTexBase;

      if(sourceTex){
        wallMap = sourceTex.clone();
        wallMap.colorSpace = THREE.SRGBColorSpace;
        wallMap.wrapS = wallMap.wrapT = THREE.RepeatWrapping;
        const repLen = Math.max(1, Math.round(len / (TRUCK_W * PUEBLO_TRUCK_LENGTHS_PER_10FT)));
        const repH = Math.max(1, Math.round(PUEBLO_PLAN_WALL_HEIGHT / (TRUCK_W * PUEBLO_TRUCK_LENGTHS_PER_10FT)));
        wallMap.repeat.set(repLen, repH);
        wallMap.needsUpdate = true;
      }

      const wallMat = new THREE.MeshStandardMaterial({
        map: wallMap,
        color: wallMap ? 0xffffff : 0xef4a3b,
        roughness: 0.62,
        metalness: 0.05
      });
      const wallMesh = new THREE.Mesh(wallGeo, wallMat);
      wallMesh.castShadow = true;
      wallMesh.receiveShadow = true;
      wallMesh.frustumCulled = false;
      wallMesh.rotation.y = Math.atan2(dx, dz);
      wallMesh.userData.localX = midX;
      wallMesh.userData.localZ = midZ;
      puebloPlanWallsGroup.add(wallMesh);
    }

    scene.add(puebloPlanWallsGroup);
  }

  if(puebloPlanWallsGroup.parent !== scene) scene.add(puebloPlanWallsGroup);
  puebloPlanWallsGroup.visible = true;

  const topY = puebloTestCube.position.y + (PUEBLO_TEST_CUBE_H * 0.5);
  for(const wall of puebloPlanWallsGroup.children){
    wall.position.set(
      puebloTestCube.position.x + (wall.userData.localX || 0),
      topY + (PUEBLO_PLAN_WALL_HEIGHT * 0.5),
      puebloTestCube.position.z + (wall.userData.localZ || 0)
    );
  }
}

    const lowerLip = new THREE.Mesh(new THREE.TorusGeometry(14.4*ft, 0.65*ft, 16, 48), stoneMat);
    lowerLip.rotation.x = Math.PI * 0.5;
    lowerLip.position.y = 5.6*ft;
    puebloCenterFountainGroup.add(lowerLip);

    const lowerWater = new THREE.Mesh(new THREE.CylinderGeometry(12.4*ft, 12.4*ft, 0.55*ft, 40), waterMat);
    lowerWater.position.y = 4.9*ft;
    lowerWater.userData.baseY = lowerWater.position.y;
    lowerWater.userData.isFountainWater = true;
    puebloCenterFountainGroup.add(lowerWater);

    const centerPedestal = new THREE.Mesh(new THREE.CylinderGeometry(3.2*ft, 4.2*ft, 8.0*ft, 24), stoneMat);
    centerPedestal.position.y = 9.2*ft;
    puebloCenterFountainGroup.add(centerPedestal);

    const upperBasin = new THREE.Mesh(new THREE.CylinderGeometry(6.0*ft, 7.5*ft, 2.2*ft, 36, 1, true), stoneMat);
    upperBasin.position.y = 13.2*ft;
    puebloCenterFountainGroup.add(upperBasin);

    const upperLip = new THREE.Mesh(new THREE.TorusGeometry(6.9*ft, 0.45*ft, 14, 36), stoneMat);
    upperLip.rotation.x = Math.PI * 0.5;
    upperLip.position.y = 14.1*ft;
    puebloCenterFountainGroup.add(upperLip);

    const upperWater = new THREE.Mesh(new THREE.CylinderGeometry(5.5*ft, 5.5*ft, 0.35*ft, 28), waterMat);
    upperWater.position.y = 13.7*ft;
    upperWater.userData.baseY = upperWater.position.y;

      const fluted = new THREE.Mesh(new THREE.BoxGeometry(0.4*ft, 5.5*ft, 0.65*ft), stoneMat);

      const statueBase = new THREE.Mesh(new THREE.CylinderGeometry(1.1*ft, 1.35*ft, 2.1*ft, 14), darkStoneMat);
      statueBase.position.set(Math.cos(a) * 8.6*ft, 6.7*ft, Math.sin(a) * 8.6*ft);
      puebloCenterFountainGroup.add(statueBase);

      const statueBody = new THREE.Mesh(new THREE.ConeGeometry(0.95*ft, 2.3*ft, 14), accentMats[i % accentMats.length]);
      statueBody.position.set(Math.cos(a) * 8.6*ft, 8.8*ft, Math.sin(a) * 8.6*ft);
      puebloCenterFountainGroup.add(statueBody);

    const finialBall = new THREE.Mesh(new THREE.SphereGeometry(1.0*ft, 18, 16), goldMat);
    finialBall.position.y = 21.6*ft;
    puebloCenterFountainGroup.add(finialBall);

    const finialCone = new THREE.Mesh(new THREE.ConeGeometry(0.65*ft, 1.6*ft, 14), goldMat);
    finialCone.position.y = 23.0*ft;
    puebloCenterFountainGroup.add(finialCone);

    const centerPlume = new THREE.Mesh(new THREE.CylinderGeometry(0.16*ft, 0.23*ft, 8.0*ft, 12), waterMat.clone());
    centerPlume.position.y = 24.5*ft;
    centerPlume.userData.baseY = centerPlume.position.y;

      jet.userData.baseY = jet.position.y;
      jet.userData.baseH = 2.1*ft;
      jet.userData.phase = a;
      jet.userData.isFountainWater = true;
      jet.rotation.z = Math.PI * 0.08;
      jet.rotation.x = Math.PI * 0.08;
      puebloCenterFountainGroup.add(jet);
      jetMeshes.push(jet);
    }

    const cascadeMeshes = [];
    for(let i = 0; i < 4; i++){
      const a = (i / 4) * Math.PI * 2 + (Math.PI * 0.25);
      const sx = Math.cos(a) * 6.6 * ft;
      const sz = Math.sin(a) * 6.6 * ft;
      const sy = 13.9 * ft;
      const mx = Math.cos(a) * 8.8 * ft;
      const mz = Math.sin(a) * 8.8 * ft;
      const my = 10.4 * ft;
      const ex = Math.cos(a) * 11.0 * ft;
      const ez = Math.sin(a) * 11.0 * ft;
      const ey = 5.35 * ft;

      const curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(sx, sy, sz),
        new THREE.Vector3(mx, my, mz),
        new THREE.Vector3(ex, ey, ez)
      ]);
      const cascadeGeo = new THREE.TubeGeometry(curve, 24, PUEBLO_FOUNTAIN_CASCADE_RADIUS_FT * ft, 10, false);
      const cascade = new THREE.Mesh(cascadeGeo, waterMat.clone());

      cascade.userData.baseScale = 1.0;
      cascade.userData.baseOpacity = 0.64;
      cascade.userData.isFountainWater = true;
      puebloCenterFountainGroup.add(cascade);
      cascadeMeshes.push(cascade);

    puebloCenterFountainGroup.userData.upperWater = upperWater;
    puebloCenterFountainGroup.userData.centerPlume = centerPlume;
    puebloCenterFountainGroup.userData.jets = jetMeshes;
    puebloCenterFountainGroup.userData.cascades = cascadeMeshes;

    const pulseMaterials = [];
    const seenPulseMaterials = new Set();
    puebloCenterFountainGroup.traverse((obj)=>{
      if(!obj || !obj.isMesh) return;
      if(obj.userData && obj.userData.isFountainWater) return;
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      for(const mat of mats){
        if(!mat || !mat.color || seenPulseMaterials.has(mat)) continue;
        seenPulseMaterials.add(mat);
        mat.userData = mat.userData || {};
        if(!mat.userData.fountainPulseBaseColor) mat.userData.fountainPulseBaseColor = mat.color.clone();
        if(mat.emissive){
          if(!mat.userData.fountainPulseBaseEmissive) mat.userData.fountainPulseBaseEmissive = mat.emissive.clone();
          if(!Number.isFinite(mat.userData.fountainPulseBaseEmissiveIntensity)){
            mat.userData.fountainPulseBaseEmissiveIntensity = Number.isFinite(mat.emissiveIntensity) ? mat.emissiveIntensity : 1.0;
          }
        }
        pulseMaterials.push(mat);
      }
    });
    puebloCenterFountainGroup.userData.pulseMaterials = pulseMaterials;
    puebloCenterFountainGroup.userData.pulseColor = new THREE.Color(PUEBLO_FOUNTAIN_PULSE_COLOR_HEX);
    puebloCenterFountainGroup.userData.pulseBlend = 0.0;

    puebloCenterFountainGroup.traverse((obj)=>{
      if(obj && obj.isMesh){
        obj.castShadow = true;
        obj.receiveShadow = true;
        obj.frustumCulled = false;
      }
    });

    scene.add(puebloCenterFountainGroup);
  }

  if(puebloCenterFountainGroup.parent !== scene) scene.add(puebloCenterFountainGroup);
  puebloCenterFountainGroup.visible = true;

  const ft = WORLD_UNITS_PER_FOOT;
  const centerX = puebloTestCube.position.x + (PUEBLO_PLAN_WALL_CENTER_X_FT * ft);
  const centerZ = puebloTestCube.position.z + ((PUEBLO_PLAN_WALL_CENTER_Z_FT + PUEBLO_CENTER_FOUNTAIN_BACK_OFFSET_FT) * ft);
  const topY = puebloTestCube.position.y + (PUEBLO_TEST_CUBE_H * 0.5);
  puebloCenterFountainGroup.position.set(centerX, topY, centerZ);
}


function updatePuebloCenterFountainFlow(timeSec){
  if(!PUEBLO_CENTER_FOUNTAIN_BEHAVIOR_ENABLE) return;
  if(!puebloCenterFountainGroup || !puebloCenterFountainGroup.visible) return;

  const u = puebloCenterFountainGroup.userData || {};
  const lowerWater = u.lowerWater;
  const upperWater = u.upperWater;
  const centerPlume = u.centerPlume;
  const jets = Array.isArray(u.jets) ? u.jets : [];
  const cascades = Array.isArray(u.cascades) ? u.cascades : [];
  const pulseMaterials = Array.isArray(u.pulseMaterials) ? u.pulseMaterials : [];
  const pulseColor = (u.pulseColor && u.pulseColor.isColor) ? u.pulseColor : new THREE.Color(PUEBLO_FOUNTAIN_PULSE_COLOR_HEX);

  let pulseTarget = 0.0;
  let inPulseRange = false;
  const actorObj = (controls && typeof controls.getObject === "function") ? controls.getObject() : null;
  const actorPos = actorObj
    ? actorObj.position
    : ((truckPlane && truckPlane.position) ? truckPlane.position : null);

  const entryMargin = 0;
  const stayMargin = PUEBLO_PLAZA_ENTRY_HYSTERESIS_FT * WORLD_UNITS_PER_FOOT;
  const plazaEnterNow = !!(actorPos && isInsidePuebloPlazaBounds(actorPos.x, actorPos.z, entryMargin));
  const plazaStayNow = !!(actorPos && isInsidePuebloPlazaBounds(actorPos.x, actorPos.z, stayMargin));
  const wasInPlaza = !!u.wasInPlaza;
  const inPlaza = wasInPlaza ? plazaStayNow : plazaEnterNow;

  if(inPlaza && !wasInPlaza){
    u.fountainVoicePlayedThisEntry = false;
    plazaExitChoicesSpawnedThisExit = false;
    clearPlazaExitVehicleChoices();
    if(alienObjectiveMode === "destination_blue"){
      setAlienObjectiveVisible(false);
      const b = document.getElementById("banner");
      if(b && typeof b.textContent === "string" && b.textContent.toUpperCase().includes("GO TO THE BLUE")){
        hideBanner();
      }
    }
  } else if(!inPlaza && wasInPlaza){
    u.fountainVoicePlayedThisEntry = false;
    u.pulseWindowUntil = 0.0;
    playDriveMusicAudio();
    if(!plazaExitChoicesSpawnedThisExit && actorObj){
      spawnPlazaExitVehicleChoices(actorObj);
      plazaExitChoicesSpawnedThisExit = true;
    }
  }
  u.wasInPlaza = inPlaza;

  if(actorPos){
    const dx = actorPos.x - puebloCenterFountainGroup.position.x;
    const dz = actorPos.z - puebloCenterFountainGroup.position.z;
    const distToCenter = Math.hypot(dx, dz);
    const outerRadius = PUEBLO_FOUNTAIN_OUTER_RADIUS_FT * WORLD_UNITS_PER_FOOT;
    const distToEdge = Math.max(0, distToCenter - outerRadius);
    const triggerDist = PUEBLO_FOUNTAIN_PULSE_RADIUS_FT * WORLD_UNITS_PER_FOOT;
    inPulseRange = distToEdge <= triggerDist;
  }

  const wasInPulseRange = !!u.wasInPulseRange;
  if(inPulseRange && !wasInPulseRange){
    setPlayerHealthPct(100);
    u.pulseWindowUntil = timeSec + PUEBLO_FOUNTAIN_PULSE_DURATION_SEC;
  }
  u.wasInPulseRange = inPulseRange;

  const pulseActive = Number.isFinite(u.pulseWindowUntil) && timeSec < u.pulseWindowUntil;
  if(pulseActive){
    const wave = 0.5 + (Math.sin(timeSec * (Math.PI * 2.0) * PUEBLO_FOUNTAIN_PULSE_SPEED) * 0.5);
    pulseTarget = wave * PUEBLO_FOUNTAIN_PULSE_MAX_BLEND;
  }

  if(
    inPlaza &&
    !u.fountainVoicePlayedThisEntry &&
    Number.isFinite(u.pulseWindowUntil) &&
    u.pulseWindowUntil > 0 &&
    timeSec >= u.pulseWindowUntil
  ){
    speakFountainPlazaVoice();
    u.fountainVoicePlayedThisEntry = true;
  }

  const prevPulseBlend = Number.isFinite(u.pulseBlend) ? u.pulseBlend : 0.0;
  const pulseBlend = THREE.MathUtils.lerp(prevPulseBlend, pulseTarget, 0.2);
  u.pulseBlend = pulseBlend;

  if(lowerWater){
    const by = Number.isFinite(lowerWater.userData.baseY) ? lowerWater.userData.baseY : lowerWater.position.y;
    lowerWater.position.y = by + (Math.sin(timeSec * 1.8) * 0.08);
    if(lowerWater.material) lowerWater.material.opacity = 0.76 + (Math.sin(timeSec * 2.4) * 0.06);
  }

  if(upperWater){
    const by = Number.isFinite(upperWater.userData.baseY) ? upperWater.userData.baseY : upperWater.position.y;
    upperWater.position.y = by + (Math.sin((timeSec * 2.2) + 0.6) * 0.06);
    if(upperWater.material) upperWater.material.opacity = 0.78 + (Math.sin((timeSec * 2.7) + 0.5) * 0.07);
  }

  if(centerPlume){
    const baseY = Number.isFinite(centerPlume.userData.baseY) ? centerPlume.userData.baseY : centerPlume.position.y;
    const baseH = Number.isFinite(centerPlume.userData.baseH) ? centerPlume.userData.baseH : 1;
    const pulse = 1.0 + (Math.sin((timeSec * 3.4) + 0.8) * 0.22);
    centerPlume.scale.y = pulse;
    centerPlume.position.y = baseY + ((baseH * (pulse - 1.0)) * 0.5);
    if(centerPlume.material) centerPlume.material.opacity = 0.70 + (Math.sin((timeSec * 3.0) + 0.4) * 0.10);
  }

  for(const jet of jets){
    if(!jet) continue;
    const baseY = Number.isFinite(jet.userData.baseY) ? jet.userData.baseY : jet.position.y;
    const baseH = Number.isFinite(jet.userData.baseH) ? jet.userData.baseH : 1;
    const ph = Number.isFinite(jet.userData.phase) ? jet.userData.phase : 0;
    const pulse = 0.92 + (Math.sin((timeSec * 4.0) + ph) * 0.18);
    jet.scale.y = pulse;
    jet.position.y = baseY + ((baseH * (pulse - 1.0)) * 0.5);
    if(jet.material) jet.material.opacity = 0.66 + (Math.sin((timeSec * 4.4) + ph) * 0.12);
  }

  for(const cascade of cascades){
    if(!cascade) continue;
    const ph = Number.isFinite(cascade.userData.phase) ? cascade.userData.phase : 0;
    const sPulse = 0.96 + (Math.sin((timeSec * 3.2) + ph) * 0.08);
    cascade.scale.set(sPulse, sPulse, sPulse);
    if(cascade.material){
      const baseOpacity = Number.isFinite(cascade.userData.baseOpacity) ? cascade.userData.baseOpacity : 0.64;
      cascade.material.opacity = baseOpacity + (Math.sin((timeSec * 4.8) + ph) * 0.10);
    }
  }

  for(const mat of pulseMaterials){
    if(!mat || !mat.color || !mat.userData || !mat.userData.fountainPulseBaseColor) continue;
    mat.color.copy(mat.userData.fountainPulseBaseColor).lerp(pulseColor, pulseBlend);
    if(mat.emissive && mat.userData.fountainPulseBaseEmissive){
      const baseI = Number.isFinite(mat.userData.fountainPulseBaseEmissiveIntensity)
        ? mat.userData.fountainPulseBaseEmissiveIntensity
        : (Number.isFinite(mat.emissiveIntensity) ? mat.emissiveIntensity : 1.0);
      mat.emissive.copy(mat.userData.fountainPulseBaseEmissive).lerp(pulseColor, pulseBlend * 0.9);
      mat.emissiveIntensity = baseI + (pulseBlend * 0.65);
    }
  }
}

function ensurePuebloPlazaStatues(){
  if(!PUEBLO_PLAZA_STATUES_ENABLE || !puebloTestCube){
    if(puebloPlazaStatuesGroup && puebloPlazaStatuesGroup.parent === scene) scene.remove(puebloPlazaStatuesGroup);
    return;
  }

  if(!puebloPlazaStatuesGroup){
    if(!puebloPlazaStatueTex){
      puebloPlazaStatueTex = texLoader.load(
        TEX_DIR + PUEBLO_PLAZA_STATUE_FILE,
        (t)=>{ t.colorSpace = THREE.SRGBColorSpace; },
        undefined,
        ()=>{
          if(!puebloPlazaStatueWarned){
            hudLine("⚠️ Missing plaza statue texture: <code>" + PUEBLO_PLAZA_STATUE_FILE + "</code>.");
            puebloPlazaStatueWarned = true;
          }
        }
      );
      puebloPlazaStatueTex.colorSpace = THREE.SRGBColorSpace;
    }

    puebloPlazaStatuesGroup = new THREE.Group();
    puebloPlazaStatuesGroup.name = "puebloPlazaStatues";

    const ft = WORLD_UNITS_PER_FOOT;
    const half = PUEBLO_PLAN_WALL_HALF_SIDE_FT * ft;
    const interval = Math.max(1, PUEBLO_PLAZA_STATUE_INTERVAL_FT * ft);
    const inset = PUEBLO_PLAZA_STATUE_INSET_FT * ft;
    const statueW = PUEBLO_PLAZA_STATUE_WIDTH_FT * ft;
    const statueH = PUEBLO_PLAZA_STATUE_HEIGHT_FT * ft;
    const doorHalf = PUEBLO_PLAN_WALL_ENTRANCE_HALF_FT * ft;

    const makeStatue = (lx, lz)=>{
      const mat = new THREE.SpriteMaterial({
        map: puebloPlazaStatueTex,
        color: 0xffffff,
        transparent: true,
        depthWrite: false
      });
      const spr = new THREE.Sprite(mat);
      spr.scale.set(statueW, statueH, 1);
      spr.userData.localX = lx;
      spr.userData.localZ = lz;
      puebloPlazaStatuesGroup.add(spr);
    };

    for(let x = -half + (interval * 0.5); x <= half - (interval * 0.5); x += interval){
      makeStatue(x, half - inset); // north wall
      if(Math.abs(x) > (doorHalf + (statueW * 0.6))) makeStatue(x, -half + inset); // south wall (skip entrance)
    }

    for(let z = -half + (interval * 0.5); z <= half - (interval * 0.5); z += interval){
      makeStatue(half - inset, z);  // east wall
      makeStatue(-half + inset, z); // west wall
    }

    scene.add(puebloPlazaStatuesGroup);
  }

  if(puebloPlazaStatuesGroup.parent !== scene) scene.add(puebloPlazaStatuesGroup);
  puebloPlazaStatuesGroup.visible = true;

  const ft = WORLD_UNITS_PER_FOOT;
  const centerX = puebloTestCube.position.x + (PUEBLO_PLAN_WALL_CENTER_X_FT * ft);
  const centerZ = puebloTestCube.position.z + (PUEBLO_PLAN_WALL_CENTER_Z_FT * ft);
  const topY = puebloTestCube.position.y + (PUEBLO_TEST_CUBE_H * 0.5);
  const statueH = PUEBLO_PLAZA_STATUE_HEIGHT_FT * ft;

  for(const spr of puebloPlazaStatuesGroup.children){
    const lx = spr.userData.localX || 0;
    const lz = spr.userData.localZ || 0;
    spr.position.set(centerX + lx, topY + (statueH * 0.5), centerZ + lz);
  }
  let bestGuide = null;
  let bestScore = Infinity;
  const guideBlockHalfWidth = (PUEBLO_FOUNTAIN_OUTER_RADIUS_FT + 8.0) * ft;
  const behindFountainMinZ = (PUEBLO_CENTER_FOUNTAIN_BACK_OFFSET_FT * ft) + (2.0 * ft);

  for(const spr of puebloPlazaStatuesGroup.children){
    if(!spr) continue;
    if(!spr.userData.baseScaleX){
      spr.userData.baseScaleX = spr.scale.x;
      spr.userData.baseScaleY = spr.scale.y;
    }
    if(typeof spr.userData.damageTaken !== "boolean") spr.userData.damageTaken = false;
    if(typeof spr.userData.avatarOverlap !== "boolean") spr.userData.avatarOverlap = false;
    spr.userData.isGuideWarrior = false;

    if(spr.material && spr.material.color) spr.material.color.setHex(0xffffff);
    spr.scale.set(spr.userData.baseScaleX, spr.userData.baseScaleY, 1);

    const lx = Number(spr.userData.localX) || 0;
    const lz = Number(spr.userData.localZ) || 0;
    const isBehindFountainLane = lz >= behindFountainMinZ && Math.abs(lx) <= guideBlockHalfWidth;
    if(isBehindFountainLane) continue;

    const northBias = Math.abs((PUEBLO_PLAN_WALL_HALF_SIDE_FT * ft) - (lz / ft));
    const score = (Math.abs(lx) * 0.45) + (northBias * 0.55);
    if(score < bestScore){
      bestScore = score;
      bestGuide = spr;
    }
  }

  if(!bestGuide){
    for(const spr of puebloPlazaStatuesGroup.children){
      if(!spr) continue;
      const lx = Number(spr.userData.localX) || 0;
      const lz = Number(spr.userData.localZ) || 0;
      const northBias = Math.abs((PUEBLO_PLAN_WALL_HALF_SIDE_FT * ft) - (lz / ft));
      const score = (Math.abs(lx) * 0.45) + (northBias * 0.55);
      if(score < bestScore){
        bestScore = score;
        bestGuide = spr;
      }
    }
  }

  puebloGuideWarriorSprite = bestGuide || null;
  if(puebloGuideWarriorSprite){
    puebloGuideWarriorSprite.userData.isGuideWarrior = true;
  }
}

function updateGuideBlessingVisual(timeSec){
  if(!puebloGuideBlessingSprite) return;
  if(timeSec >= puebloGuideBlessingUntil){
    puebloGuideBlessingSprite.visible = false;
    return;
  }

  const obj = (controls && typeof controls.getObject === "function") ? controls.getObject() : null;
  if(!obj) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const yaw = Number.isFinite(truckYaw) ? truckYaw : obj.rotation.y;
  const fwdX = -Math.sin(yaw);
  const fwdZ = -Math.cos(yaw);
  const off = PUEBLO_GUIDE_GODDESS_OFFSET_FT * ft;
  const px = obj.position.x + (fwdX * off);
  const pz = obj.position.z + (fwdZ * off);
  const spriteHalfH = Math.max(0.1, (puebloGuideBlessingSprite.scale.y || (PUEBLO_CORNER_GODDESS_HEIGHT_FT * ft)) * 0.5);
  const groundY = heightAtWorldXZ(px, pz);
  const py = groundY + spriteHalfH + (PUEBLO_GUIDE_GODDESS_LIFT_FT * ft * 0.25) + (Math.sin(timeSec * 2.0) * (0.35 * ft));

  puebloGuideBlessingSprite.visible = true;
  puebloGuideBlessingSprite.position.set(px, py, pz);
}

function updatePuebloWarriorCollisions(){
  if(!PUEBLO_PLAZA_STATUES_ENABLE || !puebloPlazaStatuesGroup || !puebloPlazaStatuesGroup.visible) return;
  const obj = (controls && typeof controls.getObject === "function") ? controls.getObject() : null;
  if(!obj) return;

  const triggerRadius = PUEBLO_WARRIOR_COLLISION_RADIUS_FT * WORLD_UNITS_PER_FOOT;
  for(const spr of puebloPlazaStatuesGroup.children){
    if(!spr) continue;
    const dx = obj.position.x - spr.position.x;
    const dz = obj.position.z - spr.position.z;
    const hit = (dx * dx) + (dz * dz) <= (triggerRadius * triggerRadius);
    const wasHit = !!spr.userData.avatarOverlap;

    if(hit && !wasHit){
      spr.userData.avatarOverlap = true;
      if(spr.userData.isGuideWarrior){
        if(!spr.userData.guideActivated){
          spr.userData.guideActivated = true;
          triggerGuideWarriorBlessing();
        }
      } else if(!spr.userData.damageTaken){
        spr.userData.damageTaken = true;
        adjustPlayerHealthPct(-PUEBLO_WARRIOR_HIT_HEALTH_PCT);
      }
    } else if(!hit && wasHit){
      spr.userData.avatarOverlap = false;
    }
  }
}

function clearAlienPost(){
  if(!alienPostGroup) return;
  if(alienPostGroup.parent === scene) scene.remove(alienPostGroup);
  alienPostGroup.traverse((node)=>{
    if(node.geometry && node.geometry.dispose) node.geometry.dispose();
    const mat = node.material;
    if(!mat) return;
    if(Array.isArray(mat)){
      mat.forEach((m)=>{ if(m && m.dispose) m.dispose(); });
    } else if(mat.dispose){
      mat.dispose();
    }
  });
  alienPostGroup = null;
}

function spawnAlienPostNearTargets(points){
  clearAlienPost();
  if(!points || !points.length) return;

  const ft = WORLD_UNITS_PER_FOOT;
  let cx = 0;
  let cz = 0;
  for(const p of points){
    cx += p.x;
    cz += p.z;
  }
  cx /= points.length;
  cz /= points.length;

  const postX = cx + (18.0 * ft);
  const postZ = cz - (12.0 * ft);
  const groundY = heightAtWorldXZ(postX, postZ);
  const baseY = Number.isFinite(groundY) ? groundY : 0;

  const group = new THREE.Group();
  group.name = "alienPost";

  const shaftH = 22.0 * ft;
  const shaftR = 0.85 * ft;
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(shaftR, shaftR, shaftH, 14),
    new THREE.MeshStandardMaterial({ color: 0x6f6f6f, roughness: 0.82, metalness: 0.12 })
  );
  shaft.position.set(postX, baseY + (shaftH * 0.5), postZ);
  shaft.castShadow = true;
  shaft.receiveShadow = true;
  group.add(shaft);

  const capW = 4.5 * ft;
  const capH = 1.1 * ft;
  const capD = 4.5 * ft;
  const cap = new THREE.Mesh(
    new THREE.BoxGeometry(capW, capH, capD),
    new THREE.MeshStandardMaterial({ color: 0x93a18f, roughness: 0.78, metalness: 0.08 })
  );
  cap.position.set(postX, baseY + shaftH + (capH * 0.5), postZ);
  cap.castShadow = true;
  cap.receiveShadow = true;
  group.add(cap);

  scene.add(group);
  alienPostGroup = group;
}

function clearCyberUnlockWall(){
  cyberUnlockWallCollider = null;
  if(!cyberUnlockWallMesh) return;
  if(cyberUnlockWallMesh.parent === scene) scene.remove(cyberUnlockWallMesh);
  if(cyberUnlockWallMesh.geometry && cyberUnlockWallMesh.geometry.dispose) cyberUnlockWallMesh.geometry.dispose();
  if(cyberUnlockWallMesh.material && cyberUnlockWallMesh.material.dispose) cyberUnlockWallMesh.material.dispose();
  cyberUnlockWallMesh = null;
}

function spawnCyberUnlockWallAroundTruck(obj){
  if(!CYBER_UNLOCK_WALL_ENABLE || !obj) return;
  clearCyberUnlockWall();

  const ft = WORLD_UNITS_PER_FOOT;
  const radius = Math.max(8.0 * ft, CYBER_UNLOCK_WALL_RADIUS_FT * ft);
  const height = Math.max(6.0 * ft, CYBER_UNLOCK_WALL_HEIGHT_FT * ft);
  const thick = Math.max(0.5 * ft, CYBER_UNLOCK_WALL_THICKNESS_FT * ft);
  const segs = Math.max(16, Math.floor(CYBER_UNLOCK_WALL_SEGMENTS));

  const x = obj.position.x;
  const z = obj.position.z;
  const baseY = heightAtWorldXZ(x, z);

  const fwdX = -Math.sin(truckYaw);
  const fwdZ = -Math.cos(truckYaw);
  const slotCenterAngle = Math.atan2(fwdX, fwdZ);
  const truckWidth = TRUCK_COLLISION_RADIUS * 2.0;
  const slotWidth = Math.max(truckWidth * CYBER_UNLOCK_WALL_SLOT_TRUCK_WIDTHS, thick * 1.2);
  const slotHalfAngle = Math.min(Math.PI * 0.49, (slotWidth * 0.5) / Math.max(0.001, radius));

  cyberUnlockWallCollider = {
    x,
    z,
    innerR: Math.max(0.01, radius - (thick * 0.5)),
    outerR: radius + (thick * 0.5),
    slotCenterAngle,
    slotHalfAngle
  };

  const geo = new THREE.CylinderGeometry(radius + (thick * 0.5), radius + (thick * 0.5), height, segs, 1, true);
  const mat = new THREE.MeshStandardMaterial({
    color: CYBER_UNLOCK_WALL_COLOR,
    emissive: CYBER_UNLOCK_WALL_COLOR,
    emissiveIntensity: 0.18,
    roughness: 0.48,
    metalness: 0.12,
    transparent: true,
    opacity: CYBER_UNLOCK_WALL_OPACITY,
    side: THREE.DoubleSide,
    depthWrite: false
  });

  cyberUnlockWallMesh = new THREE.Mesh(geo, mat);
  cyberUnlockWallMesh.name = "cyberUnlockWall";
  cyberUnlockWallMesh.position.set(x, baseY + (height * 0.5), z);
  cyberUnlockWallMesh.frustumCulled = false;
  cyberUnlockWallMesh.castShadow = false;
  cyberUnlockWallMesh.receiveShadow = false;
  scene.add(cyberUnlockWallMesh);

  hudLine("🛡️ Cyber wall deployed around truck.");
}

function applyCyberUnlockWallBlock(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS){
  const c = cyberUnlockWallCollider;
  if(!obj || !c) return false;

  const dx = obj.position.x - c.x;
  const dz = obj.position.z - c.z;
  const dist = Math.hypot(dx, dz);
  if(dist + radius < c.innerR || dist - radius > c.outerR) return false;

  const ang = Math.atan2(dx, dz);
  const delta = Math.atan2(Math.sin(ang - c.slotCenterAngle), Math.cos(ang - c.slotCenterAngle));
  if(Math.abs(delta) <= c.slotHalfAngle) return false;

  obj.position.x = prevX;
  obj.position.z = prevZ;
  return true;
}

function randRange(a,b){ return a + Math.random()*(b-a); }
function targetsForWave(){
  return Math.min(TARGET_MAX_COUNT, TARGET_BASE_COUNT + (waveNum - 1) * TARGET_PER_WAVE);
}

function isFarEnough(x,z, pts, minSep){
  for (const p of pts){
    const dx = x - p.x, dz = z - p.z;
    if ((dx*dx + dz*dz) < (minSep*minSep)) return false;
  }
  return true;
}


function clearSnakeAmbushRow(){

  });

function ensureSnakeRowTexture(){
  if(snakeRowTexture) return snakeRowTexture;
  snakeRowTexture = new THREE.TextureLoader().load(
    TEX_DIR + SNAKE_ROW_FILE,
    (t)=>{
      t.colorSpace = THREE.SRGBColorSpace;
      applySnakeTextureChromaKeyInPlace(t);
    },
    undefined,
    ()=>{
      snakeRowTexture = null;
      hudLine("⚠️ Missing ambush texture: <code>" + SNAKE_ROW_FILE + "</code>.");
    }
  );
  return snakeRowTexture;
}

function applySnakeTextureChromaKeyInPlace(tex){
  if(!tex || !tex.image) return;
  const img = tex.image;
  const w = img.width | 0;
  const h = img.height | 0;
  if(w <= 0 || h <= 0) return;
  try{
    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext("2d", { willReadFrequently:true });
    if(!ctx) return;
    ctx.drawImage(img, 0, 0, w, h);
    const im = ctx.getImageData(0, 0, w, h);
    const d = im.data;
    const key = SNAKE_ROW_KEY_COLOR || { r:1, g:1, b:1 };
    const kr = Math.max(0, Math.min(1, Number(key.r)));
    const kg = Math.max(0, Math.min(1, Number(key.g)));
    const kb = Math.max(0, Math.min(1, Number(key.b)));
    const tol = Math.max(0.001, Number(SNAKE_ROW_KEY_TOL) || 0.20);
    const soft = Math.max(0.001, Number(SNAKE_ROW_KEY_SOFT) || 0.08);
    for(let i = 0; i < d.length; i += 4){
      const r = d[i] / 255;
      const g = d[i + 1] / 255;
      const b = d[i + 2] / 255;
      const dist = Math.hypot(r - kr, g - kg, b - kb);
      const aMul = Math.max(0, Math.min(1, (dist - tol) / soft));
      d[i + 3] = Math.round(d[i + 3] * aMul);
      if(d[i + 3] < 4) d[i + 3] = 0;
    }
    ctx.putImageData(im, 0, 0);
    tex.image = canvas;
    tex.needsUpdate = true;
  } catch(err){
    console.warn("snake chroma-key failed:", err);
  }
}

function spawnSnakeRowAhead(){
  if(!SNAKE_ROW_ENABLE || snakeRowSpawned) return;
  if(targetsRemaining > 0 || !snakeRowArmed) return;

  const tex = ensureSnakeRowTexture();
  if(!tex) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const spacing = Math.max(1.0 * ft, SNAKE_ROW_SPACING_FT * ft);
  const w = Math.max(2.0 * ft, SNAKE_ROW_WIDTH_FT * ft);
  const h = Math.max(2.0 * ft, SNAKE_ROW_HEIGHT_FT * ft);
  const count = Math.max(1, Math.floor(SNAKE_ROW_COUNT));
  const zoneR = Math.max(1.0 * ft, SNAKE_ROW_SPAWN_ZONE_RADIUS_FT * ft);
  const safeR = Math.max(1.0 * ft, zoneR - (2.0 * ft));

  const obj = controls.getObject();
  const spawnX = AVATRUCK_SPAWN_X;
  const spawnZ = AVATRUCK_SPAWN_Z;
  const toTruck = obj ? new THREE.Vector3(obj.position.x - spawnX, 0, obj.position.z - spawnZ) : null;
  const fwd = (toTruck && toTruck.lengthSq() > 0.0001)
    ? toTruck.normalize()
    : new THREE.Vector3(-Math.sin(truckYaw), 0, -Math.cos(truckYaw)).normalize();
  const right = new THREE.Vector3(-fwd.z, 0, fwd.x).normalize();
  const centerX = spawnX;
  const centerZ = spawnZ;

  // Match avatar/alien cutout behavior while preserving depth interactions.
  const matTemplate = new THREE.SpriteMaterial({
    map: tex,
    transparent: true,
    alphaTest: SNAKE_ROW_ALPHA_TEST,
    depthWrite: true,
    depthTest: true
  });

  snakeRowGroup = new THREE.Group();
  snakeRowGroup.name = "snakeRowAmbush";
  snakeRowGroup.frustumCulled = false;

  const half = (count - 1) * 0.5;
  for(let i = 0; i < count; i++){
    const side = (i - half) * spacing;
    let sx = centerX + (right.x * side);
    let sz = centerZ + (right.z * side);
    const offX = sx - spawnX;
    const offZ = sz - spawnZ;
    const d = Math.hypot(offX, offZ);
    if(d > safeR){
      const s = safeR / d;
      sx = spawnX + (offX * s);
      sz = spawnZ + (offZ * s);
    }
    const sy = heightAtWorldXZ(sx, sz) + (h * 0.5);

    const spr = new THREE.Sprite(matTemplate.clone());
    spr.scale.set(w, h, 1);
    spr.position.set(sx, sy, sz);
    snakeRowGroup.add(spr);
  }

  scene.add(snakeRowGroup);
  snakeRowSpawned = true;
  snakeRowArmed = false;
  hudLine("🐍 Snake ambush spawned near initial truck spawn (within <code>50ft</code>)." );
}

function updateSnakeAmbushOnJourney(obj){
  if(!SNAKE_ROW_ENABLE || !obj || snakeRowSpawned) return;
  if(targetsRemaining > 0 || !snakeRowArmed) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const zoneR = Math.max(1.0 * ft, SNAKE_ROW_SPAWN_ZONE_RADIUS_FT * ft);
  const dxSpawn = obj.position.x - AVATRUCK_SPAWN_X;
  const dzSpawn = obj.position.z - AVATRUCK_SPAWN_Z;
  const dSpawn = Math.hypot(dxSpawn, dzSpawn);

  // Only fire ambush when player re-enters the initial spawn zone.
  if(dSpawn <= zoneR){
    spawnSnakeRowAhead();
  }
}

    pts.push({x,z});
  }

function fireAlienGreenBall(fromTarget){
  if(!fromTarget || !fromTarget.mesh) return;

  const shooterPos = fromTarget.mesh.position.clone();
  shooterPos.y += TARGET_SIZE * 0.55;

  const obj = controls.getObject();
  const aimSource = (truckPlane && truckPlane.position) ? truckPlane.position : (obj ? obj.position : null);
  if(!aimSource) return;

  const aim = aimSource.clone();

  const dir = aim.sub(shooterPos);
  const len = dir.length();
  if(!Number.isFinite(len) || len < 0.001) return;
  dir.multiplyScalar(1 / len);

  const geom = new THREE.SphereGeometry(ALIEN_SHOT_RADIUS, 10, 10);
  const mat  = new THREE.MeshStandardMaterial({
    color: 0x2fff75,
    emissive: 0x0f7a2a,
    emissiveIntensity: 0.9
  });
  const ball = new THREE.Mesh(geom, mat);
  ball.position.copy(shooterPos);
  scene.add(ball);

  alienGreenBalls.push({
    mesh: ball,
    vel: dir.multiplyScalar(ALIEN_SHOT_SPEED),
    life: ALIEN_SHOT_LIFE
  });
}

function clearAlienGreenBalls(){
  for(let i = alienGreenBalls.length - 1; i >= 0; i--){
    const b = alienGreenBalls[i];
    if(!b || !b.mesh) continue;
    scene.remove(b.mesh);
    if(b.mesh.geometry) b.mesh.geometry.dispose();
    if(b.mesh.material) b.mesh.material.dispose();
    alienGreenBalls.splice(i, 1);
  }
}

function updateAlienGreenBalls(dt){
  if(!GREEN_ALIENS_ENABLE){
    clearAlienGreenBalls();
    return;
  }
  for(let i = alienGreenBalls.length - 1; i >= 0; i--){
    const b = alienGreenBalls[i];
    if(!b || !b.mesh) continue;

    b.mesh.position.addScaledVector(b.vel, dt);
    b.life -= dt;

    let hitTruck = false;
    if(truckPlane){
      __tmpBox.setFromObject(truckPlane);
      const cp = __tmpBox.clampPoint(b.mesh.position, __tmpV3);
      hitTruck = cp.distanceToSquared(b.mesh.position) <= (ALIEN_SHOT_RADIUS * ALIEN_SHOT_RADIUS);
    } else {
      const obj = controls.getObject();
      if(obj){
        const dx = b.mesh.position.x - obj.position.x;
        const dy = b.mesh.position.y - obj.position.y;
        const dz = b.mesh.position.z - obj.position.z;
        hitTruck = ((dx*dx) + (dy*dy) + (dz*dz)) <= (1.2 * 1.2);
      }
    }

    if(hitTruck){
      adjustPlayerHealthPct(-ALIEN_SHOT_DAMAGE);
      spawnHitBurst(b.mesh.position, 0x2fff75);
      scene.remove(b.mesh);
      if(b.mesh.geometry) b.mesh.geometry.dispose();
      if(b.mesh.material) b.mesh.material.dispose();
      alienGreenBalls.splice(i, 1);
      continue;
    }

    if(b.life <= 0){
      scene.remove(b.mesh);
      if(b.mesh.geometry) b.mesh.geometry.dispose();
      if(b.mesh.material) b.mesh.material.dispose();
      alienGreenBalls.splice(i, 1);
    }
  }
}

function updateTargets(dt){
  if(!GREEN_ALIENS_ENABLE) return;
  if (targetFlashT > 0){
    targetFlashT = Math.max(0, targetFlashT - dt);
  }

  if(!ALIEN_SHOTS_ENABLE || !targets.length) return;

  for(const t of targets){
    if(!t || !t.mesh) continue;
    t.shotCooldown = (Number(t.shotCooldown) || 0) - dt;
    if(t.shotCooldown <= 0){
      fireAlienGreenBall(t);
      t.shotCooldown = randRange(ALIEN_SHOT_INTERVAL_MIN, ALIEN_SHOT_INTERVAL_MAX);
    }
  }
}


function setWaveHUD(){
  const el = document.getElementById("waveNum");
  if (el) el.textContent = String(waveNum);
}

function disposeTargetMaterials(root){
  if (!root) return;
  root.traverse((node)=>{
    const mat = node.material;
    if (!mat) return;
    if (Array.isArray(mat)){
      mat.forEach((m)=>{ if (m && m.dispose) m.dispose(); });
    } else if (mat.dispose){
      mat.dispose();
    }
  });
}

function clearTargets(){
  postClearCopterSuppressed = false;
  clearSnakeAmbushRow();
  clearCyberUnlockWall();
  snakeRowArmed = false;
  journeyAfterAlienClearStart = null;
  for (const t of targets){
    if (!t || !t.mesh) continue;
    scene.remove(t.mesh);
    disposeTargetMaterials(t.mesh);
  }
  targets.length = 0;
  clearAlienGreenBalls();
  clearAlienPost();
  targetsRemaining = 0;
  alienObjectiveTotal = 0;
  setAlienObjectiveVisible(false);
  updateAlienObjectiveHUD();
  setTargetsLeftHUD();
}


function resetCurrentWave(){
  hideBanner();
  clearTargets();
  createTargets();
  setWaveHUD();
  hudLine(`🔁 Wave reset! (<code>${targetsRemaining}</code> targets)`);
}

function startNextWave(){
  hideBanner();
  hideBanner();
  if (!WAVES_ENABLE) return;
  clearTargets();
  waveNum++;
  createTargets();
  setWaveHUD();
  hudLine(`✅ New wave spawned! (<code>${targetsRemaining}</code> targets)`);
}

function setTargetsLeftHUD(){

  if(targetsRemaining > 0){
    setAlienObjectiveMode("combat");
    setAlienObjectiveVisible(true);

  updateAlienObjectiveHUD();
}

let postAlienClearModeActive = false;

function winIfDone(){
  if (targetsRemaining === 0){
    MINI_MAP_SHOW_BLUE_SQUARE = true;
    playToBlueSquareAudio();
    postClearCopterSuppressed = false;
    setPlayerHealthPct(100);
    cyberUnlocked = true;
    setAlienObjectiveMode("destination_blue");
    setAlienObjectiveVisible(true);
    const obj = controls.getObject();
    if(obj){
      journeyAfterAlienClearStart = { x: obj.position.x, z: obj.position.z };
      snakeRowSpawned = false;
      snakeRowArmed = true;
      spawnSnakeRowAhead();
    }
    if(!WAVES_ENABLE){
      if(postAlienClearTimeout) clearTimeout(postAlienClearTimeout);
      postAlienClearTimeout = null;
    }
    if (WAVES_ENABLE && WAVES_AUTO_NEXT){
      nextWaveT = WAVES_AUTO_DELAY;
    }
  }
}

function registerTargetHit(targetIndex){
  const t = targets[targetIndex];
  if (!t) return;

  // flash (quick) when material supports emissive (legacy cube targets)
  if (t.mesh && t.mesh.material && t.mesh.material.emissive){
    t.mesh.material.emissive.setHex(0xffffff);
    t.mesh.material.emissiveIntensity = 0.9;
  }
  targetFlashT = 0.10;
  playAlienDeathSound();

  // remove cube + attached alein sprite
  scene.remove(t.mesh);
  disposeTargetMaterials(t.mesh);

  targets.splice(targetIndex, 1);

function _getCopterFrame(){
  const p = controls.getObject().position;
  const fwd = new THREE.Vector3(-Math.sin(truckYaw), 0, -Math.cos(truckYaw)).normalize();
  const right = new THREE.Vector3(-fwd.z, 0, fwd.x).normalize();
  let truckY = terrainReady ? heightAtWorldXZ(p.x, p.z) : (p.y - PLAYER_EYE_HEIGHT);
  if(!Number.isFinite(truckY)) truckY = p.y - PLAYER_EYE_HEIGHT;
  return { p, fwd, right, truckY };
}

function moveCopterAlongDir(dt, speed){

function setCopterSoundForPhase(){
  if(!copter || !copter.visible){

    return;

  const obj = controls.getObject();
  const targetPos = (truckPlane && truckPlane.position) ? truckPlane.position : (obj ? obj.position : null);
  if(!targetPos){
    stopCopterPassSound();
    return;
  }

  const dx = copter.position.x - targetPos.x;
  const dz = copter.position.z - targetPos.z;
  const proxRadius = COPTER_PROX_SOUND_RADIUS_FT * WORLD_UNITS_PER_FOOT;
  const within = ((dx*dx) + (dz*dz)) <= (proxRadius * proxRadius);
  if(within) playCopterPassSound(false);

}

  copter.position.set(sx, sy, sz);
  copterTravelDir.set(fr.p.x - sx, 0, fr.p.z - sz);

function getOrangeGreenRoutePoint(progress){

  const x = PUEBLO_NEXT_JOURNEY_TARGET_X + ((GREEN_SQUARE_MARKER_X - PUEBLO_NEXT_JOURNEY_TARGET_X) * t);
  const z = PUEBLO_NEXT_JOURNEY_TARGET_Z + ((GREEN_SQUARE_MARKER_Z - PUEBLO_NEXT_JOURNEY_TARGET_Z) * t);
  return { x, z, t };
}

function getOrangeGreenRouteProgress(x, z){
  const vx = GREEN_SQUARE_MARKER_X - PUEBLO_NEXT_JOURNEY_TARGET_X;
  const vz = GREEN_SQUARE_MARKER_Z - PUEBLO_NEXT_JOURNEY_TARGET_Z;
  const len2 = (vx * vx) + (vz * vz);
  if(len2 <= 1e-8) return 0;
  const px = x - PUEBLO_NEXT_JOURNEY_TARGET_X;
  const pz = z - PUEBLO_NEXT_JOURNEY_TARGET_Z;
  return THREE.MathUtils.clamp(((px * vx) + (pz * vz)) / len2, 0, 1);
}

function getBlueOrangeRouteStartPoint(){
  const ft = WORLD_UNITS_PER_FOOT;
  const offX = PUEBLO_PLAN_WALL_CENTER_X_FT * ft;
  const offZ = PUEBLO_PLAN_WALL_CENTER_Z_FT * ft;
  const baseX = puebloTestCube ? puebloTestCube.position.x : PUEBLO_TEST_CUBE_FIXED_X;
  const baseZ = puebloTestCube ? puebloTestCube.position.z : PUEBLO_TEST_CUBE_FIXED_Z;
  return { x: baseX + offX, z: baseZ + offZ };
}

function getBlueOrangeRouteTargetPoint(){
  return {
    x: Number.isFinite(miniMapJourneyTargetX) ? miniMapJourneyTargetX : PUEBLO_NEXT_JOURNEY_TARGET_X,
    z: Number.isFinite(miniMapJourneyTargetZ) ? miniMapJourneyTargetZ : PUEBLO_NEXT_JOURNEY_TARGET_Z
  };
}

function getBlueOrangeRouteFigureTexture(file){
  if(blueOrangeRouteFigureTextureCache.has(file)) return blueOrangeRouteFigureTextureCache.get(file);
  const tex = texLoader.load(
    TEX_DIR + file,
    (t)=>{
      t.colorSpace = THREE.SRGBColorSpace;
      t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
    },
    undefined,
    ()=>{ hudLine("⚠️ Missing route figure texture: <code>" + file + "</code>."); }
  );
  tex.colorSpace = THREE.SRGBColorSpace;
  blueOrangeRouteFigureTextureCache.set(file, tex);
  return tex;
}

function clearBlueOrangeRouteFigures(){
  while(blueOrangeRouteFigureSprites.length){
    const spr = blueOrangeRouteFigureSprites.pop();
    if(!spr) continue;
    if(spr.parent) spr.parent.remove(spr);
    if(spr.material) spr.material.dispose();
  }
  if(blueOrangeRouteFigureGroup && blueOrangeRouteFigureGroup.parent === scene){
    scene.remove(blueOrangeRouteFigureGroup);
  }
  blueOrangeRouteFigureGroup = null;
  blueOrangeRouteFiguresBuilt = false;
}

function buildBlueOrangeRouteFigures(){
  if(!BLUE_ORANGE_ROUTE_FIGURES_ENABLE) return;
  clearBlueOrangeRouteFigures();

  const start = getBlueOrangeRouteStartPoint();
  const end = getBlueOrangeRouteTargetPoint();
  const dx = end.x - start.x;
  const dz = end.z - start.z;
  const len = Math.hypot(dx, dz);
  if(!Number.isFinite(len) || len < 1e-3) return;

  const ux = dx / len;
  const uz = dz / len;
  const nx = -uz;
  const nz = ux;
  const ft = WORLD_UNITS_PER_FOOT;
  const spacing = Math.max(60.0 * ft, BLUE_ORANGE_ROUTE_FIGURE_SPACING_FT * ft);
  const count = Math.max(BLUE_ORANGE_ROUTE_FIGURE_FILES.length, Math.floor(len / spacing) + 1);

  blueOrangeRouteFigureGroup = new THREE.Group();
  blueOrangeRouteFigureGroup.name = "blueOrangeRouteFigures";
  blueOrangeRouteFigureGroup.frustumCulled = false;

  for(let i = 0; i < count; i++){
    const f = (i + 1) / (count + 1);
    const cx = start.x + (ux * len * f);
    const cz = start.z + (uz * len * f);

    const sideSign = (i % 2 === 0) ? 1 : -1;
    const sideLerp = ((i * 37) % 100) / 99;
    const sideOffsetFt = BLUE_ORANGE_ROUTE_FIGURE_SIDE_OFFSET_MIN_FT + ((BLUE_ORANGE_ROUTE_FIGURE_SIDE_OFFSET_MAX_FT - BLUE_ORANGE_ROUTE_FIGURE_SIDE_OFFSET_MIN_FT) * sideLerp);
    const off = sideOffsetFt * ft;

    const x = cx + (nx * off * sideSign);
    const z = cz + (nz * off * sideSign);

    const file = BLUE_ORANGE_ROUTE_FIGURE_FILES[i % BLUE_ORANGE_ROUTE_FIGURE_FILES.length];
    const tex = getBlueOrangeRouteFigureTexture(file);
    const imgW = tex?.image?.width || 512;
    const imgH = tex?.image?.height || 512;
    const aspect = imgW / Math.max(1, imgH);

    const hLerp = ((i * 29) % 100) / 99;
    const hFt = BLUE_ORANGE_ROUTE_FIGURE_HEIGHT_MIN_FT + ((BLUE_ORANGE_ROUTE_FIGURE_HEIGHT_MAX_FT - BLUE_ORANGE_ROUTE_FIGURE_HEIGHT_MIN_FT) * hLerp);
    const h = hFt * ft;
    const w = h * aspect;

    const gy = heightAtWorldXZ(x, z);
    const y = (Number.isFinite(gy) ? gy : 0) + (h * 0.5) + (BLUE_ORANGE_ROUTE_FIGURE_GROUND_LIFT_FT * ft);

    const mat = new THREE.SpriteMaterial({
      map: tex,
      color: 0xffffff,
      transparent: true,
      depthWrite: false,
      depthTest: true
    });
    const spr = new THREE.Sprite(mat);
    spr.scale.set(w, h, 1);
    spr.position.set(x, y, z);
    spr.frustumCulled = false;
    spr.renderOrder = 820;

    blueOrangeRouteFigureSprites.push(spr);
    blueOrangeRouteFigureGroup.add(spr);
  }

  scene.add(blueOrangeRouteFigureGroup);
  blueOrangeRouteFiguresBuilt = true;
  hudLine("🧍 Route figures placed along blue→orange journey line.");
}

function updateBlueOrangeRouteFigures(active, cameraRef){
  if(!BLUE_ORANGE_ROUTE_FIGURES_ENABLE) return;

  if(active){
    if(!blueOrangeRouteFiguresBuilt || !blueOrangeRouteFigureGroup || blueOrangeRouteFigureSprites.length === 0){
      buildBlueOrangeRouteFigures();
    }
    if(blueOrangeRouteFigureGroup) blueOrangeRouteFigureGroup.visible = true;
  } else if(blueOrangeRouteFigureGroup){
    blueOrangeRouteFigureGroup.visible = false;
  }

  if(!active || !cameraRef || !blueOrangeRouteFigureSprites.length) return;
  for(const spr of blueOrangeRouteFigureSprites){
    if(!spr || !spr.visible) continue;
    spr.lookAt(cameraRef.position.x, spr.position.y, cameraRef.position.z);
  }
}

function clearFastTrackPortal(){
  if(!fastTrackPortalGroup) return;
  if(fastTrackPortalGroup.parent === scene) scene.remove(fastTrackPortalGroup);
  fastTrackPortalGroup.traverse((n)=>{
    if(!n) return;
    if(n.geometry && n.geometry.dispose) n.geometry.dispose();
    if(n.material){
      if(Array.isArray(n.material)) n.material.forEach((m)=>{ if(m && m.dispose) m.dispose(); });
      else if(n.material.dispose) n.material.dispose();
    }
  });
  fastTrackPortalGroup = null;
}

function spawnFastTrackPortalAt(progress = FAST_TRACK_PORTAL_TRIGGER_PROGRESS){
  if(fastTrackPortalGroup) return;
  const pt = getOrangeGreenRoutePoint(progress);
  const ft = WORLD_UNITS_PER_FOOT;
  const groundY = heightAtWorldXZ(pt.x, pt.z);
  const baseY = Number.isFinite(groundY) ? groundY : 0;

  const group = new THREE.Group();
  group.name = "fastTrackPortal";

  const ringR = Math.max(3.0 * ft, 7.0 * ft);
  const ringTube = Math.max(0.3 * ft, 0.8 * ft);
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(ringR, ringTube, 20, 48),
    new THREE.MeshStandardMaterial({
      color: 0x39e7ff,
      emissive: 0x2aa8ff,
      emissiveIntensity: 1.15,
      roughness: 0.25,
      metalness: 0.1,
      transparent: true,
      opacity: 0.94
    })
  );
  ring.rotation.x = Math.PI * 0.5;
  ring.position.set(0, ringR * 0.75, 0);
  ring.castShadow = false;
  ring.receiveShadow = false;
  group.add(ring);

  const core = new THREE.Mesh(
    new THREE.CylinderGeometry(ringR * 0.58, ringR * 0.58, ringR * 1.2, 32, 1, true),
    new THREE.MeshBasicMaterial({
      color: 0x66f3ff,
      transparent: true,
      opacity: 0.22,
      side: THREE.DoubleSide,
      depthWrite: false
    })
  );
  core.position.set(0, ringR * 0.75, 0);
  group.add(core);

  const txtCanvas = document.createElement("canvas");
  txtCanvas.width = 1024;
  txtCanvas.height = 160;
  const tctx = txtCanvas.getContext("2d");
  if(tctx){
    tctx.clearRect(0, 0, txtCanvas.width, txtCanvas.height);
    tctx.fillStyle = "rgba(0,0,0,0.55)";
    tctx.fillRect(8, 20, txtCanvas.width - 16, txtCanvas.height - 40);
    tctx.strokeStyle = "rgba(87,239,255,0.95)";
    tctx.lineWidth = 4;
    tctx.strokeRect(10, 22, txtCanvas.width - 20, txtCanvas.height - 44);
    tctx.fillStyle = "#d7fbff";
    tctx.font = "900 72px system-ui";
    tctx.textAlign = "center";
    tctx.textBaseline = "middle";
    tctx.fillText("FAST TRACK PORTAL", txtCanvas.width * 0.5, txtCanvas.height * 0.5);
  }
  const txtTex = new THREE.CanvasTexture(txtCanvas);
  txtTex.colorSpace = THREE.SRGBColorSpace;
  const txt = new THREE.Sprite(new THREE.SpriteMaterial({ map: txtTex, transparent: true, depthWrite: false }));
  txt.scale.set(ringR * 4.8, ringR * 0.9, 1);
  txt.position.set(0, ringR * 2.0, 0);
  group.add(txt);

  group.position.set(pt.x, baseY, pt.z);
  group.userData.baseY = baseY;
  group.userData.ring = ring;
  scene.add(group);

  fastTrackPortalGroup = group;
  fastTrackPortalSpawned = true;
  hudLine("🌀 FAST TRACK PORTAL opened ahead.");
}

function updateFastTrackPortal(nowSec, dt){
  if(!FAST_TRACK_PORTAL_ENABLE){
    if(fastTrackPortalGroup) clearFastTrackPortal();
    return;
  }

  if(fastTrackPortalCooldown > 0) fastTrackPortalCooldown = Math.max(0, fastTrackPortalCooldown - (dt || 0));

  if(alienObjectiveMode !== "destination_green" || fastTrackPortalUsed) return;
  const obj = controls.getObject();
  if(!obj) return;

  const progress = getOrangeGreenRouteProgress(obj.position.x, obj.position.z);
  if(progress >= FAST_TRACK_PORTAL_TRIGGER_PROGRESS && !fastTrackPortalSpawned){
    spawnFastTrackPortalAt(FAST_TRACK_PORTAL_TRIGGER_PROGRESS);
  }

  if(!fastTrackPortalGroup) return;

  const ring = fastTrackPortalGroup.userData.ring;
  const baseY = Number.isFinite(fastTrackPortalGroup.userData.baseY) ? fastTrackPortalGroup.userData.baseY : fastTrackPortalGroup.position.y;
  fastTrackPortalGroup.position.y = baseY + (Math.sin(nowSec * 1.8) * (0.35 * WORLD_UNITS_PER_FOOT));
  if(ring) ring.rotation.z += (dt || 0) * 1.7;

  if(fastTrackPortalCooldown > 0) return;
  const dx = obj.position.x - fastTrackPortalGroup.position.x;
  const dz = obj.position.z - fastTrackPortalGroup.position.z;
  const enterR = FAST_TRACK_PORTAL_ENTER_RADIUS_FT * WORLD_UNITS_PER_FOOT;
  if(((dx * dx) + (dz * dz)) > (enterR * enterR)) return;

  const dst = getOrangeGreenRoutePoint(FAST_TRACK_PORTAL_DEST_PROGRESS);
  const gy = heightAtWorldXZ(dst.x, dst.z);
  const y = (Number.isFinite(gy) ? gy : obj.position.y) + PLAYER_EYE_HEIGHT;
  playPortalEntryAudio();
  obj.position.set(dst.x, y, dst.z);
  fastTrackPortalUsed = true;
  fastTrackPortalCooldown = 1.0;
  clearFastTrackPortal();
  hudLine("🌀 Portal jump complete: moved to <code>2/3</code> of orange→green route.");
}

function shouldStopPostClearCopterAttacks(){
  if(postClearCopterSuppressed) return true;
  if(!(cyberUnlocked && targetsRemaining === 0)) return false;
  if(!hasReachedFountainPlaza()) return false;
  postClearCopterSuppressed = true;
  return true;
}

function isCyberDrivingNow(){
  return cyberUnlocked && targetsRemaining === 0 && avatarMode !== "leggoman" && !shouldStopPostClearCopterAttacks();
}

function fireCopterShotgunFanBurst(){
  if(!COPTER_ATTACKS_ENABLE) return;
  if(!copter) return;

  const obj = controls.getObject();
  const aimSource = (truckPlane && truckPlane.position) ? truckPlane.position.clone() : (obj ? obj.position.clone() : null);
  if(!aimSource) return;

  // Aim slightly above center mass so spread blankets the truck body.
  aimSource.y += TRUCK_H * 0.25;

  const start = copter.position.clone();
  const aimDir = aimSource.clone().sub(start);
  if(aimDir.lengthSq() < 1e-8) return;
  aimDir.normalize();

  const worldUp = new THREE.Vector3(0, 1, 0);
  const right = new THREE.Vector3().crossVectors(aimDir, worldUp);
  if(right.lengthSq() < 1e-8){
    right.set(1, 0, 0);
  } else {
    right.normalize();
  }

  const count = Math.max(1, Math.floor(COPTER_SHOTGUN_PELLETS));
  const yawSpread = THREE.MathUtils.degToRad(COPTER_SHOTGUN_SPREAD_DEG);
  const pitchSpread = THREE.MathUtils.degToRad(COPTER_SHOTGUN_PITCH_SPREAD_DEG);

  for(let i = 0; i < count; i++){
    const t = (count <= 1) ? 0.5 : (i / (count - 1));
    const yawOff = (t - 0.5) * yawSpread;
    const pitchOff = ((i % 2 === 0) ? -0.5 : 0.5) * pitchSpread;
    const dir = aimDir.clone();
    dir.applyAxisAngle(worldUp, yawOff);
    dir.applyAxisAngle(right, pitchOff);
    dir.normalize();
    spawnCopterRedBallFromDir(start, dir, COPTER_SHOT_SPEED * COPTER_SHOTGUN_SPEED_SCALE);
  }
}

function updateCopterShotBurst(dt){
  if(!copter) return;
  if(!COPTER_ATTACKS_ENABLE){
    copterShotTimer = 0.0;
    return;
  }

  if(shouldStopPostClearCopterAttacks()){
    copterShotTimer = 0.0;
    return;
  }

  if(copterRunState !== "attack_front") return;

  copterShotTimer -= dt;
  if(copterShotTimer <= 0){
    if(isCyberDrivingNow()){
      fireCopterShotgunFanBurst();
      copterShotTimer = COPTER_SHOTGUN_INTERVAL_SEC;
    } else {
      fireCopterRedBall();
      copterShotTimer = COPTER_SHOT_INTERVAL_SEC;
    }
  }
}

function copterBallHitsTruck(prevPos, currPos){
  if(truckPlane){
    __tmpBox.setFromObject(truckPlane);
    const r2 = COPTER_SHOT_RADIUS * COPTER_SHOT_RADIUS * 4.0;

    // Sweep sample to avoid tunneling when shotgun pellets move fast.
    for(const t of [0.0, 0.5, 1.0]){
      __tmpV3.set(
        prevPos.x + ((currPos.x - prevPos.x) * t),
        prevPos.y + ((currPos.y - prevPos.y) * t),
        prevPos.z + ((currPos.z - prevPos.z) * t)
      );
      const cp = __tmpBox.clampPoint(__tmpV3, __tmpV3b);
      const d2Truck = cp.distanceToSquared(__tmpV3);
      if(d2Truck <= r2) return true;
    }
    return false;
  }

  const targetPos = controls.getObject().position;
  const dx = currPos.x - targetPos.x;
  const dy = currPos.y - targetPos.y;
  const dz = currPos.z - targetPos.z;
  return ((dx*dx) + (dy*dy) + (dz*dz)) <= 1.0;
}

function updateCopterRedBalls(dt){
  if(!COPTER_ATTACKS_ENABLE){
    for(let i = copterRedBalls.length - 1; i >= 0; i--){
      const b = copterRedBalls[i];
      if(!b || !b.mesh) continue;
      scene.remove(b.mesh);
      if(b.mesh.geometry) b.mesh.geometry.dispose();
      if(b.mesh.material) b.mesh.material.dispose();
      copterRedBalls.splice(i, 1);
    }
    copterHitStreak = 0;
    return;
  }
  for(let i = copterRedBalls.length - 1; i >= 0; i--){
    const b = copterRedBalls[i];
    const prevPos = __copterBallPrevPos.copy(b.mesh.position);
    b.mesh.position.addScaledVector(b.vel, dt);
    b.life -= dt;

    const p = b.mesh.position;
    const hitTruck = copterBallHitsTruck(prevPos, p);

    if(hitTruck){
      adjustPlayerHealthPct(-COPTER_SHOT_DAMAGE_PCT);
      spawnHitBurst(p, 0xff3b30);
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      copterRedBalls.splice(i, 1);

      copterHitStreak += 1;
      if(copterHitStreak >= COPTER_HIT_STREAK_FOR_FIRE){
        triggerTruckFireEffect();
        copterHitStreak = 0;
      }
      continue;
    }

    if(b.life <= 0){
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      copterRedBalls.splice(i, 1);
      copterHitStreak = 0;
    }
  }
}

function triggerTruckFireEffect(){
  const obj = controls.getObject();
  const anchor = (fireAnchorMesh && fireAnchorMesh.position) ? fireAnchorMesh.position : ((truckPlane && truckPlane.position) ? truckPlane.position : (obj ? obj.position : null));
  if(anchor && !canUseTruckFireFeatureAt(anchor.x, anchor.z)) return;

  ensureTruckFireTextures();
  if(!truckFireTextures.length) return;

  if(!truckFireSprite){
    const geo = new THREE.PlaneGeometry(TRUCK_W * 0.95, TRUCK_H * 1.2);
    const mat = new THREE.MeshBasicMaterial({
      map: truckFireTextures[0],
      transparent: true,
      alphaTest: 0.14,
      side: THREE.DoubleSide,
      depthWrite: false,
      depthTest: true
    });
    truckFireSprite = new THREE.Mesh(geo, mat);
    truckFireSprite.renderOrder = 1400;
    truckFireSprite.visible = false;
    scene.add(truckFireSprite);
  }

  truckFireFrameIdx = 0;
  truckFireFrameT = 0.0;
  truckFireTimer = TRUCK_FIRE_DURATION_SEC;
  truckFireSprite.material.map = truckFireTextures[0];
  truckFireSprite.material.needsUpdate = true;
  truckFireSprite.visible = true;
}

function updateTruckFireEffect(dt){
  if(!truckFireSprite || !truckFireSprite.visible) return;

  truckFireTimer = Math.max(0, truckFireTimer - dt);
  if(truckFireTimer <= 0){
    truckFireSprite.visible = false;
    return;
  }

  truckFireFrameT += dt;
  if(truckFireFrameT >= TRUCK_FIRE_FRAME_SEC){
    truckFireFrameT -= TRUCK_FIRE_FRAME_SEC;
    truckFireFrameIdx = (truckFireFrameIdx + 1) % truckFireTextures.length;
    truckFireSprite.material.map = truckFireTextures[truckFireFrameIdx];
    truckFireSprite.material.needsUpdate = true;
  }

  const anchor = (fireAnchorMesh && fireAnchorMesh.position) ? fireAnchorMesh : truckPlane;
  if(anchor && anchor.position){
    truckFireSprite.position.set(
      anchor.position.x,
      anchor.position.y + (TRUCK_H * 0.45),
      anchor.position.z
    );
  } else {
    const p = controls.getObject().position;
    truckFireSprite.position.set(p.x, p.y - 0.55, p.z);
  }

  truckFireSprite.lookAt(camera.position.x, truckFireSprite.position.y, camera.position.z);
}
