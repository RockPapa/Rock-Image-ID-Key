function normalizeAssetName(url){
  if(!url) return "";
  const noQuery = String(url).split("?")[0];
  const parts = noQuery.split("/");
  const last = parts[parts.length - 1] || "";
  return decodeURIComponent(last).toLowerCase();
}

const MP3_ENABLE = false;
const MP3_ALLOWED_FILES = new Set(["motor.mp3", "wind.mp3", "skid.mp3", "stall.mp3"]);
function isMp3Url(url){
  const n = normalizeAssetName(url);
  return !!n && n.endsWith(".mp3");
}
function isAllowedMp3Url(url){
  const n = normalizeAssetName(url);
  return !!n && MP3_ALLOWED_FILES.has(n);
}

function resolveAssetUrl(url){
  if(!MP3_ENABLE && isMp3Url(url) && !isAllowedMp3Url(url)) return "";
  return url;
}

const _origTextureLoad = THREE.TextureLoader.prototype.load;
THREE.TextureLoader.prototype.load = function(url, onLoad, onProgress, onError){
  return _origTextureLoad.call(this, resolveAssetUrl(url), onLoad, onProgress, onError);
};

function getResolvedSpawnYWorldAtXZ(x, z){
  const fallbackSpawnY = AVATRUCK_SPAWN_Y_FT / ALTITUDE_FEET_PER_WORLD_UNIT;
  try{
    const terrainY = heightAtWorldXZ(x, z);
    if(Number.isFinite(terrainY)){
      return terrainY + PLAYER_EYE_HEIGHT + (SPAWN_CAMERA_AGL_FT / ALTITUDE_FEET_PER_WORLD_UNIT);
    }
  }catch(e){}
  return fallbackSpawnY;
}

function _setPlayerPositionToXZ(x, z, label = "checkpoint"){
  const obj = controls && typeof controls.getObject === "function" ? controls.getObject() : null;
  if(!obj) return;
  const spawnYWorld = getResolvedSpawnYWorldAtXZ(x, z);
  obj.position.set(x, spawnYWorld, z);
  truckYaw = THREE.MathUtils.degToRad(AVATRUCK_SPAWN_HEADING_DEG);
  obj.rotation.y = truckYaw;
  velY = 0;
  onGround = true;
  lKeyJumpLungePending = false;
  initialSpawnLockReleased = true;
  initialSpawnLockUntilMs = 0;
  if(label) hudLine("🧭 Respawned at <code>" + label + "</code>.");
}

function getCurrentJourneyStage(){
  if(alienObjectiveMode === "destination_green" || MINI_MAP_SHOW_GREEN_SQUARE || tunnelExitGoddessEncounterDone || tunnelExitGoddessEncounterActive){
    return 4; // fire ring / green objective
  }
  if(alienObjectiveMode === "destination_orange" || MINI_MAP_SHOW_ORANGE_SQUARE || orangeObjectiveReached){
    return 3; // tunnel cave run
  }
  if(alienObjectiveMode === "destination_blue" || MINI_MAP_SHOW_BLUE_SQUARE || hasReachedFountainPlaza()){
    return 2; // fountain plaza
  }
  return 1; // kill aliens
}

function respawnPlayerToPreviousStage(){
  if(deathRespawnInProgress) return;
  deathRespawnInProgress = true;

  const stage = getCurrentJourneyStage();
  const prevStage = Math.max(1, stage - 1);

  lowZoneStuckTimer = 0.0;
  lowZoneRestickGraceTimer = 0.0;
  hideBanner();

  if(tunnelExitGoddessVoiceAudio){
    try{ tunnelExitGoddessVoiceAudio.pause(); tunnelExitGoddessVoiceAudio.currentTime = 0; }catch(e){}
  }
  tunnelExitGoddessEncounterActive = false;

  if(prevStage === 3){
    MINI_MAP_SHOW_BLUE_SQUARE = false;
    MINI_MAP_SHOW_ORANGE_SQUARE = true;
    MINI_MAP_SHOW_GREEN_SQUARE = false;
    orangeObjectiveReached = false;
    tunnelExitGoddessEncounterDone = false;
    tunnelExitGoddessVoiceHasPlayed = false;
    setAlienObjectiveMode("destination_orange");
    setAlienObjectiveVisible(true);
    teleportToMinimapSquare("goddess");
    hudLine("💀 Health depleted. Returned to <code>Level 3: Tunnel Cave</code> (goddess checkpoint).");
  } else if(prevStage === 2){
    if(stage === 3){
      MINI_MAP_SHOW_BLUE_SQUARE = false;
      MINI_MAP_SHOW_ORANGE_SQUARE = true;
      MINI_MAP_SHOW_GREEN_SQUARE = false;
      orangeObjectiveReached = false;
      tunnelExitGoddessEncounterDone = false;
      tunnelExitGoddessVoiceHasPlayed = false;
      setAlienObjectiveMode("destination_orange");
      setAlienObjectiveVisible(true);
      teleportToMinimapSquare("goddess");
      hudLine("💀 Health depleted. Returned to <code>Level 3: Tunnel Cave</code> (goddess checkpoint).");
    } else {
      MINI_MAP_SHOW_BLUE_SQUARE = true;
      MINI_MAP_SHOW_ORANGE_SQUARE = false;
      MINI_MAP_SHOW_GREEN_SQUARE = false;
      orangeObjectiveReached = false;
      tunnelExitGoddessEncounterDone = false;
      tunnelExitGoddessVoiceHasPlayed = false;
      setAlienObjectiveMode("destination_blue");
      setAlienObjectiveVisible(true);
      teleportToMinimapSquare("blue");
      hudLine("💀 Health depleted. Returned to <code>Level 2: Fountain Plaza</code>.");
    }
  } else {
    MINI_MAP_SHOW_BLUE_SQUARE = false;
    MINI_MAP_SHOW_ORANGE_SQUARE = false;
    MINI_MAP_SHOW_GREEN_SQUARE = false;
    orangeObjectiveReached = false;
    tunnelExitGoddessEncounterDone = false;

    hudLine("💀 Health depleted. Returned to <code>Level 1: Kill Aliens</code>.");
  }

  setPlayerHealthPct(100);
  deathRespawnInProgress = false;
}

function updateLowZoneStuckState(dt){
  if(!LOW_ZONE_STUCK_ENABLE){
    if(lowZoneStuckTimer > 0) hideBanner();
    lowZoneStuckTimer = 0.0;
    lowZoneRestickGraceTimer = 0.0;
    lowZoneWasInside = null;
    return;
  }
  if(lowZoneRestickGraceTimer > 0){
    lowZoneRestickGraceTimer = Math.max(0, lowZoneRestickGraceTimer - dt);
  }

  if(lowZoneStuckTimer > 0){
    lowZoneStuckTimer = Math.max(0, lowZoneStuckTimer - dt);
    if(lowZoneStuckTimer === 0){
      hideBanner();
      lowZoneRestickGraceTimer = LOW_ZONE_RESTICK_GRACE_SEC;
    }
  }

  if(!terrainReady || !elevationZones) return;

  const obj = controls.getObject();
  if(!obj) return;

  const x = obj.position.x;
  const z = obj.position.z;
  const y = heightAtWorldXZ(x, z);
  const low = computeLowerZoneRange();

  const inLowZone = !isWaterAtXZ(x, z) && y >= low.minY && y <= low.maxY;

  if(lowZoneWasInside === null){
    lowZoneWasInside = inLowZone;
    return;
  }

  const shouldStick = inLowZone && lowZoneStuckTimer <= 0 && lowZoneRestickGraceTimer <= 0;
  if(shouldStick){
    adjustPlayerHealthPct(-LOW_ZONE_STUCK_HEALTH_PCT);
    showBanner("⛔ <b>STUCK</b> &nbsp; -5% HEALTH");
    lowZoneStuckTimer = LOW_ZONE_STUCK_DURATION_SEC;
  }

  lowZoneWasInside = inLowZone;
}

function cardinalFromHeading(heading){
  if (heading >= 337.5 || heading < 22.5) return "N";
  if (heading < 67.5) return "NE";
  if (heading < 112.5) return "E";
  if (heading < 157.5) return "SE";
  if (heading < 202.5) return "S";
  if (heading < 247.5) return "SW";
  if (heading < 292.5) return "W";
  return "NW";
}

function setTextIfChanged(el, value){
  if(el && el.textContent !== value) el.textContent = value;
}

function setHtmlIfChanged(el, value){
  if(el && el.innerHTML !== value) el.innerHTML = value;
}

function setDisplayIfChanged(el, value){

}

function setTransformIfChanged(el, value){

function updateMiniCompass(){
  if (!compassNeedle || !compassReadout) return;
  // Heightmap top is north => world -Z is north in this scene mapping.
  const yawDeg = THREE.MathUtils.radToDeg(truckYaw || 0);
  const heading = (360 - (((yawDeg % 360) + 360) % 360)) % 360;
  setTransformIfChanged(compassNeedle, `translate(-50%, -100%) rotate(${heading}deg)`);
  const card = cardinalFromHeading(heading);
  setTextIfChanged(compassReadout, `${card} ${String(Math.round(heading)).padStart(3, "0")}°`);
}

  const speedWorldPerSec = Math.max(0, MOVE_SPEED * (Number(currentSpeedMult) || 0));
  const speedFtPerSec = speedWorldPerSec * ALTITUDE_FEET_PER_WORLD_UNIT;
  return speedFtPerSec * 0.592484;
}

}

function updateAltimeterHud(){
  if(!altimeterHud) return;
  const obj = controls && typeof controls.getObject === "function" ? controls.getObject() : null;
  if(!obj || !terrainReady || !hmData){
    setTextIfChanged(altimeterHud, "ALT -- AGL");
    return;
  }

  const terrainY = heightAtWorldXZ(obj.position.x, obj.position.z);
  if(!Number.isFinite(terrainY)){
    setTextIfChanged(altimeterHud, "ALT -- AGL");
    return;
  }

  // Default mode: strict height above raw heightmap terrain.
  let label = "AGL";
  let rawAltFt = (obj.position.y - terrainY - PLAYER_EYE_HEIGHT) * ALTITUDE_FEET_PER_WORLD_UNIT;

  // Landing mode: if we are in post-takeoff landing phase and over a runway,
  // show height above runway surface instead of terrain AGL.
  const inLandingPhase = runwayLandingArmed && runwayLastAction === "takeoff";
  const landedRunwayPhase = runwayLastAction === "landing";
  if((inLandingPhase || landedRunwayPhase) && isOnAnyRunwayTopXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4)){
    const runwaySurfaceY = getActiveRunwaySurfaceYWorldAtXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
    if(Number.isFinite(runwaySurfaceY)){
      rawAltFt = (obj.position.y - runwaySurfaceY - PLAYER_EYE_HEIGHT) * ALTITUDE_FEET_PER_WORLD_UNIT;
      label = "RUNWAY";
    }
  }

  const shownAltFt = Math.max(-999, Math.min(99999, rawAltFt));

  if(altimeterAglFilteredFt == null || !Number.isFinite(altimeterAglFilteredFt)){
    altimeterAglFilteredFt = shownAltFt;
  } else {
    const a = Math.min(1.0, Math.max(0.0, ALTIMETER_SMOOTH_PER_SEC / 60.0));
    altimeterAglFilteredFt += (shownAltFt - altimeterAglFilteredFt) * a;
  }

  setTextIfChanged(altimeterHud, `ALT ${Math.round(altimeterAglFilteredFt)} ${label}`);
}

function clampPlayerMaxAltitude(obj){
  if(!obj) return;
  const groundY = getEffectiveGroundYWorldAtXZ(obj.position.x, obj.position.z);
  if(!Number.isFinite(groundY)) return;
  const maxAltWorld = MAX_ALTITUDE_FT / ALTITUDE_FEET_PER_WORLD_UNIT;
  const maxY = groundY + maxAltWorld;
  if(obj.position.y > maxY){
    obj.position.y = maxY;
    if(velY > 0) velY = 0;
  }
}

function updateAttitudeHud(){
  if(!attitudeCtx || !attitudeCanvas) return;

  const w = attitudeCanvas.width;
  const h = attitudeCanvas.height;
  const cx = w * 0.5;
  const cy = h * 0.5;
  const r = Math.min(w, h) * 0.5 - 2;

  const pitchRad = getRealPitchRad();
  const rollRad = camera.rotation.z || 0;
  const pitchDeg = THREE.MathUtils.radToDeg(pitchRad);

  // Scale pitch into vertical pixel offset for horizon motion.
  const pxPerDeg = (r * 0.85) / 45.0;
  const horizonY = cy + (pitchDeg * pxPerDeg);

  attitudeCtx.clearRect(0, 0, w, h);

  // Circular clip for the instrument face.
  attitudeCtx.save();
  attitudeCtx.beginPath();
  attitudeCtx.arc(cx, cy, r, 0, Math.PI * 2);
  attitudeCtx.clip();

  attitudeCtx.save();
  attitudeCtx.translate(cx, cy);
  attitudeCtx.rotate(rollRad);
  attitudeCtx.translate(-cx, -cy);

  // Blue sky / brown ground.
  attitudeCtx.fillStyle = "#4aa8ff";
  attitudeCtx.fillRect(0, -h * 2, w, horizonY + h * 2);
  attitudeCtx.fillStyle = "#8a5a2b";
  attitudeCtx.fillRect(0, horizonY, w, h * 3);

  // Horizon line (aircraft reference moves against it).
  attitudeCtx.strokeStyle = "#ffffff";
  attitudeCtx.lineWidth = 2;
  attitudeCtx.beginPath();
  attitudeCtx.moveTo(-w, horizonY);
  attitudeCtx.lineTo(w * 2, horizonY);
  attitudeCtx.stroke();

  attitudeCtx.restore();
  attitudeCtx.restore();

  // Instrument bezel + fixed level reference (0 pitch / 0 roll marker).
  attitudeCtx.strokeStyle = "rgba(255,255,255,0.85)";
  attitudeCtx.lineWidth = 2;
  attitudeCtx.beginPath();
  attitudeCtx.arc(cx, cy, r, 0, Math.PI * 2);
  attitudeCtx.stroke();

  attitudeCtx.strokeStyle = "#f2f2f2";
  attitudeCtx.lineWidth = 2;
  attitudeCtx.beginPath();
  attitudeCtx.moveTo(cx - 24, cy);
  attitudeCtx.lineTo(cx - 8, cy);

function buildMiniMapHeightLayer(){
  if(miniMapHeightReady) return true;
  if(!miniMapCanvas || !terrainReady || !hmData || !hmW || !hmH) return false;

  const w = miniMapCanvas.width;
  const h = miniMapCanvas.height;
  miniMapHeightCanvas = document.createElement("canvas");
  miniMapHeightCanvas.width = w;
  miniMapHeightCanvas.height = h;
  const ctx = miniMapHeightCanvas.getContext("2d");
  if(!ctx) return false;

  const img = ctx.createImageData(w, h);
  const a = img.data;

  for(let py = 0; py < h; py++){
    const v = py / Math.max(1, h - 1);
    const hy = Math.floor(v * (hmH - 1));
    for(let px = 0; px < w; px++){
      const u = px / Math.max(1, w - 1);
      const hx = Math.floor(u * (hmW - 1));
      const i = (hy * hmW + hx) * 4;
      const n = hmData[i] / 255;

      const idx = (py * w + px) * 4;
      const r = Math.floor(18 + (n * 142));
      const g = Math.floor(30 + (n * 164));
      const b = Math.floor(24 + (n * 118));
      a[idx + 0] = r;
      a[idx + 1] = g;
      a[idx + 2] = b;
      a[idx + 3] = 255;
    }
  }

  ctx.putImageData(img, 0, 0);
  miniMapHeightReady = true;
  return true;
}

function worldToMiniCell(x, z){
  const u = clamp01((x / GROUND_SIZE) + 0.5);
  const v = clamp01((z / GROUND_SIZE) + 0.5);
  const gx = Math.max(0, Math.min(MINI_MAP_GRID - 1, Math.floor(u * MINI_MAP_GRID)));
  const gy = Math.max(0, Math.min(MINI_MAP_GRID - 1, Math.floor(v * MINI_MAP_GRID)));
  return { gx, gy, u, v };
}

function markMiniMapVisited(x, z){
  const c = worldToMiniCell(x, z);
  const idx = (c.gy * MINI_MAP_GRID) + c.gx;
  if(miniMapVisited[idx] === 0){
    miniMapVisited[idx] = 1;
    miniMapVisitedCount += 1;
  }
}

function evaluateRunwayLanding(speedKt, pitchDeg, sinkFpm){
  void speedKt;
  void pitchDeg;
  void sinkFpm;
  if(!LANDING_SPECIAL_BEHAVIOR_ENABLE) return;
  if(crashGameOver) return;
  if(runwayLandingEvalCooldown > 0) return;
  const objNow = controls && typeof controls.getObject === "function" ? controls.getObject() : null;

  // Landing state transition is only valid after a real takeoff event.
  if(!(runwayLandingArmed && runwayLastAction === "takeoff")) return;

  const runwaySurfaceY = objNow ? getActiveRunwaySurfaceYWorldAtXZ(objNow.position.x, objNow.position.z, TRUCK_COLLISION_RADIUS * 0.4) : NaN;
  const runwayAltFt = (objNow && Number.isFinite(runwaySurfaceY))
    ? ((objNow.position.y - runwaySurfaceY - PLAYER_EYE_HEIGHT) * ALTITUDE_FEET_PER_WORLD_UNIT)
    : NaN;
  const skidTouchdownWindow = Number.isFinite(runwayAltFt) && Math.abs(runwayAltFt) <= RUNWAY_SUCCESS_TOUCH_Y_TOL_FT;
  const descendingTouch = Number.isFinite(sinkFpm) && sinkFpm > 1.0;
  if(!runwayTakeoffClimbConfirmed) return;
  if(skidTouchdownWindow){
    if(!descendingTouch) return;
    altimeterAglFilteredFt = runwayAltFt;
    runwayLandingEvalCooldown = RUNWAY_LANDING_EVAL_COOLDOWN_SEC;
    stopPlaneZeroThrottleWindAudio();
    playCaveWallSkidAudio();
    runwayDebugSkidAtMs = performance.now();
    runwayDebugStoppedAtMs = 0;
    setRunwayDebugActive(true);
  }

  runwayLastAction = "landing";
  runwayLandingArmed = false;
  runwayTakeoffClimbConfirmed = false;
  runwaySuccessfulLandingRolloutSafe = true;
  terrainLandingRolloutActive = false;
  terrainLandingRolloutSpeedMult = 0.0;
  landingRolloutInertiaTimer = ROLLOUT_BEHAVIOR_ENABLE ? LANDING_ROLLOUT_INERTIA_WINDOW_SEC : 0.0;
  const tdSpeedFps = Math.max(0, (Number.isFinite(speedKt) ? speedKt : 0) * 1.68781);
  const dynamicStopDistFt = (tdSpeedFps * tdSpeedFps) / Math.max(1e-6, (2.0 * LANDING_ROLLOUT_REF_DECEL_FPS2));
  landingRolloutDistanceRemainingFt = ROLLOUT_BEHAVIOR_ENABLE
    ? Math.max(
      LANDING_ROLLOUT_STOP_DISTANCE_FT,
      dynamicStopDistFt + LANDING_ROLLOUT_BUFFER_FT
    )
    : 0.0;
  const speedMultNow = Number.isFinite(currentSpeedMult) ? Math.max(0, currentSpeedMult) : 0;
  const speedMultFromKt = (Number.isFinite(speedKt) && WORLD_SPEED_MULT_TO_KT > 1e-6)
    ? Math.max(0, speedKt / WORLD_SPEED_MULT_TO_KT)
    : 0;
  landingRolloutPreIdleSpeedMult = (ROLLOUT_BEHAVIOR_ENABLE || RUNWAY_GROUND_ROLLOUT_ENABLE) ? Math.max(speedMultNow, speedMultFromKt) : 0.0;
  landingRolloutReferenceSpeedMult = RUNWAY_GROUND_ROLLOUT_ENABLE ? Math.max(landingRolloutPreIdleSpeedMult, speedMultNow, speedMultFromKt) : 0.0;
  landingRolloutStopStartSpeedMult = 0.0;
  landingRolloutStopRemainingSec = 0.0;
  landingRolloutStopDeadlineMs = 0;
  landingRolloutBrakeActivePrev = false;
  landingRolloutBrakeLatched = false;
  landingRolloutSpeedLatched = false;
  updateRunwayDebugHud();
}

function updateRunwayTakeoffLandingState(obj){
  if(!obj) return;
  const onRunwayNow = isOnAnyRunwayTopXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
  const onGroundNow = !!onGround;

  if(!runwayStateInitialized){
    runwayPrevOnGround = onGroundNow;
    runwayPrevOnRunway = onRunwayNow;
    runwayStateInitialized = true;
    return;
  }

  const tookOffNow = runwayPrevOnGround && !onGroundNow && runwayPrevOnRunway;
  if(tookOffNow){
    runwayLastAction = "takeoff";
    runwayLandingArmed = true;
    runwayTakeoffClimbConfirmed = false;
    runwaySuccessfulLandingRolloutSafe = false;
    terrainLandingRolloutActive = false;
    terrainLandingRolloutSpeedMult = 0.0;
    landingRolloutInertiaTimer = 0.0;
    landingRolloutPreIdleSpeedMult = 0.0;
    landingRolloutReferenceSpeedMult = 0.0;
    landingRolloutStopStartSpeedMult = 0.0;
    landingRolloutStopRemainingSec = 0.0;
    landingRolloutStopDeadlineMs = 0;
    landingRolloutBrakeActivePrev = false;
    landingRolloutBrakeLatched = false;
    landingRolloutSpeedLatched = false;
    landingRolloutDistanceRemainingFt = 0.0;
    hudLine("🛫 Takeoff detected.");
  }

  if(runwayLandingArmed && runwayLastAction === "takeoff" && !runwayTakeoffClimbConfirmed){
    const groundY = getEffectiveGroundYWorldAtXZ(obj.position.x, obj.position.z);
    if(Number.isFinite(groundY)){
      const aglFt = (obj.position.y - groundY) * ALTITUDE_FEET_PER_WORLD_UNIT;
      const runwayTopAglFt = SCREENSHOT_MARKER_TOP_Y_FT;
      if(aglFt >= (runwayTopAglFt + RUNWAY_POST_TAKEOFF_CLIMB_CONFIRM_FT)){
        runwayTakeoffClimbConfirmed = true;
      }
    }
  }

  runwayPrevOnGround = onGroundNow;
  runwayPrevOnRunway = onRunwayNow;
}

function applyRunwayCameraCollision(obj, prevY){
  if(!obj || crashGameOver) return false;
  const onPuebloTopXZ = isOnPuebloCubeTopXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
  const puebloTopEyeY = getPuebloCubeTopEyeY();
  const onMarkerTopXZ = isOnScreenshotRunwayTopXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
  const markerTopEyeY = getScreenshotRunwayTopEyeY();
  const onTerrainRunwayTopXZ = isOnTerrainRunwayTopXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
  const terrainRunwayTopEyeY = getTerrainRunwayTopEyeY();

  let topEyeY = -Infinity;
  let onRunwayTopXZ = false;
  if(onPuebloTopXZ && Number.isFinite(puebloTopEyeY)){
    topEyeY = puebloTopEyeY;
    onRunwayTopXZ = true;
  }
  if(onMarkerTopXZ && Number.isFinite(markerTopEyeY) && markerTopEyeY > topEyeY){
    topEyeY = markerTopEyeY;
    onRunwayTopXZ = true;
  }
  if(onTerrainRunwayTopXZ && Number.isFinite(terrainRunwayTopEyeY) && terrainRunwayTopEyeY > topEyeY){
    topEyeY = terrainRunwayTopEyeY;
    onRunwayTopXZ = true;
  }
  if(!onRunwayTopXZ || !Number.isFinite(topEyeY)) return false;

  const crossedDown = (prevY > topEyeY) && (obj.position.y <= topEyeY);
  if(!crossedDown) return false;

  const impactVelY = velY;
  obj.position.y = topEyeY;
  velY = 0;
  onGround = true;
  stallActive = false;
  stopStallAudio();

  const tdSpeedKt = getCurrentAirspeedKnots();
  const tdPitchDeg = getRealPitchDeg();
  const tdSinkFpm = Math.max(0, (-impactVelY * ALTITUDE_FEET_PER_WORLD_UNIT * 60.0));
  evaluateRunwayLanding(tdSpeedKt, tdPitchDeg, tdSinkFpm);
  return true;
}

function pickPreferredFemaleVoice(){
  if(!("speechSynthesis" in window)) return null;
  const voices = window.speechSynthesis.getVoices() || [];
  if(!voices.length) return null;

  const femaleHints = ["female", "woman", "zira", "susan", "samantha", "victoria", "karen", "moira", "ava", "allison", "aria"];
  const englishVoices = voices.filter(v => /^en(-|_|$)/i.test(v.lang || ""));
  const pool = englishVoices.length ? englishVoices : voices;

  for(const v of pool){
    const n = String(v.name || "").toLowerCase();
    if(femaleHints.some(h => n.includes(h))) return v;
  }

  return pool[0] || null;
}

function speakFemaleNarration(text, rate = PUEBLO_FOUNTAIN_PLAZA_VOICE_RATE, pitch = PUEBLO_FOUNTAIN_PLAZA_VOICE_PITCH, volume = PUEBLO_FOUNTAIN_PLAZA_VOICE_VOL){
  if(!("speechSynthesis" in window) || typeof SpeechSynthesisUtterance === "undefined"){
    if(!plazaVoiceWarnedUnavailable){
      hudLine("⚠️ Browser voice unavailable for plaza narration.");
      plazaVoiceWarnedUnavailable = true;
    }
    return;
  }

  const speakNow = ()=>{
    try{
      const chosen = pickPreferredFemaleVoice();
      const parts = String(text || "").match(/[^.!?]+[.!?]*/g) || [String(text || "")];
      const lines = parts.map(s => s.trim()).filter(Boolean);
      const pitchOffsets = [0.00, 0.10, -0.04, 0.12, 0.02];
      const rateOffsets = [0.00, 0.02, -0.01, 0.015, 0.005];

      window.speechSynthesis.cancel();
      for(let i = 0; i < lines.length; i++){
        const utter = new SpeechSynthesisUtterance(lines[i]);
        const pOff = pitchOffsets[i % pitchOffsets.length];
        const rOff = rateOffsets[i % rateOffsets.length];
        utter.rate = Math.max(0.55, Math.min(1.25, rate + rOff));
        utter.pitch = Math.max(0.75, Math.min(1.7, pitch + pOff));
        utter.volume = volume;
        if(chosen) utter.voice = chosen;
        window.speechSynthesis.speak(utter);
      }
    }catch(e){}
  };

  const voices = window.speechSynthesis.getVoices() || [];
  if(voices.length){
    speakNow();
  } else {
    const onVoices = ()=>{
      window.speechSynthesis.removeEventListener("voiceschanged", onVoices);
      speakNow();
    };
    window.speechSynthesis.addEventListener("voiceschanged", onVoices, { once:true });
    setTimeout(speakNow, 250);
  }
}

function setupFountainPlazaVoiceGain(){
  if(!fountainPlazaVoiceAudio) return;
  if(fountainPlazaVoiceSource || fountainPlazaVoiceGain) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  try{
    fountainPlazaVoiceCtx = fountainPlazaVoiceCtx || new AC();
    fountainPlazaVoiceSource = fountainPlazaVoiceCtx.createMediaElementSource(fountainPlazaVoiceAudio);

    fountainPlazaVoiceHighpass = fountainPlazaVoiceCtx.createBiquadFilter();
    fountainPlazaVoiceHighpass.type = "highpass";
    fountainPlazaVoiceHighpass.frequency.value = 165;

    fountainPlazaVoicePresence = fountainPlazaVoiceCtx.createBiquadFilter();
    fountainPlazaVoicePresence.type = "highshelf";
    fountainPlazaVoicePresence.frequency.value = 3200;
    fountainPlazaVoicePresence.gain.value = 3.5;

    fountainPlazaVoiceGain = fountainPlazaVoiceCtx.createGain();
    fountainPlazaVoiceGain.gain.value = PUEBLO_FOUNTAIN_PLAZA_VOICE_FILE_GAIN;

    fountainPlazaVoiceWetGain = fountainPlazaVoiceCtx.createGain();

/* =========================================================
   ✨ HIT PARTICLES (SAFE)
   - Tiny sparkle burst on hits (target cube + bad guy)
   - Very lightweight: THREE.Points, short lifetime, fades out
   ========================================================= */
const HIT_PARTICLES_ENABLE = true;
const HIT_PARTICLE_COUNT   = 22;   // 12–40
const HIT_PARTICLE_LIFE    = 0.35; // seconds
const HIT_PARTICLE_SPEED   = 6.5;  // world units/sec
const HIT_PARTICLE_SIZE    = 10.0; // pixels (PointsMaterial.size)

const hitBursts = []; // { points, vels: Float32Array, life, maxLife, baseOpacity }

function spawnHitBurst(worldPos, colorHex=0xffffff){
  if (!HIT_PARTICLES_ENABLE) return;

  const count = HIT_PARTICLE_COUNT;
  const positions = new Float32Array(count * 3);
  const vels      = new Float32Array(count * 3);

  // random burst in a small sphere
  for (let i=0; i<count; i++){
    const k = i*3;
    const theta = Math.random() * Math.PI * 2;
    const u = Math.random() * 2 - 1;          // -1..1
    const r = Math.cbrt(Math.random()) * 0.22; // compact radius

    const s = Math.sqrt(1 - u*u);
    const dx = r * s * Math.cos(theta);
    const dy = r * u;
    const dz = r * s * Math.sin(theta);

    positions[k+0] = worldPos.x + dx;
    positions[k+1] = worldPos.y + dy;
    positions[k+2] = worldPos.z + dz;

    // velocity direction (normalized) * speed with a bit of upward bias
    const vx = dx;
    const vy = dy + 0.35;
    const vz = dz;
    const len = Math.max(0.0001, Math.hypot(vx, vy, vz));
    const sp = HIT_PARTICLE_SPEED * (0.45 + Math.random()*0.75);

    vels[k+0] = (vx/len) * sp;
    vels[k+1] = (vy/len) * sp;
    vels[k+2] = (vz/len) * sp;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

  const mat = new THREE.PointsMaterial({
    color: colorHex,
    size: HIT_PARTICLE_SIZE,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.95,
    depthWrite: false
  });

  const pts = new THREE.Points(geo, mat);
  pts.renderOrder = 998; // above most things, below truck draw-on-top
  scene.add(pts);

  hitBursts.push({
    points: pts,
    vels,
    life: HIT_PARTICLE_LIFE,
    maxLife: HIT_PARTICLE_LIFE,
    baseOpacity: mat.opacity
  });
}

function updateHitBursts(dt){

  if (!HIT_PARTICLES_ENABLE) return;
  for (let i = hitBursts.length - 1; i >= 0; i--){
    const b = hitBursts[i];
    b.life -= dt;

    const geo = b.points.geometry;
    const pos = geo.attributes.position;
    const a = pos.array;

    // simple movement + tiny gravity
    for (let j=0; j<a.length; j+=3){
      b.vels[j+1] -= 12.0 * dt; // gravity
      a[j+0] += b.vels[j+0] * dt;
      a[j+1] += b.vels[j+1] * dt;
      a[j+2] += b.vels[j+2] * dt;
    }
    pos.needsUpdate = true;

    // fade out
    const t = Math.max(0, b.life / b.maxLife);
    b.points.material.opacity = b.baseOpacity * t;

    if (b.life <= 0){
      scene.remove(b.points);
      b.points.geometry.dispose();
      b.points.material.dispose();
      hitBursts.splice(i, 1);
    }
  }
}

  const w = window.innerWidth || innerWidth;
  const h = window.innerHeight || innerHeight;
  camera.aspect = w / h;

  rearViewCamera.aspect = w / h;

  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, RENDER_PIXEL_RATIO_MAX));

function renderActiveCamera(){
  renderer.setViewport(0, 0, window.innerWidth || innerWidth, window.innerHeight || innerHeight);

  if(rearViewEnabled){
    rearViewCamera.position.copy(camera.position);
    rearViewCamera.quaternion.copy(camera.quaternion);
    rearViewCamera.rotation.order = "YXZ";
    rearViewCamera.rotation.y += Math.PI;
    rearViewCamera.fov = camera.fov;
    rearViewCamera.aspect = camera.aspect;
    rearViewCamera.updateProjectionMatrix();
    renderer.render(scene, rearViewCamera);
  } else {
    renderer.render(scene, camera);
  }
}

  const landedOnRunway = onGround || (runwayLastAction === "landing" && runwaySuccessfulLandingRolloutSafe);
  const stoppedOnRunway = landedOnRunway && landingRunwayContext && (displayedStopped || rolloutStopped);
  return stoppedOnRunway;
}
function isLandingTouchdownOnRunway(){
  const obj = controls && typeof controls.getObject === "function" ? controls.getObject() : null;
  if(!obj) return false;

  const overRunwayNow = isOnAnyRunwayTopXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
  const landingRunwayContext = runwayLastAction === "landing" && (overRunwayNow || runwaySuccessfulLandingRolloutSafe);
  if(!landingRunwayContext) return false;

  const runwaySurfaceY = getActiveRunwaySurfaceYWorldAtXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
  const runwayAltFt = Number.isFinite(runwaySurfaceY)
    ? ((obj.position.y - runwaySurfaceY - PLAYER_EYE_HEIGHT) * ALTITUDE_FEET_PER_WORLD_UNIT)
    : NaN;
  const nearRunwayAltZero = Number.isFinite(runwayAltFt) && Math.abs(runwayAltFt) <= RUNWAY_SUCCESS_TOUCH_Y_TOL_FT;
  return nearRunwayAltZero || (onGround && runwaySuccessfulLandingRolloutSafe);
}

function updateTakeoffTestMonitor(){
  if(!takeoffTestActive || trainingFreezeActive) return;
  const obj = controls && typeof controls.getObject === "function" ? controls.getObject() : null;
  if(!obj) return;

  const speedKt = getCurrentAirspeedKnots();
  const speedBad = speedKt < TAKEOFF_TEST_AIRSPEED_MIN_KT || speedKt > TAKEOFF_TEST_AIRSPEED_MAX_KT;
  if(speedBad && !takeoffTestAirspeedViolationActive){
    takeoffTestAirspeedViolationActive = true;
    applyTakeoffTestPenalty("airspeed outside 0-90 KT");
  } else if(!speedBad){
    takeoffTestAirspeedViolationActive = false;
  }

  const pitchDeg = getRealPitchDeg();
  const pitchBad = pitchDeg < TAKEOFF_TEST_PITCH_MIN_DEG || pitchDeg > TAKEOFF_TEST_PITCH_MAX_DEG;
  if(pitchBad && !takeoffTestPitchViolationActive){
    takeoffTestPitchViolationActive = true;
    applyTakeoffTestPenalty("pitch outside 0-15 deg");
  } else if(!pitchBad){
    takeoffTestPitchViolationActive = false;
  }

  const onRunwayNow = isOnAnyRunwayTopXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
  const onGroundNow = !!onGround;
  const tookOffNow = takeoffTestPrevOnGround && !onGroundNow && takeoffTestPrevOnRunway;
  if(tookOffNow && !takeoffTestLiftoffSpeedViolationDone){
    const liftoffSpeedBad = speedKt < TAKEOFF_TEST_LIFTOFF_AIRSPEED_MIN_KT || speedKt > TAKEOFF_TEST_LIFTOFF_AIRSPEED_MAX_KT;
    if(liftoffSpeedBad){
      takeoffTestLiftoffSpeedViolationDone = true;
      applyTakeoffTestPenalty("liftoff airspeed outside 50-70 KT");
    }
  }

  const groundY = getEffectiveGroundYWorldAtXZ(obj.position.x, obj.position.z);
  const aglFt = Number.isFinite(groundY)
    ? Math.max(0, (obj.position.y - groundY) * ALTITUDE_FEET_PER_WORLD_UNIT)
    : NaN;
  const leftRunwayNow = takeoffTestPrevOnRunway && !onRunwayNow;
  if(leftRunwayNow && !takeoffTestRunwayExitViolationDone && Number.isFinite(aglFt) && aglFt < TAKEOFF_TEST_RUNWAY_EXIT_MIN_AGL_FT){
    takeoffTestRunwayExitViolationDone = true;
    applyTakeoffTestPenalty("left runway below 400 FT");
  }
  takeoffTestPrevOnGround = onGroundNow;
  takeoffTestPrevOnRunway = onRunwayNow;
}
function updateLandingTestMonitor(dt){
  if(!landingTestActive || trainingFreezeActive) return;
  const obj = controls && typeof controls.getObject === "function" ? controls.getObject() : null;
  if(!obj) return;

  const speedKt = getCurrentAirspeedKnots();
  const speedBad = speedKt < LANDING_TEST_AIRSPEED_MIN_KT || speedKt > LANDING_TEST_AIRSPEED_MAX_KT;
  if(speedBad && !landingTestAirspeedViolationActive){
    landingTestAirspeedViolationActive = true;
    applyLandingTestPenalty("airspeed outside 0-75 KT");
  } else if(!speedBad){
    landingTestAirspeedViolationActive = false;
  }

  const pitchDeg = getRealPitchDeg();
  const pitchBad = pitchDeg < LANDING_TEST_PITCH_MIN_DEG || pitchDeg > LANDING_TEST_PITCH_MAX_DEG;
  if(pitchBad && !landingTestPitchViolationActive){
    landingTestPitchViolationActive = true;
    applyLandingTestPenalty("pitch outside -4.5 to +2 deg");
  } else if(!pitchBad){
    landingTestPitchViolationActive = false;
  }

  const overRunwayNow = isOnAnyRunwayTopXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
  const flyingOverRunwayNow = overRunwayNow && !onGround;
  landingTestOverRunwayTimer = flyingOverRunwayNow
    ? landingTestOverRunwayTimer + Math.max(0, Number(dt) || 0)
    : 0.0;

  const throttlePct = (Math.max(0, throttleSpeedMult) / Math.max(1e-6, THROTTLE_UI_FULL_SCALE_MULT)) * 100.0;
  const throttleBad = landingTestOverRunwayTimer >= LANDING_TEST_RUNWAY_THROTTLE_DELAY_SEC && throttlePct > LANDING_TEST_THROTTLE_ZERO_MAX_PCT;
  if(throttleBad && !landingTestThrottleViolationActive){
    landingTestThrottleViolationActive = true;
    applyLandingTestPenalty("throttle not zero within 5 sec while flying over runway");
  } else if(!throttleBad){
    landingTestThrottleViolationActive = false;
  }

  reportLandingTestResultIfTouchedDown();
}
function startLandingTrainingRun(){
  const obj = controls && typeof controls.getObject === "function" ? controls.getObject() : null;
  if(!obj) return;
  trainingLandingRunActive = true;
  const ft = WORLD_UNITS_PER_FOOT;
  const runwayCenterX = TERRAIN_RUNWAY_ANCHOR_X + (TERRAIN_RUNWAY_X_OFFSET_FT * ft);
  const runwayCenterZ = TERRAIN_RUNWAY_ANCHOR_Z + (TERRAIN_RUNWAY_Z_OFFSET_FT * ft);
  const towerAimX = Number.isFinite(flightTowerAimX) ? flightTowerAimX : runwayCenterX;
  const towerAimZ = Number.isFinite(flightTowerAimZ) ? flightTowerAimZ : AVATRUCK_SPAWN_Z;
  const startX = TRAINING_LANDING_START_X;
  const startZ = TRAINING_LANDING_START_Z;

  _setPlayerPositionToXZ(startX, startZ, "Landing training start");

  const groundY = getEffectiveGroundYWorldAtXZ(startX, startZ);
  const startY = Number.isFinite(groundY)
    ? (groundY + PLAYER_EYE_HEIGHT + (TRAINING_LANDING_START_AGL_FT / ALTITUDE_FEET_PER_WORLD_UNIT))
    : obj.position.y;
  obj.position.y = startY;

  const dx = towerAimX - startX;
  const dz = towerAimZ - startZ;
  truckYaw = Math.atan2(-dx, -dz);
  obj.rotation.y = truckYaw;

  const targetSpeedMult = TRAINING_LANDING_START_SPEED_KT / Math.max(1e-6, WORLD_SPEED_MULT_TO_KT);
  const landingThrottleMult = (TRAINING_LANDING_START_THROTTLE_PCT / 100.0) * THROTTLE_UI_FULL_SCALE_MULT;
  currentSpeedMult = targetSpeedMult;
  effectiveThrottleMult = landingThrottleMult;
  prevThrottleSpeedMult = landingThrottleMult;
  setThrottleMult(landingThrottleMult);
  velY = 0;
  onGround = false;
  pitchFlightActive = true;

  runwayLastAction = "takeoff";
  runwayLandingArmed = true;
  runwayTakeoffClimbConfirmed = true;
  runwayStateInitialized = false;
  runwayPrevOnGround = false;
  runwayPrevOnRunway = false;
  runwaySuccessfulLandingRolloutSafe = false;
  terrainLandingRolloutActive = false;
  terrainLandingRolloutSpeedMult = 0.0;
  runwayLandingEvalCooldown = 0.0;
  landingRolloutInertiaTimer = 0.0;
  landingRolloutPreIdleSpeedMult = 0.0;
  landingRolloutReferenceSpeedMult = 0.0;
  landingRolloutStopStartSpeedMult = 0.0;
  landingRolloutStopRemainingSec = 0.0;
  landingRolloutStopDeadlineMs = 0;
  landingRolloutBrakeActivePrev = false;
  landingRolloutBrakeLatched = false;

}

function applyDayNightBlend(t){
  const k = THREE.MathUtils.clamp(t, 0, 1);

  sun.color.copy(__daySunColor).lerp(__nightSunColor, k);
  sun.intensity = THREE.MathUtils.lerp(__daySunIntensity, NIGHT_SUN_INTENSITY, k);
  sun.position.set(
    THREE.MathUtils.lerp(__daySunPos.x, 120, k),
    THREE.MathUtils.lerp(__daySunPos.y, 90, k),

}

function updateCaveDayNightAndHeadlight(dt = 0){
  const obj = (controls && typeof controls.getObject === "function") ? controls.getObject() : null;
  if(!obj) return;

  const inGreenZone = isInsideGreenSquareArea(obj.position.x, obj.position.z);
  const nightActive = GREEN_ZONE_NIGHT_MODE_ENABLE && inGreenZone;

  const inCave = isTruckInsideCaveForLighting(obj.position.x, obj.position.y, obj.position.z);
  const forcedBlackout = POST_REAPER_CAVE_BLACKOUT_ENABLE && postReaperCaveBlackoutApplied && inCave;
  const visualNightActive = forcedBlackout ? true : (nightActive && !inCave);

  caveNightActive = visualNightActive;
  applyDayNightBlend(visualNightActive ? 1 : 0);

  const headlightScale = forcedBlackout
    ? POST_REAPER_BLACKOUT_HEADLIGHT_FACTOR
    : (postReaperHeadlightDimApplied ? POST_REAPER_HEADLIGHT_DIM_FACTOR : 1.0);
  const fillScale = forcedBlackout
    ? POST_REAPER_BLACKOUT_FILL_FACTOR
    : (postReaperHeadlightDimApplied ? POST_REAPER_HEADLIGHT_DIM_FACTOR : 1.0);
  truckHeadlight.intensity = TRUCK_HEADLIGHT_INTENSITY * headlightScale;
  truckHeadlightFill.intensity = TRUCK_HEADLIGHT_FILL_INTENSITY * fillScale;
  const allowHeadlights = visualNightActive || forcedBlackout;
  const isAvatarLeggoman = (avatarMode === "leggoman");

  if(TRUCK_HEADLIGHT_ENABLE && NIGHT_MODE_ENABLE && allowHeadlights){
    camera.getWorldDirection(__tmpHeadDir).normalize();
    __tmpHeadPos.copy(obj.position).addScaledVector(__tmpHeadDir, 1.4);
    __tmpHeadPos.y -= 1.15;

    truckHeadlight.position.copy(__tmpHeadPos);
    truckHeadlight.target.position.copy(__tmpHeadPos).addScaledVector(__tmpHeadDir, 34.0);
    truckHeadlight.visible = true;

    truckHeadlightFill.position.copy(__tmpHeadPos).addScaledVector(__tmpHeadDir, 2.0);
    truckHeadlightFill.visible = true;
  } else {
    truckHeadlight.visible = false;
    truckHeadlightFill.visible = false;
  }

  if(isAvatarLeggoman && !forcedBlackout){
    camera.getWorldDirection(__tmpHeadDir).normalize();
    __tmpHeadPos.copy(obj.position).addScaledVector(__tmpHeadDir, 1.1);
    __tmpHeadPos.y -= 0.25;
    avatarHeadlight.position.copy(__tmpHeadPos);
    avatarHeadlight.target.position.copy(__tmpHeadPos).addScaledVector(__tmpHeadDir, 42.0);
    avatarHeadlight.visible = true;
  } else {
    avatarHeadlight.visible = false;
  }
}

function sampleTerrainMinYForRect(cx, cz, width, depth, sampleSteps = PUEBLO_TEST_CUBE_FOOTPRINT_SAMPLES){
  const steps = Math.max(2, Math.floor(sampleSteps));
  const halfW = width * 0.5;
  const halfD = depth * 0.5;
  let minY = Infinity;

  for(let iz = 0; iz <= steps; iz++){
    const z = cz - halfD + (depth * (iz / steps));
    for(let ix = 0; ix <= steps; ix++){
      const x = cx - halfW + (width * (ix / steps));
      const y = heightAtWorldXZ(x, z);
      if(y < minY) minY = y;
    }
  }

  if(!Number.isFinite(minY)) return heightAtWorldXZ(cx, cz);
  return minY;
}

function findNearbyHighZoneAnchor(spawnX, spawnZ){
  const high = computeUpperZoneRange();
  const r = Math.max(PUEBLO_TEST_CUBE_MIN_SPAWN_DIST, PUEBLO_TEST_CUBE_SEARCH_RADIUS);
  const step = Math.max(4, PUEBLO_TEST_CUBE_SEARCH_STEP);

  let bestHigh = null;
  let bestAny = null;

  for(let dz = -r; dz <= r; dz += step){
    for(let dx = -r; dx <= r; dx += step){
      const dist = Math.hypot(dx, dz);
      if(dist < PUEBLO_TEST_CUBE_MIN_SPAWN_DIST || dist > r) continue;

      const x = spawnX + dx;
      const z = spawnZ + dz;
      if(isWaterAtXZ(x, z)) continue;

      const y = heightAtWorldXZ(x, z);
      const score = y - (dist * 0.10); // favor high points but keep placement near spawn

      if(y >= high.minY){
        if(!bestHigh || score > bestHigh.score){
          bestHigh = { x, z, y, score };
        }
      } else if(!bestAny || score > bestAny.score){
        bestAny = { x, z, y, score };
      }
    }
  }

  if(bestHigh) return bestHigh;
  if(bestAny) return bestAny;

  const y0 = heightAtWorldXZ(spawnX, spawnZ);
  return { x: spawnX, z: spawnZ, y: y0, score: y0 };
}

function placeFlightControlTowerNearSpawn(spawnX, spawnZ){
  if(flightControlTowerGroup && flightControlTowerGroup.parent){
    flightControlTowerGroup.parent.remove(flightControlTowerGroup);
  }
  flightControlTowerGroup = null;
  if(!terrainReady) return;
  if(!Number.isFinite(spawnX) || !Number.isFinite(spawnZ)) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const terrainRunwayX = TERRAIN_RUNWAY_ANCHOR_X + (TERRAIN_RUNWAY_X_OFFSET_FT * ft);
  const westX = terrainRunwayX - (FLIGHT_TOWER_EAST_OF_TERRAIN_RUNWAY_FT * ft);
  const eastX = terrainRunwayX + (FLIGHT_TOWER_EAST_OF_TERRAIN_RUNWAY_FT * ft);
  const terrainRunwayZ = spawnZ;
  flightTowerAimX = terrainRunwayX;
  flightTowerAimZ = terrainRunwayZ;

  const totalH = FLIGHT_TOWER_TOTAL_HEIGHT_FT * ft;
  const baseH = FLIGHT_TOWER_BASE_H_FT * ft;
  const cabH = FLIGHT_TOWER_CAB_H_FT * ft;
  const roofH = FLIGHT_TOWER_ROOF_H_FT * ft;
  const shaftH = Math.max(2 * ft, totalH - baseH - cabH - roofH);

  const baseW = FLIGHT_TOWER_BASE_W_FT * ft;
  const baseD = FLIGHT_TOWER_BASE_D_FT * ft;
  const shaftW = FLIGHT_TOWER_SHAFT_W_FT * ft;
  const shaftD = FLIGHT_TOWER_SHAFT_D_FT * ft;
  const cabW = FLIGHT_TOWER_CAB_W_FT * ft;
  const cabD = FLIGHT_TOWER_CAB_D_FT * ft;
  const arrowLen = FLIGHT_TOWER_ARROW_LEN_FT * ft;
  const arrowHeadLen = FLIGHT_TOWER_ARROW_HEAD_LEN_FT * ft;
  const arrowBodyLen = Math.max(1.0 * ft, arrowLen - arrowHeadLen);
  const arrowThick = FLIGHT_TOWER_ARROW_THICK_FT * ft;
  const arrowMountOffset = FLIGHT_TOWER_ARROW_MOUNT_OFFSET_FT * ft;
  const windsockPoleH = FLIGHT_TOWER_WINDSOCK_POLE_H_FT * ft;
  const windsockPoleR = FLIGHT_TOWER_WINDSOCK_POLE_R_FT * ft;
  const windsockLen = FLIGHT_TOWER_WINDSOCK_LEN_FT * ft;
  const windsockBaseR = FLIGHT_TOWER_WINDSOCK_BASE_R_FT * ft;
  const windsockTipR = FLIGHT_TOWER_WINDSOCK_TIP_R_FT * ft;

  const group = new THREE.Group();
  group.name = "flightControlTowerGroup";

  const concreteMat = new THREE.MeshStandardMaterial({ color: 0xcfcfcf, roughness: 0.88, metalness: 0.03 });
  const towerMat = new THREE.MeshStandardMaterial({ color: 0xe2e2e2, roughness: 0.84, metalness: 0.03 });
  const cabMat = new THREE.MeshStandardMaterial({ color: 0xb8c8d8, roughness: 0.50, metalness: 0.08 });
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x5a5e66, roughness: 0.70, metalness: 0.10 });

  const arrowMat = new THREE.MeshStandardMaterial({ color: 0xd91818, roughness: 0.55, metalness: 0.08 });
  const makeSouthArrow = ()=>{ // points toward -Z
    const arrowGroup = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(arrowThick, arrowThick, arrowBodyLen), arrowMat);
    body.position.set(0, 0, arrowHeadLen * 0.5);
    body.castShadow = true;
    body.receiveShadow = true;
    arrowGroup.add(body);

    const head = new THREE.Mesh(new THREE.ConeGeometry(arrowThick * 1.9, arrowHeadLen, 4), arrowMat);
    head.rotation.x = -Math.PI * 0.5; // point toward -Z in world after local placement
    head.position.set(0, 0, -(arrowBodyLen * 0.5));
    head.castShadow = true;
    head.receiveShadow = true;
    arrowGroup.add(head);
    return arrowGroup;
  };
  const windsockMat = new THREE.MeshStandardMaterial({ color: 0xff6a3d, roughness: 0.62, metalness: 0.04 });
  const windsockRingMat = new THREE.MeshStandardMaterial({ color: 0xf4f4f4, roughness: 0.60, metalness: 0.12 });
  const windsockPoleMat = new THREE.MeshStandardMaterial({ color: 0x9ca8b5, roughness: 0.55, metalness: 0.28 });

  const addTowerAt = (x, z)=>{
    const groundY = heightAtWorldXZ(x, z);
    const y0 = Number.isFinite(groundY) ? groundY : 0;

    const base = new THREE.Mesh(new THREE.BoxGeometry(baseW, baseH, baseD), concreteMat);
    base.position.set(x, y0 + (baseH * 0.5), z);
    base.castShadow = true;
    base.receiveShadow = true;
    group.add(base);

    const shaft = new THREE.Mesh(new THREE.BoxGeometry(shaftW, shaftH, shaftD), towerMat);
    shaft.position.set(x, y0 + baseH + (shaftH * 0.5), z);
    shaft.castShadow = true;
    shaft.receiveShadow = true;
    group.add(shaft);

    const cab = new THREE.Mesh(new THREE.BoxGeometry(cabW, cabH, cabD), cabMat);
    cab.position.set(x, y0 + baseH + shaftH + (cabH * 0.5), z);
    cab.castShadow = true;
    cab.receiveShadow = true;
    group.add(cab);

    const roof = new THREE.Mesh(new THREE.BoxGeometry(cabW * 1.08, roofH, cabD * 1.08), roofMat);
    roof.position.set(x, y0 + baseH + shaftH + cabH + (roofH * 0.5), z);
    roof.castShadow = true;
    roof.receiveShadow = true;
    group.add(roof);

    const arrowY = y0 + baseH + shaftH + (cabH * 0.5);
    const runwayFaceZ = z + (cabD * 0.5) + arrowMountOffset;
    const farFaceZ = z - (cabD * 0.5) - arrowMountOffset;

    const runwaySideArrow = makeSouthArrow();
    runwaySideArrow.position.set(x, arrowY, runwayFaceZ);
    group.add(runwaySideArrow);

    const oppositeSideArrow = makeSouthArrow();
    oppositeSideArrow.position.set(x, arrowY, farFaceZ);
    group.add(oppositeSideArrow);

    const roofTopY = y0 + baseH + shaftH + cabH + roofH;
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(windsockPoleR, windsockPoleR, windsockPoleH, 10), windsockPoleMat);
    pole.position.set(x, roofTopY + (windsockPoleH * 0.5), z);
    pole.castShadow = true;
    pole.receiveShadow = true;
    group.add(pole);

    const windsockPivotY = roofTopY + windsockPoleH - (0.6 * ft);
    const ring = new THREE.Mesh(new THREE.TorusGeometry(windsockBaseR * 0.92, windsockPoleR * 0.35, 8, 16), windsockRingMat);
    ring.position.set(x, windsockPivotY, z);
    ring.rotation.y = Math.PI * 0.5;
    ring.castShadow = true;
    ring.receiveShadow = true;
    group.add(ring);

    // North wind blows toward south, so the sock points to -Z.
    const sock = new THREE.Mesh(new THREE.CylinderGeometry(windsockTipR, windsockBaseR, windsockLen, 14, 1, true), windsockMat);
    sock.position.set(x, windsockPivotY, z - (windsockLen * 0.5));
    sock.rotation.x = -Math.PI * 0.5;
    sock.castShadow = true;
    sock.receiveShadow = true;
    group.add(sock);
  };

  // Existing pair at textured terrain runway relation.
  addTowerAt(westX, terrainRunwayZ);
  addTowerAt(eastX, terrainRunwayZ);

  // Matching pair for cube runway, placed at the south end (opposite end).
  const cubeRunwayX = SCREENSHOT_MARKER_X;
  const cubeWestX = cubeRunwayX - (FLIGHT_TOWER_EAST_OF_TERRAIN_RUNWAY_FT * ft);
  const cubeEastX = cubeRunwayX + (FLIGHT_TOWER_EAST_OF_TERRAIN_RUNWAY_FT * ft);
  const cubeHalfLen = (SCREENSHOT_MARKER_LENGTH_FT * ft) * 0.5;
  const cubeSouthZ = SCREENSHOT_MARKER_Z - cubeHalfLen;
  addTowerAt(cubeWestX, cubeSouthZ);
  addTowerAt(cubeEastX, cubeSouthZ);

  scene.add(group);
  flightControlTowerGroup = group;
  hudLine("🗼 Twin flight control towers placed <code>75ft</code> from each side of textured runway, plus twin towers at the cube runway south end with matching side offsets; tower height <code>75ft AGL</code>, south-pointing red arrows, and north-wind windsocks.");
}

function _buildTunnelInteriorSideBlocksSignature(list){
  const fmt = (n)=> Number.isFinite(n) ? Number(n).toFixed(2) : "nan";
  return list.map((it)=>{
    const pts = it.points || [];
    const a = pts[0] || {x:0,y:0,z:0};
    const b = pts[pts.length - 1] || {x:0,y:0,z:0};
    return [pts.length, fmt(it.innerRadius), fmt(a.x), fmt(a.y), fmt(a.z), fmt(b.x), fmt(b.y), fmt(b.z)].join(":");
  }).join("|");
}

function ensureTunnelInteriorBlackFloor(){
  if(!TUNNEL_INTERIOR_FLOOR_BLACK_ENABLE){
    clearTunnelInteriorBlackFloor();
    return;
  }

  const active = [];
  const addIfActive = (points, innerRadius)=>{
    if(points && points.length > 1 && Number.isFinite(innerRadius) && innerRadius > 0){
      active.push({ points, innerRadius });
    }
  };

  addIfActive(spawnFullCylPathWorld, spawnFullCylInnerRadius);
  addIfActive(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius);
  addIfActive(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius);
  addIfActive(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius);

  if(!active.length){
    clearTunnelInteriorBlackFloor();
    return;
  }

  const signature = "floor_v4|" + _buildTunnelInteriorSideBlocksSignature(active);
  if(tunnelInteriorFloorBlackGroup && tunnelInteriorFloorBlackKey === signature && tunnelInteriorFloorBlackGroup.parent === scene){
    return;
  }

  clearTunnelInteriorBlackFloor();

  const ft = WORLD_UNITS_PER_FOOT;
  const inset = Math.max(0, TUNNEL_INTERIOR_FLOOR_INSET_FT * ft);
  const lift = Math.max(0.001, TUNNEL_INTERIOR_FLOOR_LIFT_FT * ft);
  const thick = Math.max(0.10 * ft, TUNNEL_INTERIOR_FLOOR_THICKNESS_FT * ft);
  const overhang = Math.max(0, TUNNEL_INTERIOR_FLOOR_OVERHANG_FT * ft);
  const lenStep = Math.max(0.5 * ft, TUNNEL_INTERIOR_FLOOR_LENGTH_SEGMENT_FT * ft);

  const mat = new THREE.MeshStandardMaterial({
    color: 0x000000,
    roughness: 0.98,
    metalness: 0.0
  });

  const group = new THREE.Group();
  group.name = "tunnelInteriorBlackFloor";
  group.frustumCulled = false;

  for(const item of active){
    const points = item.points;
    const innerRadius = item.innerRadius;
    const floorWidth = Math.max(0.5 * ft, (innerRadius * 2.0) - (2.0 * inset) + (2.0 * overhang));

    for(let i = 0; i < (points.length - 1); i++){
      const a = points[i];
      const b = points[i + 1];
      const seg = new THREE.Vector3().subVectors(b, a);
      const segLen = seg.length();
      if(segLen <= (0.10 * ft)) continue;

      const lenCount = Math.max(1, Math.ceil(segLen / lenStep));

      for(let li = 0; li < lenCount; li++){
        const l0 = li / lenCount;
        const l1 = (li + 1) / lenCount;

        const p0 = new THREE.Vector3(
          a.x + ((b.x - a.x) * l0),
          a.y + ((b.y - a.y) * l0),
          a.z + ((b.z - a.z) * l0)
        );
        const p1 = new THREE.Vector3(
          a.x + ((b.x - a.x) * l1),
          a.y + ((b.y - a.y) * l1),
          a.z + ((b.z - a.z) * l1)
        );

        const sub = new THREE.Vector3().subVectors(p1, p0);
        const depth = Math.max(0.25 * ft, sub.length() + (0.05 * ft));
        if(depth <= 1e-6) continue;

        const axis = sub.clone().normalize();
        const yaw = Math.atan2(axis.x, axis.z);
        const mid = new THREE.Vector3().copy(p0).addScaledVector(sub, 0.5);

        const gy = heightAtWorldXZ(mid.x, mid.z);
        const groundY = Number.isFinite(gy) ? gy : (mid.y - innerRadius);

        const geo = new THREE.BoxGeometry(floorWidth, thick, depth);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(mid.x, groundY + lift - (thick * 0.5), mid.z);
        mesh.rotation.y = yaw;
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        mesh.frustumCulled = false;
        mesh.renderOrder = 2;
        group.add(mesh);
      }
    }
  }

  scene.add(group);
  tunnelInteriorFloorBlackGroup = group;
  tunnelInteriorFloorBlackKey = signature;
}

function _getPrimaryTunnelMouthFrame(){
  const pick = (points, innerRadius)=>{
    if(!points || points.length < 2 || !Number.isFinite(innerRadius) || innerRadius <= 0) return null;

    const a = points[0];
    const b = points[1];
    const dir = new THREE.Vector3().subVectors(b, a);
    if(dir.lengthSq() <= 1e-8) return null;
    dir.normalize();

    const up = new THREE.Vector3(0, 1, 0);
    let side = new THREE.Vector3().crossVectors(up, dir);
    if(side.lengthSq() <= 1e-10) side = new THREE.Vector3(1, 0, 0).cross(dir);
    if(side.lengthSq() <= 1e-10) return null;
    side.normalize();

    const gy = heightAtWorldXZ(a.x, a.z);
    const baseY = Number.isFinite(gy) ? gy : (a.y - innerRadius);

    return {
      mouth: new THREE.Vector3(a.x, baseY, a.z),
      dir,
      side,
      up,
      innerRadius
    };
  };

  return (
    pick(spawnFullCylPathWorld, spawnFullCylInnerRadius) ||
    pick(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius) ||
    pick(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius) ||
    pick(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius) ||
    pick(spawnHalfCavePathWorld, (SPAWN_CAVE_DIAMETER_FT * 0.5 * WORLD_UNITS_PER_FOOT) - Math.max(0.05 * WORLD_UNITS_PER_FOOT, SPAWN_CAVE_WALL_THICKNESS_FT * WORLD_UNITS_PER_FOOT))
  );
}

function _getPrimaryTunnelFarMouthFrame(){
  const pick = (points, innerRadius)=>{
    if(!points || points.length < 2 || !Number.isFinite(innerRadius) || innerRadius <= 0) return null;

    const n = points.length;
    const a = points[n - 2];
    const b = points[n - 1];
    const dir = new THREE.Vector3().subVectors(b, a);
    if(dir.lengthSq() <= 1e-8) return null;
    dir.normalize();

    const up = new THREE.Vector3(0, 1, 0);
    let side = new THREE.Vector3().crossVectors(up, dir);
    if(side.lengthSq() <= 1e-10) side = new THREE.Vector3(1, 0, 0).cross(dir);
    if(side.lengthSq() <= 1e-10) return null;
    side.normalize();

    const gy = heightAtWorldXZ(b.x, b.z);
    const baseY = Number.isFinite(gy) ? gy : (b.y - innerRadius);

    return {
      mouth: new THREE.Vector3(b.x, baseY, b.z),
      dir,
      side,
      up,
      innerRadius
    };
  };

  return (
    pick(spawnFullCylPathWorld, spawnFullCylInnerRadius) ||
    pick(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius) ||
    pick(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius) ||
    pick(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius) ||
    pick(spawnHalfCavePathWorld, (SPAWN_CAVE_DIAMETER_FT * 0.5 * WORLD_UNITS_PER_FOOT) - Math.max(0.05 * WORLD_UNITS_PER_FOOT, SPAWN_CAVE_WALL_THICKNESS_FT * WORLD_UNITS_PER_FOOT))
  );
}

function ensureTunnelMouthSign(){
  if(!TUNNEL_MOUTH_SIGN_ENABLE){
    clearTunnelMouthSign();
    return;
  }

  const frame = _getPrimaryTunnelMouthFrame();
  if(!frame){
    clearTunnelMouthSign();
    return;
  }

  if(!tunnelMouthSignTex){
    tunnelMouthSignTex = texLoader.load(
      TEX_DIR + TUNNEL_MOUTH_SIGN_FILE,
      (t)=>{
        t.colorSpace = THREE.SRGBColorSpace;
        t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
        tunnelMouthSignKey = "";
      },
      undefined,
      ()=>{
        tunnelMouthSignTex = null;
        if(!tunnelMouthSignTexWarned){
          hudLine("⚠️ Missing tunnel mouth sign texture: <code>" + TUNNEL_MOUTH_SIGN_FILE + "</code>.");
          tunnelMouthSignTexWarned = true;
        }
      }
    );
  }

  const imgW = tunnelMouthSignTex?.image?.width || 0;
  const imgH = tunnelMouthSignTex?.image?.height || 0;
  const sig = [
    frame.mouth.x.toFixed(2), frame.mouth.y.toFixed(2), frame.mouth.z.toFixed(2),
    frame.dir.x.toFixed(3), frame.dir.y.toFixed(3), frame.dir.z.toFixed(3),
    frame.innerRadius.toFixed(2), String(imgW), String(imgH)
  ].join("|");

  if(tunnelMouthSignGroup && tunnelMouthSignKey === sig && tunnelMouthSignGroup.parent === scene){
    return;
  }

  clearTunnelMouthSign();

  const ft = WORLD_UNITS_PER_FOOT;
  let w = Math.max(2.0 * ft, TUNNEL_MOUTH_SIGN_WIDTH_FT * ft);
  let h = Math.max(1.0 * ft, TUNNEL_MOUTH_SIGN_HEIGHT_FT * ft);
  if(imgW > 0 && imgH > 0){
    h = w * (imgH / imgW);
  }

  const maxW = frame.innerRadius * 1.70;
  const maxH = frame.innerRadius * 0.80;
  const minW = frame.innerRadius * 1.05;
  const minH = frame.innerRadius * 0.42;

  const fit = Math.min(maxW / Math.max(1e-6, w), maxH / Math.max(1e-6, h), 1.0);
  if(Number.isFinite(fit) && fit > 0){
    w *= fit;
    h *= fit;
  }

  const grow = Math.max(minW / Math.max(1e-6, w), minH / Math.max(1e-6, h), 1.0);
  if(Number.isFinite(grow) && grow > 1.0){
    w *= grow;
    h *= grow;
  }

  const fit2 = Math.min(maxW / Math.max(1e-6, w), maxH / Math.max(1e-6, h), 1.0);
  if(Number.isFinite(fit2) && fit2 > 0){
    w *= fit2;
    h *= fit2;
  }

  w *= 1.5;
  h *= 1.5;

  const outYaw = Math.atan2(-frame.dir.x, -frame.dir.z);
  const outwardNudge = 0.75 * ft;
  const p = new THREE.Vector3().copy(frame.mouth)
    .addScaledVector(frame.dir, -outwardNudge)
    .addScaledVector(frame.up, (frame.innerRadius * 2.0) + (h * 0.56) - (7.0 * ft));

  const mat = new THREE.MeshStandardMaterial({
    map: tunnelMouthSignTex || null,
    color: tunnelMouthSignTex ? 0xffffff : 0xc8b17e,
    transparent: true,
    alphaTest: 0.22,
    side: THREE.DoubleSide,
    roughness: 0.9,
    metalness: 0.0
  });

  const group = new THREE.Group();
  group.name = "tunnelMouthSign";
  group.frustumCulled = false;

  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.position.copy(p);
  mesh.rotation.y = outYaw;
  mesh.castShadow = true;
  mesh.receiveShadow = false;
  mesh.frustumCulled = false;
  group.add(mesh);

  scene.add(group);
  tunnelMouthSignGroup = group;
  tunnelMouthSignKey = sig;
}

          tunnelMouthEntranceReaperTexWarned = true;
        }
      }
    );

  const imgW = tunnelMouthEntranceReaperTex?.image?.width || 0;

  const sig = [
    frame.mouth.x.toFixed(2), frame.mouth.y.toFixed(2), frame.mouth.z.toFixed(2),
    frame.dir.x.toFixed(3), frame.dir.y.toFixed(3), frame.dir.z.toFixed(3),

  ].join("|");

  if(tunnelMouthEntranceReaperGroup && tunnelMouthEntranceReaperKey === sig && tunnelMouthEntranceReaperGroup.parent === scene){

  }

  clearTunnelMouthEntranceReaper();

  const ft = WORLD_UNITS_PER_FOOT;
  const opening = Math.max(2.0 * ft, frame.innerRadius * 2.0);
  const maxDim = opening * 0.92;

  let w = maxDim;
  let h = maxDim;
  if(imgW > 0 && imgH > 0){
    const aspect = imgW / Math.max(1e-6, imgH);
    if(aspect >= 1.0){
      w = maxDim;
      h = w / aspect;
    } else {
      h = maxDim;
      w = h * aspect;
    }
  }

  const outYaw = Math.atan2(-frame.dir.x, -frame.dir.z);
  const insideDepth = 100.0 * ft;
  const x = frame.mouth.x + (frame.dir.x * insideDepth);
  const z = frame.mouth.z + (frame.dir.z * insideDepth);
  const gy = heightAtWorldXZ(x, z);
  const y = (Number.isFinite(gy) ? gy : (frame.mouth.y + (frame.dir.y * insideDepth))) + (h * 0.5);

  const mat = new THREE.MeshStandardMaterial({
    map: tunnelMouthEntranceReaperTex || null,

    alphaTest: 0.24,
    side: THREE.DoubleSide,
    roughness: 0.9,
    metalness: 0.0
  });

  const group = new THREE.Group();
  group.name = "tunnelMouthEntranceReaper";
  group.frustumCulled = false;

  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.position.set(x, y, z);
  mesh.rotation.y = outYaw;
  mesh.castShadow = true;
  mesh.receiveShadow = false;
  mesh.frustumCulled = false;
  mesh.renderOrder = 35;
  group.add(mesh);

  scene.add(group);
  tunnelMouthEntranceReaperGroup = group;
  tunnelMouthEntranceReaperKey = sig;
}

  const toSpawn = new THREE.Vector3(CAVE_ANCHOR_X - frame.mouth.x, 0, CAVE_ANCHOR_Z - frame.mouth.z);
  const visibleSign = (toSpawn.dot(frame.side) >= 0) ? 1 : -1;

  const signature = [
    frame.mouth.x.toFixed(2), frame.mouth.y.toFixed(2), frame.mouth.z.toFixed(2),

  clearTunnelMouthTrees();

  if(!tunnelMouthTree1Tex){

      TEX_DIR + LOW_TREE_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{ tunnelMouthTree1Tex = null; if(!tunnelMouthTreeTexWarned){ hudLine("⚠️ Missing tunnel-mouth tree texture(s): <code>" + LOW_TREE_FILE + "</code>/<code>" + LOW_TREE3_FILE + "</code>."); tunnelMouthTreeTexWarned = true; } }
    );
  }

  if(!tunnelMouthTree3Tex){
    tunnelMouthTree3Tex = texLoader.load(
      TEX_DIR + LOW_TREE3_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{ tunnelMouthTree3Tex = null; if(!tunnelMouthTreeTexWarned){ hudLine("⚠️ Missing tunnel-mouth tree texture(s): <code>" + LOW_TREE_FILE + "</code>/<code>" + LOW_TREE3_FILE + "</code>."); tunnelMouthTreeTexWarned = true; } }
    );
  }

  const mkMat = (tex)=> new THREE.MeshStandardMaterial({
    map: tex || null,
    color: tex ? 0xffffff : 0x7c8f58,
    transparent: true,
    alphaTest: 0.18,
    side: THREE.DoubleSide,
    roughness: 0.92,
    metalness: 0.0
  });

  const mat1 = mkMat(tunnelMouthTree1Tex);
  const mat3 = mkMat(tunnelMouthTree3Tex);

  const group = new THREE.Group();
  group.name = "tunnelMouthTrees";
  group.frustumCulled = false;

  const ft = WORLD_UNITS_PER_FOOT;
  const r = Math.max(5.0 * ft, frame.innerRadius + (2.0 * ft));
  const outYaw = Math.atan2(-frame.dir.x, -frame.dir.z);

  const sidePattern = [
    visibleSign, visibleSign, visibleSign, visibleSign, visibleSign,
    -visibleSign, -visibleSign, -visibleSign
  ];

  const placeTrees = (count, mat, size)=>{
    const wBase = size.w;
    const hBase = size.h;

    for(let i = 0; i < count; i++){
      const sign = sidePattern[i % sidePattern.length];
      const lane = i % 4;
      const f = 0.40 + (lane * 0.30); // keep trees offset away from cave opening
      const up = 0.05 + ((i % 2) * 0.16);
      const sideOffset = 1.26 + ((i % 3) * 0.12);

      const p = new THREE.Vector3().copy(frame.mouth)
        .addScaledVector(frame.side, sign * r * sideOffset)
        .addScaledVector(frame.dir, -f * r)
        .addScaledVector(frame.up, up * r);

      const gy = heightAtWorldXZ(p.x, p.z);
      const groundY = Number.isFinite(gy) ? gy : frame.mouth.y;

      const scale = 0.92 + ((i % 5) * 0.06);
      const w = wBase * scale;
      const h = hBase * scale;
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat.clone());
      m.position.set(p.x, groundY + (h * 0.5), p.z);
      m.rotation.y = outYaw;
      m.castShadow = true;
      m.receiveShadow = false;
      m.frustumCulled = false;
      group.add(m);
    }
  };

  placeTrees(TUNNEL_MOUTH_TREE1_COUNT, mat1, LOW_TREE_SIZE);
  placeTrees(TUNNEL_MOUTH_TREE3_COUNT, mat3, LOW_TREE3_SIZE);

  scene.add(group);
  tunnelMouthTreesGroup = group;
  tunnelMouthTreesKey = signature;
}

function _polylineLength(points){
  if(!points || points.length < 2) return 0;
  let len = 0;
  for(let i = 0; i < (points.length - 1); i++){
    len += points[i].distanceTo(points[i + 1]);
  }
  return len;
}

function _pointOnTunnelPolylineAtS(points, sTarget){
  if(!points || points.length < 2) return null;
  let run = 0;
  const sNeed = Math.max(0, sTarget);

  for(let i = 0; i < (points.length - 1); i++){
    const a = points[i];
    const b = points[i + 1];
    const ab = new THREE.Vector3().subVectors(b, a);
    const L = ab.length();
    if(L <= 1e-8) continue;

    const nextRun = run + L;
    if(sNeed <= nextRun || i === (points.length - 2)){
      const t = THREE.MathUtils.clamp((sNeed - run) / L, 0, 1);
      const p = new THREE.Vector3().copy(a).addScaledVector(ab, t);
      const axis = ab.clone().normalize();
      const up = new THREE.Vector3(0, 1, 0);
      let side = new THREE.Vector3().crossVectors(up, axis);
      if(side.lengthSq() <= 1e-10) side = new THREE.Vector3(1, 0, 0).cross(axis);
      if(side.lengthSq() <= 1e-10) side = new THREE.Vector3(1, 0, 0);
      side.normalize();
      return { point: p, axis, side, s: run + (L * t), totalLength: _polylineLength(points) };
    }
    run = nextRun;
  }
  return null;
}

function _getPrimaryReaperTunnelPath(){
  const candidates = [];
  const add = (points, innerRadius)=>{
    if(points && points.length > 1 && Number.isFinite(innerRadius) && innerRadius > 0){
      const len = _polylineLength(points);
      candidates.push({ points, innerRadius, len });
    }
  };

  add(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius);
  add(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius);
  add(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius);
  add(spawnFullCylPathWorld, spawnFullCylInnerRadius);

  if(!candidates.length) return null;
  candidates.sort((a,b)=> b.len - a.len);
  return candidates[0];
}

function ensureTunnelReapers(){
  if(!TUNNEL_REAPER_ENABLE){
    clearTunnelReapers();
    return;
  }

  const info = _getPrimaryReaperTunnelPath();
  if(!info){
    clearTunnelReapers();
    return;
  }

  const ft = WORLD_UNITS_PER_FOOT;
  const startS = TUNNEL_REAPER_START_FT * ft;
  const spacing = TUNNEL_REAPER_SPACING_FT * ft;
  const span = TUNNEL_REAPER_SPAN_FT * ft;
  const count = Math.max(1, Math.floor(span / Math.max(1e-4, spacing)) + 1);

  const sig = [
    info.len.toFixed(2), info.innerRadius.toFixed(2),
    info.points[0].x.toFixed(1), info.points[0].z.toFixed(1),
    info.points[info.points.length - 1].x.toFixed(1), info.points[info.points.length - 1].z.toFixed(1)
  ].join("|");

  if(tunnelReaperGroup && tunnelReaperKey === sig && tunnelReaperGroup.parent === scene) return;

  clearTunnelReapers();
  finalTunnelReaperPenaltyApplied = false;

  if(!tunnelReaperTex){
    tunnelReaperTex = texLoader.load(
      TEX_DIR + TUNNEL_REAPER_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{
        tunnelReaperTex = null;
        if(!tunnelReaperTexWarned){
          hudLine("⚠️ Missing reaper texture: <code>" + TUNNEL_REAPER_FILE + "</code>.");
          tunnelReaperTexWarned = true;
        }
      }
    );
  }

  const mat = new THREE.MeshStandardMaterial({
    map: tunnelReaperTex || null,
    color: tunnelReaperTex ? 0xffffff : 0x6f6f6f,
    transparent: true,
    alphaTest: 0.24,
    side: THREE.DoubleSide,
    roughness: 0.9,
    metalness: 0.0
  });

  const group = new THREE.Group();
  group.name = "tunnelReapers";
  group.frustumCulled = false;

  const w = TUNNEL_REAPER_WIDTH_FT * ft;
  const h = TUNNEL_REAPER_HEIGHT_FT * ft;
  const inset = Math.max(0, TUNNEL_REAPER_SIDE_INSET_FT * ft);
  const sideOffset = Math.max((w * 0.45), info.innerRadius - inset - (w * 0.35));
  const inwardStepPct = 0.08; // first pair unchanged, then 8% more inward per pair

  for(let i = 0; i < count; i++){
    const isFinalPair = (i === (count - 1));
    const pairSideOffset = sideOffset * Math.max(0.2, 1 - (i * inwardStepPct));
    const centerPairSideOffset = Math.max(w * 0.55, 1.2 * WORLD_UNITS_PER_FOOT); // side-by-side in lane center
    const sNow = startS + (i * spacing);
    const sample = _pointOnTunnelPolylineAtS(info.points, sNow);
    if(!sample) continue;

    const outYaw = Math.atan2(-sample.axis.x, -sample.axis.z);

    for(const sign of [-1, 1]){
      const useOffset = isFinalPair ? centerPairSideOffset : pairSideOffset;
      const px = sample.point.x + (sample.side.x * useOffset * sign);
      const pz = sample.point.z + (sample.side.z * useOffset * sign);
      const gy = heightAtWorldXZ(px, pz);
      const y = (Number.isFinite(gy) ? gy : sample.point.y) + (h * 0.5);

      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat.clone());
      mesh.position.set(px, y, pz);
      mesh.rotation.y = outYaw;
      mesh.castShadow = true;
      mesh.receiveShadow = false;
      mesh.frustumCulled = false;
      mesh.userData.isFinalTunnelReaperPair = isFinalPair;
      group.add(mesh);
    }
  }

  scene.add(group);
  tunnelReaperGroup = group;
  tunnelReaperKey = sig;
}

function getTunnelReaperCenterSpawnPosition(aheadWorld){
  const obj = controls.getObject();
  const yaw = truckYaw;
  const fwdX = -Math.sin(yaw);
  const fwdZ = -Math.cos(yaw);

  let spawnX = obj.position.x + (fwdX * aheadWorld);
  let spawnZ = obj.position.z + (fwdZ * aheadWorld);

  const info = _getPrimaryReaperTunnelPath();
  if(info && info.points && info.points.length > 1){
    const closest = _closestPointOnTunnelPolyline(info.points, new THREE.Vector3(obj.position.x, obj.position.y, obj.position.z));

function updateTunnelReaperBoss(dt = 0, shouldApproach = false){
  if(!tunnelReaperBoss || !tunnelReaperBossFollowTruck) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const speed = Math.max(0.05 * ft, MOVE_SPEED * TUNNEL_REAPER_BOSS_STOPPED_APPROACH_SPEED_SCALE);

  const dz = targetZ - tunnelReaperBoss.position.z;

    const step = Math.min(dist - stopDist, speed * dt);
    if(step > 0.0001){
      const inv = 1 / Math.max(1e-6, dist);
      tunnelReaperBoss.position.x += dx * inv * step;
      tunnelReaperBoss.position.z += dz * inv * step;
    }
  }

  tunnelReaperBoss.lookAt(camera.position.x, tunnelReaperBoss.position.y, camera.position.z);
}

function applyTunnelReaperBossContactPenalty(obj, radius = TRUCK_COLLISION_RADIUS){
  if(!obj) return;

  const ox = obj.position.x;
  const oz = obj.position.z;
  const baseR = Math.max(0.2, radius);

  const checkBoss = (boss, latchName)=>{
    if(!boss || !boss.visible) {
      if(latchName === "r2") tunnelReaperBossContactApplied = false;
      if(latchName === "r3") tunnelReaperBoss2ContactApplied = false;
      if(latchName === "r4") tunnelReaperBoss3ContactApplied = false;
      if(latchName === "r5") tunnelReaperBoss4ContactApplied = false;
      return;
    }

    const w = boss.geometry?.parameters?.width || (TUNNEL_REAPER_BOSS_WIDTH_FT * WORLD_UNITS_PER_FOOT);
    const h = boss.geometry?.parameters?.height || (TUNNEL_REAPER_BOSS_HEIGHT_FT * WORLD_UNITS_PER_FOOT);
    const bossR = Math.max(0.7, Math.min(w, h) * 0.30);
    const hitR = baseR + bossR;
    const dx = ox - boss.position.x;
    const dz = oz - boss.position.z;
    const hit = ((dx * dx) + (dz * dz)) <= (hitR * hitR);

    let applied = false;
    if(latchName === "r2") applied = tunnelReaperBossContactApplied;
    if(latchName === "r3") applied = tunnelReaperBoss2ContactApplied;
    if(latchName === "r4") applied = tunnelReaperBoss3ContactApplied;
    if(latchName === "r5") applied = tunnelReaperBoss4ContactApplied;

    if(hit && !applied){
      if(latchName === "r2") tunnelReaperBossContactApplied = true;
      if(latchName === "r3") tunnelReaperBoss2ContactApplied = true;
      if(latchName === "r4") tunnelReaperBoss3ContactApplied = true;
      if(latchName === "r5") tunnelReaperBoss4ContactApplied = true;
      adjustPlayerHealthPct(-15);
      spawnHitBurst(new THREE.Vector3(boss.position.x, boss.position.y, boss.position.z), 0xff7a7a);
    } else if(!hit && applied){
      if(latchName === "r2") tunnelReaperBossContactApplied = false;
      if(latchName === "r3") tunnelReaperBoss2ContactApplied = false;
      if(latchName === "r4") tunnelReaperBoss3ContactApplied = false;
      if(latchName === "r5") tunnelReaperBoss4ContactApplied = false;
    }
  };

  checkBoss(tunnelReaperBoss, "r2");
  checkBoss(tunnelReaperBoss2, "r3");
  checkBoss(tunnelReaperBoss3, "r4");
  checkBoss(tunnelReaperBoss4, "r5");
}

  updateTunnelReaperBoss4(0, false);
  hudLine("☠️ Reaper5 spawned <code>50ft</code> after Reaper4 and fires red balls.");
  playTunnelReaperFollowupAudio();
}

function updateTunnelReaperBoss4(dt = 0, shouldApproach = false){
  if(!tunnelReaperBoss4 || !tunnelReaperBoss4FollowTruck) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const speed = Math.max(0.05 * ft, MOVE_SPEED * TUNNEL_REAPER_BOSS_STOPPED_APPROACH_SPEED_SCALE);
  const stopDist = Math.max(1.0 * ft, TUNNEL_REAPER_BOSS_STOP_DISTANCE_FT * ft);
  const obj = controls.getObject();

  const targetX = obj.position.x;
  const targetZ = obj.position.z;
  const dx = targetX - tunnelReaperBoss4.position.x;
  const dz = targetZ - tunnelReaperBoss4.position.z;
  const dist = Math.hypot(dx, dz);

  if(shouldApproach && dt > 0 && dist > stopDist){
    const step = Math.min(dist - stopDist, speed * dt);
    if(step > 0.0001){
      const inv = 1 / Math.max(1e-6, dist);
      tunnelReaperBoss4.position.x += dx * inv * step;
      tunnelReaperBoss4.position.z += dz * inv * step;
    }
  }

  const h = tunnelReaperBoss4.geometry?.parameters?.height || (TUNNEL_REAPER_BOSS_HEIGHT_FT * ft);
  const gy = heightAtWorldXZ(tunnelReaperBoss4.position.x, tunnelReaperBoss4.position.z);
  const yBase = Number.isFinite(gy) ? gy : (obj.position.y - PLAYER_EYE_HEIGHT);
  tunnelReaperBoss4.position.y = yBase + (h * 0.5) + (TUNNEL_REAPER_BOSS_HEIGHT_OFFSET_FT * ft);
  tunnelReaperBoss4.lookAt(camera.position.x, tunnelReaperBoss4.position.y, camera.position.z);

  tunnelReaperBoss4ShotTimer -= Math.max(0, dt);
  if(tunnelReaperBoss4ShotTimer <= 0){
    fireTunnelReaperBoss4RedBall();
    tunnelReaperBoss4ShotTimer = TUNNEL_REAPER_BOSS_4_SHOT_INTERVAL_SEC;
  }
}

function updateTunnelReaperBossChain3(dt = 0){
  if(tunnelReaperBoss4Triggered) return;

  const ft = WORLD_UNITS_PER_FOOT;

  const dx = obj.position.x - tunnelReaperBoss4TriggerPoint.x;
  const dz = obj.position.z - tunnelReaperBoss4TriggerPoint.z;
  const dist = Math.hypot(dx, dz);

  if(dist >= triggerDist){
    tunnelReaperBoss4Triggered = true;
    spawnTunnelReaperBoss4();
  }
}

function fireTunnelReaperBoss4RedBall(){
  if(!tunnelReaperBoss4 || !tunnelReaperBoss4.visible) return;

  const target = getActiveVehicleTargetPos();
  const start = tunnelReaperBoss4.position.clone();
  const dir = target.sub(start);
  if(dir.lengthSq() < 1e-8) return;
  dir.normalize();
  dir.y = Math.max(-0.18, Math.min(0.18, dir.y));
  dir.normalize();

  const geom = new THREE.SphereGeometry(TUNNEL_REAPER_BOSS_4_SHOT_RADIUS, 12, 12);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xff3b30,
    emissive: 0x9a1111,
    emissiveIntensity: 0.8
  });
  const ball = new THREE.Mesh(geom, mat);
  ball.position.copy(start);
  scene.add(ball);

  tunnelReaperBoss4RedBalls.push({
    mesh: ball,
    vel: dir.multiplyScalar(TUNNEL_REAPER_BOSS_4_SHOT_SPEED),
    life: TUNNEL_REAPER_BOSS_4_SHOT_LIFE_SEC
  });
}

function updateTunnelReaperBoss4RedBalls(dt){
  for(let i = tunnelReaperBoss4RedBalls.length - 1; i >= 0; i--){
    const b = tunnelReaperBoss4RedBalls[i];
    const prevX = b.mesh.position.x;
    const prevZ = b.mesh.position.z;
    b.mesh.position.addScaledVector(b.vel, dt);
    b.life -= dt;

    if(applyPuebloCubeBlock(b.mesh, prevX, prevZ, TUNNEL_REAPER_BOSS_4_SHOT_RADIUS, false) || applySpawnHalfCaveWallBlock(b.mesh, prevX, prevZ, TUNNEL_REAPER_BOSS_4_SHOT_RADIUS)){
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      tunnelReaperBoss4RedBalls.splice(i, 1);
      continue;
    }

    let hitTruck = false;
    const p = b.mesh.position;
    if(truckPlane){
      __tmpBox.setFromObject(truckPlane);
      const cp = __tmpBox.clampPoint(p, __tmpV3);
      const d2Truck = cp.distanceToSquared(p);
      hitTruck = d2Truck <= (TUNNEL_REAPER_BOSS_4_SHOT_RADIUS * TUNNEL_REAPER_BOSS_4_SHOT_RADIUS * 4.0);
    } else {
      const targetPos = controls.getObject().position;
      const tx = p.x - targetPos.x;
      const ty = p.y - targetPos.y;
      const tz = p.z - targetPos.z;
      hitTruck = ((tx*tx) + (ty*ty) + (tz*tz)) <= 1.0;
    }

    if(hitTruck){
      tunnelReaperBoss4RedHitStreak += 1;
      if(tunnelReaperBoss4RedHitStreak >= TUNNEL_REAPER_BOSS_4_HITS_FOR_DAMAGE){
        tunnelReaperBoss4RedHitStreak = 0;
        adjustPlayerHealthPct(-TUNNEL_REAPER_BOSS_4_DAMAGE_PCT);
      }
      spawnHitBurst(p, 0xff4a4a);
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      tunnelReaperBoss4RedBalls.splice(i, 1);
      continue;
    }

    if(b.life <= 0){
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      tunnelReaperBoss4RedBalls.splice(i, 1);
    }
  }
}

function ensureTunnelInteriorSideBlocks(){
  if(!TUNNEL_INTERIOR_SIDE_BLOCKS_ENABLE){
    clearTunnelInteriorSideBlocks();
    return;
  }

  const active = [];
  const addIfActive = (points, innerRadius)=>{
    if(points && points.length > 1 && Number.isFinite(innerRadius) && innerRadius > 0){
      active.push({ points, innerRadius });
    }
  };

  addIfActive(spawnFullCylPathWorld, spawnFullCylInnerRadius);
  addIfActive(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius);
  addIfActive(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius);
  addIfActive(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius);

  if(!active.length){
    clearTunnelInteriorSideBlocks();
    return;
  }

  const signature = _buildTunnelInteriorSideBlocksSignature(active);
  if(tunnelInteriorSideBlocksGroup && tunnelInteriorSideBlocksKey === signature && tunnelInteriorSideBlocksGroup.parent === scene){
    return;
  }

  clearTunnelInteriorSideBlocks();
  tunnelInteriorSideBlockColliders = [];

  const ft = WORLD_UNITS_PER_FOOT;
  const blockWidth = Math.max(0.10 * ft, TUNNEL_INTERIOR_SIDE_BLOCK_WIDTH_FT * ft);
  const blockHeight = Math.max(0.10 * ft, TUNNEL_INTERIOR_SIDE_BLOCK_HEIGHT_FT * ft);
  const colliderHalfX = Math.max(0.20 * ft, (blockWidth * 0.5) * TUNNEL_INTERIOR_SIDE_BLOCK_COLLIDER_WIDTH_SCALE);
  const inset = Math.max(0, TUNNEL_INTERIOR_SIDE_BLOCK_INSET_FT * ft);

  const mat = new THREE.MeshBasicMaterial({
    color: TUNNEL_INTERIOR_SIDE_BLOCK_COLOR
  });

  const group = new THREE.Group();
  group.name = "tunnelInteriorSideBlocks";
  group.frustumCulled = false;

  for(const item of active){
    const points = item.points;
    const innerRadius = item.innerRadius;

    for(let i = 0; i < (points.length - 1); i++){
      const a = points[i];
      const b = points[i + 1];
      const seg = new THREE.Vector3().subVectors(b, a);
      const segLen = seg.length();
      if(segLen <= (0.15 * ft)) continue;

      const axis = seg.clone().normalize();
      const up = new THREE.Vector3(0, 1, 0);
      let side = new THREE.Vector3().crossVectors(up, axis);
      if(side.lengthSq() <= 1e-10){
        side = new THREE.Vector3(1, 0, 0).cross(axis);
      }
      if(side.lengthSq() <= 1e-10) continue;
      side.normalize();

      const offset = Math.max(blockWidth * 0.5, innerRadius - (blockWidth * 0.5) - inset);
      const yaw = Math.atan2(axis.x, axis.z);

      const segStep = Math.max(0.5 * ft, TUNNEL_INTERIOR_SIDE_BLOCK_SEGMENT_FT * ft);
      const segCount = Math.max(1, Math.ceil(segLen / segStep));
      const overlap = Math.max(0, TUNNEL_INTERIOR_SIDE_BLOCK_OVERLAP_FT * ft);

      for(let si = 0; si < segCount; si++){
        const t0 = si / segCount;
        const t1 = (si + 1) / segCount;
        const m = (t0 + t1) * 0.5;

        const mid = new THREE.Vector3().copy(a).addScaledVector(seg, m);
        const depth = Math.max(0.20 * ft, (segLen / segCount) + overlap);

        const leftX = mid.x + (side.x * offset);
        const leftZ = mid.z + (side.z * offset);
        const rightX = mid.x - (side.x * offset);
        const rightZ = mid.z - (side.z * offset);

        const leftGroundY = heightAtWorldXZ(leftX, leftZ);
        const rightGroundY = heightAtWorldXZ(rightX, rightZ);
        const leftY = (Number.isFinite(leftGroundY) ? leftGroundY : (mid.y - innerRadius)) + (blockHeight * 0.5) + (0.02 * ft);
        const rightY = (Number.isFinite(rightGroundY) ? rightGroundY : (mid.y - innerRadius)) + (blockHeight * 0.5) + (0.02 * ft);

        const geo = new THREE.BoxGeometry(blockWidth, blockHeight, depth);

        const leftMesh = new THREE.Mesh(geo, mat);
        leftMesh.position.set(leftX, leftY, leftZ);
        leftMesh.rotation.y = yaw;
        leftMesh.castShadow = false;
        leftMesh.receiveShadow = false;
        leftMesh.renderOrder = 3;
        group.add(leftMesh);
        tunnelInteriorSideBlockColliders.push({
          x: leftX,
          z: leftZ,
          rotY: yaw,
          halfX: colliderHalfX,
          halfZ: depth * 0.5,
          topY: leftY + (blockHeight * 0.5)
        });

        const rightMesh = new THREE.Mesh(geo.clone(), mat);
        rightMesh.position.set(rightX, rightY, rightZ);
        rightMesh.rotation.y = yaw;
        rightMesh.castShadow = false;
        rightMesh.receiveShadow = false;
        rightMesh.renderOrder = 3;
        group.add(rightMesh);
        tunnelInteriorSideBlockColliders.push({
          x: rightX,
          z: rightZ,
          rotY: yaw,
          halfX: colliderHalfX,
          halfZ: depth * 0.5,
          topY: rightY + (blockHeight * 0.5)
        });
      }
    }
  }

  scene.add(group);
  tunnelInteriorSideBlocksGroup = group;
  tunnelInteriorSideBlocksKey = signature;
}
