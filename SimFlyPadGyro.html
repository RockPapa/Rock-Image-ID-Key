function snapPlayerToPuebloTop(obj, radius = TRUCK_COLLISION_RADIUS){
  if(!PUEBLO_TEST_CUBE_ENABLE || !puebloTestCube || !obj) return false;

  const inset = Math.max(0.15, radius * 0.5);
  const halfX = Math.max(0, (PUEBLO_TEST_CUBE_W * 0.5) - inset);
  const halfZ = Math.max(0, (PUEBLO_TEST_CUBE_D * 0.5) - inset);
  const cx = puebloTestCube.position.x;
  const cz = puebloTestCube.position.z;

  obj.position.x = THREE.MathUtils.clamp(obj.position.x, cx - halfX, cx + halfX);
  obj.position.z = THREE.MathUtils.clamp(obj.position.z, cz - halfZ, cz + halfZ);

  const topEyeY = getPuebloCubeTopEyeY();
  if(!Number.isFinite(topEyeY)) return false;
  obj.position.y = topEyeY;
  return true;
}

function resolvePuebloCubePenetrationXZ(x, z, radius = 0){
  const b = getPuebloCubeBoundsXZ(radius);
  if(!b) return { x, z, blocked:false };
  if(x < b.minX || x > b.maxX || z < b.minZ || z > b.maxZ) return { x, z, blocked:false };

  const dL = Math.abs(x - b.minX);
  const dR = Math.abs(b.maxX - x);
  const dN = Math.abs(z - b.minZ);
  const dS = Math.abs(b.maxZ - z);
  const minD = Math.min(dL, dR, dN, dS);

  if(minD === dL) return { x: b.minX, z, blocked:true };
  if(minD === dR) return { x: b.maxX, z, blocked:true };
  if(minD === dN) return { x, z: b.minZ, blocked:true };
  return { x, z: b.maxZ, blocked:true };
}

function applyPuebloCubeBlock(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS, snapToPlayerY = false){
  if(!PUEBLO_TEST_CUBE_ENABLE || !puebloTestCube) return false;
  if(!isPuebloCubeBlockedAtXZ(obj.position.x, obj.position.z, radius)) return false;

  const px = prevX, pz = prevZ;
  const nx = obj.position.x, nz = obj.position.z;

  const tryX = { x: nx, z: pz };
  const tryZ = { x: px, z: nz };

  const okX = !isPuebloCubeBlockedAtXZ(tryX.x, tryX.z, radius);
  const okZ = !isPuebloCubeBlockedAtXZ(tryZ.x, tryZ.z, radius);

  if(okX && !okZ){
    obj.position.x = tryX.x;
    obj.position.z = tryX.z;
  } else if(okZ && !okX){
    obj.position.x = tryZ.x;
    obj.position.z = tryZ.z;
  } else if(okX && okZ){
    const dxX = Math.abs(nx - tryX.x) + Math.abs(nz - tryX.z);
    const dxZ = Math.abs(nx - tryZ.x) + Math.abs(nz - tryZ.z);
    if(dxX <= dxZ){
      obj.position.x = tryX.x;
      obj.position.z = tryX.z;
    } else {
      obj.position.x = tryZ.x;
      obj.position.z = tryZ.z;
    }
  } else {
    const pushed = resolvePuebloCubePenetrationXZ(px, pz, radius);
    obj.position.x = pushed.x;
    obj.position.z = pushed.z;
  }

  if(snapToPlayerY){
    obj.position.y = heightAtWorldXZ(obj.position.x, obj.position.z) + PLAYER_EYE_HEIGHT;
  }
  return true;
}


function isInsidePuebloPlazaBounds(x, z, margin = 0){
  if(!FOUNTAIN_COMPLEX_BEHAVIOR_ENABLE) return false;
  if(!PUEBLO_PLAN_WALLS_ENABLE || !puebloTestCube) return false;
  const ft = WORLD_UNITS_PER_FOOT;
  const centerX = puebloTestCube.position.x + (PUEBLO_PLAN_WALL_CENTER_X_FT * ft);
  const centerZ = puebloTestCube.position.z + (PUEBLO_PLAN_WALL_CENTER_Z_FT * ft);
  const half = (PUEBLO_PLAN_WALL_HALF_SIDE_FT * ft) + Math.max(0, margin);
  return Math.abs(x - centerX) <= half && Math.abs(z - centerZ) <= half;
}

function isTruckAvatarMode(){
  return VEHICLES_ENABLE && avatarMode !== "leggoman";
}

function getPowerOffTargetDescentFpm(speedKt, pitchDeg, aglFeet){
  void aglFeet;
  const speedTermFpm = (Math.max(0, speedKt) - POWER_OFF_DESCENT_BASE_SPEED_KT) * POWER_OFF_DESCENT_SPEED_GAIN_FPM_PER_KT;
  const pitchTermFpm = (POWER_OFF_DESCENT_BASE_PITCH_DEG - pitchDeg) * POWER_OFF_DESCENT_PITCH_GAIN_FPM_PER_DEG;
  const targetFpm = POWER_OFF_BASE_DESCENT_FPM + speedTermFpm + pitchTermFpm;
  return Math.max(POWER_OFF_MIN_DESCENT_FPM, Math.min(POWER_OFF_MAX_DESCENT_FPM, targetFpm));
}

function showPlazaTruckRestrictionMessage(){
  const now = performance.now();
  if((now - plazaTruckRestrictLastMs) < PLAZA_TRUCK_RESTRICT_COOLDOWN_MS) return;
  plazaTruckRestrictLastMs = now;
  showBanner(PLAZA_TRUCK_RESTRICT_MESSAGE);
  setTimeout(()=>{
    const b = document.getElementById("banner");
    if(b && b.innerHTML === PLAZA_TRUCK_RESTRICT_MESSAGE) hideBanner();
  }, PLAZA_TRUCK_RESTRICT_COOLDOWN_MS);
}

function applyPuebloPlazaTruckOnlyAccess(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS){
  if(!FOUNTAIN_COMPLEX_BEHAVIOR_ENABLE) return false;
  if(!obj || !PUEBLO_PLAN_WALLS_ENABLE || !puebloTestCube) return false;
  if(!isTruckAvatarMode()) return false;

  const ft = WORLD_UNITS_PER_FOOT;
  const centerX = puebloTestCube.position.x + (PUEBLO_PLAN_WALL_CENTER_X_FT * ft);
  const centerZ = puebloTestCube.position.z + (PUEBLO_PLAN_WALL_CENTER_Z_FT * ft);
  const half = PUEBLO_PLAN_WALL_HALF_SIDE_FT * ft;
  const doorHalf = PUEBLO_PLAN_WALL_ENTRANCE_HALF_FT * ft;
  const southWallZ = centerZ - half;

  // Restrict only the doorway crossing itself (south entrance lane),
  // so approach movement over the outer plaza foundation remains free.
  const xPad = Math.max(0, radius * 0.5);
  const zPad = Math.max(0, radius * 0.35);
  const inDoorLaneNow = Math.abs(obj.position.x - centerX) <= (doorHalf + xPad);
  const inDoorLanePrev = Math.abs(prevX - centerX) <= (doorHalf + xPad);
  const crossedDoorPlaneIntoPlaza = (prevZ < (southWallZ - zPad)) && (obj.position.z >= (southWallZ - zPad));

  if(crossedDoorPlaneIntoPlaza && (inDoorLaneNow || inDoorLanePrev)){
    obj.position.x = prevX;
    obj.position.z = prevZ;
    showPlazaTruckRestrictionMessage();
    return true;
  }

  return false;
}

function isPuebloPlanWallBlockedAtXZ(x, z, radius = 0){
  if(!FOUNTAIN_COMPLEX_BEHAVIOR_ENABLE) return false;
  if(!PUEBLO_PLAN_WALLS_ENABLE || !puebloPlanWallsGroup || !puebloPlanWallsGroup.children.length) return false;

  for(const wall of puebloPlanWallsGroup.children){
    if(!wall || !wall.geometry || !wall.geometry.parameters) continue;

    const halfX = ((wall.geometry.parameters.width || PUEBLO_PLAN_WALL_THICKNESS) * 0.5) + Math.max(0, radius);
    const halfZ = ((wall.geometry.parameters.depth || PUEBLO_PLAN_WALL_THICKNESS) * 0.5) + Math.max(0, radius);
    const dx = x - wall.position.x;
    const dz = z - wall.position.z;
    const c = Math.cos(-wall.rotation.y);
    const si = Math.sin(-wall.rotation.y);
    const lx = (dx * c) - (dz * si);
    const lz = (dx * si) + (dz * c);

    if(Math.abs(lx) <= halfX && Math.abs(lz) <= halfZ) return true;
  }

  return false;
}

function applyPuebloPlanWallBlock(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS){
  if(!FOUNTAIN_COMPLEX_BEHAVIOR_ENABLE) return false;
  if(!PUEBLO_PLAN_WALLS_ENABLE || !puebloPlanWallsGroup || !obj) return false;
  if(!isPuebloPlanWallBlockedAtXZ(obj.position.x, obj.position.z, radius)) return false;

  const px = prevX, pz = prevZ;
  const nx = obj.position.x, nz = obj.position.z;

  const tryX = { x: nx, z: pz };
  const tryZ = { x: px, z: nz };

  const okX = !isPuebloPlanWallBlockedAtXZ(tryX.x, tryX.z, radius);
  const okZ = !isPuebloPlanWallBlockedAtXZ(tryZ.x, tryZ.z, radius);

  if(okX && !okZ){
    obj.position.x = tryX.x;
    obj.position.z = tryX.z;
  } else if(okZ && !okX){
    obj.position.x = tryZ.x;
    obj.position.z = tryZ.z;
  } else if(okX && okZ){
    const dxX = Math.abs(nx - tryX.x) + Math.abs(nz - tryX.z);
    const dxZ = Math.abs(nx - tryZ.x) + Math.abs(nz - tryZ.z);
    if(dxX <= dxZ){
      obj.position.x = tryX.x;
      obj.position.z = tryX.z;
    } else {
      obj.position.x = tryZ.x;
      obj.position.z = tryZ.z;
    }
  } else {
    obj.position.x = px;
    obj.position.z = pz;
  }

  return true;
}

function getTunnelInteriorSideBlockTopEyeYAtXZ(x, z, radius = 0){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return -Infinity;
  if(!TUNNEL_INTERIOR_SIDE_BLOCKS_ENABLE || !tunnelInteriorSideBlockColliders.length) return -Infinity;

  const rr = Math.max(0, radius);
  let bestTopY = -Infinity;

  for(const c of tunnelInteriorSideBlockColliders){
    if(!c) continue;
    const dx = x - c.x;
    const dz = z - c.z;
    const co = Math.cos(-c.rotY);
    const si = Math.sin(-c.rotY);
    const lx = (dx * co) - (dz * si);
    const lz = (dx * si) + (dz * co);

    if(Math.abs(lx) <= (c.halfX + rr) && Math.abs(lz) <= (c.halfZ + rr)){
      if(Number.isFinite(c.topY) && c.topY > bestTopY) bestTopY = c.topY;
    }
  }

  if(!Number.isFinite(bestTopY)) return -Infinity;
  return bestTopY + PLAYER_EYE_HEIGHT;
}

function isTunnelInteriorSideBlockBlockedAtXZ(x, z, radius = 0, eyeY = null){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return false;
  if(!TUNNEL_INTERIOR_SIDE_BLOCKS_ENABLE || !tunnelInteriorSideBlockColliders.length) return false;

  const rr = Math.max(0, radius);
  const eps = 0.08 * WORLD_UNITS_PER_FOOT;
  const stepUp = Math.max(0, TUNNEL_INTERIOR_SIDE_BLOCK_STEP_UP_FT * WORLD_UNITS_PER_FOOT);

  for(const c of tunnelInteriorSideBlockColliders){
    if(!c) continue;
    const dx = x - c.x;
    const dz = z - c.z;
    const co = Math.cos(-c.rotY);
    const si = Math.sin(-c.rotY);
    const lx = (dx * co) - (dz * si);
    const lz = (dx * si) + (dz * co);

    if(Math.abs(lx) <= (c.halfX + rr) && Math.abs(lz) <= (c.halfZ + rr)){
      if(Number.isFinite(eyeY) && Number.isFinite(c.topY)){
        const topEyeY = c.topY + PLAYER_EYE_HEIGHT;
        if(eyeY >= (topEyeY - stepUp - eps)) continue;
      }
      return true;
    }
  }

  return false;
}

function applyTunnelInteriorSideBlockCollision(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return false;
  if(!obj || !TUNNEL_INTERIOR_SIDE_BLOCKS_ENABLE || !tunnelInteriorSideBlockColliders.length) return false;
  if(!isTunnelInteriorSideBlockBlockedAtXZ(obj.position.x, obj.position.z, radius, obj.position.y)) return false;

  const px = prevX, pz = prevZ;
  const nx = obj.position.x, nz = obj.position.z;

  const tryX = { x: nx, z: pz };
  const tryZ = { x: px, z: nz };

  const okX = !isTunnelInteriorSideBlockBlockedAtXZ(tryX.x, tryX.z, radius, obj.position.y);
  const okZ = !isTunnelInteriorSideBlockBlockedAtXZ(tryZ.x, tryZ.z, radius, obj.position.y);

  if(okX && !okZ){
    obj.position.x = tryX.x;
    obj.position.z = tryX.z;
  } else if(okZ && !okX){
    obj.position.x = tryZ.x;
    obj.position.z = tryZ.z;
  } else if(okX && okZ){
    const dxX = Math.abs(nx - tryX.x) + Math.abs(nz - tryX.z);
    const dxZ = Math.abs(nx - tryZ.x) + Math.abs(nz - tryZ.z);
    if(dxX <= dxZ){
      obj.position.x = tryX.x;
      obj.position.z = tryX.z;
    } else {
      obj.position.x = tryZ.x;
      obj.position.z = tryZ.z;
    }
  } else {
    obj.position.x = px;
    obj.position.z = pz;
  }

  return true;
}

function _closestPointOnSpawnHalfCavePolyline(p){
  if(!spawnHalfCavePathWorld || spawnHalfCavePathWorld.length < 2) return null;

  let best = null;
  let dist2Best = Infinity;
  let runLen = 0;

  for(let i = 0; i < (spawnHalfCavePathWorld.length - 1); i++){
    const a = spawnHalfCavePathWorld[i];
    const b = spawnHalfCavePathWorld[i + 1];
    const ab = new THREE.Vector3().subVectors(b, a);
    const abLen = ab.length();
    if(abLen <= 1e-8) continue;

    const t = THREE.MathUtils.clamp(new THREE.Vector3().subVectors(p, a).dot(ab) / (abLen * abLen), 0, 1);
    const q = new THREE.Vector3().copy(a).addScaledVector(ab, t);
    const d2 = q.distanceToSquared(p);

    if(d2 < dist2Best){
      dist2Best = d2;
      best = {
        point: q,
        axis: ab.clone().normalize(),
        s: runLen + (abLen * t)
      };
    }

    runLen += abLen;
  }

  if(!best) return null;
  best.totalLength = runLen;
  return best;
}

function _getSpawnHalfCaveInnerState(px, py, pz, sphereRadius = 0){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return null;
  if(!SPAWN_CAVE_ENABLE || !spawnHalfCavePathWorld || spawnHalfCavePathWorld.length < 2) return null;

  const closest = _closestPointOnSpawnHalfCavePolyline(new THREE.Vector3(px, py, pz));
  if(!closest) return null;

  const r = Math.max(0, sphereRadius);
  if(closest.s < r || closest.s > (closest.totalLength - r)) return null; // open cave mouths

  const ft = WORLD_UNITS_PER_FOOT;
  const radius = (SPAWN_CAVE_DIAMETER_FT * 0.5) * ft;
  const wallThickness = Math.max(0.05 * ft, SPAWN_CAVE_WALL_THICKNESS_FT * ft);
  const innerRadius = Math.max(0.25 * ft, radius - wallThickness);

  const radialVec = new THREE.Vector3(px, py, pz).sub(closest.point);
  const radial = radialVec.length();

  const upDir = new THREE.Vector3(0, 1, 0).projectOnPlane(closest.axis);
  if(upDir.lengthSq() <= 1e-10) upDir.set(0, 1, 0);
  else upDir.normalize();

  if(radialVec.dot(upDir) < -r) return null; // open floor side of half-cylinder
  if(radial <= 1e-8) radialVec.copy(upDir);

  return {
    radial,
    innerLimit: Math.max(0.01, innerRadius - r),
    centerlinePoint: closest.point,
    radialDir: radialVec.normalize()
  };
}

function applySpawnHalfCaveWallBlock(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return false;
  if(!obj || !SPAWN_CAVE_ENABLE) return false;

  const py = obj.position.y;
  const prevState = _getSpawnHalfCaveInnerState(prevX, py, prevZ, radius);
  const nowState = _getSpawnHalfCaveInnerState(obj.position.x, py, obj.position.z, radius);
  if(!prevState || !nowState) return false;

  const wasInside = prevState.radial <= prevState.innerLimit;
  const nowOutsideInner = nowState.radial > nowState.innerLimit;

  if(wasInside && nowOutsideInner){
    obj.position.x = nowState.centerlinePoint.x + (nowState.radialDir.x * nowState.innerLimit);
    obj.position.z = nowState.centerlinePoint.z + (nowState.radialDir.z * nowState.innerLimit);
    return true;
  }

  return false;
}

function _closestPointOnTunnelPolyline(points, p){
  if(!points || points.length < 2) return null;

  let best = null;
  let dist2Best = Infinity;
  let runLen = 0;

  for(let i = 0; i < (points.length - 1); i++){
    const a = points[i];
    const b = points[i + 1];
    const ab = new THREE.Vector3().subVectors(b, a);
    const abLen = ab.length();
    if(abLen <= 1e-8) continue;

    const t = THREE.MathUtils.clamp(new THREE.Vector3().subVectors(p, a).dot(ab) / (abLen * abLen), 0, 1);
    const q = new THREE.Vector3().copy(a).addScaledVector(ab, t);
    const d2 = q.distanceToSquared(p);

    if(d2 < dist2Best){
      dist2Best = d2;
      best = { point: q, axis: ab.clone().normalize(), s: runLen + (abLen * t) };
    }

    runLen += abLen;
  }

  if(!best) return null;
  best.totalLength = runLen;
  return best;
}

function _getFullTunnelInnerState(points, innerRadius, px, py, pz, sphereRadius = 0){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return null;
  if(!points || points.length < 2 || !Number.isFinite(innerRadius) || innerRadius <= 0) return null;

  const closest = _closestPointOnTunnelPolyline(points, new THREE.Vector3(px, py, pz));
  if(!closest) return null;

  const r = Math.max(0, sphereRadius * TUNNEL_WALL_COLLISION_RADIUS_SCALE);
  const entranceClearance = Math.max(0, TUNNEL_ENTRANCE_CLEARANCE_FT * WORLD_UNITS_PER_FOOT);
  if(closest.s < (r + entranceClearance) || closest.s > (closest.totalLength - (r + entranceClearance))) return null;

  const radialVec = new THREE.Vector3(px, py, pz).sub(closest.point);
  const radial = radialVec.length();
  if(radial <= 1e-8){
    const fallback = new THREE.Vector3(0, 1, 0).projectOnPlane(closest.axis);
    if(fallback.lengthSq() > 1e-8) radialVec.copy(fallback.normalize());
    else radialVec.set(1, 0, 0);
  }

  return {
    radial,
    innerLimit: Math.max(0.01, innerRadius - r),
    centerlinePoint: closest.point,
    radialDir: radialVec.normalize()
  };
}

function applyFullTunnelPolylineWallBlock(obj, prevX, prevZ, points, innerRadius, radius = TRUCK_COLLISION_RADIUS){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return false;
  if(!obj || !points || points.length < 2 || !Number.isFinite(innerRadius) || innerRadius <= 0) return false;

  const py = obj.position.y;
  const insideEps = 0.05 * WORLD_UNITS_PER_FOOT;
  const endEps = 0.25 * WORLD_UNITS_PER_FOOT;

  const probe = (x, z)=>{
    const closest = _closestPointOnTunnelPolyline(points, new THREE.Vector3(x, py, z));
    if(!closest) return null;

    const delta = new THREE.Vector3(x, py, z).sub(closest.point);
    const axis = closest.axis.clone().normalize();
    const along = delta.dot(axis);

    const sideVec = delta.clone().addScaledVector(axis, -along);
    const sideRadial = sideVec.length();

    let sideDir = sideVec;
    if(sideDir.lengthSq() <= 1e-10){
      const fallback = new THREE.Vector3(0, 1, 0).projectOnPlane(axis);
      if(fallback.lengthSq() > 1e-10) sideDir = fallback.normalize();
      else sideDir = new THREE.Vector3(1, 0, 0);
    } else {
      sideDir = sideDir.normalize();
    }

    const r = Math.max(0, radius * TUNNEL_WALL_COLLISION_RADIUS_SCALE);
    const innerLimit = Math.max(0.01, innerRadius - r);

    const atStart = closest.s <= endEps;
    const atEnd = closest.s >= (closest.totalLength - endEps);
    const beyondStart = atStart && (along < 0);
    const beyondEnd = atEnd && (along > 0);

    return {
      axis,
      along,
      sideRadial,
      sideDir,
      innerLimit,
      centerlinePoint: closest.point,
      insideSide: sideRadial <= (innerLimit + insideEps),
      throughMouthApproach: beyondStart || beyondEnd
    };
  };

  const yaw = Number.isFinite(obj.rotation?.y) ? obj.rotation.y : truckYaw;
  const fwdX = -Math.sin(yaw);
  const fwdZ = -Math.cos(yaw);
  const rightX = -fwdZ;
  const rightZ = fwdX;

  const bodyFront = Math.max(0.6, TRUCK_FWD * 0.55);
  const bodyHalfWidth = Math.max(0.25, TRUCK_W * 0.28);
  const sampleOffsets = [
    { fwd: 0.0, right: 0.0 },
    { fwd: bodyFront, right: 0.0 },
    { fwd: bodyFront, right: bodyHalfWidth },
    { fwd: bodyFront, right: -bodyHalfWidth }
  ];

  const toWorld = (baseX, baseZ, off)=>({
    x: baseX + (fwdX * off.fwd) + (rightX * off.right),
    z: baseZ + (fwdZ * off.fwd) + (rightZ * off.right)
  });

  for(const off of sampleOffsets){
    const prevPt = toWorld(prevX, prevZ, off);
    const nowPt = toWorld(obj.position.x, obj.position.z, off);

    const prevState = probe(prevPt.x, prevPt.z);
    const nowState = probe(nowPt.x, nowPt.z);
    if(!prevState || !nowState) continue;

    // Inside -> outside is only allowed when leaving through a tunnel mouth.
    if(prevState.insideSide && !nowState.insideSide){
      if(!(prevState.throughMouthApproach || nowState.throughMouthApproach)){
        obj.position.x = prevX;
        obj.position.z = prevZ;
        return true;
      }
    }

    // Outside -> inside is only allowed when approaching through a tunnel mouth.
    if(!prevState.insideSide && nowState.insideSide){
      if(!(prevState.throughMouthApproach || nowState.throughMouthApproach)){
        obj.position.x = prevX;
        obj.position.z = prevZ;
        return true;
      }
    }
  }

  return false;
}

function applyAllFullCaveWallBlocks(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return false;
  if(applyFullTunnelPolylineWallBlock(obj, prevX, prevZ, spawnFullCylPathWorld, spawnFullCylInnerRadius, radius)) return true;
  if(applyFullTunnelPolylineWallBlock(obj, prevX, prevZ, spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius, radius)) return true;
  if(applyFullTunnelPolylineWallBlock(obj, prevX, prevZ, spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius, radius)) return true;
  if(applyFullTunnelPolylineWallBlock(obj, prevX, prevZ, spawnMegaCavePathWorld, spawnMegaCaveInnerRadius, radius)) return true;
  return false;
}

function isPointInsideAnyFullCaveForTrees(x, z){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return false;
  const y = heightAtWorldXZ(x, z) + PLAYER_EYE_HEIGHT;
  const p = new THREE.Vector3(x, y, z);
  const isInside = (points, innerRadius)=>{
    if(!points || points.length < 2 || !Number.isFinite(innerRadius) || innerRadius <= 0) return false;
    const st = _getFullTunnelInnerState(points, innerRadius, p.x, p.y, p.z, 0);
    return !!(st && st.radial <= st.innerLimit);
  };

  return (
    isInside(spawnFullCylPathWorld, spawnFullCylInnerRadius) ||
    isInside(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius) ||
    isInside(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius) ||
    isInside(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius)
  );
}

function isPointNearAnyFullCaveMouthForTrees(x, z){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return false;
  const ft = WORLD_UNITS_PER_FOOT;
  const extra = Math.max(6.0 * ft, TUNNEL_ENTRANCE_CLEARANCE_FT * ft) + (8.0 * ft);

  const nearMouth = (points, innerRadius)=>{
    if(!points || points.length < 2 || !Number.isFinite(innerRadius) || innerRadius <= 0) return false;
    const clearR = innerRadius + extra;
    const ends = [points[0], points[points.length - 1]];
    for(const e of ends){
      if(!e) continue;
      const dx = x - e.x;
      const dz = z - e.z;
      if((dx * dx) + (dz * dz) <= (clearR * clearR)) return true;
    }
    return false;
  };

  return (
    nearMouth(spawnFullCylPathWorld, spawnFullCylInnerRadius) ||
    nearMouth(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius) ||
    nearMouth(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius) ||
    nearMouth(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius)
  );
}

function pruneSpriteListInsideCaves(list){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return 0;
  let removed = 0;
  for(let i = list.length - 1; i >= 0; i--){
    const m = list[i];
    if(!m) continue;
    if(!isPointInsideAnyFullCaveForTrees(m.position.x, m.position.z) && !isPointNearAnyFullCaveMouthForTrees(m.position.x, m.position.z)) continue;
    scene.remove(m);
    list.splice(i, 1);
    removed++;
  }
  return removed;
}

function pruneTreesInsideCaves(){
  if(!TUBE_CAVE_BEHAVIOR_ENABLE) return 0;
  let removed = 0;
  removed += pruneSpriteListInsideCaves(lowTreeSprites);
  removed += pruneSpriteListInsideCaves(lowTree3Sprites);
  removed += pruneSpriteListInsideCaves(midTree7Sprites);
  if(removed > 0){
    hudLine("🌲 Cave cleanup: removed <code>" + removed + "</code> trees from tunnel interiors and entrances.");
  }
  return removed;
}

function isInsideGreenSquareArea(x, z){
  void x;
  void z;
  // Ring-of-fire no-go zone removed: treat green-square exclusion as disabled.
  return false;
}

function isInsideGreenFireRingArea(x, z){
  void x;
  void z;
  return false;
  const ft = WORLD_UNITS_PER_FOOT;
  const ringRadius = Math.max(2.0 * ft, (GREEN_FIRE_RING_DIAMETER_FT * 0.5) * ft);
  const dx = x - GREEN_SQUARE_MARKER_X;
  const dz = z - GREEN_SQUARE_MARKER_Z;
  return ((dx * dx) + (dz * dz)) <= (ringRadius * ringRadius);
}

function isWithinGreenFireRingTriggerRange(x, z, extraRangeFt = FIRE_RING_AMBIENT_TRIGGER_RANGE_FT){
  void x;
  void z;
  void extraRangeFt;
  return false;
  const ft = WORLD_UNITS_PER_FOOT;
  const ringRadius = Math.max(2.0 * ft, (GREEN_FIRE_RING_DIAMETER_FT * 0.5) * ft);
  const extra = Math.max(0, Number(extraRangeFt) || 0) * ft;
  const triggerRadius = ringRadius + extra;
  const dx = x - GREEN_SQUARE_MARKER_X;
  const dz = z - GREEN_SQUARE_MARKER_Z;
  return ((dx * dx) + (dz * dz)) <= (triggerRadius * triggerRadius);
}

function applyGreenFireRingFeatureCollision(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS){
  void obj;
  void prevX;
  void prevZ;
  void radius;
  return false;
  if(!GREEN_FIRE_RING_BEHAVIOR_ENABLE) return false;
  if(!obj || !GREEN_FIRE_RING_ENABLE) return false;
  const r = Math.max(0.2, radius || TRUCK_COLLISION_RADIUS);

  const hitsAt = (x, z)=>{
    for(const m of greenFireRingFlames){
      if(!m || !m.parent) continue;
      const br = Number(m.userData?.blockRadius) || 0;
      if(br <= 0) continue;
      const dx = x - m.position.x;
      const dz = z - m.position.z;
      if((dx * dx) + (dz * dz) <= ((r + br) * (r + br))) return true;
    }
    for(const s of greenBigfootSprites){
      if(!s || !s.parent) continue;
      if(s.userData && (s.userData.passThrough || s.userData.nonBlocking)) continue;
      const br = Number(s.userData?.blockRadius) || 0;
      if(br <= 0) continue;
      const dx = x - s.position.x;
      const dz = z - s.position.z;
      if((dx * dx) + (dz * dz) <= ((r + br) * (r + br))) return true;
    }
    return false;
  };

  if(!hitsAt(obj.position.x, obj.position.z)) return false;

  const tryX = { x: obj.position.x, z: prevZ };
  const tryZ = { x: prevX, z: obj.position.z };
  const okX = !hitsAt(tryX.x, tryX.z);
  const okZ = !hitsAt(tryZ.x, tryZ.z);

  if(okX && !okZ){
    obj.position.x = tryX.x;
    obj.position.z = tryX.z;
  } else if(okZ && !okX){
    obj.position.x = tryZ.x;
    obj.position.z = tryZ.z;
  } else if(okX && okZ){
    const dxX = Math.abs(obj.position.x - tryX.x) + Math.abs(obj.position.z - tryX.z);
    const dxZ = Math.abs(obj.position.x - tryZ.x) + Math.abs(obj.position.z - tryZ.z);
    if(dxX <= dxZ){
      obj.position.x = tryX.x;
      obj.position.z = tryX.z;
    } else {
      obj.position.x = tryZ.x;
      obj.position.z = tryZ.z;
    }
  } else {
    obj.position.x = prevX;
    obj.position.z = prevZ;
  }

  return true;
}

function isInsideTruckFireFeatureVicinity(x, z){
  if(!truckFireFeatureCenter) return false;
  const dx = x - truckFireFeatureCenter.x;
  const dz = z - truckFireFeatureCenter.z;
  return ((dx * dx) + (dz * dz)) <= (TRUCK_FIRE_FEATURE_VICINITY_RADIUS * TRUCK_FIRE_FEATURE_VICINITY_RADIUS);
}

function canUseTruckFireFeatureAt(x, z){
  if(!isInsideTruckFireFeatureVicinity(x, z)) return false;
  if(isInsidePuebloPlazaBounds(x, z, TRUCK_COLLISION_RADIUS)) return false;
  if(isPointInsideAnyFullCaveForTrees(x, z)) return false;
  if(isInsideGreenSquareArea(x, z)) return false;
  return true;
}

function isCombatSuppressedZone(px, py, pz){
  if(isInsidePuebloPlazaBounds(px, pz, TRUCK_COLLISION_RADIUS)) return true;
  if(isPointInsideAnyFullCaveForTrees(px, pz)) return true;
  if(isInsideGreenSquareArea(px, pz)) return true;
  return false;
}

function isPlayerInCombatSuppressedZone(){
  const p = controls.getObject().position;
  return isCombatSuppressedZone(p.x, p.y, p.z);
}

function applyTreeBlock(obj, prevX, prevZ){
  if (!TREE_COLLISION_ENABLE) return;
  if (pitchFlightActive) return;
  const terrainY = heightAtWorldXZ(obj.position.x, obj.position.z) + PLAYER_EYE_HEIGHT;
  if (obj.position.y > (terrainY + (TRUCK_H * 0.75))) return;
  if (!isTreeBlockedAtXZ(obj.position.x, obj.position.z)) return;

  // Same sliding approach as lake collision: preserve one axis when possible.
  const px = prevX, pz = prevZ;
  const nx = obj.position.x, nz = obj.position.z;

  const tryX = { x: nx, z: pz };
  const tryZ = { x: px, z: nz };

  const okX = !isTreeBlockedAtXZ(tryX.x, tryX.z);
  const okZ = !isTreeBlockedAtXZ(tryZ.x, tryZ.z);

  if (okX && !okZ){
    obj.position.x = tryX.x;
    obj.position.z = tryX.z;
  } else if (okZ && !okX){
    obj.position.x = tryZ.x;
    obj.position.z = tryZ.z;
  } else if (okX && okZ){
    const dxX = Math.abs(nx - tryX.x) + Math.abs(nz - tryX.z);
    const dxZ = Math.abs(nx - tryZ.x) + Math.abs(nz - tryZ.z);
    if (dxX <= dxZ){
      obj.position.x = tryX.x;
      obj.position.z = tryX.z;
    } else {
      obj.position.x = tryZ.x;
      obj.position.z = tryZ.z;
    }
  } else {
    obj.position.x = px;
    obj.position.z = pz;
  }

  obj.position.y = heightAtWorldXZ(obj.position.x, obj.position.z) + PLAYER_EYE_HEIGHT;
}

function markSafePosition(obj){
  lastSafePos.copy(obj.position);
}

function applyLakeBlock(obj){
  if (!LAKE_BLOCK_ENABLE || !lakeMesh) return;
  if (!lastSafeInit){
    lastSafePos.copy(obj.position);
    lastSafeInit = true;
    return;
  }

  // If we're not in the lake, update safe pos and exit
  if (!isWaterAtXZ(obj.position.x, obj.position.z)){
    lastSafePos.copy(obj.position);
    return;
  }

  // --- Sliding collision (no jitter) ---
  // We entered the lake this frame. Try to "slide" by canceling only the axis that caused entry.
  const px = prevPos.x, pz = prevPos.z;
  const nx = obj.position.x, nz = obj.position.z;

  const tryX = { x: nx, z: pz }; // keep X move, cancel Z move
  const tryZ = { x: px, z: nz }; // keep Z move, cancel X move

  const okX = !isWaterAtXZ(tryX.x, tryX.z);
  const okZ = !isWaterAtXZ(tryZ.x, tryZ.z);

  if (okX && !okZ){
    obj.position.x = tryX.x;
    obj.position.z = tryX.z;
  } else if (okZ && !okX){
    obj.position.x = tryZ.x;
    obj.position.z = tryZ.z;
  } else if (okX && okZ){
    // both work: choose the one that stays closer to intended movement
    const dxX = Math.abs(nx - tryX.x) + Math.abs(nz - tryX.z);
    const dxZ = Math.abs(nx - tryZ.x) + Math.abs(nz - tryZ.z);
    if (dxX <= dxZ){
      obj.position.x = tryX.x;
      obj.position.z = tryX.z;
    } else {
      obj.position.x = tryZ.x;
      obj.position.z = tryZ.z;
    }
  } else {
    // neither works: revert fully
    obj.position.x = px;
    obj.position.z = pz;
  }

  // Clamp to terrain height unless traversing inside the underground destination tunnel.
  obj.position.y = heightAtWorldXZ(obj.position.x, obj.position.z) + PLAYER_EYE_HEIGHT;
  lastSafePos.copy(obj.position);
}




/* =========================================================
   🔵 BLUE BALL FIRING (Camitruck only, SAFE)
   Hold F to fire. E angle up. D angle down.
   ========================================================= */
const FIRE_ENABLE = false;
const FIRE_COOLDOWN = 260; // ms
const FIRE_SPEED = 90;    // world units / sec (boosted so shots always outrun max truck speed)
const FIRE_LIFE = 3.0;    // seconds
const FIRE_RADIUS = 0.18;
const FIRE_MUZZLE_ABOVE_GROUND = 2.2;
const FIRE_PITCH_STEP_DEG = 2.0;
const FIRE_PITCH_MIN_DEG = -22.0;
const FIRE_PITCH_MAX_DEG = 35.0;

let fireHeld = false;
let firePitchDeg = 0.0;
let lastFireTime = 0;
const blueBalls = [];
const __tmpBox = new THREE.Box3();
const __tmpV3 = new THREE.Vector3();
const __tmpV3b = new THREE.Vector3();
const __tmpV3c = new THREE.Vector3();
const __tmpV3d = new THREE.Vector3();
const __animFwd = new THREE.Vector3();
const __animRight = new THREE.Vector3();
const __animMove = new THREE.Vector3();
const __animLunge = new THREE.Vector3();
const __tmpRay = new THREE.Ray();
const __blueBallPrevPos = new THREE.Vector3();
const __copterBallPrevPos = new THREE.Vector3();


function spawnBlueBall(){
  const geom = new THREE.SphereGeometry(FIRE_RADIUS, 12, 12);
  const mat  = new THREE.MeshStandardMaterial({
    color: 0xff4a4a,
    emissive: 0x8a1010,
    emissiveIntensity: 0.6
  });
  const ball = new THREE.Mesh(geom, mat);

  const obj = controls.getObject();
  const yaw = obj.rotation.y;
  const pitch = firePitchDeg * (Math.PI / 180);
  const horiz = Math.cos(pitch);
  const dir = new THREE.Vector3(
    -Math.sin(yaw) * horiz,
    Math.sin(pitch),
    -Math.cos(yaw) * horiz
  ).normalize();

  const sx = obj.position.x + dir.x * 1.2;
  const sz = obj.position.z + dir.z * 1.2;
  const sy = heightAtWorldXZ(obj.position.x, obj.position.z) + FIRE_MUZZLE_ABOVE_GROUND;

  ball.position.set(sx, sy, sz);
  scene.add(ball);

  blueBalls.push({
    mesh: ball,
    vel: dir.multiplyScalar(FIRE_SPEED),
    life: FIRE_LIFE
  });
}

function tryFire(){
  if (!FIRE_ENABLE) return;

  const now = performance.now();
  if (now - lastFireTime < FIRE_COOLDOWN) return;
  lastFireTime = now;
  spawnBlueBall();
  playHitSound();
}

function ballSweepHitsMesh(mesh, prevPos, currPos, radius = FIRE_RADIUS){
  if(!mesh || !prevPos || !currPos) return false;
  __tmpBox.setFromObject(mesh);
  const inflate = Math.max(0.02, radius * 1.35);
  __tmpBox.expandByScalar(inflate);

  const cpNow = __tmpBox.clampPoint(currPos, __tmpV3);
  if(cpNow.distanceToSquared(currPos) <= (inflate * inflate)) return true;

  const cpPrev = __tmpBox.clampPoint(prevPos, __tmpV3b);
  if(cpPrev.distanceToSquared(prevPos) <= (inflate * inflate)) return true;

  const seg = __tmpV3c.copy(currPos).sub(prevPos);
  const len = seg.length();
  if(len <= 1e-6) return false;
  seg.multiplyScalar(1 / len);

  __tmpRay.set(prevPos, seg);
  const hit = __tmpRay.intersectBox(__tmpBox, __tmpV3d);
  if(!hit) return false;
  return prevPos.distanceToSquared(hit) <= (len * len);
}

function updateBlueBalls(dt){
  for (let i = blueBalls.length - 1; i >= 0; i--){
    let removed = false;
    const b = blueBalls[i];
    const prevX = b.mesh.position.x;
    const prevZ = b.mesh.position.z;
    const prevPos = __blueBallPrevPos.copy(b.mesh.position);
    b.mesh.position.addScaledVector(b.vel, dt);

    if(applyPuebloCubeBlock(b.mesh, prevX, prevZ, FIRE_RADIUS, false) || applySpawnHalfCaveWallBlock(b.mesh, prevX, prevZ, FIRE_RADIUS)){
      const p = b.mesh.position;
      spawnHitBurst(p, 0x4fb6ff);
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      blueBalls.splice(i, 1);
      continue;
    }

    // Hit test vs targets (sphere center vs target AABB)
    if (targets && targets.length){
      const p = b.mesh.position;
      for (let ti = targets.length - 1; ti >= 0; ti--){
        const t = targets[ti];
        if (!t || !t.box) continue;
        const cp = t.box.clampPoint(p, __tmpV3);
        const d2 = cp.distanceToSquared(p);
        if (d2 <= (FIRE_RADIUS * FIRE_RADIUS)){
          spawnHitBurst(p, 0xff6666);
          playTargetHitSound();
          scene.remove(b.mesh);
          b.mesh.geometry.dispose();
          b.mesh.material.dispose();
          blueBalls.splice(i, 1);
          registerTargetHit(ti);
          removed = true;
          break;
        }
      }
      if (removed) continue;
    }

    // COPTER_HITTEST
    if (copter && copter.visible){
      __tmpBox.setFromObject(copter);
      const p = b.mesh.position;
      const cp = __tmpBox.clampPoint(p, __tmpV3);
      const d2 = cp.distanceToSquared(p);
      if (d2 <= (FIRE_RADIUS * FIRE_RADIUS)){
        spawnHitBurst(p, 0xff4444);
        playHitSound();
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        blueBalls.splice(i, 1);
        continue;
      }
    }

    // TANK_HITTEST
    if (tank && tank.visible){
      __tmpBox.setFromObject(tank);
      const p = b.mesh.position;
      const cp = __tmpBox.clampPoint(p, __tmpV3);
      const d2 = cp.distanceToSquared(p);
      if (d2 <= (FIRE_RADIUS * FIRE_RADIUS)){
        tankHitCount += 1;
        if (tankHitCount >= TANK_HITS_TO_KILL){
          adjustPlayerHealthPct(10);
          destroyTankAndScheduleRespawn();
        }
        spawnHitBurst(p, 0xffa34a);
        playHitSound();
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        blueBalls.splice(i, 1);
        continue;
      }
    }

    // FIREBALL_HITTEST
    if (fireball && fireball.visible){
      __tmpBox.setFromObject(fireball);
      const p = b.mesh.position;
      const cp = __tmpBox.clampPoint(p, __tmpV3);
      const d2 = cp.distanceToSquared(p);
      if (d2 <= (FIRE_RADIUS * FIRE_RADIUS)){
        fireballHitCount += 1;
        spawnHitBurst(p, 0xffb266);
        playHitSound();
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        blueBalls.splice(i, 1);
        if (fireballHitCount >= FIREBALL_HITS_TO_KILL){
          destroyFireballAndScheduleNext(true);
        }
        continue;
      }
    }

    // REAPER2_HITTEST: Blue balls damage reaper2; 4 hits destroy it.
    if (tunnelReaperBoss && tunnelReaperBoss.visible){
      const p = b.mesh.position;
      if (ballSweepHitsMesh(tunnelReaperBoss, prevPos, p, FIRE_RADIUS)){
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        blueBalls.splice(i, 1);
        registerTunnelReaperBossHit(p);
        continue;
      }
    }

    // REAPER3_HITTEST: Blue balls damage reaper3; 4 hits destroy it.
    if (tunnelReaperBoss2 && tunnelReaperBoss2.visible){
      const p = b.mesh.position;
      if (ballSweepHitsMesh(tunnelReaperBoss2, prevPos, p, FIRE_RADIUS)){
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        blueBalls.splice(i, 1);
        registerTunnelReaperBoss2Hit(p);
        continue;
      }
    }

    // REAPER4_HITTEST: Blue balls damage reaper4; 4 hits destroy it.
    if (tunnelReaperBoss3 && tunnelReaperBoss3.visible){
      const p = b.mesh.position;
      if (ballSweepHitsMesh(tunnelReaperBoss3, prevPos, p, FIRE_RADIUS)){
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        blueBalls.splice(i, 1);
        registerTunnelReaperBoss3Hit(p);
        continue;
      }
    }

    // REAPER5_HITTEST: Blue balls damage reaper5; 4 hits destroy it.
    if (tunnelReaperBoss4 && tunnelReaperBoss4.visible){
      const p = b.mesh.position;
      if (ballSweepHitsMesh(tunnelReaperBoss4, prevPos, p, FIRE_RADIUS)){
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        blueBalls.splice(i, 1);
        registerTunnelReaperBoss4Hit(p);
        continue;
      }
    }

    // FINAL_REAPER_PAIR_HITTEST: last static reaper pair dies in 1 blue-ball shot.
    if (tunnelReaperGroup && tunnelReaperGroup.parent === scene){
      const p = b.mesh.position;
      let finalPairHitMesh = null;
      tunnelReaperGroup.traverse((node)=>{
        if(finalPairHitMesh) return;
        if(!node || !node.isMesh || !node.visible) return;
        if(!node.userData || !node.userData.isFinalTunnelReaperPair) return;
        if(ballSweepHitsMesh(node, prevPos, p, FIRE_RADIUS)) finalPairHitMesh = node;
      });
      if(finalPairHitMesh){
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        blueBalls.splice(i, 1);

        spawnHitBurst(finalPairHitMesh.position, 0xff6666);
        playHitSound();

        if(finalPairHitMesh.parent) finalPairHitMesh.parent.remove(finalPairHitMesh);
        if(finalPairHitMesh.geometry) finalPairHitMesh.geometry.dispose();
        if(finalPairHitMesh.material){
          if(Array.isArray(finalPairHitMesh.material)) finalPairHitMesh.material.forEach((m)=>{ if(m && m.dispose) m.dispose(); });
          else if(finalPairHitMesh.material.dispose) finalPairHitMesh.material.dispose();
        }
        continue;
      }
    }

    // BADGUY_HITTEST
    if (badGuy){
      __tmpBox.setFromObject(badGuy);
      const p = b.mesh.position;
      const cp = __tmpBox.clampPoint(p, __tmpV3);
      const d2 = cp.distanceToSquared(p);
      if (d2 <= (FIRE_RADIUS * FIRE_RADIUS)){
        spawnHitBurst(p, 0xffffff);
        playHitSound();
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        blueBalls.splice(i, 1);
        registerBadGuyHit();
        continue;
      }
    }

    b.life -= dt;
    if (b.life <= 0){
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      blueBalls.splice(i, 1);
    }
  }
}


function animate(){
  if(crashGameOver){
    renderActiveCamera();
    return;
  }

  // Lake ripples (very subtle)
  const nowSec = performance.now() * 0.001;

  requestAnimationFrame(animate);
  if(trainingFreezeActive){
    renderActiveCamera();
    return;
  }
  const dt = Math.min(0.033, clock.getDelta());
  const keyArrowUp = keys.has("ArrowUp");
  const keyArrowDown = keys.has("ArrowDown");
  const keyArrowLeft = keys.has("ArrowLeft");
  const keyArrowRight = keys.has("ArrowRight");
  const keyW = keys.has("KeyW");
  const keyS = keys.has("KeyS");
  const keyA = keys.has("KeyA");
  const keyD = keys.has("KeyD");
  const keyK = keys.has("KeyK");
  const keyBRawHeld = brakeHeld;
  const keyBSetHeld = keys.has("KeyB");
  const keyBPhysicalHold = keyBRawHeld || keyBSetHeld;
  const keyB = keyBPhysicalHold || brakeToggleActive;
  const camPosX = camera.position.x;
  const camPosZ = camera.position.z;
  const playerObj = controls.getObject();
  if(gyroState.enabled){
    const pitchAlpha = Math.min(1, GYRO_PITCH_RESPONSE_PER_SEC * dt);
    const bankAlpha = Math.min(1, GYRO_BANK_RESPONSE_PER_SEC * dt);
    gyroState.smoothedPitchInput += (gyroState.pitchInput - gyroState.smoothedPitchInput) * pitchAlpha;
    gyroState.smoothedBankInput += (gyroState.bankInput - gyroState.smoothedBankInput) * bankAlpha;
  } else {
    const relaxAlpha = Math.min(1, 8.0 * dt);
    gyroState.smoothedPitchInput += (0 - gyroState.smoothedPitchInput) * relaxAlpha;
    gyroState.smoothedBankInput += (0 - gyroState.smoothedBankInput) * relaxAlpha;
  }
  {
    const gyroRollTarget = gyroState.enabled
      ? (-gyroState.smoothedBankInput * ARROW_RIGHT_ROLL_MAX_RAD)
      : 0;
    const targetRoll = gyroState.enabled
      ? gyroRollTarget
      : (arrowRightHeld && !arrowLeftHeld)
        ? -ARROW_RIGHT_ROLL_MAX_RAD
        : (arrowLeftHeld && !arrowRightHeld)
          ? ARROW_RIGHT_ROLL_MAX_RAD
          : 0;
    const springAcc =
      ((targetRoll - arrowRightRoll) * ARROW_ROLL_REBOUND_STIFFNESS) -
      (arrowRightRollVel * ARROW_ROLL_REBOUND_DAMPING);
    arrowRightRollVel += springAcc * dt;
    arrowRightRoll += (arrowRightRollVel * dt);
    const k = Math.min(1, Math.max(0, ARROW_RIGHT_ROLL_SMOOTH * dt));
    arrowRightRoll += (targetRoll - arrowRightRoll) * (0.2 * k);
    if(Math.abs(arrowRightRoll) < 1e-5 && Math.abs(arrowRightRollVel) < 1e-5 && targetRoll === 0){
      arrowRightRoll = 0;
      arrowRightRollVel = 0;
    }
    camera.rotation.z = arrowRightRoll;
  }
  if(gyroState.enabled){
    const targetPitch = spawnPitchBaselineRad + (gyroState.smoothedPitchInput * CAMERA_LOOK_DOWN_MAX_RAD);
    const pitchAlpha = Math.min(1, GYRO_PITCH_RESPONSE_PER_SEC * dt);
    camera.rotation.x += (targetPitch - camera.rotation.x) * pitchAlpha;
    camera.rotation.x = Math.max(
      spawnPitchBaselineRad - CAMERA_LOOK_DOWN_MAX_RAD,
      Math.min(spawnPitchBaselineRad + CAMERA_LOOK_DOWN_MAX_RAD, camera.rotation.x)
    );
    camera.getWorldDirection(__tmpCameraForward);
    if(__tmpCameraForward.lengthSq() > 1e-8){
      pitchFlightDir.copy(__tmpCameraForward).normalize();
      pitchFlightActive = true;
    }
  } else if(arrowDownLookHeld && !arrowUpLookHeld){
    camera.rotation.x = Math.min(
      spawnPitchBaselineRad + CAMERA_LOOK_DOWN_MAX_RAD,
      camera.rotation.x + (CAMERA_LOOK_DOWN_SPEED_RAD_PER_SEC * dt)
    );
    camera.getWorldDirection(__tmpCameraForward);
    if(__tmpCameraForward.lengthSq() > 1e-8){
      pitchFlightDir.copy(__tmpCameraForward).normalize();
      pitchFlightActive = true;
    }
  } else if(arrowUpLookHeld && !arrowDownLookHeld){
    camera.rotation.x = Math.max(
      spawnPitchBaselineRad - CAMERA_LOOK_DOWN_MAX_RAD,
      camera.rotation.x - (CAMERA_LOOK_DOWN_SPEED_RAD_PER_SEC * dt)
    );
    camera.getWorldDirection(__tmpCameraForward);
    if(__tmpCameraForward.lengthSq() > 1e-8){
      pitchFlightDir.copy(__tmpCameraForward).normalize();
      pitchFlightActive = true;
    }
  }
  enforceInitialSpawnLock();
  if(puebloTopExitGraceTimer > 0) puebloTopExitGraceTimer = Math.max(0, puebloTopExitGraceTimer - dt);
  runwayLandingEvalCooldown = Math.max(0, runwayLandingEvalCooldown - dt);
  landingRolloutInertiaTimer = Math.max(0, landingRolloutInertiaTimer - dt);

  if(TUBE_CAVE_BEHAVIOR_ENABLE && !caveTreePruneDone && terrainReady){
    pruneTreesInsideCaves();
    caveTreePruneDone = true;
  }

  // RAYCASTER-STYLE ARROWS:
  //   ArrowLeft/ArrowRight = turn
  //   ArrowUp/ArrowDown    = forward/back
  const lowZoneMovementLocked = LOW_ZONE_STUCK_ENABLE && lowZoneStuckTimer > 0;
  const goddessEncounterMovementLocked = tunnelExitGoddessEncounterActive;
  const movementLocked = lowZoneMovementLocked || goddessEncounterMovementLocked;
  let avatruckTravelingNow = false;
  let forward = (keyArrowUp || keyW) ? 1 : (keyArrowDown || keyS) ? -1 : 0;
  if(movementLocked) forward = 0;
  for (const m of buffNearPickupSprites){
    if (!m) continue;
    m.lookAt(camPosX, m.position.y, camPosZ);
  }
  for (const m of lakeBushSprites){
    if (!m) continue;
    m.lookAt(camPosX, m.position.y, camPosZ);
  }
  for (const m of lowTreeSprites){
    if (!m) continue;
    m.lookAt(camPosX, m.position.y, camPosZ);
  }
  for (const m of lowTree3Sprites){
    if (!m) continue;
    m.lookAt(camPosX, m.position.y, camPosZ);
  }
  for (const m of midTree7Sprites){
    if (!m) continue;
    m.lookAt(camPosX, m.position.y, camPosZ);
  }
  for (const m of plazaExitVehicleChoices){
    if (!m) continue;
    m.lookAt(camPosX, m.position.y, camPosZ);
  }
  if(cyberFrontVehicleMesh && cyberFrontVehicleMesh.visible){
    cyberFrontVehicleMesh.lookAt(camPosX, cyberFrontVehicleMesh.position.y, camPosZ);
  }
  if (leggomanGoalMesh && leggomanGoalMesh.visible){
    leggomanGoalMesh.lookAt(camPosX, leggomanGoalMesh.position.y, camPosZ);
  }

  // Plane steering: bank-driven turn in the air, direct yaw on the ground.
  let strafe = 0;
  let turn = 0;
  if(!movementLocked){
    // Plane turn follows current bank continuously; release triggers roll bounce-back.
    if(avatarMode !== "leggoman"){
      const bankTurnInput = THREE.MathUtils.clamp(
        arrowRightRoll / Math.max(1e-6, ARROW_RIGHT_ROLL_MAX_RAD),
        -1,
        1
      );
      turn += bankTurnInput * ARROW_TURN_RATE_SCALE;
    } else {
      if(arrowLeftHeld) turn += ARROW_TURN_RATE_SCALE;
      if(arrowRightHeld) turn -= ARROW_TURN_RATE_SCALE;
    }
    if(!onGround){
      if (keyArrowLeft)  strafe -= 1;
      if (keyArrowRight) strafe += 1;
    } else {
      if (keyArrowLeft)  turn += 1;
      if (keyArrowRight) turn -= 1;
    }
  }

  const controlsActive = true; // movement no longer requires pointer-lock tap
  if (controlsActive) {
    const obj = playerObj;
    const wasAirborneForCrash = !onGround;
    if(!VEHICLES_ENABLE){
      if(!vehiclesDisabledApplied){
        avatarMode = "pickup";
        currentVehicleFile = "";
        stopVehicleAudio();
        clearPlazaExitVehicleChoices();
        clearCyberFrontVehicle();
        vehiclesDisabledApplied = true;
      }
    } else {
      vehiclesDisabledApplied = false;
    }
    const landingApproachActive = LANDING_SPECIAL_BEHAVIOR_ENABLE && trainingLandingRunActive && runwayLandingArmed && runwayLastAction === "takeoff";
    const canEngineCutGlide = false;
    const throttleCutNow = prevThrottleSpeedMult > ENGINE_CUT_THROTTLE_EPS && throttleSpeedMult <= ENGINE_CUT_THROTTLE_EPS;
    const throttleRestoredNow = throttleSpeedMult > ENGINE_CUT_THROTTLE_EPS;
    if(canEngineCutGlide && throttleCutNow){
      engineCutGlideActive = true;
      engineCutGlideEntrySpeedMult = Math.max(0, currentSpeedMult);
    } else if(engineCutGlideActive && (!canEngineCutGlide || throttleRestoredNow || onGround)){
      engineCutGlideActive = false;
    }

    // Plane heading follows bank/ground steering input.
    truckTurnInput = turn;
    truckYaw += turn * TURN_SPEED * dt;
    obj.rotation.y = truckYaw;

    const fwd = __animFwd.set(
      -Math.sin(truckYaw),
       0,
      -Math.cos(truckYaw)
    ).normalize();

    const right = __animRight.set(-fwd.z, 0, fwd.x).normalize();

    const move = __animMove.set(0, 0, 0);
    move.addScaledVector(fwd, forward);
    move.addScaledVector(right, strafe);

    // Engine spool model:
    // commanded throttle changes instantly, but effective thrust responds with lag.
    if(movementLocked){
      effectiveThrottleMult = Math.max(0, effectiveThrottleMult - (THROTTLE_SPOOL_DOWN_PER_SEC * dt));
    } else {
      const spoolRate = (throttleSpeedMult > effectiveThrottleMult) ? THROTTLE_SPOOL_UP_PER_SEC : THROTTLE_SPOOL_DOWN_PER_SEC;
      const spoolAlpha = Math.min(1, spoolRate * dt);
      effectiveThrottleMult += (throttleSpeedMult - effectiveThrottleMult) * spoolAlpha;
      effectiveThrottleMult = Math.max(THROTTLE_MIN_MULT, Math.min(THROTTLE_MAX_MULT, effectiveThrottleMult));
    }

    // Continuous inertia model:
    // Speed evolves from thrust minus drag every frame, so throttle up/down both
    // produce gradual response based on current speed and current throttle.
    const onRunwayTopNow = isOnAnyRunwayTopXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
    const brakeGroundYNow = getEffectiveGroundYWorldAtXZ(obj.position.x, obj.position.z, TRUCK_COLLISION_RADIUS * 0.4);
    const brakeGroundEyeYNow = Number.isFinite(brakeGroundYNow) ? (brakeGroundYNow + PLAYER_EYE_HEIGHT) : NaN;
    const nearBrakeSurfaceNow = Number.isFinite(brakeGroundEyeYNow) && (obj.position.y <= (brakeGroundEyeYNow + 0.75));
    const brakeRunwayLandingContactNow = runwayLastAction === "landing" && onRunwayTopNow && runwaySuccessfulLandingRolloutSafe;
    const brakeSurfaceContactNow = onGround || nearBrakeSurfaceNow || brakeRunwayLandingContactNow;
    const groundedForAirspeedNow = brakeSurfaceContactNow;
    const brakeRequestedNow = keyB;
    const brakeActiveNow = brakeRequestedNow && brakeSurfaceContactNow;
    if(
      !movementLocked &&
      runwayLastAction === "landing" &&
      runwaySuccessfulLandingRolloutSafe &&
      onRunwayTopNow &&
      brakeSurfaceContactNow &&
      throttleSpeedMult > LANDING_ROLLOUT_ZERO_THROTTLE_EPS &&
      (Number(currentSpeedMult) || 0) <= LANDING_ROLLOUT_MIN_SPEED_MULT &&
      !brakeActiveNow
    ){
      releaseLandingRolloutForNextTakeoff();
    }
    const runwayGroundRolloutActive = RUNWAY_GROUND_ROLLOUT_ENABLE && !movementLocked && runwayLastAction === "landing" && runwaySuccessfulLandingRolloutSafe && onRunwayTopNow && brakeSurfaceContactNow;
    const terrainGroundRolloutActive = !movementLocked && terrainLandingRolloutActive && !onRunwayTopNow && brakeSurfaceContactNow && throttleSpeedMult <= LANDING_ROLLOUT_ZERO_THROTTLE_EPS;
    const groundRolloutActive = runwayGroundRolloutActive || terrainGroundRolloutActive;
    const runwayApproachAirborneMode = LANDING_SPECIAL_BEHAVIOR_ENABLE && (
      !movementLocked &&
      !onGround &&
      runwayLandingArmed &&
      runwayLastAction === "takeoff" &&
      onRunwayTopNow &&
      throttleSpeedMult <= LANDING_ROLLOUT_ZERO_THROTTLE_EPS
    );
    const isLandingRunwayContext = LANDING_SPECIAL_BEHAVIOR_ENABLE && (runwayLastAction === "landing") && onGround && onRunwayTopNow;
    const glideFloor = (!movementLocked && !groundedForAirspeedNow && !isLandingRunwayContext && !engineCutGlideActive) ? AIRSPEED_GLIDE_MIN_MULT : 0;
    const speedNow = Math.max(0, currentSpeedMult);
    if(brakeActiveNow && brakeSurfaceContactNow){
      if(!brakeGroundActivePrev){
        brakeGroundLatchSpeedMult = speedNow;
      } else {
        brakeGroundLatchSpeedMult = Math.max(brakeGroundLatchSpeedMult, speedNow);
      }
      brakeGroundActivePrev = true;
    } else {
      brakeGroundActivePrev = false;
      brakeGroundLatchSpeedMult = 0.0;
    }
    const rolloutThrottleIdle = throttleSpeedMult <= LANDING_ROLLOUT_ZERO_THROTTLE_EPS;
    const runwayRolloutBrakeActiveNow = runwayGroundRolloutActive && rolloutThrottleIdle && keyBPhysicalHold;
    const landingRolloutMode = ROLLOUT_BEHAVIOR_ENABLE && LANDING_SPECIAL_BEHAVIOR_ENABLE && (
      !movementLocked &&
      landingRolloutInertiaTimer > 0 &&
      runwayLastAction === "landing" &&
      onRunwayTopNow &&
      rolloutThrottleIdle
    );
    const landingRolloutBrakeOverride = landingRolloutMode && brakeRequestedNow;
    const landingRolloutInertiaActive = (
      landingRolloutMode &&
      !landingRolloutBrakeOverride &&
      speedNow > LANDING_ROLLOUT_MIN_SPEED_MULT
    );
    if(
      ROLLOUT_BEHAVIOR_ENABLE &&
      !movementLocked &&
      runwayLastAction === "landing" &&
      onGround &&
      onRunwayTopNow &&
      !rolloutThrottleIdle &&
      !brakeActiveNow
    ){
      landingRolloutPreIdleSpeedMult = Math.max(landingRolloutPreIdleSpeedMult, speedNow);
      landingRolloutSpeedLatched = false;
    }
    const brakeOverridesThrustNow = ROLLOUT_BEHAVIOR_ENABLE && brakeActiveNow && brakeSurfaceContactNow;
    const effectiveThrottleForGroundRoll = brakeOverridesThrustNow ? 0.0 : effectiveThrottleMult;
    const throttleDeficit = Math.max(0, speedNow - effectiveThrottleForGroundRoll);
    const thrustAccel = effectiveThrottleForGroundRoll * AIRSPEED_THRUST_GAIN_PER_SEC;
    let dragDecel = AIRSPEED_BASE_DRAG_PER_SEC + (speedNow * speedNow * AIRSPEED_QUAD_DRAG_PER_SEC);
    if(!landingRolloutMode || landingRolloutBrakeOverride){
      dragDecel += throttleDeficit * AIRSPEED_BRAKE_DRAG_GAIN_PER_SEC;
    }
    if(ROLLOUT_BEHAVIOR_ENABLE && landingRolloutInertiaActive){
      dragDecel += AIRSPEED_GROUND_ROLLOUT_DECEL_PER_SEC * LANDING_ROLLOUT_DECEL_SCALE;
    } else if(ROLLOUT_BEHAVIOR_ENABLE && !movementLocked && groundedForAirspeedNow && effectiveThrottleForGroundRoll <= 1e-4){

  landingRolloutStopDeadlineMs = 0;

          const tdSpeedKt = getCurrentAirspeedKnots();
          const tdPitchDeg = getRealPitchDeg();
          const tdSinkFpm = Math.max(0, (-tdVelY * ALTITUDE_FEET_PER_WORLD_UNIT * 60.0));
          evaluateRunwayLanding(tdSpeedKt, tdPitchDeg, tdSinkFpm);
        }
      }
    }

    // Hard runway cube surface: never allow player/camera under the cube top plane.
    enforcePuebloCubeHardSurface(obj, TRUCK_COLLISION_RADIUS * 0.25);
    enforceScreenshotRunwayHardSurface(obj, TRUCK_COLLISION_RADIUS * 0.25);
    enforceTerrainRunwayHardSurface(obj, TRUCK_COLLISION_RADIUS * 0.25);
    updateRunwayTakeoffLandingState(obj);

    clampPlayerMaxAltitude(obj);

    // Step 4: mountains follow player
    if (mountainGroup){
      mountainGroup.position.x = obj.position.x;
      mountainGroup.position.z = obj.position.z;
      mountainGroup.position.y = 0;
  }
  }

  if (!controlsActive){
    truckTurnInput = 0;
    truckMoveBlend = 0;
    stopVehicleAudio();
    stopWalkingAudio();
    stopFountainWindAudio();
    stopPlaneZeroThrottleWindAudio();
    stopRingOfFireSequenceAudio();
  }
  if(VEHICLES_ENABLE) updateTruckAvatar(dt);
  hudUpdateElapsed += dt;
  hudUpdateTimer = Math.max(0, hudUpdateTimer - dt);
  if(hudUpdateTimer <= 0){
    hudUpdateTimer = HUD_UPDATE_INTERVAL;
    updateFlightHud(nowSec, hudUpdateElapsed);
    hudUpdateElapsed = 0;
  }
  updateAttitudeHud();
  updateMiniMap(dt);
  {
    const objNow = playerObj;
    if(objNow){
      const terrainYNow = heightAtWorldXZ(objNow.position.x, objNow.position.z);
      if(Number.isFinite(terrainYNow)){
        const withinCrashBand = objNow.position.y <= (terrainYNow + 5.0);
        const pitchDegNow = getRealPitchDeg();
        const highSpeedCrash = throttleSpeedMult >= CRASH_MIN_THROTTLE_MULT;
        const likelyImpactProfile = (!onGround) && (velY < -1.5 || pitchDegNow <= -5.0);
        let lowSpeedSteepCrash = false;
        if(throttleSpeedMult < CRASH_MIN_THROTTLE_MULT && pitchDegNow <= CRASH_LOW_SPEED_PITCH_TRIGGER_DEG){
          const t = (Math.abs(pitchDegNow) - Math.abs(CRASH_LOW_SPEED_PITCH_TRIGGER_DEG)) / Math.max(1e-6, (Math.abs(CRASH_LOW_SPEED_PITCH_FULL_DEG) - Math.abs(CRASH_LOW_SPEED_PITCH_TRIGGER_DEG)));
          const p = CRASH_LOW_SPEED_PITCH_MIN_PROB + (Math.max(0, Math.min(1, t)) * (1.0 - CRASH_LOW_SPEED_PITCH_MIN_PROB));
          lowSpeedSteepCrash = Math.random() < p;
        }
        if(CRASH_GAME_OVER_ENABLE && withinCrashBand && likelyImpactProfile && (highSpeedCrash || lowSpeedSteepCrash) && !crashTerrainYPlayed && !runwaySuccessfulLandingRolloutSafe){
          crashTerrainYPlayed = true;
          hudLine("🔊 Crash triggered near terrain.");
          playCrashSound();
          window.setTimeout(()=>{
            triggerCrashGameOver();
          }, 120);
        } else if(objNow.position.y > (terrainYNow + 6.0)){
          crashTerrainYPlayed = false;
        }
      }
    }
  }
  renderActiveCamera();

}
animate();

addEventListener("resize", syncRendererSize);
</script>
