<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sound Effects</title>
<link rel="icon" href="data:,">
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111827;
    color: #fff;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hud {
    width: min(1180px, calc(100vw - 36px));
    min-height: min(620px, calc(100vh - 36px));
    padding: 26px;
    box-sizing: border-box;
    border: 2px solid rgba(255,255,255,.18);
    border-radius: 22px;
    background: rgba(17, 24, 39, .94);
    box-shadow: 0 22px 60px rgba(0,0,0,.45);
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 20px;
  }

  h1 {
    margin: 0;
    font-size: clamp(30px, 5vw, 62px);
    line-height: 1;
    letter-spacing: 0;
  }

  .grid {
    display: grid;
    grid-template-rows: repeat(2, minmax(150px, 1fr));
    gap: 18px;
  }

  .row {
    display: grid;
    gap: 18px;
  }

  .row:first-child {
    grid-template-columns: repeat(6, minmax(0, 1fr));
  }

  .row:last-child {
    grid-template-columns: repeat(5, minmax(0, 1fr));
  }

  button {
    border: 2px solid rgba(255,255,255,.22);
    border-radius: 18px;
    background: #f8fafc;
    color: #111827;
    font: 900 clamp(22px, 3vw, 42px)/1.05 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    letter-spacing: 0;
    box-shadow: inset 0 -10px 0 rgba(0,0,0,.10), 0 10px 24px rgba(0,0,0,.30);
    touch-action: manipulation;
  }

  button:active,
  button.playing {
    transform: translateY(4px);
    box-shadow: inset 0 -4px 0 rgba(0,0,0,.16), 0 4px 14px rgba(0,0,0,.28);
  }

  .status {
    min-height: 26px;
    font-size: clamp(18px, 2vw, 24px);
    color: rgba(255,255,255,.82);
  }

  @media (max-width: 760px) {
    .hud {
      width: calc(100vw - 20px);
      min-height: calc(100vh - 20px);
      padding: 16px;
      gap: 14px;
    }

    .grid {
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .row {
      gap: 12px;
    }
  }
</style>
</head>
<body>
  <main class="hud">
    <h1>Sound Effects</h1>
    <section class="grid" aria-label="Sound effect buttons">
      <div class="row">
        <button data-sound="fart.mp3">FART</button>
        <button data-sound="burp.mp3">BURP</button>
        <button data-sound="chipmonk_laugh.mp3">LAUGH</button>
        <button data-sound="elephant.mp3">ELEPHANT</button>
        <button data-sound="wind.mp3">WIND</button>
        <button data-sound="wolf_howl.mp3">WOLF</button>
      </div>
      <div class="row">
        <button data-sound="jungle_birds.mp3">BIRDS</button>
        <button data-sound="monkey.mp3">MONKEY</button>
        <button data-sound="train.mp3">TRAIN</button>
        <button data-sound="crickets.mp3">CRICKETS</button>
        <button data-sound="twang.mp3">TWANG</button>
      </div>
    </section>
    <div class="status" id="status">Tap a button to unlock and play sound.</div>
  </main>
  <script src="sound-effects.js"></script>
</body>
</html>
