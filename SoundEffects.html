<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sound Effects</title>
<link rel="icon" href="data:,">
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111827;
    color: #fff;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hud {
    width: min(1180px, calc(100vw - 36px));
    min-height: min(620px, calc(100vh - 36px));
    padding: 26px;
    box-sizing: border-box;
    border: 2px solid rgba(255,255,255,.18);
    border-radius: 22px;
    background: rgba(17, 24, 39, .94);
    box-shadow: 0 22px 60px rgba(0,0,0,.45);
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 20px;
  }

  h1 {
    margin: 0;
    font-size: clamp(30px, 5vw, 62px);
    line-height: 1;
    letter-spacing: 0;
  }

  .grid {
    display: grid;
    grid-template-rows: repeat(3, minmax(96px, 1fr));
    gap: 18px;
  }

  .row {
    display: grid;
    gap: 18px;
  }

  .row {
    grid-template-columns: repeat(5, minmax(0, 1fr));
  }

  button {
    border: 2px solid rgba(255,255,255,.28);
    border-radius: 18px;
    background: linear-gradient(180deg, #2f8cff 0%, #0f5fd7 100%);
    color: #fff;
    font: 900 clamp(22px, 3vw, 42px)/1.05 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    letter-spacing: 0;
    text-shadow: 0 2px 3px rgba(0,0,0,.35);
    box-shadow: inset 0 -10px 0 rgba(0,0,0,.18), 0 10px 24px rgba(0,0,0,.30);
    touch-action: manipulation;
  }

  button:active,
  button.playing {
    transform: translateY(4px);
    box-shadow: inset 0 -4px 0 rgba(0,0,0,.16), 0 4px 14px rgba(0,0,0,.28);
  }

  .status {
    min-height: 26px;
    font-size: clamp(18px, 2vw, 24px);
    color: rgba(255,255,255,.82);
  }

  .diag {
    max-height: 150px;
    overflow: auto;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(0,0,0,.32);
    color: #d1fae5;
    font: 14px/1.3 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    white-space: pre-wrap;
    -webkit-overflow-scrolling: touch;
  }

  @media (max-width: 760px) {
    .hud {
      width: calc(100vw - 20px);
      min-height: calc(100vh - 20px);
      padding: 16px;
      gap: 14px;
    }

    .grid {
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .row {
      gap: 12px;
    }
  }
</style>
</head>
<body>
  <main class="hud">
    <h1>Sound Effects</h1>
    <section class="grid" aria-label="Sound effect buttons">
      <div class="row">
        <button data-sound="fart.mp3">FART</button>
        <button data-sound="burp.mp3">BURP</button>
        <button data-sound="chipmonk_laugh.mp3">LAUGH</button>
        <button data-sound="elephant.mp3">ELEPHANT</button>
        <button data-sound="wind.mp3">WIND</button>
      </div>
      <div class="row">
        <button data-sound="wolf.mp3">WOLF</button>
        <button data-sound="baloon.mp3">BALOON</button>
        <button data-sound="mad_cat.mp3">MAD CAT</button>
        <button data-sound="jungle_birds.mp3">BIRDS</button>
        <button data-sound="monkey.mp3">MONKEY</button>
      </div>
      <div class="row">
        <button data-sound="train.mp3">TRAIN</button>
        <button data-sound="crickets.mp3">CRICKETS</button>
        <button data-sound="twang.mp3">TWANG</button>
        <button data-sound="elk.mp3">ELK</button>
        <button data-sound="loon.mp3">LOON</button>
      </div>
    </section>
    <div class="status" id="status">Tap a button to unlock and play sound.</div>
    <div class="diag" id="diag">Diagnostics loading...</div>
  </main>
  <script>
(function(){
  "use strict";

  const status = document.getElementById("status");
  const diag = document.getElementById("diag");
  const buttons = Array.from(document.querySelectorAll("[data-sound]"));
  const audioPool = new Map();
  let activeButton = null;
  let activeFile = "";
  let lastTapAt = 0;
  let lastTapFile = "";

  function setStatus(text){
    if(status) status.textContent = text;
  }

  function getAudio(file){
    let item = audioPool.get(file);
    if(!item){
      const audio = new Audio("images/" + file);
      audio.preload = "auto";
      audio.playsInline = true;
      item = { audio };
      audioPool.set(file, item);
    }
    return item;
  }

  function stopSound(item, file, button){
    if(!item || !item.audio) return;
    try{
      item.audio.pause();
      item.audio.currentTime = 0;
    }catch(e){}
    if(button) button.classList.remove("playing");
    if(activeFile === file){
      activeFile = "";
      activeButton = null;
    }
    setStatus("Stopped: " + file);
  }

  function playSound(file, button){
    const item = getAudio(file);
    const audio = item.audio;
    if(activeFile === file && !audio.paused){
      stopSound(item, file, button);
      return;
    }
    if(activeFile && activeFile !== file){
      stopSound(getAudio(activeFile), activeFile, activeButton);
    }
    audio.onended = ()=>{
      button.classList.remove("playing");
      if(activeFile === file){
        activeFile = "";
        activeButton = null;
      }
      setStatus("Finished: " + file);
    };

    try{
      audio.pause();
      audio.currentTime = 0;
      audio.muted = false;
      audio.volume = 1;
      const playPromise = audio.play();
      if(playPromise && typeof playPromise.then === "function"){
        playPromise.then(()=>{
          activeFile = file;
          activeButton = button;
          button.classList.add("playing");
          setStatus("Playing: " + file);
        }).catch((e)=>{
          const name = e && e.name ? e.name : "error";
          setStatus("Tap again: " + file);
          if(diag) diag.textContent = "Could not play " + file + ": " + name + "\n" + audio.src;
        });
      }else{
        activeFile = file;
        activeButton = button;
        button.classList.add("playing");
        setStatus("Playing: " + file);
      }
    }catch(e){
      const name = e && e.name ? e.name : "error";
      setStatus("Could not play: " + file);
      if(diag) diag.textContent = "Could not play " + file + ": " + name + "\n" + audio.src;
    }
  }

  for(const button of buttons){
    const file = button.getAttribute("data-sound");
    getAudio(file);

    const press = (ev)=>{
      ev.preventDefault();
      const now = performance.now();
      if(file === lastTapFile && now - lastTapAt < 180) return;
      lastTapAt = now;
      lastTapFile = file;
      playSound(file, button);
    };

    button.addEventListener("pointerdown", press);
    button.addEventListener("touchstart", press, { passive:false });
    button.addEventListener("mousedown", press);

    button.addEventListener("click", (ev)=>{
      ev.preventDefault();
    });
  }

  document.addEventListener("touchmove", (ev)=> ev.preventDefault(), { passive:false });
  if(diag){
    diag.textContent = "Ready. Opened from: " + window.location.href;
  }
})();

  </script>
</body>
</html>
