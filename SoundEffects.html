<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sound Effects</title>
<link rel="icon" href="data:,">
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111827;
    color: #fff;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hud {
    width: min(1180px, calc(100vw - 36px));
    min-height: min(620px, calc(100vh - 36px));
    padding: 26px;
    box-sizing: border-box;
    border: 2px solid rgba(255,255,255,.18);
    border-radius: 22px;
    background: rgba(17, 24, 39, .94);
    box-shadow: 0 22px 60px rgba(0,0,0,.45);
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 20px;
  }

  h1 {
    margin: 0;
    font-size: clamp(30px, 5vw, 62px);
    line-height: 1;
    letter-spacing: 0;
  }

  .grid {
    display: grid;
    grid-template-rows: repeat(3, minmax(96px, 1fr));
    gap: 18px;
  }

  .row {
    display: grid;
    gap: 18px;
  }

  .row {
    grid-template-columns: repeat(5, minmax(0, 1fr));
  }

  button {
    border: 2px solid rgba(255,255,255,.28);
    border-radius: 18px;
    background: linear-gradient(180deg, #2f8cff 0%, #0f5fd7 100%);
    color: #fff;
    font: 900 clamp(22px, 3vw, 42px)/1.05 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    letter-spacing: 0;
    text-shadow: 0 2px 3px rgba(0,0,0,.35);
    box-shadow: inset 0 -10px 0 rgba(0,0,0,.18), 0 10px 24px rgba(0,0,0,.30);
    touch-action: manipulation;
  }

  button:active,
  button.playing {
    transform: translateY(4px);
    box-shadow: inset 0 -4px 0 rgba(0,0,0,.16), 0 4px 14px rgba(0,0,0,.28);
  }

  .status {
    min-height: 26px;
    font-size: clamp(18px, 2vw, 24px);
    color: rgba(255,255,255,.82);
  }

  .diag {
    max-height: 150px;
    overflow: auto;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(0,0,0,.32);
    color: #d1fae5;
    font: 14px/1.3 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    white-space: pre-wrap;
    -webkit-overflow-scrolling: touch;
  }

  @media (max-width: 760px) {
    .hud {
      width: calc(100vw - 20px);
      min-height: calc(100vh - 20px);
      padding: 16px;
      gap: 14px;
    }

    .grid {
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .row {
      gap: 12px;
    }
  }
</style>
</head>
<body>
  <main class="hud">
    <h1>Sound Effects</h1>
    <section class="grid" aria-label="Sound effect buttons">
      <div class="row">
        <button data-sound="fart.mp3">FART</button>
        <button data-sound="burp.mp3">BURP</button>
        <button data-sound="chipmonk_laugh.mp3">LAUGH</button>
        <button data-sound="elephant.mp3">ELEPHANT</button>
        <button data-sound="wind.mp3">WIND</button>
      </div>
      <div class="row">
        <button data-sound="wolf_howl.mp3">WOLF</button>
        <button data-sound="baloon.mp3">BALOON</button>
        <button data-sound="mad_cat.mp3">MAD CAT</button>
        <button data-sound="jungle_birds.mp3">BIRDS</button>
        <button data-sound="monkey.mp3">MONKEY</button>
      </div>
      <div class="row">
        <button data-sound="train.mp3">TRAIN</button>
        <button data-sound="crickets.mp3">CRICKETS</button>
        <button data-sound="twang.mp3">TWANG</button>
        <button data-sound="elk.mp3">ELK</button>
        <button data-sound="loon.mp3">LOON</button>
      </div>
    </section>
    <div class="status" id="status">Tap a button to unlock and play sound.</div>
    <div class="diag" id="diag">Diagnostics loading...</div>
  </main>
  <script>
(function(){
  "use strict";

  const status = document.getElementById("status");
  const diag = document.getElementById("diag");
  const buttons = Array.from(document.querySelectorAll("[data-sound]"));
  const audioPool = new Map();
  let audioCtx = null;
  let unlocked = false;
  let lastTapAt = 0;
  let lastTapFile = "";
  let workingUrlIndex = null;

  function setStatus(text){
    if(status) status.textContent = text;
  }

  function writeDiag(lines){
    if(!diag) return;
    diag.textContent = Array.isArray(lines) ? lines.join("\n") : String(lines || "");
  }

  function appendDiag(line){
    if(!diag) return;
    diag.textContent += "\n" + line;
    diag.scrollTop = diag.scrollHeight;
  }

  function getProjectRootPath(){
    const parts = window.location.pathname.split("/").filter(Boolean);
    if(!parts.length) return "/";
    const last = parts[parts.length - 1] || "";
    if(!last.includes(".")) return "/" + parts[0] + "/";
    return parts.length > 1 ? "/" + parts[0] + "/" : "/";
  }

  function buildSoundUrls(file){
    return ["images/" + file];
  }

  function absoluteUrl(url){
    try{
      return new URL(url, window.location.href).href;
    }catch(e){
      return url;
    }
  }

  async function checkUrl(url){
    const abs = absoluteUrl(url);
    try{
      const res = await fetch(abs, { method: "GET", cache: "no-store" });
      return res.ok ? "OK " + res.status : "BAD " + res.status;
    }catch(e){
      return "FETCH ERR " + (e && e.name ? e.name : "error");
    }
  }

  function getAudio(file){
    let item = audioPool.get(file);
    if(!item){
      const urls = buildSoundUrls(file);
      const startIndex = Number.isInteger(workingUrlIndex) ? workingUrlIndex : 0;
      const audio = new Audio(urls[startIndex] || urls[0]);
      audio.preload = "auto";
      audio.playsInline = true;
      item = { audio, urls, index: startIndex };
      audioPool.set(file, item);
    }
    if(Number.isInteger(workingUrlIndex)){
      item.index = workingUrlIndex;
    }
    return item;
  }

  function getVolumeBoost(file){
    return file === "elk.mp3" ? 2 : 1;
  }

  function applyVolumeBoost(item, file){
    if(!audioCtx || !item || !item.audio) return;
    if(!item.gain){
      item.source = audioCtx.createMediaElementSource(item.audio);
      item.gain = audioCtx.createGain();
      item.source.connect(item.gain);
      item.gain.connect(audioCtx.destination);
    }
    item.gain.gain.value = getVolumeBoost(file);
  }

  function primeAudioElement(audio){
    if(!audio) return Promise.resolve();
    const wasMuted = audio.muted;
    audio.muted = true;
    audio.volume = 1;
    return audio.play().then(()=>{
      audio.pause();
      audio.currentTime = 0;
      audio.muted = wasMuted;
    }).catch(()=>{
      audio.muted = wasMuted;
    });
  }

  function unlockAudio(){
    if(unlocked) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC){
      if(!audioCtx) audioCtx = new AC();
      if(audioCtx.state === "suspended"){
        try{ audioCtx.resume().catch(()=>{}); }catch(e){}
      }
      try{
        const buffer = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
        const source = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        gain.gain.value = 0.0001;
        source.buffer = buffer;
        source.connect(gain);
        gain.connect(audioCtx.destination);
        source.start(0);
      }catch(e){}
    }
    unlocked = true;
  }

  function playSound(file, button){
    unlockAudio();
    const item = getAudio(file);
    const audio = item.audio;
    applyVolumeBoost(item, file);
    if(Number.isInteger(workingUrlIndex)){
      item.index = workingUrlIndex;
    }
    writeDiag([
      "page: " + window.location.href,
      "sound: " + file,
      "audioContext: " + (audioCtx ? audioCtx.state : "none"),
      "working index: " + (Number.isInteger(workingUrlIndex) ? String(workingUrlIndex + 1) : "unknown"),
      "candidates:"
    ].concat(item.urls.map((u, i)=> `${i + 1}. ${absoluteUrl(u)}`)));

    for(let attempt = 0; attempt < item.urls.length; attempt++){
      audio.src = item.urls[item.index];
      appendDiag("try: " + absoluteUrl(audio.src));

      try{
        audio.pause();
        audio.currentTime = 0;
        audio.muted = false;
        audio.volume = 1;
        const playPromise = audio.play();
        if(playPromise && typeof playPromise.then === "function"){
          playPromise.then(()=>{
            setStatus("Playing: " + file);
          }).catch((e)=>{
            appendDiag("play failed async: " + (e && e.name ? e.name : "error"));
            setStatus("Tap again: " + file);
          });
        }
        setStatus("Playing: " + file);
        button.classList.add("playing");
        window.setTimeout(()=> button.classList.remove("playing"), 180);
        return;
      }catch(e){
        appendDiag("play failed: " + (e && e.name ? e.name : "error"));
        item.index = (item.index + 1) % item.urls.length;
      }
    }

    setStatus("Could not find: " + file);
  }

  async function runStartupDiagnostics(){
    const first = buttons[0] ? buttons[0].getAttribute("data-sound") : "";
    if(!first){
      writeDiag("No sound buttons found.");
      return;
    }
    const urls = buildSoundUrls(first);
    writeDiag([
      "page: " + window.location.href,
      "protocol: " + window.location.protocol,
      "test file: " + first,
      "checking URLs..."
    ]);
    for(let i = 0; i < urls.length; i++){
      const result = await checkUrl(urls[i]);
      appendDiag(absoluteUrl(urls[i]) + " -> " + result);
      if(workingUrlIndex === null && result.startsWith("OK ")){
        workingUrlIndex = i;
        appendDiag("using candidate " + (i + 1) + " for playback");
        for(const item of audioPool.values()){
          item.index = workingUrlIndex;
        }
      }
    }
  }

  for(const button of buttons){
    const file = button.getAttribute("data-sound");
    getAudio(file);

    const press = (ev)=>{
      ev.preventDefault();
      const now = performance.now();
      if(file === lastTapFile && now - lastTapAt < 180) return;
      lastTapAt = now;
      lastTapFile = file;
      playSound(file, button);
    };

    button.addEventListener("pointerdown", press);
    button.addEventListener("touchstart", press, { passive:false });

    button.addEventListener("click", (ev)=>{
      ev.preventDefault();
    });
  }

  document.addEventListener("touchmove", (ev)=> ev.preventDefault(), { passive:false });
  runStartupDiagnostics();
})();

  </script>
</body>
</html>
