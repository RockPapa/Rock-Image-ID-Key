<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desert Image Test</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #222;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #container {
        text-align: center;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    img {
        max-width: 100%;
        max-height: 100%;
        border: 3px solid #00ff00;
        box-sizing: border-box;
    }

    #info {
        margin-top: 10px;
        font-size: 14px;
        color: #9f9;
    }
</style>
</head>

<body>

<div id="container">
    <img id="desertImg" src="images/desert.png" alt="Desert Image">
    <div id="info">Loading image…</div>
</div>

<script>
    const img = document.getElementById("desertImg");
    const info = document.getElementById("info");

    img.onload = () => {
        info.textContent =
            `Natural size: ${img.naturalWidth} × ${img.naturalHeight}px`;
        console.log("Desert image loaded");
        console.log("Natural size:", img.naturalWidth, img.naturalHeight);
    };

    img.onerror = () => {
        info.textContent = "❌ FAILED TO LOAD images/desert.png";
        console.error("Failed to load images/desert.png");
    };
</script>

</body>
</html>
