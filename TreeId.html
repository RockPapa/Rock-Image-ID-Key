<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tree ID</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1d12 url("images/Screenshot 2026-06-17 at 3.35.19 PM.png") center / cover fixed no-repeat;
      color: #162316;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 18, 10, 0.28), rgba(8, 18, 10, 0.48));
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 18px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 30px;
      line-height: 1.1;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
    }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(4px);
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 700;
    }

    label:first-child {
      margin-top: 0;
    }

    select, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #aebdae;
      font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      margin-top: 18px;
      border: 0;
      background: #236b38;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    #result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 6px;
      background: #f4faf4;
      border: 1px solid #d8e7d8;
      min-height: 48px;
    }

    @media (max-width: 430px) {
      main {
        padding: 12px;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 10px;
      }

      .panel {
        padding: 12px;
      }

      label {
        margin-top: 10px;
        font-size: 14px;
      }

      select, button {
        min-height: 42px;
        padding: 8px 10px;
      }

      button {
        margin-top: 14px;
      }

      #result {
        margin-top: 12px;
        padding: 11px;
        min-height: 42px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Tree ID</h1>

    <section class="panel">
      <label for="leafShape">Leaf shape</label>
      <select id="leafShape">
        <option value="">Choose one...</option>
        <option>Needles</option>
        <option>Simple broadleaf</option>
        <option>Compound leaf</option>
        <option>Lobed leaf</option>
      </select>

      <label for="bark">Bark</label>
      <select id="bark">
        <option value="">Choose one...</option>
        <option>Smooth</option>
        <option>Furrowed</option>
        <option>Peeling</option>
        <option>Scaly</option>
      </select>

      <label for="fruit">Fruit or seed</label>
      <select id="fruit">
        <option value="">Choose one...</option>
        <option>Acorn</option>
        <option>Cone</option>
        <option>Berry</option>
        <option>Winged seed</option>
        <option>None seen</option>
      </select>

      <button id="identifyBtn" type="button">Identify Tree</button>
      <div id="result">Choose a few traits, then tap Identify Tree.</div>
    </section>
  </main>

  <script>
    const result = document.getElementById("result");
    const identifyBtn = document.getElementById("identifyBtn");

    identifyBtn.addEventListener("click", () => {
      const leafShape = document.getElementById("leafShape").value;
      const bark = document.getElementById("bark").value;
      const fruit = document.getElementById("fruit").value;

      if (!leafShape && !bark && !fruit) {
        result.textContent = "Pick at least one trait to begin.";
        return;
      }

      result.textContent = "Starter app ready. Next step: add a tree database and matching rules.";
    });
  </script>
</body>
</html>
