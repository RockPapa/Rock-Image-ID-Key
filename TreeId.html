<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tree ID</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      --visible-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1d12 url("images/background.png") center / cover fixed no-repeat;
      color: #162316;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 18, 10, 0.28), rgba(8, 18, 10, 0.48));
      pointer-events: none;
    }

    body.show-app #startPage {
      display: none;
    }

    body:not(.show-app) main {
      display: none;
    }

    body:not(.show-app)::before {
      display: none;
    }

    #startPage {
      position: fixed;
      inset: 0;
      z-index: 5;
      background: #276cf2;
      overflow: hidden;
      min-height: 100vh;
      min-height: 100dvh;
    }

    #startPage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: top center;
      pointer-events: none;
    }

    #beginBtn {
      position: absolute;
      z-index: 2;
      left: 12%;
      right: 12%;
      top: 55%;
      height: 9%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #beginBtn:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
      border-radius: 4px;
    }

    .choiceBtn {
      position: absolute;
      z-index: 2;
      left: 6%;
      right: 6%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    .choiceBtn:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
      border-radius: 6px;
    }

    #evergreenBtn {
      top: 17%;
      height: 13%;
    }

    #oppositeBtn {
      top: 34%;
      height: 22%;
    }

    #alternateBtn {
      top: 62%;
      height: 19%;
    }

    #needleEvergreenBtn {
      top: 22%;
      height: 36%;
    }

    #broadEvergreenBtn {
      top: 62%;
      height: 28%;
    }

    #pinesBtn {
      top: 10%;
      height: 11%;
    }

    #redcedarBtn {
      top: 24%;
      height: 12%;
    }

    #spruceBtn {
      top: 39%;
      height: 12%;
    }

    #firBtn {
      top: 52%;
      height: 12%;
    }

    #hemlockBtn {
      top: 67%;
      height: 12%;
    }

    .specimenOverlayBtn {
      background: transparent;
      border: 0;
      color: transparent;
    }

    .specimenOverlayBtn::after {
      content: none;
    }

    #backBtn {
      position: absolute;
      z-index: 3;
      left: max(6px, env(safe-area-inset-left));
      top: max(6px, env(safe-area-inset-top));
      width: 38px;
      min-height: 38px;
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font: 900 28px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 18px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 30px;
      line-height: 1.1;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
    }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(4px);
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 700;
    }

    label:first-child {
      margin-top: 0;
    }

    select, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #aebdae;
      font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      margin-top: 18px;
      border: 0;
      background: #236b38;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    #result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 6px;
      background: #f4faf4;
      border: 1px solid #d8e7d8;
      min-height: 48px;
    }

    @media (max-width: 430px) {
      #startPage {
        bottom: auto;
        height: calc(var(--visible-height) - 32px);
        min-height: 0;
      }

      #startPage img {
        height: calc(var(--visible-height) - 32px);
        object-fit: contain;
        object-position: center top;
      }

      main {
        padding: 12px;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 10px;
      }

      .panel {
        padding: 12px;
      }

      label {
        margin-top: 10px;
        font-size: 14px;
      }

      select, button {
        min-height: 42px;
        padding: 8px 10px;
      }

      button {
        margin-top: 14px;
      }

      #result {
        margin-top: 12px;
        padding: 11px;
        min-height: 42px;
      }
    }
  </style>
</head>
<body>
  <div id="startPage" aria-label="Tree ID introduction">
    <img id="startPageImage" src="images/page1.png" alt="Tree ID introduction">
    <button id="beginBtn" type="button" aria-label="Let's begin">Let's begin</button>
    <button id="backBtn" type="button" aria-label="Back">‹</button>
    <button id="evergreenBtn" class="choiceBtn" type="button" aria-label="Tree is evergreen">Tree is evergreen</button>
    <button id="oppositeBtn" class="choiceBtn" type="button" aria-label="Leaves and twigs are opposite">Leaves and twigs are opposite</button>
    <button id="alternateBtn" class="choiceBtn" type="button" aria-label="Leaves and twigs are alternate">Leaves and twigs are alternate</button>
    <button id="needleEvergreenBtn" class="choiceBtn" type="button" aria-label="Trees with needles or scale-like leaves">Trees with needles or scale-like leaves</button>
    <button id="broadEvergreenBtn" class="choiceBtn" type="button" aria-label="Trees with broad evergreen leaves">Trees with broad evergreen leaves</button>
    <button id="pinesBtn" class="choiceBtn" type="button" aria-label="Pines">Pines</button>
    <button id="redcedarBtn" class="choiceBtn" type="button" aria-label="Eastern redcedar">Eastern redcedar</button>
    <button id="spruceBtn" class="choiceBtn" type="button" aria-label="Spruce">Spruce</button>
    <button id="firBtn" class="choiceBtn" type="button" aria-label="Fir">Fir</button>
    <button id="hemlockBtn" class="choiceBtn" type="button" aria-label="Hemlock">Hemlock</button>
    <button id="redcedarNeedlesBtn" class="choiceBtn specimenOverlayBtn" type="button" aria-label="Open redcedar needle image">Open redcedar needle image</button>
    <button id="spruceNeedlesBtn" class="choiceBtn specimenOverlayBtn" type="button" aria-label="Open spruce needle image">Open spruce needle image</button>
    <button id="firNeedlesBtn" class="choiceBtn specimenOverlayBtn" type="button" aria-label="Open fir needle image">Open fir needle image</button>
    <button id="hemlockNeedlesBtn" class="choiceBtn specimenOverlayBtn" type="button" aria-label="Open hemlock needle image">Open hemlock needle image</button>
  </div>

  <main>
    <h1>Tree ID</h1>

    <section class="panel">
      <label for="leafShape">Leaf shape</label>
      <select id="leafShape">
        <option value="">Choose one...</option>
        <option>Needles</option>
        <option>Simple broadleaf</option>
        <option>Compound leaf</option>
        <option>Lobed leaf</option>
      </select>

      <label for="bark">Bark</label>
      <select id="bark">
        <option value="">Choose one...</option>
        <option>Smooth</option>
        <option>Furrowed</option>
        <option>Peeling</option>
        <option>Scaly</option>
      </select>

      <label for="fruit">Fruit or seed</label>
      <select id="fruit">
        <option value="">Choose one...</option>
        <option>Acorn</option>
        <option>Cone</option>
        <option>Berry</option>
        <option>Winged seed</option>
        <option>None seen</option>
      </select>

      <button id="identifyBtn" type="button">Identify Tree</button>
      <div id="result">Choose a few traits, then tap Identify Tree.</div>
    </section>
  </main>

  <script>
    const result = document.getElementById("result");
    const identifyBtn = document.getElementById("identifyBtn");
    const beginBtn = document.getElementById("beginBtn");
    const backBtn = document.getElementById("backBtn");
    const startPage = document.getElementById("startPage");
    const startPageImage = document.getElementById("startPageImage");
    const choiceButtons = [
      document.getElementById("evergreenBtn"),
      document.getElementById("oppositeBtn"),
      document.getElementById("alternateBtn"),
      document.getElementById("needleEvergreenBtn"),
      document.getElementById("broadEvergreenBtn"),
      document.getElementById("pinesBtn"),
      document.getElementById("redcedarBtn"),
      document.getElementById("spruceBtn"),
      document.getElementById("firBtn"),
      document.getElementById("hemlockBtn"),
      document.getElementById("redcedarNeedlesBtn"),
      document.getElementById("spruceNeedlesBtn"),
      document.getElementById("firNeedlesBtn"),
      document.getElementById("hemlockNeedlesBtn")
    ];
    let currentIntroPage = 1;
    const specimenOverlayPosition = { x: 0.58, y: 0.29, width: 0.35, height: 0.23 };

    const overlayPositions = {
      1: [
        { btn: beginBtn, x: 0.12, y: 0.55, width: 0.76, height: 0.09 }
      ],
      2: [
        { btn: document.getElementById("evergreenBtn"), x: 0.06, y: 0.17, width: 0.88, height: 0.13 },
        { btn: document.getElementById("oppositeBtn"), x: 0.06, y: 0.34, width: 0.88, height: 0.22 },
        { btn: document.getElementById("alternateBtn"), x: 0.06, y: 0.62, width: 0.88, height: 0.19 }
      ],
      3: [
        { btn: document.getElementById("needleEvergreenBtn"), x: 0.06, y: 0.22, width: 0.88, height: 0.36 },
        { btn: document.getElementById("broadEvergreenBtn"), x: 0.06, y: 0.62, width: 0.88, height: 0.28 }
      ],
      evergreen: [
        { btn: document.getElementById("pinesBtn"), x: 0.06, y: 0.10, width: 0.88, height: 0.11 },
        { btn: document.getElementById("redcedarBtn"), x: 0.06, y: 0.24, width: 0.88, height: 0.12 },
        { btn: document.getElementById("spruceBtn"), x: 0.06, y: 0.39, width: 0.88, height: 0.12 },
        { btn: document.getElementById("firBtn"), x: 0.06, y: 0.52, width: 0.88, height: 0.12 },
        { btn: document.getElementById("hemlockBtn"), x: 0.06, y: 0.67, width: 0.88, height: 0.12 }
      ],
      redcedar: [
        { btn: document.getElementById("redcedarNeedlesBtn"), ...specimenOverlayPosition }
      ],
      spruce: [
        { btn: document.getElementById("spruceNeedlesBtn"), ...specimenOverlayPosition }
      ],
      fir: [
        { btn: document.getElementById("firNeedlesBtn"), ...specimenOverlayPosition }
      ],
      hemlock: [
        { btn: document.getElementById("hemlockNeedlesBtn"), ...specimenOverlayPosition }
      ]
    };

    function updateVisibleHeight() {
      const height = Math.round(window.visualViewport?.height || window.innerHeight);
      document.documentElement.style.setProperty("--visible-height", `${height}px`);
    }

    updateVisibleHeight();
    window.addEventListener("resize", () => {
      updateVisibleHeight();
      positionCurrentOverlays();
    });
    window.visualViewport?.addEventListener("resize", () => {
      updateVisibleHeight();
      positionCurrentOverlays();
    });
    startPageImage.addEventListener("load", positionCurrentOverlays);
    positionCurrentOverlays();

    function getDisplayedImageRect() {
      if (!startPageImage.naturalWidth || !startPageImage.naturalHeight) {
        return null;
      }

      const imageElementRect = startPageImage.getBoundingClientRect();
      const startPageRect = startPage.getBoundingClientRect();
      const scale = Math.min(
        imageElementRect.width / startPageImage.naturalWidth,
        imageElementRect.height / startPageImage.naturalHeight
      );
      const width = startPageImage.naturalWidth * scale;
      const height = startPageImage.naturalHeight * scale;

      return {
        left: imageElementRect.left - startPageRect.left + (imageElementRect.width - width) / 2,
        top: imageElementRect.top - startPageRect.top,
        width,
        height
      };
    }

    function positionButtonOverImage(btn, position, imageRect) {
      btn.style.left = `${imageRect.left + imageRect.width * position.x}px`;
      btn.style.top = `${imageRect.top + imageRect.height * position.y}px`;
      btn.style.width = `${imageRect.width * position.width}px`;
      btn.style.height = `${imageRect.height * position.height}px`;
      btn.style.right = "auto";
    }

    function positionCurrentOverlays() {
      const imageRect = getDisplayedImageRect();
      const positions = overlayPositions[currentIntroPage];

      if (!imageRect || !positions) {
        return;
      }

      for (const position of positions) {
        positionButtonOverImage(position.btn, position, imageRect);
      }
    }

    function showChoiceButtons(show) {
      for (const btn of choiceButtons) {
        btn.style.display = show ? "block" : "none";
      }
    }

    function showIntroPage(pageNumber, altText) {
      currentIntroPage = pageNumber;
      startPageImage.src = `images/page${pageNumber}.png`;
      startPageImage.alt = altText;
      beginBtn.style.display = pageNumber === 1 ? "block" : "none";
      backBtn.style.display = pageNumber === 1 ? "none" : "block";
      showChoiceButtons(false);
      document.getElementById("evergreenBtn").style.display = pageNumber === 2 ? "block" : "none";
      document.getElementById("oppositeBtn").style.display = pageNumber === 2 ? "block" : "none";
      document.getElementById("alternateBtn").style.display = pageNumber === 2 ? "block" : "none";
      document.getElementById("needleEvergreenBtn").style.display = pageNumber === 3 ? "block" : "none";
      document.getElementById("broadEvergreenBtn").style.display = pageNumber === 3 ? "block" : "none";
      document.getElementById("pinesBtn").style.display = "none";
      document.getElementById("redcedarBtn").style.display = "none";
      document.getElementById("spruceBtn").style.display = "none";
      document.getElementById("firBtn").style.display = "none";
      document.getElementById("hemlockBtn").style.display = "none";
      document.getElementById("redcedarNeedlesBtn").style.display = "none";
      document.getElementById("spruceNeedlesBtn").style.display = "none";
      document.getElementById("firNeedlesBtn").style.display = "none";
      document.getElementById("hemlockNeedlesBtn").style.display = "none";
      positionCurrentOverlays();
    }

    function showIntroImage(pageKey, imageSrc, altText) {
      currentIntroPage = pageKey;
      startPageImage.src = imageSrc;
      startPageImage.alt = altText;
      beginBtn.style.display = "none";
      backBtn.style.display = "block";
      showChoiceButtons(false);
      document.getElementById("pinesBtn").style.display = pageKey === "evergreen" ? "block" : "none";
      document.getElementById("redcedarBtn").style.display = pageKey === "evergreen" ? "block" : "none";
      document.getElementById("spruceBtn").style.display = pageKey === "evergreen" ? "block" : "none";
      document.getElementById("firBtn").style.display = pageKey === "evergreen" ? "block" : "none";
      document.getElementById("hemlockBtn").style.display = pageKey === "evergreen" ? "block" : "none";
      document.getElementById("redcedarNeedlesBtn").style.display = pageKey === "redcedar" ? "block" : "none";
      document.getElementById("spruceNeedlesBtn").style.display = pageKey === "spruce" ? "block" : "none";
      document.getElementById("firNeedlesBtn").style.display = pageKey === "fir" ? "block" : "none";
      document.getElementById("hemlockNeedlesBtn").style.display = pageKey === "hemlock" ? "block" : "none";
      positionCurrentOverlays();
    }

    beginBtn.addEventListener("click", () => {
      showIntroPage(2, "Tree ID page 2");
    });

    startPage.addEventListener("click", (event) => {
      if (currentIntroPage === 1 && event.target === startPage) {
        showIntroPage(2, "Tree ID page 2");
      }
    });

    backBtn.addEventListener("click", () => {
      if (currentIntroPage === 2) {
        showIntroPage(1, "Tree ID introduction");
      } else if (currentIntroPage === "redcedarNeedles") {
        showIntroImage("redcedar", "images/redcedar.jpg", "Eastern redcedar");
      } else if (currentIntroPage === "spruceNeedles") {
        showIntroImage("spruce", "images/red_spruce.jpg", "Red spruce");
      } else if (currentIntroPage === "firNeedles") {
        showIntroImage("fir", "images/fraser_fir.jpg", "Fraser fir");
      } else if (currentIntroPage === "hemlockNeedles") {
        showIntroImage("hemlock", "images/eastern_hemlock.jpg", "Eastern hemlock");
      } else if (currentIntroPage === "pines" || currentIntroPage === "redcedar" || currentIntroPage === "spruce" || currentIntroPage === "fir" || currentIntroPage === "hemlock") {
        showIntroImage("evergreen", "images/evergreen.png", "Evergreen tree choices");
      } else if (currentIntroPage === "evergreen" || currentIntroPage === "broadleafEvergreen" || currentIntroPage === 6 || currentIntroPage === 7) {
        showIntroPage(3, "Tree ID evergreen page");
      } else {
        showIntroPage(2, "Tree ID page 2");
      }
    });

    document.getElementById("evergreenBtn").addEventListener("click", () => {
      showIntroPage(3, "Tree ID evergreen page");
    });

    document.getElementById("oppositeBtn").addEventListener("click", () => {
      showIntroPage(4, "Tree ID opposite leaves page");
    });

    document.getElementById("alternateBtn").addEventListener("click", () => {
      showIntroPage(5, "Tree ID alternate leaves page");
    });

    document.getElementById("needleEvergreenBtn").addEventListener("click", () => {
      showIntroImage("evergreen", "images/evergreen.png", "Evergreen tree choices");
    });

    document.getElementById("pinesBtn").addEventListener("click", () => {
      showIntroImage("pines", "images/pines.png", "Pines");
    });

    document.getElementById("redcedarBtn").addEventListener("click", () => {
      showIntroImage("redcedar", "images/redcedar.jpg", "Eastern redcedar");
    });

    document.getElementById("spruceBtn").addEventListener("click", () => {
      showIntroImage("spruce", "images/red_spruce.jpg", "Red spruce");
    });

    document.getElementById("firBtn").addEventListener("click", () => {
      showIntroImage("fir", "images/fraser_fir.jpg", "Fraser fir");
    });

    document.getElementById("hemlockBtn").addEventListener("click", () => {
      showIntroImage("hemlock", "images/eastern_hemlock.jpg", "Eastern hemlock");
    });

    document.getElementById("redcedarNeedlesBtn").addEventListener("click", () => {
      showIntroImage("redcedarNeedles", "images/place_holder.png", "Redcedar needle placeholder image");
    });

    document.getElementById("spruceNeedlesBtn").addEventListener("click", () => {
      showIntroImage("spruceNeedles", "images/place_holder.png", "Spruce needle placeholder image");
    });

    document.getElementById("firNeedlesBtn").addEventListener("click", () => {
      showIntroImage("firNeedles", "images/place_holder.png", "Fir needle placeholder image");
    });

    document.getElementById("hemlockNeedlesBtn").addEventListener("click", () => {
      showIntroImage("hemlockNeedles", "images/place_holder.png", "Hemlock needle placeholder image");
    });

    document.getElementById("broadEvergreenBtn").addEventListener("click", () => {
      showIntroImage("broadleafEvergreen", "images/broadleaf_evergreen.png", "Broadleaf evergreen choices");
    });

    identifyBtn.addEventListener("click", () => {
      const leafShape = document.getElementById("leafShape").value;
      const bark = document.getElementById("bark").value;
      const fruit = document.getElementById("fruit").value;

      if (!leafShape && !bark && !fruit) {
        result.textContent = "Pick at least one trait to begin.";
        return;
      }

      result.textContent = "Starter app ready. Next step: add a tree database and matching rules.";
    });
  </script>
</body>
</html>
