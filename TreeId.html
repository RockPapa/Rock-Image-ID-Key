<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tree ID</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      --visible-height: 100dvh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1d12 url("treeid/background.png") center / cover fixed no-repeat;
      color: #162316;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 18, 10, 0.28), rgba(8, 18, 10, 0.48));
      pointer-events: none;
    }

    body.show-app #startPage {
      display: none;
    }

    body:not(.show-app) main {
      display: none;
    }

    body:not(.show-app)::before {
      display: none;
    }

    #startPage {
      position: fixed;
      top: 0;
      right: 0;
      bottom: auto;
      left: 0;
      z-index: 5;
      background: #276cf2;
      overflow: hidden;
      height: var(--visible-height);
      min-height: 0;
    }

    @supports not (height: 100dvh) {
      html, body {
        --visible-height: 100vh;
      }
    }

    #startPage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center center;
      pointer-events: none;
    }

    body.computer-platform #startPage img {
      object-fit: contain;
    }

    #startPage.placeholderPage img {
      height: calc(100% - 48px);
      object-fit: contain;
      transform: translateY(48px);
    }

    #beginBtn {
      position: absolute;
      z-index: 2;
      left: 12%;
      right: 12%;
      top: 55%;
      height: 9%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #beginBtn:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
      border-radius: 4px;
    }

    #wikiLink {
      position: absolute;
      z-index: 3;
      left: 50%;
      bottom: max(8px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: none;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(0, 35, 105, 0.72);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.2;
      text-decoration: none;
      letter-spacing: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    #wikiLink:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 3px;
    }

    .choiceBtn {
      position: absolute;
      z-index: 2;
      left: 6%;
      right: 6%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    .choiceBtn:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
      border-radius: 6px;
    }

    #evergreenBtn {
      top: 17%;
      height: 13%;
    }

    #oppositeBtn {
      top: 34%;
      height: 22%;
    }

    #alternateBtn {
      top: 62%;
      height: 19%;
    }

    #needleEvergreenBtn {
      top: 22%;
      height: 36%;
    }

    #broadEvergreenBtn {
      top: 62%;
      height: 28%;
    }

    #pinesBtn {
      top: 10%;
      height: 11%;
    }

    #redcedarBtn {
      top: 24%;
      height: 12%;
    }

    #spruceBtn {
      top: 39%;
      height: 12%;
    }

    #firBtn {
      top: 52%;
      height: 12%;
    }

    #hemlockBtn {
      top: 67%;
      height: 12%;
    }

    .specimenOverlayBtn {
      background: transparent;
      border: 0;
      color: transparent;
    }

    .specimenOverlayBtn::after {
      content: none;
    }

    #backBtn {
      position: absolute;
      z-index: 10;
      left: max(6px, env(safe-area-inset-left));
      top: max(6px, env(safe-area-inset-top));
      width: 38px;
      min-height: 38px;
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font: 900 28px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 18px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 30px;
      line-height: 1.1;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
    }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(4px);
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 700;
    }

    label:first-child {
      margin-top: 0;
    }

    select, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #aebdae;
      font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      margin-top: 18px;
      border: 0;
      background: #236b38;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    #result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 6px;
      background: #f4faf4;
      border: 1px solid #d8e7d8;
      min-height: 48px;
    }

    @media (pointer: coarse), (max-width: 430px) {
      #startPage {
        height: calc(var(--visible-height) - env(safe-area-inset-bottom));
      }

      #startPage img {
        height: calc(var(--visible-height) - env(safe-area-inset-bottom));
        object-fit: contain;
        object-position: center center;
      }

      body.computer-platform #startPage img {
        object-fit: contain;
      }

      #startPage.placeholderPage img {
        height: calc(var(--visible-height) - env(safe-area-inset-bottom) - 48px);
        object-fit: contain;
        transform: translateY(48px);
      }

      main {
        padding: 12px;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 10px;
      }

      .panel {
        padding: 12px;
      }

      label {
        margin-top: 10px;
        font-size: 14px;
      }

      select, button {
        min-height: 42px;
        padding: 8px 10px;
      }

      button {
        margin-top: 14px;
      }

      #result {
        margin-top: 12px;
        padding: 11px;
        min-height: 42px;
      }
    }
  </style>
</head>

    <a id="wikiLink" href="#" target="_blank" rel="noopener noreferrer">Wikipedia</a>
  </div>

  <main>

        <option>Needles</option>

        <option>Compound leaf</option>
        <option>Lobed leaf</option>
      </select>

      <label for="bark">Bark</label>
      <select id="bark">
        <option value="">Choose one...</option>
        <option>Smooth</option>
        <option>Furrowed</option>
        <option>Peeling</option>
        <option>Scaly</option>
      </select>

      <label for="fruit">Fruit or seed</label>

        <option value="">Choose one...</option>
        <option>Acorn</option>
        <option>Cone</option>
        <option>Berry</option>
        <option>Winged seed</option>

      </select>

      <button id="identifyBtn" type="button">Identify Tree</button>
      <div id="result">Choose a few traits, then tap Identify Tree.</div>
    </section>
  </main>

    function updateVisibleHeight() {
      const viewportHeight = window.visualViewport?.height || window.innerHeight;
      const height = Math.round(Math.min(viewportHeight, window.innerHeight));
      document.documentElement.style.setProperty("--visible-height", `${height}px`);
    }

    updateVisibleHeight();
    window.addEventListener("resize", () => {
      updateVisibleHeight();
      updatePlatformClass();
    });
    window.addEventListener("orientationchange", () => {
      window.setTimeout(() => {
        updateVisibleHeight();
        positionCurrentOverlays();
      }, 250);
    });
    window.visualViewport?.addEventListener("resize", () => {
      updateVisibleHeight();

    function getDisplayedImageRect() {
      if (!startPageImage.naturalWidth || !startPageImage.naturalHeight) {
        return null;
      }

      const imageElementRect = startPageImage.getBoundingClientRect();
      const startPageRect = startPage.getBoundingClientRect();
      const objectFit = getComputedStyle(startPageImage).objectFit;
      const scale = objectFit === "cover" ? Math.max(
        imageElementRect.width / startPageImage.naturalWidth,
        imageElementRect.height / startPageImage.naturalHeight
      ) : Math.min(
        imageElementRect.width / startPageImage.naturalWidth,
        imageElementRect.height / startPageImage.naturalHeight
      );
      const width = startPageImage.naturalWidth * scale;
      const height = startPageImage.naturalHeight * scale;

      return {
        left: imageElementRect.left - startPageRect.left + (imageElementRect.width - width) / 2,
        top: imageElementRect.top - startPageRect.top + (imageElementRect.height - height) / 2,
        width,
        height
      };
    }

    function positionButtonOverImage(btn, position, imageRect) {
      btn.style.left = `${imageRect.left + imageRect.width * position.x}px`;
      btn.style.top = `${imageRect.top + imageRect.height * position.y}px`;
      btn.style.width = `${imageRect.width * position.width}px`;
      btn.style.height = `${imageRect.height * position.height}px`;
      btn.style.right = "auto";
    }

    function positionCurrentOverlays() {
      const imageRect = getDisplayedImageRect();
      const positions = overlayPositions[currentIntroPage];

      if (!imageRect || !positions) {
        return;
      }

      for (const position of positions) {
        positionButtonOverImage(position.btn, position, imageRect);
      }
    }

    document.getElementById("broadleafBlueSquareBtn").addEventListener("click", () => {
      lastBroadleafSpeciesPage = broadleafSpecies.find(({ pageKey }) => pageKey === currentIntroPage) || lastBroadleafSpeciesPage;
      if (lastBroadleafSpeciesPage?.pageKey === "carolinaLaurelcherry") {
        showIntroImage("broadleafBlueSquare", "treeid/carolina_laurelcherry_pix.png", "Carolina laurel-cherry detail image");
      } else if (lastBroadleafSpeciesPage?.pageKey === "southernMagnolia") {
        showIntroImage("broadleafBlueSquare", "treeid/southern_magnolia_pix.png", "Southern magnolia detail image");
      } else if (lastBroadleafSpeciesPage?.pageKey === "sweetbayMagnolia") {
        showIntroImage("broadleafBlueSquare", "treeid/sweetbay_magnolia_pix.png", "Sweetbay magnolia detail image");
      } else if (lastBroadleafSpeciesPage?.pageKey === "redbay") {
        showIntroImage("broadleafBlueSquare", "treeid/redbay_pix.png", "Red bay detail image");
      } else if (lastBroadleafSpeciesPage?.pageKey === "liveOak") {
        showIntroImage("broadleafBlueSquare", "treeid/live_oak_pix.png", "Live oak detail image");
      } else {
        showIntroImage("broadleafBlueSquare", "treeid/place_holder.png", "Broadleaf detail placeholder image");
      }
    });

    document.getElementById("redcedarBtn").addEventListener("click", () => {
      showIntroImage("redcedar", "treeid/redcedar.jpg", "Eastern redcedar");
    });

    document.getElementById("spruceBtn").addEventListener("click", () => {
      showIntroImage("spruce", "treeid/red_spruce.jpg", "Red spruce");
    });

    document.getElementById("firBtn").addEventListener("click", () => {
      showIntroImage("fir", "treeid/fraser_fir.jpg", "Fraser fir");
    });

    document.getElementById("hemlockBtn").addEventListener("click", () => {
      showIntroImage("hemlock", "treeid/eastern_hemlock.jpg", "Eastern hemlock");
    });

    document.getElementById("redcedarNeedlesBtn").addEventListener("click", () => {
      showIntroImage("redcedarNeedles", "treeid/redcedar_pix.png", "Eastern redcedar detail image");
    });

    document.getElementById("spruceNeedlesBtn").addEventListener("click", () => {
      showIntroImage("spruceNeedles", "treeid/red_spruce_pix.png", "Red spruce detail image");
    });

    document.getElementById("firNeedlesBtn").addEventListener("click", () => {
      showIntroImage("firNeedles", "treeid/fraser_fir_pix.png", "Fraser fir detail image");
    });

    document.getElementById("hemlockNeedlesBtn").addEventListener("click", () => {
      showIntroImage("hemlockNeedles", "treeid/eastern_hemlock_pix.png", "Eastern hemlock detail image");
    });

    document.getElementById("broadEvergreenBtn").addEventListener("click", () => {
      showIntroImage("broadleafEvergreen", "treeid/broadleaf_evergreen.png", "Broadleaf evergreen choices");
    });

    identifyBtn.addEventListener("click", () => {
      const leafShape = document.getElementById("leafShape").value;
      const bark = document.getElementById("bark").value;
      const fruit = document.getElementById("fruit").value;

      if (!leafShape && !bark && !fruit) {
        result.textContent = "Pick at least one trait to begin.";
        return;
      }

      result.textContent = "Starter app ready. Next step: add a tree database and matching rules.";
    });
  </script>
</body>
</html>
