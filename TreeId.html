<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tree ID</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1d12 url("images/background.png") center / cover fixed no-repeat;
      color: #162316;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 18, 10, 0.28), rgba(8, 18, 10, 0.48));
      pointer-events: none;
    }

    body.show-app #startPage {
      display: none;
    }

    body:not(.show-app) main {
      display: none;
    }

    body:not(.show-app)::before {
      display: none;
    }

    #startPage {
      position: fixed;
      inset: 0;
      z-index: 5;
      background: #276cf2;
      overflow: hidden;
      min-height: 100vh;
      min-height: 100dvh;
    }

    #startPage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: top center;
      pointer-events: none;
    }

    #beginBtn {
      position: absolute;
      z-index: 2;
      left: 12%;
      right: 12%;
      top: 55%;
      height: 9%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #beginBtn:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
      border-radius: 4px;
    }

    .choiceBtn {
      position: absolute;
      z-index: 2;
      left: 6%;
      right: 6%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    .choiceBtn:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
      border-radius: 6px;
    }

    #evergreenBtn {
      top: 17%;
      height: 13%;
    }

    #oppositeBtn {
      top: 34%;
      height: 22%;
    }

    #alternateBtn {
      top: 62%;
      height: 19%;
    }

    #needleEvergreenBtn {
      top: 22%;
      height: 36%;
    }

    #broadEvergreenBtn {
      top: 62%;
      height: 28%;
    }

    #backBtn {
      position: absolute;
      z-index: 3;
      left: 18px;
      top: max(6px, env(safe-area-inset-top));
      width: auto;
      min-height: 40px;
      margin: 0;
      padding: 8px 14px;
      border: 0;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font: 800 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 18px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 30px;
      line-height: 1.1;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
    }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(4px);
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 700;
    }

    label:first-child {
      margin-top: 0;
    }

    select, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #aebdae;
      font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      margin-top: 18px;
      border: 0;
      background: #236b38;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    #result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 6px;
      background: #f4faf4;
      border: 1px solid #d8e7d8;
      min-height: 48px;
    }

    @media (max-width: 430px) {
      #startPage img {
        height: 90vh;
        height: 90dvh;
        object-fit: cover;
        object-position: center top;
      }

      main {
        padding: 12px;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 10px;
      }

      .panel {
        padding: 12px;
      }

      label {
        margin-top: 10px;
        font-size: 14px;
      }

      select, button {
        min-height: 42px;
        padding: 8px 10px;
      }

      button {
        margin-top: 14px;
      }

      #result {
        margin-top: 12px;
        padding: 11px;
        min-height: 42px;
      }
    }
  </style>
</head>
<body>
  <div id="startPage" aria-label="Tree ID introduction">
    <img id="startPageImage" src="images/page1.png" alt="Tree ID introduction">
    <button id="beginBtn" type="button" aria-label="Let's begin">Let's begin</button>
    <button id="backBtn" type="button" aria-label="Back">Back</button>
    <button id="evergreenBtn" class="choiceBtn" type="button" aria-label="Tree is evergreen">Tree is evergreen</button>
    <button id="oppositeBtn" class="choiceBtn" type="button" aria-label="Leaves and twigs are opposite">Leaves and twigs are opposite</button>
    <button id="alternateBtn" class="choiceBtn" type="button" aria-label="Leaves and twigs are alternate">Leaves and twigs are alternate</button>
    <button id="needleEvergreenBtn" class="choiceBtn" type="button" aria-label="Trees with needles or scale-like leaves">Trees with needles or scale-like leaves</button>
    <button id="broadEvergreenBtn" class="choiceBtn" type="button" aria-label="Trees with broad evergreen leaves">Trees with broad evergreen leaves</button>
  </div>

  <main>
    <h1>Tree ID</h1>

    <section class="panel">
      <label for="leafShape">Leaf shape</label>
      <select id="leafShape">
        <option value="">Choose one...</option>
        <option>Needles</option>
        <option>Simple broadleaf</option>
        <option>Compound leaf</option>
        <option>Lobed leaf</option>
      </select>

      <label for="bark">Bark</label>
      <select id="bark">
        <option value="">Choose one...</option>
        <option>Smooth</option>
        <option>Furrowed</option>
        <option>Peeling</option>
        <option>Scaly</option>
      </select>

      <label for="fruit">Fruit or seed</label>
      <select id="fruit">
        <option value="">Choose one...</option>
        <option>Acorn</option>
        <option>Cone</option>
        <option>Berry</option>
        <option>Winged seed</option>
        <option>None seen</option>
      </select>

      <button id="identifyBtn" type="button">Identify Tree</button>
      <div id="result">Choose a few traits, then tap Identify Tree.</div>
    </section>
  </main>

  <script>
    const result = document.getElementById("result");
    const identifyBtn = document.getElementById("identifyBtn");
    const beginBtn = document.getElementById("beginBtn");
    const backBtn = document.getElementById("backBtn");
    const startPage = document.getElementById("startPage");
    const startPageImage = document.getElementById("startPageImage");
    const choiceButtons = [
      document.getElementById("evergreenBtn"),
      document.getElementById("oppositeBtn"),
      document.getElementById("alternateBtn"),
      document.getElementById("needleEvergreenBtn"),
      document.getElementById("broadEvergreenBtn")
    ];
    let currentIntroPage = 1;

    function showChoiceButtons(show) {
      for (const btn of choiceButtons) {
        btn.style.display = show ? "block" : "none";
      }
    }

    function showIntroPage(pageNumber, altText) {
      currentIntroPage = pageNumber;
      startPageImage.src = `images/page${pageNumber}.png`;
      startPageImage.alt = altText;
      beginBtn.style.display = pageNumber === 1 ? "block" : "none";
      backBtn.style.display = pageNumber === 1 ? "none" : "block";
      showChoiceButtons(false);
      document.getElementById("evergreenBtn").style.display = pageNumber === 2 ? "block" : "none";
      document.getElementById("oppositeBtn").style.display = pageNumber === 2 ? "block" : "none";
      document.getElementById("alternateBtn").style.display = pageNumber === 2 ? "block" : "none";
      document.getElementById("needleEvergreenBtn").style.display = pageNumber === 3 ? "block" : "none";
      document.getElementById("broadEvergreenBtn").style.display = pageNumber === 3 ? "block" : "none";
    }

    beginBtn.addEventListener("click", () => {
      showIntroPage(2, "Tree ID page 2");
    });

    startPage.addEventListener("click", (event) => {
      if (currentIntroPage === 1 && event.target === startPage) {
        showIntroPage(2, "Tree ID page 2");
      }
    });

    backBtn.addEventListener("click", () => {
      if (currentIntroPage === 2) {
        showIntroPage(1, "Tree ID introduction");
      } else if (currentIntroPage === 6 || currentIntroPage === 7) {
        showIntroPage(3, "Tree ID evergreen page");
      } else {
        showIntroPage(2, "Tree ID page 2");
      }
    });

    document.getElementById("evergreenBtn").addEventListener("click", () => {
      showIntroPage(3, "Tree ID evergreen page");
    });

    document.getElementById("oppositeBtn").addEventListener("click", () => {
      showIntroPage(4, "Tree ID opposite leaves page");
    });

    document.getElementById("alternateBtn").addEventListener("click", () => {
      showIntroPage(5, "Tree ID alternate leaves page");
    });

    document.getElementById("needleEvergreenBtn").addEventListener("click", () => {
      showIntroPage(6, "Tree ID needle evergreen page");
    });

    document.getElementById("broadEvergreenBtn").addEventListener("click", () => {
      showIntroPage(7, "Tree ID broad evergreen page");
    });

    identifyBtn.addEventListener("click", () => {
      const leafShape = document.getElementById("leafShape").value;
      const bark = document.getElementById("bark").value;
      const fruit = document.getElementById("fruit").value;

      if (!leafShape && !bark && !fruit) {
        result.textContent = "Pick at least one trait to begin.";
        return;
      }

      result.textContent = "Starter app ready. Next step: add a tree database and matching rules.";
    });
  </script>
</body>
</html>
