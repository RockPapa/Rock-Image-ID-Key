<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tree ID</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      --visible-height: 100dvh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1d12 image-set(url("treeid_fast/background.png.webp") type("image/webp"), url("treeid/background.png") type("image/png")) center / cover no-repeat;
      color: #162316;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 18, 10, 0.28), rgba(8, 18, 10, 0.48));
      pointer-events: none;
    }

    body.show-app #startPage {
      display: none;
    }

    body:not(.show-app) main {
      display: none;
    }

    body:not(.show-app)::before {
      display: none;
    }

    #startPage {
      position: fixed;
      top: 0;
      right: 0;
      bottom: auto;
      left: 0;
      z-index: 5;
      background: #276cf2;
      overflow: hidden;
      height: var(--visible-height);
      min-height: 0;
    }

    @supports not (height: 100dvh) {
      html, body {
        --visible-height: 100vh;
      }
    }

    #startPage img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center center;
      pointer-events: none;
    }

    body.computer-platform #startPage img {
      object-fit: contain;
    }

    #startPage.placeholderPage img {
      height: calc(100% - 48px);
      object-fit: contain;
      transform: translateY(48px);
    }

    #beginBtn {
      position: absolute;
      z-index: 2;
      left: 12%;
      right: 12%;
      top: 55%;
      height: 9%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #beginBtn:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
      border-radius: 4px;
    }

    #wikiLink {
      position: absolute;
      z-index: 3;
      left: 50%;
      bottom: max(8px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: none;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(0, 35, 105, 0.72);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.2;
      text-decoration: none;
      letter-spacing: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    #wikiLink:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 3px;
    }

    .choiceBtn {
      position: absolute;
      z-index: 2;
      left: 6%;
      right: 6%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    .choiceBtn:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
      border-radius: 6px;
    }

    #evergreenBtn {

    }

    #alternateBtn {

    #pinesBtn {

      height: 12%;

    #spruceBtn {

    #firBtn {

      height: 12%;

    .specimenOverlayBtn {
      background: transparent;
      border: 0;
      color: transparent;
    }

    .specimenOverlayBtn::after {
      content: none;
    }

    #backBtn {
      position: absolute;
      z-index: 10;
      left: max(6px, env(safe-area-inset-left));
      top: max(6px, env(safe-area-inset-top));
      width: 38px;
      min-height: 38px;

      padding: 0;
      border: 0;
      border-radius: 999px;

      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 18px;
      box-sizing: border-box;
    }

      font-size: 30px;
      line-height: 1.1;
      color: #fff;

      border-radius: 8px;
      padding: 16px;

      border-radius: 6px;
      border: 1px solid #aebdae;

    button {

      background: #236b38;
      color: #fff;
      font-weight: 800;

    #result {

      padding: 14px;
      border-radius: 6px;
      background: #f4faf4;
      border: 1px solid #d8e7d8;
      min-height: 48px;

        padding: 11px;
        min-height: 42px;

</head>

      <select id="leafShape">
        <option value="">Choose one...</option>
        <option>Needles</option>
        <option>Simple broadleaf</option>
        <option>Compound leaf</option>
        <option>Lobed leaf</option>
      </select>

      <label for="bark">Bark</label>
      <select id="bark">
        <option value="">Choose one...</option>
        <option>Smooth</option>
        <option>Furrowed</option>
        <option>Peeling</option>
        <option>Scaly</option>
      </select>

      <label for="fruit">Fruit or seed</label>
      <select id="fruit">
        <option value="">Choose one...</option>
        <option>Acorn</option>
        <option>Cone</option>
        <option>Berry</option>
        <option>Winged seed</option>
        <option>None seen</option>

      <div id="result">Choose a few traits, then tap Identify Tree.</div>
    </section>

  <script>
    const result = document.getElementById("result");
    const identifyBtn = document.getElementById("identifyBtn");
    const beginBtn = document.getElementById("beginBtn");
    const backBtn = document.getElementById("backBtn");
    const startPage = document.getElementById("startPage");
    const startPageImage = document.getElementById("startPageImage");
    const wikiLink = document.getElementById("wikiLink");
    const FAST_IMAGE_FOLDER = "treeid_fast";
    const ORIGINAL_IMAGE_FOLDER = "treeid";

    function fastImageSrc(src) {
      const match = String(src || "").match(/^treeid\/(.+\.(?:png|jpe?g))$/i);
      return match ? `${FAST_IMAGE_FOLDER}/${match[1]}.webp` : src;
    }

    function setTreeImage(src, altText) {
      startPageImage.dataset.originalSrc = src;
      startPageImage.src = fastImageSrc(src);
      startPageImage.alt = altText;
    }

    function preloadTreeImages(...sources) {
      const load = () => {
        for (const src of sources) {
          const image = new Image();
          image.src = fastImageSrc(src);
        }
      };

      if ("requestIdleCallback" in window) {
        requestIdleCallback(load, { timeout: 1500 });
      } else {
        setTimeout(load, 250);
      }
    }

    startPageImage.addEventListener("error", () => {
      const originalSrc = startPageImage.dataset.originalSrc;
      if (originalSrc && startPageImage.src.indexOf(originalSrc) === -1) {
        startPageImage.src = originalSrc;
      }
    });

    function isComputerPlatform() {
      const platform = navigator.userAgentData?.platform || navigator.platform || "";
      const isAppleTouchDevice = /Mac/i.test(platform) && navigator.maxTouchPoints > 1;
      const isMobileViewport = Math.min(window.innerWidth, window.innerHeight) <= 430;
      const hasCoarsePointer = window.matchMedia?.("(pointer: coarse)").matches;

      return !isMobileViewport && !hasCoarsePointer && !isAppleTouchDevice && /(Mac|Win|Linux|CrOS)/i.test(platform);
    }

    function getDisplayedImageRect() {
      if (!startPageImage.naturalWidth || !startPageImage.naturalHeight) {
        return null;
      }

      const imageElementRect = startPageImage.getBoundingClientRect();
      const startPageRect = startPage.getBoundingClientRect();
      const objectFit = getComputedStyle(startPageImage).objectFit;
      const scale = objectFit === "cover" ? Math.max(
        imageElementRect.width / startPageImage.naturalWidth,
        imageElementRect.height / startPageImage.naturalHeight
      ) : Math.min(
        imageElementRect.width / startPageImage.naturalWidth,
        imageElementRect.height / startPageImage.naturalHeight
      );
      const width = startPageImage.naturalWidth * scale;
      const height = startPageImage.naturalHeight * scale;

      return {
        left: imageElementRect.left - startPageRect.left + (imageElementRect.width - width) / 2,
        top: imageElementRect.top - startPageRect.top + (imageElementRect.height - height) / 2,
        width,
        height
      };
    }

    function positionButtonOverImage(btn, position, imageRect) {
      btn.style.left = `${imageRect.left + imageRect.width * position.x}px`;
      btn.style.top = `${imageRect.top + imageRect.height * position.y}px`;
      btn.style.width = `${imageRect.width * position.width}px`;
      btn.style.height = `${imageRect.height * position.height}px`;
      btn.style.right = "auto";
    }

    function positionCurrentOverlays() {
      const imageRect = getDisplayedImageRect();
      const positions = overlayPositions[currentIntroPage];

      if (!imageRect || !positions) {
        return;
      }

      for (const position of positions) {
        positionButtonOverImage(position.btn, position, imageRect);
      }
    }
