async function placeBuffNearPickupSpawn(spawnX, spawnZ){
  if (!BUFF_MARKER_ENABLE){
    while (buffNearPickupSprites.length){
      const m = buffNearPickupSprites.pop();
      scene.remove(m);
      if (m.geometry) m.geometry.dispose();
      if (m.material) m.material.dispose();
    }
    return;
  }
  if (!terrainReady) return;
  if (!Number.isFinite(spawnX) || !Number.isFinite(spawnZ)) return;

  const tex = await loadTextureSafe(TEX_DIR + BUFF_MARKER_FILE, { colorSpace: THREE.SRGBColorSpace });
  if (!tex){
    hudLine(`⚠️ Missing marker texture: <code>${BUFF_MARKER_FILE}</code>`);
    return;
  }
  tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());

  while (buffNearPickupSprites.length){
    const m = buffNearPickupSprites.pop();
    scene.remove(m);
    if (m.geometry) m.geometry.dispose();
    if (m.material) m.material.dispose();
  }

  let placed = 0;
  for (const off of BUFF_MARKER_OFFSETS){
    const x = spawnX + off.x;
    const z = spawnZ + off.z;
    const y = heightAtWorldXZ(x, z);

    const mat = new THREE.MeshBasicMaterial({
      map: tex,
      transparent: true,
      alphaTest: 0.18,
      opacity: 1.0,
      side: THREE.DoubleSide,
      fog: false,
      depthWrite: true,
      depthTest: true
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(BUFF_MARKER_SIZE.w, BUFF_MARKER_SIZE.h), mat);
    mesh.position.set(x, y + (BUFF_MARKER_SIZE.h * 0.5) + BUFF_MARKER_LIFT, z);
    mesh.castShadow = false;
    mesh.receiveShadow = false;
    mesh.frustumCulled = false;
    mesh.renderOrder = 1246;
    scene.add(mesh);
    buffNearPickupSprites.push(mesh);
    placed++;
  }
  hudLine(`✅ Placed <code>${BUFF_MARKER_FILE}</code> near spawn: <code>${placed}</code> anchors at y-lift <code>${BUFF_MARKER_LIFT}</code>.`);
}

      z

    mesh.frustumCulled = false;
    mesh.renderOrder = 1243;
    scene.add(mesh);
    midTree7Sprites.push(mesh);
    placed++;
  }

  // Remove exactly one middle-zone tree7 near spawn to avoid a dominant near-field outlier.
  if (midTree7Sprites.length){
    const spawn = controls.getObject().position;
    let removeIdx = 0;
    let bestD2 = Infinity;
    for (let i = 0; i < midTree7Sprites.length; i++){
      const m = midTree7Sprites[i];
      const dx = m.position.x - spawn.x;
      const dz = m.position.z - spawn.z;
      const d2 = (dx * dx) + (dz * dz);
      if (d2 < bestD2){

        removeIdx = i;

    }

      placed = Math.max(0, placed - 1);

}

let blueOrangeRouteFiguresBuilt = false;


function ensureLeggomanAvatarMaterial(initialTex = null){
  if(!truckPlane) return;
  const tex = initialTex || leggomanIdleStandTex || leggomanTextures[LEGGOMAN_IDLE_FRAME_IDX] || leggomanTextures[0] || null;
  const needsReplace = !(truckPlane.material instanceof THREE.MeshBasicMaterial);

  if(needsReplace){
    if(truckPlane.material) truckPlane.material.dispose();
    truckPlane.material = new THREE.MeshBasicMaterial({
      map: tex,
      transparent: true,
      alphaTest: 0.58,
      side: THREE.DoubleSide,
      depthTest: !TRUCK_DRAW_ON_TOP ? true : false,
      depthWrite: !TRUCK_DRAW_ON_TOP ? true : false,
      toneMapped: false
    });
  } else {
    const mat = truckPlane.material;
    if(tex) mat.map = tex;
    mat.transparent = true;
    mat.alphaTest = 0.58;
    mat.side = THREE.DoubleSide;
    mat.depthTest = !TRUCK_DRAW_ON_TOP ? true : false;
    mat.depthWrite = !TRUCK_DRAW_ON_TOP ? true : false;
    mat.toneMapped = false;
    mat.needsUpdate = true;
  }

  truckPlane.renderOrder = AVATAR_RENDER_ORDER;
}

function setTruckAvatarTexture(tex){
  if(!truckPlane || !tex) return;
  const mat = truckPlane.material;
  if(mat && mat.uniforms && mat.uniforms.map){
    mat.uniforms.map.value = tex;
    mat.needsUpdate = true;
    return;
  }
  if(mat && ("map" in mat)){
    mat.map = tex;
    mat.needsUpdate = true;
  }
}

function clearPlazaExitVehicleChoices(){
  if(plazaExitVehicleChoicesGroup && plazaExitVehicleChoicesGroup.parent === scene){
    scene.remove(plazaExitVehicleChoicesGroup);
  }
  while(plazaExitVehicleChoices.length){
    const m = plazaExitVehicleChoices.pop();
    if(m && m.material) m.material.dispose();
  }
  plazaExitVehicleChoicesGroup = null;
}

function clearCyberFrontVehicle(){
  if(cyberFrontVehicleMesh && cyberFrontVehicleMesh.parent === scene){
    scene.remove(cyberFrontVehicleMesh);
  }
  if(cyberFrontVehicleMesh && cyberFrontVehicleMesh.material) cyberFrontVehicleMesh.material.dispose();
  cyberFrontVehicleMesh = null;
}

function spawnCyberFrontVehicle(actorObj){
  if(!cyberUnlocked || cyberFrontVehicleSpawned || !actorObj) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const yaw = Number.isFinite(truckYaw) ? truckYaw : actorObj.rotation.y;
  const fwdX = -Math.sin(yaw);
  const fwdZ = -Math.cos(yaw);

  const ahead = Math.max(24.0, PLAZA_EXIT_VEHICLE_SPAWN_AHEAD_FT * 0.55) * ft;
  const radius = PLAZA_EXIT_VEHICLE_COLLISION_RADIUS_FT * ft;

  const x = actorObj.position.x + (fwdX * ahead);
  const z = actorObj.position.z + (fwdZ * ahead);
  const groundY = heightAtWorldXZ(x, z);
  const baseGroundY = Number.isFinite(groundY) ? groundY : (actorObj.position.y - PLAYER_EYE_HEIGHT);

  const tex = getPlazaExitChoiceTexture(CYBER_TRUCK_FILE);
  const imgW = tex?.image?.width || 1024;
  const imgH = tex?.image?.height || 512;
  const aspect = imgW / Math.max(1, imgH);
  const choiceH = PLAZA_EXIT_VEHICLE_HEIGHT_FT * ft;
  const choiceW = Math.max(PLAZA_EXIT_VEHICLE_WIDTH_FT * ft, choiceH * aspect);
  const y = baseGroundY + (choiceH * 0.5) + TRUCK_SURFACE_LIFT - TRUCK_GROUND_SINK - TRUCK_VISUAL_DROP;

  clearCyberFrontVehicle();
  const mat = new THREE.MeshBasicMaterial({
    map: tex,
    color: 0xffffff,
    transparent: true,
    alphaTest: 0.5,
    side: THREE.DoubleSide,
    depthWrite: true,
    depthTest: true
  });
  cyberFrontVehicleMesh = new THREE.Mesh(new THREE.PlaneGeometry(choiceW, choiceH), mat);
  cyberFrontVehicleMesh.position.set(x, y, z);
  cyberFrontVehicleMesh.rotation.y = yaw;
  cyberFrontVehicleMesh.frustumCulled = false;
  cyberFrontVehicleMesh.renderOrder = 960;
  cyberFrontVehicleMesh.userData.vehicleFile = CYBER_TRUCK_FILE;
  cyberFrontVehicleMesh.userData.collisionRadius = radius;
  cyberFrontVehicleMesh.userData.tex = tex;
  scene.add(cyberFrontVehicleMesh);

  cyberFrontVehicleSpawned = true;
  hudLine("🚘 Cyber truck placed ahead. Touch it to drive it.");
}

function getPlazaExitChoiceTexture(file){
  if(plazaExitVehicleTextures.has(file)) return plazaExitVehicleTextures.get(file);
  const tex = new THREE.TextureLoader().load(
    resolveAssetUrl(TEX_DIR + file + "?v=" + Date.now()),
    (t)=>{
      t.colorSpace = THREE.SRGBColorSpace;
      t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
    },
    undefined,
    ()=>{
      hudLine("⚠️ Missing plaza exit vehicle texture: <code>" + file + "</code>.");
    }
  );
  tex.colorSpace = THREE.SRGBColorSpace;
  plazaExitVehicleTextures.set(file, tex);
  return tex;
}

function switchToChosenVehicleFile(file, tex){
  if(!truckPlane || !file) return false;

  avatarMode = "pickup";
  currentVehicleFile = file;
  truckDetachedFromBurn = false;
  fireAnchorMesh = truckPlane;

  const chosenTex = tex || getPlazaExitChoiceTexture(file);
  truckTex = chosenTex;
  leggomanGoalTex = chosenTex;
  leggomanGoalTexFile = file;
  setTruckAvatarTexture(chosenTex);
  truckPlane.scale.set(1.0, 1.0, 1.0);
  if(leggomanGoalMesh) leggomanGoalMesh.visible = false;
  stopWalkingAudio();
  clearPlazaExitVehicleChoices();
  clearCyberFrontVehicle();
  cyberFrontVehicleSpawned = true;
  hudLine("🚘 Vehicle selected: <code>" + file + "</code>.");
  return true;
}

function spawnPlazaExitVehicleChoices(actorObj){
  if(!PLAZA_EXIT_VEHICLE_CHOICES_ENABLE || !actorObj) return;

  clearPlazaExitVehicleChoices();
  plazaExitVehicleChoicesGroup = new THREE.Group();
  plazaExitVehicleChoicesGroup.name = "plazaExitVehicleChoices";

  const ft = WORLD_UNITS_PER_FOOT;
  const yaw = Number.isFinite(truckYaw) ? truckYaw : actorObj.rotation.y;
  const fwdX = -Math.sin(yaw);
  const fwdZ = -Math.cos(yaw);
  const rightX = -fwdZ;
  const rightZ = fwdX;

  const ahead = PLAZA_EXIT_VEHICLE_SPAWN_AHEAD_FT * ft;
  const spacing = PLAZA_EXIT_VEHICLE_SIDE_SPACING_FT * ft;
  const radius = PLAZA_EXIT_VEHICLE_COLLISION_RADIUS_FT * ft;

  const baseX = actorObj.position.x + (fwdX * ahead);
  const baseZ = actorObj.position.z + (fwdZ * ahead);

  const availableFiles = cyberUnlocked
    ? PLAZA_EXIT_VEHICLE_FILES
    : PLAZA_EXIT_VEHICLE_FILES.filter(f => f !== CYBER_TRUCK_FILE);

  for(let i = 0; i < availableFiles.length; i++){
    const file = availableFiles[i];
    const side = (i - ((availableFiles.length - 1) * 0.5)) * spacing;
    const x = baseX + (rightX * side);
    const z = baseZ + (rightZ * side);
    const groundY = heightAtWorldXZ(x, z);
    const baseGroundY = Number.isFinite(groundY) ? groundY : (actorObj.position.y - PLAYER_EYE_HEIGHT);

    const tex = getPlazaExitChoiceTexture(file);
    const imgW = tex?.image?.width || 1024;
    const imgH = tex?.image?.height || 512;
    const aspect = imgW / Math.max(1, imgH);
    const choiceH = PLAZA_EXIT_VEHICLE_HEIGHT_FT * ft;
    const choiceW = Math.max(PLAZA_EXIT_VEHICLE_WIDTH_FT * ft, choiceH * aspect);
    const y = baseGroundY + (choiceH * 0.5) + TRUCK_SURFACE_LIFT - TRUCK_GROUND_SINK - TRUCK_VISUAL_DROP;

    const mat = new THREE.MeshBasicMaterial({
      map: tex,
      color: 0xffffff,
      transparent: true,
      alphaTest: 0.5,
      side: THREE.DoubleSide,
      depthWrite: true,
      depthTest: true
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(choiceW, choiceH), mat);
    mesh.position.set(x, y, z);
    mesh.rotation.y = yaw;
    mesh.frustumCulled = false;
    mesh.renderOrder = 960;
    mesh.userData.vehicleFile = file;
    mesh.userData.collisionRadius = radius;
    mesh.userData.tex = tex;

    plazaExitVehicleChoices.push(mesh);
    plazaExitVehicleChoicesGroup.add(mesh);
  }

  scene.add(plazaExitVehicleChoicesGroup);
  hudLine("🚗 Plaza exit vehicles placed ahead. Touch one to drive it.");
}

function updatePlazaExitVehicleChoiceCollision(obj){
  if(!obj) return;
  const avatarRadius = TRUCK_COLLISION_RADIUS;

  if(cyberFrontVehicleMesh && cyberFrontVehicleMesh.visible){
    const dx = obj.position.x - cyberFrontVehicleMesh.position.x;
    const dz = obj.position.z - cyberFrontVehicleMesh.position.z;
    const r = avatarRadius + (cyberFrontVehicleMesh.userData.collisionRadius || 0);
    if((dx * dx) + (dz * dz) <= (r * r)){
      switchToChosenVehicleFile(cyberFrontVehicleMesh.userData.vehicleFile, cyberFrontVehicleMesh.userData.tex || null);
      return;
    }
  }

  if(goddessCopterMarker && goddessCopterMarker.parent === scene && goddessCopterMarker.visible !== false){
    const dx = obj.position.x - goddessCopterMarker.position.x;
    const dz = obj.position.z - goddessCopterMarker.position.z;
    const r = avatarRadius + (goddessCopterMarker.userData.collisionRadius || 0);
    const wantsSwitch = (avatarMode === "leggoman") || (currentVehicleFile !== (goddessCopterMarker.userData.vehicleFile || GODDESS_COPTER_MARKER_FILE));
    if(wantsSwitch && ((dx * dx) + (dz * dz) <= (r * r))){
      switchToChosenVehicleFile(goddessCopterMarker.userData.vehicleFile || GODDESS_COPTER_MARKER_FILE, goddessCopterMarker.userData.tex || null);
      return;
    }
  }

  if(!plazaExitVehicleChoices.length) return;
  for(const mesh of plazaExitVehicleChoices){
    if(!mesh || !mesh.visible) continue;
    const dx = obj.position.x - mesh.position.x;
    const dz = obj.position.z - mesh.position.z;
    const r = avatarRadius + (mesh.userData.collisionRadius || 0);
    if((dx * dx) + (dz * dz) <= (r * r)){
      switchToChosenVehicleFile(mesh.userData.vehicleFile, mesh.userData.tex || null);
      break;
    }
  }
}

function getJourneyHazardArrowTexture(dir){
  const key = dir > 0 ? "left" : "right";
  if(journeyHazardArrowTex.has(key)) return journeyHazardArrowTex.get(key);

  const c = document.createElement("canvas");
  c.width = 192;
  c.height = 192;
  const ctx = c.getContext("2d");
  if(ctx){
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.fillStyle = "rgba(20, 6, 6, 0.62)";
    ctx.fillRect(18, 18, c.width - 36, c.height - 36);
    ctx.strokeStyle = "rgba(255, 214, 170, 0.95)";
    ctx.lineWidth = 8;
    ctx.strokeRect(18, 18, c.width - 36, c.height - 36);
    ctx.fillStyle = "#ffd26a";
    ctx.font = "900 120px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(dir > 0 ? "←" : "→", c.width * 0.5, c.height * 0.5);
  }

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  journeyHazardArrowTex.set(key, tex);
  return tex;
}

function clearJourneyHazardCubes(){
  while(journeyHazardCubes.length){
    const c = journeyHazardCubes.pop();
    if(c && c.parent === scene) scene.remove(c);
    if(c && c.geometry) c.geometry.dispose();
    if(c && c.material) c.material.dispose();
  }
}

function isJourneyHazardBlockedAtXZ(x, z, radius = TRUCK_COLLISION_RADIUS){
  if(!JOURNEY_HAZARD_CUBES_ENABLE || !journeyHazardCubes.length) return false;
  const half = (JOURNEY_HAZARD_CUBE_SIZE_FT * WORLD_UNITS_PER_FOOT * 0.5) + Math.max(0, radius);
  for(const c of journeyHazardCubes){
    if(!c || !c.visible) continue;
    if(Math.abs(x - c.position.x) <= half && Math.abs(z - c.position.z) <= half) return true;
  }
  return false;
}

function applyJourneyHazardBlock(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS){
  if(!obj || !JOURNEY_HAZARD_CUBES_ENABLE || !journeyHazardCubes.length) return false;
  if(!isJourneyHazardBlockedAtXZ(obj.position.x, obj.position.z, radius)) return false;

  const half = (JOURNEY_HAZARD_CUBE_SIZE_FT * WORLD_UNITS_PER_FOOT * 0.5) + Math.max(0, radius);
  for(const c of journeyHazardCubes){
    if(!c || !c.visible) continue;
    if(Math.abs(obj.position.x - c.position.x) <= half && Math.abs(obj.position.z - c.position.z) <= half){
      if(!c.userData.hitApplied){
        c.userData.hitApplied = true;
        const requiredTurn = Number(c.userData.requiredTurn) || 0;
        const steerTurn = Math.sign(Number(truckTurnInput) || 0);
        const followedArrow = requiredTurn !== 0 && steerTurn === requiredTurn;
        if(!followedArrow){
          adjustPlayerHealthPct(-JOURNEY_HAZARD_HIT_HEALTH_PCT);
        }
      }
      break;
    }
  }

  const px = prevX, pz = prevZ;
  const nx = obj.position.x, nz = obj.position.z;
  const tryX = { x: nx, z: pz };
  const tryZ = { x: px, z: nz };
  const okX = !isJourneyHazardBlockedAtXZ(tryX.x, tryX.z, radius);
  const okZ = !isJourneyHazardBlockedAtXZ(tryZ.x, tryZ.z, radius);

  if(okX && !okZ){
    obj.position.x = tryX.x;
    obj.position.z = tryX.z;
  } else if(okZ && !okX){
    obj.position.x = tryZ.x;
    obj.position.z = tryZ.z;
  } else if(okX && okZ){
    const dxX = Math.abs(nx - tryX.x) + Math.abs(nz - tryX.z);
    const dxZ = Math.abs(nx - tryZ.x) + Math.abs(nz - tryZ.z);
    if(dxX <= dxZ){
      obj.position.x = tryX.x;
      obj.position.z = tryX.z;
    } else {
      obj.position.x = tryZ.x;
      obj.position.z = tryZ.z;
    }
  } else {
    obj.position.x = px;
    obj.position.z = pz;
  }

  return true;
}

function updateJourneyHazardCubes(dt, obj, fwd, isMoving){
  if(!JOURNEY_HAZARD_CUBES_ENABLE || !obj) return;

  const despawn = JOURNEY_HAZARD_DESPAWN_DIST_FT * WORLD_UNITS_PER_FOOT;
  const despawn2 = despawn * despawn;
  for(let i = journeyHazardCubes.length - 1; i >= 0; i--){
    const c = journeyHazardCubes[i];
    if(!c){
      journeyHazardCubes.splice(i, 1);
      continue;
    }
    const dx = obj.position.x - c.position.x;
    const dz = obj.position.z - c.position.z;
    if((dx * dx) + (dz * dz) > despawn2){
      if(c.parent === scene) scene.remove(c);
      if(c.geometry) c.geometry.dispose();
      if(c.material) c.material.dispose();
      journeyHazardCubes.splice(i, 1);
    }
  }

  if(!miniMapJourneyTargetActive){
    return;
  }

  journeyHazardSpawnTimer = Math.max(0, journeyHazardSpawnTimer - (dt || 0));
  if(!isMoving || avatarMode === "leggoman") return;

  const toTargetX = miniMapJourneyTargetX - obj.position.x;
  const toTargetZ = miniMapJourneyTargetZ - obj.position.z;
  const toTargetLen = Math.hypot(toTargetX, toTargetZ);
  if(toTargetLen < (40 * WORLD_UNITS_PER_FOOT)) return;

  const inv = 1 / Math.max(1e-6, toTargetLen);
  const tx = toTargetX * inv;
  const tz = toTargetZ * inv;
  const towardDot = (fwd.x * tx) + (fwd.z * tz);
  if(towardDot < 0.2) return;

  if(journeyHazardSpawnTimer > 0) return;
  journeyHazardSpawnTimer = JOURNEY_HAZARD_SPAWN_INTERVAL_SEC;

  const ahead = JOURNEY_HAZARD_SPAWN_AHEAD_FT * WORLD_UNITS_PER_FOOT;
  const sx = obj.position.x + (fwd.x * ahead);
  const sz = obj.position.z + (fwd.z * ahead);
  const syBase = heightAtWorldXZ(sx, sz);
  const size = JOURNEY_HAZARD_CUBE_SIZE_FT * WORLD_UNITS_PER_FOOT;
  const sy = (Number.isFinite(syBase) ? syBase : (obj.position.y - PLAYER_EYE_HEIGHT)) + (size * 0.5);

  const mat = new THREE.MeshStandardMaterial({ color: 0xcc1f1f, emissive: 0x3a0000, roughness: 0.72, metalness: 0.05 });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
  mesh.position.set(sx, sy, sz);
  mesh.castShadow = false;
  mesh.receiveShadow = false;
  mesh.userData.hitApplied = false;
  mesh.userData.requiredTurn = Math.random() < 0.5 ? -1 : 1; // +1 = left, -1 = right (truckTurnInput sign)

  const arrowTex = getJourneyHazardArrowTexture(mesh.userData.requiredTurn);
  const arrowMat = new THREE.SpriteMaterial({ map: arrowTex, transparent: true, depthWrite: false });
  const arrow = new THREE.Sprite(arrowMat);
  arrow.scale.set(size * 0.95, size * 0.95, 1);
  arrow.position.set(0, size * 0.75, 0);
  mesh.add(arrow);

  scene.add(mesh);
  journeyHazardCubes.push(mesh);

  while(journeyHazardCubes.length > JOURNEY_HAZARD_MAX_ACTIVE){
    const old = journeyHazardCubes.shift();
    if(old && old.parent === scene) scene.remove(old);
    if(old && old.geometry) old.geometry.dispose();
    if(old && old.material) old.material.dispose();
  }
}

function ensureLeggomanIdleStandTexture(){
  if(leggomanIdleStandTex || leggomanIdleStandTexRequested) return;
  leggomanIdleStandTexRequested = true;
  const url = TEX_DIR + LEGGOMAN_IDLE_STAND_FILE + "?v=" + Date.now();
  new THREE.TextureLoader().load(
    resolveAssetUrl(url),
    (tex)=>{
      const img = tex && tex.image ? tex.image : null;
      if(!img || !img.width || !img.height){
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
        leggomanIdleStandTex = tex;
        leggomanIdleStandTexRequested = false;
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      if(!ctx){
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
        leggomanIdleStandTex = tex;
        leggomanIdleStandTexRequested = false;
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);

      // Convert JPG's white matte to alpha so the idle avatar has no white box.
      const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = frame.data;
      for(let i = 0; i < d.length; i += 4){
        const rC = d[i] / 255;
        const gC = d[i + 1] / 255;
        const bC = d[i + 2] / 255;
        const maxC = Math.max(rC, gC, bC);
        const minC = Math.min(rC, gC, bC);
        const sat = maxC <= 1e-6 ? 0 : ((maxC - minC) / maxC);
        const luma = (0.2126 * rC) + (0.7152 * gC) + (0.0722 * bC);

        if(sat <= 0.12 && luma >= 0.88){
          d[i + 3] = 0;
        }
      }
      ctx.putImageData(frame, 0, 0);

      const outTex = new THREE.CanvasTexture(canvas);
      outTex.colorSpace = THREE.SRGBColorSpace;
      outTex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
      outTex.needsUpdate = true;
      leggomanIdleStandTex = outTex;
      leggomanIdleStandTexRequested = false;
    },
    undefined,
    ()=>{
      leggomanIdleStandTexRequested = false;
      hudLine("⚠️ Missing leggoman idle stand texture: <code>" + LEGGOMAN_IDLE_STAND_FILE + "</code>.");
    }
  );
}

function preloadLeggomanTextures(){
  ensureLeggomanIdleStandTexture();
  if(leggomanTextures.length || leggomanPreloadStarted) return;
  leggomanPreloadStarted = true;
  const loader = new THREE.TextureLoader();
  const fallbackLoad = ()=>{
    LEGGOMAN_FILES.forEach((name, idx)=>{
      const url = TEX_DIR + name + "?v=" + Date.now();
      loader.load(
        url,
        (tex)=>{
          // Keep leggoman colors consistent across J-toggle material paths.
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
          leggomanTextures[idx] = tex;
        },
        undefined,
        ()=>{}
      );
    });
  };
  const sheetUrl = resolveAssetUrl(TEX_DIR + LEGGOMAN_SPRITESHEET_FILE + "?v=" + Date.now());
  loader.load(
    sheetUrl,
    (sheetTex)=>{
      const img = sheetTex?.image;
      const cols = Math.max(1, LEGGOMAN_SPRITESHEET_COLS | 0);
      const rows = Math.max(1, LEGGOMAN_SPRITESHEET_ROWS | 0);
      const frameW = Math.floor((img?.width || 0) / cols);
      const frameH = Math.floor((img?.height || 0) / rows);
      if(!img || frameW < 2 || frameH < 2){
        hudLine("⚠️ Invalid leggoman sprite sheet. Falling back to <code>lg1.png-lg9.png</code>.");
        fallbackLoad();
        return;
      }

      let outIdx = 0;
      for(let r = 0; r < rows; r++){
        for(let c = 0; c < cols; c++){
          const canvas = document.createElement("canvas");
          canvas.width = frameW;
          canvas.height = frameH;
          const ctx = canvas.getContext("2d");
          if(!ctx){
            outIdx++;
            continue;
          }
          ctx.clearRect(0, 0, frameW, frameH);
          ctx.drawImage(
            img,
            c * frameW, r * frameH, frameW, frameH,
            0, 0, frameW, frameH
          );

          if(LEGGOMAN_CHROMAKEY_ENABLE){
            const frame = ctx.getImageData(0, 0, frameW, frameH);
            const d = frame.data;
            for(let i = 0; i < d.length; i += 4){
              const rC = d[i] / 255;
              const gC = d[i + 1] / 255;
              const bC = d[i + 2] / 255;
              const maxC = Math.max(rC, gC, bC);
              const minC = Math.min(rC, gC, bC);
              const sat = maxC <= 1e-6 ? 0 : ((maxC - minC) / maxC);
              const luma = (0.2126 * rC) + (0.7152 * gC) + (0.0722 * bC);
              if(sat <= LEGGOMAN_KEY_SAT_MAX && luma >= LEGGOMAN_KEY_LUMA_MIN){
                d[i + 3] = 0;
              }
            }
            ctx.putImageData(frame, 0, 0);
          }

          const tex = new THREE.CanvasTexture(canvas);
          // Keep leggoman colors consistent across J-toggle material paths.
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
          tex.needsUpdate = true;
          leggomanTextures[outIdx] = tex;
          outIdx++;
        }
      }
      hudLine("Loaded leggoman sprite sheet: <code>" + LEGGOMAN_SPRITESHEET_FILE + "</code>.");
    },
    undefined,
    ()=>{
      hudLine("⚠️ Missing leggoman sprite sheet (<code>" + LEGGOMAN_SPRITESHEET_FILE + "</code>). Falling back to <code>lg1.png-lg9.png</code>.");
      fallbackLoad();
    }
  );
}

function isCopterVehicleUnlockedForJ(){
  return (alienObjectiveMode === "destination_green") && (tunnelExitGoddessEncounterActive || tunnelExitGoddessEncounterDone);
}

function getNextTruckFile(currentFile){
  const sequence = isCopterVehicleUnlockedForJ()
    ? TRUCK_SEQUENCE.concat([GODDESS_COPTER_MARKER_FILE])
    : TRUCK_SEQUENCE;
  const idx = sequence.indexOf(currentFile);
  if(idx < 0) return sequence[0] || ORANGE_TRUCK_BASE_FILE;
  return sequence[(idx + 1) % sequence.length];
}

function placeLeggomanTruck2Goal(){
  const camObj = controls.getObject();
  const yaw = truckYaw;
  const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw)).normalize();
  const right = new THREE.Vector3(-fwd.z, 0, fwd.x).normalize();

  const halfArc = (LEGGOMAN_GOAL_ARC_DEG * 0.5) * (Math.PI / 180);
  const a = (Math.random() * 2 - 1) * halfArc;
  const dir = new THREE.Vector3(
    (fwd.x * Math.cos(a)) + (right.x * Math.sin(a)),
    0,
    (fwd.z * Math.cos(a)) + (right.z * Math.sin(a))
  ).normalize();

  const dist = LEGGOMAN_GOAL_DIST_WIDTHS * (TRUCK_W * LEGGOMAN_WIDTH_SCALE) * LEGGOMAN_GOAL_DIST_MULT;
  const gx = camObj.position.x + dir.x * dist;
  const gz = camObj.position.z + dir.z * dist;
  const gy = heightAtWorldXZ(gx, gz) + (TRUCK_H * 0.6);

  const goalFile = getNextTruckFile(currentVehicleFile);

  if(!leggomanGoalTex || leggomanGoalTexFile !== goalFile){
    leggomanGoalTexFile = goalFile;
    leggomanGoalTex = new THREE.TextureLoader().load(resolveAssetUrl(TEX_DIR + goalFile + "?v=" + Date.now()));
    leggomanGoalTex.colorSpace = THREE.SRGBColorSpace;
    leggomanGoalTex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
    if(leggomanGoalMesh && leggomanGoalMesh.material){
      leggomanGoalMesh.material.map = leggomanGoalTex;
      leggomanGoalMesh.material.needsUpdate = true;
    }
  }

  if(!leggomanGoalMesh){
    const mat = new THREE.MeshBasicMaterial({
      map: leggomanGoalTex,
      transparent: true,
      alphaTest: 0.5,
      side: THREE.DoubleSide,
      depthWrite: true
    });
    leggomanGoalMesh = new THREE.Mesh(new THREE.PlaneGeometry(TRUCK_W * 1.4 * LEGGOMAN_GOAL_SIZE_MULT, TRUCK_H * 1.4 * LEGGOMAN_GOAL_SIZE_MULT), mat);
    leggomanGoalMesh.frustumCulled = false;
    leggomanGoalMesh.renderOrder = 20;
    scene.add(leggomanGoalMesh);
  }

  leggomanGoalMesh.position.set(gx, gy, gz);
  leggomanGoalMesh.visible = true;
}

function isLeggomanTouchingTruck2Goal(){
  if(!truckPlane || !leggomanGoalMesh || !leggomanGoalMesh.visible) return false;
  const dx = truckPlane.position.x - leggomanGoalMesh.position.x;
  const dz = truckPlane.position.z - leggomanGoalMesh.position.z;
  const reach = (TRUCK_W * LEGGOMAN_WIDTH_SCALE * 0.7) + (TRUCK_W * 1.4 * LEGGOMAN_GOAL_SIZE_MULT * 0.4);
  return (dx*dx + dz*dz) <= (reach * reach);
}

function switchToTruck2Avatar(){
  if(!truckPlane || !leggomanGoalTex) return false;
  avatarMode = "truck2";
  truckPlane.scale.set(1.0, 1.0, 1.0);

  // Promote the entered goal truck as the active current vehicle in the sequence.
  currentVehicleFile = leggomanGoalTexFile || currentVehicleFile;

  // Re-arm active vehicle as the burn target so copter hits/burn affect it.
  truckDetachedFromBurn = false;
  fireAnchorMesh = truckPlane;

  if(!(truckPlane.material instanceof THREE.MeshBasicMaterial) || (truckPlane.material.map !== leggomanGoalTex)){
    if(truckPlane.material) truckPlane.material.dispose();
    truckPlane.material = new THREE.MeshBasicMaterial({
      map: leggomanGoalTex,
      transparent: true,
      alphaTest: 0.58,
      side: THREE.DoubleSide,
      depthTest: !TRUCK_DRAW_ON_TOP ? true : false,
      depthWrite: !TRUCK_DRAW_ON_TOP ? true : false
    });
  } else {
    truckPlane.material.alphaTest = 0.58;
    truckPlane.material.depthTest = !TRUCK_DRAW_ON_TOP ? true : false;
    truckPlane.material.depthWrite = !TRUCK_DRAW_ON_TOP ? true : false;
    truckPlane.material.needsUpdate = true;
  }
  truckPlane.renderOrder = AVATAR_RENDER_ORDER;

  if(leggomanGoalMesh) leggomanGoalMesh.visible = false;
  stopWalkingAudio();
  hudLine("🚘 Avatar mode: <code>" + currentVehicleFile + "</code> (tank controls active)");
  return true;
}

function detachBurningTruckAndSwitchToLeggoman(){
  if(!truckPlane) return false;
  const first = leggomanTextures[0];
  if(!first){
    hudLine("⚠️ Leggoman frames missing/loading (<code>" + LEGGOMAN_SPRITESHEET_FILE + "</code> fallback <code>lg1.png-lg9.png</code>). Staying on pickup.");
    return false;
  }

  if(burnedTruckPlane){
    scene.remove(burnedTruckPlane);
    if(burnedTruckPlane.geometry) burnedTruckPlane.geometry.dispose();
    if(burnedTruckPlane.material) burnedTruckPlane.material.dispose();
    burnedTruckPlane = null;
  }

  burnedTruckPlane = new THREE.Mesh(truckPlane.geometry.clone(), truckPlane.material.clone());
  burnedTruckPlane.position.copy(truckPlane.position);
  burnedTruckPlane.rotation.copy(truckPlane.rotation);
  burnedTruckPlane.renderOrder = AVATAR_RENDER_ORDER;
  burnedTruckPlane.frustumCulled = false;
  burnedTruckPlane.castShadow = false;
  burnedTruckPlane.receiveShadow = false;
  scene.add(burnedTruckPlane);

  fireAnchorMesh = burnedTruckPlane;
  truckDetachedFromBurn = true;
  stopVehicleAudio();

  avatarMode = "leggoman";
  leggomanFrameIdx = 0;
  leggomanFrameT = 0.0;
  ensureLeggomanAvatarMaterial(first);
  setTruckAvatarTexture(first);
  placeLeggomanTruck2Goal();
  hudLine("🔥 Truck burning left behind. <code>LEGGOMAN</code> now controlled by arrows.");
  return true;
}

function toggleAvatarMode(){
  if(!truckPlane) return;

  const obj = controls.getObject();
  const canUseBurnDetach = !!(obj && canUseTruckFireFeatureAt(obj.position.x, obj.position.z));
  const burnActive = canUseBurnDetach && !!(truckFireSprite && truckFireSprite.visible && truckFireTimer > 0);

  const switchToLeggomanAnytime = ()=>{
    const first = leggomanTextures[0];
    if(!first){
      hudLine("⚠️ Leggoman frames missing/loading (<code>" + LEGGOMAN_SPRITESHEET_FILE + "</code> fallback <code>lg1.png-lg9.png</code>). Staying on pickup.");
      return false;
    }
    avatarMode = "leggoman";
    stopVehicleAudio();
    leggomanFrameIdx = 0;
    leggomanFrameT = 0.0;
    ensureLeggomanAvatarMaterial(first);
    setTruckAvatarTexture(first);
    placeLeggomanTruck2Goal();
    hudLine("🧱 Avatar mode: <code>LEGGOMAN</code> (J to enter next truck anytime)");
    return true;
  };

  if(avatarMode === "pickup" || avatarMode === "truck2"){
    if(burnActive && detachBurningTruckAndSwitchToLeggoman()) return;
    switchToLeggomanAnytime();
    return;
  }

  if(avatarMode === "leggoman"){
    if(!leggomanGoalTex) placeLeggomanTruck2Goal();
    if(switchToTruck2Avatar()) return;
    hudLine("⚠️ Next truck not ready yet. Try J again in a moment.");
    return;
  }
}

function initTruckAvatar


(){
  if(!TRUCK_AVATAR_ENABLE) return;

  const url = TEX_DIR + TRUCK_FILE + "?v=" + Date.now();

  truckTex = new THREE.TextureLoader().load(
    url,
    tex=>{
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());

      // Keep correct aspect ratio
      const imgW = tex.image?.width || 1024;
      const imgH = tex.image?.height || 512;
      const aspect = imgW / Math.max(1, imgH);

      // Use TRUCK_H as the "master" scale so you can think in height.
      const h = TRUCK_H;
      const w = TRUCK_W || (h * aspect);

      let mat;

      if (TRUCK_CHROMAKEY_ENABLE){
        // Chroma-key near-white background out (for non-transparent PNGs)
        const key = TRUCK_KEY_COLOR;
        mat = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: true,
          depthTest: !TRUCK_DRAW_ON_TOP ? true : false,
          uniforms: {
            map: { value: tex },
            keyColor: { value: new THREE.Vector3(key.r, key.g, key.b) },
            tol: { value: TRUCK_KEY_TOL },
            soft: { value: TRUCK_KEY_SOFT }
          },
          vertexShader: `
            varying vec2 vUv;
            void main(){
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform sampler2D map;
            uniform vec3 keyColor;
            uniform float tol;
            uniform float soft;
            varying vec2 vUv;

            void main(){
              vec4 c = texture2D(map, vUv);

              // Distance from key color (white). Larger = less like white.
              float d = distance(c.rgb, keyColor);

              // alpha: 0 near white, 1 away from white
              float a = smoothstep(tol, tol + soft, d);

              // Also respect any existing alpha in the PNG
              a *= c.a;

              if (a < 0.01) discard;
              gl_FragColor = vec4(c.rgb, a);
            }
          `
        });
      } else {
        // Normal transparent PNG path
        mat = new THREE.MeshBasicMaterial({
          map: tex,
          transparent: true,
          alphaTest: 0.5,
          side: THREE.DoubleSide,
          depthWrite: true,
          depthTest: !TRUCK_DRAW_ON_TOP ? true : false
        });
      }

      truckPlane = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
      truckPlane.renderOrder = TRUCK_DRAW_ON_TOP ? AVATAR_RENDER_ORDER : 10;
      truckPlane.frustumCulled = false; // never pop out in low terrain pockets
      truckPlane.castShadow = false;
      truckPlane.receiveShadow = false;
      if (truckPlane.material){
        truckPlane.material.depthTest = !TRUCK_DRAW_ON_TOP ? true : false;
        truckPlane.material.depthWrite = !TRUCK_DRAW_ON_TOP ? true : false;
        truckPlane.material.needsUpdate = true;
      }
      scene.add(truckPlane);

      // Shadow proxy (invisible) so the truck still "casts" a terrain shadow
      const proxyMat = new THREE.MeshStandardMaterial({ color: 0x000000, transparent:true, opacity:0.0, depthWrite:false, depthTest:false });
      truckShadowProxy = new THREE.Mesh(new THREE.BoxGeometry(w*0.55, h*0.55, w*0.9), proxyMat);
      truckShadowProxy.castShadow = true;
      truckShadowProxy.receiveShadow = false;
      scene.add(truckShadowProxy);

      hudLine(`✅ Loaded truck avatar: <code>${TRUCK_FILE}</code> (expected in <code>${TEX_DIR}${TRUCK_FILE}</code>)`);
      preloadLeggomanTextures();
      if (TRUCK_CHROMAKEY_ENABLE) hudLine(`🎨 Truck chroma-key: ON (keys out near-white background)`);
      if (TRUCK_DRAW_ON_TOP) hudLine(`🧪 Truck draw-on-top: ON (debug mode; set TRUCK_DRAW_ON_TOP=false later)`);
    },
    undefined,
    err=>{
      console.error("Truck avatar failed to load:", url, err);
      hudLine(`❌ Truck avatar failed to load: <code>${TRUCK_FILE}</code> (expected <code>${url}</code>)`);
    }
  );
}

function updateTruckAvatar(dt=0.016){
  if(!truckPlane) return;

  // Orange truck turn blend: instant back <-> one-eighth view swap.
  const isOrangeVehicleActive = (currentVehicleFile === ORANGE_TRUCK_BASE_FILE || currentVehicleFile === ORANGE_TRUCK_LEGACY_FILE);
  const orangeLeftHeld = isOrangeVehicleActive && keys.has("ArrowLeft");
  const orangeRightHeld = isOrangeVehicleActive && keys.has("ArrowRight");
  const orangeTurnHeld = orangeLeftHeld || orangeRightHeld;
  const orangeLeftPressed = orangeLeftHeld && !orangeTurnPrevLeftHeld;
  const orangeRightPressed = orangeRightHeld && !orangeTurnPrevRightHeld;
  if(isOrangeVehicleActive && (orangeLeftPressed || orangeRightPressed)){
    orangeTurnPreviewTimer = ORANGE_TURN_PREVIEW_SEC;
    orangeTurnPreviewDir = orangeLeftPressed ? -1 : 1;
  }
  if(!isOrangeVehicleActive){
    orangeTurnPreviewTimer = 0.0;
    orangeTurnPreviewDir = 0;
  }
  if(orangeTurnPreviewTimer > 0){
    orangeTurnPreviewTimer = Math.max(0, orangeTurnPreviewTimer - Math.max(0, dt));
  }
  const orangeTurnPreviewActive = isOrangeVehicleActive && orangeTurnHeld && orangeTurnPreviewTimer > 0;
  const orangeTurnPhase01 = (ORANGE_TURN_PREVIEW_SEC > 1e-6) ? (1.0 - (orangeTurnPreviewTimer / ORANGE_TURN_PREVIEW_SEC)) : 1.0;
  const orangeHalfStageActive = orangeTurnPreviewActive && orangeTurnPhase01 >= ORANGE_TURN_HALF_STAGE_AT;
  const orangeTurnPreviewFile = orangeTurnPreviewActive
    ? (orangeHalfStageActive
      ? (orangeTurnPreviewDir < 0 ? ORANGE_TRUCK_HALF_LEFT_FILE : ORANGE_TRUCK_HALF_RIGHT_FILE)
      : ORANGE_TRUCK_BASE_FILE)
    : "";
  const orangeTurnPreviewNudge = orangeTurnPreviewActive ? (orangeTurnPreviewDir * ORANGE_TURN_PREVIEW_NUDGE) : 0;
  orangeTurnPrevLeftHeld = orangeLeftHeld;
  orangeTurnPrevRightHeld = orangeRightHeld;

  const upHeld = keys.has("ArrowUp") || keys.has("KeyW");
  const leftHeld = keys.has("ArrowLeft") || keys.has("KeyA");
  const rightHeld = keys.has("ArrowRight") || keys.has("KeyD");
  const backViewScaleMult = (upHeld && !leftHeld && !rightHeld) ? VEHICLE_BACK_VIEW_SCALE_MULT : 1.0;

  if(avatarMode === "leggoman"){
    ensureLeggomanIdleStandTexture();
    ensureLeggomanAvatarMaterial();
    const up = keys.has("ArrowUp") || keys.has("KeyW");
    const right = keys.has("ArrowRight") || keys.has("KeyD");
    const left = keys.has("ArrowLeft") || keys.has("KeyA");
    const down = keys.has("ArrowDown") || keys.has("KeyS");
    const isStandingStill = !up && !right && !left && !down;
    let seq = [LEGGOMAN_IDLE_FRAME_IDX];
    let mirrorX = false;

    if((up && right) || right){
      seq = LEGGOMAN_RUN_SIDE_SEQ;
      mirrorX = true;
    } else if((up && left) || left){
      seq = LEGGOMAN_RUN_SIDE_SEQ;
    } else if(up){
      seq = LEGGOMAN_RUN_UP_SEQ;
    } else if(down){
      seq = LEGGOMAN_RUN_DOWN_SEQ;
    }

    if(seq.length <= 1 || isStandingStill){
      leggomanFrameIdx = 0;
      leggomanFrameT = 0.0;
    } else {
      leggomanFrameT += dt;
      if(leggomanFrameT >= LEGGOMAN_FRAME_SEC){
        leggomanFrameT -= LEGGOMAN_FRAME_SEC;
        leggomanFrameIdx = (leggomanFrameIdx + 1) % seq.length;
      }
    }

    const texIdx = seq[Math.min(seq.length - 1, leggomanFrameIdx)];
    const movingFrameTex = leggomanTextures[texIdx] || leggomanTextures[LEGGOMAN_IDLE_FRAME_IDX];
    const frameTex = isStandingStill
      ? (leggomanIdleStandTex || movingFrameTex)
      : movingFrameTex;
    if(frameTex) setTruckAvatarTexture(frameTex);
    truckPlane.scale.set((mirrorX ? -1 : 1) * LEGGOMAN_WIDTH_SCALE, LEGGOMAN_HEIGHT_SCALE, 1.0);
  } else if(avatarMode === "pickup" && truckTex){

    const pickupScale = ((currentVehicleFile === BIG_TRUCK_BASE_FILE) ? BIG_TRUCK_SCALE_MULT : 1.0) * VEHICLE_TRIPLET_SCALE_MULT * backViewScaleMult;
    truckPlane.scale.set(pickupScale, pickupScale, 1.0);
    const directionalTex = orangeTurnPreviewFile
      ? getPlazaExitChoiceTexture(orangeTurnPreviewFile)
      : getDirectionalVehicleTextureForCurrent();
    const desiredTex = directionalTex || truckTex;
    // Ensure we snap back to the active vehicle texture after toggle.
    const mat = truckPlane.material;
    const currentTex = (mat && mat.uniforms && mat.uniforms.map) ? mat.uniforms.map.value : mat.map;
    if(currentTex !== desiredTex) setTruckAvatarTexture(desiredTex);
  } else if(avatarMode === "truck2" && leggomanGoalTex){
    const truck3Scale = (currentVehicleFile === TRUCK3_FILE) ? TRUCK3_SCALE_MULT : 1.0;
    const copterScale = (currentVehicleFile === GODDESS_COPTER_MARKER_FILE) ? COPTER_ACTIVE_SCALE_MULT : 1.0;
    const baseScale = Math.max(truck3Scale, copterScale);
    const vehicleScale = (currentVehicleFile === BIG_TRUCK_BASE_FILE) ? BIG_TRUCK_SCALE_MULT : 1.0;
    const activeScale = (baseScale * vehicleScale) * VEHICLE_TRIPLET_SCALE_MULT * backViewScaleMult;
    const copterHeightScale = (currentVehicleFile === GODDESS_COPTER_MARKER_FILE) ? 0.7744 : 1.0;
    truckPlane.scale.set(activeScale, activeScale * copterHeightScale, 1.0);
    const directionalTex = orangeTurnPreviewFile
      ? getPlazaExitChoiceTexture(orangeTurnPreviewFile)
      : getDirectionalVehicleTextureForCurrent();
    const desiredTex = directionalTex || leggomanGoalTex;
    const mat = truckPlane.material;
    const currentTex = (mat && mat.uniforms && mat.uniforms.map) ? mat.uniforms.map.value : mat.map;
    if(currentTex !== desiredTex) setTruckAvatarTexture(desiredTex);
    truckPlane.renderOrder = AVATAR_RENDER_ORDER;
    if(mat){
      mat.depthTest = !TRUCK_DRAW_ON_TOP ? true : false;
      mat.depthWrite = !TRUCK_DRAW_ON_TOP ? true : false;
      if("alphaTest" in mat) mat.alphaTest = Math.max(0.58, Number(mat.alphaTest) || 0);
      mat.needsUpdate = true;
    }
  }

  const camObj = controls.getObject(); // the camera
  const yaw = truckYaw;

  // Position in front of camera (like a hood / avatar view)
  const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();

  // Keep pickup visible in deep dips: if terrain between camera and truck blocks view,
  // progressively pull the truck closer until line-of-sight clears.
  let dist = TRUCK_FWD;
  let x = camObj.position.x + fwd.x * dist + right.x * TRUCK_SIDE;
  let z = camObj.position.z + fwd.z * dist + right.z * TRUCK_SIDE;
  for(let iter=0; iter<5; iter++){
    const truckGroundY = heightAtWorldXZ(x, z);
    const truckSightY = truckGroundY + (TRUCK_H * 0.42);
    let blocked = false;
    for(let i=1; i<=6; i++){
      const t = i / 7;
      const sx = camObj.position.x + (x - camObj.position.x) * t;
      const sz = camObj.position.z + (z - camObj.position.z) * t;
      const terrainY = heightAtWorldXZ(sx, sz);
      const sightY = camObj.position.y + (truckSightY - camObj.position.y) * t;
      if(terrainY > sightY - 0.10){
        blocked = true;
        break;
      }
    }
    if(!blocked) break;
    dist = Math.max(TRUCK_FWD * 0.48, dist * 0.84);
    x = camObj.position.x + fwd.x * dist + right.x * TRUCK_SIDE;
    z = camObj.position.z + fwd.z * dist + right.z * TRUCK_SIDE;
  }

  const copterActiveVehicle = (avatarMode !== "leggoman") && (currentVehicleFile === GODDESS_COPTER_MARKER_FILE);

  // Use center terrain sample for visual contact; max-sample caused visible hovering.
  let baseY = heightAtWorldXZ(x, z);
  if(!Number.isFinite(baseY)) baseY = 0;

  let baseTruckY = 0;
  let renderPitch = 0;
  let renderRoll = 0;
  let renderFwdOffset = 0;
  let shadowY = baseY + (TRUCK_H * 0.3);

  if(copterActiveVehicle){
    // Kopter-style: no terrain-follow bob/roll/pitch while flying.
    const copterVisualLift = TRUCK_H * 0.5;
    baseTruckY = camObj.position.y + copterVisualLift;
    truckElevationOffset = 0;
    truckTerrainPitch = 0;
    truckTerrainRoll = 0;
    truckTurnSway = 0;

    const bankInput = (keys.has("ArrowLeft") ? 1 : 0) - (keys.has("ArrowRight") ? 1 : 0);
    const targetBank = bankInput * THREE.MathUtils.degToRad(COPTER_BANK_MAX_DEG);
    const kb = Math.min(1, Math.max(0, COPTER_BANK_SMOOTH * dt));
    copterBankRoll += (targetBank - copterBankRoll) * kb;
    renderRoll = copterBankRoll;

    shadowY = Math.max(baseY + (TRUCK_H * 0.25), camObj.position.y - (TRUCK_H * 0.5));
  } else {
    copterBankRoll = 0;
    const elev01 = THREE.MathUtils.clamp(baseY / Math.max(1, TERRAIN_HEIGHT), 0, 1);
    const elevSigned = (0.5 - elev01) * 2;
    const targetElevationOffset = (elevSigned < 0)
      ? elevSigned * TRUCK_ELEVATION_ADAPT_MAX * 1.10 // high elevation: +10% compensation
      : elevSigned * TRUCK_ELEVATION_ADAPT_MAX * TRUCK_LOW_ELEV_LIFT_SCALE;
    const ke = Math.min(1, Math.max(0, TRUCK_ELEVATION_ADAPT_SMOOTH * dt));
    truckElevationOffset += (targetElevationOffset - truckElevationOffset) * ke;
    const camGroundEyeY = heightAtWorldXZ(camObj.position.x, camObj.position.z) + PLAYER_EYE_HEIGHT;
    const jumpVisualOffset = Math.max(0, camObj.position.y - camGroundEyeY);
    baseTruckY = baseY + (TRUCK_H * 0.5) + TRUCK_SURFACE_LIFT - TRUCK_GROUND_SINK - TRUCK_VISUAL_DROP + truckElevationOffset + jumpVisualOffset;

    // Terrain tilt: sample local gradient and project onto truck forward/right.
    const eps = Math.max(1.5, TRUCK_W * 0.8);
    const hxp = heightAtWorldXZ(x + eps, z);
    const hxm = heightAtWorldXZ(x - eps, z);
    const hzp = heightAtWorldXZ(x, z + eps);
    const hzm = heightAtWorldXZ(x, z - eps);
    const dhdx = (hxp - hxm) / (2 * eps);
    const dhdz = (hzp - hzm) / (2 * eps);
    const slopeFwd = (dhdx * fwd.x) + (dhdz * fwd.z);
    const slopeRight = (dhdx * right.x) + (dhdz * right.z);
    const maxTilt = THREE.MathUtils.degToRad(TRUCK_TERRAIN_TILT_MAX_DEG);
    const targetPitch = THREE.MathUtils.clamp(Math.atan(slopeFwd), -maxTilt, maxTilt);
    const targetRollFromTerrain = THREE.MathUtils.clamp(Math.atan(slopeRight), -maxTilt, maxTilt);
    const kt = Math.min(1, Math.max(0, TRUCK_TERRAIN_TILT_SMOOTH * dt));
    truckTerrainPitch += (targetPitch - truckTerrainPitch) * kt;
    truckTerrainRoll += (targetRollFromTerrain - truckTerrainRoll) * kt;

    const targetSway = truckTurnInput * THREE.MathUtils.degToRad(TRUCK_TURN_SWAY_DEG);
    const k = Math.min(1, Math.max(0, TRUCK_TURN_SWAY_SMOOTH * dt));
    truckTurnSway += (targetSway - truckTurnSway) * k;

    const t = performance.now() * 0.001;
    const vibeScale = truckMoveBlend;
    const vibePosY =
      (
        Math.sin((t * TRUCK_VIBE_FREQ_HZ) * Math.PI * 2) +
        0.55 * Math.sin((t * TRUCK_VIBE_FREQ_HZ * 1.9) * Math.PI * 2 + 0.8)
      ) * TRUCK_VIBE_POS_AMP * vibeScale;
    renderFwdOffset = Math.sin((t * TRUCK_VIBE_FREQ_HZ * 0.93) * Math.PI * 2 + 0.55) * TRUCK_VIBE_FWD_AMP * vibeScale;
    const vibeRoll = Math.sin((t * TRUCK_VIBE_FREQ_HZ * 1.11) * Math.PI * 2) * THREE.MathUtils.degToRad(TRUCK_VIBE_ROLL_DEG) * vibeScale;
    const vibePitch = Math.sin((t * TRUCK_VIBE_FREQ_HZ * 0.87) * Math.PI * 2) * THREE.MathUtils.degToRad(TRUCK_VIBE_PITCH_DEG) * vibeScale;

    baseTruckY += vibePosY;
    renderPitch = truckTerrainPitch + vibePitch;
    renderRoll = truckTerrainRoll + truckTurnSway + vibeRoll;
  }

  truckPlane.position.set(x + (fwd.x * renderFwdOffset) + (right.x * orangeTurnPreviewNudge), baseTruckY, z + (fwd.z * renderFwdOffset) + (right.z * orangeTurnPreviewNudge));
  truckPlane.rotation.set(renderPitch, yaw, renderRoll);

  if(truckShadowProxy){
    truckShadowProxy.visible = !copterActiveVehicle;
    if(!copterActiveVehicle){
      truckShadowProxy.position.set(x, shadowY, z);
      truckShadowProxy.rotation.set(0, yaw, 0);
    }
  }
}

function stopAndResetAudio(a){
  if(!a) return;
  try{ a.pause(); a.currentTime = 0; }catch(e){}
}

function playAudioOnceWithCallback(a, onDone){
  if(!a){
    if(typeof onDone === "function") onDone();
    return;
  }

  let finished = false;
  const done = ()=>{
    if(finished) return;
    finished = true;
    a.removeEventListener("ended", done);
    a.removeEventListener("error", done);
    if(typeof onDone === "function") onDone();
  };

  try{
    a.pause();
    a.currentTime = 0;
  }catch(e){}

  a.addEventListener("ended", done, { once:true });
  a.addEventListener("error", done, { once:true });

  try{
    const p = a.play();
    if(p && typeof p.catch === "function") p.catch(done);
  }catch(e){
    done();
  }
}

function playRingLandingSequencePigThenEscape(){
  if(!ringLandingSequenceInProgress) return;

  if(ringLandingPigRemaining > 0){
    ringLandingPigRemaining -= 1;
    playAudioOnceWithCallback(ringLandingPigAudio, ()=>{
      playRingLandingSequencePigThenEscape();
    });
    return;
  }

  if(ringLandingEscapeRemaining > 0){
    ringLandingEscapeRemaining -= 1;
    playAudioOnceWithCallback(ringLandingEscapeAudio, ()=>{
      playRingLandingSequencePigThenEscape();
    });
    return;
  }

  ringLandingSequenceInProgress = false;
  ringLandingSequenceDone = true;
}

function startRingLandingSequence(){
  if(ringLandingSequenceStarted || ringLandingSequenceDone || ringLandingSequenceInProgress) return;
  ringLandingSequenceStarted = true;
  ringLandingSequenceInProgress = true;

  initRingLandingSequenceAudio();
  ringLandingPigRemaining = Math.max(0, RING_LANDING_PIG_PLAYS | 0);
  ringLandingEscapeRemaining = Math.max(0, RING_LANDING_ESCAPE_PLAYS | 0);

  playAudioOnceWithCallback(ringLandingBrideAudio, ()=>{
    playRingLandingSequencePigThenEscape();
  });
}

function setupRingSuccessEcho(){
  if(!ringSuccessAudio) return;
  if(ringSuccessAudioSource || ringSuccessAudioDryGain || ringSuccessAudioWetGain || ringSuccessAudioDelay || ringSuccessAudioFeedback) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  try{
    ringSuccessAudioCtx = ringSuccessAudioCtx || new AC();
    ringSuccessAudioSource = ringSuccessAudioCtx.createMediaElementSource(ringSuccessAudio);
    ringSuccessAudioDryGain = ringSuccessAudioCtx.createGain();
    ringSuccessAudioWetGain = ringSuccessAudioCtx.createGain();
    ringSuccessAudioDelay = ringSuccessAudioCtx.createDelay(0.8);
    ringSuccessAudioFeedback = ringSuccessAudioCtx.createGain();

    ringSuccessAudioDryGain.gain.value = 1.0;
    ringSuccessAudioWetGain.gain.value = Math.max(0, Math.min(1, RING_SUCCESS_ECHO_WET));
    ringSuccessAudioDelay.delayTime.value = Math.max(0.05, Math.min(0.8, RING_SUCCESS_ECHO_DELAY_SEC));
    ringSuccessAudioFeedback.gain.value = Math.max(0, Math.min(0.75, RING_SUCCESS_ECHO_FEEDBACK));

    ringSuccessAudioSource.connect(ringSuccessAudioDryGain);
    ringSuccessAudioDryGain.connect(ringSuccessAudioCtx.destination);

    ringSuccessAudioSource.connect(ringSuccessAudioDelay);
    ringSuccessAudioDelay.connect(ringSuccessAudioWetGain);
    ringSuccessAudioWetGain.connect(ringSuccessAudioCtx.destination);

    ringSuccessAudioDelay.connect(ringSuccessAudioFeedback);
    ringSuccessAudioFeedback.connect(ringSuccessAudioDelay);
  }catch(e){}
}

function playRingSuccessAudioWithEcho(){
  initRingSuccessAudio();
  if(!ringSuccessAudio) return;

  try{

    ringSuccessAudio.currentTime = 0;
  }catch(e){}

  const p = ringSuccessAudio.play();

}

function updateRingOfFireSequenceAudio(isCopterVehicle, x, z, groundedNow){
  const insideRing = GREEN_FIRE_RING_ENABLE && isInsideGreenFireRingArea(x, z);

  if(isCopterVehicle){
    const inNightApproach = GREEN_FIRE_RING_ENABLE && isWithinGreenFireRingTriggerRange(x, z, GREEN_RING_NIGHT_TRIGGER_RANGE_FT);
    if(inNightApproach){
      playRingDarknessAudioOnce();
    }

    const landedInsideRing = groundedNow && insideRing;
    if(landedInsideRing){
      startRingLandingSequence();
    }
  }

  if(insideRing && ringLandingSequenceStarted){
    ringSuccessArmedForExit = true;
  }

  const readyForSuccess = ringLandingSequenceDone && ringSuccessArmedForExit && !ringSuccessPlayed;
  if(readyForSuccess && !insideRing){
    ringSuccessPlayed = true;
    playRingSuccessAudioWithEcho();
  }
}

function scheduleTunnelExitGoddessVoiceTrim(){
  if(!tunnelExitGoddessVoiceAudio) return;

  if(tunnelExitGoddessVoiceTrimTimer){
    clearTimeout(tunnelExitGoddessVoiceTrimTimer);

  }

  const dur = Number(tunnelExitGoddessVoiceAudio.duration);
  if(!Number.isFinite(dur) || dur <= 0) return;
  const stopSec = Math.max(0.1, dur - Math.max(0, TUNNEL_EXIT_GODDESS_VOICE_TAIL_TRIM_SEC));
  tunnelExitGoddessVoiceTrimTimer = setTimeout(()=>{
    tunnelExitGoddessVoiceTrimTimer = null;
    try{
      tunnelExitGoddessVoiceAudio.pause();
      tunnelExitGoddessVoiceAudio.currentTime = 0;
    }catch(e){}
    finishTunnelExitGoddessEncounter();
  }, Math.max(50, Math.round(stopSec * 1000)));

function updateTunnelExitGoddessEncounter(){
  if(tunnelExitGoddessEncounterDone || tunnelExitGoddessEncounterActive) return;
  if(!tunnelExitGoddessGroup || tunnelExitGoddessGroup.parent !== scene) return;

  const obj = controls.getObject();
  if(!obj) return;

  let anchor = null;
  tunnelExitGoddessGroup.traverse((node)=>{
    if(anchor || !node || !node.isMesh) return;
    anchor = node.position;
  });
  if(!anchor) anchor = tunnelExitGoddessGroup.position;

  const dx = obj.position.x - anchor.x;
  const dz = obj.position.z - anchor.z;
  const distXZ = Math.hypot(dx, dz);

  const ft = WORLD_UNITS_PER_FOOT;
  const outsideCave = !isTruckInsideCaveForLighting(obj.position.x, obj.position.y, obj.position.z);
  if(!outsideCave) return;

  const triggerR = Math.max(2.0 * ft, TUNNEL_EXIT_GODDESS_TRIGGER_RADIUS_FT * ft);
  const blockR = Math.max(triggerR, TUNNEL_EXIT_GODDESS_BLOCK_RADIUS_FT * ft);
  if(distXZ > blockR) return;

  const faceYaw = Math.atan2(anchor.x - obj.position.x, anchor.z - obj.position.z);
  if(Number.isFinite(faceYaw)){
    truckYaw = faceYaw;
    obj.rotation.y = faceYaw;
  }

  MINI_MAP_SHOW_ORANGE_SQUARE = false;
  MINI_MAP_SHOW_GREEN_SQUARE = true;
  setAlienObjectiveMode("destination_green");
  setAlienObjectiveVisible(true);
  hudLine("🟩 Green destination revealed on minimap.");
  hudLine("📏 Orange→Green route: <code>~" + Math.round(ORANGE_GREEN_ROUTE_TOTAL_DIST_FT) + "ft</code>.");
  hudLine("🗣️ Goddess encounter: movement paused while voice plays.");
  playTunnelExitGoddessEncounterVoice();
}

function applyTunnelReaperContactPenalty(obj, radius = TRUCK_COLLISION_RADIUS){
  if(!obj || !tunnelReaperGroup || tunnelReaperGroup.parent !== scene) return;
  const ox = obj.position.x;
  const oz = obj.position.z;
  const baseR = Math.max(0.2, radius);

  tunnelReaperGroup.traverse((node)=>{
    if(!node || !node.isMesh || !node.visible) return;
    const pos = node.position;
    const wr = node.geometry?.parameters?.width || (TUNNEL_REAPER_WIDTH_FT * WORLD_UNITS_PER_FOOT);
    const hr = node.geometry?.parameters?.height || (TUNNEL_REAPER_HEIGHT_FT * WORLD_UNITS_PER_FOOT);
    const reaperR = Math.max(0.5, Math.min(wr, hr) * 0.28);
    const hitR = baseR + reaperR;
    const dx = ox - pos.x;
    const dz = oz - pos.z;
    const hit = ((dx * dx) + (dz * dz)) <= (hitR * hitR);

    if(hit && !node.userData.reaperContactApplied){
      node.userData.reaperContactApplied = true;
      playTunnelReaperMadAudio();
      if(node.userData.isFinalTunnelReaperPair){
        if(!finalTunnelReaperPenaltyApplied){
          finalTunnelReaperPenaltyApplied = true;
          adjustPlayerHealthPct(-10);
        }
      } else {
        adjustPlayerHealthPct(-10);
      }
      spawnHitBurst(new THREE.Vector3(pos.x, pos.y + (hr * 0.15), pos.z), 0xff5555);
    } else if(!hit && node.userData.reaperContactApplied){
      node.userData.reaperContactApplied = false;
    }
  });
}

function applyFinalTunnelReaperPassPenalty(obj, radius = TRUCK_COLLISION_RADIUS){
  if(!obj || finalTunnelReaperPenaltyApplied || !TUNNEL_REAPER_ENABLE) return;
  const info = _getPrimaryReaperTunnelPath();
  if(!info) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const startS = TUNNEL_REAPER_START_FT * ft;
  const spacing = TUNNEL_REAPER_SPACING_FT * ft;
  const span = TUNNEL_REAPER_SPAN_FT * ft;
  const count = Math.max(1, Math.floor(span / Math.max(1e-4, spacing)) + 1);
  const finalPairS = startS + ((count - 1) * spacing);
  const closest = _closestPointOnTunnelPolyline(info.points, obj.position);
  if(!closest) return;

  const triggerHalfWindow = Math.max(2.5 * ft, radius * 1.35);
  if(Math.abs(closest.s - finalPairS) <= triggerHalfWindow){
    finalTunnelReaperPenaltyApplied = true;
    playTunnelReaperMadAudio();
    adjustPlayerHealthPct(-10);
    spawnHitBurst(new THREE.Vector3(obj.position.x, obj.position.y + 1.2, obj.position.z), 0xff5555);
  }
}

function updateTunnelReaperAudio(playerX, playerY, playerZ){
  if(!TUNNEL_REAPER_ENABLE){
    stopTunnelReaperAudio();
    return;
  }

  if(!tunnelReaperAudio) initTunnelReaperAudio();
  if(!tunnelReaperAudio) return;

  const info = _getPrimaryReaperTunnelPath();
  if(!info){
    stopTunnelReaperAudio();
    return;
  }

  const closest = _closestPointOnTunnelPolyline(info.points, new THREE.Vector3(playerX, playerY, playerZ));
  if(!closest){
    stopTunnelReaperAudio();
    return;
  }

  const ft = WORLD_UNITS_PER_FOOT;
  const s0 = TUNNEL_REAPER_START_FT * ft;
  const s1 = s0 + (TUNNEL_REAPER_SPAN_FT * ft);
  const inAlong = closest.s >= (s0 - (20.0 * ft)) && closest.s <= (s1 + (20.0 * ft));
  const radial = new THREE.Vector3(playerX, playerY, playerZ).distanceTo(closest.point);
  const inRadial = radial <= (info.innerRadius + (14.0 * ft));
  const active = inAlong && inRadial;

  if(active){
    if(!tunnelReaperAudioTriggeredInActiveZone && tunnelReaperAudio.paused){
      tunnelReaperAudioTriggeredInActiveZone = true;
      tunnelReaperAudio.play().then(()=>{ tunnelReaperAudioPlaying = true; }).catch(()=>{});
    }
  } else {
    tunnelReaperAudioTriggeredInActiveZone = false;
    // Let one-shot monster1 finish so follow-up monster3 + reaper spawn can trigger reliably.
    if(tunnelReaperAudio && !tunnelReaperAudio.paused){
      return;
    }
    stopTunnelReaperAudio();
  }
}

/* =========================================================
   🌾 TALL GRASS (Option B: Instanced grass cards)
   - Adds vertical “blades” on top of the ground (real geometry)
   - dg_disp.png controls blade height (bright = taller)
   - SAFE defaults: no shadows casting, instanced mesh, alphaTest
   ========================================================= */
var tallGrassMesh = null;

async function createTallGrass(){
  if (!TALL_GRASS_ENABLE) return;

  // Wait for terrain so we can place blades on the ground
  const start = performance.now();
  while (!terrainReady && performance.now() - start < 4000){
    await new Promise(r => setTimeout(r, 50));
  }
  if (!terrainReady){
    hudLine("⚠️ Tall grass skipped: terrain not ready.");
    return;
  }

  // Load the height controller pixels (dg_disp.png)
  const ok = await loadDispPixels();
  if (!ok) return;

  // Load the blade texture (we reuse your grass color for now)
  const colorUrl = TEX_DIR + GRASS_CARD_COLOR_FILE;
  const bladeTex = await loadTextureSafe(colorUrl, { colorSpace: THREE.SRGBColorSpace });
  if (!bladeTex){
    hudLine(`⚠️ Tall grass: missing <code>${GRASS_CARD_COLOR_FILE}</code>`);
    return;
  }
  bladeTex.wrapS = bladeTex.wrapT = THREE.RepeatWrapping;
  bladeTex.repeat.set(1, 1);
  bladeTex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());

  // Blade geometry (unit height; we scale per instance)
  const bladeGeo = new THREE.PlaneGeometry(GRASS_CARD_W, 1.0);

  // Material: alphaTest avoids expensive sorting of transparent pixels.
  const bladeMat = new THREE.MeshStandardMaterial({
    map: bladeTex,
    transparent: true,
    alphaTest: GRASS_CARD_ALPHA,
    side: THREE.DoubleSide,
    roughness: 1.0,
    metalness: 0.0
  });

  // Remove old mesh if re-created
  if (tallGrassMesh){
    scene.remove(tallGrassMesh);
    tallGrassMesh.geometry.dispose();
    // material shares a texture; skip dispose for safety
    tallGrassMesh = null;
  }

  tallGrassMesh = new THREE.InstancedMesh(bladeGeo, bladeMat, GRASS_CARD_COUNT);
  tallGrassMesh.castShadow = false;     // keep SAFE
  tallGrassMesh.receiveShadow = true;
  tallGrassMesh.frustumCulled = true;
  scene.add(tallGrassMesh);

  const dummy = new THREE.Object3D();

  // Place blades in a disc around origin (start area)
  for (let i = 0; i < GRASS_CARD_COUNT; i++){
    const ang = Math.random() * Math.PI * 2;
    const rr  = Math.sqrt(Math.random()) * GRASS_CARD_AREA;
    const x = Math.cos(ang) * rr;
    const z = Math.sin(ang) * rr;

    // Height from your terrain + sink a hair
    const groundY = heightAtWorldXZ(x, z) - GRASS_CARD_GROUND_SINK;

    // dg_disp brightness -> blade height
    const d = dispAtWorldXZ(x, z); // 0..1
    const h = GRASS_CARD_MIN_H + d * (GRASS_CARD_MAX_H - GRASS_CARD_MIN_H);

    dummy.position.set(x, groundY + h * 0.5, z);

    // Random yaw for variety
    dummy.rotation.set(0, Math.random() * Math.PI, 0);

    // Scale Y = height, X = 1 (width already in geometry)
    dummy.scale.set(1, h, 1);

    dummy.updateMatrix();
    tallGrassMesh.setMatrixAt(i, dummy.matrix);
  }

  tallGrassMesh.instanceMatrix.needsUpdate = true;

  hudLine(`🌾 Tall grass ON: <code>${GRASS_CARD_COUNT}</code> cards · height via <code>${GRASS_CARD_HEIGHT_FILE}</code>`);
}

function mulberry32(seed){
  return function(){
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function mountainProfile(t, rngBase){
  // Some harmonics + a spike
  const a = Math.sin(t * Math.PI * 2 * 1.0 + rngBase()*3.0);
  const b = Math.sin(t * Math.PI * 2 * 2.2 + rngBase()*3.0) * 0.6;
  const c = Math.sin(t * Math.PI * 2 * 4.7 + rngBase()*3.0) * 0.35;
  const d = Math.sin(t * Math.PI * 2 * 9.3 + rngBase()*3.0) * 0.18;
  const spike = Math.pow(Math.max(0, Math.sin(t*2*Math.PI*3.0 + rngBase()*6.0)), 6.0) * 0.8;

  let v = (a*0.55 + b*0.35 + c*0.25 + d*0.20) * 0.5 + 0.55;
  v += spike * 0.35;
  v = Math.max(0, Math.min(1, v));
  v = Math.pow(v, 1.15 / Math.max(0.1, MOUNTAIN_RUGGEDNESS));
  return v;
}

function buildMountainRing({ radius, height, thickness, segments, color, opacity, seed, yBase }){
  const rngBase = mulberry32(seed);

  const inner = radius;
  const outer = radius + thickness;

  const verts = [];
  const indices = [];
  const stride = 4;

  for (let i = 0; i <= segments; i++){
    const t = i / segments;
    const ang = t * Math.PI * 2;

    const prof = mountainProfile(t, rngBase);
    const topY = yBase + prof * height;

    const cx = Math.cos(ang);
    const sz = Math.sin(ang);

    // inner bottom, inner top, outer top, outer bottom
    verts.push(inner*cx, yBase, inner*sz);
    verts.push(inner*cx, topY,  inner*sz);
    verts.push(outer*cx, topY*0.92, outer*sz);
    verts.push(outer*cx, yBase, outer*sz);
  }

  for (let i = 0; i < segments; i++){
    const a = i*stride;
    const b = a + stride;

    indices.push(a+0, a+1, b+1);
    indices.push(a+0, b+1, b+0);

    indices.push(a+1, a+2, b+2);
    indices.push(a+1, b+2, b+1);

    indices.push(a+3, b+2, a+2);
    indices.push(a+3, b+3, b+2);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  const mat = new THREE.MeshLambertMaterial({
    color,
    transparent: true,
    opacity,
    fog: true,          // keep fog now that fog is fixed
    depthWrite: false
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = -1;
  mesh.frustumCulled = false;
  return mesh;
}

/* =========================
   📱 iPad Landscape Controls
   - Toggle on/off with the controls button.
   - Right thumb joystick mirrors Arrow keys.
   - Left side: FIRE, UP, DOWN, J (vehicle swap).
   ========================= */
const touchToggle = document.getElementById("touchToggle");
const touchUI = document.getElementById("touchUI");
const touchHint = document.getElementById("touchHint");
const joyWrap = document.getElementById("joyWrap");
const joyStick = document.getElementById("joyStick");

function isTouchDevice(){
  return ("ontouchstart" in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);
}
function isLandscape(){
  return window.matchMedia("(orientation: landscape)").matches;
}

let touchOn = isTouchDevice();

function refreshTouchUI(){
  const show = !!(touchOn && isLandscape());
  touchUI.classList.toggle("on", show);
  touchUI.classList.toggle("landscapeOnly", !isLandscape());
  touchHint.classList.toggle("on", !!isTouchDevice());
}

refreshTouchUI();
window.addEventListener("resize", refreshTouchUI);
window.addEventListener("orientationchange", refreshTouchUI);

touchToggle.addEventListener("click", (e)=>{
  e.preventDefault();
  touchOn = !touchOn;
  refreshTouchUI();
  touchHint.classList.remove("on");
});

// Stop iOS scroll gestures while using controls
document.addEventListener("touchmove", (e)=>{ if(touchOn && isLandscape()) e.preventDefault(); }, {passive:false});

function vKey(code, down){
  if (down) keys.add(code);
  else keys.delete(code);
}

function bindHold(btn, code){
  if (!btn) return;
  const press = (ev)=>{ if(ev) ev.preventDefault(); if(!touchOn || !isLandscape()) return; vKey(code, true); };
  const release = (ev)=>{ if(ev) ev.preventDefault(); vKey(code, false); };

  btn.addEventListener("touchstart", press, {passive:false});
  btn.addEventListener("touchend", release, {passive:false});
  btn.addEventListener("touchcancel", release, {passive:false});

  btn.addEventListener("pointerdown", press);
  btn.addEventListener("pointerup", release);
  btn.addEventListener("pointercancel", release);
  btn.addEventListener("pointerleave", release);

  btn.addEventListener("contextmenu", (e)=>e.preventDefault());
}

function setArrowFromJoystick(next){
  if(joystickState.up !== next.up) vKey("ArrowUp", next.up);
  if(joystickState.down !== next.down) vKey("ArrowDown", next.down);
  if(joystickState.left !== next.left) vKey("ArrowLeft", next.left);
  if(joystickState.right !== next.right) vKey("ArrowRight", next.right);
  joystickState.up = next.up;
  joystickState.down = next.down;
  joystickState.left = next.left;
  joystickState.right = next.right;
}

function setJoyKnob(nx, ny){
  if(!joyStick) return;
  const px = 78 + (nx * KNOB_MAX);
  const py = 78 + (ny * KNOB_MAX);
  joyStick.style.left = px.toFixed(1) + "px";
  joyStick.style.top = py.toFixed(1) + "px";
}

function resetJoystick(){
  joyActive = false;
  setArrowFromJoystick({ up:false, down:false, left:false, right:false });
  setJoyKnob(0, 0);
}

function updateJoystickFromClient(clientX, clientY){
  if(!joyWrap) return;
  const r = joyWrap.getBoundingClientRect();
  let dx = clientX - (r.left + JOY_CENTER.x);
  let dy = clientY - (r.top + JOY_CENTER.y);
  const mag = Math.hypot(dx, dy);
  const lim = JOY_RADIUS;
  if(mag > lim && mag > 1e-6){
    const k = lim / mag;
    dx *= k;
    dy *= k;
  }
  const nx = dx / lim;
  const ny = dy / lim;

  setJoyKnob(nx, ny);
  setArrowFromJoystick({
    up: ny < -JOY_DEAD,
    down: ny > JOY_DEAD,
    left: nx < -JOY_DEAD,
    right: nx > JOY_DEAD
  });
}

  joyWrap.addEventListener("touchstart", start, {passive:false});
  joyWrap.addEventListener("touchmove", move, {passive:false});
  joyWrap.addEventListener("touchend", end, {passive:false});
  joyWrap.addEventListener("touchcancel", end, {passive:false});

  window.addEventListener("pointermove", move);
  window.addEventListener("pointerup", end);

}

// ----- Lake collision helpers -----
function isPointInLakeXZ(x, z){
  // XZ bounds only (used internally)
  if (!lakeMesh) return false;

  const cx = lakeMesh.position.x;
  const cz = lakeMesh.position.z;
  const half = (LAKE_SIZE * 0.5) - LAKE_BLOCK_MARGIN;

  return (Math.abs(x - cx) <= half) && (Math.abs(z - cz) <= half);
}

// True only if this XZ is actually WATER (terrain is below/near the water surface).
function isWaterAtXZ(x, z){
  if (!lakeMesh) return false;
  if (!isPointInLakeXZ(x, z)) return false;

  const waterY = lakeMesh.position.y;
  const groundY = heightAtWorldXZ(x, z);

  // If the ground is below (or just barely above) the water surface, treat it as water.
  // This prevents "infinite lake collider" when the square lake bounds overlap higher land.
  const WATER_TOL = 1.5; // how much land can stick up before it's considered "dry"
  return groundY <= (waterY + WATER_TOL);
}

function collidesWithTreeListAtXZ(x, z, truckRadius, sprites){
  for (const m of sprites){
    if (!m) continue;
    const scaleX = Math.max(0.01, Math.abs(m.scale?.x || 1));
    const spriteW = Math.max(0.01, (m.geometry?.parameters?.width || 1) * scaleX);
    const treeRadius = Math.max(0.45, spriteW * TREE_TRUNK_RADIUS_FACTOR);
    const minDist = truckRadius + treeRadius;
    const dx = x - m.position.x;
    const dz = z - m.position.z;
    if ((dx * dx) + (dz * dz) < (minDist * minDist)) return true;
  }
  return false;
}

function isTreeBlockedAtXZ(x, z, truckRadius = TRUCK_COLLISION_RADIUS){
  return (
    collidesWithTreeListAtXZ(x, z, truckRadius, lowTreeSprites) ||
    collidesWithTreeListAtXZ(x, z, truckRadius, lowTree3Sprites) ||
    collidesWithTreeListAtXZ(x, z, truckRadius, midTree7Sprites) ||
    collidesWithTreeListAtXZ(x, z, truckRadius, buffNearPickupSprites)
  );
}

function getPuebloCubeBoundsXZ(radius = 0){
  if(!PUEBLO_TEST_CUBE_ENABLE || !puebloTestCube) return null;
  const hx = (PUEBLO_TEST_CUBE_W * 0.5) + Math.max(0, radius);
  const hz = (PUEBLO_TEST_CUBE_D * 0.5) + Math.max(0, radius);
  return {
    minX: puebloTestCube.position.x - hx,
    maxX: puebloTestCube.position.x + hx,
    minZ: puebloTestCube.position.z - hz,
    maxZ: puebloTestCube.position.z + hz
  };
}

function isPuebloCubeBlockedAtXZ(x, z, radius = 0){
  const b = getPuebloCubeBoundsXZ(radius);
  if(!b) return false;
  return x >= b.minX && x <= b.maxX && z >= b.minZ && z <= b.maxZ;
}

function isOnPuebloCubeTopXZ(x, z, inset = 0){
  if(!PUEBLO_TEST_CUBE_ENABLE || !puebloTestCube) return false;
  const halfX = Math.max(0, (PUEBLO_TEST_CUBE_W * 0.5) - Math.max(0, inset));
  const halfZ = Math.max(0, (PUEBLO_TEST_CUBE_D * 0.5) - Math.max(0, inset));
  return Math.abs(x - puebloTestCube.position.x) <= halfX && Math.abs(z - puebloTestCube.position.z) <= halfZ;
}

function getPuebloCubeTopEyeY(){
  if(!PUEBLO_TEST_CUBE_ENABLE || !puebloTestCube) return -Infinity;
  return puebloTestCube.position.y + (PUEBLO_TEST_CUBE_H * 0.5) + PLAYER_EYE_HEIGHT;
}

function snapPlayerToPuebloTop(obj, radius = TRUCK_COLLISION_RADIUS){
  if(!PUEBLO_TEST_CUBE_ENABLE || !puebloTestCube || !obj) return false;

  const inset = Math.max(0.15, radius * 0.5);
  const halfX = Math.max(0, (PUEBLO_TEST_CUBE_W * 0.5) - inset);
  const halfZ = Math.max(0, (PUEBLO_TEST_CUBE_D * 0.5) - inset);
  const cx = puebloTestCube.position.x;
  const cz = puebloTestCube.position.z;

  obj.position.x = THREE.MathUtils.clamp(obj.position.x, cx - halfX, cx + halfX);
  obj.position.z = THREE.MathUtils.clamp(obj.position.z, cz - halfZ, cz + halfZ);

  const topEyeY = getPuebloCubeTopEyeY();
  if(!Number.isFinite(topEyeY)) return false;
  obj.position.y = topEyeY;
  return true;
}

function resolvePuebloCubePenetrationXZ(x, z, radius = 0){
  const b = getPuebloCubeBoundsXZ(radius);
  if(!b) return { x, z, blocked:false };
  if(x < b.minX || x > b.maxX || z < b.minZ || z > b.maxZ) return { x, z, blocked:false };

  const dL = Math.abs(x - b.minX);
  const dR = Math.abs(b.maxX - x);
  const dN = Math.abs(z - b.minZ);
  const dS = Math.abs(b.maxZ - z);
  const minD = Math.min(dL, dR, dN, dS);

  if(minD === dL) return { x: b.minX, z, blocked:true };
  if(minD === dR) return { x: b.maxX, z, blocked:true };
  if(minD === dN) return { x, z: b.minZ, blocked:true };
  return { x, z: b.maxZ, blocked:true };
}

function applyPuebloCubeBlock(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS, snapToPlayerY = false){
  if(!PUEBLO_TEST_CUBE_ENABLE || !puebloTestCube) return false;
  if(!isPuebloCubeBlockedAtXZ(obj.position.x, obj.position.z, radius)) return false;

  const px = prevX, pz = prevZ;
  const nx = obj.position.x, nz = obj.position.z;

  const tryX = { x: nx, z: pz };
  const tryZ = { x: px, z: nz };

  const okX = !isPuebloCubeBlockedAtXZ(tryX.x, tryX.z, radius);
  const okZ = !isPuebloCubeBlockedAtXZ(tryZ.x, tryZ.z, radius);

  if(okX && !okZ){
    obj.position.x = tryX.x;
    obj.position.z = tryX.z;
  } else if(okZ && !okX){
    obj.position.x = tryZ.x;
    obj.position.z = tryZ.z;
  } else if(okX && okZ){
    const dxX = Math.abs(nx - tryX.x) + Math.abs(nz - tryX.z);
    const dxZ = Math.abs(nx - tryZ.x) + Math.abs(nz - tryZ.z);
    if(dxX <= dxZ){
      obj.position.x = tryX.x;
      obj.position.z = tryX.z;
    } else {
      obj.position.x = tryZ.x;
      obj.position.z = tryZ.z;
    }
  } else {
    const pushed = resolvePuebloCubePenetrationXZ(px, pz, radius);
    obj.position.x = pushed.x;
    obj.position.z = pushed.z;
  }

  if(snapToPlayerY){
    obj.position.y = heightAtWorldXZ(obj.position.x, obj.position.z) + PLAYER_EYE_HEIGHT;
  }
  return true;
}


function isInsidePuebloPlazaBounds(x, z, margin = 0){
  if(!PUEBLO_PLAN_WALLS_ENABLE || !puebloTestCube) return false;
  const ft = WORLD_UNITS_PER_FOOT;
  const centerX = puebloTestCube.position.x + (PUEBLO_PLAN_WALL_CENTER_X_FT * ft);
  const centerZ = puebloTestCube.position.z + (PUEBLO_PLAN_WALL_CENTER_Z_FT * ft);
  const half = (PUEBLO_PLAN_WALL_HALF_SIDE_FT * ft) + Math.max(0, margin);
  return Math.abs(x - centerX) <= half && Math.abs(z - centerZ) <= half;
}

function applyPuebloPlazaTruckOnlyAccess(obj, prevX, prevZ, radius = TRUCK_COLLISION_RADIUS){

  const ft = WORLD_UNITS_PER_FOOT;

  const centerZ = puebloTestCube.position.z + (PUEBLO_PLAN_WALL_CENTER_Z_FT * ft);
  const half = PUEBLO_PLAN_WALL_HALF_SIDE_FT * ft;
  const doorHalf = PUEBLO_PLAN_WALL_ENTRANCE_HALF_FT * ft;
  const southWallZ = centerZ - half;

  // Restrict only the doorway crossing itself (south entrance lane),
  // so approach movement over the outer plaza foundation remains free.
  const xPad = Math.max(0, radius * 0.5);
  const zPad = Math.max(0, radius * 0.35);
  const inDoorLaneNow = Math.abs(obj.position.x - centerX) <= (doorHalf + xPad);
  const inDoorLanePrev = Math.abs(prevX - centerX) <= (doorHalf + xPad);
  const crossedDoorPlaneIntoPlaza = (prevZ < (southWallZ - zPad)) && (obj.position.z >= (southWallZ - zPad));

  if(crossedDoorPlaneIntoPlaza && (inDoorLaneNow || inDoorLanePrev)){
    obj.position.x = prevX;
    obj.position.z = prevZ;
    showPlazaTruckRestrictionMessage();
    return true;
  }

  return false;
}

function isPuebloPlanWallBlockedAtXZ(x, z, radius = 0){
  if(!PUEBLO_PLAN_WALLS_ENABLE || !puebloPlanWallsGroup || !puebloPlanWallsGroup.children.length) return false;

  for(const wall of puebloPlanWallsGroup.children){
    if(!wall || !wall.geometry || !wall.geometry.parameters) continue;

    const halfX = ((wall.geometry.parameters.width || PUEBLO_PLAN_WALL_THICKNESS) * 0.5) + Math.max(0, radius);
    const halfZ = ((wall.geometry.parameters.depth || PUEBLO_PLAN_WALL_THICKNESS) * 0.5) + Math.max(0, radius);
    const dx = x - wall.position.x;
    const dz = z - wall.position.z;
    const c = Math.cos(-wall.rotation.y);
    const si = Math.sin(-wall.rotation.y);
    const lx = (dx * c) - (dz * si);
    const lz = (dx * si) + (dz * c);

    if(Math.abs(lx) <= halfX && Math.abs(lz) <= halfZ) return true;
  }

  return false;
}

function getTunnelInteriorSideBlockTopEyeYAtXZ(x, z, radius = 0){
  if(!TUNNEL_INTERIOR_SIDE_BLOCKS_ENABLE || !tunnelInteriorSideBlockColliders.length) return -Infinity;

  const rr = Math.max(0, radius);
  let bestTopY = -Infinity;

  for(const c of tunnelInteriorSideBlockColliders){
    if(!c) continue;
    const dx = x - c.x;
    const dz = z - c.z;
    const co = Math.cos(-c.rotY);
    const si = Math.sin(-c.rotY);
    const lx = (dx * co) - (dz * si);
    const lz = (dx * si) + (dz * co);

    if(Math.abs(lx) <= (c.halfX + rr) && Math.abs(lz) <= (c.halfZ + rr)){
      if(Number.isFinite(c.topY) && c.topY > bestTopY) bestTopY = c.topY;
    }
  }

  if(!Number.isFinite(bestTopY)) return -Infinity;
  return bestTopY + PLAYER_EYE_HEIGHT;
}

function isTunnelInteriorSideBlockBlockedAtXZ(x, z, radius = 0, eyeY = null){
  if(!TUNNEL_INTERIOR_SIDE_BLOCKS_ENABLE || !tunnelInteriorSideBlockColliders.length) return false;

  const rr = Math.max(0, radius);
  const eps = 0.08 * WORLD_UNITS_PER_FOOT;
  const stepUp = Math.max(0, TUNNEL_INTERIOR_SIDE_BLOCK_STEP_UP_FT * WORLD_UNITS_PER_FOOT);

  for(const c of tunnelInteriorSideBlockColliders){
    if(!c) continue;
    const dx = x - c.x;
    const dz = z - c.z;
    const co = Math.cos(-c.rotY);
    const si = Math.sin(-c.rotY);
    const lx = (dx * co) - (dz * si);
    const lz = (dx * si) + (dz * co);

    if(Math.abs(lx) <= (c.halfX + rr) && Math.abs(lz) <= (c.halfZ + rr)){
      if(Number.isFinite(eyeY) && Number.isFinite(c.topY)){
        const topEyeY = c.topY + PLAYER_EYE_HEIGHT;
        if(eyeY >= (topEyeY - stepUp - eps)) continue;
      }
      return true;
    }
  }

  return false;
}
