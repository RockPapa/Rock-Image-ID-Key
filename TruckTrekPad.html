<script type="module">
import * as THREE from "three";
import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";
import { EXRLoader } from "three/addons/loaders/EXRLoader.js";

const pickedAssetMap = new Map();
let pickedAssetUrlsToRevoke = [];

function normalizeAssetName(url){
  if(!url) return "";
  const noQuery = String(url).split("?")[0];
  const parts = noQuery.split("/");
  const last = parts[parts.length - 1] || "";
  return decodeURIComponent(last).toLowerCase();
}

function clearPickedAssets(){
  for(const u of pickedAssetUrlsToRevoke){
    try{ URL.revokeObjectURL(u); }catch(e){}
  }
  pickedAssetUrlsToRevoke = [];
  pickedAssetMap.clear();
}

function setPickedFolderFiles(files){
  clearPickedAssets();
  for(const file of files){
    const name = String(file.name || "").toLowerCase();
    if(!name) continue;
    const url = URL.createObjectURL(file);
    pickedAssetUrlsToRevoke.push(url);
    if(!pickedAssetMap.has(name)) pickedAssetMap.set(name, url);
  }
}

function resolveAssetUrl(url){
  if(!pickedAssetMap.size) return url;
  const name = normalizeAssetName(url);
  if(!name) return url;
  return pickedAssetMap.get(name) || url;
}

window.addEventListener("beforeunload", clearPickedAssets);

const _origTextureLoad = THREE.TextureLoader.prototype.load;
THREE.TextureLoader.prototype.load = function(url, onLoad, onProgress, onError){
  return _origTextureLoad.call(this, resolveAssetUrl(url), onLoad, onProgress, onError);
};

await new Promise((resolve)=>{
  const btn = document.getElementById("btnPickFolder");
  const input = document.getElementById("folderInput");
  if(!btn || !input){ resolve(); return; }

  // Hosted builds (GitHub Pages / web server) should load directly from TEX_DIR.
  // Local file:// development keeps the manual folder picker workflow.
  const hostedWeb = /^https?:$/i.test(String(location.protocol || ""));
  if(hostedWeb){
    btn.style.display = "none";
    resolve();
    return;
  }

  const choose = ()=>{
    input.value = "";
    input.click();
  };
  btn.addEventListener("click", choose);
  input.addEventListener("change", (e)=>{
    const files = Array.from((e && e.target && e.target.files) ? e.target.files : []);
    if(!files.length){
      btn.textContent = "Load TRUCK RESCUE FILES";
      return;
    }
    setPickedFolderFiles(files);
    btn.style.display = "none";
    resolve();
  });
});

function _setPlayerPositionToXZ(x, z, label = "checkpoint"){
  const obj = controls && typeof controls.getObject === "function" ? controls.getObject() : null;
  if(!obj) return;
  const groundY = heightAtWorldXZ(x, z);
  obj.position.set(x, (Number.isFinite(groundY) ? groundY : 0) + PLAYER_EYE_HEIGHT, z);
  velY = 0;
  onGround = true;
  lKeyJumpLungePending = false;
  initialSpawnLockReleased = true;
  initialSpawnLockUntilMs = 0;
  if(label) hudLine("🧭 Respawned at <code>" + label + "</code>.");
}

function getCurrentJourneyStage(){
  if(alienObjectiveMode === "destination_green" || MINI_MAP_SHOW_GREEN_SQUARE || tunnelExitGoddessEncounterDone || tunnelExitGoddessEncounterActive){
    return 4; // fire ring / green objective
  }
  if(alienObjectiveMode === "destination_orange" || MINI_MAP_SHOW_ORANGE_SQUARE || orangeObjectiveReached){
    return 3; // tunnel cave run
  }
  if(alienObjectiveMode === "destination_blue" || MINI_MAP_SHOW_BLUE_SQUARE || hasReachedFountainPlaza()){
    return 2; // fountain plaza
  }
  return 1; // kill aliens
}

function respawnPlayerToPreviousStage(){
  if(deathRespawnInProgress) return;
  deathRespawnInProgress = true;

  const stage = getCurrentJourneyStage();
  const prevStage = Math.max(1, stage - 1);

  lowZoneStuckTimer = 0.0;
  lowZoneRestickGraceTimer = 0.0;
  hideBanner();

  if(tunnelExitGoddessVoiceAudio){
    try{ tunnelExitGoddessVoiceAudio.pause(); tunnelExitGoddessVoiceAudio.currentTime = 0; }catch(e){}
  }
  tunnelExitGoddessEncounterActive = false;

  if(prevStage === 3){
    MINI_MAP_SHOW_BLUE_SQUARE = false;
    MINI_MAP_SHOW_ORANGE_SQUARE = true;
    MINI_MAP_SHOW_GREEN_SQUARE = false;
    orangeObjectiveReached = false;
    tunnelExitGoddessEncounterDone = false;
    tunnelExitGoddessVoiceHasPlayed = false;
    setAlienObjectiveMode("destination_orange");
    setAlienObjectiveVisible(true);
    teleportToMinimapSquare("goddess");
    hudLine("💀 Health depleted. Returned to <code>Level 3: Tunnel Cave</code> (goddess checkpoint).");
  } else if(prevStage === 2){
    if(stage === 3){
      MINI_MAP_SHOW_BLUE_SQUARE = false;
      MINI_MAP_SHOW_ORANGE_SQUARE = true;
      MINI_MAP_SHOW_GREEN_SQUARE = false;
      orangeObjectiveReached = false;
      tunnelExitGoddessEncounterDone = false;
      tunnelExitGoddessVoiceHasPlayed = false;
      setAlienObjectiveMode("destination_orange");
      setAlienObjectiveVisible(true);
      teleportToMinimapSquare("goddess");
      hudLine("💀 Health depleted. Returned to <code>Level 3: Tunnel Cave</code> (goddess checkpoint).");
    } else {
      MINI_MAP_SHOW_BLUE_SQUARE = true;
      MINI_MAP_SHOW_ORANGE_SQUARE = false;
      MINI_MAP_SHOW_GREEN_SQUARE = false;
      orangeObjectiveReached = false;
      tunnelExitGoddessEncounterDone = false;
      tunnelExitGoddessVoiceHasPlayed = false;
      setAlienObjectiveMode("destination_blue");
      setAlienObjectiveVisible(true);
      teleportToMinimapSquare("blue");
      hudLine("💀 Health depleted. Returned to <code>Level 2: Fountain Plaza</code>.");
    }
  } else {
    MINI_MAP_SHOW_BLUE_SQUARE = false;
    MINI_MAP_SHOW_ORANGE_SQUARE = false;
    MINI_MAP_SHOW_GREEN_SQUARE = false;
    orangeObjectiveReached = false;
    tunnelExitGoddessEncounterDone = false;
    tunnelExitGoddessVoiceHasPlayed = false;
    clearTargets();
    createTargets();
    setAlienObjectiveMode("combat");
    setAlienObjectiveVisible(true);
    _setPlayerPositionToXZ(AVATRUCK_SPAWN_X, AVATRUCK_SPAWN_Z, "Level 1 spawn");
    hudLine("💀 Health depleted. Returned to <code>Level 1: Kill Aliens</code>.");
  }

  setPlayerHealthPct(100);
  deathRespawnInProgress = false;
}


function setPlayerHealthPct(pct){
  playerHealthPct = Math.max(0, Math.min(100, Number(pct) || 0));
  if(healthFill) healthFill.style.width = playerHealthPct + "%";
  if(healthValue) healthValue.textContent = Math.round(playerHealthPct) + "%";
}

function adjustPlayerHealthPct(delta){
  const prevHealth = playerHealthPct;
  setPlayerHealthPct(playerHealthPct + (Number(delta) || 0));

  if(prevHealth > 0 && playerHealthPct <= 0){
    respawnPlayerToPreviousStage();
    return;
  }

  const crossedTruckFireThreshold = prevHealth >= TRUCK_FIRE_HEALTH_THRESHOLD_PCT && playerHealthPct < TRUCK_FIRE_HEALTH_THRESHOLD_PCT;
  if(!crossedTruckFireThreshold) return;

  const obj = controls.getObject();
  const p = (truckPlane && truckPlane.position) ? truckPlane.position : (obj ? obj.position : null);
  if(!p) return;

  if(canUseTruckFireFeatureAt(p.x, p.z)){
    triggerTruckFireEffect();
  }
}

function setAlienObjectiveVisible(visible){
  if(!alienObjectiveWrap) return;
  alienObjectiveWrap.style.display = visible ? "block" : "none";
}

function setAlienObjectiveMode(mode){
  const normalizedMode = mode === "destination"
    ? "destination_blue"
    : mode;
  alienObjectiveMode = normalizedMode;

  if(alienObjectiveTitleEl){
    alienObjectiveTitleEl.textContent = normalizedMode === "destination_orange"
      ? "GO TO THE ORANGE SQUAR ON THE MINIMAP"
      : normalizedMode === "destination_green"
        ? "GO TO THE GREEN SQUARE ON THE MINIMAP"
        : normalizedMode === "destination_blue"
          ? "GO TO THE BLUE SQUARE ON THE MINIMAP"
          : "YOU MUST KILL ALL THE ALIENS";
  }
  if(alienObjectiveCountsEl){
    alienObjectiveCountsEl.style.display = normalizedMode === "combat" ? "block" : "none";
  }
}

function updateLowZoneStuckState(dt){
  if(!LOW_ZONE_STUCK_ENABLE){
    if(lowZoneStuckTimer > 0) hideBanner();
    lowZoneStuckTimer = 0.0;
    lowZoneRestickGraceTimer = 0.0;
    lowZoneWasInside = null;
    return;
  }
  if(lowZoneRestickGraceTimer > 0){
    lowZoneRestickGraceTimer = Math.max(0, lowZoneRestickGraceTimer - dt);
  }

  if(lowZoneStuckTimer > 0){
    lowZoneStuckTimer = Math.max(0, lowZoneStuckTimer - dt);
    if(lowZoneStuckTimer === 0){
      hideBanner();
      lowZoneRestickGraceTimer = LOW_ZONE_RESTICK_GRACE_SEC;
    }
  }

  if(!terrainReady || !elevationZones) return;

  const obj = controls.getObject();
  if(!obj) return;

  const x = obj.position.x;
  const z = obj.position.z;
  const y = heightAtWorldXZ(x, z);
  const low = computeLowerZoneRange();

  const inLowZone = !isWaterAtXZ(x, z) && y >= low.minY && y <= low.maxY;

  if(lowZoneWasInside === null){
    lowZoneWasInside = inLowZone;
    return;
  }

  const shouldStick = inLowZone && lowZoneStuckTimer <= 0 && lowZoneRestickGraceTimer <= 0;
  if(shouldStick){
    adjustPlayerHealthPct(-LOW_ZONE_STUCK_HEALTH_PCT);
    showBanner("⛔ <b>STUCK</b> &nbsp; -5% HEALTH");

function cardinalFromHeading(heading){

  if (heading < 67.5) return "NE";
  if (heading < 112.5) return "E";
  if (heading < 157.5) return "SE";
  if (heading < 202.5) return "S";
  if (heading < 247.5) return "SW";

function buildMiniMapHeightLayer(){
  if(miniMapHeightReady) return true;
  if(!miniMapCanvas || !terrainReady || !hmData || !hmW || !hmH) return false;

  const w = miniMapCanvas.width;
  const h = miniMapCanvas.height;
  miniMapHeightCanvas = document.createElement("canvas");
  miniMapHeightCanvas.width = w;
  miniMapHeightCanvas.height = h;
  const ctx = miniMapHeightCanvas.getContext("2d");
  if(!ctx) return false;

  const img = ctx.createImageData(w, h);
  const a = img.data;

  for(let py = 0; py < h; py++){
    const v = py / Math.max(1, h - 1);
    const hy = Math.floor(v * (hmH - 1));
    for(let px = 0; px < w; px++){
      const u = px / Math.max(1, w - 1);
      const hx = Math.floor(u * (hmW - 1));
      const i = (hy * hmW + hx) * 4;
      const n = hmData[i] / 255;

      const idx = (py * w + px) * 4;
      const r = Math.floor(18 + (n * 142));
      const g = Math.floor(30 + (n * 164));
      const b = Math.floor(24 + (n * 118));
      a[idx + 0] = r;
      a[idx + 1] = g;
      a[idx + 2] = b;
      a[idx + 3] = 255;
    }
  }

  ctx.putImageData(img, 0, 0);
  miniMapHeightReady = true;
  return true;
}

function worldToMiniCell(x, z){
  const u = clamp01((x / GROUND_SIZE) + 0.5);
  const v = clamp01((z / GROUND_SIZE) + 0.5);
  const gx = Math.max(0, Math.min(MINI_MAP_GRID - 1, Math.floor(u * MINI_MAP_GRID)));
  const gy = Math.max(0, Math.min(MINI_MAP_GRID - 1, Math.floor(v * MINI_MAP_GRID)));
  return { gx, gy, u, v };
}

function markMiniMapVisited(x, z){
  const c = worldToMiniCell(x, z);
  const idx = (c.gy * MINI_MAP_GRID) + c.gx;
  if(miniMapVisited[idx] === 0){
    miniMapVisited[idx] = 1;
    miniMapVisitedCount += 1;
  }
}

    const s = 6;
    miniMapCtx.fillStyle = "rgba(255, 143, 38, 0.98)";
    miniMapCtx.fillRect(tx - (s * 0.5), ty - (s * 0.5), s, s);
  }

const p = worldToMiniCell(playerX, playerZ);
const px = p.u * w;
const py = p.v * h;

// Fixed marker: dark green square at AV X -1000, Z 81.
if(MINI_MAP_SHOW_GREEN_SQUARE){

}

  const yawDeg = THREE.MathUtils.radToDeg(truckYaw || 0);

function pickPreferredFemaleVoice(){
  if(!("speechSynthesis" in window)) return null;
  const voices = window.speechSynthesis.getVoices() || [];
  if(!voices.length) return null;

  const femaleHints = ["female", "woman", "zira", "susan", "samantha", "victoria", "karen", "moira", "ava", "allison", "aria"];
  const englishVoices = voices.filter(v => /^en(-|_|$)/i.test(v.lang || ""));
  const pool = englishVoices.length ? englishVoices : voices;

  for(const v of pool){
    const n = String(v.name || "").toLowerCase();
    if(femaleHints.some(h => n.includes(h))) return v;
  }

  return pool[0] || null;
}

function speakFemaleNarration(text, rate = PUEBLO_FOUNTAIN_PLAZA_VOICE_RATE, pitch = PUEBLO_FOUNTAIN_PLAZA_VOICE_PITCH, volume = PUEBLO_FOUNTAIN_PLAZA_VOICE_VOL){
  if(!("speechSynthesis" in window) || typeof SpeechSynthesisUtterance === "undefined"){
    if(!plazaVoiceWarnedUnavailable){
      hudLine("⚠️ Browser voice unavailable for plaza narration.");
      plazaVoiceWarnedUnavailable = true;
    }
    return;
  }

  const speakNow = ()=>{
    try{
      const chosen = pickPreferredFemaleVoice();
      const parts = String(text || "").match(/[^.!?]+[.!?]*/g) || [String(text || "")];
      const lines = parts.map(s => s.trim()).filter(Boolean);
      const pitchOffsets = [0.00, 0.10, -0.04, 0.12, 0.02];
      const rateOffsets = [0.00, 0.02, -0.01, 0.015, 0.005];

      window.speechSynthesis.cancel();
      for(let i = 0; i < lines.length; i++){
        const utter = new SpeechSynthesisUtterance(lines[i]);
        const pOff = pitchOffsets[i % pitchOffsets.length];
        const rOff = rateOffsets[i % rateOffsets.length];
        utter.rate = Math.max(0.55, Math.min(1.25, rate + rOff));
        utter.pitch = Math.max(0.75, Math.min(1.7, pitch + pOff));
        utter.volume = volume;
        if(chosen) utter.voice = chosen;
        window.speechSynthesis.speak(utter);
      }
    }catch(e){}
  };

  const voices = window.speechSynthesis.getVoices() || [];
  if(voices.length){
    speakNow();
  } else {
    const onVoices = ()=>{
      window.speechSynthesis.removeEventListener("voiceschanged", onVoices);
      speakNow();
    };
    window.speechSynthesis.addEventListener("voiceschanged", onVoices, { once:true });
    setTimeout(speakNow, 250);
  }
}

function setupFountainPlazaVoiceGain(){
  if(!fountainPlazaVoiceAudio) return;
  if(fountainPlazaVoiceSource || fountainPlazaVoiceGain) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  try{

    fountainPlazaVoiceHighpass = fountainPlazaVoiceCtx.createBiquadFilter();

    fountainPlazaVoiceHighpass.frequency.value = 165;

    fountainPlazaVoicePresence = fountainPlazaVoiceCtx.createBiquadFilter();
    fountainPlazaVoicePresence.type = "highshelf";
    fountainPlazaVoicePresence.frequency.value = 3200;
    fountainPlazaVoicePresence.gain.value = 3.5;

    fountainPlazaVoiceGain = fountainPlazaVoiceCtx.createGain();
    fountainPlazaVoiceGain.gain.value = PUEBLO_FOUNTAIN_PLAZA_VOICE_FILE_GAIN;

    fountainPlazaVoiceWetGain = fountainPlazaVoiceCtx.createGain();
    fountainPlazaVoiceWetGain.gain.value = 0.14; // subtle wet mix

    fountainPlazaVoiceDelay = fountainPlazaVoiceCtx.createDelay(0.4);
    fountainPlazaVoiceDelay.delayTime.value = 0.12;

    fountainPlazaVoiceFeedback = fountainPlazaVoiceCtx.createGain();
    fountainPlazaVoiceFeedback.gain.value = 0.20;

    fountainPlazaVoiceSource.connect(fountainPlazaVoiceHighpass);
    fountainPlazaVoiceHighpass.connect(fountainPlazaVoicePresence);

    fountainPlazaVoicePresence.connect(fountainPlazaVoiceGain);

    fountainPlazaVoicePresence.connect(fountainPlazaVoiceDelay);
    fountainPlazaVoiceDelay.connect(fountainPlazaVoiceFeedback);
    fountainPlazaVoiceFeedback.connect(fountainPlazaVoiceDelay);
    fountainPlazaVoiceDelay.connect(fountainPlazaVoiceWetGain);
    fountainPlazaVoiceWetGain.connect(fountainPlazaVoiceGain);

    fountainPlazaVoiceGain.connect(fountainPlazaVoiceCtx.destination);
  }catch(e){}
}

    toBlueSquareAudioGain = null;
  }

  if(!toBlueSquareAudio) initToBlueSquareAudio();

          toBlueSquareAudioPending = true;
          if(!toBlueSquareAudioRetryArmed){
            toBlueSquareAudioRetryArmed = true;

              toBlueSquareAudioRetryArmed = false;
              if(!toBlueSquareAudioPending) return;
              tryPlay();

            document.body.addEventListener("click", retry, { once:true });
            document.body.addEventListener("pointerdown", retry, { once:true });
            window.addEventListener("keydown", retry, { once:true });
            window.addEventListener("keyup", retry, { once:true });
            window.addEventListener("touchstart", retry, { once:true });
          }
        });
      } else {
        toBlueSquareAudioPending = false;
      }
    }catch(e){
      toBlueSquareAudioPending = true;
      if(!toBlueSquareAudioRetryArmed){
        toBlueSquareAudioRetryArmed = true;
        const retry = ()=>{
          toBlueSquareAudioRetryArmed = false;
          if(!toBlueSquareAudioPending) return;
          tryPlay();
        };

/* =========================================================
   ✨ HIT PARTICLES (SAFE)
   - Tiny sparkle burst on hits (target cube + bad guy)
   - Very lightweight: THREE.Points, short lifetime, fades out
   ========================================================= */
const HIT_PARTICLES_ENABLE = true;
const HIT_PARTICLE_COUNT   = 22;   // 12–40
const HIT_PARTICLE_LIFE    = 0.35; // seconds
const HIT_PARTICLE_SPEED   = 6.5;  // world units/sec
const HIT_PARTICLE_SIZE    = 10.0; // pixels (PointsMaterial.size)

const hitBursts = []; // { points, vels: Float32Array, life, maxLife, baseOpacity }

function spawnHitBurst(worldPos, colorHex=0xffffff){
  if (!HIT_PARTICLES_ENABLE) return;

  const count = HIT_PARTICLE_COUNT;
  const positions = new Float32Array(count * 3);
  const vels      = new Float32Array(count * 3);

  // random burst in a small sphere
  for (let i=0; i<count; i++){
    const k = i*3;
    const theta = Math.random() * Math.PI * 2;
    const u = Math.random() * 2 - 1;          // -1..1
    const r = Math.cbrt(Math.random()) * 0.22; // compact radius

    const s = Math.sqrt(1 - u*u);
    const dx = r * s * Math.cos(theta);
    const dy = r * u;
    const dz = r * s * Math.sin(theta);

    positions[k+0] = worldPos.x + dx;
    positions[k+1] = worldPos.y + dy;
    positions[k+2] = worldPos.z + dz;

    // velocity direction (normalized) * speed with a bit of upward bias
    const vx = dx;
    const vy = dy + 0.35;
    const vz = dz;
    const len = Math.max(0.0001, Math.hypot(vx, vy, vz));
    const sp = HIT_PARTICLE_SPEED * (0.45 + Math.random()*0.75);

    vels[k+0] = (vx/len) * sp;
    vels[k+1] = (vy/len) * sp;
    vels[k+2] = (vz/len) * sp;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

  const mat = new THREE.PointsMaterial({
    color: colorHex,
    size: HIT_PARTICLE_SIZE,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.95,
    depthWrite: false
  });

  const pts = new THREE.Points(geo, mat);
  pts.renderOrder = 998; // above most things, below truck draw-on-top
  scene.add(pts);

  hitBursts.push({
    points: pts,
    vels,
    life: HIT_PARTICLE_LIFE,
    maxLife: HIT_PARTICLE_LIFE,
    baseOpacity: mat.opacity
  });
}

function updateHitBursts(dt){

  if (!HIT_PARTICLES_ENABLE) return;
  for (let i = hitBursts.length - 1; i >= 0; i--){
    const b = hitBursts[i];
    b.life -= dt;

    const geo = b.points.geometry;
    const pos = geo.attributes.position;
    const a = pos.array;

    // simple movement + tiny gravity
    for (let j=0; j<a.length; j+=3){
      b.vels[j+1] -= 12.0 * dt; // gravity
      a[j+0] += b.vels[j+0] * dt;
      a[j+1] += b.vels[j+1] * dt;
      a[j+2] += b.vels[j+2] * dt;
    }
    pos.needsUpdate = true;

    // fade out
    const t = Math.max(0, b.life / b.maxLife);
    b.points.material.opacity = b.baseOpacity * t;

    if (b.life <= 0){
      scene.remove(b.points);
      b.points.geometry.dispose();
      b.points.material.dispose();
      hitBursts.splice(i, 1);
    }
  }
}

function applyDayNightBlend(t){
  const k = THREE.MathUtils.clamp(t, 0, 1);

  sun.color.copy(__daySunColor).lerp(__nightSunColor, k);
  sun.intensity = THREE.MathUtils.lerp(SUN_INTENSITY, NIGHT_SUN_INTENSITY, k);
  sun.position.set(
    THREE.MathUtils.lerp(DAY_SUN_POS.x, 120, k),
    THREE.MathUtils.lerp(DAY_SUN_POS.y, 90, k),
    THREE.MathUtils.lerp(DAY_SUN_POS.z, 80, k)
  );

  hemi.intensity = THREE.MathUtils.lerp(HEMI_INTENSITY, NIGHT_HEMI_INTENSITY, k);
  hemi.color.copy(__dayHemiColor).lerp(__nightHemiColor, k);
  hemi.groundColor.copy(__dayHemiGroundColor).lerp(__nightHemiGroundColor, k);

  skyMat.uniforms.topColor.value.copy(__daySkyTopColor).lerp(__nightSkyTopColor, k);
  skyMat.uniforms.bottomColor.value.copy(__daySkyBottomColor).lerp(__nightSkyBottomColor, k);
  scene.fog.color.copy(__dayFogColor).lerp(__nightFogColor, k);
  renderer.toneMappingExposure = THREE.MathUtils.lerp(EXPOSURE, NIGHT_EXPOSURE, k);
}

function sampleTerrainMinYForRect(cx, cz, width, depth, sampleSteps = PUEBLO_TEST_CUBE_FOOTPRINT_SAMPLES){
  const steps = Math.max(2, Math.floor(sampleSteps));
  const halfW = width * 0.5;
  const halfD = depth * 0.5;
  let minY = Infinity;

  for(let iz = 0; iz <= steps; iz++){
    const z = cz - halfD + (depth * (iz / steps));
    for(let ix = 0; ix <= steps; ix++){
      const x = cx - halfW + (width * (ix / steps));
      const y = heightAtWorldXZ(x, z);
      if(y < minY) minY = y;
    }
  }

  if(!Number.isFinite(minY)) return heightAtWorldXZ(cx, cz);
  return minY;
}

  const high = computeUpperZoneRange();
  const r = Math.max(PUEBLO_TEST_CUBE_MIN_SPAWN_DIST, PUEBLO_TEST_CUBE_SEARCH_RADIUS);
  const step = Math.max(4, PUEBLO_TEST_CUBE_SEARCH_STEP);

  let bestHigh = null;
  let bestAny = null;

  for(let dz = -r; dz <= r; dz += step){
    for(let dx = -r; dx <= r; dx += step){
      const dist = Math.hypot(dx, dz);
      if(dist < PUEBLO_TEST_CUBE_MIN_SPAWN_DIST || dist > r) continue;

      const x = spawnX + dx;
      const z = spawnZ + dz;
      if(isWaterAtXZ(x, z)) continue;

      const y = heightAtWorldXZ(x, z);
      const score = y - (dist * 0.10); // favor high points but keep placement near spawn

      if(y >= high.minY){
        if(!bestHigh || score > bestHigh.score){
          bestHigh = { x, z, y, score };
        }
      } else if(!bestAny || score > bestAny.score){
        bestAny = { x, z, y, score };
      }
    }
  }

  if(bestHigh) return bestHigh;
  if(bestAny) return bestAny;

  const y0 = heightAtWorldXZ(spawnX, spawnZ);
  return { x: spawnX, z: spawnZ, y: y0, score: y0 };
}

function _buildTunnelInteriorSideBlocksSignature(list){
  const fmt = (n)=> Number.isFinite(n) ? Number(n).toFixed(2) : "nan";
  return list.map((it)=>{
    const pts = it.points || [];
    const a = pts[0] || {x:0,y:0,z:0};
    const b = pts[pts.length - 1] || {x:0,y:0,z:0};
    return [pts.length, fmt(it.innerRadius), fmt(a.x), fmt(a.y), fmt(a.z), fmt(b.x), fmt(b.y), fmt(b.z)].join(":");
  }).join("|");
}

function ensureTunnelInteriorBlackFloor(){
  if(!TUNNEL_INTERIOR_FLOOR_BLACK_ENABLE){
    clearTunnelInteriorBlackFloor();
    return;
  }

  const active = [];
  const addIfActive = (points, innerRadius)=>{
    if(points && points.length > 1 && Number.isFinite(innerRadius) && innerRadius > 0){
      active.push({ points, innerRadius });
    }
  };

  addIfActive(spawnFullCylPathWorld, spawnFullCylInnerRadius);
  addIfActive(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius);
  addIfActive(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius);
  addIfActive(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius);

  if(!active.length){
    clearTunnelInteriorBlackFloor();
    return;
  }

  const signature = "floor_v4|" + _buildTunnelInteriorSideBlocksSignature(active);
  if(tunnelInteriorFloorBlackGroup && tunnelInteriorFloorBlackKey === signature && tunnelInteriorFloorBlackGroup.parent === scene){
    return;
  }

  clearTunnelInteriorBlackFloor();

  const ft = WORLD_UNITS_PER_FOOT;
  const inset = Math.max(0, TUNNEL_INTERIOR_FLOOR_INSET_FT * ft);
  const lift = Math.max(0.001, TUNNEL_INTERIOR_FLOOR_LIFT_FT * ft);
  const thick = Math.max(0.10 * ft, TUNNEL_INTERIOR_FLOOR_THICKNESS_FT * ft);
  const overhang = Math.max(0, TUNNEL_INTERIOR_FLOOR_OVERHANG_FT * ft);
  const lenStep = Math.max(0.5 * ft, TUNNEL_INTERIOR_FLOOR_LENGTH_SEGMENT_FT * ft);

  const mat = new THREE.MeshStandardMaterial({
    color: 0x000000,
    roughness: 0.98,
    metalness: 0.0
  });

  const group = new THREE.Group();
  group.name = "tunnelInteriorBlackFloor";
  group.frustumCulled = false;

  for(const item of active){
    const points = item.points;
    const innerRadius = item.innerRadius;
    const floorWidth = Math.max(0.5 * ft, (innerRadius * 2.0) - (2.0 * inset) + (2.0 * overhang));

    for(let i = 0; i < (points.length - 1); i++){
      const a = points[i];
      const b = points[i + 1];
      const seg = new THREE.Vector3().subVectors(b, a);
      const segLen = seg.length();
      if(segLen <= (0.10 * ft)) continue;

      const lenCount = Math.max(1, Math.ceil(segLen / lenStep));

      for(let li = 0; li < lenCount; li++){
        const l0 = li / lenCount;
        const l1 = (li + 1) / lenCount;

        const p0 = new THREE.Vector3(
          a.x + ((b.x - a.x) * l0),
          a.y + ((b.y - a.y) * l0),
          a.z + ((b.z - a.z) * l0)
        );
        const p1 = new THREE.Vector3(
          a.x + ((b.x - a.x) * l1),
          a.y + ((b.y - a.y) * l1),
          a.z + ((b.z - a.z) * l1)
        );

        const sub = new THREE.Vector3().subVectors(p1, p0);
        const depth = Math.max(0.25 * ft, sub.length() + (0.05 * ft));
        if(depth <= 1e-6) continue;

        const axis = sub.clone().normalize();
        const yaw = Math.atan2(axis.x, axis.z);
        const mid = new THREE.Vector3().copy(p0).addScaledVector(sub, 0.5);

        const gy = heightAtWorldXZ(mid.x, mid.z);
        const groundY = Number.isFinite(gy) ? gy : (mid.y - innerRadius);

        const geo = new THREE.BoxGeometry(floorWidth, thick, depth);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(mid.x, groundY + lift - (thick * 0.5), mid.z);
        mesh.rotation.y = yaw;
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        mesh.frustumCulled = false;
        mesh.renderOrder = 2;
        group.add(mesh);
      }
    }
  }

  scene.add(group);
  tunnelInteriorFloorBlackGroup = group;
  tunnelInteriorFloorBlackKey = signature;
}

function _getPrimaryTunnelMouthFrame(){
  const pick = (points, innerRadius)=>{
    if(!points || points.length < 2 || !Number.isFinite(innerRadius) || innerRadius <= 0) return null;

    const a = points[0];
    const b = points[1];
    const dir = new THREE.Vector3().subVectors(b, a);
    if(dir.lengthSq() <= 1e-8) return null;
    dir.normalize();

    const up = new THREE.Vector3(0, 1, 0);
    let side = new THREE.Vector3().crossVectors(up, dir);
    if(side.lengthSq() <= 1e-10) side = new THREE.Vector3(1, 0, 0).cross(dir);
    if(side.lengthSq() <= 1e-10) return null;
    side.normalize();

    const gy = heightAtWorldXZ(a.x, a.z);
    const baseY = Number.isFinite(gy) ? gy : (a.y - innerRadius);

    return {
      mouth: new THREE.Vector3(a.x, baseY, a.z),
      dir,
      side,
      up,
      innerRadius
    };
  };

  return (
    pick(spawnFullCylPathWorld, spawnFullCylInnerRadius) ||
    pick(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius) ||
    pick(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius) ||
    pick(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius) ||
    pick(spawnHalfCavePathWorld, (SPAWN_CAVE_DIAMETER_FT * 0.5 * WORLD_UNITS_PER_FOOT) - Math.max(0.05 * WORLD_UNITS_PER_FOOT, SPAWN_CAVE_WALL_THICKNESS_FT * WORLD_UNITS_PER_FOOT))
  );
}

function _getPrimaryTunnelFarMouthFrame(){
  const pick = (points, innerRadius)=>{
    if(!points || points.length < 2 || !Number.isFinite(innerRadius) || innerRadius <= 0) return null;

    const n = points.length;
    const a = points[n - 2];
    const b = points[n - 1];
    const dir = new THREE.Vector3().subVectors(b, a);
    if(dir.lengthSq() <= 1e-8) return null;
    dir.normalize();

    const up = new THREE.Vector3(0, 1, 0);
    let side = new THREE.Vector3().crossVectors(up, dir);
    if(side.lengthSq() <= 1e-10) side = new THREE.Vector3(1, 0, 0).cross(dir);
    if(side.lengthSq() <= 1e-10) return null;
    side.normalize();

    const gy = heightAtWorldXZ(b.x, b.z);
    const baseY = Number.isFinite(gy) ? gy : (b.y - innerRadius);

    return {
      mouth: new THREE.Vector3(b.x, baseY, b.z),
      dir,
      side,
      up,
      innerRadius
    };
  };

  return (
    pick(spawnFullCylPathWorld, spawnFullCylInnerRadius) ||
    pick(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius) ||
    pick(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius) ||

        }
      }
    );
  }

  const imgW = tunnelMouthSignTex?.image?.width || 0;
  const imgH = tunnelMouthSignTex?.image?.height || 0;
  const sig = [
    frame.mouth.x.toFixed(2), frame.mouth.y.toFixed(2), frame.mouth.z.toFixed(2),
    frame.dir.x.toFixed(3), frame.dir.y.toFixed(3), frame.dir.z.toFixed(3),
    frame.innerRadius.toFixed(2), String(imgW), String(imgH)
  ].join("|");

  if(tunnelMouthSignGroup && tunnelMouthSignKey === sig && tunnelMouthSignGroup.parent === scene){
    return;
  }

  clearTunnelMouthSign();

  const ft = WORLD_UNITS_PER_FOOT;
  let w = Math.max(2.0 * ft, TUNNEL_MOUTH_SIGN_WIDTH_FT * ft);
  let h = Math.max(1.0 * ft, TUNNEL_MOUTH_SIGN_HEIGHT_FT * ft);
  if(imgW > 0 && imgH > 0){
    h = w * (imgH / imgW);
  }

  const maxW = frame.innerRadius * 1.70;
  const maxH = frame.innerRadius * 0.80;
  const minW = frame.innerRadius * 1.05;
  const minH = frame.innerRadius * 0.42;

  const fit = Math.min(maxW / Math.max(1e-6, w), maxH / Math.max(1e-6, h), 1.0);
  if(Number.isFinite(fit) && fit > 0){
    w *= fit;
    h *= fit;
  }

  const grow = Math.max(minW / Math.max(1e-6, w), minH / Math.max(1e-6, h), 1.0);
  if(Number.isFinite(grow) && grow > 1.0){
    w *= grow;
    h *= grow;
  }

  const fit2 = Math.min(maxW / Math.max(1e-6, w), maxH / Math.max(1e-6, h), 1.0);
  if(Number.isFinite(fit2) && fit2 > 0){
    w *= fit2;
    h *= fit2;
  }

  w *= 1.5;
  h *= 1.5;

  const outYaw = Math.atan2(-frame.dir.x, -frame.dir.z);
  const outwardNudge = 0.75 * ft;
  const p = new THREE.Vector3().copy(frame.mouth)
    .addScaledVector(frame.dir, -outwardNudge)
    .addScaledVector(frame.up, (frame.innerRadius * 2.0) + (h * 0.56) - (7.0 * ft));

  const mat = new THREE.MeshStandardMaterial({
    map: tunnelMouthSignTex || null,
    color: tunnelMouthSignTex ? 0xffffff : 0xc8b17e,
    transparent: true,
    alphaTest: 0.22,
    side: THREE.DoubleSide,
    roughness: 0.9,
    metalness: 0.0
  });

  const group = new THREE.Group();
  group.name = "tunnelMouthSign";
  group.frustumCulled = false;

  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.position.copy(p);
  mesh.rotation.y = outYaw;
  mesh.castShadow = true;
  mesh.receiveShadow = false;
  mesh.frustumCulled = false;
  group.add(mesh);

  scene.add(group);
  tunnelMouthSignGroup = group;
  tunnelMouthSignKey = sig;
}

function getTunnelExitGoddessAnchor(){

  let anchor = null;
  tunnelExitGoddessGroup.traverse((node)=>{
    if(anchor || !node || !node.isMesh) return;

function ensureGoddessCopterMarker(){
  const anchor = getTunnelExitGoddessAnchor();
  if(!anchor){
    clearGoddessCopterMarker();
    return;
  }

  const dx = GREEN_SQUARE_MARKER_X - anchor.x;
  const dz = GREEN_SQUARE_MARKER_Z - anchor.z;
  const len = Math.hypot(dx, dz);
  if(len <= 1e-6){
    clearGoddessCopterMarker();
    return;
  }

  const ft = WORLD_UNITS_PER_FOOT;
  const dist = Math.max(1.0 * ft, GODDESS_TO_COPTER_MARKER_DIST_FT * ft);
  const ux = dx / len;
  const uz = dz / len;
  const side = GODDESS_COPTER_MARKER_RIGHT_SHIFT_FT * ft;
  const leftX = -uz;
  const leftZ = ux;
  const x = anchor.x + (ux * dist) + (leftX * side);
  const z = anchor.z + (uz * dist) + (leftZ * side);

  const w = Math.max(2.0 * ft, GODDESS_COPTER_MARKER_WIDTH_FT * ft);
  const h = Math.max(2.0 * ft, GODDESS_COPTER_MARKER_HEIGHT_FT * ft);
  const gy = heightAtWorldXZ(x, z);
  const y = (Number.isFinite(gy) ? gy : anchor.y) + (h * 0.5);

  const posKey = [x.toFixed(3), y.toFixed(3), z.toFixed(3), w.toFixed(3), h.toFixed(3)].join("|");
  if(goddessCopterMarker && goddessCopterMarker.parent === scene && goddessCopterMarkerPosKey === posKey){
    return;
  }

  if(!goddessCopterMarkerTex){
    goddessCopterMarkerTex = texLoader.load(
      TEX_DIR + GODDESS_COPTER_MARKER_FILE,
      (t)=>{
        t.colorSpace = THREE.SRGBColorSpace;
        t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
        goddessCopterMarkerPosKey = "";
      },
      undefined,
      ()=>{
        goddessCopterMarkerTex = null;
        if(!goddessCopterMarkerTexWarned){
          hudLine("⚠️ Missing goddess copter marker texture: <code>" + GODDESS_COPTER_MARKER_FILE + "</code>.");
          goddessCopterMarkerTexWarned = true;
        }
      }
    );
  }

  clearGoddessCopterMarker();

  const mat = new THREE.SpriteMaterial({
    map: goddessCopterMarkerTex || null,
    color: goddessCopterMarkerTex ? 0xffffff : 0xb5b5b5,
    transparent: true,
    depthWrite: false
  });
  const spr = new THREE.Sprite(mat);
  spr.scale.set(w, h, 1);
  spr.position.set(x, y, z);
  spr.renderOrder = 45;
  spr.frustumCulled = false;
  spr.userData.vehicleFile = GODDESS_COPTER_MARKER_FILE;
  spr.userData.tex = goddessCopterMarkerTex || null;
  spr.userData.collisionRadius = Math.max(2.0 * ft, GODDESS_COPTER_MARKER_COLLISION_RADIUS_FT * ft);

  scene.add(spr);
  goddessCopterMarker = spr;
  goddessCopterMarkerPosKey = posKey;
}

function ensureGoddessCopterBeacon(nowSec = 0){
  if(!GODDESS_COPTER_BEACON_ENABLE){
    clearGoddessCopterBeacon();
    return;
  }

  const copterActiveVehicle = (avatarMode !== "leggoman") && (currentVehicleFile === GODDESS_COPTER_MARKER_FILE);
  const markerVisible = !!(goddessCopterMarker && goddessCopterMarker.parent === scene && goddessCopterMarker.visible !== false);
  const canShowBeacon = tunnelExitGoddessEncounterDone && tunnelExitGoddessVoiceHasPlayed;
  if(!markerVisible || copterActiveVehicle || !canShowBeacon){
    clearGoddessCopterBeacon();
    return;
  }

  const ft = WORLD_UNITS_PER_FOOT;
  const shaftH = Math.max(6.0 * ft, GODDESS_COPTER_BEACON_SHAFT_HEIGHT_FT * ft);
  const arrowSize = Math.max(4.0 * ft, GODDESS_COPTER_BEACON_ARROW_SIZE_FT * ft);

  if(!goddessCopterBeaconGroup){
    const group = new THREE.Group();
    group.name = "goddessCopterBeacon";

    const shaftMat = new THREE.MeshStandardMaterial({
      color: 0xffef8a,
      emissive: 0xffd23f,
      emissiveIntensity: 1.3,
      roughness: 0.35,
      metalness: 0.08,
      transparent: true,
      opacity: 0.92,
      depthWrite: false
    });
    const shaftGeo = new THREE.CylinderGeometry(0.45 * ft, 0.45 * ft, shaftH, 10, 1, true);
    goddessCopterBeaconShaft = new THREE.Mesh(shaftGeo, shaftMat);
    goddessCopterBeaconShaft.position.set(0, 0, 0);
    goddessCopterBeaconShaft.renderOrder = 1500;
    goddessCopterBeaconShaft.frustumCulled = false;
    group.add(goddessCopterBeaconShaft);

    const arrowMat = new THREE.MeshStandardMaterial({
      color: 0xffc400,
      emissive: 0xff8a00,
      emissiveIntensity: 1.15,
      roughness: 0.28,
      metalness: 0.10,
      transparent: true,
      opacity: 0.96,
      depthWrite: false
    });
    const arrowGeo = new THREE.ConeGeometry(arrowSize * 0.34, arrowSize, 4);
    goddessCopterBeaconArrow = new THREE.Mesh(arrowGeo, arrowMat);
    goddessCopterBeaconArrow.rotation.x = Math.PI;
    goddessCopterBeaconArrow.position.set(0, -(shaftH * 0.5) - (arrowSize * 0.35), 0);
    goddessCopterBeaconArrow.renderOrder = 1501;
    goddessCopterBeaconArrow.frustumCulled = false;
    group.add(goddessCopterBeaconArrow);

    scene.add(group);
    goddessCopterBeaconGroup = group;
  }

  const bob = Math.sin((Number(nowSec) || 0) * 2.2) * (GODDESS_COPTER_BEACON_BOB_FT * ft);
  const worldY = goddessCopterMarker.position.y + (GODDESS_COPTER_BEACON_HEIGHT_FT * ft) + bob;
  goddessCopterBeaconGroup.position.set(goddessCopterMarker.position.x, worldY, goddessCopterMarker.position.z);

  if(goddessCopterBeaconArrow && goddessCopterBeaconArrow.material){
    const pulse = 1.0 + (Math.sin((Number(nowSec) || 0) * 4.5) * 0.25);
    goddessCopterBeaconArrow.material.emissiveIntensity = 1.05 * pulse;
  }
  if(goddessCopterBeaconShaft && goddessCopterBeaconShaft.material){
    const pulse = 1.0 + (Math.sin((Number(nowSec) || 0) * 3.4) * 0.2);
    goddessCopterBeaconShaft.material.emissiveIntensity = 1.15 * pulse;
  }
}

      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },

          tunnelMouthBoulder2TexWarned = true;
        }
      }
    );
  }

  const mat1 = new THREE.MeshStandardMaterial({
    map: tunnelMouthBoulderTex || null,
    color: tunnelMouthBoulderTex ? 0xffffff : 0x8a7b66,
    transparent: true,
    alphaTest: 0.2,
    side: THREE.DoubleSide,
    roughness: 0.92,
    metalness: 0.02
  });

  const mat2 = new THREE.MeshStandardMaterial({
    map: tunnelMouthBoulder2Tex || null,
    color: tunnelMouthBoulder2Tex ? 0xffffff : 0x8a7b66,
    transparent: true,
    alphaTest: 0.2,
    side: THREE.DoubleSide,
    roughness: 0.92,
    metalness: 0.02
  });

  const group = new THREE.Group();
  group.name = "tunnelMouthBoulders";
  group.frustumCulled = false;

  const ft = WORLD_UNITS_PER_FOOT;
  const r = Math.max(4.0 * ft, frame.innerRadius + (1.2 * ft));
  const base = TUNNEL_MOUTH_BOULDER_BASE_SIZE_FT * ft;
  const outYaw = Math.atan2(-frame.dir.x, -frame.dir.z);

  // Existing 5 boulders around rim.
  const rimLayout = [
    { sx: -0.95, sy: 0.02, sc: 1.00 },
    { sx:  0.95, sy: 0.02, sc: 1.00 },
    { sx: -0.62, sy: 0.72, sc: 0.92 },

      .addScaledVector(frame.side, it.sx * r)
      .addScaledVector(frame.up, it.sy * r);

    const w = base * it.sc;

    m.position.copy(p);
    m.rotation.y = outYaw;
    m.castShadow = true;
    m.receiveShadow = false;

    group.add(m);

  // 8 x boulder2 on both sides (4 per side) to obscure perfect tunnel silhouette.
  // Keep center opening clear by staying on side offsets beyond inner radius.

    { sign:  1, fwd: 0.86, up: 0.18, sc: 1.00 },
    { sign:  1, fwd: 1.18, up: 0.42, sc: 0.92 }
  ];

  for(let i = 0; i < Math.min(TUNNEL_MOUTH_BOULDER2_COUNT, sideLayout.length); i++){
    const it = sideLayout[i];
    const p = new THREE.Vector3().copy(frame.mouth)
      .addScaledVector(frame.side, it.sign * (r * 1.06))
      .addScaledVector(frame.dir, it.fwd * r)
      .addScaledVector(frame.up, it.up * r);

    const w = base * 0.94 * it.sc;
    const h = base * 0.84 * it.sc;
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat2.clone());
    m.position.copy(p);
    m.rotation.y = outYaw;
    m.castShadow = true;
    m.receiveShadow = false;
    m.frustumCulled = false;
    group.add(m);
  }

  scene.add(group);
  tunnelMouthBouldersGroup = group;
  tunnelMouthBouldersKey = signature;
}

function ensureTunnelMouthTrees(){
  if(!TUNNEL_MOUTH_TREES_ENABLE){
    clearTunnelMouthTrees();
    return;
  }

  const frame = _getPrimaryTunnelMouthFrame();
  if(!frame){
    clearTunnelMouthTrees();
    return;
  }

  const toSpawn = new THREE.Vector3(CAVE_ANCHOR_X - frame.mouth.x, 0, CAVE_ANCHOR_Z - frame.mouth.z);
  const visibleSign = (toSpawn.dot(frame.side) >= 0) ? 1 : -1;

  const signature = [
    frame.mouth.x.toFixed(2), frame.mouth.y.toFixed(2), frame.mouth.z.toFixed(2),
    frame.dir.x.toFixed(3), frame.dir.z.toFixed(3),
    frame.innerRadius.toFixed(2), String(visibleSign)
  ].join("|");

  if(tunnelMouthTreesGroup && tunnelMouthTreesKey === signature && tunnelMouthTreesGroup.parent === scene){
    return;
  }

  clearTunnelMouthTrees();

  if(!tunnelMouthTree1Tex){
    tunnelMouthTree1Tex = texLoader.load(
      TEX_DIR + LOW_TREE_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{ tunnelMouthTree1Tex = null; if(!tunnelMouthTreeTexWarned){ hudLine("⚠️ Missing tunnel-mouth tree texture(s): <code>" + LOW_TREE_FILE + "</code>/<code>" + LOW_TREE3_FILE + "</code>."); tunnelMouthTreeTexWarned = true; } }
    );
  }

  if(!tunnelMouthTree3Tex){
    tunnelMouthTree3Tex = texLoader.load(
      TEX_DIR + LOW_TREE3_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{ tunnelMouthTree3Tex = null; if(!tunnelMouthTreeTexWarned){ hudLine("⚠️ Missing tunnel-mouth tree texture(s): <code>" + LOW_TREE_FILE + "</code>/<code>" + LOW_TREE3_FILE + "</code>."); tunnelMouthTreeTexWarned = true; } }
    );
  }

  const mkMat = (tex)=> new THREE.MeshStandardMaterial({
    map: tex || null,
    color: tex ? 0xffffff : 0x7c8f58,
    transparent: true,
    alphaTest: 0.18,
    side: THREE.DoubleSide,
    roughness: 0.92,
    metalness: 0.0
  });

  const mat1 = mkMat(tunnelMouthTree1Tex);
  const mat3 = mkMat(tunnelMouthTree3Tex);

  const group = new THREE.Group();
  group.name = "tunnelMouthTrees";
  group.frustumCulled = false;

  const ft = WORLD_UNITS_PER_FOOT;
  const r = Math.max(5.0 * ft, frame.innerRadius + (2.0 * ft));
  const outYaw = Math.atan2(-frame.dir.x, -frame.dir.z);

  const sidePattern = [
    visibleSign, visibleSign, visibleSign, visibleSign, visibleSign,
    -visibleSign, -visibleSign, -visibleSign
  ];

  const placeTrees = (count, mat, size)=>{
    const wBase = size.w;
    const hBase = size.h;

    for(let i = 0; i < count; i++){
      const sign = sidePattern[i % sidePattern.length];
      const lane = i % 4;
      const f = 0.40 + (lane * 0.30); // keep trees offset away from cave opening
      const up = 0.05 + ((i % 2) * 0.16);
      const sideOffset = 1.26 + ((i % 3) * 0.12);

      const p = new THREE.Vector3().copy(frame.mouth)
        .addScaledVector(frame.side, sign * r * sideOffset)
        .addScaledVector(frame.dir, -f * r)
        .addScaledVector(frame.up, up * r);

      const gy = heightAtWorldXZ(p.x, p.z);
      const groundY = Number.isFinite(gy) ? gy : frame.mouth.y;

      const scale = 0.92 + ((i % 5) * 0.06);
      const w = wBase * scale;
      const h = hBase * scale;
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat.clone());
      m.position.set(p.x, groundY + (h * 0.5), p.z);
      m.rotation.y = outYaw;
      m.castShadow = true;
      m.receiveShadow = false;
      m.frustumCulled = false;
      group.add(m);
    }
  };

  placeTrees(TUNNEL_MOUTH_TREE1_COUNT, mat1, LOW_TREE_SIZE);
  placeTrees(TUNNEL_MOUTH_TREE3_COUNT, mat3, LOW_TREE3_SIZE);

  scene.add(group);
  tunnelMouthTreesGroup = group;
  tunnelMouthTreesKey = signature;
}

function _polylineLength(points){
  if(!points || points.length < 2) return 0;
  let len = 0;
  for(let i = 0; i < (points.length - 1); i++){
    len += points[i].distanceTo(points[i + 1]);
  }
  return len;
}

function _pointOnTunnelPolylineAtS(points, sTarget){
  if(!points || points.length < 2) return null;
  let run = 0;
  const sNeed = Math.max(0, sTarget);

  for(let i = 0; i < (points.length - 1); i++){
    const a = points[i];
    const b = points[i + 1];
    const ab = new THREE.Vector3().subVectors(b, a);
    const L = ab.length();
    if(L <= 1e-8) continue;

    const nextRun = run + L;
    if(sNeed <= nextRun || i === (points.length - 2)){
      const t = THREE.MathUtils.clamp((sNeed - run) / L, 0, 1);
      const p = new THREE.Vector3().copy(a).addScaledVector(ab, t);
      const axis = ab.clone().normalize();
      const up = new THREE.Vector3(0, 1, 0);
      let side = new THREE.Vector3().crossVectors(up, axis);
      if(side.lengthSq() <= 1e-10) side = new THREE.Vector3(1, 0, 0).cross(axis);
      if(side.lengthSq() <= 1e-10) side = new THREE.Vector3(1, 0, 0);
      side.normalize();
      return { point: p, axis, side, s: run + (L * t), totalLength: _polylineLength(points) };
    }
    run = nextRun;
  }
  return null;
}

function _getPrimaryReaperTunnelPath(){
  const candidates = [];
  const add = (points, innerRadius)=>{
    if(points && points.length > 1 && Number.isFinite(innerRadius) && innerRadius > 0){
      const len = _polylineLength(points);
      candidates.push({ points, innerRadius, len });
    }
  };

  add(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius);
  add(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius);
  add(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius);
  add(spawnFullCylPathWorld, spawnFullCylInnerRadius);

  if(!candidates.length) return null;
  candidates.sort((a,b)=> b.len - a.len);
  return candidates[0];
}

function ensureTunnelReapers(){
  if(!TUNNEL_REAPER_ENABLE){
    clearTunnelReapers();
    return;
  }

  const info = _getPrimaryReaperTunnelPath();
  if(!info){
    clearTunnelReapers();
    return;
  }

  const ft = WORLD_UNITS_PER_FOOT;
  const startS = TUNNEL_REAPER_START_FT * ft;
  const spacing = TUNNEL_REAPER_SPACING_FT * ft;
  const span = TUNNEL_REAPER_SPAN_FT * ft;
  const count = Math.max(1, Math.floor(span / Math.max(1e-4, spacing)) + 1);

  const sig = [
    info.len.toFixed(2), info.innerRadius.toFixed(2),
    info.points[0].x.toFixed(1), info.points[0].z.toFixed(1),
    info.points[info.points.length - 1].x.toFixed(1), info.points[info.points.length - 1].z.toFixed(1)
  ].join("|");

  if(tunnelReaperGroup && tunnelReaperKey === sig && tunnelReaperGroup.parent === scene) return;

  clearTunnelReapers();
  finalTunnelReaperPenaltyApplied = false;

  if(!tunnelReaperTex){
    tunnelReaperTex = texLoader.load(
      TEX_DIR + TUNNEL_REAPER_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{
        tunnelReaperTex = null;
        if(!tunnelReaperTexWarned){
          hudLine("⚠️ Missing reaper texture: <code>" + TUNNEL_REAPER_FILE + "</code>.");
          tunnelReaperTexWarned = true;
        }
      }
    );
  }

  const mat = new THREE.MeshStandardMaterial({
    map: tunnelReaperTex || null,
    color: tunnelReaperTex ? 0xffffff : 0x6f6f6f,
    transparent: true,
    alphaTest: 0.24,
    side: THREE.DoubleSide,
    roughness: 0.9,
    metalness: 0.0
  });

  const group = new THREE.Group();
  group.name = "tunnelReapers";
  group.frustumCulled = false;

  const w = TUNNEL_REAPER_WIDTH_FT * ft;
  const h = TUNNEL_REAPER_HEIGHT_FT * ft;
  const inset = Math.max(0, TUNNEL_REAPER_SIDE_INSET_FT * ft);
  const sideOffset = Math.max((w * 0.45), info.innerRadius - inset - (w * 0.35));
  const inwardStepPct = 0.08; // first pair unchanged, then 8% more inward per pair

  for(let i = 0; i < count; i++){
    const isFinalPair = (i === (count - 1));
    const pairSideOffset = sideOffset * Math.max(0.2, 1 - (i * inwardStepPct));
    const centerPairSideOffset = Math.max(w * 0.55, 1.2 * WORLD_UNITS_PER_FOOT); // side-by-side in lane center
    const sNow = startS + (i * spacing);
    const sample = _pointOnTunnelPolylineAtS(info.points, sNow);
    if(!sample) continue;

    const outYaw = Math.atan2(-sample.axis.x, -sample.axis.z);

    for(const sign of [-1, 1]){
      const useOffset = isFinalPair ? centerPairSideOffset : pairSideOffset;
      const px = sample.point.x + (sample.side.x * useOffset * sign);
      const pz = sample.point.z + (sample.side.z * useOffset * sign);
      const gy = heightAtWorldXZ(px, pz);
      const y = (Number.isFinite(gy) ? gy : sample.point.y) + (h * 0.5);

      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat.clone());
      mesh.position.set(px, y, pz);
      mesh.rotation.y = outYaw;
      mesh.castShadow = true;
      mesh.receiveShadow = false;
      mesh.frustumCulled = false;
      mesh.userData.isFinalTunnelReaperPair = isFinalPair;
      group.add(mesh);
    }
  }

  scene.add(group);
  tunnelReaperGroup = group;
  tunnelReaperKey = sig;
}

function getTunnelReaperCenterSpawnPosition(aheadWorld){
  const obj = controls.getObject();
  const yaw = truckYaw;
  const fwdX = -Math.sin(yaw);
  const fwdZ = -Math.cos(yaw);

  let spawnX = obj.position.x + (fwdX * aheadWorld);
  let spawnZ = obj.position.z + (fwdZ * aheadWorld);

  const info = _getPrimaryReaperTunnelPath();
  if(info && info.points && info.points.length > 1){
    const closest = _closestPointOnTunnelPolyline(info.points, new THREE.Vector3(obj.position.x, obj.position.y, obj.position.z));
    if(closest){
      const sample = _pointOnTunnelPolylineAtS(info.points, closest.s + Math.max(0, aheadWorld));
      if(sample && sample.point){
        spawnX = sample.point.x;
        spawnZ = sample.point.z;
      }
    }
  }

  return { x: spawnX, z: spawnZ };
}

function spawnTunnelReaperBoss(playerX, playerY, playerZ){
  const ft = WORLD_UNITS_PER_FOOT;

  if(!tunnelReaperBossTex){
    tunnelReaperBossTex = texLoader.load(
      TEX_DIR + TUNNEL_REAPER_BOSS_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{
        tunnelReaperBossTex = null;
        if(!tunnelReaperBossTexWarned){
          hudLine("⚠️ Missing reaper boss texture: <code>" + TUNNEL_REAPER_BOSS_FILE + "</code>.");
          tunnelReaperBossTexWarned = true;
        }
      }
    );
  }

  clearTunnelReaperBoss();
  clearTunnelReaperBoss2();
  clearTunnelReaperBoss3();
  clearTunnelReaperBoss4();

  const imgW = tunnelReaperBossTex?.image?.width || 0;
  const imgH = tunnelReaperBossTex?.image?.height || 0;

  let w = Math.max(6.0 * ft, TUNNEL_REAPER_BOSS_WIDTH_FT * ft);
  let h = Math.max(6.0 * ft, TUNNEL_REAPER_BOSS_HEIGHT_FT * ft);
  if(imgW > 0 && imgH > 0){
    const aspect = imgW / Math.max(1e-6, imgH);
    if(aspect >= 1.0){
      h = Math.max(6.0 * ft, h);
      w = h * aspect;
    } else {
      w = Math.max(6.0 * ft, w);
      h = w / Math.max(1e-6, aspect);
    }
  }

  const mat = new THREE.MeshStandardMaterial({
    map: tunnelReaperBossTex || null,
    color: tunnelReaperBossTex ? 0xffffff : 0x8d8d8d,
    transparent: true,
    alphaTest: 0.24,
    side: THREE.DoubleSide,
    roughness: 0.9,
    metalness: 0.0
  });

  tunnelReaperBoss = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  tunnelReaperBoss.castShadow = true;
  tunnelReaperBoss.receiveShadow = false;
  tunnelReaperBoss.frustumCulled = false;
  tunnelReaperBoss.renderOrder = 35;
  tunnelReaperBossHitCount = 0;
  tunnelReaperBossFollowTruck = true;
  scene.add(tunnelReaperBoss);

  const obj = controls.getObject();
  const ahead = Math.max(1.0 * ft, TUNNEL_REAPER_BOSS_AHEAD_FT * ft);
  const spawnPos = getTunnelReaperCenterSpawnPosition(ahead);
  const spawnX = spawnPos.x;
  const spawnZ = spawnPos.z;
  const gy = heightAtWorldXZ(spawnX, spawnZ);
  const yBase = Number.isFinite(gy) ? gy : (obj.position.y - PLAYER_EYE_HEIGHT);
  tunnelReaperBoss.position.set(spawnX, yBase + (h * 0.5) + (TUNNEL_REAPER_BOSS_HEIGHT_OFFSET_FT * ft), spawnZ);
  tunnelReaperBoss2TriggerPoint = { x: obj.position.x, z: obj.position.z };
  tunnelReaperBoss2Triggered = false;
  tunnelReaperBoss4TriggerPoint = null;
  tunnelReaperBoss4Triggered = false;
  postReaperHeadlightDimStartPoint = null;
  postReaperHeadlightDimArmed = false;
  postReaperHeadlightDimApplied = false;
  postReaperCaveBlackoutApplied = false;

  updateTunnelReaperBoss(0, false);
  hudLine("☠️ Reaper2 spawned <code>30ft</code> ahead and is moving toward the truck.");
  playTunnelReaperFollowupAudio();
}

}

function updateTunnelReaperBoss(dt = 0, shouldApproach = false){
  if(!tunnelReaperBoss || !tunnelReaperBossFollowTruck) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const speed = Math.max(0.05 * ft, MOVE_SPEED * TUNNEL_REAPER_BOSS_STOPPED_APPROACH_SPEED_SCALE);
  const stopDist = Math.max(1.0 * ft, TUNNEL_REAPER_BOSS_STOP_DISTANCE_FT * ft);
  const obj = controls.getObject();

  const targetX = obj.position.x;
  const targetZ = obj.position.z;
  const dx = targetX - tunnelReaperBoss.position.x;
  const dz = targetZ - tunnelReaperBoss.position.z;
  const dist = Math.hypot(dx, dz);

  if(shouldApproach && dt > 0 && dist > stopDist){
    const step = Math.min(dist - stopDist, speed * dt);
    if(step > 0.0001){
      const inv = 1 / Math.max(1e-6, dist);
      tunnelReaperBoss.position.x += dx * inv * step;
      tunnelReaperBoss.position.z += dz * inv * step;
    }
  }

  const h = tunnelReaperBoss.geometry?.parameters?.height || (TUNNEL_REAPER_BOSS_HEIGHT_FT * ft);
  const gy = heightAtWorldXZ(tunnelReaperBoss.position.x, tunnelReaperBoss.position.z);
  const yBase = Number.isFinite(gy) ? gy : (obj.position.y - PLAYER_EYE_HEIGHT);
  tunnelReaperBoss.position.y = yBase + (h * 0.5) + (TUNNEL_REAPER_BOSS_HEIGHT_OFFSET_FT * ft);
  tunnelReaperBoss.lookAt(camera.position.x, tunnelReaperBoss.position.y, camera.position.z);
}

function applyTunnelReaperBossContactPenalty(obj, radius = TRUCK_COLLISION_RADIUS){
  if(!obj) return;

  const ox = obj.position.x;
  const oz = obj.position.z;
  const baseR = Math.max(0.2, radius);

  const checkBoss = (boss, latchName)=>{
    if(!boss || !boss.visible) {
      if(latchName === "r2") tunnelReaperBossContactApplied = false;
      if(latchName === "r3") tunnelReaperBoss2ContactApplied = false;
      if(latchName === "r4") tunnelReaperBoss3ContactApplied = false;
      if(latchName === "r5") tunnelReaperBoss4ContactApplied = false;
      return;
    }

    const w = boss.geometry?.parameters?.width || (TUNNEL_REAPER_BOSS_WIDTH_FT * WORLD_UNITS_PER_FOOT);
    const h = boss.geometry?.parameters?.height || (TUNNEL_REAPER_BOSS_HEIGHT_FT * WORLD_UNITS_PER_FOOT);
    const bossR = Math.max(0.7, Math.min(w, h) * 0.30);
    const hitR = baseR + bossR;
    const dx = ox - boss.position.x;
    const dz = oz - boss.position.z;
    const hit = ((dx * dx) + (dz * dz)) <= (hitR * hitR);

    let applied = false;
    if(latchName === "r2") applied = tunnelReaperBossContactApplied;
    if(latchName === "r3") applied = tunnelReaperBoss2ContactApplied;
    if(latchName === "r4") applied = tunnelReaperBoss3ContactApplied;
    if(latchName === "r5") applied = tunnelReaperBoss4ContactApplied;

    if(hit && !applied){
      if(latchName === "r2") tunnelReaperBossContactApplied = true;
      if(latchName === "r3") tunnelReaperBoss2ContactApplied = true;
      if(latchName === "r4") tunnelReaperBoss3ContactApplied = true;
      if(latchName === "r5") tunnelReaperBoss4ContactApplied = true;
      adjustPlayerHealthPct(-15);
      spawnHitBurst(new THREE.Vector3(boss.position.x, boss.position.y, boss.position.z), 0xff7a7a);
    } else if(!hit && applied){
      if(latchName === "r2") tunnelReaperBossContactApplied = false;
      if(latchName === "r3") tunnelReaperBoss2ContactApplied = false;
      if(latchName === "r4") tunnelReaperBoss3ContactApplied = false;

function fireTunnelReaperBoss4RedBall(){
  if(!tunnelReaperBoss4 || !tunnelReaperBoss4.visible) return;

  const target = getActiveVehicleTargetPos();
  const start = tunnelReaperBoss4.position.clone();
  const dir = target.sub(start);
  if(dir.lengthSq() < 1e-8) return;
  dir.normalize();
  dir.y = Math.max(-0.18, Math.min(0.18, dir.y));
  dir.normalize();

  const geom = new THREE.SphereGeometry(TUNNEL_REAPER_BOSS_4_SHOT_RADIUS, 12, 12);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xff3b30,
    emissive: 0x9a1111,
    emissiveIntensity: 0.8
  });
  const ball = new THREE.Mesh(geom, mat);
  ball.position.copy(start);
  scene.add(ball);

  tunnelReaperBoss4RedBalls.push({
    mesh: ball,
    vel: dir.multiplyScalar(TUNNEL_REAPER_BOSS_4_SHOT_SPEED),
    life: TUNNEL_REAPER_BOSS_4_SHOT_LIFE_SEC
  });
}

function updateTunnelReaperBoss4RedBalls(dt){
  for(let i = tunnelReaperBoss4RedBalls.length - 1; i >= 0; i--){
    const b = tunnelReaperBoss4RedBalls[i];
    const prevX = b.mesh.position.x;
    const prevZ = b.mesh.position.z;
    b.mesh.position.addScaledVector(b.vel, dt);
    b.life -= dt;

    if(applyPuebloCubeBlock(b.mesh, prevX, prevZ, TUNNEL_REAPER_BOSS_4_SHOT_RADIUS, false) || applySpawnHalfCaveWallBlock(b.mesh, prevX, prevZ, TUNNEL_REAPER_BOSS_4_SHOT_RADIUS)){
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      tunnelReaperBoss4RedBalls.splice(i, 1);
      continue;
    }

    let hitTruck = false;
    const p = b.mesh.position;
    if(truckPlane){
      __tmpBox.setFromObject(truckPlane);
      const cp = __tmpBox.clampPoint(p, __tmpV3);
      const d2Truck = cp.distanceToSquared(p);
      hitTruck = d2Truck <= (TUNNEL_REAPER_BOSS_4_SHOT_RADIUS * TUNNEL_REAPER_BOSS_4_SHOT_RADIUS * 4.0);
    } else {
      const targetPos = controls.getObject().position;
      const tx = p.x - targetPos.x;
      const ty = p.y - targetPos.y;
      const tz = p.z - targetPos.z;
      hitTruck = ((tx*tx) + (ty*ty) + (tz*tz)) <= 1.0;
    }

    if(hitTruck){
      tunnelReaperBoss4RedHitStreak += 1;
      if(tunnelReaperBoss4RedHitStreak >= TUNNEL_REAPER_BOSS_4_HITS_FOR_DAMAGE){
        tunnelReaperBoss4RedHitStreak = 0;
        adjustPlayerHealthPct(-TUNNEL_REAPER_BOSS_4_DAMAGE_PCT);
      }
      spawnHitBurst(p, 0xff4a4a);
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      tunnelReaperBoss4RedBalls.splice(i, 1);
      continue;
    }

    if(b.life <= 0){
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      tunnelReaperBoss4RedBalls.splice(i, 1);
    }
  }
}

function ensureTunnelInteriorSideBlocks(){
  if(!TUNNEL_INTERIOR_SIDE_BLOCKS_ENABLE){
    clearTunnelInteriorSideBlocks();
    return;
  }

  const active = [];
  const addIfActive = (points, innerRadius)=>{
    if(points && points.length > 1 && Number.isFinite(innerRadius) && innerRadius > 0){
      active.push({ points, innerRadius });
    }
  };

  addIfActive(spawnFullCylPathWorld, spawnFullCylInnerRadius);
  addIfActive(spawnCurvedCylPathWorld, spawnCurvedCylInnerRadius);
  addIfActive(spawnCurvedCylOppPathWorld, spawnCurvedCylOppInnerRadius);
  addIfActive(spawnMegaCavePathWorld, spawnMegaCaveInnerRadius);

  if(!active.length){
    clearTunnelInteriorSideBlocks();
    return;
  }

  const signature = _buildTunnelInteriorSideBlocksSignature(active);
  if(tunnelInteriorSideBlocksGroup && tunnelInteriorSideBlocksKey === signature && tunnelInteriorSideBlocksGroup.parent === scene){
    return;
  }

  clearTunnelInteriorSideBlocks();
  tunnelInteriorSideBlockColliders = [];

  const ft = WORLD_UNITS_PER_FOOT;
  const blockWidth = Math.max(0.10 * ft, TUNNEL_INTERIOR_SIDE_BLOCK_WIDTH_FT * ft);
  const blockHeight = Math.max(0.10 * ft, TUNNEL_INTERIOR_SIDE_BLOCK_HEIGHT_FT * ft);
  const colliderHalfX = Math.max(0.20 * ft, (blockWidth * 0.5) * TUNNEL_INTERIOR_SIDE_BLOCK_COLLIDER_WIDTH_SCALE);
  const inset = Math.max(0, TUNNEL_INTERIOR_SIDE_BLOCK_INSET_FT * ft);

  const mat = new THREE.MeshBasicMaterial({
    color: TUNNEL_INTERIOR_SIDE_BLOCK_COLOR
  });

  const group = new THREE.Group();
  group.name = "tunnelInteriorSideBlocks";
  group.frustumCulled = false;

  for(const item of active){
    const points = item.points;
    const innerRadius = item.innerRadius;

    for(let i = 0; i < (points.length - 1); i++){
      const a = points[i];
      const b = points[i + 1];
      const seg = new THREE.Vector3().subVectors(b, a);
      const segLen = seg.length();
      if(segLen <= (0.15 * ft)) continue;

      const axis = seg.clone().normalize();
      const up = new THREE.Vector3(0, 1, 0);
      let side = new THREE.Vector3().crossVectors(up, axis);
      if(side.lengthSq() <= 1e-10){
        side = new THREE.Vector3(1, 0, 0).cross(axis);
      }
      if(side.lengthSq() <= 1e-10) continue;
      side.normalize();

      const offset = Math.max(blockWidth * 0.5, innerRadius - (blockWidth * 0.5) - inset);
      const yaw = Math.atan2(axis.x, axis.z);

      const segStep = Math.max(0.5 * ft, TUNNEL_INTERIOR_SIDE_BLOCK_SEGMENT_FT * ft);
      const segCount = Math.max(1, Math.ceil(segLen / segStep));
      const overlap = Math.max(0, TUNNEL_INTERIOR_SIDE_BLOCK_OVERLAP_FT * ft);

      for(let si = 0; si < segCount; si++){
        const t0 = si / segCount;
        const t1 = (si + 1) / segCount;
        const m = (t0 + t1) * 0.5;

        const mid = new THREE.Vector3().copy(a).addScaledVector(seg, m);
        const depth = Math.max(0.20 * ft, (segLen / segCount) + overlap);

        const leftX = mid.x + (side.x * offset);
        const leftZ = mid.z + (side.z * offset);
        const rightX = mid.x - (side.x * offset);
        const rightZ = mid.z - (side.z * offset);

        const leftGroundY = heightAtWorldXZ(leftX, leftZ);
        const rightGroundY = heightAtWorldXZ(rightX, rightZ);
        const leftY = (Number.isFinite(leftGroundY) ? leftGroundY : (mid.y - innerRadius)) + (blockHeight * 0.5) + (0.02 * ft);
        const rightY = (Number.isFinite(rightGroundY) ? rightGroundY : (mid.y - innerRadius)) + (blockHeight * 0.5) + (0.02 * ft);

        const geo = new THREE.BoxGeometry(blockWidth, blockHeight, depth);

        const leftMesh = new THREE.Mesh(geo, mat);
        leftMesh.position.set(leftX, leftY, leftZ);
        leftMesh.rotation.y = yaw;
        leftMesh.castShadow = false;
        leftMesh.receiveShadow = false;
        leftMesh.renderOrder = 3;
        group.add(leftMesh);
        tunnelInteriorSideBlockColliders.push({
          x: leftX,
          z: leftZ,
          rotY: yaw,
          halfX: colliderHalfX,
          halfZ: depth * 0.5,
          topY: leftY + (blockHeight * 0.5)
        });

        const rightMesh = new THREE.Mesh(geo.clone(), mat);
        rightMesh.position.set(rightX, rightY, rightZ);
        rightMesh.rotation.y = yaw;
        rightMesh.castShadow = false;
        rightMesh.receiveShadow = false;
        rightMesh.renderOrder = 3;
        group.add(rightMesh);
        tunnelInteriorSideBlockColliders.push({
          x: rightX,
          z: rightZ,
          rotY: yaw,
          halfX: colliderHalfX,
          halfZ: depth * 0.5,
          topY: rightY + (blockHeight * 0.5)
        });
      }
    }
  }

  scene.add(group);
  tunnelInteriorSideBlocksGroup = group;
  tunnelInteriorSideBlocksKey = signature;
}

function buildSpawnHalfCavePathWorld(){
  if(!SPAWN_CAVE_ENABLE) return null;

  const ft = WORLD_UNITS_PER_FOOT;
  const radius = (SPAWN_CAVE_DIAMETER_FT * 0.5) * ft;
  const step = Math.max(1.0 * ft, SPAWN_CAVE_SEGMENT_FT * ft);
  const totalLen = Math.max(step, SPAWN_CAVE_LENGTH_FT * ft);
  const steps = Math.max(1, Math.ceil(totalLen / step));
  const heading = THREE.MathUtils.degToRad(SPAWN_CAVE_HEADING_DEG);

  // Terrain-following centerline: keeps half-cylinder sitting on ground along its full length.
  const centerX = CAVE_ANCHOR_X + (Math.cos(heading) * SPAWN_CAVE_START_OFFSET_FT * ft);
  const centerZ = CAVE_ANCHOR_Z + (Math.sin(heading) * SPAWN_CAVE_START_OFFSET_FT * ft);
  const halfLen = totalLen * 0.5;

  const startX = centerX - (Math.cos(heading) * halfLen);
  const startZ = centerZ - (Math.sin(heading) * halfLen);

  const pts = [];
  for(let i = 0; i <= steps; i++){
    const d = Math.min(totalLen, i * step);
    const x = startX + (Math.cos(heading) * d);
    const z = startZ + (Math.sin(heading) * d);
    const groundY = heightAtWorldXZ(x, z);
    const y = (Number.isFinite(groundY) ? groundY : 0) - (SPAWN_CAVE_BURY_FT * ft);
    pts.push(new THREE.Vector3(x, y, z));
  }
  return pts;
}

function ensureSpawnHalfCave(){
  if(!SPAWN_CAVE_ENABLE){
    spawnHalfCavePathWorld = null;
    if(spawnHalfCaveGroup && spawnHalfCaveGroup.parent === scene) scene.remove(spawnHalfCaveGroup);
    return;
  }

  if(!terrainReady) return;

  if(spawnHalfCaveGroup && spawnHalfCaveGroup.parent === scene && spawnHalfCavePathWorld && spawnHalfCavePathWorld.length > 1){
    return;
  }

  const pointsWorld = buildSpawnHalfCavePathWorld();
  if(!pointsWorld || pointsWorld.length < 2) return;
  spawnHalfCavePathWorld = pointsWorld;

  const ft = WORLD_UNITS_PER_FOOT;
  const radius = (SPAWN_CAVE_DIAMETER_FT * 0.5) * ft;
  const wallThickness = Math.max(0.05 * ft, SPAWN_CAVE_WALL_THICKNESS_FT * ft);
  const innerRadius = Math.max(0.25 * ft, radius - wallThickness);

  if(spawnHalfCaveGroup && spawnHalfCaveGroup.parent === scene) scene.remove(spawnHalfCaveGroup);

  spawnHalfCaveGroup = new THREE.Group();
  spawnHalfCaveGroup.name = "spawnHalfCave";
  spawnHalfCaveGroup.frustumCulled = false;

  if(!spawnHalfCaveInnerTex && SPAWN_CAVE_INNER_TEXTURE_FILE){
    spawnHalfCaveInnerTex = texLoader.load(
      TEX_DIR + SPAWN_CAVE_INNER_TEXTURE_FILE,
      (t)=>{
        t.colorSpace = THREE.SRGBColorSpace;
        t.wrapS = t.wrapT = THREE.RepeatWrapping;
      },
      undefined,
      ()=>{
        if(!spawnHalfCaveInnerTexWarned){
          hudLine("⚠️ Missing cave inner texture: <code>" + SPAWN_CAVE_INNER_TEXTURE_FILE + "</code> (using black).");
          spawnHalfCaveInnerTexWarned = true;
        }
      }
    );
  }

  const caveOuterMap = getCaveExteriorRockTexture();
  const caveInnerMap = makeCaveInteriorMap(Math.max(1.0 * ft, SPAWN_CAVE_SEGMENT_FT * ft), 0.5 * Math.PI * innerRadius);

  const outerMat = new THREE.MeshStandardMaterial({
    map: caveOuterMap || null,
    color: 0x6f727a,
    roughness: 0.86,
    metalness: 0.02,
    side: THREE.FrontSide
  });

  const innerMat = new THREE.MeshStandardMaterial({
    color: caveInnerMap ? 0xffffff : 0x000000,
    map: caveInnerMap || null,
    roughness: 0.98,
    metalness: 0.0,
    side: THREE.BackSide
  });

  for(let i = 0; i < (pointsWorld.length - 1); i++){
    const a = pointsWorld[i];
    const b = pointsWorld[i + 1];
    const seg = new THREE.Vector3().subVectors(b, a);
    const segLen = seg.length();
    if(segLen <= 1e-5) continue;

    const segDir = seg.clone().normalize();
    const mid = new THREE.Vector3().copy(a).addScaledVector(seg, 0.5);
    const yaw = Math.atan2(segDir.z, segDir.x);

    const outerGeo = new THREE.CylinderGeometry(radius, radius, segLen + (0.40 * ft), 64, 1, true, 0, Math.PI);
    const innerGeo = new THREE.CylinderGeometry(innerRadius, innerRadius, segLen + (0.45 * ft), 64, 1, true, 0, Math.PI);
    remapCaveUVForCylinderInterior(innerGeo, segLen + (0.45 * ft));

    const outerMesh = new THREE.Mesh(outerGeo, outerMat);
    const innerMesh = new THREE.Mesh(innerGeo, innerMat);

    outerMesh.rotation.z = Math.PI * 0.5;
    innerMesh.rotation.z = Math.PI * 0.5;
    outerMesh.rotation.y = yaw;
    innerMesh.rotation.y = yaw;

    outerMesh.castShadow = true;
    outerMesh.receiveShadow = true;
    innerMesh.castShadow = false;
    innerMesh.receiveShadow = true;

    outerMesh.position.copy(mid);
    innerMesh.position.copy(mid);

    spawnHalfCaveGroup.add(outerMesh);
    spawnHalfCaveGroup.add(innerMesh);
  }

  scene.add(spawnHalfCaveGroup);

  if(!spawnHalfCaveAnnounced){
    hudLine("🕳️ Spawn cave segment created: <code>50ft long x 10ft diameter</code> (half-hollow cylinder, black inner wall collision surface).");
    spawnHalfCaveAnnounced = true;
  }
}

function getCaveExteriorRockTexture(){
  if(caveOuterRockTex) return caveOuterRockTex;
  caveOuterRockTex = texLoader.load(
    TEX_DIR + CAVE_EXTERIOR_TEXTURE_FILE,
    (t)=>{
      t.colorSpace = THREE.SRGBColorSpace;
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
    },
    undefined,
    ()=>{
      caveOuterRockTex = null;
      if(!caveOuterRockTexWarned){
        hudLine("⚠️ Missing cave exterior texture: <code>" + CAVE_EXTERIOR_TEXTURE_FILE + "</code> (using fallback color).");
        caveOuterRockTexWarned = true;
      }
    }
  );
  return caveOuterRockTex;
}

function getCaveInteriorTexture(){
  if(caveInteriorTex) return caveInteriorTex;
  if(!CAVE_INTERIOR_TEXTURE_FILE) return null;
  caveInteriorTex = texLoader.load(
    TEX_DIR + CAVE_INTERIOR_TEXTURE_FILE,
    (t)=>{
      t.colorSpace = THREE.SRGBColorSpace;
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
    },
    undefined,
    ()=>{
      caveInteriorTex = null;
      if(!caveInteriorTexWarned){
        hudLine("⚠️ Missing cave interior texture: <code>" + CAVE_INTERIOR_TEXTURE_FILE + "</code> (using black).");
        caveInteriorTexWarned = true;
      }
    }
  );
  return caveInteriorTex;
}

function makeCaveInteriorMap(uWorld, vWorld){
  const base = getCaveInteriorTexture();
  if(!base) return null;

  const map = base.clone();
  map.colorSpace = THREE.SRGBColorSpace;
  map.wrapS = THREE.RepeatWrapping;
  map.wrapT = THREE.RepeatWrapping;
  map.anisotropy = Math.min(16, renderer.capabilities.getMaxAnisotropy());

  const uSpan = Math.max(1e-4, uWorld);
  const vSpan = Math.max(1e-4, vWorld);
  const tileU = Math.max(1.0 * WORLD_UNITS_PER_FOOT, CAVE_INTERIOR_TILE_WIDTH_FT * WORLD_UNITS_PER_FOOT);
  const repeatU = Math.max(1, Math.ceil(uSpan / tileU));
  const repeatV = Math.max(1, Math.ceil((vSpan * CAVE_INTERIOR_TEXTURE_ASPECT * repeatU) / uSpan));

  map.repeat.set(repeatU, repeatV);
  map.needsUpdate = true;
  return map;
}

function remapCaveUVForCylinderInterior(geo, lengthWorld){
  if(!geo || !geo.attributes || !geo.attributes.position || !geo.attributes.uv) return;
  const pos = geo.attributes.position;
  const uv = geo.attributes.uv;
  const len = Math.max(1e-4, lengthWorld);

  for(let i = 0; i < pos.count; i++){
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);
    const r = Math.hypot(x, z);

    const u = (y / len) + 0.5; // length axis
    const upDot = (r > 1e-6) ? (x / r) : 0.0; // local +X maps to world up after Z-rotation
    const v = Math.max(0.0, Math.min(1.0, Math.abs(upDot))); // sides=0, roof/floor center=1 (prevents lower-wall blur)

    uv.setXY(i, u, v);
  }

  uv.needsUpdate = true;
}

function remapCaveUVForTubeInterior(geo){
  if(!geo || !geo.attributes || !geo.attributes.uv || !geo.attributes.normal) return;
  const uv = geo.attributes.uv;
  const normal = geo.attributes.normal;

  for(let i = 0; i < uv.count; i++){
    const u = uv.getX(i); // tube geometry already maps U along path length
    const upDot = normal.getY(i);
    const v = Math.max(0.0, Math.min(1.0, Math.abs(upDot))); // sides=0, roof/floor center=1 (prevents lower-wall blur)
    uv.setXY(i, u, v);
  }

  uv.needsUpdate = true;
}

function ensureSpawnFullCylinder(){
  if(!SPAWN_FULL_CYL_ENABLE){
    if(spawnFullCylGroup && spawnFullCylGroup.parent === scene) scene.remove(spawnFullCylGroup);
    spawnFullCylPathWorld = null;
    spawnFullCylInnerRadius = 0.0;
    return;
  }

  if(!terrainReady) return;
  if(spawnFullCylGroup && spawnFullCylGroup.parent === scene) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const radius = (SPAWN_FULL_CYL_DIAMETER_FT * 0.5) * ft;
  const wallThickness = Math.max(0.05 * ft, SPAWN_FULL_CYL_WALL_THICKNESS_FT * ft);
  const innerRadius = Math.max(0.25 * ft, radius - wallThickness);
  const len = Math.max(2.0 * ft, SPAWN_FULL_CYL_LENGTH_FT * ft);
  const heading = THREE.MathUtils.degToRad(SPAWN_FULL_CYL_HEADING_DEG);

  const fwdX = Math.cos(heading);
  const fwdZ = Math.sin(heading);
  const rightX = -fwdZ;
  const rightZ = fwdX;

  const cx = CAVE_ANCHOR_X + (fwdX * SPAWN_FULL_CYL_OFFSET_FWD_FT * ft) + (rightX * SPAWN_FULL_CYL_OFFSET_RIGHT_FT * ft);
  const cz = CAVE_ANCHOR_Z + (fwdZ * SPAWN_FULL_CYL_OFFSET_FWD_FT * ft) + (rightZ * SPAWN_FULL_CYL_OFFSET_RIGHT_FT * ft);
  const groundY = heightAtWorldXZ(cx, cz);
  const cy = (Number.isFinite(groundY) ? groundY : 0) + radius - (SPAWN_FULL_CYL_BURY_FT * ft);

  const outerGeo = new THREE.CylinderGeometry(radius, radius, len, 72, 1, true, 0, Math.PI * 2);
  const innerGeo = new THREE.CylinderGeometry(innerRadius, innerRadius, len + (0.2 * ft), 72, 1, true, 0, Math.PI * 2);
  remapCaveUVForCylinderInterior(innerGeo, len + (0.2 * ft));

  const caveOuterMap = getCaveExteriorRockTexture();
  const caveInnerMap = makeCaveInteriorMap(len, 0.5 * Math.PI * innerRadius);

  const outerMat = new THREE.MeshStandardMaterial({
    map: caveOuterMap || null,
    color: 0x6f727a,
    roughness: 0.86,
    metalness: 0.02,
    side: THREE.FrontSide
  });

  const innerMat = new THREE.MeshStandardMaterial({
    color: caveInnerMap ? 0xffffff : 0x000000,
    map: caveInnerMap || null,
    roughness: 0.98,
    metalness: 0.0,
    side: THREE.BackSide
  });

  const outerMesh = new THREE.Mesh(outerGeo, outerMat);
  const innerMesh = new THREE.Mesh(innerGeo, innerMat);

  outerMesh.rotation.z = Math.PI * 0.5;
  innerMesh.rotation.z = Math.PI * 0.5;
  outerMesh.rotation.y = heading;
  innerMesh.rotation.y = heading;

  outerMesh.position.set(cx, cy, cz);
  innerMesh.position.set(cx, cy, cz);

  outerMesh.castShadow = true;
  outerMesh.receiveShadow = true;
  innerMesh.castShadow = false;
  innerMesh.receiveShadow = true;

  spawnFullCylGroup = new THREE.Group();
  spawnFullCylGroup.name = "spawnFullCylinder";
  spawnFullCylGroup.frustumCulled = false;
  spawnFullCylGroup.add(outerMesh);
  spawnFullCylGroup.add(innerMesh);

  const halfLen = len * 0.5;
  spawnFullCylPathWorld = [
    new THREE.Vector3(cx - (fwdX * halfLen), cy, cz - (fwdZ * halfLen)),
    new THREE.Vector3(cx + (fwdX * halfLen), cy, cz + (fwdZ * halfLen))
  ];
  spawnFullCylInnerRadius = innerRadius;

  scene.add(spawnFullCylGroup);

  if(!spawnFullCylAnnounced){
    hudLine("🕳️ Full tunnel created: <code>50ft long x 20ft diameter</code> (hollow cylinder, black interior).");
    spawnFullCylAnnounced = true;
  }
}

function ensureSpawnCurvedFullCylinder(){
  if(!SPAWN_CURVED_CYL_ENABLE){
    if(spawnCurvedCylGroup && spawnCurvedCylGroup.parent === scene) scene.remove(spawnCurvedCylGroup);
    spawnCurvedCylPathWorld = null;
    spawnCurvedCylInnerRadius = 0.0;
    return;
  }

  if(!terrainReady) return;
  if(spawnCurvedCylGroup && spawnCurvedCylGroup.parent === scene) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const outerRadius = (SPAWN_CURVED_CYL_DIAMETER_FT * 0.5) * ft;
  const wallThickness = Math.max(0.05 * ft, SPAWN_CURVED_CYL_WALL_THICKNESS_FT * ft);
  const innerRadius = Math.max(0.25 * ft, outerRadius - wallThickness);
  const totalLen = Math.max(2.0 * ft, SPAWN_CURVED_CYL_LENGTH_FT * ft);
  const turnRad = THREE.MathUtils.degToRad(Math.max(1.0, Math.min(170.0, SPAWN_CURVED_CYL_TURN_DEG)));
  const curveRadius = totalLen / turnRad; // arc length = radius * angle

  const heading = THREE.MathUtils.degToRad(SPAWN_FULL_CYL_HEADING_DEG);
  const fwdX = Math.cos(heading);
  const fwdZ = Math.sin(heading);
  const rightX = -fwdZ;
  const rightZ = fwdX;

  const straightCx = CAVE_ANCHOR_X + (fwdX * SPAWN_FULL_CYL_OFFSET_FWD_FT * ft) + (rightX * SPAWN_FULL_CYL_OFFSET_RIGHT_FT * ft);
  const straightCz = CAVE_ANCHOR_Z + (fwdZ * SPAWN_FULL_CYL_OFFSET_FWD_FT * ft) + (rightZ * SPAWN_FULL_CYL_OFFSET_RIGHT_FT * ft);
  const straightHalfLen = (SPAWN_FULL_CYL_LENGTH_FT * ft) * 0.5;
  const straightRadius = (SPAWN_FULL_CYL_DIAMETER_FT * 0.5) * ft;
  const straightGroundY = heightAtWorldXZ(straightCx, straightCz);
  const straightCy = (Number.isFinite(straightGroundY) ? straightGroundY : 0) + straightRadius - (SPAWN_FULL_CYL_BURY_FT * ft);

  // Overlap slightly into the straight tunnel so the join is fully sealed.
  const seamOverlap = 1.0 * ft;
  const startX = straightCx + (fwdX * (straightHalfLen - seamOverlap));
  const startZ = straightCz + (fwdZ * (straightHalfLen - seamOverlap));

  const turnSign = (SPAWN_CURVED_CYL_TURN_SIGN >= 0) ? 1 : -1;
  const centerX = startX + (rightX * turnSign * curveRadius);
  const centerZ = startZ + (rightZ * turnSign * curveRadius);

  const uX = -rightX * turnSign; // center->start radial basis
  const uZ = -rightZ * turnSign;
  const vX = fwdX;               // initial tangent basis
  const vZ = fwdZ;

  const segLen = Math.max(1.0 * ft, SPAWN_CURVED_CYL_SEGMENT_FT * ft);
  const segments = Math.max(12, Math.ceil(totalLen / segLen));
  const pts = [];

  for(let i = 0; i <= segments; i++){
    const t = i / segments;
    const a = turnRad * t;

    const basisX = (uX * Math.cos(a)) + (vX * Math.sin(a));
    const basisZ = (uZ * Math.cos(a)) + (vZ * Math.sin(a));

    const x = centerX + (basisX * curveRadius);
    const z = centerZ + (basisZ * curveRadius);
    const groundY = heightAtWorldXZ(x, z);
    const y = (Number.isFinite(groundY) ? groundY : 0) + outerRadius - (SPAWN_CURVED_CYL_BURY_FT * ft);
    pts.push(new THREE.Vector3(x, y, z));
  }

  // Hard-match seam height to the straight pipe centerline to avoid light leaks.
  if(pts.length){
    pts[0].y = straightCy;
  }

  const curve = new THREE.CatmullRomCurve3(pts, false, "centripetal", 0.5);
  const tubeSegs = Math.max(48, segments * 3);

  const outerGeo = new THREE.TubeGeometry(curve, tubeSegs, outerRadius, 56, false);
  const innerGeo = new THREE.TubeGeometry(curve, tubeSegs, innerRadius, 56, false);
  remapCaveUVForTubeInterior(innerGeo);

  const caveOuterMap = getCaveExteriorRockTexture();

  const outerMat = new THREE.MeshStandardMaterial({
    map: caveOuterMap || null,
    color: 0x6f727a,
    roughness: 0.86,
    metalness: 0.02,

  });

  const innerMat = new THREE.MeshStandardMaterial({
    color: caveInnerMap ? 0xffffff : 0x000000,

    metalness: 0.0,
