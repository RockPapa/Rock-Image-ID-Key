  const dir = aimSource.clone().sub(start);
  if(dir.lengthSq() < 1e-8) return;
  dir.normalize();

  spawnCopterRedBallFromDir(start, dir, COPTER_SHOT_SPEED);
}

function hasReachedFountainPlaza(){
  const obj = controls.getObject();
  const p = obj ? obj.position : ((truckPlane && truckPlane.position) ? truckPlane.position : null);
  if(!p) return false;

  const insidePlaza = isInsidePuebloPlazaBounds(p.x, p.z, TRUCK_COLLISION_RADIUS * 0.55);

  let atBlueSquare = false;
  if(miniMapJourneyTargetActive){
    const dx = miniMapJourneyTargetX - p.x;
    const dz = miniMapJourneyTargetZ - p.z;
    const reach = 100 * WORLD_UNITS_PER_FOOT;
    atBlueSquare = ((dx * dx) + (dz * dz)) <= (reach * reach);
  }

  return insidePlaza || atBlueSquare;
}

function updateJourneyObjectiveProgress(){
  if(orangeObjectiveReached) return;
  if(alienObjectiveMode !== "destination_orange") return;

  const obj = controls.getObject();
  const p = obj ? obj.position : ((truckPlane && truckPlane.position) ? truckPlane.position : null);
  if(!p || !miniMapJourneyTargetActive) return;

  const dx = miniMapJourneyTargetX - p.x;
  const dz = miniMapJourneyTargetZ - p.z;
  const reach = ORANGE_OBJECTIVE_REACH_RADIUS_FT * WORLD_UNITS_PER_FOOT;
  if(((dx * dx) + (dz * dz)) > (reach * reach)) return;

  orangeObjectiveReached = true;
  MINI_MAP_SHOW_ORANGE_SQUARE = false;
  setAlienObjectiveVisible(false);
}

function getOrangeGreenRoutePoint(progress){
  const t = THREE.MathUtils.clamp(Number(progress) || 0, 0, 1);
  const x = PUEBLO_NEXT_JOURNEY_TARGET_X + ((GREEN_SQUARE_MARKER_X - PUEBLO_NEXT_JOURNEY_TARGET_X) * t);
  const z = PUEBLO_NEXT_JOURNEY_TARGET_Z + ((GREEN_SQUARE_MARKER_Z - PUEBLO_NEXT_JOURNEY_TARGET_Z) * t);
  return { x, z, t };
}

function getOrangeGreenRouteProgress(x, z){
  const vx = GREEN_SQUARE_MARKER_X - PUEBLO_NEXT_JOURNEY_TARGET_X;
  const vz = GREEN_SQUARE_MARKER_Z - PUEBLO_NEXT_JOURNEY_TARGET_Z;
  const len2 = (vx * vx) + (vz * vz);
  if(len2 <= 1e-8) return 0;
  const px = x - PUEBLO_NEXT_JOURNEY_TARGET_X;
  const pz = z - PUEBLO_NEXT_JOURNEY_TARGET_Z;
  return THREE.MathUtils.clamp(((px * vx) + (pz * vz)) / len2, 0, 1);
}

function getBlueOrangeRouteStartPoint(){
  const ft = WORLD_UNITS_PER_FOOT;
  const offX = PUEBLO_PLAN_WALL_CENTER_X_FT * ft;
  const offZ = PUEBLO_PLAN_WALL_CENTER_Z_FT * ft;
  const baseX = puebloTestCube ? puebloTestCube.position.x : PUEBLO_TEST_CUBE_FIXED_X;
  const baseZ = puebloTestCube ? puebloTestCube.position.z : PUEBLO_TEST_CUBE_FIXED_Z;
  return { x: baseX + offX, z: baseZ + offZ };
}

function getBlueOrangeRouteTargetPoint(){
  return {
    x: Number.isFinite(miniMapJourneyTargetX) ? miniMapJourneyTargetX : PUEBLO_NEXT_JOURNEY_TARGET_X,
    z: Number.isFinite(miniMapJourneyTargetZ) ? miniMapJourneyTargetZ : PUEBLO_NEXT_JOURNEY_TARGET_Z
  };
}

function getBlueOrangeRouteFigureTexture(file){
  if(blueOrangeRouteFigureTextureCache.has(file)) return blueOrangeRouteFigureTextureCache.get(file);
  const tex = texLoader.load(
    TEX_DIR + file,
    (t)=>{
      t.colorSpace = THREE.SRGBColorSpace;
      t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
    },
    undefined,
    ()=>{ hudLine("⚠️ Missing route figure texture: <code>" + file + "</code>."); }
  );
  tex.colorSpace = THREE.SRGBColorSpace;
  blueOrangeRouteFigureTextureCache.set(file, tex);
  return tex;
}

function clearBlueOrangeRouteFigures(){
  while(blueOrangeRouteFigureSprites.length){
    const spr = blueOrangeRouteFigureSprites.pop();
    if(!spr) continue;
    if(spr.parent) spr.parent.remove(spr);
    if(spr.material) spr.material.dispose();
  }
  if(blueOrangeRouteFigureGroup && blueOrangeRouteFigureGroup.parent === scene){
    scene.remove(blueOrangeRouteFigureGroup);
  }
  blueOrangeRouteFigureGroup = null;
  blueOrangeRouteFiguresBuilt = false;
}

function buildBlueOrangeRouteFigures(){
  if(!BLUE_ORANGE_ROUTE_FIGURES_ENABLE) return;
  clearBlueOrangeRouteFigures();

  const start = getBlueOrangeRouteStartPoint();
  const end = getBlueOrangeRouteTargetPoint();
  const dx = end.x - start.x;
  const dz = end.z - start.z;
  const len = Math.hypot(dx, dz);
  if(!Number.isFinite(len) || len < 1e-3) return;

  const ux = dx / len;
  const uz = dz / len;
  const nx = -uz;
  const nz = ux;
  const ft = WORLD_UNITS_PER_FOOT;
  const spacing = Math.max(60.0 * ft, BLUE_ORANGE_ROUTE_FIGURE_SPACING_FT * ft);
  const count = Math.max(BLUE_ORANGE_ROUTE_FIGURE_FILES.length, Math.floor(len / spacing) + 1);

  blueOrangeRouteFigureGroup = new THREE.Group();
  blueOrangeRouteFigureGroup.name = "blueOrangeRouteFigures";
  blueOrangeRouteFigureGroup.frustumCulled = false;

  for(let i = 0; i < count; i++){
    const f = (i + 1) / (count + 1);
    const cx = start.x + (ux * len * f);
    const cz = start.z + (uz * len * f);

    const sideSign = (i % 2 === 0) ? 1 : -1;
    const sideLerp = ((i * 37) % 100) / 99;
    const sideOffsetFt = BLUE_ORANGE_ROUTE_FIGURE_SIDE_OFFSET_MIN_FT + ((BLUE_ORANGE_ROUTE_FIGURE_SIDE_OFFSET_MAX_FT - BLUE_ORANGE_ROUTE_FIGURE_SIDE_OFFSET_MIN_FT) * sideLerp);
    const off = sideOffsetFt * ft;

    const x = cx + (nx * off * sideSign);
    const z = cz + (nz * off * sideSign);

    const file = BLUE_ORANGE_ROUTE_FIGURE_FILES[i % BLUE_ORANGE_ROUTE_FIGURE_FILES.length];
    const tex = getBlueOrangeRouteFigureTexture(file);
    const imgW = tex?.image?.width || 512;
    const imgH = tex?.image?.height || 512;
    const aspect = imgW / Math.max(1, imgH);

    const hLerp = ((i * 29) % 100) / 99;
    const hFt = BLUE_ORANGE_ROUTE_FIGURE_HEIGHT_MIN_FT + ((BLUE_ORANGE_ROUTE_FIGURE_HEIGHT_MAX_FT - BLUE_ORANGE_ROUTE_FIGURE_HEIGHT_MIN_FT) * hLerp);
    const h = hFt * ft;
    const w = h * aspect;

    const gy = heightAtWorldXZ(x, z);
    const y = (Number.isFinite(gy) ? gy : 0) + (h * 0.5) + (BLUE_ORANGE_ROUTE_FIGURE_GROUND_LIFT_FT * ft);

    const mat = new THREE.SpriteMaterial({
      map: tex,
      color: 0xffffff,
      transparent: true,
      depthWrite: false,
      depthTest: true
    });
    const spr = new THREE.Sprite(mat);
    spr.scale.set(w, h, 1);
    spr.position.set(x, y, z);
    spr.frustumCulled = false;
    spr.renderOrder = 820;

    blueOrangeRouteFigureSprites.push(spr);
    blueOrangeRouteFigureGroup.add(spr);
  }

  scene.add(blueOrangeRouteFigureGroup);
  blueOrangeRouteFiguresBuilt = true;
  hudLine("🧍 Route figures placed along blue→orange journey line.");
}

function updateBlueOrangeRouteFigures(active, cameraRef){
  if(!BLUE_ORANGE_ROUTE_FIGURES_ENABLE) return;

  if(active){
    if(!blueOrangeRouteFiguresBuilt || !blueOrangeRouteFigureGroup || blueOrangeRouteFigureSprites.length === 0){
      buildBlueOrangeRouteFigures();
    }
    if(blueOrangeRouteFigureGroup) blueOrangeRouteFigureGroup.visible = true;
  } else if(blueOrangeRouteFigureGroup){
    blueOrangeRouteFigureGroup.visible = false;
  }

  if(!active || !cameraRef || !blueOrangeRouteFigureSprites.length) return;
  for(const spr of blueOrangeRouteFigureSprites){
    if(!spr || !spr.visible) continue;
    spr.lookAt(cameraRef.position.x, spr.position.y, cameraRef.position.z);
  }
}

function clearFastTrackPortal(){
  if(!fastTrackPortalGroup) return;
  if(fastTrackPortalGroup.parent === scene) scene.remove(fastTrackPortalGroup);
  fastTrackPortalGroup.traverse((n)=>{
    if(!n) return;
    if(n.geometry && n.geometry.dispose) n.geometry.dispose();
    if(n.material){
      if(Array.isArray(n.material)) n.material.forEach((m)=>{ if(m && m.dispose) m.dispose(); });
      else if(n.material.dispose) n.material.dispose();
    }
  });
  fastTrackPortalGroup = null;
}

function spawnFastTrackPortalAt(progress = FAST_TRACK_PORTAL_TRIGGER_PROGRESS){
  if(fastTrackPortalGroup) return;
  const pt = getOrangeGreenRoutePoint(progress);
  const ft = WORLD_UNITS_PER_FOOT;
  const groundY = heightAtWorldXZ(pt.x, pt.z);
  const baseY = Number.isFinite(groundY) ? groundY : 0;

  const group = new THREE.Group();
  group.name = "fastTrackPortal";

  const ringR = Math.max(3.0 * ft, 7.0 * ft);
  const ringTube = Math.max(0.3 * ft, 0.8 * ft);
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(ringR, ringTube, 20, 48),
    new THREE.MeshStandardMaterial({
      color: 0x39e7ff,
      emissive: 0x2aa8ff,
      emissiveIntensity: 1.15,
      roughness: 0.25,
      metalness: 0.1,
      transparent: true,
      opacity: 0.94
    })
  );
  ring.rotation.x = Math.PI * 0.5;
  ring.position.set(0, ringR * 0.75, 0);
  ring.castShadow = false;
  ring.receiveShadow = false;
  group.add(ring);

  const core = new THREE.Mesh(
    new THREE.CylinderGeometry(ringR * 0.58, ringR * 0.58, ringR * 1.2, 32, 1, true),
    new THREE.MeshBasicMaterial({
      color: 0x66f3ff,
      transparent: true,
      opacity: 0.22,
      side: THREE.DoubleSide,
      depthWrite: false
    })
  );
  core.position.set(0, ringR * 0.75, 0);
  group.add(core);

  const txtCanvas = document.createElement("canvas");
  txtCanvas.width = 1024;
  txtCanvas.height = 160;
  const tctx = txtCanvas.getContext("2d");
  if(tctx){
    tctx.clearRect(0, 0, txtCanvas.width, txtCanvas.height);
    tctx.fillStyle = "rgba(0,0,0,0.55)";
    tctx.fillRect(8, 20, txtCanvas.width - 16, txtCanvas.height - 40);
    tctx.strokeStyle = "rgba(87,239,255,0.95)";
    tctx.lineWidth = 4;
    tctx.strokeRect(10, 22, txtCanvas.width - 20, txtCanvas.height - 44);
    tctx.fillStyle = "#d7fbff";
    tctx.font = "900 72px system-ui";
    tctx.textAlign = "center";
    tctx.textBaseline = "middle";
    tctx.fillText("FAST TRACK PORTAL", txtCanvas.width * 0.5, txtCanvas.height * 0.5);
  }
  const txtTex = new THREE.CanvasTexture(txtCanvas);
  txtTex.colorSpace = THREE.SRGBColorSpace;
  const txt = new THREE.Sprite(new THREE.SpriteMaterial({ map: txtTex, transparent: true, depthWrite: false }));
  txt.scale.set(ringR * 4.8, ringR * 0.9, 1);
  txt.position.set(0, ringR * 2.0, 0);
  group.add(txt);

  group.position.set(pt.x, baseY, pt.z);
  group.userData.baseY = baseY;
  group.userData.ring = ring;
  scene.add(group);

  fastTrackPortalGroup = group;
  fastTrackPortalSpawned = true;
  hudLine("🌀 FAST TRACK PORTAL opened ahead.");
}

function updateFastTrackPortal(nowSec, dt){
  if(!FAST_TRACK_PORTAL_ENABLE){
    if(fastTrackPortalGroup) clearFastTrackPortal();
    return;
  }

  if(fastTrackPortalCooldown > 0) fastTrackPortalCooldown = Math.max(0, fastTrackPortalCooldown - (dt || 0));

  if(alienObjectiveMode !== "destination_green" || fastTrackPortalUsed) return;
  const obj = controls.getObject();
  if(!obj) return;

  const progress = getOrangeGreenRouteProgress(obj.position.x, obj.position.z);
  if(progress >= FAST_TRACK_PORTAL_TRIGGER_PROGRESS && !fastTrackPortalSpawned){
    spawnFastTrackPortalAt(FAST_TRACK_PORTAL_TRIGGER_PROGRESS);
  }

  if(!fastTrackPortalGroup) return;

  const ring = fastTrackPortalGroup.userData.ring;
  const baseY = Number.isFinite(fastTrackPortalGroup.userData.baseY) ? fastTrackPortalGroup.userData.baseY : fastTrackPortalGroup.position.y;
  fastTrackPortalGroup.position.y = baseY + (Math.sin(nowSec * 1.8) * (0.35 * WORLD_UNITS_PER_FOOT));
  if(ring) ring.rotation.z += (dt || 0) * 1.7;

  if(fastTrackPortalCooldown > 0) return;
  const dx = obj.position.x - fastTrackPortalGroup.position.x;
  const dz = obj.position.z - fastTrackPortalGroup.position.z;
  const enterR = FAST_TRACK_PORTAL_ENTER_RADIUS_FT * WORLD_UNITS_PER_FOOT;
  if(((dx * dx) + (dz * dz)) > (enterR * enterR)) return;

  const dst = getOrangeGreenRoutePoint(FAST_TRACK_PORTAL_DEST_PROGRESS);
  const gy = heightAtWorldXZ(dst.x, dst.z);
  const y = (Number.isFinite(gy) ? gy : obj.position.y) + PLAYER_EYE_HEIGHT;
  playPortalEntryAudio();
  obj.position.set(dst.x, y, dst.z);
  fastTrackPortalUsed = true;
  fastTrackPortalCooldown = 1.0;
  clearFastTrackPortal();
  hudLine("🌀 Portal jump complete: moved to <code>2/3</code> of orange→green route.");
}

function shouldStopPostClearCopterAttacks(){
  if(postClearCopterSuppressed) return true;
  if(!(cyberUnlocked && targetsRemaining === 0)) return false;
  if(!hasReachedFountainPlaza()) return false;
  postClearCopterSuppressed = true;
  return true;
}

function isCyberDrivingNow(){
  return cyberUnlocked && targetsRemaining === 0 && avatarMode !== "leggoman" && !shouldStopPostClearCopterAttacks();
}

function fireCopterShotgunFanBurst(){
  if(!copter) return;

  const obj = controls.getObject();
  const aimSource = (truckPlane && truckPlane.position) ? truckPlane.position.clone() : (obj ? obj.position.clone() : null);
  if(!aimSource) return;

  // Aim slightly above center mass so spread blankets the truck body.
  aimSource.y += TRUCK_H * 0.25;

  const start = copter.position.clone();
  const aimDir = aimSource.clone().sub(start);
  if(aimDir.lengthSq() < 1e-8) return;
  aimDir.normalize();

  const worldUp = new THREE.Vector3(0, 1, 0);
  const right = new THREE.Vector3().crossVectors(aimDir, worldUp);
  if(right.lengthSq() < 1e-8){
    right.set(1, 0, 0);
  } else {
    right.normalize();
  }

  const count = Math.max(1, Math.floor(COPTER_SHOTGUN_PELLETS));
  const yawSpread = THREE.MathUtils.degToRad(COPTER_SHOTGUN_SPREAD_DEG);
  const pitchSpread = THREE.MathUtils.degToRad(COPTER_SHOTGUN_PITCH_SPREAD_DEG);

  for(let i = 0; i < count; i++){
    const t = (count <= 1) ? 0.5 : (i / (count - 1));
    const yawOff = (t - 0.5) * yawSpread;
    const pitchOff = ((i % 2 === 0) ? -0.5 : 0.5) * pitchSpread;
    const dir = aimDir.clone();
    dir.applyAxisAngle(worldUp, yawOff);
    dir.applyAxisAngle(right, pitchOff);
    dir.normalize();
    spawnCopterRedBallFromDir(start, dir, COPTER_SHOT_SPEED * COPTER_SHOTGUN_SPEED_SCALE);
  }
}

function updateCopterShotBurst(dt){
  if(!copter) return;

  if(shouldStopPostClearCopterAttacks()){
    copterShotTimer = 0.0;
    return;
  }

  if(copterRunState !== "attack_front") return;

  copterShotTimer -= dt;
  if(copterShotTimer <= 0){
    if(isCyberDrivingNow()){
      fireCopterShotgunFanBurst();
      copterShotTimer = COPTER_SHOTGUN_INTERVAL_SEC;
    } else {
      fireCopterRedBall();
      copterShotTimer = COPTER_SHOT_INTERVAL_SEC;
    }
  }
}

function copterBallHitsTruck(prevPos, currPos){
  if(truckPlane){
    __tmpBox.setFromObject(truckPlane);
    const r2 = COPTER_SHOT_RADIUS * COPTER_SHOT_RADIUS * 4.0;

    // Sweep sample to avoid tunneling when shotgun pellets move fast.
    for(const t of [0.0, 0.5, 1.0]){
      __tmpV3.set(
        prevPos.x + ((currPos.x - prevPos.x) * t),
        prevPos.y + ((currPos.y - prevPos.y) * t),
        prevPos.z + ((currPos.z - prevPos.z) * t)
      );
      const cp = __tmpBox.clampPoint(__tmpV3, __tmpV3b);
      const d2Truck = cp.distanceToSquared(__tmpV3);
      if(d2Truck <= r2) return true;
    }
    return false;
  }

  const targetPos = controls.getObject().position;
  const dx = currPos.x - targetPos.x;
  const dy = currPos.y - targetPos.y;
  const dz = currPos.z - targetPos.z;
  return ((dx*dx) + (dy*dy) + (dz*dz)) <= 1.0;
}

function updateCopterRedBalls(dt){
  for(let i = copterRedBalls.length - 1; i >= 0; i--){
    const b = copterRedBalls[i];
    const prevPos = b.mesh.position.clone();
    b.mesh.position.addScaledVector(b.vel, dt);
    b.life -= dt;

    const p = b.mesh.position;
    const hitTruck = copterBallHitsTruck(prevPos, p);

    if(hitTruck){
      adjustPlayerHealthPct(-COPTER_SHOT_DAMAGE_PCT);
      spawnHitBurst(p, 0xff3b30);
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      copterRedBalls.splice(i, 1);

      copterHitStreak += 1;
      if(copterHitStreak >= COPTER_HIT_STREAK_FOR_FIRE){
        triggerTruckFireEffect();
        copterHitStreak = 0;
      }
      continue;
    }

    if(b.life <= 0){
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      copterRedBalls.splice(i, 1);
      copterHitStreak = 0;
    }
  }
}

function ensureTruckFireTextures(){
  if(truckFireTextures.length) return;
  for(const f of TRUCK_FIRE_FILES){
    const t = texLoader.load(resolveAssetUrl(TEX_DIR + f));
    t.colorSpace = THREE.SRGBColorSpace;
    truckFireTextures.push(t);
  }
}

function triggerTruckFireEffect(){
  const obj = controls.getObject();
  const anchor = (fireAnchorMesh && fireAnchorMesh.position) ? fireAnchorMesh.position : ((truckPlane && truckPlane.position) ? truckPlane.position : (obj ? obj.position : null));
  if(anchor && !canUseTruckFireFeatureAt(anchor.x, anchor.z)) return;

  ensureTruckFireTextures();
  if(!truckFireTextures.length) return;

  if(!truckFireSprite){
    const geo = new THREE.PlaneGeometry(TRUCK_W * 0.95, TRUCK_H * 1.2);
    const mat = new THREE.MeshBasicMaterial({
      map: truckFireTextures[0],
      transparent: true,
      alphaTest: 0.14,
      side: THREE.DoubleSide,
      depthWrite: false,
      depthTest: true
    });
    truckFireSprite = new THREE.Mesh(geo, mat);
    truckFireSprite.renderOrder = 1400;
    truckFireSprite.visible = false;
    scene.add(truckFireSprite);
  }

  truckFireFrameIdx = 0;
  truckFireFrameT = 0.0;
  truckFireTimer = TRUCK_FIRE_DURATION_SEC;
  truckFireSprite.material.map = truckFireTextures[0];
  truckFireSprite.material.needsUpdate = true;
  truckFireSprite.visible = true;
}

function updateTruckFireEffect(dt){
  if(!truckFireSprite || !truckFireSprite.visible) return;

  truckFireTimer = Math.max(0, truckFireTimer - dt);
  if(truckFireTimer <= 0){
    truckFireSprite.visible = false;
    return;
  }

  truckFireFrameT += dt;
  if(truckFireFrameT >= TRUCK_FIRE_FRAME_SEC){
    truckFireFrameT -= TRUCK_FIRE_FRAME_SEC;
    truckFireFrameIdx = (truckFireFrameIdx + 1) % truckFireTextures.length;
    truckFireSprite.material.map = truckFireTextures[truckFireFrameIdx];
    truckFireSprite.material.needsUpdate = true;
  }

  const anchor = (fireAnchorMesh && fireAnchorMesh.position) ? fireAnchorMesh : truckPlane;
  if(anchor && anchor.position){
    truckFireSprite.position.set(
      anchor.position.x,
      anchor.position.y + (TRUCK_H * 0.45),
      anchor.position.z
    );
  } else {
    const p = controls.getObject().position;
    truckFireSprite.position.set(p.x, p.y - 0.55, p.z);
  }

  truckFireSprite.lookAt(camera.position.x, truckFireSprite.position.y, camera.position.z);
}

function clearGreenFireRing(){
  if(greenFireRingGroup && greenFireRingGroup.parent === scene) scene.remove(greenFireRingGroup);
  while(greenFireRingFlames.length){
    const m = greenFireRingFlames.pop();
    if(!m) continue;
    if(m.geometry) m.geometry.dispose();
    if(m.material) m.material.dispose();
  }
  greenFireRingGroup = null;

  if(greenBigfootRingGroup && greenBigfootRingGroup.parent === scene) scene.remove(greenBigfootRingGroup);
  while(greenBigfootSprites.length){
    const s = greenBigfootSprites.pop();
    if(!s) continue;
    if(s.material) s.material.dispose();
  }
  greenBigfootRingGroup = null;

  if(greenFireGateCube && greenFireGateCube.parent === scene) scene.remove(greenFireGateCube);
  if(greenFireGateCube){
    if(greenFireGateCube.geometry) greenFireGateCube.geometry.dispose();
    const mats = Array.isArray(greenFireGateCube.material) ? greenFireGateCube.material : [greenFireGateCube.material];
    for(const m of mats){ if(m) m.dispose(); }
  }
  greenFireGateCube = null;

  if(greenCopterPadGroup && greenCopterPadGroup.parent === scene) scene.remove(greenCopterPadGroup);
  if(greenCopterPadGroup){
    greenCopterPadGroup.traverse((node)=>{
      if(!node) return;
      if(node.geometry) node.geometry.dispose();
      if(node.material){
        if(Array.isArray(node.material)){
          for(const m of node.material){
            if(!m) continue;
            if(m.map) m.map.dispose();
            m.dispose();
          }
        } else {
          if(node.material.map) node.material.map.dispose();
          node.material.dispose();
        }
      }
    });
  }
  greenCopterPadGroup = null;
  greenCopterPadRing = null;
  greenCopterPadCore = null;
  greenCopterPadLabel = null;
}

function _pickDryGreenFireSpot(baseAngle, radiusWorld){
  const ft = WORLD_UNITS_PER_FOOT;
  const angleStep = THREE.MathUtils.degToRad(14);
  const radiusFactors = [1.0, 0.92, 0.84, 0.76, 0.68, 0.60, 0.52, 0.44];
  const maxAngleStep = 4;

  for(let ai = 0; ai <= maxAngleStep; ai++){
    const angleOffsets = ai === 0 ? [0] : [ai * angleStep, -ai * angleStep];
    for(const aOff of angleOffsets){
      const a = baseAngle + aOff;
      const ca = Math.cos(a);
      const sa = Math.sin(a);
      for(const rf of radiusFactors){
        const r = Math.max(2.0 * ft, radiusWorld * rf);
        const x = GREEN_SQUARE_MARKER_X + (ca * r);
        const z = GREEN_SQUARE_MARKER_Z + (sa * r);
        if(!isWaterAtXZ(x, z)) return { x, z };
      }
    }
  }

  const centerX = GREEN_SQUARE_MARKER_X;
  const centerZ = GREEN_SQUARE_MARKER_Z;
  if(!isWaterAtXZ(centerX, centerZ)) return { x: centerX, z: centerZ };

  const searchStep = 6.0 * ft;
  for(let ring = 1; ring <= 8; ring++){
    const rr = ring * searchStep;
    for(let k = 0; k < 16; k++){
      const a = (k / 16) * Math.PI * 2;
      const x = centerX + (Math.cos(a) * rr);
      const z = centerZ + (Math.sin(a) * rr);
      if(!isWaterAtXZ(x, z)) return { x, z };
    }
  }

  return { x: centerX, z: centerZ };
}

function clearGreenBrideChamber(){
  if(greenBrideChamberGroup && greenBrideChamberGroup.parent === scene) scene.remove(greenBrideChamberGroup);
  if(greenBrideChamberGroup){
    const mats = new Set();
    greenBrideChamberGroup.traverse((node)=>{
      if(!node) return;
      if(node.geometry) node.geometry.dispose();
      if(Array.isArray(node.material)){
        for(const m of node.material) if(m) mats.add(m);
      } else if(node.material){
        mats.add(node.material);
      }
    });
    for(const m of mats) m.dispose();
  }
  greenBrideChamberGroup = null;
  greenBrideSprite = null;
  greenBrideLight = null;
  greenBrideWasInside = false;
  greenBridePigWasInRange = false;
  stopRingOfFireSequenceAudio();
  greenBrideAccentFlames.length = 0;
  greenBrideAccentAnimSec = 0.0;
}

function ensureGreenBrideChamber(){
  if(!GREEN_BRIDE_CHAMBER_ENABLE){
    clearGreenBrideChamber();
    return;
  }
  if(!terrainReady) return;
  if(greenBrideChamberGroup && greenBrideChamberGroup.parent === scene) return;

  ensureTruckFireTextures();

  const ft = WORLD_UNITS_PER_FOOT;
  const cx = GREEN_SQUARE_MARKER_X;
  const cz = GREEN_SQUARE_MARKER_Z;
  const gy = heightAtWorldXZ(cx, cz);
  const baseY = (Number.isFinite(gy) ? gy : 0) - (GREEN_BRIDE_CHAMBER_SINK_FT * ft);

  if(!greenBrideWallTex){
    greenBrideWallTex = texLoader.load(
      TEX_DIR + GREEN_BRIDE_CHAMBER_WALL_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{
        greenBrideWallTex = null;
        if(!greenBrideWallTexWarned){
          hudLine("⚠️ Missing chamber wall texture: <code>" + GREEN_BRIDE_CHAMBER_WALL_FILE + "</code>.");
          greenBrideWallTexWarned = true;
        }
      }
    );
  }

  if(!greenBrideTex){
    greenBrideTex = texLoader.load(
      TEX_DIR + GREEN_BRIDE_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{
        if(!greenBrideTexWarned){
          hudLine("⚠️ Missing bride texture: <code>" + GREEN_BRIDE_FILE + "</code>. Using fallback.");
          greenBrideTexWarned = true;
        }
        greenBrideTex = texLoader.load(
          TEX_DIR + GREEN_BRIDE_FALLBACK_FILE,
          (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
          undefined,
          ()=>{ greenBrideTex = null; }
        );
      }
    );
  }

  const w = Math.max(8.0 * ft, GREEN_BRIDE_CHAMBER_WIDTH_FT * ft);
  const d = Math.max(8.0 * ft, GREEN_BRIDE_CHAMBER_DEPTH_FT * ft);
  const h = Math.max(8.0 * ft, GREEN_BRIDE_CHAMBER_HEIGHT_FT * ft);
  const th = Math.max(0.5 * ft, GREEN_BRIDE_CHAMBER_WALL_THICKNESS_FT * ft);

  const matWall = new THREE.MeshStandardMaterial({
    map: greenBrideWallTex || null,
    color: greenBrideWallTex ? 0xffffff : 0x6f6760,
    emissive: GREEN_BRIDE_CHAMBER_WALL_EMISSIVE,
    emissiveIntensity: GREEN_BRIDE_CHAMBER_WALL_EMISSIVE_INTENSITY,
    roughness: 0.9,
    metalness: 0.05,
    side: THREE.DoubleSide
  });

  const group = new THREE.Group();
  group.name = "greenBrideChamber";

  const floor = new THREE.Mesh(new THREE.BoxGeometry(w, th, d), matWall.clone());
  floor.position.set(cx, baseY + (th * 0.5), cz);
  floor.receiveShadow = true;
  group.add(floor);

  const ceil = new THREE.Mesh(new THREE.BoxGeometry(w, th, d), matWall.clone());
  ceil.position.set(cx, baseY + h - (th * 0.5), cz);
  ceil.castShadow = false;
  ceil.receiveShadow = true;
  group.add(ceil);

  const north = new THREE.Mesh(new THREE.BoxGeometry(w, h, th), matWall.clone());
  north.position.set(cx, baseY + (h * 0.5), cz + (d * 0.5) - (th * 0.5));
  north.castShadow = true;
  north.receiveShadow = true;
  group.add(north);

  const east = new THREE.Mesh(new THREE.BoxGeometry(th, h, d), matWall.clone());
  east.position.set(cx + (w * 0.5) - (th * 0.5), baseY + (h * 0.5), cz);
  east.castShadow = true;
  east.receiveShadow = true;
  group.add(east);

  const west = new THREE.Mesh(new THREE.BoxGeometry(th, h, d), matWall.clone());
  west.position.set(cx - (w * 0.5) + (th * 0.5), baseY + (h * 0.5), cz);
  west.castShadow = true;
  west.receiveShadow = true;
  group.add(west);

  // Keep south side open so player can walk/fly into the chamber.
  const doorPillarW = Math.max(0.75 * ft, th);
  const doorSpan = Math.max(12.0 * ft, w * 0.56);
  const sideSpan = Math.max(0.5 * ft, (w - doorSpan) * 0.5);

  const southLeft = new THREE.Mesh(new THREE.BoxGeometry(sideSpan, h, th), matWall.clone());
  southLeft.position.set(cx - (doorSpan * 0.5) - (sideSpan * 0.5), baseY + (h * 0.5), cz - (d * 0.5) + (th * 0.5));
  southLeft.castShadow = true;
  southLeft.receiveShadow = true;
  group.add(southLeft);

  const southRight = new THREE.Mesh(new THREE.BoxGeometry(sideSpan, h, th), matWall.clone());
  southRight.position.set(cx + (doorSpan * 0.5) + (sideSpan * 0.5), baseY + (h * 0.5), cz - (d * 0.5) + (th * 0.5));
  southRight.castShadow = true;
  southRight.receiveShadow = true;
  group.add(southRight);

  const doorLight = new THREE.PointLight(0xfff2cf, GREEN_BRIDE_CHAMBER_DOOR_LIGHT_INTENSITY, Math.max(30.0 * ft, GREEN_BRIDE_CHAMBER_DOOR_LIGHT_RANGE_FT * ft), 1.15);
  doorLight.position.set(cx, baseY + (h * 0.42), cz - (d * 0.54));
  group.add(doorLight);

  greenBrideLight = new THREE.PointLight(0xffe3cd, GREEN_BRIDE_CHAMBER_LIGHT_INTENSITY, Math.max(w, d) * 1.35, 1.05);
  greenBrideLight.position.set(cx, baseY + (h * 0.66), cz - (d * 0.08));
  group.add(greenBrideLight);

  const exteriorRange = Math.max(40.0 * ft, GREEN_BRIDE_CHAMBER_EXTERIOR_LIGHT_RANGE_FT * ft);
  const extA = new THREE.PointLight(0xc9ffd8, GREEN_BRIDE_CHAMBER_EXTERIOR_LIGHT_INTENSITY, exteriorRange, 1.2);
  extA.position.set(cx + (w * 0.58), baseY + (h * 0.58), cz - (d * 0.56));
  group.add(extA);

  const extB = new THREE.PointLight(0xc9ffd8, GREEN_BRIDE_CHAMBER_EXTERIOR_LIGHT_INTENSITY, exteriorRange, 1.2);
  extB.position.set(cx - (w * 0.58), baseY + (h * 0.58), cz - (d * 0.56));
  group.add(extB);

  const roofGlow = new THREE.PointLight(0xfff2c2, GREEN_BRIDE_CHAMBER_EXTERIOR_LIGHT_INTENSITY * 0.95, exteriorRange * 1.1, 1.3);
  roofGlow.position.set(cx, baseY + (h * 1.08), cz - (d * 0.10));
  group.add(roofGlow);

  if(GREEN_BRIDE_CHAMBER_ACCENT_FIRE_ENABLE && truckFireTextures.length){
    const fireW = Math.max(6.0 * ft, GREEN_BRIDE_CHAMBER_ACCENT_FIRE_WIDTH_FT * ft);
    const fireH = Math.max(8.0 * ft, GREEN_BRIDE_CHAMBER_ACCENT_FIRE_HEIGHT_FT * ft);
    const roofCount = Math.max(4, GREEN_BRIDE_CHAMBER_ACCENT_FIRE_ROOF_COUNT | 0);
    const roofY = baseY + h + (fireH * 0.36);
    const roofR = Math.max(w, d) * 0.33;

    for(let i = 0; i < roofCount; i++){
      const a = (i / roofCount) * Math.PI * 2;
      const fm = new THREE.Mesh(
        new THREE.PlaneGeometry(fireW, fireH),
        new THREE.MeshBasicMaterial({
          map: truckFireTextures[i % truckFireTextures.length],
          transparent: true,
          alphaTest: 0.14,
          side: THREE.DoubleSide,
          depthWrite: false,
          depthTest: true
        })
      );
      fm.position.set(cx + (Math.cos(a) * roofR), roofY, cz + (Math.sin(a) * roofR));
      fm.renderOrder = 1325;
      fm.frustumCulled = false;
      fm.userData.animOffset = i % truckFireTextures.length;
      group.add(fm);
      greenBrideAccentFlames.push(fm);
    }

    const doorBaseZ = cz - (d * 0.5) + (th * 0.95);
    const doorSideX = Math.max(4.0 * ft, doorSpan * 0.56);
    for(let i = 0; i < 2; i++){
      const fx = cx + (i === 0 ? -doorSideX : doorSideX);
      const fm = new THREE.Mesh(
        new THREE.PlaneGeometry(fireW, fireH),
        new THREE.MeshBasicMaterial({
          map: truckFireTextures[(roofCount + i) % truckFireTextures.length],
          transparent: true,
          alphaTest: 0.14,
          side: THREE.DoubleSide,
          depthWrite: false,
          depthTest: true
        })
      );
      fm.position.set(fx, baseY + (fireH * 0.52), doorBaseZ);
      fm.renderOrder = 1325;
      fm.frustumCulled = false;
      fm.userData.animOffset = (roofCount + i) % truckFireTextures.length;
      group.add(fm);
      greenBrideAccentFlames.push(fm);
    }
  }

  const brideW = Math.max(2.0 * ft, GREEN_BRIDE_WIDTH_FT * ft);
  const brideH = Math.max(2.0 * ft, GREEN_BRIDE_HEIGHT_FT * ft);
  const brideMat = new THREE.SpriteMaterial({
    map: greenBrideTex || null,
    color: greenBrideTex ? 0xffffff : 0xc9e6ff,
    transparent: true,
    alphaTest: 0.50,
    depthWrite: true,
    depthTest: true
  });
  greenBrideSprite = new THREE.Sprite(brideMat);
  greenBrideSprite.scale.set(brideW, brideH, 1);
  greenBrideSprite.position.set(cx, baseY + (brideH * 0.5), cz + (d * 0.12));
  greenBrideSprite.renderOrder = 1340;
  greenBrideSprite.frustumCulled = false;
  group.add(greenBrideSprite);

  scene.add(group);
  greenBrideChamberGroup = group;
}

function isPlayerInsideGreenBrideChamber(){
  if(!GREEN_BRIDE_CHAMBER_ENABLE) return false;
  const obj = controls && typeof controls.getObject === "function" ? controls.getObject() : null;
  if(!obj) return false;

  const ft = WORLD_UNITS_PER_FOOT;
  const cx = GREEN_SQUARE_MARKER_X;
  const cz = GREEN_SQUARE_MARKER_Z;
  const gy = heightAtWorldXZ(cx, cz);
  const baseY = (Number.isFinite(gy) ? gy : 0) - (GREEN_BRIDE_CHAMBER_SINK_FT * ft);
  const w = Math.max(8.0 * ft, GREEN_BRIDE_CHAMBER_WIDTH_FT * ft);
  const d = Math.max(8.0 * ft, GREEN_BRIDE_CHAMBER_DEPTH_FT * ft);
  const h = Math.max(8.0 * ft, GREEN_BRIDE_CHAMBER_HEIGHT_FT * ft);
  const th = Math.max(0.5 * ft, GREEN_BRIDE_CHAMBER_WALL_THICKNESS_FT * ft);

  const halfX = Math.max(0.1, ((w * 0.5) - th) * GREEN_BRIDE_PIG_TRIGGER_SCALE);
  const halfZ = Math.max(0.1, ((d * 0.5) - th) * GREEN_BRIDE_PIG_TRIGGER_SCALE);
  const halfY = Math.max(0.1, ((h * 0.5) - th) * GREEN_BRIDE_PIG_TRIGGER_SCALE);

  const minX = cx - halfX;
  const maxX = cx + halfX;
  const minZ = cz - halfZ;
  const maxZ = cz + halfZ;
  const midY = baseY + (h * 0.5);
  const minY = midY - halfY;
  const maxY = midY + halfY;

  return (
    obj.position.x >= minX && obj.position.x <= maxX &&
    obj.position.z >= minZ && obj.position.z <= maxZ &&
    obj.position.y >= minY && obj.position.y <= maxY
  );
}

function initGreenBridePigAudio(){
  if(greenBridePigAudio) return;
  const url = TEX_DIR + GREEN_BRIDE_ENTRY_PIG_FILE;
  greenBridePigAudio = new Audio(resolveAssetUrl(url));
  greenBridePigAudio.loop = false;
  greenBridePigAudio.volume = GREEN_BRIDE_ENTRY_PIG_VOL;
  greenBridePigAudio.preload = "auto";
  greenBridePigAudio.addEventListener("error", ()=>{
    greenBridePigAudio = null;
  });
}

function playGreenBridePigAudio(){
  if(!greenBridePigAudio) initGreenBridePigAudio();
  if(!greenBridePigAudio) return;
  try{
    greenBridePigAudio.pause();
    greenBridePigAudio.currentTime = 0;
  }catch(e){}
  const p = greenBridePigAudio.play();
  if(p && typeof p.catch === "function") p.catch(()=>{});
}

function updateGreenBrideChamber(){
  const obj = controls && typeof controls.getObject === "function" ? controls.getObject() : null;
  let inRange = false;

  if(obj && greenBrideSprite && greenBrideChamberGroup && greenBrideChamberGroup.parent === scene){
    const triggerDist = Math.max(1.0, GREEN_BRIDE_PIG_TRIGGER_DIST_FT * WORLD_UNITS_PER_FOOT);
    inRange = obj.position.distanceTo(greenBrideSprite.position) <= triggerDist;
  }

  greenBridePigWasInRange = inRange;

  if(!greenBrideSprite || !greenBrideChamberGroup || greenBrideChamberGroup.parent !== scene) return;
  greenBrideSprite.lookAt(camera.position.x, greenBrideSprite.position.y, camera.position.z);

  if(greenBrideAccentFlames.length && truckFireTextures.length){
    greenBrideAccentAnimSec += 0.016;
    const frameBase = Math.floor(greenBrideAccentAnimSec / TRUCK_FIRE_FRAME_SEC);
    const frameCount = truckFireTextures.length;
    for(const m of greenBrideAccentFlames){
      if(!m || !m.material) continue;
      const off = Number(m.userData.animOffset) || 0;
      const idx = (frameBase + off) % frameCount;
      const tex = truckFireTextures[idx];
      if(m.material.map !== tex){
        m.material.map = tex;
        m.material.needsUpdate = true;
      }
      m.lookAt(camera.position.x, m.position.y, camera.position.z);
    }
  }
}

function ensureGreenFireRing(){
  if(!GREEN_FIRE_RING_ENABLE){
    clearGreenFireRing();
    return;
  }
  if(!terrainReady) return;

  if(!GREEN_COPTER_PAD_ENABLE && greenCopterPadGroup){
    if(greenCopterPadGroup.parent === scene) scene.remove(greenCopterPadGroup);
    greenCopterPadGroup.traverse((node)=>{
      if(!node) return;
      if(node.geometry) node.geometry.dispose();
      if(node.material){
        if(Array.isArray(node.material)){
          for(const m of node.material){
            if(!m) continue;
            if(m.map) m.map.dispose();
            m.dispose();
          }
        } else {
          if(node.material.map) node.material.map.dispose();
          node.material.dispose();
        }
      }
    });
    greenCopterPadGroup = null;
    greenCopterPadRing = null;
    greenCopterPadCore = null;
    greenCopterPadLabel = null;
  }

  if(!GREEN_FIRE_GATE_ENABLE && greenFireGateCube){
    if(greenFireGateCube.parent === scene) scene.remove(greenFireGateCube);
    if(greenFireGateCube.geometry) greenFireGateCube.geometry.dispose();
    const mats = Array.isArray(greenFireGateCube.material) ? greenFireGateCube.material : [greenFireGateCube.material];
    for(const m of mats){ if(m) m.dispose(); }
    greenFireGateCube = null;
  }

  ensureTruckFireTextures();
  if(!truckFireTextures.length) return;

  const ft = WORLD_UNITS_PER_FOOT;
  const count = Math.max(1, GREEN_FIRE_RING_COUNT | 0);
  const bigfootCount = GREEN_BIGFOOT_RING_ENABLE ? Math.max(1, GREEN_BIGFOOT_RING_COUNT | 0) : 0;
  if(greenFireRingGroup && greenFireRingGroup.parent === scene && greenFireRingFlames.length === count){
    const bigfootReady = !GREEN_BIGFOOT_RING_ENABLE || (greenBigfootRingGroup && greenBigfootRingGroup.parent === scene && greenBigfootSprites.length === bigfootCount);
    const gateReady = !GREEN_FIRE_GATE_ENABLE || (greenFireGateCube && greenFireGateCube.parent === scene);
    const padReady = !GREEN_COPTER_PAD_ENABLE || (greenCopterPadGroup && greenCopterPadGroup.parent === scene && greenCopterPadRing && greenCopterPadCore && greenCopterPadLabel);
    if(bigfootReady && gateReady && padReady) return;
  }

  clearGreenFireRing();

  const radiusWorld = Math.max(2.0 * ft, (GREEN_FIRE_RING_DIAMETER_FT * 0.5) * ft);
  const flameW = Math.max(1.0 * ft, GREEN_FIRE_RING_FLAME_WIDTH_FT * ft);
  const flameH = Math.max(1.0 * ft, GREEN_FIRE_RING_FLAME_HEIGHT_FT * ft);
  const lift = GREEN_FIRE_RING_FLAME_LIFT_FT * ft;

  greenFireRingGroup = new THREE.Group();
  greenFireRingGroup.name = "greenFireRing";

  for(let i = 0; i < count; i++){
    const a = (i / count) * Math.PI * 2;
    const spot = _pickDryGreenFireSpot(a, radiusWorld);
    const gy = heightAtWorldXZ(spot.x, spot.z);
    const y = (Number.isFinite(gy) ? gy : 0) + (flameH * 0.5) + lift;

    const mat = new THREE.MeshBasicMaterial({
      map: truckFireTextures[i % truckFireTextures.length],
      transparent: true,
      alphaTest: 0.14,
      side: THREE.DoubleSide,
      depthWrite: false,
      depthTest: true
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(flameW, flameH), mat);
    mesh.position.set(spot.x, y, spot.z);
    mesh.frustumCulled = false;
    mesh.renderOrder = 1320;
    mesh.userData.animOffset = i % truckFireTextures.length;
    mesh.userData.blockRadius = Math.max(1.2 * ft, flameW * 0.30);

    greenFireRingFlames.push(mesh);
    greenFireRingGroup.add(mesh);
  }

  scene.add(greenFireRingGroup);

  if(GREEN_BIGFOOT_RING_ENABLE){
    if(!greenBigfootTex){
      greenBigfootTex = texLoader.load(
        TEX_DIR + GREEN_BIGFOOT_RING_FILE,
        (t)=>{
          t.colorSpace = THREE.SRGBColorSpace;
          t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
        },
        undefined,
        ()=>{
          greenBigfootTex = null;
          if(!greenBigfootTexWarned){
            hudLine("⚠️ Missing bigfoot ring texture: <code>" + GREEN_BIGFOOT_RING_FILE + "</code>.");
            greenBigfootTexWarned = true;
          }
        }
      );
    }

    if(!greenBigfootPassThroughTex){
      greenBigfootPassThroughTex = texLoader.load(
        TEX_DIR + GREEN_BIGFOOT_PASS_THROUGH_FILE,
        (t)=>{
          t.colorSpace = THREE.SRGBColorSpace;
          t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
        },
        undefined,
        ()=>{
          greenBigfootPassThroughTex = null;
          if(!greenBigfootPassThroughTexWarned){
            hudLine("⚠️ Missing pass-through goddess texture: <code>" + GREEN_BIGFOOT_PASS_THROUGH_FILE + "</code>.");
            greenBigfootPassThroughTexWarned = true;
          }
        }
      );
    }

    const bigfootRadiusWorld = Math.max(radiusWorld + (8.0 * ft), (GREEN_BIGFOOT_RING_DIAMETER_FT * 0.5) * ft);
    const minOuterRadius = radiusWorld + (6.0 * ft);
    const bigfootW = Math.max(4.0 * ft, GREEN_BIGFOOT_RING_WIDTH_FT * ft);
    const bigfootH = Math.max(4.0 * ft, GREEN_BIGFOOT_RING_HEIGHT_FT * ft);
    const bigfootLift = GREEN_BIGFOOT_RING_LIFT_FT * ft;

    greenBigfootRingGroup = new THREE.Group();
    greenBigfootRingGroup.name = "greenBigfootRing";

    for(let i = 0; i < bigfootCount; i++){
      const a = (i / bigfootCount) * Math.PI * 2;
      let spot = _pickDryGreenFireSpot(a, bigfootRadiusWorld);

      const sdx = spot.x - GREEN_SQUARE_MARKER_X;
      const sdz = spot.z - GREEN_SQUARE_MARKER_Z;
      const sDist = Math.hypot(sdx, sdz);
      if(sDist < minOuterRadius){
        const ox = GREEN_SQUARE_MARKER_X + (Math.cos(a) * minOuterRadius);
        const oz = GREEN_SQUARE_MARKER_Z + (Math.sin(a) * minOuterRadius);
        if(!isWaterAtXZ(ox, oz)) spot = { x: ox, z: oz };
      }

      const gy = heightAtWorldXZ(spot.x, spot.z);
      const y = (Number.isFinite(gy) ? gy : 0) + (bigfootH * 0.5) + bigfootLift;

      const isPassThroughGoddess = (i === 0);
      const mat = new THREE.SpriteMaterial({
        map: isPassThroughGoddess ? (greenBigfootPassThroughTex || null) : (greenBigfootTex || null),
        color: (isPassThroughGoddess ? !!greenBigfootPassThroughTex : !!greenBigfootTex) ? 0xffffff : 0x8a7758,
        transparent: true,
        alphaTest: 0.58,
        depthWrite: true,
        depthTest: true
      });
      const spr = new THREE.Sprite(mat);
      spr.scale.set(bigfootW, bigfootH, 1);
      spr.position.set(spot.x, y, spot.z);
      spr.renderOrder = 1310;
      spr.frustumCulled = false;
      spr.userData.blockRadius = isPassThroughGoddess ? 0 : Math.max(1.2 * ft, bigfootW * 0.26);
      if(isPassThroughGoddess){
        spr.userData.passThrough = true;
        spr.userData.nonBlocking = true;
      }

      greenBigfootSprites.push(spr);
      greenBigfootRingGroup.add(spr);
    }

    scene.add(greenBigfootRingGroup);
  }

  if(!GREEN_FIRE_GATE_ENABLE) return;

  if(!greenFireGateTex){
    greenFireGateTex = texLoader.load(
      TEX_DIR + GREEN_FIRE_GATE_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{
        greenFireGateTex = null;
        if(!greenFireGateTexWarned){
          hudLine("⚠️ Missing fire gate texture: <code>" + GREEN_FIRE_GATE_FILE + "</code>.");
          greenFireGateTexWarned = true;
        }
      }
    );
  }
  if(!greenFireGateStoneTex){
    greenFireGateStoneTex = texLoader.load(
      TEX_DIR + GREEN_FIRE_GATE_STONE_FILE,
      (t)=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy()); },
      undefined,
      ()=>{
        greenFireGateStoneTex = null;
        if(!greenFireGateStoneTexWarned){
          hudLine("⚠️ Missing fire gate stone texture: <code>" + GREEN_FIRE_GATE_STONE_FILE + "</code>.");
          greenFireGateStoneTexWarned = true;
        }
      }
    );
  }

  const gateW = Math.max(2.0 * ft, GREEN_FIRE_GATE_WIDTH_FT * ft);

  const gateRadiusWorld = Math.max(2.0 * ft, radiusWorld - Math.max(1.0 * ft, GREEN_FIRE_GATE_INNER_OFFSET_FT * ft));
  const gateSpot = _pickDryGreenFireSpot(gateA, gateRadiusWorld);
  const gateGY = heightAtWorldXZ(gateSpot.x, gateSpot.z);
  const gateY = (Number.isFinite(gateGY) ? gateGY : 0) + (gateH * 0.5);

  const gateMat = new THREE.MeshStandardMaterial({
    map: greenFireGateTex || null,
    color: greenFireGateTex ? 0xffffff : 0x8f7a66,
    emissive: 0x35260f,
    emissiveIntensity: 0.38,
    roughness: 0.88,
    metalness: 0.04
  });

  const gateMats = [gateMat, gateMat.clone(), gateMat.clone(), gateMat.clone(), gateMat.clone(), gateMat.clone()];
  greenFireGateCube = new THREE.Mesh(new THREE.BoxGeometry(gateW, gateH, gateD), gateMats);
  greenFireGateCube.position.set(gateSpot.x, gateY, gateSpot.z);
  greenFireGateCube.castShadow = true;
  greenFireGateCube.receiveShadow = true;
  greenFireGateCube.lookAt(GREEN_SQUARE_MARKER_X, gateY, GREEN_SQUARE_MARKER_Z);
  scene.add(greenFireGateCube);

  const gateDoorDir = new THREE.Vector3(gateSpot.x - GREEN_SQUARE_MARKER_X, 0, gateSpot.z - GREEN_SQUARE_MARKER_Z);
  if(gateDoorDir.lengthSq() < 1e-6) gateDoorDir.set(0, 0, 1);
  gateDoorDir.normalize();
  const gateDoorLight = new THREE.PointLight(

    GREEN_FIRE_GATE_DOOR_LIGHT_INTENSITY,
    Math.max(20.0 * ft, GREEN_FIRE_GATE_DOOR_LIGHT_RANGE_FT * ft),
    1.2
  );
  gateDoorLight.position.set(
    gateDoorDir.x * (gateD * 0.72),
    Math.max(3.0 * ft, GREEN_FIRE_GATE_DOOR_LIGHT_LIFT_FT * ft),
    gateDoorDir.z * (gateD * 0.72)
  );
  greenFireGateCube.add(gateDoorLight);

  if(GREEN_COPTER_PAD_ENABLE){
    const padD = Math.max(6.0 * ft, GREEN_COPTER_PAD_DIAMETER_FT * ft);
    const padH = Math.max(0.08 * ft, GREEN_COPTER_PAD_HEIGHT_FT * ft);
    const ringW = Math.max(0.25 * ft, GREEN_COPTER_PAD_RING_WIDTH_FT * ft);
    const padAngle = THREE.MathUtils.degToRad(GREEN_COPTER_PAD_ANGLE_DEG);

    const gyPad = heightAtWorldXZ(padSpot.x, padSpot.z);

    greenCopterPadGroup = new THREE.Group();

    const padCoreMat = new THREE.MeshStandardMaterial({
      color: GREEN_COPTER_PAD_BASE_COLOR,
      emissive: GREEN_COPTER_PAD_BASE_COLOR,
      emissiveIntensity: 0.42,
      roughness: 0.7,
      metalness: 0.08
    });
    const padRingMat = new THREE.MeshStandardMaterial({
      color: GREEN_COPTER_PAD_FLASH_COLOR,
      emissive: GREEN_COPTER_PAD_FLASH_COLOR,

    });

    greenCopterPadCore = new THREE.Mesh(new THREE.CylinderGeometry((padD * 0.5) - ringW, (padD * 0.5) - ringW, padH, 42), padCoreMat);
    greenCopterPadCore.position.set(padSpot.x, yPad, padSpot.z);
    greenCopterPadCore.receiveShadow = true;
    greenCopterPadCore.castShadow = false;
    greenCopterPadGroup.add(greenCopterPadCore);

    greenCopterPadRing = new THREE.Mesh(new THREE.TorusGeometry((padD * 0.5) - (ringW * 0.5), ringW * 0.5, 12, 52), padRingMat);
    greenCopterPadRing.rotation.x = Math.PI * 0.5;
    greenCopterPadRing.position.set(padSpot.x, yPad + (padH * 0.52), padSpot.z);
    greenCopterPadRing.receiveShadow = false;
    greenCopterPadRing.castShadow = false;
    greenCopterPadGroup.add(greenCopterPadRing);

    const labelCanvas = document.createElement("canvas");
    labelCanvas.width = 512;

      labelCtx.fillRect(26, 26, labelCanvas.width - 52, labelCanvas.height - 52);
      labelCtx.strokeStyle = "rgba(250,255,210,0.95)";
      labelCtx.lineWidth = 12;
      labelCtx.strokeRect(26, 26, labelCanvas.width - 52, labelCanvas.height - 52);
      labelCtx.font = "bold 134px Arial Black, Arial, sans-serif";
      labelCtx.textAlign = "center";

      labelCtx.fillText(GREEN_COPTER_PAD_LABEL_TEXT, labelCanvas.width * 0.5, labelCanvas.height * 0.54);
    }
    const labelTex = new THREE.CanvasTexture(labelCanvas);
    labelTex.colorSpace = THREE.SRGBColorSpace;

function updateGreenFireRing(dt){
  if(!greenFireRingGroup || !greenFireRingGroup.parent || !greenFireRingFlames.length || !truckFireTextures.length) return;

  greenFireRingAnimSec += Math.max(0, dt || 0);
  const frameBase = Math.floor(greenFireRingAnimSec / TRUCK_FIRE_FRAME_SEC);
  const frameCount = truckFireTextures.length;

  for(const m of greenFireRingFlames){
    if(!m || !m.material) continue;
    const off = Number(m.userData.animOffset) || 0;
    const idx = (frameBase + off) % frameCount;
    const tex = truckFireTextures[idx];
    if(m.material.map !== tex){
      m.material.map = tex;
      m.material.needsUpdate = true;
    }
    m.lookAt(camera.position.x, m.position.y, camera.position.z);
  }

  if(greenCopterPadRing && greenCopterPadRing.material){
    const t = greenFireRingAnimSec;
    const pulse = 0.5 + (0.5 * Math.sin(t * Math.PI * 2.0 * GREEN_COPTER_PAD_FLASH_HZ));
    greenCopterPadRing.material.emissiveIntensity = 0.55 + (pulse * 1.8);
    greenCopterPadRing.material.opacity = 0.75 + (pulse * 0.25);
    greenCopterPadRing.material.transparent = true;
  }
  if(greenCopterPadCore && greenCopterPadCore.material){
    const t = greenFireRingAnimSec;
    const pulse = 0.5 + (0.5 * Math.sin(t * Math.PI * 2.0 * GREEN_COPTER_PAD_FLASH_HZ));
    greenCopterPadCore.material.emissiveIntensity = 0.2 + (pulse * 0.45);
  }
  if(greenCopterPadLabel && greenCopterPadLabel.material){
    const t = greenFireRingAnimSec;
    const pulse = 0.5 + (0.5 * Math.sin(t * Math.PI * 2.0 * GREEN_COPTER_PAD_FLASH_HZ));
    greenCopterPadLabel.material.opacity = 0.60 + (pulse * 0.40);
    greenCopterPadLabel.lookAt(camera.position.x, greenCopterPadLabel.position.y, camera.position.z);
  }
}

function updateCopter(dt){
  if(!copter) return;

  if(shouldStopPostClearCopterAttacks()){
    copter.visible = false;
    copterRunState = "wait";
    copterPhaseTimer = COPTER_WAIT_SEC;
    postClearCopterHeadOnTimer = 0.0;
    stopCopterPassSound();
    return;
  }

  copterBobT += dt;
  const fr = _getCopterFrame();

  if(isCyberDrivingNow()){
    postClearCopterHeadOnTimer = Math.max(0, postClearCopterHeadOnTimer - dt);
    if(postClearCopterHeadOnTimer <= 0){
      startCopterAttackFront();
      postClearCopterHeadOnTimer = COPTER_POST_CLEAR_HEADON_INTERVAL_SEC;
    }
  } else {
    postClearCopterHeadOnTimer = 0.0;
  }

  if(copterRunState === "attack_front"){
    moveCopterAlongDir(dt, COPTER_MOVE_SPEED);

    const relX = copter.position.x - fr.p.x;
    const relZ = copter.position.z - fr.p.z;
    const aheadDot = (relX * fr.fwd.x) + (relZ * fr.fwd.z);

    // Just passed truck: immediate 180 and return straight over truck, moving away.
    if(aheadDot < COPTER_BEHIND_EXIT_DOT){
      copterTravelDir.multiplyScalar(-1);
      copterRunState = "return_overhead";
    }
  }
  else if(copterRunState === "return_overhead"){
    // Retreat stays adaptive: follow the truck's *current* forward direction.
    const retreatTargetX = fr.p.x + (fr.fwd.x * COPTER_FAR_AHEAD_DIST);
    const retreatTargetZ = fr.p.z + (fr.fwd.z * COPTER_FAR_AHEAD_DIST);
    const steerX = retreatTargetX - copter.position.x;
    const steerZ = retreatTargetZ - copter.position.z;
    const steerLen = Math.hypot(steerX, steerZ);

    if(steerLen > 1e-6){
      const desiredX = steerX / steerLen;
      const desiredZ = steerZ / steerLen;
      const steerLerp = Math.min(1, dt * 3.0);
      copterTravelDir.x += (desiredX - copterTravelDir.x) * steerLerp;
      copterTravelDir.z += (desiredZ - copterTravelDir.z) * steerLerp;
      const dirLen = Math.hypot(copterTravelDir.x, copterTravelDir.z);
      if(dirLen > 1e-6){
        copterTravelDir.x /= dirLen;
        copterTravelDir.z /= dirLen;
      }
    }

    moveCopterAlongDir(dt, COPTER_MOVE_SPEED);
    copterPhaseTimer += dt;

    const relX = copter.position.x - fr.p.x;
    const relZ = copter.position.z - fr.p.z;
    const aheadDot = (relX * fr.fwd.x) + (relZ * fr.fwd.z);

    if(aheadDot > COPTER_FAR_AHEAD_DIST || copterPhaseTimer >= COPTER_RETURN_MAX_SEC){
      startCopterWait();
    }
  }
  else if(copterRunState === "wait"){
    copterPhaseTimer = Math.max(0, copterPhaseTimer - dt);
    if(copterPhaseTimer <= 0){
      startCopterAttackFront();
    }
  }

  if(copter.visible){
    const bob = Math.sin(copterBobT * (Math.PI * 2) * COPTER_BOB_HZ) * COPTER_BOB_AMP;
    const groundY = terrainReady ? heightAtWorldXZ(copter.position.x, copter.position.z) : fr.truckY;
    const yBase = Number.isFinite(groundY) ? groundY : fr.truckY;
    const yTarget = yBase + COPTER_ATTACK_ABOVE_TRUCK + bob;
    const yLerp = Math.min(1, dt * 4.0);
    copter.position.y += (yTarget - copter.position.y) * yLerp;

    // Keep billboard facing player camera.
    copter.lookAt(camera.position.x, copter.position.y, camera.position.z);
  }

  setCopterSoundForPhase();
}


function getActiveVehicleTargetPos(){
  if(truckPlane){
    return truckPlane.position.clone();
  }
  const p = controls.getObject().position;
  return new THREE.Vector3(p.x, p.y - PLAYER_EYE_HEIGHT + (TRUCK_H * 0.5), p.z);
}

function getTankInterceptPoint(targetPos){
  const fr = _getCopterFrame();
  const ix = targetPos.x + (fr.fwd.x * TANK_APPROACH_FWD) + (fr.right.x * TANK_APPROACH_SIDE * tankApproachSideSign);
  const iz = targetPos.z + (fr.fwd.z * TANK_APPROACH_FWD) + (fr.right.z * TANK_APPROACH_SIDE * tankApproachSideSign);
  const iy = terrainReady ? heightAtWorldXZ(ix, iz) + (TANK_SCALE * 0.36) : targetPos.y;
  return new THREE.Vector3(ix, Number.isFinite(iy) ? iy : targetPos.y, iz);
}

function spawnTank(){
  if(!TANK_ENABLE || tank) return;
  if(tankSpawnCount >= TANK_MAX_COUNT) return;

  const tex = new THREE.TextureLoader().load(
    TEX_DIR + TANK_FILE,
    t => { t.colorSpace = THREE.SRGBColorSpace; },
    undefined,
    () => hudLine("❌ Missing <code>" + TANK_FILE + "</code>")
  );

  const mat = new THREE.MeshStandardMaterial({
    map: tex,
    transparent: true,
    alphaTest: 0.45,
    side: THREE.DoubleSide
  });

  const geo = new THREE.PlaneGeometry(TANK_SCALE, TANK_SCALE * 0.72);
  tank = new THREE.Mesh(geo, mat);
  tank.castShadow = true;
  tank.receiveShadow = false;

  tankApproachSideSign = Math.random() < 0.5 ? -1 : 1;
  const targetPos = getActiveVehicleTargetPos();
  const spawnPos = getTankInterceptPoint(targetPos);
  // Stationary tank: spawn once at the front-diagonal point and hold position.
  const tankSpawnXZ = resolvePuebloCubePenetrationXZ(spawnPos.x, spawnPos.z, Math.max(0.9, TANK_SCALE * 0.30));
  tank.position.set(tankSpawnXZ.x, spawnPos.y, tankSpawnXZ.z);
  tank.rotation.y = Math.atan2(targetPos.x - tank.position.x, targetPos.z - tank.position.z);

  scene.add(tank);
  tankShotTimer = 0.65;
  tankAttackTimer = TANK_ATTACK_DURATION_SEC;
  tankSpawnCount += 1;
  tankRespawnTimer = 0.0;
  tankHitCount = 0;
  hudLine("🛡️ Tank chaser enabled: <code>" + TANK_FILE + "</code> (45° front approach)");
}

function fireTankOrangeBall(){
  if(!tank) return;

  const target = getActiveVehicleTargetPos();
  const start = tank.position.clone();
  const dir = target.sub(start);
  if(dir.lengthSq() < 1e-8) return;
  dir.normalize();
  dir.y = Math.max(-0.18, Math.min(0.18, dir.y));
  dir.normalize();

  const geom = new THREE.SphereGeometry(TANK_SHOT_RADIUS, 12, 12);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xff9b2f,
    emissive: 0xb35300,
    emissiveIntensity: 0.78
  });
  const ball = new THREE.Mesh(geom, mat);
  ball.position.copy(start);
  ball.position.y += TANK_SCALE * 0.12;
  scene.add(ball);

  tankOrangeBalls.push({
    mesh: ball,
    vel: dir.multiplyScalar(TANK_SHOT_SPEED),
    life: TANK_SHOT_LIFE_SEC
  });
}

function destroyTankAndScheduleRespawn(){
  if(!tank) return;

  scene.remove(tank);
  if(tank.geometry) tank.geometry.dispose();
  if(tank.material){
    if(Array.isArray(tank.material)){
      tank.material.forEach((m)=>{ if(m && m.dispose) m.dispose(); });
    } else if(tank.material.dispose){
      tank.material.dispose();
    }
  }
  tank = null;
  tankHitCount = 0;

  for(let i = tankOrangeBalls.length - 1; i >= 0; i--){
    const b = tankOrangeBalls[i];
    scene.remove(b.mesh);
    if(b.mesh.geometry) b.mesh.geometry.dispose();
    if(b.mesh.material) b.mesh.material.dispose();
    tankOrangeBalls.splice(i, 1);
  }
}

function updateTank(dt){
  if(isPlayerInCombatSuppressedZone()) return;
  if(!tank){
    if(tankRespawnTimer > 0){
      tankRespawnTimer = Math.max(0, tankRespawnTimer - dt);
      if(tankRespawnTimer <= 0){
        spawnTank();
      }
    }
    return;
  }

  const target = getActiveVehicleTargetPos();

  // Keep tank outside the pueblo block volume (solid wall behavior).
  const tankSafeXZ = resolvePuebloCubePenetrationXZ(tank.position.x, tank.position.z, Math.max(0.9, TANK_SCALE * 0.30));
  tank.position.x = tankSafeXZ.x;
  tank.position.z = tankSafeXZ.z;

  // Stationary tank: do not move in XZ, only keep grounded and rotate aim.
  const toTargetX = target.x - tank.position.x;
  const toTargetZ = target.z - tank.position.z;
  tank.rotation.y = Math.atan2(toTargetX, toTargetZ);

  const groundY = terrainReady ? heightAtWorldXZ(tank.position.x, tank.position.z) : (target.y - (TRUCK_H * 0.5));
  const yBase = Number.isFinite(groundY) ? groundY : (target.y - (TRUCK_H * 0.5));
  tank.position.y = yBase + (TANK_SCALE * 0.36);

  const fireDist = Math.hypot(toTargetX, toTargetZ);

  const fr = _getCopterFrame();
  const relTankX = tank.position.x - target.x;
  const relTankZ = tank.position.z - target.z;
  const tankAheadDot = (relTankX * fr.fwd.x) + (relTankZ * fr.fwd.z);
  const passedKillDist = TANK_SCALE * TANK_PASSED_KILL_LENGTHS;
  if(tankAheadDot < -passedKillDist){
    destroyTankAndScheduleRespawn();
    return;
  }

  tankAttackTimer = Math.max(0, tankAttackTimer - dt);
  if(tankAttackTimer <= 0){
    destroyTankAndScheduleRespawn();
    return;
  }

  tankShotTimer -= dt;
  if(tankShotTimer <= 0 && fireDist <= TANK_FIRE_RANGE){
    fireTankOrangeBall();
    tankShotTimer = TANK_SHOT_INTERVAL_SEC;
  }
}

function updateTankOrangeBalls(dt){
  for(let i = tankOrangeBalls.length - 1; i >= 0; i--){
    const b = tankOrangeBalls[i];
    const prevX = b.mesh.position.x;
    const prevZ = b.mesh.position.z;
    b.mesh.position.addScaledVector(b.vel, dt);
    b.life -= dt;

    if(applyPuebloCubeBlock(b.mesh, prevX, prevZ, TANK_SHOT_RADIUS, false) || applySpawnHalfCaveWallBlock(b.mesh, prevX, prevZ, TANK_SHOT_RADIUS)){
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      tankOrangeBalls.splice(i, 1);
      continue;
    }

    let hitTruck = false;
    const p = b.mesh.position;

    if(truckPlane){
      __tmpBox.setFromObject(truckPlane);
      const cp = __tmpBox.clampPoint(p, __tmpV3);
      const d2Truck = cp.distanceToSquared(p);
      hitTruck = d2Truck <= (TANK_SHOT_RADIUS * TANK_SHOT_RADIUS * 4.0);
    } else {
      const targetPos = controls.getObject().position;
      const tx = p.x - targetPos.x;
      const ty = p.y - targetPos.y;
      const tz = p.z - targetPos.z;
      hitTruck = ((tx*tx) + (ty*ty) + (tz*tz)) <= 1.0;
    }

    if(hitTruck){
      adjustPlayerHealthPct(-15);
      spawnHitBurst(p, 0xffa34a);
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      tankOrangeBalls.splice(i, 1);
      continue;
    }

    if(b.life <= 0){
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      tankOrangeBalls.splice(i, 1);
    }
  }
}

function updateFireball(dt){

  if(isPlayerInCombatSuppressedZone()){
    if(fireball){
      scene.remove(fireball);
      if(fireball.geometry) fireball.geometry.dispose();
      if(fireball.material){
        if(Array.isArray(fireball.material)) fireball.material.forEach((m)=>{ if(m && m.dispose) m.dispose(); });
        else if(fireball.material.dispose) fireball.material.dispose();
      }
      fireball = null;
    }
    return;
  }

  if(!fireballPhaseStarted){
    if(tankSpawnCount >= TANK_MAX_COUNT && !tank && tankRespawnTimer <= 0){
      fireballPhaseStarted = true;
      fireballStartDelayTimer = FIREBALL_START_DELAY_SEC;
      hudLine("🔥 Fireball phase primed. First incoming in <code>30s</code>.");
    }
    return;
  }

  if(!fireball){
    if(fireballSpawnCount >= FIREBALL_MAX_COUNT) return;

    if(fireballStartDelayTimer > 0){
      fireballStartDelayTimer = Math.max(0, fireballStartDelayTimer - dt);
      if(fireballStartDelayTimer <= 0){
        spawnFireball();
      }
      return;
    }

    if(fireballRespawnTimer > 0){
      fireballRespawnTimer = Math.max(0, fireballRespawnTimer - dt);
      if(fireballRespawnTimer <= 0){
        spawnFireball();
      }
    }
    return;
  }

  const target = getActiveVehicleTargetPos();
  const dx = target.x - fireball.position.x;
  const dz = target.z - fireball.position.z;
  const dist = Math.hypot(dx, dz);

  if(dist > 1e-6){
    const dirX = dx / dist;
    const dirZ = dz / dist;
    const prevX = fireball.position.x;
    const prevZ = fireball.position.z;
    fireball.position.x += dirX * FIREBALL_MOVE_SPEED * dt;
    fireball.position.z += dirZ * FIREBALL_MOVE_SPEED * dt;
    fireball.rotation.y = Math.atan2(dx, dz);

    if(applyPuebloCubeBlock(fireball, prevX, prevZ, Math.max(0.5, FIREBALL_SCALE * 0.28), false) || applySpawnHalfCaveWallBlock(fireball, prevX, prevZ, Math.max(0.5, FIREBALL_SCALE * 0.28))){
      spawnHitBurst(fireball.position, 0xff7a33);
      destroyFireballAndScheduleNext(false);
      return;
    }
  }

  const groundY = terrainReady ? heightAtWorldXZ(fireball.position.x, fireball.position.z) : (target.y - (TRUCK_H * 0.5));
  const yBase = Number.isFinite(groundY) ? groundY : (target.y - (TRUCK_H * 0.5));
  fireball.position.y = yBase + (FIREBALL_SCALE * 0.5);

  let hitTruck = false;
  if(truckPlane){
    __tmpBox.setFromObject(truckPlane);
    const cp = __tmpBox.clampPoint(fireball.position, __tmpV3);
    const d2 = cp.distanceToSquared(fireball.position);
    hitTruck = d2 <= (FIREBALL_CRASH_RADIUS * FIREBALL_CRASH_RADIUS * 4.0);
  } else {
    const p = controls.getObject().position;
    const fx = fireball.position.x - p.x;
    const fy = fireball.position.y - p.y;
    const fz = fireball.position.z - p.z;
    hitTruck = ((fx*fx) + (fy*fy) + (fz*fz)) <= (FIREBALL_CRASH_RADIUS * FIREBALL_CRASH_RADIUS);
  }

  if(hitTruck){
    adjustPlayerHealthPct(-15);
    spawnHitBurst(fireball.position, 0xff7a33);
    destroyFireballAndScheduleNext(false);
  }
}

function setRepeat(tex, rep){

function loadTextureSafe(url, { colorSpace=null } = {}){

/* =========================================================
   TERRAIN STATE (heightmap pixels + sampler)
   ========================================================= */
let terrainReady = false;
let hmW = 0, hmH = 0;
let hmData = null;
let terrainMinY = 0;
let terrainMaxY = TERRAIN_HEIGHT;

// ===== Tall grass height controller pixels (dg_disp.png) =====
let dgW = 0, dgH = 0;
let dgData = null;

// Load dg_disp.png into pixel data (DATA texture: no sRGB)
async function loadDispPixels(){
  const url = TEX_DIR + GRASS_CARD_HEIGHT_FILE;
  const tex = await loadTextureSafe(url);
  if (!tex || !tex.image){
    hudLine(`⚠️ Tall grass: missing <code>${GRASS_CARD_HEIGHT_FILE}</code> (expected <code>${url}</code>)`);
    return false;
  }

  const img = tex.image;
  dgW = img.width; dgH = img.height;

  const c = document.createElement("canvas");
  c.width = dgW; c.height = dgH;
  const ctx = c.getContext("2d", { willReadFrequently:true });
  ctx.drawImage(img, 0, 0);
  dgData = ctx.getImageData(0, 0, dgW, dgH).data;

  hudLine(`✅ Tall grass height map loaded: <code>${GRASS_CARD_HEIGHT_FILE}</code> (${dgW}×${dgH})`);
  return true;
}

// Sample dg_disp at world XZ -> [0..1] brightness (red channel)
function dispAtWorldXZ(x, z){
  if (!dgData) return 0.5;

  let u = (x / GROUND_SIZE) + 0.5;
  let v = (-z / GROUND_SIZE) + 0.5;

  // Clamp (keeps us safe when you walk near edges)
  u = clamp01(u);
  v = clamp01(v);

  const px = Math.floor(u * (dgW - 1));
  const py = Math.floor((1 - v) * (dgH - 1));
  const idx = (py * dgW + px) * 4;

  return dgData[idx] / 255;
}

function clamp01(t){ return Math.max(0, Math.min(1, t)); }

// Bilinear height sample
function heightAtWorldXZ(x, z){
  if (!terrainReady || !hmData) return 0;

  let u = (x / GROUND_SIZE) + 0.5;
  let v = (-z / GROUND_SIZE) + 0.5;

  if (CLAMP_OUTSIDE_TERRAIN) {
    u = clamp01(u);
    v = clamp01(v);
  } else {
    if (u < 0 || u > 1 || v < 0 || v > 1) return 0;
  }

  const fx = u * (hmW - 1);
  const fy = (1 - v) * (hmH - 1);

  const x0 = Math.floor(fx), y0 = Math.floor(fy);
  const x1 = Math.min(hmW - 1, x0 + 1);
  const y1 = Math.min(hmH - 1, y0 + 1);

  const tx = fx - x0;
  const ty = fy - y0;

  function rAt(px, py){
    const idx = (py * hmW + px) * 4;
    return hmData[idx];
  }

  const h00 = rAt(x0, y0) / 255;
  const h10 = rAt(x1, y0) / 255;
  const h01 = rAt(x0, y1) / 255;
  const h11 = rAt(x1, y1) / 255;

  const h0 = h00 * (1 - tx) + h10 * tx;
  const h1 = h01 * (1 - tx) + h11 * tx;
  const h  = h0 * (1 - ty) + h1 * ty;

  return h * TERRAIN_HEIGHT;
}

const LAKE_ENABLE = true;
const LAKE_SIZE = 2200;      // bigger so you can't miss it      // width/length of lake plane (world units)

// Lake placement:
// "VALLEY" = find lowest spot within a radius around LAKE_CENTER_XZ (recommended)
// "FIXED"  = place lake at LAKE_CENTER_XZ with Y set from terrain at that point + offset
const LAKE_PLACEMENT_MODE = "VALLEY"; // "VALLEY" or "FIXED"
const LAKE_CENTER_X = 0;             // move lake left/right
const LAKE_CENTER_Z = -650;          // move lake forward/back (negative is "straight ahead" at start)
const LAKE_Y_OFFSET = 8.64;          // +20% lake upper surface elevation from 7.2
const LAKE_EDGE_FADE = 0.35; // 0–1 (visual softness via opacity only)

// --- Shoreline grounding (painterly edge control) ---
const SHORELINE_ENABLE = true;
const SHORELINE_WIDTH_UV = 0.13;   // 0.06–0.20 (smaller = thinner dark rim)
const SHORELINE_SOFT_UV  = 0.08;   // softness of the rim falloff
const SHORELINE_DARK     = 0.58;   // multiplier at the very edge (0.45–0.75)
const LAKE_RIPPLE_ENABLE = true;
const LAKE_RIPPLE_AMP = 0.35;    // ripple height in world units (keep small!)    // ripple height in world units (keep small!)
const LAKE_RIPPLE_SPEED = 0.45;  // animation speed  // animation speed
const LAKE_RIPPLE_SCALE = 0.020; // wave frequency (smaller = larger waves)
let lakeMesh = null;
let elevationZones = null;
let highZoneTex = null;
let lowZoneTex = null;

// ----- Collision (Step 1: lake blocker) -----
let lastSafePos = new THREE.Vector3(0, 0, 0);
let lastSafeInit = false;
let prevPos = new THREE.Vector3(0, 0, 0);
const LAKE_BLOCK_ENABLE = false;
const LAKE_BLOCK_MARGIN = 18; // shoreline buffer (world units)

// Pick a sensible lake height after terrain is ready:
// sample heights in a valley-ish area near the origin and set water slightly above the local minimum.
function pickLakeY(cx, cz){
  // If terrain isn't ready yet, fall back
  if (!terrainReady) return 40;

  const R = 650;     // sampling radius around (cx,cz)
  const STEP = 85;   // sampling step
  let minH = Infinity;

  for (let x = -R; x <= R; x += STEP){
    for (let z = -R; z <= R; z += STEP){
      const h = heightAtWorldXZ(cx + x, cz + z);
      if (h < minH) minH = h;
    }
  }

  // Put lake slightly above the local min so it sits "in the valley"
  let y = minH + LAKE_Y_OFFSET;

  // Clamp to a reasonable range so it can't end up absurdly low/high
  y = Math.max(5, Math.min(y, TERRAIN_HEIGHT * 0.65));
  return y;
}

function buildElevationZones(lakeSurfaceY){
  const observedMin = Number.isFinite(terrainMinY) ? terrainMinY : 0;
  const observedMax = Number.isFinite(terrainMaxY) ? terrainMaxY : TERRAIN_HEIGHT;
  const lakeTop = THREE.MathUtils.clamp(lakeSurfaceY, observedMin, observedMax);
  const zoneSpan = Math.max(0, observedMax - lakeTop);
  const zoneStep = zoneSpan / 3;

  elevationZones = {
    lake:   { min: observedMin, max: lakeTop },
    low:    { min: lakeTop, max: lakeTop + zoneStep },
    medium: { min: lakeTop + zoneStep, max: lakeTop + (zoneStep * 2) },
    high:   { min: lakeTop + (zoneStep * 2), max: observedMax }
  };

  return elevationZones;
}

function updateHighZoneBlendUniforms(){
  const uniforms = ground && ground.material && ground.material.userData
    ? ground.material.userData.highZoneUniforms
    : null;
  if(!uniforms) return;
  const { minY, maxY } = computeUpperZoneRange();
  uniforms.uHighMinY.value = minY;
  uniforms.uHighMaxY.value = Math.max(minY + 0.001, maxY);
}

function updateLowZoneBlendUniforms(){
  const uniforms = ground && ground.material && ground.material.userData
    ? ground.material.userData.lowZoneUniforms
    : null;
  if(!uniforms) return;
  const { minY, maxY } = computeLowerZoneRange();
  uniforms.uLowMinY.value = minY;
  uniforms.uLowMaxY.value = Math.max(minY + 0.001, maxY);
}

function getHighZoneCoveragePercent(minY){
  const pos = ground && ground.geometry && ground.geometry.attributes ? ground.geometry.attributes.position : null;
  if(!pos || !pos.count) return 0;
  let hit = 0;
  for(let i = 0; i < pos.count; i++){
    if(pos.getY(i) >= minY) hit++;
  }
  return (hit / pos.count) * 100;
}

function getLowZoneCoveragePercent(maxY){
  const pos = ground && ground.geometry && ground.geometry.attributes ? ground.geometry.attributes.position : null;
  if(!pos || !pos.count) return 0;
  let hit = 0;
  for(let i = 0; i < pos.count; i++){
    if(pos.getY(i) <= maxY) hit++;
  }
  return (hit / pos.count) * 100;
}

function computeUpperZoneRange(){
  const observedMin = Number.isFinite(terrainMinY) ? terrainMinY : 0;
  const observedMax = Number.isFinite(terrainMaxY) ? terrainMaxY : TERRAIN_HEIGHT;
  const span = Math.max(0.001, observedMax - observedMin);
  const minRaw = observedMin + (span * HIGH_ZONE_START_FRAC);
  const maxY = observedMax;
  const soften = span * 0.03;
  const minY = Math.max(observedMin, minRaw - soften);
  return { minY, maxY };
}

function computeLowerZoneRange(){
  const observedMin = Number.isFinite(terrainMinY) ? terrainMinY : 0;
  const observedMax = Number.isFinite(terrainMaxY) ? terrainMaxY : TERRAIN_HEIGHT;
  const span = Math.max(0.001, observedMax - observedMin);

  const zoneLow = elevationZones && elevationZones.low ? elevationZones.low : null;
  const minY = zoneLow ? zoneLow.min : observedMin;
  const maxRaw = zoneLow
    ? (zoneLow.min + ((zoneLow.max - zoneLow.min) * LOW_ZONE_END_FRAC))
    : (observedMin + (span * 0.20));

  const soften = span * 0.03;
  const maxY = Math.min(observedMax, maxRaw + soften);
  return { minY, maxY };
}

async function applyHighZoneTextureTest(){
  const mat = ground && ground.material;
  if(!mat || !mat.map) return;

  if(!highZoneTex){
    const highUrl = TEX_DIR + HIGH_ZONE_TEX_FILE;
    highZoneTex = await loadTextureSafe(highUrl, { colorSpace: THREE.SRGBColorSpace });
    if(!highZoneTex){
      hudLine(`⚠️ High-zone test texture missing: <code>${HIGH_ZONE_TEX_FILE}</code>`);
      return;
    }
    setRepeat(highZoneTex, HIGH_ZONE_TEX_REPEAT);
  }

  if(!lowZoneTex){
    const lowUrl = TEX_DIR + LOW_ZONE_TEX_FILE;
    lowZoneTex = await loadTextureSafe(lowUrl, { colorSpace: THREE.SRGBColorSpace });
    if(!lowZoneTex){
      hudLine(`⚠️ Low-zone test texture missing: <code>${LOW_ZONE_TEX_FILE}</code>`);
      return;
    }
    setRepeat(lowZoneTex, LOW_ZONE_TEX_REPEAT);
  }

  const highRange = computeUpperZoneRange();
  const lowRange = computeLowerZoneRange();

  const highUniforms = {
    uHighTex: { value: highZoneTex },
    uHighMinY: { value: highRange.minY },
    uHighMaxY: { value: Math.max(highRange.minY + 0.001, highRange.maxY) },
    uHighBlendBand: { value: HIGH_ZONE_BLEND_BAND }
  };
  const lowUniforms = {
    uLowTex: { value: lowZoneTex },
    uLowMinY: { value: lowRange.minY },
    uLowMaxY: { value: Math.max(lowRange.minY + 0.001, lowRange.maxY) },
    uLowBlendBand: { value: LOW_ZONE_BLEND_BAND }
  };

  mat.userData.highZoneUniforms = highUniforms;
  mat.userData.lowZoneUniforms = lowUniforms;

  mat.onBeforeCompile = (shader)=>{
    shader.uniforms.uHighTex = highUniforms.uHighTex;
    shader.uniforms.uHighMinY = highUniforms.uHighMinY;
    shader.uniforms.uHighMaxY = highUniforms.uHighMaxY;
    shader.uniforms.uHighBlendBand = highUniforms.uHighBlendBand;
    shader.uniforms.uLowTex = lowUniforms.uLowTex;
    shader.uniforms.uLowMinY = lowUniforms.uLowMinY;
    shader.uniforms.uLowMaxY = lowUniforms.uLowMaxY;
    shader.uniforms.uLowBlendBand = lowUniforms.uLowBlendBand;

    shader.vertexShader = shader.vertexShader
      .replace(
        "#include <common>",
        "#include <common>\nvarying float vWorldY;"
      )
      .replace(
        "#include <worldpos_vertex>",
        "#include <worldpos_vertex>\nvWorldY = worldPosition.y;"
      );

    shader.fragmentShader = shader.fragmentShader
      .replace(
        "#include <common>",
        "#include <common>\nvarying float vWorldY;\nuniform sampler2D uHighTex;\nuniform float uHighMinY;\nuniform float uHighMaxY;\nuniform float uHighBlendBand;\nuniform sampler2D uLowTex;\nuniform float uLowMinY;\nuniform float uLowMaxY;\nuniform float uLowBlendBand;"
      )
      .replace(
        "#include <map_fragment>",
        "#include <map_fragment>\n#ifdef USE_MAP\n  float highT = smoothstep(uHighMinY - uHighBlendBand, uHighMinY + uHighBlendBand, vWorldY);\n  highT = max(highT, step(uHighMinY + uHighBlendBand, vWorldY));\n  float lowT = 1.0 - smoothstep(uLowMaxY - uLowBlendBand, uLowMaxY + uLowBlendBand, vWorldY);\n  lowT = max(lowT, step(vWorldY, uLowMaxY - uLowBlendBand));\n  highT = clamp(highT, 0.0, 1.0);\n  lowT = clamp(lowT, 0.0, 1.0);\n  lowT *= (1.0 - highT);\n  vec3 zoneRgb = diffuseColor.rgb;\n  vec4 lowSample = texture2D(uLowTex, vMapUv);\n  vec4 highSample = texture2D(uHighTex, vMapUv);\n  zoneRgb = mix(zoneRgb, lowSample.rgb, clamp(lowT, 0.0, 1.0));\n  zoneRgb = mix(zoneRgb, highSample.rgb, clamp(highT, 0.0, 1.0));\n  diffuseColor.rgb = zoneRgb;\n#endif"
      );
  };

  mat.needsUpdate = true;
  updateLowZoneBlendUniforms();
  updateHighZoneBlendUniforms();
  const lowPct = getLowZoneCoveragePercent(lowRange.maxY);
  const highPct = getHighZoneCoveragePercent(highRange.minY);
  hudLine(`🧪 Elevation textures ON: low <code>${LOW_ZONE_TEX_FILE}</code> (${lowPct.toFixed(1)}%) • high <code>${HIGH_ZONE_TEX_FILE}</code> (${highPct.toFixed(1)}%).`);
}


function updateLakeRipples(time){
  if (!LAKE_RIPPLE_ENABLE || !lakeMesh) return;
  const geo = lakeMesh.geometry;
  const base = geo.userData.basePositions;
  if (!base) return;

  const pos = geo.attributes.position;
  const a = pos.array;

  const t = time * LAKE_RIPPLE_SPEED;
  const amp = LAKE_RIPPLE_AMP;
  const s = LAKE_RIPPLE_SCALE;

  // Very subtle 2-wave sum. We only move Y, keep X/Z same.
  for (let i = 0; i < a.length; i += 3){
    const x = base[i + 0];
    const y0 = base[i + 1];
    const z = base[i + 2];

    const w1 = Math.sin((x * s) + (t));
    const w2 = Math.sin((z * s * 1.15) + (t * 1.3));
    a[i + 1] = y0 + (w1 + w2) * 0.5 * amp;
  }

  pos.needsUpdate = true;
  // Keep normals as-is (ripples are tiny). If you ever increase AMP a lot, recompute normals occasionally.
}

function createLake(){
  if (!LAKE_ENABLE) return;

  // Remove old lake if re-created
  if (lakeMesh){
    scene.remove(lakeMesh);
    lakeMesh.geometry.dispose();
    // material may be shared; ignore dispose for safety
    lakeMesh = null;
  }

  const cx = LAKE_CENTER_X;
  const cz = LAKE_CENTER_Z;

  const lakeY = (LAKE_PLACEMENT_MODE === "FIXED")
    ? (heightAtWorldXZ(cx, cz) + LAKE_Y_OFFSET)
    : pickLakeY(cx, cz);
  const zones = buildElevationZones(lakeY);

  const geo = new THREE.PlaneGeometry(LAKE_SIZE, LAKE_SIZE, 80, 80); // enough verts for subtle ripples
  geo.rotateX(-Math.PI/2);

  // Store original positions for ripple animation
  const pos = geo.attributes.position;
  const base = new Float32Array(pos.array.length);
  base.set(pos.array);
  geo.userData.basePositions = base;
const mat = new THREE.MeshStandardMaterial({
    color: 0x193652,
    transparent: true,
    opacity: 0.82,
    roughness: 0.25,
    metalness: 0.0
  });
  // Reduce z-fighting where terrain touches water
  mat.polygonOffset = true;
  mat.polygonOffsetFactor = -1;
  mat.polygonOffsetUnits = -1;


  lakeMesh = new THREE.Mesh(geo, mat);
  lakeMesh.position.set(cx, lakeY, cz);
  lakeMesh.receiveShadow = false;
  lakeMesh.castShadow = false;

  // A tiny tilt prevents z-fighting if the terrain touches the waterline
  lakeMesh.rotation.y = 0.15;

  scene.add(lakeMesh);
  console.log("LAKE: created at", {x:cx, y:lakeY, z:cz, size:LAKE_SIZE});
  hudLine(`🏞️ LAKE ON (shoreline shader OFF): x=<code>${cx.toFixed(0)}</code> z=<code>${cz.toFixed(0)}</code> y=<code>${lakeY.toFixed(1)}</code> size=<code>${LAKE_SIZE}</code>`);
  hudLine(
    `🧭 Elevation zones — ` +
    `Lake: <code>${zones.lake.min.toFixed(1)}-${zones.lake.max.toFixed(1)}</code>, ` +
    `Low: <code>${zones.low.min.toFixed(1)}-${zones.low.max.toFixed(1)}</code>, ` +
    `Medium: <code>${zones.medium.min.toFixed(1)}-${zones.medium.max.toFixed(1)}</code>, ` +
    `High: <code>${zones.high.min.toFixed(1)}-${zones.high.max.toFixed(1)}</code>`
  );
  updateLowZoneBlendUniforms();
  updateHighZoneBlendUniforms();
}




function removeSpritesInsidePuebloPlaza(sprites, centerX, centerZ, halfX, halfZ){
  if(!Array.isArray(sprites) || !sprites.length) return 0;
  let removed = 0;
  for(let i = sprites.length - 1; i >= 0; i--){
    const m = sprites[i];
    if(!m) continue;
    const x = m.position ? m.position.x : 0;
    const z = m.position ? m.position.z : 0;
    if(Math.abs(x - centerX) <= halfX && Math.abs(z - centerZ) <= halfZ){
      scene.remove(m);
      sprites.splice(i, 1);
      removed++;
    }
  }
  return removed;
}

function clearTreesFromPuebloPlaza(){
  if(!PUEBLO_PLAZA_TREE_CLEAR_ENABLE || !puebloTestCube) return 0;

  const ft = WORLD_UNITS_PER_FOOT;
  const margin = PUEBLO_PLAZA_TREE_CLEAR_MARGIN_FT * ft;
  const centerX = puebloTestCube.position.x + (PUEBLO_PLAN_WALL_CENTER_X_FT * ft);
  const centerZ = puebloTestCube.position.z + (PUEBLO_PLAN_WALL_CENTER_Z_FT * ft);
  const half = (PUEBLO_PLAN_WALL_HALF_SIDE_FT * ft) + margin;

  let removed = 0;
  removed += removeSpritesInsidePuebloPlaza(lowTreeSprites, centerX, centerZ, half, half);
  removed += removeSpritesInsidePuebloPlaza(lowTree3Sprites, centerX, centerZ, half, half);
  removed += removeSpritesInsidePuebloPlaza(midTree7Sprites, centerX, centerZ, half, half);

  if(removed > 0){
    hudLine("🧹 Cleared trees from fountain plaza: <code>" + removed + "</code> removed.");
  }
  return removed;
}

async function applyHeightmapToGround(){
  if (!USE_TERRAIN){
    hudLine("ℹ️ Terrain disabled (USE_TERRAIN=false).");
    terrainReady = false;
    return;
  }

  const hmUrl = TEX_DIR + HEIGHTMAP_FILE;

  // Heightmap is DATA (no sRGB)
  const hmTex = await loadTextureSafe(hmUrl);
  if (!hmTex || !hmTex.image){
    hudLine(`❌ Heightmap missing: <code>${HEIGHTMAP_FILE}</code>`);
    terrainReady = false;
    return;
  }

  const img = hmTex.image;
  hmW = img.width;
  hmH = img.height;

  const canvas = document.createElement("canvas");
  canvas.width = hmW;
  canvas.height = hmH;
  const ctx = canvas.getContext("2d", { willReadFrequently:true });
  ctx.drawImage(img, 0, 0);
  hmData = ctx.getImageData(0, 0, hmW, hmH).data;

  const pos = ground.geometry.attributes.position;
  const uv  = ground.geometry.attributes.uv;
  let observedMin = Infinity;
  let observedMax = -Infinity;

  for (let i = 0; i < pos.count; i++){
    const u = uv.getX(i);
    const v = uv.getY(i);

    const x = Math.floor(u * (hmW - 1));
    const y = Math.floor((1 - v) * (hmH - 1));
    const idx = (y * hmW + x) * 4;

    const r = hmData[idx];
    const yWorld = (r / 255) * TERRAIN_HEIGHT;
    pos.setY(i, yWorld);
    if(yWorld < observedMin) observedMin = yWorld;
    if(yWorld > observedMax) observedMax = yWorld;
  }

  pos.needsUpdate = true;
  ground.geometry.computeVertexNormals();
  terrainMinY = Number.isFinite(observedMin) ? observedMin : 0;
  terrainMaxY = Number.isFinite(observedMax) ? observedMax : TERRAIN_HEIGHT;

  terrainReady = true;
  hudLine(`✅ Terrain applied: <code>${HEIGHTMAP_FILE}</code> (${hmW}×${hmH}), segments=${TERRAIN_SEGMENTS}, height=${TERRAIN_HEIGHT}`);


  // STEP L1: create lake once terrain is ready
  createLake();

  // STEP TG1: create tall grass blades once terrain is ready
  createTallGrass();
  createTargets();
  spawnBadGuy();
  spawnBadGuy();
  spawnCopter();
  spawnTank();
  fireballPhaseStarted = true;
  fireballStartDelayTimer = FIREBALL_START_DELAY_SEC;
  fireballRespawnTimer = 0.0;
  fireballSpawnCount = 0;
  hudLine("🔥 Fireball phase armed at spawn.");
  // snap player to terrain
  const p = controls.getObject().position;
  p.y = heightAtWorldXZ(p.x, p.z) + PLAYER_EYE_HEIGHT;
  playStartSpawnMusicOnce();
  placeSpawnPostNearSpawn(p.x, p.z);
  placePuebloTestCubeNearSpawn(p.x, p.z);
  placeBuffNearPickupSpawn(p.x, p.z);
  await createLakeZoneBushes();
  await createLowZoneTrees();
  await createLowZoneTree3();
  await createMidZoneTree7();
  clearTreesFromPuebloPlaza();
}
