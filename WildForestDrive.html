<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bigfoot Woods Drive</title>
<style>
  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
  }

  #bigfoot {
    position: fixed;
    left: 50vw;
    top: 82vh;
    width: min(31.36vw, 246.4px);
    height: auto;
    z-index: 3;
    transform: translate(-50%, -50%);
    pointer-events: none;
    -webkit-user-drag: none;
  }

  #smallCubeWrap {
    --cube-size: min(1.3125vw, 10.3125px);
    position: fixed;
    left: 50vw;
    top: 58vh;
    width: var(--cube-size);
    height: var(--cube-size);
    z-index: 2;
    perspective: 700px;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }

  #smallCube {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transform: rotateX(-18deg) rotateY(34deg);
  }

  .cube-face {
    position: absolute;
    inset: 0;
    border: 2px solid rgba(255,255,255,0.34);
    background: rgba(220,0,0,0.82);
    box-shadow: inset 0 0 28px rgba(0,0,0,0.28);
  }

  .cube-front { transform: translateZ(calc(var(--cube-size) / 2)); }
  .cube-back { transform: rotateY(180deg) translateZ(calc(var(--cube-size) / 2)); }
  .cube-right { transform: rotateY(90deg) translateZ(calc(var(--cube-size) / 2)); background: rgba(175,0,0,0.82); }
  .cube-left { transform: rotateY(-90deg) translateZ(calc(var(--cube-size) / 2)); background: rgba(245,20,20,0.82); }
  .cube-top { transform: rotateX(90deg) translateZ(calc(var(--cube-size) / 2)); background: rgba(255,58,58,0.82); }
  .cube-bottom { transform: rotateX(-90deg) translateZ(calc(var(--cube-size) / 2)); background: rgba(125,0,0,0.82); }

  .crash-zone {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    width: 100vw;
    z-index: 4;
    pointer-events: none;
    border: 0;
    background: transparent;
  }

  #leftCrashZone {
    clip-path: polygon(
      0 0,
      var(--leftCrashTopX, 30vw) 0,
      var(--leftCrashBottomX, 21.84vw) 100%,
      0 100%
    );
  }

  #rightCrashZone {
    clip-path: polygon(
      calc(100% - var(--rightCrashTopX, 30vw)) 0,
      100% 0,
      100% 100%,
      calc(100% - var(--rightCrashBottomX, 21.84vw)) 100%
    );
  }

  #controls {
    position: fixed;
    right: max(12px, env(safe-area-inset-right));
    bottom: max(12px, env(safe-area-inset-bottom));
    z-index: 5;
    display: grid;
    grid-template-columns: 64px 64px;
    grid-template-rows: 64px;
    gap: 8px;
  }

  .ctrl {
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 14px;
    background: rgba(0,0,0,0.58);
    color: white;
    font: 900 28px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
    touch-action: none;
  }

  .ctrl:active {
    background: rgba(0,0,0,0.86);
    transform: scale(0.96);
  }

  #leftBtn { grid-column: 1; grid-row: 1; }
  #rightBtn { grid-column: 2; grid-row: 1; }

  @media (max-width: 700px) {
    #bigfoot { width: min(38.08vw, 201.6px); }
    #smallCubeWrap { --cube-size: min(1.5625vw, 8.4375px); }
    #controls {
      grid-template-columns: 56px 56px;
      grid-template-rows: 56px;
      gap: 7px;
    }
    .ctrl { font-size: 24px; border-radius: 12px; }
  }
</style>
</head>
<body>
<video id="video" src="images/road_ipad.mp4" muted loop playsinline webkit-playsinline autoplay preload="auto"></video>
<audio id="carSound" src="images/car_sound.mp3" loop preload="auto"></audio>
<div id="leftCrashZone" class="crash-zone"></div>
<div id="rightCrashZone" class="crash-zone"></div>
<div id="smallCubeWrap" aria-hidden="true">
  <div id="smallCube">
    <div class="cube-face cube-front"></div>
    <div class="cube-face cube-back"></div>
    <div class="cube-face cube-right"></div>
    <div class="cube-face cube-left"></div>
    <div class="cube-face cube-top"></div>
    <div class="cube-face cube-bottom"></div>
  </div>
</div>
<img id="bigfoot" src="images/bigfoot.png" alt="Bigfoot" />

<div id="controls" aria-label="Bigfoot controls">
  <button id="leftBtn" class="ctrl" type="button" aria-label="Move left">◀</button>
  <button id="rightBtn" class="ctrl" type="button" aria-label="Move right">▶</button>
</div>

<script>
  const video = document.getElementById("video");
  const carSound = document.getElementById("carSound");
  const smallCubeWrap = document.getElementById("smallCubeWrap");
  const bigfoot = document.getElementById("bigfoot");
  const leftCrashZone = document.getElementById("leftCrashZone");
  const rightCrashZone = document.getElementById("rightCrashZone");
  const keys = { left:false, right:false };
  const bigfootStartYFactor = 0.82;
  const cubeStartYFactor = 0.58;
  const cubeTargetYFactor = 0.82;
  const cubeDesktopStart = { vw: 1.3125, max: 10.3125 };
  const cubeDesktopTarget = { vw: 15.75, max: 123.75 };
  const cubeMobileStart = { vw: 1.5625, max: 8.4375 };
  const cubeMobileTarget = { vw: 18.75, max: 101.25 };
  const crashZoneBasePct = 0.18113004;
  const crashZoneWidenByDepthPct = 0.567;
  const crashZoneTopInwardExtraLeftPct = 0.16;
  const rightCrashZoneAngleFromVerticalDeg = 20;
  const crashZonePerspectiveStartYFactor = 0.92;
  const crashZonePerspectiveEndYFactor = 0.2;
  let x = window.innerWidth * 0.5;
  let y = window.innerHeight * bigfootStartYFactor;
  let lastT = performance.now();
  let viewportWidth = window.innerWidth;
  let viewportHeight = window.innerHeight;
  let currentCrashZonePct = crashZoneBasePct;
  let crashZoneTopInwardExtraRightPct = crashZoneTopInwardExtraLeftPct * 1.03;
  let crashBottomY = viewportHeight * crashZonePerspectiveStartYFactor;
  let crashTopY = viewportHeight * crashZonePerspectiveEndYFactor;
  let lastCrashZoneBottomVw = -1;
  let lastLeftCrashZoneTopVw = -1;
  let lastRightCrashZoneTopVw = -1;
  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function refreshViewportCache() {
    viewportWidth = window.innerWidth;
    viewportHeight = window.innerHeight;
    crashBottomY = viewportHeight * crashZonePerspectiveStartYFactor;
    crashTopY = viewportHeight * crashZonePerspectiveEndYFactor;
    const rightAngleRad = (rightCrashZoneAngleFromVerticalDeg * Math.PI) / 180;
    crashZoneTopInwardExtraRightPct = Math.tan(rightAngleRad) * (viewportHeight / viewportWidth);
  }

  function updateCrashZones() {
    const horizonY = viewportHeight * crashZonePerspectiveEndYFactor;
    const nearY = viewportHeight * crashZonePerspectiveStartYFactor;
    const forwardProgress = clamp((nearY - y) / (nearY - horizonY), 0, 1);
    currentCrashZonePct = crashZoneBasePct * (1 + forwardProgress * crashZoneWidenByDepthPct);

    const crashZoneBottomVw = currentCrashZonePct * 100;
    const leftCrashZoneTopVw = (currentCrashZonePct + crashZoneTopInwardExtraLeftPct) * 100;
    const rightCrashZoneTopVw = (currentCrashZonePct + crashZoneTopInwardExtraRightPct) * 100;

    if (Math.abs(crashZoneBottomVw - lastCrashZoneBottomVw) > 0.001) {
      leftCrashZone.style.setProperty("--leftCrashBottomX", `${crashZoneBottomVw}vw`);
      rightCrashZone.style.setProperty("--rightCrashBottomX", `${crashZoneBottomVw}vw`);
      lastCrashZoneBottomVw = crashZoneBottomVw;
    }
    if (Math.abs(leftCrashZoneTopVw - lastLeftCrashZoneTopVw) > 0.001) {
      leftCrashZone.style.setProperty("--leftCrashTopX", `${leftCrashZoneTopVw}vw`);
      lastLeftCrashZoneTopVw = leftCrashZoneTopVw;
    }
    if (Math.abs(rightCrashZoneTopVw - lastRightCrashZoneTopVw) > 0.001) {
      rightCrashZone.style.setProperty("--rightCrashTopX", `${rightCrashZoneTopVw}vw`);
      lastRightCrashZoneTopVw = rightCrashZoneTopVw;
    }
  }

  function getCrashZonePctAtY(yPx, topInwardExtraPct) {
    const yNorm = clamp((crashBottomY - yPx) / (crashBottomY - crashTopY), 0, 1);
    const topPct = currentCrashZonePct + topInwardExtraPct;
    return currentCrashZonePct + (topPct - currentCrashZonePct) * yNorm;
  }

  function isBigfootInCrashZone() {
    const rect = bigfoot.getBoundingClientRect();
    if (!rect.width) return false;
    const halfBigfootWidth = rect.width / 2;
    const leftEdge = x - halfBigfootWidth;
    const rightEdge = x + halfBigfootWidth;
    const leftRoadEdge = viewportWidth * getCrashZonePctAtY(y, crashZoneTopInwardExtraLeftPct);
    const rightRoadEdge = viewportWidth - (viewportWidth * getCrashZonePctAtY(y, crashZoneTopInwardExtraRightPct));
    return leftEdge <= leftRoadEdge || rightEdge >= rightRoadEdge;
  }

  function placeBigfoot() {
    bigfoot.style.left = x + "px";
    bigfoot.style.top = y + "px";
  }

  function moveBigfoot(dx, collide = true) {
    const prevX = x;
    x += dx;
    updateCrashZones();
    placeBigfoot();
    if (collide && isBigfootInCrashZone()) {
      x = prevX;
      updateCrashZones();
      placeBigfoot();
    }
  }

  function getCubeMetrics() {
    const mobile = window.matchMedia("(max-width: 700px)").matches;
    const start = mobile ? cubeMobileStart : cubeDesktopStart;
    const target = mobile ? cubeMobileTarget : cubeDesktopTarget;
    const sizeFrom = (config) => Math.min(viewportWidth * (config.vw / 100), config.max);

    return {
      startX: viewportWidth * 0.5,
      startY: viewportHeight * cubeStartYFactor,
      endX: viewportWidth * 0.5,
      endY: viewportHeight * cubeTargetYFactor,
      startSize: sizeFrom(start),
      endSize: sizeFrom(target)
    };
  }

  function animateSmallCubeToBigCube() {
    const duration = 2000;
    const metrics = getCubeMetrics();
    smallCubeWrap.style.display = "block";
    smallCubeWrap.style.left = metrics.startX + "px";
    smallCubeWrap.style.top = metrics.startY + "px";
    smallCubeWrap.style.width = metrics.startSize + "px";
    smallCubeWrap.style.height = metrics.startSize + "px";
    smallCubeWrap.style.setProperty("--cube-size", metrics.startSize + "px");
    const startTime = performance.now();

    function step(now) {
      const t = clamp((now - startTime) / duration, 0, 1);
      const nextX = metrics.startX + ((metrics.endX - metrics.startX) * t);
      const nextY = metrics.startY + ((metrics.endY - metrics.startY) * t);
      const nextSize = metrics.startSize + ((metrics.endSize - metrics.startSize) * t);

      smallCubeWrap.style.left = nextX + "px";
      smallCubeWrap.style.top = nextY + "px";
      smallCubeWrap.style.width = nextSize + "px";
      smallCubeWrap.style.height = nextSize + "px";
      smallCubeWrap.style.setProperty("--cube-size", nextSize + "px");

      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        smallCubeWrap.style.display = "none";
        requestAnimationFrame(animateSmallCubeToBigCube);
      }
    }

    requestAnimationFrame(step);
  }

  function setHeld(dir, held) {
    keys[dir] = held;
    video.play().catch(() => {});
    carSound.play().catch(() => {});
  }

  function bindButton(id, dir) {
    const btn = document.getElementById(id);
    const down = (ev) => {
      ev.preventDefault();
      setHeld(dir, true);
    };
    const up = (ev) => {
      if (ev) ev.preventDefault();
      setHeld(dir, false);
    };
    btn.addEventListener("pointerdown", down, { passive:false });
    btn.addEventListener("pointerup", up, { passive:false });
    btn.addEventListener("pointercancel", up, { passive:false });
    btn.addEventListener("pointerleave", up);
    btn.addEventListener("click", (ev) => {
      ev.preventDefault();
      const step = 28;
      if (dir === "left") moveBigfoot(-step);
      if (dir === "right") moveBigfoot(step);
    });
  }

  bindButton("leftBtn", "left");
  bindButton("rightBtn", "right");

  window.addEventListener("keydown", (ev) => {
    if (ev.key === "ArrowLeft") { ev.preventDefault(); setHeld("left", true); }
    if (ev.key === "ArrowRight") { ev.preventDefault(); setHeld("right", true); }
  }, { passive:false });

  window.addEventListener("keyup", (ev) => {
    if (ev.key === "ArrowLeft") setHeld("left", false);
    if (ev.key === "ArrowRight") setHeld("right", false);
  });

  window.addEventListener("resize", () => {
    refreshViewportCache();
    x = Math.min(window.innerWidth, Math.max(0, x));
    y = window.innerHeight * bigfootStartYFactor;
    moveBigfoot(0, false);
  });

  function tick(now) {
    const dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    const speed = 320;
    let dx = 0;
    if (keys.left) dx -= speed * dt;
    if (keys.right) dx += speed * dt;
    if (dx) moveBigfoot(dx);
    requestAnimationFrame(tick);
  }

  refreshViewportCache();
  moveBigfoot(0, false);
  video.play().catch(() => {});
  window.addEventListener("pointerdown", () => carSound.play().catch(() => {}), { once:true });
  window.addEventListener("keydown", () => carSound.play().catch(() => {}), { once:true });
  requestAnimationFrame(animateSmallCubeToBigCube);
  requestAnimationFrame(tick);
</script>
</body>
</html>
