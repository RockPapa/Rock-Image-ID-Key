<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WolfGrove — One-Shot Stun Gun (health≤20% spawn; SPACE shoots once, then back to jump) — Full WAX</title>

<style>
  html, body { margin:0; height:100%; overflow:hidden; background:#000; }
  canvas#c { display:block; width:100vw; height:100vh; image-rendering:pixelated; }
  canvas#compass { display:block; width:64px; height:64px; image-rendering:auto; }

  .small{ opacity:.9; font-size:13px; }
  .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }

  .banner{
    position:fixed;
    left:50%;
    top:14%;
    transform:translateX(-50%);
    z-index:30;
    padding:14px 18px;
    border-radius:16px;
    background:rgba(0,0,0,0.55);
    color:#fff;
    font:700 22px/1.1 system-ui, -apple-system, Segoe UI, Roboto;
    letter-spacing:0.06em;
    text-transform:uppercase;
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 10px 24px rgba(0,0,0,0.35);
    opacity:0;
    pointer-events:none;
    user-select:none;
    white-space:nowrap;
  }
  .startMsg{
    top:8%;
    max-width:min(92vw, 900px);
    white-space:normal;
    text-align:center;
    text-transform:none;
    letter-spacing:0.01em;
    font:600 20px/1.3 system-ui, -apple-system, Segoe UI, Roboto;
  }

  .healthWrap{
    position:fixed;
    left:14px;
    top:92px;
    z-index:25;
    width:280px;
    height:18px;
    border-radius:10px;
    background:rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.28);

    box-shadow:0 10px 22px rgba(0,0,0,0.25);

    pointer-events:none;
  }
  .healthFill{
    height:100%;
    width:100%;
    background:rgba(255,60,60,0.95);
    border-radius:10px;
    transform-origin:left center;
  }
  .healthText{
    position:fixed;
    left:14px;
    top:112px;
    z-index:26;
    color:rgba(255,255,255,0.9);
    font:12px system-ui, -apple-system, Segoe UI, Roboto;
    letter-spacing:0.08em;
    text-transform:uppercase;
    user-select:none;
    pointer-events:none;
    text-shadow:0 2px 10px rgba(0,0,0,0.35);
  }

  .gameOver{
    position:fixed;
    inset:0;
    z-index:60;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.55);

    pointer-events:none;
    transition:opacity 0.25s ease;
  }
  .gameOver.on{ opacity:1; pointer-events:auto; }
  .gameOverBox{
    background:rgba(0,0,0,0.60);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:18px;
    padding:20px 22px;
    color:#fff;
    font:700 28px/1.1 system-ui, -apple-system, Segoe UI, Roboto;
    letter-spacing:0.08em;
    text-transform:uppercase;
    box-shadow:0 18px 40px rgba(0,0,0,0.35);
    text-align:center;
  }
  .gameOverBox .sub{
    margin-top:10px;
    font:500 14px/1.2 system-ui, -apple-system, Segoe UI, Roboto;
    letter-spacing:0.02em;
    text-transform:none;
    opacity:0.9;
  }

  /* =========================
     📱 TOUCH CONTROLS + TOGGLE
     (toggle ALWAYS visible)
     ========================= */
  #touchToggle{
    position: fixed;
    left: 14px;
    top: 14px;               /* always visible */
    z-index: 9999;
    padding: 8px 10px;
    border-radius: 12px;
    border: 0;
    background: rgba(0,0,0,0.50);
    color: #fff;
    font: 14px system-ui, -apple-system, Segoe UI, Roboto;
    user-select:none;
    cursor: pointer;
  }

  #touchControls{
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 9998;
    padding: 14px;
    display: none;          /* controlled by toggle */
    pointer-events: none;   /* buttons enable pointer */
  }

  .tcRow{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:14px;
    pointer-events:none;
  }

  .tcJoyCol{
    flex:1;
    display:flex;
    justify-content:flex-end;
    align-items:flex-end;
    pointer-events:none;
  }

  .tcJoy{
    width:148px;
    height:148px;
    border-radius:999px;
    background:rgba(0,0,0,0.42);
    border:1px solid rgba(255,255,255,0.18);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
    position:relative;
    pointer-events:auto;
    touch-action:none;
  }

  .tcJoyKnob{
    width:62px;
    height:62px;
    border-radius:999px;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.24);
    border:1px solid rgba(255,255,255,0.34);
    box-shadow:0 8px 16px rgba(0,0,0,0.25);

  }

  .tcActions{
    display:grid;
    grid-template-columns:110px 110px;
    grid-template-rows:64px 64px;
    gap:10px;
    pointer-events:none;
  }

  .tcBtn{
    width:100%;
    height:100%;
    border-radius:16px;
    border:0;
    background:rgba(0,0,0,0.45);
    color:rgba(255,255,255,0.95);

    user-select:none;

  .tcBtn:active{ background:rgba(255,255,255,0.20); }
  .tcSmall{ font-size:14px; }
  .tcWide{ grid-column: span 2; }

  .pcHint{
    position:fixed;
    top:16px;
    left:50%;
    transform:translateX(-50%);
    z-index:10000;
    padding:10px 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.18);
    background:rgba(20,24,32,.82);
    color:#fff;
    font:700 16px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    box-shadow:0 10px 22px rgba(0,0,0,.45);
    pointer-events:none;
    animation:hidePcHint 5s forwards;
  }
  @keyframes hidePcHint{
    0%, 92%{ opacity:1; }
    100%{ opacity:0; visibility:hidden; }
  }

</style>
</head>

<body>
<div class="pcHint">Computers use arrow keys and space bar</div>
<canvas id="c" tabindex="0"></canvas>

<script>
window.addEventListener('DOMContentLoaded', () => {
(() => {

/* =========================================================
   CANVAS
========================================================= */
const c = document.getElementById("c");
const ctx = c.getContext("2d", { alpha:false });

const compass = document.getElementById("compass");
const cctx = compass.getContext("2d");

const foodBannerEl = document.getElementById("foodBanner");
const stunBannerEl = document.getElementById("stunBanner");
const startMsgEl   = document.getElementById("startMsg");

const healthFillEl = document.getElementById("healthFill");
const healthTextEl = document.getElementById("healthText");
const gameOverEl   = document.getElementById("gameOver");

function resize(){ c.width = innerWidth; c.height = innerHeight; }
addEventListener("resize", resize);
resize();

setTimeout(()=>c.focus(),0);
c.addEventListener("pointerdown",()=>c.focus());

/* =========================================================
   INPUT  (✅ edge-trigger SPACE so shooting happens once)
========================================================= */
const keys = new Set();
let spacePressedEdge = false; // TRUE only on keydown, then cleared each frame

addEventListener("keydown", e=>{
  if(e.code.startsWith("Arrow")) e.preventDefault();

  if(e.code === "Space"){
    e.preventDefault();
    if(!keys.has("Space")){
      spacePressedEdge = true;  // edge trigger
    }
    keys.add("Space");
    return;
  }
  keys.add(e.code.startsWith("Arrow") ? e.code : e.key);
},{passive:false});

addEventListener("keyup", e=>{
  if(e.code.startsWith("Arrow")) e.preventDefault();
  if(e.code === "Space"){ e.preventDefault(); keys.delete("Space"); return; }
  keys.delete(e.code.startsWith("Arrow") ? e.code : e.key);
},{passive:false});

/* =========================================================
   📱 TOUCH CONTROLS + TOGGLE (iPad)
========================================================= */
const TOUCH_STORE_KEY = "wolfgrove_touch_controls";

const touchToggle = document.getElementById("touchToggle");
const touchControls = document.getElementById("touchControls");
const thumbJoyEl = document.getElementById("thumbJoy");
const thumbJoyKnobEl = document.getElementById("thumbJoyKnob");

function clearVirtualArrowKeys(){
  keys.delete("ArrowUp");
  keys.delete("ArrowDown");
  keys.delete("ArrowLeft");
  keys.delete("ArrowRight");
}

function isCoarsePointer(){
  return (window.matchMedia && matchMedia("(pointer: coarse)").matches) ||
         ("ontouchstart" in window) ||
         (navigator.maxTouchPoints > 0);
}
function loadTouchEnabled(){
  const saved = localStorage.getItem(TOUCH_STORE_KEY);
  if(saved === "on")  return true;
  if(saved === "off") return false;
  // default ON (so you can see/test on desktop too)
  return true;
}
let touchEnabled = loadTouchEnabled();

function applyTouchUI(){
  if(!touchToggle || !touchControls) return;
  touchControls.style.display = touchEnabled ? "block" : "none";
  touchToggle.textContent = touchEnabled ? "📱 Controls: ON" : "📱 Controls: OFF";
}
function setTouchEnabled(v){
  touchEnabled = !!v;
  localStorage.setItem(TOUCH_STORE_KEY, touchEnabled ? "on" : "off");

  // release held virtual keys when turning off
  if(!touchEnabled){
    clearVirtualArrowKeys();
    keys.delete("Space");
    resetThumbJoystick();
  }
  applyTouchUI();
  c.focus();
}
if(touchToggle){
  touchToggle.addEventListener("click", () => setTouchEnabled(!touchEnabled));
}
applyTouchUI();

// helper: SPACE edge trigger (matches Luke3's real keyboard behavior)
function virtualSpaceTap(){
  if(!touchEnabled) return;
  if(!keys.has("Space")) spacePressedEdge = true;
  keys.add("Space");
  // quick release so it acts like a tap
  setTimeout(()=>keys.delete("Space"), 60);
  c.focus();
}

function virtualDispatchKey(k){
  // triggers the existing keydown handlers
  try{
    window.dispatchEvent(new KeyboardEvent("keydown", { key: k, bubbles:true }));
    window.dispatchEvent(new KeyboardEvent("keyup",   { key: k, bubbles:true }));
  }catch(e){}
}

function bindHold(btn, code){
  const down = (e) => {
    if(!touchEnabled) return;
    e.preventDefault();
    unlockAudioOnce();
    keys.add(code);
    c.focus();
  };
  const up = (e) => {
    e.preventDefault();
    keys.delete(code);
  };
  btn.addEventListener("pointerdown", down, {passive:false});
  btn.addEventListener("pointerup", up, {passive:false});
  btn.addEventListener("pointercancel", up, {passive:false});
  btn.addEventListener("pointerleave", up, {passive:false});
}

function bindTap(btn, code){
  btn.addEventListener("pointerdown", (e) => {
    if(!touchEnabled) return;
    e.preventDefault();
    unlockAudioOnce();
    c.focus();

    if(code === "Space") virtualSpaceTap();
    else if(code === "KeyR") location.reload();
    else if(code === "KeyK") virtualDispatchKey("k");
    else if(code === "KeyP") virtualDispatchKey("p");
  }, {passive:false});
}

document.querySelectorAll(".tcBtn").forEach(btn => {
  const hold = btn.getAttribute("data-hold");
  const tap  = btn.getAttribute("data-tap");
  if(hold) bindHold(btn, hold);
  if(tap)  bindTap(btn, tap);
});

const JOY_DEADZONE = 0.24;
let joyPointerId = null;

function resetThumbJoystick(){
  joyPointerId = null;
  clearVirtualArrowKeys();
  if(thumbJoyKnobEl){
    thumbJoyKnobEl.style.transform = "translate(-50%,-50%)";
  }
}

function updateThumbJoystick(clientX, clientY){
  if(!thumbJoyEl || !thumbJoyKnobEl) return;
  const r = thumbJoyEl.getBoundingClientRect();
  const cx = r.left + (r.width / 2);
  const cy = r.top + (r.height / 2);
  let dx = clientX - cx;
  let dy = clientY - cy;

  const max = (r.width / 2) - (thumbJoyKnobEl.offsetWidth / 2) - 2;
  const dist = Math.hypot(dx, dy);
  if(dist > max){
    const t = max / dist;
    dx *= t;
    dy *= t;
  }

  const nx = dx / Math.max(1, max);
  const ny = dy / Math.max(1, max);

  if(Math.abs(nx) > JOY_DEADZONE){
    if(nx < 0){ keys.add("ArrowLeft"); keys.delete("ArrowRight"); }
    else      { keys.add("ArrowRight"); keys.delete("ArrowLeft"); }
  }else{
    keys.delete("ArrowLeft");
    keys.delete("ArrowRight");
  }

  if(Math.abs(ny) > JOY_DEADZONE){
    if(ny < 0){ keys.add("ArrowUp"); keys.delete("ArrowDown"); }
    else      { keys.add("ArrowDown"); keys.delete("ArrowUp"); }
  }else{
    keys.delete("ArrowUp");
    keys.delete("ArrowDown");
  }

  thumbJoyKnobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

if(thumbJoyEl){
  thumbJoyEl.addEventListener("pointerdown", (e) => {
    if(!touchEnabled) return;
    e.preventDefault();
    unlockAudioOnce();
    joyPointerId = e.pointerId;
    thumbJoyEl.setPointerCapture(e.pointerId);
    updateThumbJoystick(e.clientX, e.clientY);
    c.focus();
  }, {passive:false});

  thumbJoyEl.addEventListener("pointermove", (e) => {
    if(!touchEnabled) return;
    if(joyPointerId !== e.pointerId) return;
    e.preventDefault();
    updateThumbJoystick(e.clientX, e.clientY);
  }, {passive:false});

  const endJoy = (e) => {
    if(joyPointerId !== e.pointerId) return;
    e.preventDefault();
    resetThumbJoystick();
  };

  thumbJoyEl.addEventListener("pointerup", endJoy, {passive:false});
  thumbJoyEl.addEventListener("pointercancel", endJoy, {passive:false});
  thumbJoyEl.addEventListener("lostpointercapture", () => resetThumbJoystick(), {passive:false});
}

// anti-stuck keys (same spirit as Luke2)
function clearKeys(){
  keys.clear();
  resetThumbJoystick();
}
addEventListener("blur", clearKeys);
addEventListener("pagehide", clearKeys);
document.addEventListener("visibilitychange", () => { if(document.hidden) clearKeys(); });



/* =========================================================
   CAMI
========================================================= */
let posX = 0, posY = 0;
let ang = Math.PI * 0.75;

const TURN_SPEED = 2.4;
const FOV = 0.66;
const CAMI_RADIUS = 0.25;

let dirX = Math.cos(ang);
let dirY = Math.sin(ang);
let planeX = -dirY * FOV;
let planeY =  dirX * FOV;

/* =========================================================
   STATS
========================================================= */
let health = 100;
const HEALTH_MAX = 100;

let speedMult = 1.00;
const SPEED_MIN = 0.49;
const SPEED_MAX = 1.6;

let CAMI_START_SPEED = 1.14;     // <-- tweak
const MOVE_SPEED_BASE = CAMI_START_SPEED;

const WOLF_HIT_HEALTH_LOSS = 15;
const WOLF_HIT_SPEED_LOSS  = 0.07;
const SPIDER_HIT_HEALTH_LOSS = 10;

const NIGHT_HEALTH_LOSS = 10;
const NIGHT_SPEED_LOSS  = 0.05;

const FOOD_HEALTH_BOOST = 10;
const FOOD_SPEED_BOOST  = 0.05;

const FIRE_HEALTH_BOOST = 15;
const FIRE_SPEED_BOOST  = 0.05;

let gameOver = false;

function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function addHealth(delta){
  const before = health;
  health = clamp(health + delta, 0, HEALTH_MAX);

  // ✅ health change feedback sounds
  const changed = (health !== before);
  if(changed){
    if(delta > 0) playPositiveSound();
    if(delta < 0) playNegativeSound();
  }

  if(health <= 0){
    health = 0;
    gameOver = true;
    gameOverEl.classList.add("on");
    try{ walkingSfx.pause(); walkingSfx.currentTime = 0; }catch(e){}
  }
}
function addSpeedMult(delta){
  speedMult = clamp(speedMult + delta, SPEED_MIN, SPEED_MAX);
}
function applyWolfHitPenalty(){
  addHealth(-WOLF_HIT_HEALTH_LOSS);
  addSpeedMult(-WOLF_HIT_SPEED_LOSS);
}
function applySpiderHitPenalty(){
  addHealth(-SPIDER_HIT_HEALTH_LOSS);
}
function applyNightPenalty(){
  addHealth(-NIGHT_HEALTH_LOSS);
  addSpeedMult(-NIGHT_SPEED_LOSS);
}

addEventListener("keydown",(e)=>{
  if((e.key==="r"||e.key==="R") && gameOver){ location.reload(); }
});

/* =========================================================
   BANNERS
========================================================= */
const FOOD_BANNER_SHOW_SEC = 2.6;
const FOOD_BANNER_FADE_SEC = 0.8;
let foodBannerTimer = 0;

function showFoodBanner(){
  foodBannerTimer = FOOD_BANNER_SHOW_SEC + FOOD_BANNER_FADE_SEC;
  foodBannerEl.style.opacity = "1";
}
function updateFoodBanner(dt){
  if(foodBannerTimer <= 0){ foodBannerEl.style.opacity="0"; return; }
  foodBannerTimer -= dt;
  if(foodBannerTimer <= FOOD_BANNER_FADE_SEC){
    const t = Math.max(0, foodBannerTimer / FOOD_BANNER_FADE_SEC);
    foodBannerEl.style.opacity = String(t);
  }else{
    foodBannerEl.style.opacity = "1";
  }
}

const STUN_BANNER_SHOW_SEC = 2.6;
const STUN_BANNER_FADE_SEC = 0.8;
let stunBannerTimer = 0;

function showStunBanner(text="STUN GUN AVAILABLE"){
  stunBannerEl.textContent = text;
  stunBannerTimer = STUN_BANNER_SHOW_SEC + STUN_BANNER_FADE_SEC;
  stunBannerEl.style.opacity = "1";
}
function updateStunBanner(dt){
  if(stunBannerTimer <= 0){ stunBannerEl.style.opacity="0"; return; }
  stunBannerTimer -= dt;
  if(stunBannerTimer <= STUN_BANNER_FADE_SEC){
    const t = Math.max(0, stunBannerTimer / STUN_BANNER_FADE_SEC);
    stunBannerEl.style.opacity = String(t);
  }else{
    stunBannerEl.style.opacity = "1";
  }
}

const START_MSG_SHOW_SEC = 6.0;
const START_MSG_FADE_SEC = 1.2;
let startMsgTimer = 0;

function showStartMsg(text = "Head EAST .  Watch out for the wolf chasing you."){
  startMsgEl.textContent = text;
  startMsgTimer = START_MSG_SHOW_SEC + START_MSG_FADE_SEC;
  startMsgEl.style.opacity = "1";
}
function updateStartMsg(dt){
  if(startMsgTimer <= 0){ startMsgEl.style.opacity = "0"; return; }
  startMsgTimer -= dt;
  if(startMsgTimer <= START_MSG_FADE_SEC){
    const t = Math.max(0, startMsgTimer / START_MSG_FADE_SEC);
    startMsgEl.style.opacity = String(t);
  }else{
    startMsgEl.style.opacity = "1";
  }
}
showStartMsg();

/* =========================================================
   AUDIO
========================================================= */
const FOOD_PICKUP_SFX_PATH = "images/pickup.mp3";
const foodPickupSfx = new Audio(FOOD_PICKUP_SFX_PATH);
foodPickupSfx.preload = "auto";
foodPickupSfx.volume = 0.9;

const wolfGrowl = new Audio("images/wolf_sound.mp3");
wolfGrowl.preload = "auto";
wolfGrowl.volume = 0.9;

const wolfHowl = new Audio("images/wolf_howl.mp3");
wolfHowl.preload = "auto";
wolfHowl.volume = 0.95;

const screamSfx = new Audio("images/scream.mp3");
screamSfx.preload = "auto";
screamSfx.volume = 0.9;

// ✅ Stun-shot SFX (we'll use images/gun.mp3; shot.mp3 kept as optional alt)
const gunSfx = new Audio("images/gun.mp3");
gunSfx.preload = "auto";
gunSfx.volume = 0.95;

const tigerSfx = new Audio("images/tiger.mp3");
tigerSfx.preload = "auto";
tigerSfx.volume = 1.0;

// Optional alt name some builds used:
const shotSfx = new Audio("images/shot.mp3");
shotSfx.preload = "auto";
shotSfx.volume = 0.95;

const dayAmbience = new Audio("images/day_sounds.mp3");
dayAmbience.preload = "auto";
dayAmbience.loop = true;
dayAmbience.volume = 0.0;

const fireAmbience = new Audio("images/fire_sound.mp3");
fireAmbience.preload = "auto";
fireAmbience.loop = true;
fireAmbience.volume = 0.0;

const walkingSfx = new Audio("images/walking_sound.mp3");
walkingSfx.preload = "auto";
walkingSfx.loop = true;
walkingSfx.volume = 0.0;

const WALK_VOL_MAX = 0.55;
const WALK_FADE_RATE = 0.08;

const DAY_AMBIENCE_MAX_VOL  = 0.60;
const FIRE_AMBIENCE_MAX_VOL = 0.70;

let audioUnlocked = false;
function unlockAudioOnce(){
  if(audioUnlocked) return;
  audioUnlocked = true;
  ensureAudioCtx();

  const prime = (a) => {
    try{
      a.muted = true;
      a.play().then(()=>{
        a.pause();
        a.currentTime = 0;
        a.muted = false;
      }).catch(()=>{ a.muted = false; });
    }catch(e){}
  };

  [foodPickupSfx, wolfGrowl, wolfHowl, screamSfx, gunSfx, tigerSfx, shotSfx, dayAmbience, fireAmbience, walkingSfx, trumpetSfx].forEach(prime);
}
window.addEventListener("pointerdown", unlockAudioOnce, {once:true});
window.addEventListener("keydown", unlockAudioOnce, {once:true});

function playSfx(a){
  if(!audioUnlocked) return;
  try{ a.currentTime = 0; a.play(); }catch(e){}
}

function playSfxWithUnlock(a){
  if(!audioUnlocked) unlockAudioOnce();
  try{
    a.currentTime = 0;
    a.play();
  }catch(e){}
}

// =========================================================
// ✅ SYNTH FEEDBACK SOUNDS (no mp3 files needed)
//    - Positive: short bright "ding"
//    - Negative: short low "thunk"
// =========================================================
let audioCtx = null;

function ensureAudioCtx(){
  if(audioCtx) return audioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return null;
  audioCtx = new AC();
  return audioCtx;
}

// Small rate-limit so we don't spam tones in one frame
let healthToneCooldown = 0;
const HEALTH_TONE_COOLDOWN_SEC = 0.10;


function playTone({freq=880, dur=0.25, type="square", gain=0.8, slideTo=null}){
  if(!audioUnlocked) return;
  const ctx = ensureAudioCtx();
  if(!ctx) return;
  try{
    if(ctx.state === "suspended") ctx.resume();
    const t0 = ctx.currentTime;

    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    const comp = ctx.createDynamicsCompressor();

    // 🔊 aggressive compressor = LOUD but safe
    comp.threshold.value = -18;
    comp.knee.value = 0;
    comp.ratio.value = 12;
    comp.attack.value = 0.003;
    comp.release.value = 0.08;

    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if(slideTo){
      osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
    }

    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

    osc.connect(g);
    g.connect(comp);
    comp.connect(ctx.destination);

    osc.start(t0);

}

function tryShootWolfOnce(){
  if(!hasStunGun || stunAmmo <= 0) return false;
  if(gameOver) return true; // consume but nothing happens

  // wolf position is available later in file
  const dx = wolfX - posX;
  const dy = wolfY - posY;
  const dist = Math.hypot(dx,dy) || 999;

  // angle between camera forward (dirX,dirY) and wolf vector
  const ux = dx / (dist || 1);
  const uy = dy / (dist || 1);
  const dot = (dirX*ux + dirY*uy); // 1=dead ahead, 0=90deg
  const coneCos = Math.cos((STUN_SHOT_CONE_DEG * Math.PI/180));

  const inRange = dist <= STUN_SHOT_RANGE;
  const inCone  = dot >= coneCos;

  let hit = inRange && inCone;

  if(hit){
    wolfStunnedTimer = STUN_DURATION_SEC;
    showStunBanner("ZAP! WOLF STUNNED (+10% HEALTH)");

    // ✅ requested: play gun shot + wolf howl WHEN the wolf is actually stunned
    playSfx(gunSfx);
    playSfx(wolfHowl);

    // ✅ bonus: regain health when you successfully stun the wolf
    addHealth(STUN_HEALTH_BOOST);
  }else{
    showStunBanner("STUN MISSED!");
  }

  // consume ammo (always, unless you want only-on-hit)
  if(hit || STUN_SHOT_CONSUME_ON_MISS){
    stunAmmo -= 1;
    if(stunAmmo <= 0){
      stunAmmo = 0;
      hasStunGun = false; // SPACE returns to jump mode after 3 shots
    }
  }

  return true; // we consumed SPACE press
}

}

/* =========================================================
   NIGHT VISUALS
========================================================= */
const MAX_DARKNESS = 0.65;
const MOON_LIFT    = 0.12;
const NIGHT_TINT = { r: 10, g: 25, b: 30 };
const NIGHT_TINT_ALPHA_AT_FULL_NIGHT = 0.18;
const VIGNETTE_STRENGTH = 0.35;
const SUN_BRIGHTNESS_BOOST = 1.30;

function clamp01(x){ return x<0?0:(x>1?1:x); }
function smoothstep(e0,e1,x){
  const t = clamp01((x-e0)/(e1-e0));
  return t*t*(3-2*t);
}
function mixRGB(c1,c2,t){
  return {
    r: (c1.r + (c2.r-c1.r)*t) | 0,
    g: (c1.g + (c2.g-c1.g)*t) | 0,
    b: (c1.b + (c2.b-c1.b)*t) | 0
  };
}
function rgbStr(c,a=1){ return `rgba(${c.r},${c.g},${c.b},${a})`; }

function computeNight(t01){
  const sunRaw = (Math.cos((t01 - 0.5) * Math.PI * 2) + 1) / 2;
  const sun = Math.pow(sunRaw, 0.85);
  const nightFactor = 1 - sun;

  let darkness = nightFactor * MAX_DARKNESS;
  darkness = Math.max(0, darkness - MOON_LIFT * nightFactor);

  let phase = "Day";
  if (nightFactor > 0.82) phase = "Night";
  else if (t01 > 0.62 && t01 < 0.88) phase = "Dusk";
  else if (t01 > 0.12 && t01 < 0.38) phase = "Dawn";

  const SKY = {
    dayTop:    {r: 20,  g: 52,  b: 125},
    dayH:      {r: 215, g: 240, b: 255},
    duskTop:   {r: 35,  g: 35,  b: 90 },
    duskH:     {r: 140, g: 85,  b: 120},
    nightTop:  {r: 5,   g: 10,  b: 25 },
    nightH:    {r: 20,  g: 25,  b: 45 }
  };

  const t1 = smoothstep(0.15, 0.55, nightFactor);
  const t2 = smoothstep(0.45, 0.95, nightFactor);

  const topDusk = mixRGB(SKY.dayTop, SKY.duskTop, t1);
  const hDusk   = mixRGB(SKY.dayH,   SKY.duskH,   t1);

  const skyTop     = mixRGB(topDusk, SKY.nightTop, t2);
  const skyHorizon = mixRGB(hDusk,   SKY.nightH,   t2);

  const tintA = nightFactor * NIGHT_TINT_ALPHA_AT_FULL_NIGHT;

  return { sun, nightFactor, darkness, skyTop, skyHorizon, phase, tintA };
}

let vignetteCanvas=null;
function buildVignette(){
  vignetteCanvas = document.createElement("canvas");
  vignetteCanvas.width = c.width;
  vignetteCanvas.height = c.height;
  const vctx = vignetteCanvas.getContext("2d");

  const w=c.width, h=c.height;
  const cx=w/2, cy=h/2;
  const r1=Math.min(w,h)*0.35;
  const r2=Math.max(w,h)*0.78;

  const g = vctx.createRadialGradient(cx,cy,r1, cx,cy,r2);
  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(1, "rgba(0,0,0,1)");
  vctx.clearRect(0,0,w,h);
  vctx.fillStyle = g;
  vctx.fillRect(0,0,w,h);
}
buildVignette();
addEventListener("resize", buildVignette);

function applyNightOverlay(lit){
  if(!NIGHT_ENABLED) return;

  ctx.fillStyle = `rgba(0,0,0,${lit.darkness})`;
  ctx.fillRect(0,0,c.width,c.height);

  if(lit.tintA > 0.001){
    ctx.fillStyle = rgbStr(NIGHT_TINT, lit.tintA);
    ctx.fillRect(0,0,c.width,c.height);
  }

  const v = VIGNETTE_STRENGTH * lit.nightFactor;
  if(v > 0.001 && vignetteCanvas){
    ctx.save();
    ctx.globalAlpha = v;
    ctx.drawImage(vignetteCanvas, 0, 0);
    ctx.restore();
  }
}

/* =========================================================

========================================================= */
function hash2i(ix, iy){
  let n = ix * 374761393 + iy * 668265263;
  n = (n ^ (n >>> 13)) * 1274126177;
  return (n ^ (n >>> 16)) >>> 0;
}
function materialAtWorldCell(cellX, cellY){
  const h = hash2i(cellX, cellY) & 1023;
  if(h < 70)  return 2;
  if(h < 260) return 1;
  return 0;
}
const TEX_W=64, TEX_H=64;
const floorTex = Array.from({length:3},()=>new Uint8ClampedArray(TEX_W*TEX_H*4));
let GRASS_RGB = { r: 47,  g: 140, b: 27 };
let DIRT_RGB  = { r: 95,  g: 72,  b: 32  };
let STONE_RGB = { r: 47, g: 140, b: 27 };
let GRASS_BRIGHT = 1.20, DIRT_BRIGHT=1.20, STONE_BRIGHT=1.20;
let GRASS_TINT={r:1,g:1,b:1}, DIRT_TINT={r:1,g:1,b:1}, STONE_TINT={r:1,g:1,b:1};
function clampByte(v){ return v<0?0:(v>255?255:v|0); }
function buildTextures(){
  for(let y=0;y<TEX_H;y++)for(let x=0;x<TEX_W;x++){
    const i=(y*TEX_W+x)*4;
    const n=((x*17+y*29)%31)-15;

    let r = (GRASS_RGB.r + n) * GRASS_BRIGHT * GRASS_TINT.r;
    let g = (GRASS_RGB.g + n) * GRASS_BRIGHT * GRASS_TINT.g;
    let b = (GRASS_RGB.b + n) * GRASS_BRIGHT * GRASS_TINT.b;
    floorTex[0][i]=clampByte(r); floorTex[0][i+1]=clampByte(g); floorTex[0][i+2]=clampByte(b); floorTex[0][i+3]=255;

    r = (DIRT_RGB.r + n) * DIRT_BRIGHT * DIRT_TINT.r;
    g = (DIRT_RGB.g + n) * DIRT_BRIGHT * DIRT_TINT.g;
    b = (DIRT_RGB.b + n) * DIRT_BRIGHT * DIRT_TINT.b;
    floorTex[1][i]=clampByte(r); floorTex[1][i+1]=clampByte(g); floorTex[1][i+2]=clampByte(b); floorTex[1][i+3]=255;

    r = (STONE_RGB.r + n) * STONE_BRIGHT * STONE_TINT.r;
    g = (STONE_RGB.g + n) * STONE_BRIGHT * STONE_TINT.g;
    b = (STONE_RGB.b + n) * STONE_BRIGHT * STONE_TINT.b;
    floorTex[2][i]=clampByte(r); floorTex[2][i+1]=clampByte(g); floorTex[2][i+2]=clampByte(b); floorTex[2][i+3]=255;
  }
}
buildTextures();


// ===== FAR MOUNTAINS (from Wolf1) =====
const MOUNTAIN_BAND_PX       = 70;   // 🔧 bigger band = taller mountains
const MOUNTAIN_COLOR         = { r: 120, g: 135, b: 155 }; // gray-blue
const MOUNTAIN_HAZE_STRENGTH = 0.55; // 🔧 stronger haze/visibility

const FOG_NEAR = 10, FOG_FAR = 120, FLOOR_NEAR_DIM=0.94, FOG_COLOR={r:205,g:220,b:235};

function renderSkyAndFloor(){
  const w=c.width, h=c.height, half=h>>1;
  const img = ctx.createImageData(w,h);
  const d = img.data;

  for(let y=0;y<half;y++){
    const t=y/Math.max(1,half-1);
    const r=nightLit.skyTop.r+(nightLit.skyHorizon.r-nightLit.skyTop.r)*t;
    const g=nightLit.skyTop.g+(nightLit.skyHorizon.g-nightLit.skyTop.g)*t;
    const b=nightLit.skyTop.b+(nightLit.skyHorizon.b-nightLit.skyTop.b)*t;
    const row=y*w*4;
    for(let x=0;x<w;x++){
      const i=row+x*4;
      d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=255;
    }
  }
  // MOUNTAINS (far gray-blue ridge band)
  {
    const band = Math.max(10, Math.min(MOUNTAIN_BAND_PX|0, half-2));
    const baseY = half-1;
    for(let x=0;x<w;x++){
      const t = x / Math.max(1, w-1);
      const ridge =
        (Math.sin(t*Math.PI*2) * 0.38 +
         Math.sin(t*Math.PI*6 + 1.1) * 0.22 +
         Math.sin(t*Math.PI*14 + 0.6) * 0.10) * 0.50 + 0.50;
      const ridgeY = baseY - (ridge * band);
      const hazeRows = band;

      for(let k=0;k<band;k++){
        const y = baseY - 1 - k;
        if(y < 0) break;

        // fill mountain color up to ridge height
        if(y >= ridgeY){
          const i=(y*w+x)*4;
          d[i]   = MOUNTAIN_COLOR.r;
          d[i+1] = MOUNTAIN_COLOR.g;
          d[i+2] = MOUNTAIN_COLOR.b;
          d[i+3] = 255;
        }

        // haze blend into sky horizon color (makes them feel far)
        const a = 1 - (k / Math.max(1, hazeRows-1));
        const haze = a*a * MOUNTAIN_HAZE_STRENGTH;
        const i=(y*w+x)*4;
        const rr=d[i], gg=d[i+1], bb=d[i+2];
        d[i]   = (rr + (nightLit.skyHorizon.r - rr) * haze) | 0;
        d[i+1] = (gg + (nightLit.skyHorizon.g - gg) * haze) | 0;
        d[i+2] = (bb + (nightLit.skyHorizon.b - bb) * haze) | 0;
      }
    }
  }



  const rayDirX0 = dirX - planeX;
  const rayDirY0 = dirY - planeY;
  const rayDirX1 = dirX + planeX;
  const rayDirY1 = dirY + planeY;

  const camHeight = BASE_CAM_HEIGHT + camZ;

  for(let y=half; y<h; y++){
    const p = y-half;
    if(p===0) continue;

    const rowDist = (camHeight * h) / p;
    const stepX = rowDist * (rayDirX1 - rayDirX0) / w;
    const stepY = rowDist * (rayDirY1 - rayDirY0) / w;

    let floorX = posX + rowDist * rayDirX0;
    let floorY = posY + rowDist * rayDirY0;

    let fog = (rowDist - FOG_NEAR) / (FOG_FAR - FOG_NEAR);
    fog = clamp(fog, 0, 1);
    fog = fog * fog;

    const row = y*w*4;
    for(let x=0;x<w;x++){
      const cellX = Math.floor(floorX);
      const cellY = Math.floor(floorY);
      const texId = materialAtWorldCell(cellX, cellY);
      const tex = floorTex[texId];

      const fx = floorX - cellX;
      const fy = floorY - cellY;

      const tx = ((TEX_W * fx)|0) & (TEX_W-1);
      const ty = ((TEX_H * fy)|0) & (TEX_H-1);
      const ti = (ty*TEX_W + tx) * 4;

      let r = tex[ti], g = tex[ti+1], b = tex[ti+2];

      r = (r * FLOOR_NEAR_DIM) | 0;
      g = (g * FLOOR_NEAR_DIM) | 0;
      b = (b * FLOOR_NEAR_DIM) | 0;

      const dayBoost = 1 + (nightLit.sun * (SUN_BRIGHTNESS_BOOST - 1));
      r = Math.min(255, (r * dayBoost) | 0);
      g = Math.min(255, (g * dayBoost) | 0);
      b = Math.min(255, (b * dayBoost) | 0);

      r = (r + (FOG_COLOR.r - r) * fog) | 0;
      g = (g + (FOG_COLOR.g - g) * fog) | 0;
      b = (b + (FOG_COLOR.b - b) * fog) | 0;

      const i = row + x*4;
      d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=255;

      floorX += stepX;
      floorY += stepY;
    }
  }

  ctx.putImageData(img,0,0);
}

const LAMB_ENABLED = true;
const LAMB_COLLIDE_DIST = 1.10;     // ✅ collision distance for lambchop pickup
const LAMB_HEALTH_BOOST = 5;        // ✅ +5% health on collision
const LAMB_PICKUP_COOLDOWN_SEC = 1.0; // prevents rapid repeat while overlapping

const LAMB_SPRITE_SCALE = 0.85;
const LAMB_SPEED = 0.95;
const LAMB_WANDER_TURN = 2.2;
const LAMB_RETHINK_SEC_MIN = 1.2;
const LAMB_RETHINK_SEC_MAX = 3.2;
const LAMB_LEASH_DIST = 34.0;
const LAMB_AVOID_TURN_JITTER = 1.8;

let lambX = 0, lambY = 0;
let lambPickupCooldown = 0;

let lambAng = 0;
let lambRethink = 0;

function resetLamb(){
  const dist = 10 + Math.random()*10;
  const jitter = (Math.random()*0.9 - 0.45);
  const a = ang + jitter;
  lambX = posX + Math.cos(a)*dist;
  lambY = posY + Math.sin(a)*dist;
  lambAng = a + (Math.random()*Math.PI*2);
  lambRethink = 0.2;
}
resetLamb();

function randRange(a,b){ return a + Math.random()*(b-a); }

function updateLamb(dt){
  if(!LAMB_ENABLED) return;

  lambRethink -= dt;
  if(lambRethink <= 0){
    lambRethink = randRange(LAMB_RETHINK_SEC_MIN, LAMB_RETHINK_SEC_MAX);
    lambAng += randRange(-1.25, 1.25);
  }

  const dxC = posX - lambX;
  const dyC = posY - lambY;
  const dC = Math.hypot(dxC, dyC) || 1;
  if(dC > LAMB_LEASH_DIST){
    const target = Math.atan2(dyC, dxC);
    let da = target - lambAng;
    while(da > Math.PI) da -= Math.PI*2;
    while(da < -Math.PI) da += Math.PI*2;
    lambAng += da * Math.min(1, (LAMB_WANDER_TURN*1.4) * dt);
  }

  const vx = Math.cos(lambAng) * LAMB_SPEED;
  const vy = Math.sin(lambAng) * LAMB_SPEED;

  const nx = lambX + vx * dt;
  const ny = lambY + vy * dt;

  const wouldHit = hitsAnyObstacle(nx, ny);
  if(!wouldHit){
    lambX = nx;
    lambY = ny;
  }else{
    lambAng += randRange(-LAMB_AVOID_TURN_JITTER, LAMB_AVOID_TURN_JITTER);
    lambRethink = 0.15;
  }
}

// ✅ Lambchop health pickup on collision (5% health)
// Uses a short cooldown so you don't gain health 60x/sec while overlapping.
function tryLambPickup(dt){
  if(!LAMB_ENABLED) return;
  lambPickupCooldown = Math.max(0, lambPickupCooldown - dt);
  if(lambPickupCooldown > 0) return;

  const d = Math.hypot(lambX - posX, lambY - posY);
  if(d <= LAMB_COLLIDE_DIST){
    addHealth(LAMB_HEALTH_BOOST);
    lambPickupCooldown = LAMB_PICKUP_COOLDOWN_SEC;

    // optional little feedback sound (reuse pickup)
    playSfx(foodPickupSfx);

    // nudge lamb away a bit so it feels like you "bumped" him
    const push = 2.0;
    const a = Math.atan2(lambY - posY, lambX - posX) + (Math.random()*0.6 - 0.3);
    lambX = posX + Math.cos(a) * push;
    lambY = posY + Math.sin(a) * push;
  }
}

const TREE_COUNT = 5000, TREE_MIN_X=-100, TREE_MAX_X=100, TREE_MIN_Y=-100, TREE_MAX_Y=100;
const TREE_SPRITE_SCALE = 2.6, TREE_TRUNK_RADIUS = 0.30;
const TREE_DRAW_MAX_DIST = 140, TREE_DRAW_MAX_D2 = TREE_DRAW_MAX_DIST*TREE_DRAW_MAX_DIST;

let TREES = [], visibleTrees = [];
function regenerateForest(){
  TREES = [];
  for(let i=0;i<TREE_COUNT;i++){
    const x = TREE_MIN_X + Math.random()*(TREE_MAX_X-TREE_MIN_X);
    const y = TREE_MIN_Y + Math.random()*(TREE_MAX_Y-TREE_MIN_Y);
    const topZ = TREE_TOP_MIN_Z + Math.random()*(TREE_TOP_MAX_Z - TREE_TOP_MIN_Z);
    TREES.push({x,y,topZ});
  }
}
regenerateForest();

function updateVisibleTrees(){
  visibleTrees = [];
  for(const t of TREES){
    const dx=t.x-posX, dy=t.y-posY;
    const d2=dx*dx+dy*dy;
    if(d2<=TREE_DRAW_MAX_D2) visibleTrees.push({x:t.x,y:t.y,d2,topZ:t.topZ,kind:"tree"});
  }
}

const ROCK_COUNT=140, ROCK_MIN_X=-95, ROCK_MAX_X=95, ROCK_MIN_Y=-95, ROCK_MAX_Y=95;
const ROCK_SPRITE_SCALE=1.35, ROCK_RADIUS=0.55;
let ROCKS=[];
function regenerateRocks(){
  ROCKS=[];
  for(let i=0;i<ROCK_COUNT;i++){
    const x = ROCK_MIN_X + Math.random()*(ROCK_MAX_X-ROCK_MIN_X);
    const y = ROCK_MIN_Y + Math.random()*(ROCK_MAX_Y-ROCK_MIN_Y);
    ROCKS.push({x,y,topZ:ROCK_TOP_Z,kind:"rock"});
  }
}
regenerateRocks();
ensureSafePlayerSpawn();
updateVisibleTrees();
resetLamb();

function platformUnderCami(){
  const rr2=(ROCK_RADIUS*1.05)**2;
  for(const r of ROCKS){
    const dx=posX-r.x, dy=posY-r.y;
    if(dx*dx+dy*dy<=rr2) return r;
  }
  const tr2=(TREE_TRUNK_RADIUS*1.05)**2;
  for(const t of visibleTrees){
    const dx=posX-t.x, dy=posY-t.y;
    if(dx*dx+dy*dy<=tr2) return t;
  }
  return null;
}

function hitsAnyObstacle(nx, ny){
  if(camZ > 0.10) return false;
  const trr = (CAMI_RADIUS + TREE_TRUNK_RADIUS);
  const trr2 = trr*trr;
  for(const t of visibleTrees){
    const dx = nx - t.x;
    const dy = ny - t.y;
    if(dx*dx + dy*dy < trr2) return true;
  }
  const rrr = (CAMI_RADIUS + ROCK_RADIUS);
  const rrr2 = rrr*rrr;
  for(const r of ROCKS){
    const dx = nx - r.x;
    const dy = ny - r.y;
    if(dx*dx + dy*dy < rrr2) return true;
  }
  return false;
}

function isSpawnBlocked(nx, ny){
  const trr = (CAMI_RADIUS + TREE_TRUNK_RADIUS + 0.12);
  const trr2 = trr*trr;
  for(const t of TREES){
    const dx = nx - t.x;
    const dy = ny - t.y;
    if(dx*dx + dy*dy < trr2) return true;
  }
  const rrr = (CAMI_RADIUS + ROCK_RADIUS + 0.12);
  const rrr2 = rrr*rrr;
  for(const r of ROCKS){
    const dx = nx - r.x;
    const dy = ny - r.y;
    if(dx*dx + dy*dy < rrr2) return true;
  }
  return false;
}

function ensureSafePlayerSpawn(){
  if(!isSpawnBlocked(posX, posY)) return;
  const baseX = posX, baseY = posY;
  const maxR = 36;
  for(let r=1; r<=maxR; r+=0.75){
    for(let i=0; i<32; i++){
      const a = (i/32) * Math.PI * 2 + r * 0.21;
      const nx = baseX + Math.cos(a) * r;
      const ny = baseY + Math.sin(a) * r;
      if(!isSpawnBlocked(nx, ny)){
        posX = nx;
        posY = ny;
        return;
      }
    }
  }
}

/* =========================================================
   ✅ Jump update now uses edge SPACE only if not used to shoot
========================================================= */
function updateJump(dt, jumpEdge){
  const p = platformUnderCami();
  const supportZ = p ? p.topZ : 0;

  if(onGround && camZ > supportZ + LAND_EPS){
    onGround = false; vz = 0;
  }
  if(jumpEdge && onGround){
    vz = JUMP_VELOCITY; onGround = false;
  }
  if(!onGround){
    vz -= GRAVITY * dt;
    camZ += vz * dt;
    const p2 = platformUnderCami();
    const landZ = p2 ? p2.topZ : 0;
    if(camZ <= landZ){
      camZ = landZ; vz = 0; onGround = true;
    }
    if(camZ > MAX_JUMP_Z) camZ = MAX_JUMP_Z;
  }else{
    camZ = supportZ;
  }
}

/* =========================================================
   SPAWN HELPERS
========================================================= */
function rand(a,b){ return a + Math.random()*(b-a); }

function pickSpawnPoint({ distMin, distMax, jitterDeg, tries, keepAtLeastFromCami }){
  for(let i=0;i<tries;i++){
    const dist = rand(distMin, distMax);
    const jitter = rand(-jitterDeg, jitterDeg) * Math.PI/180;
    const a = ang + jitter;

    let tx = posX + Math.cos(a) * dist;
    let ty = posY + Math.sin(a) * dist;

    const dx = tx - posX, dy = ty - posY;
    const d = Math.hypot(dx,dy) || 1;
    if(d < keepAtLeastFromCami){
      tx = posX + (dx/d) * keepAtLeastFromCami;
      ty = posY + (dy/d) * keepAtLeastFromCami;
    }

    let blocked = false;
    const rr = (TREE_TRUNK_RADIUS + 0.35);
    const rr2 = rr*rr;
    for(const t of visibleTrees){
      const ddx = tx - t.x;
      const ddy = ty - t.y;
      if(ddx*ddx + ddy*ddy < rr2){ blocked = true; break; }
    }
    if(!blocked) return {x:tx,y:ty};
  }
  return {x: posX + dirX * distMin, y: posY + dirY * distMin};
}

function resetSaberDayCycle(){
  saberPassesThisDay = 0;
  saberSpawnCooldown = 0.8;
  saberActive = false;
}

function setSaberArcPosition(){
  const fx = Math.cos(saberAnchorA);
  const fy = Math.sin(saberAnchorA);
  const rx = fy;
  const ry = -fx;
  const c = Math.cos(saberArcTheta);
  const s = Math.sin(saberArcTheta);

  saberX = saberAnchorX + (fx * (c * saberArcRadius)) + (rx * (s * saberArcRadius));
  saberY = saberAnchorY + (fy * (c * saberArcRadius)) + (ry * (s * saberArcRadius));
}

function spawnSaberPass(){
  saberArcRadius = rand(SABER_AHEAD_DIST_MIN, SABER_AHEAD_DIST_MAX);
  const speed = rand(SABER_SPEED_MIN, SABER_SPEED_MAX);

  // Keep the semicircle clearly in front of the player for visibility.
  const centerAhead = saberArcRadius * SABER_CENTER_AHEAD_FACTOR;
  saberAnchorX = posX + Math.cos(ang) * centerAhead;
  saberAnchorY = posY + Math.sin(ang) * centerAhead;
  saberAnchorA = ang;
  saberArcTheta = SABER_ARC_START;
  saberArcOmega = speed / Math.max(0.001, saberArcRadius);
  setSaberArcPosition();

  saberActive = true;
  saberPassesThisDay += 1;
  saberSpawnCooldown = rand(SABER_COOLDOWN_MIN, SABER_COOLDOWN_MAX);
}

function updateDaySaber(lit, dt){
  if(!SABER_ENABLED){
    saberActive = false;
    return;
  }

  const dayEnough = (!NIGHT_ENABLED) || (lit.nightFactor <= SABER_DAY_THRESHOLD);
  if(!dayEnough){
    saberActive = false;
    return;
  }

  if(saberActive){
    saberArcTheta += saberArcOmega * dt;
    setSaberArcPosition();

    if(saberArcTheta >= SABER_ARC_END){
      saberActive = false;
    }
    return;
  }

  if(saberPassesThisDay >= SABER_PASSES_PER_DAY) return;
  saberSpawnCooldown -= dt;
  if(saberSpawnCooldown <= 0){
    spawnSaberPass();
  }
}

function updateNightFireSpawn(lit){
  if(!FIRE_ENABLED || !FIRE_SPAWN_AT_NIGHT){
    fireActive = FIRE_VISIBLE_DAYTIME;
    return;
  }
  const nightEnough = NIGHT_ENABLED && (lit.nightFactor >= FIRE_SPAWN_NIGHT_THRESHOLD);

    fireActive = true;
    if(!fireSpawnedThisNight){
      const p = pickSpawnPoint({
        distMin: FIRE_SPAWN_DIST_MIN, distMax: FIRE_SPAWN_DIST_MAX,
        jitterDeg: FIRE_SPAWN_ANGLE_JITTER_DEG, tries: FIRE_SPAWN_TRIES,
        keepAtLeastFromCami: FIRE_KEEP_AT_LEAST_FROM_CAMI
      });
      fireX = p.x; fireY = p.y;
      fireSpawnedThisNight = true;
    }
  }else{
    fireActive = FIRE_VISIBLE_DAYTIME;
    fireSpawnedThisNight = false;
  }
}

/* =========================================================
   SPRITE PROJECTION / DRAW
========================================================= */
function projectSprite(sx, sy){
  const w=c.width, h=c.height;
  const dx = sx - posX;
  const dy = sy - posY;

  const invDet = 1.0 / (planeX * dirY - dirX * planeY);
  const tx = invDet * ( dirY * dx - dirX * dy);
  const ty = invDet * (-planeY * dx + planeX * dy);

  if(ty <= 0.22) return null;

  const screenX = (w/2) * (1 + tx/ty);
  const size = (h/ty);
  return {screenX, size, ty, w, h};
}

function drawSprite(img, sx, sy, scale, fallbackColor=null, yShiftFactor=0){
  const p = projectSprite(sx, sy);
  if(!p) return;

  const size = p.size * scale;
  const x = (p.screenX - size/2);

  const jumpPix = camZ * (p.h * 0.18);
  const y0 = (p.h/2 - size/2) + jumpPix;
  const y = y0 + (size * yShiftFactor);

  if(!img || !img.complete || img.naturalWidth<=0){
    if(fallbackColor){
      ctx.fillStyle = fallbackColor;
      ctx.fillRect(x, y, size, size);
    }
    return;
  }
  ctx.drawImage(img, x, y, size, size);
}
function drawSpriteNoJump(img, sx, sy, scale, fallbackColor=null, yShiftFactor=0){
  const p = projectSprite(sx, sy);
  if(!p) return;

  const size = p.size * scale;
  const x = (p.screenX - size/2);

  // ❌ NO jumpPix applied here
  const y0 = (p.h/2 - size/2);
  const y = y0 + (size * yShiftFactor);

  if(!img || !img.complete || img.naturalWidth<=0){
    if(fallbackColor){
      ctx.fillStyle = fallbackColor;
      ctx.fillRect(x, y, size, size);
    }
    return;
  }
  ctx.drawImage(img, x, y, size, size);
}

// =========================================================
// 🧱 SpiderPad-style anchored sprite (NO jump bob)
// (Castle/Treasure in SpiderPad stayed put using this idea.)
// =========================================================
function drawSpriteSimple(img, sx, sy, scale){
  const p = projectSprite(sx, sy);
  if(!p) return;

  const size = p.size * scale;
  const x = (p.screenX - size/2);
  const y = (p.h/2 - size/2);

  if(!img || !img.complete || img.naturalWidth<=0) return;
  ctx.drawImage(img, x, y, size, size);
}

function drawSpriteStretchedX(img, sx, sy, scale, stretchX, stretchY=1, yShiftFactor=0){
  const p = projectSprite(sx, sy);
  if(!p) return;

  const base = p.size * scale;
  const w = base * stretchX;
  const h = base * stretchY;
  const x = p.screenX - w/2;
  const y0 = (p.h/2 - h/2);
  const y = y0 + (h * yShiftFactor);

  if(!img || !img.complete || img.naturalWidth<=0){
    ctx.fillStyle = "rgba(180,230,255,0.92)";
    ctx.fillRect(x, y, w, h);
    return;
  }
  ctx.drawImage(img, x, y, w, h);
}

function drawGroundShadow(wx, wy, scale, yShiftFactor=0, strength=0.22){
  const p = projectSprite(wx, wy);
  if(!p) return;

  const size = p.size * scale;
  const x = p.screenX;
  const y0 = (p.h/2 - size/2);
  const y = y0 + (size * yShiftFactor);
  const baseY = y + (size * 0.88);

  const rx = Math.max(2, size * 0.28);
  const ry = Math.max(1, size * 0.10);
  const alpha = Math.min(0.95, strength * 1.2 * (0.25 + nightLit.sun * 0.75));

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = "rgba(0,0,0,1)";
  ctx.beginPath();
  ctx.ellipse(x, baseY, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBlueBallSprite(wx, wy, scale, yShiftFactor){
  const p = projectSprite(wx, wy);
  if(!p) return;
  const size = p.size * scale;
  const x = (p.screenX - size/2);
  const y0 = (p.h/2 - size/2);
  const y = y0 + (size * yShiftFactor);
  const r = Math.max(2, size * 0.48);

  const cx = x + size/2;
  const cy = y + size/2;
  const g = ctx.createRadialGradient(cx - r*0.35, cy - r*0.35, r*0.2, cx, cy, r);
  g.addColorStop(0, "rgba(170,230,255,0.98)");
  g.addColorStop(0.5, "rgba(70,160,255,0.96)");
  g.addColorStop(1, "rgba(20,90,255,0.92)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fill();
}


function drawFireFramesSprite(wx, wy, scale, yShiftFactor){
  const p = projectSprite(wx, wy);
  if(!p) return;

  const img = fireFrames[fireFrameIndex];
  if(!img || !img.complete || img.naturalWidth <= 0) return;

  const size = p.size * scale;
  const x = (p.screenX - size/2);

  const jumpPix = camZ * (p.h * 0.18);
  const y0 = (p.h/2 - size/2) + jumpPix;
  const y = y0 + (size * yShiftFactor);

  const sx = Math.floor(img.naturalWidth  * FIRE_CROP.x);
  const sy = Math.floor(img.naturalHeight * FIRE_CROP.y);
  const sw = Math.floor(img.naturalWidth  * FIRE_CROP.w);
  const sh = Math.floor(img.naturalHeight * FIRE_CROP.h);

  ctx.drawImage(img, sx, sy, sw, sh, x, y, size, size);
}

/* =========================================================
   🐺 WOLF (animated) + hit penalty + stun timer
========================================================= */
const WOLF_ANIM_FPS = 10;
const wolfFrames = [];
for(let i=1;i<=6;i++){
  const im = new Image();
  im.src = `images/wolf${i}.png`;
  wolfFrames.push(im);
}
let wolfFrameIndex = 0;
let wolfFrameAcc = 0;

function advanceWolfAnim(dt){
  wolfFrameAcc += dt;
  const ft = 1 / Math.max(1, WOLF_ANIM_FPS);
  while(wolfFrameAcc >= ft){
    wolfFrameAcc -= ft;
    wolfFrameIndex = (wolfFrameIndex + 1) % wolfFrames.length;
  }
}
function drawWolfFramesSprite(wx, wy, scale, yShiftFactor){
  const p = projectSprite(wx, wy);
  if(!p) return;
  const img = wolfFrames[wolfFrameIndex];

  const size = p.size * scale;
  const x = (p.screenX - size/2);

  const jumpPix = camZ * (p.h * 0.18);
  const y0 = (p.h/2 - size/2) + jumpPix;
  const y = y0 + (size * yShiftFactor);

  if(!img || !img.complete || img.naturalWidth<=0){
    ctx.fillStyle="rgba(255,0,0,0.75)";
    ctx.fillRect(x,y,size,size);
    return;
  }

  ctx.drawImage(img,x,y,size,size);
  if(wolfStunnedTimer > 0){
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = "rgba(90,170,255,1)";
    ctx.fillRect(x,y,size,size);
    ctx.restore();
  }
}

const WOLF_SPRITE_SCALE = .8;
const WOLF_SPEED  = 1.1;
const WOLF_TURN   = 6.5;
const WOLF_CATCH_DIST = 0.75;

const WOLF_GROWL_DIST = 6.5;
const WOLF_GROWL_COOLDOWN = 1.8;
let wolfGrowlTimer = 0;

let wolfX=0, wolfY=0;
let wolfVX=0, wolfVY=0;
let wolfShowcaseTimer = 2.0;

function resetWolf(putInFront=false){
  const front = putInFront ? 10.0 : -10.0;
  wolfX = posX + dirX*front + (-dirY)*2.0;
  wolfY = posY + dirY*front + ( dirX)*2.0;
  wolfVX = 0; wolfVY = 0;
  wolfShowcaseTimer = putInFront ? 2.0 : 0.0;
}
resetWolf(true);

function updateWolf(dt){
  if(!WOLF_ENABLED) return;
  if(wolfShowcaseTimer > 0){ wolfShowcaseTimer -= dt; return; }

  if(wolfStunnedTimer > 0){
    wolfStunnedTimer = Math.max(0, wolfStunnedTimer - dt);
    return;
  }

  const fireSafe = playerNearFireAnimation();
  const camiSafe = (camZ > 0.10) || fireSafe;

  const dx = posX - wolfX;
  const dy = posY - wolfY;
  const dist = Math.hypot(dx,dy) || 1;

  wolfGrowlTimer -= dt;
  if(!camiSafe && dist < WOLF_GROWL_DIST && wolfGrowlTimer <= 0){
    playSfx(wolfGrowl);
    wolfGrowlTimer = WOLF_GROWL_COOLDOWN;
  }

  if(!camiSafe && dist < WOLF_CATCH_DIST){
    playSfx(screamSfx);
    applyWolfHitPenalty();
    resetWolf(false);
    return;
  }

  const ux = dx/dist, uy = dy/dist;
  const desiredVX = ux * WOLF_SPEED;
  const desiredVY = uy * WOLF_SPEED;

  const k = Math.min(1, WOLF_TURN * dt);
  wolfVX += (desiredVX - wolfVX) * k;
  wolfVY += (desiredVY - wolfVY) * k;

  wolfX += wolfVX * dt;
  wolfY += wolfVY * dt;
}

/* =========================================================
   🕷️ SPIDER (chase + repeating attack every 3 seconds)
========================================================= */
const SPIDER_SPRITE_SCALE = 0.72;
const SPIDER_SPEED = 0.95;
const SPIDER_TURN = 6.0;
const SPIDER_CATCH_DIST = 0.90;
const SPIDER_ATTACK_COOLDOWN = 4.0;
const SPIDER_FRONT_REPOSITION_DIST = 6.5;
const SPIDER_ATTACK_PAIR_SIZE = 2;
const SPIDER_PAIR_SWITCH_SEC = 4.0;

const spiders = [];
let spiderPairOffset = 0;
let spiderPairTimer = SPIDER_PAIR_SWITCH_SEC;

function resetSpiders(putInFront=false){
  spiders.length = 0;
  spiderPairOffset = 0;
  spiderPairTimer = SPIDER_PAIR_SWITCH_SEC;
  const frontBase = putInFront ? 8.0 : -8.0;
  for(let i=0; i<SPIDER_COUNT; i++){
    const side = (i - (SPIDER_COUNT - 1) / 2) * 1.5;
    const frontJitter = (Math.random() * 2.0) - 1.0;
    const front = frontBase + frontJitter;
    spiders.push({
      x: posX + dirX * front + (dirY) * (2.0 + side),
      y: posY + dirY * front + (-dirX) * (2.0 + side),
      vx: 0,
      vy: 0,
      attackTimer: 0,
      alive: true
    });
  }
}
resetSpiders(true);

function updateSpiders(dt){
  if(gameOver) return;
  const fireSafe = playerNearFireAnimation();
  const camiSafe = (camZ > 0.10) || fireSafe;
  const aliveIdx = [];
  for(let i=0; i<spiders.length; i++){
    if(spiders[i].alive) aliveIdx.push(i);
  }
  if(!aliveIdx.length) return;

  spiderPairTimer -= dt;
  if(spiderPairTimer <= 0){
    const step = Math.min(SPIDER_ATTACK_PAIR_SIZE, aliveIdx.length);
    spiderPairOffset = (spiderPairOffset + step) % aliveIdx.length;
    spiderPairTimer = SPIDER_PAIR_SWITCH_SEC;
  }

  const activeSet = new Set();
  const activeCount = Math.min(SPIDER_ATTACK_PAIR_SIZE, aliveIdx.length);
  for(let k=0; k<activeCount; k++){
    activeSet.add(aliveIdx[(spiderPairOffset + k) % aliveIdx.length]);
  }

  for(let i=0; i<spiders.length; i++){
    const s = spiders[i];
    if(!s.alive) continue;

    // Keep spiders in front hemisphere so wolf is the only rear chaser.
    const rx = s.x - posX;
    const ry = s.y - posY;
    const inFrontDot = (rx * dirX + ry * dirY);
    if(inFrontDot < 0.15){
      const side = (i - (SPIDER_COUNT - 1) / 2) * 1.2;
      const front = SPIDER_FRONT_REPOSITION_DIST + (Math.random() * 1.4 - 0.7);
      s.x = posX + dirX * front + (-dirY) * side;
      s.y = posY + dirY * front + ( dirX) * side;
      s.vx = 0;
      s.vy = 0;
    }

    if(!activeSet.has(i)){
      // Non-active spiders hold their lane while waiting for the next pair turn.
      s.vx *= 0.8;
      s.vy *= 0.8;
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      continue;
    }

    const dx = posX - s.x;
    const dy = posY - s.y;
    const dist = Math.hypot(dx, dy) || 1;

    s.attackTimer = Math.max(0, s.attackTimer - dt);
    if(!camiSafe && dist < SPIDER_CATCH_DIST && s.attackTimer <= 0){
      playSfx(screamSfx);
      applySpiderHitPenalty();
      s.attackTimer = SPIDER_ATTACK_COOLDOWN;
    }

    const ux = dx / dist;
    const uy = dy / dist;
    const desiredVX = ux * SPIDER_SPEED;
    const desiredVY = uy * SPIDER_SPEED;
    const k = Math.min(1, SPIDER_TURN * dt);
    s.vx += (desiredVX - s.vx) * k;
    s.vy += (desiredVY - s.vy) * k;

    s.x += s.vx * dt;
    s.y += s.vy * dt;
  }
}

/* =========================================================
   HEALTH UI
========================================================= */
function updateHealthUI(){
  const pct = clamp(health / HEALTH_MAX, 0, 1);
  healthFillEl.style.transform = `scaleX(${pct})`;
  healthTextEl.textContent = `HEALTH ${Math.round(health)}%`;
}

/* =========================================================
   MAIN LOOP
========================================================= */
let last = performance.now();
let fpsAcc=0, fpsCount=0, fps=0;

function frame(now){
  const dt = Math.min(0.05, (now-last)/1000);
  last = now;

  // tick health sound cooldown
  healthToneCooldown = Math.max(0, healthToneCooldown - dt);

  fpsAcc += dt; fpsCount++;
  if(fpsAcc >= 0.5){
    fps = Math.round(fpsCount / fpsAcc);
    fpsAcc = 0; fpsCount = 0;
  }

  if(!gameOver){
    if(keys.has("ArrowLeft"))  ang -= TURN_SPEED * dt;
    if(keys.has("ArrowRight")) ang += TURN_SPEED * dt;
  }

  dirX = Math.cos(ang);
  dirY = Math.sin(ang);
  planeX = -dirY * FOV;
  planeY =  dirX * FOV;

  updateVisibleTrees();

  // SPACE now always shoots a blue ball (no jump) and plays gun SFX.
  if(spacePressedEdge){
    shootBlueBall();
    playSfx(gunSfx);
  }
  spacePressedEdge = false;

  if(!gameOver) updateJump(dt, false);

  let step = 0;
  if(!gameOver){
    if(keys.has("ArrowUp"))   step += (MOVE_SPEED_BASE * speedMult) * dt;
    if(keys.has("ArrowDown")) step -= (MOVE_SPEED_BASE * speedMult) * dt;
  }
  updateWalkingSound(!gameOver && step !== 0);

  if(step){
    const nx = posX + dirX*step;
    const ny = posY + dirY*step;
    if(!hitsAnyObstacle(nx, posY)) posX = nx;
    if(!hitsAnyObstacle(posX, ny)) posY = ny;
  }

  if(!NIGHT_PAUSED){
    let rate = (1 / DAY_LENGTH_SEC) * NIGHT_SPEED_MUL;
    const sunRawNow = (Math.cos((time01 - 0.5) * Math.PI * 2) + 1) / 2;
    if(sunRawNow >= 0.5){
      rate *= (1 / DAY_DURATION_SCALE);   // slower during daytime
    }else{
      rate *= (1 / NIGHT_DURATION_SCALE); // faster during nighttime
    }
    time01 = (time01 + dt * rate) % 1;
  }
  if(time01 < prevTime01){
    resetSaberDayCycle();
  }
  prevTime01 = time01;
  nightLit = computeNight(time01);

  const isNightNow = NIGHT_ENABLED && (nightLit.nightFactor >= NIGHT_PENALTY_START_NF);
  if(isNightNow && !wasNight){
    applyNightPenalty();
  }
  wasNight = isNightNow;

  updateNightFireSpawn(nightLit);
  updateDayFoodSpawn(nightLit);
  updateDaySaber(nightLit, dt);

  if(!gameOver) applyEastHeadingRule(dt);

  if(!gameOver) tryFoodPickup();
  if(!gameOver) tryFireBonus();

  // ✅ apply fire exit penalty (night only)
  if(!gameOver) applyFireExitPenaltyIfNeeded();

  // ✅ STUN: spawn when health low; touch to arm
  trySpawnStunGun();
  tryPickupStunGun();

  updateBlueBalls(dt);
  advanceFire(dt);
  advanceWolfAnim(dt);
  updateFoodBanner(dt);
  updateStunBanner(dt);
  updateStartMsg(dt);

  updateAmbience(nightLit);
  if(!gameOver) updateWolf(dt);
  if(!gameOver) updateSpiders(dt);
  if(!gameOver) updateLamb(dt);
  if(!gameOver) tryLambPickup(dt);
  checkHutCollision();

  renderSkyAndFloor();

  // draw sprites
  const sprites = [];

  if(STUN_ENABLED && stunActive){
    const dx = stunX - posX, dy = stunY - posY;
    sprites.push({x:stunX, y:stunY, d2:dx*dx+dy*dy, kind:"stun"});
  }

  if(FOOD_ENABLED && foodActive){
    const dx = foodX - posX, dy = foodY - posY;
    sprites.push({x:foodX, y:foodY, d2:dx*dx+dy*dy, kind:"food"});
  }
  if(FIRE_ENABLED && fireActive){
    const dx = fireX - posX, dy = fireY - posY;
    sprites.push({x:fireX, y:fireY, d2:dx*dx+dy*dy, kind:"fire"});
  }
  for(const b of blueBalls){
    const dx = b.x - posX, dy = b.y - posY;
    sprites.push({x:b.x, y:b.y, d2:dx*dx+dy*dy, kind:"blueball"});
  }
  if(SABER_ENABLED && saberActive){
    const dx = saberX - posX, dy = saberY - posY;
    sprites.push({x:saberX, y:saberY, d2:dx*dx+dy*dy, kind:"saber"});
  }
  for(const r of ROCKS){
    const dx = r.x - posX, dy = r.y - posY;
    sprites.push({x:r.x, y:r.y, d2:dx*dx+dy*dy, kind:"rock"});
  }
  for(const t of visibleTrees) sprites.push(t);

  if(LAMB_ENABLED){
    const dx = lambX - posX, dy = lambY - posY;
    sprites.push({x:lambX, y:lambY, d2:dx*dx+dy*dy, kind:"lamb"});
  }

  // 🏠 Hut is a fixed world object (goal)
  {
    const dx = hutX - posX, dy = hutY - posY;
    sprites.push({ x: hutX, y: hutY, d2:dx*dx+dy*dy, kind:"hut"});
  }

  if(WOLF_ENABLED){
    const dx = wolfX - posX, dy = wolfY - posY;
    sprites.push({x:wolfX, y:wolfY, d2:dx*dx+dy*dy, kind:"wolf"});
  }
  for(const s of spiders){
    if(!s.alive) continue;
    const dx = s.x - posX, dy = s.y - posY;
    sprites.push({x:s.x, y:s.y, d2:dx*dx+dy*dy, kind:"spider"});
  }

  sprites.sort((a,b)=>b.d2-a.d2);

  for(const s of sprites){
    if(s.kind === "wolf"){
      drawGroundShadow(s.x, s.y, WOLF_SPRITE_SCALE, 0.35, 0.30);
    }else if(s.kind === "spider"){
      drawGroundShadow(s.x, s.y, SPIDER_SPRITE_SCALE, 0.36, 0.26);
    }else if(s.kind === "lamb"){
      drawGroundShadow(s.x, s.y, LAMB_SPRITE_SCALE, 0.35, 0.22);
    }else if(s.kind === "rock"){
      drawGroundShadow(s.x, s.y, ROCK_SPRITE_SCALE, 0.30, 0.18);
    }else if(s.kind === "hut"){
      drawGroundShadow(s.x, s.y, HUT_SPRITE_SCALE, 0.0, 0.24);
    }else if(s.kind === "tree"){
      drawGroundShadow(s.x, s.y, TREE_SPRITE_SCALE, 0.0, 0.14);
    }

    if(s.kind === "wolf"){
      drawWolfFramesSprite(s.x, s.y, WOLF_SPRITE_SCALE, 0.35);
    }else if(s.kind === "spider"){
      drawSprite(spiderImg, s.x, s.y, SPIDER_SPRITE_SCALE, "rgba(230,230,230,0.90)", 0.36);
    }else if(s.kind === "lamb"){
      drawSprite(lambImg, s.x, s.y, LAMB_SPRITE_SCALE, "rgba(255,230,230,0.85)", 0.35);
    }else if(s.kind === "rock"){
      drawSprite(rockImg, s.x, s.y, ROCK_SPRITE_SCALE, null, 0.30);
    }else if(s.kind === "fire"){
      drawFireFramesSprite(s.x, s.y, FIRE_SPRITE_SCALE, FIRE_YSHIFT);
    }else if(s.kind === "food"){
      drawSprite(foodImg, s.x, s.y, FOOD_SPRITE_SCALE, "rgba(255,220,90,0.85)", FOOD_YSHIFT);
    }else if(s.kind === "stun"){
      drawSprite(stunImg, s.x, s.y, STUN_SPRITE_SCALE, "rgba(150,220,255,0.85)", STUN_YSHIFT);
    }else if(s.kind === "saber"){
      drawSpriteStretchedX(saberImg, s.x, s.y, SABER_SPRITE_SCALE, SABER_LENGTH_MUL, SABER_HEIGHT_MUL, SABER_YSHIFT);
    }else if(s.kind === "blueball"){
      drawBlueBallSprite(s.x, s.y, BLUE_BALL_SPRITE_SCALE, BLUE_BALL_YSHIFT);
    }else if(s.kind === "hut"){
      drawSpriteSimple(hutImg, s.x, s.y, HUT_SPRITE_SCALE);
    }else{
      drawSprite(treeImg, s.x, s.y, TREE_SPRITE_SCALE, null);
    }}

  applyNightOverlay(nightLit);
  drawCompass(ang);

  updateHealthUI();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

})();
});
</script>
