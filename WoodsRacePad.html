<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bigfoot Woods Drive</title>
<style>
  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
  }

  #bigfoot {
    position: fixed;
    left: 50vw;
    top: 54vh;
    width: min(28vw, 220px);
    height: auto;
    z-index: 2;
    transform: translate(-50%, -50%);
    pointer-events: none;
    -webkit-user-drag: none;
  }

  #blueTruck {
    position: fixed;
    left: calc(50vw + min(22vw, 170px));
    top: 57vh;
    width: min(24vw, 210px);
    height: auto;
    z-index: 2;
    transform: translate(-50%, -50%);
    pointer-events: none;
    -webkit-user-drag: none;
  }

  #controls {
    position: fixed;
    right: max(12px, env(safe-area-inset-right));
    bottom: max(12px, env(safe-area-inset-bottom));
    z-index: 4;
    display: grid;
    grid-template-columns: 64px 64px 64px;
    grid-template-rows: 64px 64px 64px;
    gap: 8px;
  }

  .ctrl {
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 14px;
    background: rgba(0,0,0,0.58);
    color: white;
    font: 900 28px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
    touch-action: none;
  }

  .ctrl:active {
    background: rgba(0,0,0,0.86);
    transform: scale(0.96);
  }

  #upBtn { grid-column: 2; grid-row: 1; }
  #leftBtn { grid-column: 1; grid-row: 2; }
  #rightBtn { grid-column: 3; grid-row: 2; }
  #downBtn { grid-column: 2; grid-row: 3; }

  @media (max-width: 700px) {
    #bigfoot { width: min(34vw, 180px); }
    #controls {
      grid-template-columns: 56px 56px 56px;
      grid-template-rows: 56px 56px 56px;
      gap: 7px;
    }
    .ctrl { font-size: 24px; border-radius: 12px; }
  }
</style>
</head>
<body>
<video id="video" src="images/road_ipad.mp4" muted loop playsinline webkit-playsinline autoplay preload="auto"></video>
<img id="bigfoot" src="images/bigfoot.png" alt="Bigfoot" />
<img id="blueTruck" src="images/blue_truck.png" alt="Blue truck" />

<div id="controls" aria-label="Bigfoot controls">
  <button id="upBtn" class="ctrl" type="button" aria-label="Move up">▲</button>
  <button id="leftBtn" class="ctrl" type="button" aria-label="Move left">◀</button>
  <button id="rightBtn" class="ctrl" type="button" aria-label="Move right">▶</button>
  <button id="downBtn" class="ctrl" type="button" aria-label="Move down">▼</button>
</div>

<script>
  const video = document.getElementById("video");
  const bigfoot = document.getElementById("bigfoot");
  const keys = { up:false, down:false, left:false, right:false };
  let x = window.innerWidth * 0.5;
  let y = window.innerHeight * 0.54;
  let lastT = performance.now();

  function moveBigfoot(dx, dy) {
    x += dx;
    y += dy;
    bigfoot.style.left = x + "px";
    bigfoot.style.top = y + "px";
  }

  function setHeld(dir, held) {
    keys[dir] = held;
    video.play().catch(() => {});
  }

  function bindButton(id, dir) {
    const btn = document.getElementById(id);
    const down = (ev) => {
      ev.preventDefault();
      setHeld(dir, true);
    };
    const up = (ev) => {
      if (ev) ev.preventDefault();
      setHeld(dir, false);
    };
    btn.addEventListener("pointerdown", down, { passive:false });
    btn.addEventListener("pointerup", up, { passive:false });
    btn.addEventListener("pointercancel", up, { passive:false });
    btn.addEventListener("pointerleave", up);
    btn.addEventListener("click", (ev) => {
      ev.preventDefault();
      const step = 28;
      if (dir === "up") moveBigfoot(0, -step);
      if (dir === "down") moveBigfoot(0, step);
      if (dir === "left") moveBigfoot(-step, 0);
      if (dir === "right") moveBigfoot(step, 0);
    });
  }

  bindButton("upBtn", "up");
  bindButton("downBtn", "down");
  bindButton("leftBtn", "left");
  bindButton("rightBtn", "right");

  window.addEventListener("keydown", (ev) => {
    if (ev.key === "ArrowUp") { ev.preventDefault(); setHeld("up", true); }
    if (ev.key === "ArrowDown") { ev.preventDefault(); setHeld("down", true); }
    if (ev.key === "ArrowLeft") { ev.preventDefault(); setHeld("left", true); }
    if (ev.key === "ArrowRight") { ev.preventDefault(); setHeld("right", true); }
  }, { passive:false });

  window.addEventListener("keyup", (ev) => {
    if (ev.key === "ArrowUp") setHeld("up", false);
    if (ev.key === "ArrowDown") setHeld("down", false);
    if (ev.key === "ArrowLeft") setHeld("left", false);
    if (ev.key === "ArrowRight") setHeld("right", false);
  });

  window.addEventListener("resize", () => {
    x = Math.min(window.innerWidth, Math.max(0, x));
    y = Math.min(window.innerHeight, Math.max(0, y));
    moveBigfoot(0, 0);
  });

  function tick(now) {
    const dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    const speed = 320;
    let dx = 0;
    let dy = 0;
    if (keys.left) dx -= speed * dt;
    if (keys.right) dx += speed * dt;
    if (keys.up) dy -= speed * dt;
    if (keys.down) dy += speed * dt;
    if (dx || dy) moveBigfoot(dx, dy);
    requestAnimationFrame(tick);
  }

  moveBigfoot(0, 0);
  video.play().catch(() => {});
  requestAnimationFrame(tick);
</script>
</body>
</html>
