import * as THREE from "three";
import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";
import { EXRLoader } from "three/addons/loaders/EXRLoader.js";

const pickedAssetMap = new Map();
let pickedAssetUrlsToRevoke = [];

function normalizeAssetName(url){
  if(!url) return "";
  const noQuery = String(url).split("?")[0];
  const parts = noQuery.split("/");
  const last = parts[parts.length - 1] || "";
  return decodeURIComponent(last).toLowerCase();
}

function clearPickedAssets(){
  for(const u of pickedAssetUrlsToRevoke){
    try{ URL.revokeObjectURL(u); }catch(e){}
  }
  pickedAssetUrlsToRevoke = [];
  pickedAssetMap.clear();
}

function setPickedFolderFiles(files){
  clearPickedAssets();
  for(const file of files){
    const name = String(file.name || "").toLowerCase();
    if(!name) continue;
    const url = URL.createObjectURL(file);
    pickedAssetUrlsToRevoke.push(url);
    if(!pickedAssetMap.has(name)) pickedAssetMap.set(name, url);
  }
}

function resolveAssetUrl(url){
  if(!pickedAssetMap.size) return url;
  const name = normalizeAssetName(url);
  if(!name) return url;
  return pickedAssetMap.get(name) || url;
}

window.addEventListener("beforeunload", clearPickedAssets);

const _origTextureLoad = THREE.TextureLoader.prototype.load;
THREE.TextureLoader.prototype.load = function(url, onLoad, onProgress, onError){
  return _origTextureLoad.call(this, resolveAssetUrl(url), onLoad, onProgress, onError);
};

await new Promise((resolve)=>{
  const btn = document.getElementById("btnPickFolder");
  const input = document.getElementById("folderInput");
  if(!btn || !input){ resolve(); return; }
  const choose = ()=>{
    input.value = "";
    input.click();
  };
  btn.addEventListener("click", choose);
  input.addEventListener("change", (e)=>{
    const files = Array.from((e && e.target && e.target.files) ? e.target.files : []);
    if(!files.length){
      btn.textContent = "Load TRUCK PAD FOLDER";
      return;
    }
    setPickedFolderFiles(files);
    btn.style.display = "none";
    resolve();
  });
});

/* =========================================================
   ✨ HIT PARTICLES (SAFE)
   - Tiny sparkle burst on hits (target cube + bad guy)
   - Very lightweight: THREE.Points, short lifetime, fades out
   ========================================================= */
const HIT_PARTICLES_ENABLE = true;
const HIT_PARTICLE_COUNT   = 22;   // 12–40
const HIT_PARTICLE_LIFE    = 0.35; // seconds
const HIT_PARTICLE_SPEED   = 6.5;  // world units/sec
const HIT_PARTICLE_SIZE    = 10.0; // pixels (PointsMaterial.size)

const hitBursts = []; // { points, vels: Float32Array, life, maxLife, baseOpacity }

function spawnHitBurst(worldPos, colorHex=0xffffff){
  if (!HIT_PARTICLES_ENABLE) return;

  const count = HIT_PARTICLE_COUNT;
  const positions = new Float32Array(count * 3);
  const vels      = new Float32Array(count * 3);

  // random burst in a small sphere
  for (let i=0; i<count; i++){
    const k = i*3;
    const theta = Math.random() * Math.PI * 2;
    const u = Math.random() * 2 - 1;          // -1..1
    const r = Math.cbrt(Math.random()) * 0.22; // compact radius

    const s = Math.sqrt(1 - u*u);
    const dx = r * s * Math.cos(theta);
    const dy = r * u;
    const dz = r * s * Math.sin(theta);

    positions[k+0] = worldPos.x + dx;
    positions[k+1] = worldPos.y + dy;
    positions[k+2] = worldPos.z + dz;

    // velocity direction (normalized) * speed with a bit of upward bias
    const vx = dx;
    const vy = dy + 0.35;
    const vz = dz;
    const len = Math.max(0.0001, Math.hypot(vx, vy, vz));
    const sp = HIT_PARTICLE_SPEED * (0.45 + Math.random()*0.75);

    vels[k+0] = (vx/len) * sp;
    vels[k+1] = (vy/len) * sp;
    vels[k+2] = (vz/len) * sp;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

  const mat = new THREE.PointsMaterial({
    color: colorHex,
    size: HIT_PARTICLE_SIZE,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.95,
    depthWrite: false
  });

  const pts = new THREE.Points(geo, mat);
  pts.renderOrder = 998; // above most things, below truck draw-on-top
  scene.add(pts);

  hitBursts.push({
    points: pts,
    vels,
    life: HIT_PARTICLE_LIFE,
    maxLife: HIT_PARTICLE_LIFE,
    baseOpacity: mat.opacity
  });
}

function updateHitBursts(dt){

  if (!HIT_PARTICLES_ENABLE) return;
  for (let i = hitBursts.length - 1; i >= 0; i--){
    const b = hitBursts[i];
    b.life -= dt;

    const geo = b.points.geometry;
    const pos = geo.attributes.position;
    const a = pos.array;

    // simple movement + tiny gravity
    for (let j=0; j<a.length; j+=3){
      b.vels[j+1] -= 12.0 * dt; // gravity
      a[j+0] += b.vels[j+0] * dt;
      a[j+1] += b.vels[j+1] * dt;
      a[j+2] += b.vels[j+2] * dt;
    }
    pos.needsUpdate = true;

    // fade out
    const t = Math.max(0, b.life / b.maxLife);
    b.points.material.opacity = b.baseOpacity * t;

    if (b.life <= 0){
      scene.remove(b.points);
      b.points.geometry.dispose();
      b.points.material.dispose();
      hitBursts.splice(i, 1);
    }
  }
}

function randRange(a,b){ return a + Math.random()*(b-a); }
function targetsForWave(){
  return Math.min(TARGET_MAX_COUNT, TARGET_BASE_COUNT + (waveNum - 1) * TARGET_PER_WAVE);
}

function isFarEnough(x,z, pts, minSep){
  for (const p of pts){
    const dx = x - p.x, dz = z - p.z;
    if ((dx*dx + dz*dz) < (minSep*minSep)) return false;
  }
  return true;
}

function createTargets(){
  if (!TARGET_ENABLE) return;

  // pick candidate XZ points
  const spawn = {x: 0, z: 0};
  const pts = [];
  let tries = 0;
  const desiredCount = targetsForWave();

  while (pts.length < desiredCount && tries < 800){
    tries++;
    const effectiveRadius = Math.min(160, TARGET_SPAWN_RADIUS + (waveNum - 1) * 6);
    const x = randRange(-effectiveRadius, effectiveRadius);
    const z = randRange(-effectiveRadius, effectiveRadius);

    // keep away from spawn
    const dx = x - spawn.x, dz = z - spawn.z;
    if ((dx*dx + dz*dz) < (TARGET_MIN_DISTANCE*TARGET_MIN_DISTANCE)) continue;

    // keep targets from stacking
    if (!isFarEnough(x,z, pts, TARGET_MIN_SEPARATION)) continue;

    pts.push({x,z});
  }

  // build cubes
  const geo = new THREE.BoxGeometry(TARGET_SIZE, TARGET_SIZE, TARGET_SIZE);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xff3333,
    roughness: 0.7,
    metalness: 0.0,
    emissive: 0x000000,
    emissiveIntensity: 0.0
  });

  for (const p of pts){
    const y = heightAtWorldXZ(p.x, p.z) + (TARGET_SIZE * 0.5);
    const m = new THREE.Mesh(geo, mat.clone());
    m.position.set(p.x, y, p.z);
    m.castShadow = true;
    m.receiveShadow = true;
    scene.add(m);
    targets.push({ mesh: m, box: new THREE.Box3().setFromObject(m) });
  }

  targetsRemaining = targets.length;

  hudLine(`🌊 Wave: <code id="waveNum">${waveNum}</code> &nbsp; | &nbsp; Targets: <code id="targetsLeft">${targetsRemaining}</code> (clear them all!)`);
  hudLine(`📈 Targets grow each wave: <code>${TARGET_BASE_COUNT}</code> + <code>${TARGET_PER_WAVE}</code>/wave (max <code>${TARGET_MAX_COUNT}</code>)`);
    if (targetsRemaining < desiredCount){
        hudLine(`⚠️ Only spawned <code>${targetsRemaining}</code> of <code>${desiredCount}</code> targets (terrain constraints).`);
  }
}

function updateTargets(dt){
  // targets are static in X/Z; just keep their AABBs fresh for hit tests
  for (const t of targets){
    if (!t || !t.mesh) continue;
    t.box.setFromObject(t.mesh);
  }
  // flash decay (applies to recently hit target via emissive)
  if (targetFlashT > 0){
    targetFlashT = Math.max(0, targetFlashT - dt);
  }
}


function setWaveHUD(){
  const el = document.getElementById("waveNum");
  if (el) el.textContent = String(waveNum);
}

function clearTargets(){
  for (const t of targets){
    if (!t || !t.mesh) continue;
    scene.remove(t.mesh);
    if (t.mesh.material) t.mesh.material.dispose();
  }
  targets.length = 0;
  targetsRemaining = 0;
  setTargetsLeftHUD();
}


function resetCurrentWave(){
  hideBanner();
  clearTargets();
  createTargets();
  setWaveHUD();
  hudLine(`🔁 Wave reset! (<code>${targetsRemaining}</code> targets)`);
}

function startNextWave(){
  hideBanner();
  hideBanner();
  if (!WAVES_ENABLE) return;
  clearTargets();
  waveNum++;
  createTargets();
  setWaveHUD();
  hudLine(`✅ New wave spawned! (<code>${targetsRemaining}</code> targets)`);
}

function setTargetsLeftHUD(){
  const el = document.getElementById("targetsLeft");
  if (el) el.textContent = String(targetsRemaining);
}

let areaClearedBanner = null;

function winIfDone(){
  if (targetsRemaining === 0){
    showBanner(`🏁 <b>AREA CLEARED!</b> 🎉 &nbsp; ➡️ Press <code>R</code> for next wave (next: <b>${Math.min(TARGET_MAX_COUNT, TARGET_BASE_COUNT + (waveNum) * TARGET_PER_WAVE)}</b> targets)`);
    if (WAVES_ENABLE && WAVES_AUTO_NEXT){
      nextWaveT = WAVES_AUTO_DELAY;
    }
  }
}

function registerTargetHit(targetIndex){
  const t = targets[targetIndex];
  if (!t) return;

  // flash (quick)
  t.mesh.material.emissive.setHex(0xffffff);
  t.mesh.material.emissiveIntensity = 0.9;
  targetFlashT = 0.10;

  // remove from scene
  scene.remove(t.mesh);
  // keep it simple: dispose unique mat, shared geo is fine
  t.mesh.material.dispose();

  targets.splice(targetIndex, 1);
  targetsRemaining = targets.length;
  setTargetsLeftHUD();
  winIfDone();
}

// ---------- LOADERS ----------
const texLoader = new THREE.TextureLoader();
const exrLoader = new EXRLoader();

function setRepeat(tex, rep){
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(rep, rep);
  tex.anisotropy = Math.min(12, renderer.capabilities.getMaxAnisotropy());
}

function loadTextureSafe(url, { colorSpace=null } = {}){
  return new Promise((resolve) => {
    texLoader.load(
      url,
      (tex) => { if (colorSpace) tex.colorSpace = colorSpace; resolve(tex); },
      undefined,
      () => resolve(null)
    );
  });
}

function loadEXRSafe(url){
  return new Promise((resolve) => {
    exrLoader.load(resolveAssetUrl(url), (tex)=>resolve(tex), undefined, ()=>resolve(null));
  });
}

/* =========================================================
   TERRAIN STATE (heightmap pixels + sampler)
   ========================================================= */
let terrainReady = false;
let hmW = 0, hmH = 0;
let hmData = null;

// ===== Tall grass height controller pixels (dg_disp.png) =====
let dgW = 0, dgH = 0;
let dgData = null;

// Load dg_disp.png into pixel data (DATA texture: no sRGB)
async function loadDispPixels(){
  const url = TEX_DIR + GRASS_CARD_HEIGHT_FILE;
  const tex = await loadTextureSafe(url);
  if (!tex || !tex.image){
    hudLine(`⚠️ Tall grass: missing <code>${GRASS_CARD_HEIGHT_FILE}</code> (expected <code>${url}</code>)`);
    return false;
  }

  const img = tex.image;
  dgW = img.width; dgH = img.height;

  const c = document.createElement("canvas");
  c.width = dgW; c.height = dgH;
  const ctx = c.getContext("2d", { willReadFrequently:true });
  ctx.drawImage(img, 0, 0);
  dgData = ctx.getImageData(0, 0, dgW, dgH).data;

  hudLine(`✅ Tall grass height map loaded: <code>${GRASS_CARD_HEIGHT_FILE}</code> (${dgW}×${dgH})`);
  return true;
}

// Sample dg_disp at world XZ -> [0..1] brightness (red channel)
function dispAtWorldXZ(x, z){
  if (!dgData) return 0.5;

  let u = (x / GROUND_SIZE) + 0.5;
  let v = (-z / GROUND_SIZE) + 0.5;

  // Clamp (keeps us safe when you walk near edges)
  u = clamp01(u);
  v = clamp01(v);

  const px = Math.floor(u * (dgW - 1));
  const py = Math.floor((1 - v) * (dgH - 1));
  const idx = (py * dgW + px) * 4;

  return dgData[idx] / 255;
}

function clamp01(t){ return Math.max(0, Math.min(1, t)); }

// Bilinear height sample
function heightAtWorldXZ(x, z){
  if (!terrainReady || !hmData) return 0;

  let u = (x / GROUND_SIZE) + 0.5;
  let v = (-z / GROUND_SIZE) + 0.5;

  if (CLAMP_OUTSIDE_TERRAIN) {
    u = clamp01(u);
    v = clamp01(v);
  } else {
    if (u < 0 || u > 1 || v < 0 || v > 1) return 0;
  }

  const fx = u * (hmW - 1);
  const fy = (1 - v) * (hmH - 1);

  const x0 = Math.floor(fx), y0 = Math.floor(fy);
  const x1 = Math.min(hmW - 1, x0 + 1);
  const y1 = Math.min(hmH - 1, y0 + 1);

  const tx = fx - x0;
  const ty = fy - y0;

  function rAt(px, py){
    const idx = (py * hmW + px) * 4;
    return hmData[idx];
  }

  const h00 = rAt(x0, y0) / 255;
  const h10 = rAt(x1, y0) / 255;
  const h01 = rAt(x0, y1) / 255;
  const h11 = rAt(x1, y1) / 255;

  const h0 = h00 * (1 - tx) + h10 * tx;
  const h1 = h01 * (1 - tx) + h11 * tx;
  const h  = h0 * (1 - ty) + h1 * ty;

  return h * TERRAIN_HEIGHT;
}

/* =========================================================
   LAKE (STEP L1) — simple, safe water plane (low BSOD risk)
   ========================================================= */

const LAKE_ENABLE = true;
const LAKE_SIZE = 2200;      // bigger so you can't miss it      // width/length of lake plane (world units)

// Lake placement:
// "VALLEY" = find lowest spot within a radius around LAKE_CENTER_XZ (recommended)
// "FIXED"  = place lake at LAKE_CENTER_XZ with Y set from terrain at that point + offset
const LAKE_PLACEMENT_MODE = "VALLEY"; // "VALLEY" or "FIXED"
const LAKE_CENTER_X = 0;             // move lake left/right
const LAKE_CENTER_Z = -650;          // move lake forward/back (negative is "straight ahead" at start)
const LAKE_Y_OFFSET = 8.64;          // +20% lake upper surface elevation from 7.2
const LAKE_EDGE_FADE = 0.35; // 0–1 (visual softness via opacity only)

// --- Shoreline grounding (painterly edge control) ---
const SHORELINE_ENABLE = true;
const SHORELINE_WIDTH_UV = 0.13;   // 0.06–0.20 (smaller = thinner dark rim)
const SHORELINE_SOFT_UV  = 0.08;   // softness of the rim falloff
const SHORELINE_DARK     = 0.58;   // multiplier at the very edge (0.45–0.75)
const LAKE_RIPPLE_ENABLE = true;
const LAKE_RIPPLE_AMP = 0.35;    // ripple height in world units (keep small!)    // ripple height in world units (keep small!)
const LAKE_RIPPLE_SPEED = 0.45;  // animation speed  // animation speed
const LAKE_RIPPLE_SCALE = 0.020; // wave frequency (smaller = larger waves)
let lakeMesh = null;
let elevationZones = null;
let highZoneOverlayMesh = null;

// ----- Collision (Step 1: lake blocker) -----
let lastSafePos = new THREE.Vector3(0, 0, 0);
let lastSafeInit = false;
let prevPos = new THREE.Vector3(0, 0, 0);
const LAKE_BLOCK_ENABLE = false;
const LAKE_BLOCK_MARGIN = 18; // shoreline buffer (world units)

// Pick a sensible lake height after terrain is ready:
// sample heights in a valley-ish area near the origin and set water slightly above the local minimum.
function pickLakeY(cx, cz){
  // If terrain isn't ready yet, fall back
  if (!terrainReady) return 40;

  const R = 650;     // sampling radius around (cx,cz)
  const STEP = 85;   // sampling step
  let minH = Infinity;

  for (let x = -R; x <= R; x += STEP){
    for (let z = -R; z <= R; z += STEP){
      const h = heightAtWorldXZ(cx + x, cz + z);
      if (h < minH) minH = h;
    }
  }

  // Put lake slightly above the local min so it sits "in the valley"
  let y = minH + LAKE_Y_OFFSET;

  // Clamp to a reasonable range so it can't end up absurdly low/high
  y = Math.max(5, Math.min(y, TERRAIN_HEIGHT * 0.65));
  return y;
}

function buildElevationZones(lakeSurfaceY){
  const lakeTop = THREE.MathUtils.clamp(lakeSurfaceY, 0, TERRAIN_HEIGHT);
  const zoneSpan = Math.max(0, TERRAIN_HEIGHT - lakeTop);
  const zoneStep = zoneSpan / 3;

  elevationZones = {
    lake:   { min: 0, max: lakeTop },
    low:    { min: lakeTop, max: lakeTop + zoneStep },
    medium: { min: lakeTop + zoneStep, max: lakeTop + (zoneStep * 2) },
    high:   { min: lakeTop + (zoneStep * 2), max: TERRAIN_HEIGHT }
  };

  return elevationZones;
}

function clearHighZoneOverlay(){
  if (!highZoneOverlayMesh) return;
  scene.remove(highZoneOverlayMesh);
  if (highZoneOverlayMesh.geometry) highZoneOverlayMesh.geometry.dispose();
  if (highZoneOverlayMesh.material) highZoneOverlayMesh.material.dispose();
  highZoneOverlayMesh = null;
}

async function createHighZoneOverlay(){
  if (!HIGH_ZONE_OVERLAY_ENABLE || !terrainReady) return;
  if (!elevationZones || !elevationZones.high) return;

  const highZoneTexUrl = HIGH_ZONE_TEX_EMBEDDED_ENABLE ? HIGH_ZONE_TEX_EMBEDDED : (TEX_DIR + HIGH_ZONE_TEX_FILE);
  const tex = await loadTextureSafe(highZoneTexUrl, { colorSpace: THREE.SRGBColorSpace });
  if (!tex){
    hudLine(`⚠️ Missing high-zone texture: <code>${HIGH_ZONE_TEX_FILE}</code>`);
    return;
  }
  setRepeat(tex, HIGH_ZONE_TEX_REPEAT);

  clearHighZoneOverlay();

  const zoneMin = elevationZones.lake.max + ((TERRAIN_HEIGHT - elevationZones.lake.max) * HIGH_ZONE_START_FRAC_ABOVE_LAKE);
  const geo = ground.geometry.clone();
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++){
    const y = pos.getY(i);
    if (y >= zoneMin){
      pos.setY(i, y + HIGH_ZONE_OVERLAY_Y_OFFSET);
    } else {
      pos.setY(i, y - HIGH_ZONE_OVERLAY_BURY_DEPTH);
    }
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    map: tex,
    color: HIGH_ZONE_OVERLAY_TINT,
    emissive: HIGH_ZONE_OVERLAY_EMISSIVE,
    emissiveIntensity: 0.35,
    roughness: 1.0,
    metalness: 0.0
  });

  highZoneOverlayMesh = new THREE.Mesh(geo, mat);
  highZoneOverlayMesh.castShadow = false;
  highZoneOverlayMesh.receiveShadow = true;
  scene.add(highZoneOverlayMesh);

  hudLine(
    `🪨 High-zone overlay OBVIOUS: <code>${HIGH_ZONE_TEX_FILE}</code> from y=<code>${zoneMin.toFixed(1)}</code> to <code>${TERRAIN_HEIGHT.toFixed(1)}</code>.`
  );
}


function updateLakeRipples(time){
  if (!LAKE_RIPPLE_ENABLE || !lakeMesh) return;
  const geo = lakeMesh.geometry;
  const base = geo.userData.basePositions;
  if (!base) return;

  const pos = geo.attributes.position;
  const a = pos.array;

  const t = time * LAKE_RIPPLE_SPEED;
  const amp = LAKE_RIPPLE_AMP;
  const s = LAKE_RIPPLE_SCALE;

  // Very subtle 2-wave sum. We only move Y, keep X/Z same.
  for (let i = 0; i < a.length; i += 3){
    const x = base[i + 0];
    const y0 = base[i + 1];
    const z = base[i + 2];

    const w1 = Math.sin((x * s) + (t));
    const w2 = Math.sin((z * s * 1.15) + (t * 1.3));
    a[i + 1] = y0 + (w1 + w2) * 0.5 * amp;
  }

  pos.needsUpdate = true;
  // Keep normals as-is (ripples are tiny). If you ever increase AMP a lot, recompute normals occasionally.
}

function createLake(){
  if (!LAKE_ENABLE) return;

  // Remove old lake if re-created
  if (lakeMesh){
    scene.remove(lakeMesh);
    lakeMesh.geometry.dispose();
    // material may be shared; ignore dispose for safety
    lakeMesh = null;
  }

  const cx = LAKE_CENTER_X;
  const cz = LAKE_CENTER_Z;

  const lakeY = (LAKE_PLACEMENT_MODE === "FIXED")
    ? (heightAtWorldXZ(cx, cz) + LAKE_Y_OFFSET)
    : pickLakeY(cx, cz);
  const zones = buildElevationZones(lakeY);

  const geo = new THREE.PlaneGeometry(LAKE_SIZE, LAKE_SIZE, 80, 80); // enough verts for subtle ripples
  geo.rotateX(-Math.PI/2);

  // Store original positions for ripple animation
  const pos = geo.attributes.position;
  const base = new Float32Array(pos.array.length);
  base.set(pos.array);
  geo.userData.basePositions = base;
const mat = new THREE.MeshStandardMaterial({
    color: 0x193652,
    transparent: true,
    opacity: 0.82,
    roughness: 0.25,
    metalness: 0.0
  });
  // Reduce z-fighting where terrain touches water
  mat.polygonOffset = true;
  mat.polygonOffsetFactor = -1;
  mat.polygonOffsetUnits = -1;


  lakeMesh = new THREE.Mesh(geo, mat);
  lakeMesh.position.set(cx, lakeY, cz);
  lakeMesh.receiveShadow = false;
  lakeMesh.castShadow = false;

  // A tiny tilt prevents z-fighting if the terrain touches the waterline
  lakeMesh.rotation.y = 0.15;

  scene.add(lakeMesh);
  console.log("LAKE: created at", {x:cx, y:lakeY, z:cz, size:LAKE_SIZE});
  hudLine(`🏞️ LAKE ON (shoreline shader OFF): x=<code>${cx.toFixed(0)}</code> z=<code>${cz.toFixed(0)}</code> y=<code>${lakeY.toFixed(1)}</code> size=<code>${LAKE_SIZE}</code>`);
  hudLine(
    `🧭 Elevation zones — ` +
    `Lake: <code>${zones.lake.min.toFixed(1)}-${zones.lake.max.toFixed(1)}</code>, ` +
    `Low: <code>${zones.low.min.toFixed(1)}-${zones.low.max.toFixed(1)}</code>, ` +
    `Medium: <code>${zones.medium.min.toFixed(1)}-${zones.medium.max.toFixed(1)}</code>, ` +
    `High: <code>${zones.high.min.toFixed(1)}-${zones.high.max.toFixed(1)}</code>`
  );
}



async function applyHeightmapToGround(){
  if (!USE_TERRAIN){
    hudLine("ℹ️ Terrain disabled (USE_TERRAIN=false).");
    terrainReady = false;
    return;
  }

  const hmUrl = TEX_DIR + HEIGHTMAP_FILE;

  // Heightmap is DATA (no sRGB)
  const hmTex = await loadTextureSafe(hmUrl);
  if (!hmTex || !hmTex.image){
    hudLine(`❌ Heightmap missing: <code>${HEIGHTMAP_FILE}</code>`);
    terrainReady = false;
    return;
  }

  const img = hmTex.image;
  hmW = img.width;
  hmH = img.height;

  const canvas = document.createElement("canvas");
  canvas.width = hmW;
  canvas.height = hmH;
  const ctx = canvas.getContext("2d", { willReadFrequently:true });
  ctx.drawImage(img, 0, 0);
  hmData = ctx.getImageData(0, 0, hmW, hmH).data;

  const pos = ground.geometry.attributes.position;
  const uv  = ground.geometry.attributes.uv;

  for (let i = 0; i < pos.count; i++){
    const u = uv.getX(i);
    const v = uv.getY(i);

    const x = Math.floor(u * (hmW - 1));
    const y = Math.floor((1 - v) * (hmH - 1));
    const idx = (y * hmW + x) * 4;

    const r = hmData[idx];
    pos.setY(i, (r / 255) * TERRAIN_HEIGHT);
  }

  pos.needsUpdate = true;
  ground.geometry.computeVertexNormals();

  terrainReady = true;
  hudLine(`✅ Terrain applied: <code>${HEIGHTMAP_FILE}</code> (${hmW}×${hmH}), segments=${TERRAIN_SEGMENTS}, height=${TERRAIN_HEIGHT}`);


  // STEP L1: create lake once terrain is ready
  createLake();
  await createHighZoneOverlay();

  // STEP TG1: create tall grass blades once terrain is ready
  createTallGrass();
  createTargets();
  spawnBadGuy();
  spawnBadGuy();
  // snap player to terrain
  const p = controls.getObject().position;
  p.y = heightAtWorldXZ(p.x, p.z) + PLAYER_EYE_HEIGHT;
  placeBuffNearPickupSpawn(p.x, p.z);
  await createLakeZoneBushes();
  await createLowZoneTrees();

async function placeBuffNearPickupSpawn(spawnX, spawnZ){
  if (!BUFF_MARKER_ENABLE){
    while (buffNearPickupSprites.length){
      const m = buffNearPickupSprites.pop();
      scene.remove(m);
      if (m.geometry) m.geometry.dispose();
      if (m.material) m.material.dispose();
    }
    return;
  }
  if (!terrainReady) return;
  if (!Number.isFinite(spawnX) || !Number.isFinite(spawnZ)) return;

  const tex = await loadTextureSafe(TEX_DIR + BUFF_MARKER_FILE, { colorSpace: THREE.SRGBColorSpace });
  if (!tex){
    hudLine(`⚠️ Missing marker texture: <code>${BUFF_MARKER_FILE}</code>`);
    return;
  }
  tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());

  while (buffNearPickupSprites.length){
    const m = buffNearPickupSprites.pop();
    scene.remove(m);
    if (m.geometry) m.geometry.dispose();
    if (m.material) m.material.dispose();
  }

  let placed = 0;
  for (const off of BUFF_MARKER_OFFSETS){
    const x = spawnX + off.x;
    const z = spawnZ + off.z;
    const y = heightAtWorldXZ(x, z);

    const mat = new THREE.MeshBasicMaterial({
      map: tex,
      transparent: true,
      alphaTest: 0.18,
      opacity: 1.0,
      side: THREE.DoubleSide,
      fog: false,
      depthWrite: false,
      depthTest: true
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(BUFF_MARKER_SIZE.w, BUFF_MARKER_SIZE.h), mat);
    mesh.position.set(x, y + (BUFF_MARKER_SIZE.h * 0.5) + BUFF_MARKER_LIFT, z);
    mesh.castShadow = false;
    mesh.receiveShadow = false;
    mesh.frustumCulled = false;
    mesh.renderOrder = 1246;
    scene.add(mesh);
    buffNearPickupSprites.push(mesh);

  }
  hudLine(`✅ Placed <code>${BUFF_MARKER_FILE}</code> near spawn: <code>${placed}</code> anchors at y-lift <code>${BUFF_MARKER_LIFT}</code>.`);
}

    placed++;
  }

  // Remove exactly one middle-zone tree7 near spawn to avoid a dominant near-field outlier.
  if (midTree7Sprites.length){
    const spawn = controls.getObject().position;
    let removeIdx = 0;
    let bestD2 = Infinity;
    for (let i = 0; i < midTree7Sprites.length; i++){
      const m = midTree7Sprites[i];
      const dx = m.position.x - spawn.x;

/* =========================================================
   🚚 TRUCK AVATAR (Phase 1, SAFE)
   - Uses MeshBasicMaterial (no shader patches)
   - No UV assumptions beyond default PlaneGeometry
   - If pickup.png missing, we just skip the avatar (no crashes)
   ========================================================= */
let truckPlane = null;
let truckShadowProxy = null;
let truckTex = null;
let truckTurnInput = 0;
let truckTurnSway = 0;
let truckTerrainPitch = 0;
let truckTerrainRoll = 0;
let truckElevationOffset = 0;
let truckMoveBlend = 0;

// ----- Truck audio state -----
let truckAudio = null;
let truckSoundPlaying = false;
let truckIdleAudio = null;
let truckIdleSoundPlaying = false;
const buffNearPickupSprites = [];
const lakeBushSprites = [];
let lakeBushGeo = null;
let lakeBushMat = null;
const lowTreeSprites = [];
let lowTreeGeo = null;
let lowTreeMat = null;
const lowTree3Sprites = [];
let lowTree3Geo = null;
let lowTree3Mat = null;
const midTree7Sprites = [];
let midTree7Geo = null;
let midTree7Mat = null;

function initTruckAvatar(){
  if(!TRUCK_AVATAR_ENABLE) return;

  const url = TEX_DIR + TRUCK_FILE + "?v=" + Date.now();

  truckTex = new THREE.TextureLoader().load(
    url,
    tex=>{
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());

      // Keep correct aspect ratio
      const imgW = tex.image?.width || 1024;
      const imgH = tex.image?.height || 512;
      const aspect = imgW / Math.max(1, imgH);

      // Use TRUCK_H as the "master" scale so you can think in height.
      const h = TRUCK_H;
      const w = TRUCK_W || (h * aspect);

      let mat;

      if (TRUCK_CHROMAKEY_ENABLE){
        // Chroma-key near-white background out (for non-transparent PNGs)
        const key = TRUCK_KEY_COLOR;
        mat = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          depthTest: !TRUCK_DRAW_ON_TOP ? true : false,
          uniforms: {
            map: { value: tex },
            keyColor: { value: new THREE.Vector3(key.r, key.g, key.b) },
            tol: { value: TRUCK_KEY_TOL },
            soft: { value: TRUCK_KEY_SOFT }
          },
          vertexShader: `
            varying vec2 vUv;
            void main(){
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform sampler2D map;
            uniform vec3 keyColor;
            uniform float tol;
            uniform float soft;
            varying vec2 vUv;

            void main(){
              vec4 c = texture2D(map, vUv);

              // Distance from key color (white). Larger = less like white.
              float d = distance(c.rgb, keyColor);

              // alpha: 0 near white, 1 away from white
              float a = smoothstep(tol, tol + soft, d);

              // Also respect any existing alpha in the PNG
              a *= c.a;

              if (a < 0.01) discard;
              gl_FragColor = vec4(c.rgb, a);
            }
          `
        });
      } else {
        // Normal transparent PNG path
        mat = new THREE.MeshBasicMaterial({
          map: tex,
          transparent: true,
          alphaTest: 0.5,
          side: THREE.DoubleSide,
          depthWrite: false,
          depthTest: !TRUCK_DRAW_ON_TOP ? true : false
        });
      }

      truckPlane = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
      truckPlane.renderOrder = TRUCK_DRAW_ON_TOP ? 999 : 10;
      truckPlane.frustumCulled = false; // never pop out in low terrain pockets
      truckPlane.castShadow = false;
      truckPlane.receiveShadow = false;
      if (truckPlane.material){
        truckPlane.material.depthTest = false;
        truckPlane.material.depthWrite = false;
        truckPlane.material.needsUpdate = true;
      }
      scene.add(truckPlane);

      // Shadow proxy (invisible) so the truck still "casts" a terrain shadow
      const proxyMat = new THREE.MeshStandardMaterial({ color: 0x000000, transparent:true, opacity:0.0 });
      truckShadowProxy = new THREE.Mesh(new THREE.BoxGeometry(w*0.55, h*0.55, w*0.9), proxyMat);
      truckShadowProxy.castShadow = true;
      truckShadowProxy.receiveShadow = false;
      scene.add(truckShadowProxy);

      hudLine(`✅ Loaded truck avatar: <code>${TRUCK_FILE}</code> (expected in <code>${TEX_DIR}${TRUCK_FILE}</code>)`);
      if (TRUCK_CHROMAKEY_ENABLE) hudLine(`🎨 Truck chroma-key: ON (keys out near-white background)`);
      if (TRUCK_DRAW_ON_TOP) hudLine(`🧪 Truck draw-on-top: ON (debug mode; set TRUCK_DRAW_ON_TOP=false later)`);
    },
    undefined,
    err=>{
      console.error("Truck avatar failed to load:", url, err);
      hudLine(`❌ Truck avatar failed to load: <code>${TRUCK_FILE}</code> (expected <code>${url}</code>)`);
    }
  );
}

function updateTruckAvatar(dt=0.016){
  if(!truckPlane) return;

  const camObj = controls.getObject(); // the camera
  const yaw = truckYaw;

  // Position in front of camera (like a hood / avatar view)
  const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();

  // Keep pickup visible in deep dips: if terrain between camera and truck blocks view,
  // progressively pull the truck closer until line-of-sight clears.
  let dist = TRUCK_FWD;
  let x = camObj.position.x + fwd.x * dist + right.x * TRUCK_SIDE;
  let z = camObj.position.z + fwd.z * dist + right.z * TRUCK_SIDE;
  for(let iter=0; iter<5; iter++){
    const truckGroundY = heightAtWorldXZ(x, z);
    const truckSightY = truckGroundY + (TRUCK_H * 0.42);
    let blocked = false;
    for(let i=1; i<=6; i++){
      const t = i / 7;
      const sx = camObj.position.x + (x - camObj.position.x) * t;
      const sz = camObj.position.z + (z - camObj.position.z) * t;
      const terrainY = heightAtWorldXZ(sx, sz);
      const sightY = camObj.position.y + (truckSightY - camObj.position.y) * t;
      if(terrainY > sightY - 0.10){
        blocked = true;
        break;
      }
    }
    if(!blocked) break;
    dist = Math.max(TRUCK_FWD * 0.48, dist * 0.84);
    x = camObj.position.x + fwd.x * dist + right.x * TRUCK_SIDE;
    z = camObj.position.z + fwd.z * dist + right.z * TRUCK_SIDE;
  }

  // Use center terrain sample for visual contact; max-sample caused visible hovering.
  let baseY = heightAtWorldXZ(x, z);
  if(!Number.isFinite(baseY)) baseY = 0;
  const elev01 = THREE.MathUtils.clamp(baseY / Math.max(1, TERRAIN_HEIGHT), 0, 1);
  const elevSigned = (0.5 - elev01) * 2;
  const targetElevationOffset = (elevSigned < 0)
    ? elevSigned * TRUCK_ELEVATION_ADAPT_MAX * 1.10 // high elevation: +10% compensation
    : elevSigned * TRUCK_ELEVATION_ADAPT_MAX * TRUCK_LOW_ELEV_LIFT_SCALE;
  const ke = Math.min(1, Math.max(0, TRUCK_ELEVATION_ADAPT_SMOOTH * dt));
  truckElevationOffset += (targetElevationOffset - truckElevationOffset) * ke;
  const baseTruckY = baseY + (TRUCK_H * 0.5) + TRUCK_SURFACE_LIFT - TRUCK_GROUND_SINK - TRUCK_VISUAL_DROP + truckElevationOffset;

  // Terrain tilt: sample local gradient and project onto truck forward/right.
  const eps = Math.max(1.5, TRUCK_W * 0.8);
  const hxp = heightAtWorldXZ(x + eps, z);
  const hxm = heightAtWorldXZ(x - eps, z);
  const hzp = heightAtWorldXZ(x, z + eps);
  const hzm = heightAtWorldXZ(x, z - eps);
  const dhdx = (hxp - hxm) / (2 * eps);
  const dhdz = (hzp - hzm) / (2 * eps);
  const slopeFwd = (dhdx * fwd.x) + (dhdz * fwd.z);
  const slopeRight = (dhdx * right.x) + (dhdz * right.z);
  const maxTilt = THREE.MathUtils.degToRad(TRUCK_TERRAIN_TILT_MAX_DEG);
  const targetPitch = THREE.MathUtils.clamp(Math.atan(slopeFwd), -maxTilt, maxTilt);
  const targetRollFromTerrain = THREE.MathUtils.clamp(Math.atan(slopeRight), -maxTilt, maxTilt);
  const kt = Math.min(1, Math.max(0, TRUCK_TERRAIN_TILT_SMOOTH * dt));
  truckTerrainPitch += (targetPitch - truckTerrainPitch) * kt;
  truckTerrainRoll += (targetRollFromTerrain - truckTerrainRoll) * kt;

  const targetSway = truckTurnInput * THREE.MathUtils.degToRad(TRUCK_TURN_SWAY_DEG);
  const k = Math.min(1, Math.max(0, TRUCK_TURN_SWAY_SMOOTH * dt));
  truckTurnSway += (targetSway - truckTurnSway) * k;

  const t = performance.now() * 0.001;
  const vibeScale = truckMoveBlend;
  const vibePosY =
    (
      Math.sin((t * TRUCK_VIBE_FREQ_HZ) * Math.PI * 2) +
      0.55 * Math.sin((t * TRUCK_VIBE_FREQ_HZ * 1.9) * Math.PI * 2 + 0.8)
    ) * TRUCK_VIBE_POS_AMP * vibeScale;
  const vibeFwd = Math.sin((t * TRUCK_VIBE_FREQ_HZ * 0.93) * Math.PI * 2 + 0.55) * TRUCK_VIBE_FWD_AMP * vibeScale;
  const vibeRoll = Math.sin((t * TRUCK_VIBE_FREQ_HZ * 1.11) * Math.PI * 2) * THREE.MathUtils.degToRad(TRUCK_VIBE_ROLL_DEG) * vibeScale;
  const vibePitch = Math.sin((t * TRUCK_VIBE_FREQ_HZ * 0.87) * Math.PI * 2) * THREE.MathUtils.degToRad(TRUCK_VIBE_PITCH_DEG) * vibeScale;

  truckPlane.position.set(x + (fwd.x * vibeFwd), baseTruckY + vibePosY, z + (fwd.z * vibeFwd));
  truckPlane.rotation.set(truckTerrainPitch + vibePitch, yaw, truckTerrainRoll + truckTurnSway + vibeRoll);

  if(truckShadowProxy){
    truckShadowProxy.position.set(x, baseY + (TRUCK_H*0.3), z);
    truckShadowProxy.rotation.set(0, yaw, 0);
  }
}


function initTruckAudio(){
  if (truckAudio && truckIdleAudio) return;

  const stamp = Date.now();
  const driveUrl = TEX_DIR + TRUCK_SOUND_FILE + "?v=" + stamp;
  const idleUrl = TEX_DIR + TRUCK_IDLE_SOUND_FILE + "?v=" + stamp;
  truckAudio = new Audio(resolveAssetUrl(driveUrl));
  truckAudio.loop = true;
  truckAudio.volume = TRUCK_SOUND_VOL;
  truckIdleAudio = new Audio(resolveAssetUrl(idleUrl));
  truckIdleAudio.loop = true;

/* =========================================================
   🌾 TALL GRASS (Option B: Instanced grass cards)
   - Adds vertical “blades” on top of the ground (real geometry)
   - dg_disp.png controls blade height (bright = taller)
   - SAFE defaults: no shadows casting, instanced mesh, alphaTest
   ========================================================= */
let tallGrassMesh = null;

async function createTallGrass(){
  if (!TALL_GRASS_ENABLE) return;

  // Wait for terrain so we can place blades on the ground
  const start = performance.now();
  while (!terrainReady && performance.now() - start < 4000){
    await new Promise(r => setTimeout(r, 50));
  }
  if (!terrainReady){
    hudLine("⚠️ Tall grass skipped: terrain not ready.");
    return;
  }

  // Load the height controller pixels (dg_disp.png)
  const ok = await loadDispPixels();
  if (!ok) return;

  // Load the blade texture (we reuse your grass color for now)
  const colorUrl = TEX_DIR + GRASS_CARD_COLOR_FILE;
  const bladeTex = await loadTextureSafe(colorUrl, { colorSpace: THREE.SRGBColorSpace });
  if (!bladeTex){
    hudLine(`⚠️ Tall grass: missing <code>${GRASS_CARD_COLOR_FILE}</code>`);
    return;
  }
  bladeTex.wrapS = bladeTex.wrapT = THREE.RepeatWrapping;
  bladeTex.repeat.set(1, 1);
  bladeTex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());

  // Blade geometry (unit height; we scale per instance)
  const bladeGeo = new THREE.PlaneGeometry(GRASS_CARD_W, 1.0);

  // Material: alphaTest avoids expensive sorting of transparent pixels.
  const bladeMat = new THREE.MeshStandardMaterial({
    map: bladeTex,
    transparent: true,
    alphaTest: GRASS_CARD_ALPHA,
    side: THREE.DoubleSide,
    roughness: 1.0,
    metalness: 0.0
  });

  // Remove old mesh if re-created
  if (tallGrassMesh){
    scene.remove(tallGrassMesh);
    tallGrassMesh.geometry.dispose();
    // material shares a texture; skip dispose for safety
    tallGrassMesh = null;
  }

  tallGrassMesh = new THREE.InstancedMesh(bladeGeo, bladeMat, GRASS_CARD_COUNT);
  tallGrassMesh.castShadow = false;     // keep SAFE
  tallGrassMesh.receiveShadow = true;
  tallGrassMesh.frustumCulled = true;
  scene.add(tallGrassMesh);

  const dummy = new THREE.Object3D();

  // Place blades in a disc around origin (start area)
  for (let i = 0; i < GRASS_CARD_COUNT; i++){
    const ang = Math.random() * Math.PI * 2;
    const rr  = Math.sqrt(Math.random()) * GRASS_CARD_AREA;
    const x = Math.cos(ang) * rr;
    const z = Math.sin(ang) * rr;

    // Height from your terrain + sink a hair
    const groundY = heightAtWorldXZ(x, z) - GRASS_CARD_GROUND_SINK;

    // dg_disp brightness -> blade height
    const d = dispAtWorldXZ(x, z); // 0..1
    const h = GRASS_CARD_MIN_H + d * (GRASS_CARD_MAX_H - GRASS_CARD_MIN_H);

    dummy.position.set(x, groundY + h * 0.5, z);

    // Random yaw for variety
    dummy.rotation.set(0, Math.random() * Math.PI, 0);

    // Scale Y = height, X = 1 (width already in geometry)
    dummy.scale.set(1, h, 1);

    dummy.updateMatrix();
    tallGrassMesh.setMatrixAt(i, dummy.matrix);
  }

  tallGrassMesh.instanceMatrix.needsUpdate = true;

  hudLine(`🌾 Tall grass ON: <code>${GRASS_CARD_COUNT}</code> cards · height via <code>${GRASS_CARD_HEIGHT_FILE}</code>`);
}

function mulberry32(seed){
  return function(){
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function mountainProfile(t, rngBase){
  // Some harmonics + a spike
  const a = Math.sin(t * Math.PI * 2 * 1.0 + rngBase()*3.0);
  const b = Math.sin(t * Math.PI * 2 * 2.2 + rngBase()*3.0) * 0.6;
  const c = Math.sin(t * Math.PI * 2 * 4.7 + rngBase()*3.0) * 0.35;
  const d = Math.sin(t * Math.PI * 2 * 9.3 + rngBase()*3.0) * 0.18;
  const spike = Math.pow(Math.max(0, Math.sin(t*2*Math.PI*3.0 + rngBase()*6.0)), 6.0) * 0.8;

  let v = (a*0.55 + b*0.35 + c*0.25 + d*0.20) * 0.5 + 0.55;
  v += spike * 0.35;
  v = Math.max(0, Math.min(1, v));
  v = Math.pow(v, 1.15 / Math.max(0.1, MOUNTAIN_RUGGEDNESS));
  return v;
}

function buildMountainRing({ radius, height, thickness, segments, color, opacity, seed, yBase }){
  const rngBase = mulberry32(seed);

  const inner = radius;
  const outer = radius + thickness;

  const verts = [];
  const indices = [];
  const stride = 4;

  for (let i = 0; i <= segments; i++){
    const t = i / segments;
    const ang = t * Math.PI * 2;

    const prof = mountainProfile(t, rngBase);
    const topY = yBase + prof * height;

    const cx = Math.cos(ang);
    const sz = Math.sin(ang);

    // inner bottom, inner top, outer top, outer bottom
    verts.push(inner*cx, yBase, inner*sz);
    verts.push(inner*cx, topY,  inner*sz);
    verts.push(outer*cx, topY*0.92, outer*sz);
    verts.push(outer*cx, yBase, outer*sz);
  }

  for (let i = 0; i < segments; i++){
    const a = i*stride;
    const b = a + stride;

    indices.push(a+0, a+1, b+1);
    indices.push(a+0, b+1, b+0);

    indices.push(a+1, a+2, b+2);
    indices.push(a+1, b+2, b+1);

    indices.push(a+3, b+2, a+2);
    indices.push(a+3, b+3, b+2);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  const mat = new THREE.MeshLambertMaterial({
    color,
    transparent: true,
    opacity,
    fog: true,          // keep fog now that fog is fixed
    depthWrite: false
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = -1;
  mesh.frustumCulled = false;
  return mesh;
}

function bindHold(btn, code){

// ----- Lake collision helpers -----
function isPointInLakeXZ(x, z){
  // XZ bounds only (used internally)
  if (!lakeMesh) return false;

  const cx = lakeMesh.position.x;
  const cz = lakeMesh.position.z;
  const half = (LAKE_SIZE * 0.5) - LAKE_BLOCK_MARGIN;

  return (Math.abs(x - cx) <= half) && (Math.abs(z - cz) <= half);
}

// True only if this XZ is actually WATER (terrain is below/near the water surface).
function isWaterAtXZ(x, z){
  if (!lakeMesh) return false;
  if (!isPointInLakeXZ(x, z)) return false;

  const waterY = lakeMesh.position.y;
  const groundY = heightAtWorldXZ(x, z);

  // If the ground is below (or just barely above) the water surface, treat it as water.
  // This prevents "infinite lake collider" when the square lake bounds overlap higher land.
  const WATER_TOL = 1.5; // how much land can stick up before it's considered "dry"
  return groundY <= (waterY + WATER_TOL);
}

function markSafePosition(obj){
  lastSafePos.copy(obj.position);
}

function applyLakeBlock(obj){
  if (!LAKE_BLOCK_ENABLE || !lakeMesh) return;

  if (!lastSafeInit){
    lastSafePos.copy(obj.position);
    lastSafeInit = true;
    return;
  }

  // If we're not in the lake, update safe pos and exit
  if (!isWaterAtXZ(obj.position.x, obj.position.z)){
    lastSafePos.copy(obj.position);
    return;
  }

  // --- Sliding collision (no jitter) ---
  // We entered the lake this frame. Try to "slide" by canceling only the axis that caused entry.
  const px = prevPos.x, pz = prevPos.z;
  const nx = obj.position.x, nz = obj.position.z;

  const tryX = { x: nx, z: pz }; // keep X move, cancel Z move
  const tryZ = { x: px, z: nz }; // keep Z move, cancel X move

  const okX = !isWaterAtXZ(tryX.x, tryX.z);
  const okZ = !isWaterAtXZ(tryZ.x, tryZ.z);

  if (okX && !okZ){
    obj.position.x = tryX.x;
    obj.position.z = tryX.z;
  } else if (okZ && !okX){
    obj.position.x = tryZ.x;
    obj.position.z = tryZ.z;
  } else if (okX && okZ){
    // both work: choose the one that stays closer to intended movement
    const dxX = Math.abs(nx - tryX.x) + Math.abs(nz - tryX.z);
    const dxZ = Math.abs(nx - tryZ.x) + Math.abs(nz - tryZ.z);
    if (dxX <= dxZ){
      obj.position.x = tryX.x;
      obj.position.z = tryX.z;
    } else {
      obj.position.x = tryZ.x;
      obj.position.z = tryZ.z;
    }
  } else {
    // neither works: revert fully
    obj.position.x = px;
    obj.position.z = pz;
  }

  // Clamp to terrain height and update safe pos (now guaranteed outside or reverted)
  obj.position.y = heightAtWorldXZ(obj.position.x, obj.position.z) + PLAYER_EYE_HEIGHT;
  lastSafePos.copy(obj.position);
}

   Hold F to fire. No enemies.

const FIRE_ENABLE = true;
const FIRE_COOLDOWN = 260; // ms
const FIRE_SPEED = 48;    // world units / sec
const FIRE_LIFE = 3.0;    // seconds
const FIRE_RADIUS = 0.18;
const FIRE_MUZZLE_ABOVE_GROUND = 2.2; // keep shots level above terrain

let fireHeld = false;
let lastFireTime = 0;
const blueBalls = [];
const __tmpBox = new THREE.Box3();
const __tmpV3 = new THREE.Vector3();

window.addEventListener("keydown", (e)=>{
  if (e.code === "KeyF") fireHeld = true;
});
window.addEventListener("keyup", (e)=>{
  if (e.code === "KeyF") fireHeld = false;
});

function spawnBlueBall(){
  const geom = new THREE.SphereGeometry(FIRE_RADIUS, 12, 12);
  const mat  = new THREE.MeshStandardMaterial({
    color: 0x4fb6ff,
    emissive: 0x1a6fd8,
    emissiveIntensity: 0.6
  });
  const ball = new THREE.Mesh(geom, mat);

  const obj = controls.getObject();
  const yaw = obj.rotation.y;
  const dir = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw)).normalize();

  const sx = obj.position.x + dir.x * 1.2;
  const sz = obj.position.z + dir.z * 1.2;
  const sy = heightAtWorldXZ(sx, sz) + FIRE_MUZZLE_ABOVE_GROUND;

  const start = new THREE.Vector3(
    sx,
    sy,
    sz
  );

  ball.position.copy(start);
  scene.add(ball);

  blueBalls.push({
    mesh: ball,
    vel: dir.clone().multiplyScalar(FIRE_SPEED),
    life: FIRE_LIFE
  });
}

function tryFire(){
  if (!FIRE_ENABLE) return;
  const now = performance.now();
  if (now - lastFireTime < FIRE_COOLDOWN) return;
  lastFireTime = now;
  spawnBlueBall();
  playHitSound();
}

function updateBlueBalls(dt){
  for (let i = blueBalls.length - 1; i >= 0; i--){
    let removed = false;
    const b = blueBalls[i];
    b.mesh.position.addScaledVector(b.vel, dt);
    // Keep trajectory level relative to terrain (prevents fast ground strike on slopes)
    b.mesh.position.y = heightAtWorldXZ(b.mesh.position.x, b.mesh.position.z) + FIRE_MUZZLE_ABOVE_GROUND;

    // Hit test vs targets (sphere center vs target AABB)
    if (targets && targets.length){
      const p = b.mesh.position;
      for (let ti = targets.length - 1; ti >= 0; ti--){
        const t = targets[ti];
        if (!t || !t.box) continue;
        const cp = t.box.clampPoint(p, __tmpV3);
        const d2 = cp.distanceToSquared(p);
        if (d2 <= (FIRE_RADIUS * FIRE_RADIUS)){
          // sparkle burst at impact
          spawnHitBurst(p, 0xff6666);
          playTargetHitSound();

          // remove ball
          scene.remove(b.mesh);
          b.mesh.geometry.dispose();
          b.mesh.material.dispose();
          blueBalls.splice(i, 1);

          registerTargetHit(ti);
          removed = true;
          break;
        }
      }
      // if we removed the ball, continue outer loop
      if (removed) continue;
    }

    // BADGUY_HITTEST: Hit test vs bad guy billboard (sphere center vs billboard AABB)
  if (badGuy){
      __tmpBox.setFromObject(badGuy);
      const p = b.mesh.position;
      const cp = __tmpBox.clampPoint(p, __tmpV3);
      const d2 = cp.distanceToSquared(p);
      if (d2 <= (FIRE_RADIUS * FIRE_RADIUS)){
        // sparkle burst at impact
        spawnHitBurst(p, 0xffffff);
        playHitSound();
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        blueBalls.splice(i, 1);
        registerBadGuyHit();
        continue;
      }
    }
    b.life -= dt;
    if (b.life <= 0){
      scene.remove(b.mesh);
      b.mesh.geometry.dispose();
      b.mesh.material.dispose();
      blueBalls.splice(i, 1);
    }
  }
}


function animate(){
  // Lake ripples (very subtle)
  updateLakeRipples(performance.now() * 0.001);

  requestAnimationFrame(animate);
  const dt = Math.min(0.033, clock.getDelta());

  updateHitBursts(dt);

  if (fireHeld) tryFire();
  updateBlueBalls(dt);
  updateTargets(dt);
  if (WAVES_ENABLE && WAVES_AUTO_NEXT && nextWaveT > 0){
    nextWaveT = Math.max(0, nextWaveT - dt);
    if (nextWaveT === 0 && targetsRemaining === 0) startNextWave();
  }
  if (badGuy){
    // Smoothly turn to face Camitruck (yaw only)
    const px = controls.getObject().position.x;
    const pz = controls.getObject().position.z;
    const dx = px - badGuy.position.x;
    const dz = pz - badGuy.position.z;
    const desired = Math.atan2(dx, dz); // yaw angle toward player
    let current = badGuy.rotation.y;
    // shortest-angle delta
    let delta = desired - current;
    delta = Math.atan2(Math.sin(delta), Math.cos(delta));
    const maxStep = BAD_GUY_TURN_SPEED * dt;
    if (Math.abs(delta) <= maxStep) current = desired;
    else current += Math.sign(delta) * maxStep;
    badGuy.rotation.y = current;
    // flash on hit
    if (badGuyFlashT > 0){
      badGuyFlashT = Math.max(0, badGuyFlashT - dt);
      badGuy.material.emissive.setHex(0xffffff);
      badGuy.material.emissiveIntensity = 0.9;
    } else {
      badGuy.material.emissive.setHex(0x000000);
      badGuy.material.emissiveIntensity = 0.0;
    }
  }

  // RAYCASTER-STYLE ARROWS:
  //   ArrowLeft/ArrowRight = turn
  //   ArrowUp/ArrowDown    = forward/back
  const forward = (keys.has("ArrowUp") || keys.has("KeyW")) ? 1 : (keys.has("ArrowDown") || keys.has("KeyS")) ? -1 : 0;
  for (const m of buffNearPickupSprites){
    if (!m) continue;
    m.lookAt(camera.position.x, m.position.y, camera.position.z);
  }
  for (const m of lakeBushSprites){
    if (!m) continue;
    m.lookAt(camera.position.x, m.position.y, camera.position.z);
  }
  for (const m of lowTreeSprites){
    if (!m) continue;
    m.lookAt(camera.position.x, m.position.y, camera.position.z);
  }
  for (const m of lowTree3Sprites){
    if (!m) continue;
    m.lookAt(camera.position.x, m.position.y, camera.position.z);
  }
  for (const m of midTree7Sprites){
    if (!m) continue;
    m.lookAt(camera.position.x, m.position.y, camera.position.z);
  }

  // Keep strafe on A/D only (optional)
  const strafe  = (keys.has("KeyD")) ? 1 : (keys.has("KeyA")) ? -1 : 0;

  // Keyboard turning (like raycaster)
  let turn = 0;
  if (keys.has("ArrowLeft"))  turn += 1;
  if (keys.has("ArrowRight")) turn -= 1;

  if (controls.isLocked || (typeof touchOn !== 'undefined' && touchOn)) {
    const obj = controls.getObject();

    // Tank controls: heading is owned by ArrowLeft/ArrowRight.
    truckTurnInput = turn;
    truckYaw += turn * TURN_SPEED * dt;
    obj.rotation.y = truckYaw;

    const fwd = new THREE.Vector3(
      -Math.sin(truckYaw),
       0,
      -Math.cos(truckYaw)
    ).normalize();

    const right = new THREE.Vector3(-fwd.z, 0, fwd.x).normalize();

    const move = new THREE.Vector3();
    move.addScaledVector(fwd, forward);
    move.addScaledVector(right, strafe);

    const isMoving = move.lengthSq() > 0;
    const arrowEngaged = keys.has("ArrowUp") || keys.has("ArrowDown") || keys.has("ArrowLeft") || keys.has("ArrowRight");
    truckMoveBlend = arrowEngaged ? 1 : 0;

    // Save previous position (for collision resolution)
    prevPos.copy(obj.position);

    if (isMoving) {
      move.normalize().multiplyScalar(MOVE_SPEED * dt);
      obj.position.add(move);
    }

    // Lake collision (baby step: slide along shoreline)
    applyLakeBlock(obj);

    // --- Truck audio: drive when moving, idle when stopped ---
    if (truckAudio && truckIdleAudio){
      if (isMoving){
        if (truckIdleSoundPlaying){
          truckIdleAudio.pause();
          truckIdleAudio.currentTime = 0;
          truckIdleSoundPlaying = false;
        }
        if (!truckSoundPlaying){
          truckAudio.play().catch(()=>{});
          truckSoundPlaying = true;
        }
      } else {
        if (truckSoundPlaying){
          truckAudio.pause();
          truckAudio.currentTime = 0;
          truckSoundPlaying = false;
        }
        if (!truckIdleSoundPlaying){
          truckIdleAudio.play().catch(()=>{});
          truckIdleSoundPlaying = true;
        }
      }
    }

    // Gravity + jump
    velY -= GRAVITY * dt;
    obj.position.y += velY * dt;

    const floorY = heightAtWorldXZ(obj.position.x, obj.position.z) + PLAYER_EYE_HEIGHT;
    if (obj.position.y <= floorY){
      obj.position.y = floorY;
      velY = 0;
      onGround = true;
    } else onGround = false;


    if (onGround && keys.has("Space")){
      velY = JUMP_VEL;
      onGround = false;
    }

    // Step 4: mountains follow player
    if (mountainGroup){
      mountainGroup.position.x = obj.position.x;
      mountainGroup.position.z = obj.position.z;
      mountainGroup.position.y = 0;
  }
  }

  if (!(controls.isLocked || (typeof touchOn !== 'undefined' && touchOn))){
    truckTurnInput = 0;
    truckMoveBlend = 0;
    if (truckAudio && truckSoundPlaying){
      truckAudio.pause();
      truckAudio.currentTime = 0;
      truckSoundPlaying = false;
    }
    if (truckIdleAudio && truckIdleSoundPlaying){
      truckIdleAudio.pause();
      truckIdleAudio.currentTime = 0;
      truckIdleSoundPlaying = false;
    }
  }
  updateTruckAvatar(dt);
  renderer.render(scene, camera);
}
animate();

addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
